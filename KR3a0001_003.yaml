body:
  text: 王言解第三孔子間居曾參侍孔子曰參乎今之君子唯士與大夫言聞也至於君子之言者希也於乎吾以王言之其出不戶牖而化天下曾子起下席而對曰敢問何謂王者言孔子不應曾子曰侍夫子之閒也難是以敢問孔子又不應曾子肅然而懼摳衣而退負席而立有頃孔子歎息顧謂曾子曰參女可語明王之道曾子曰非敢以為足請因所聞而學焉子曰居吾語女夫道者所以明德也德者所以尊道也是以非德道不尊非道德不明雖有國之良馬不以其道服乘之不可以取道里雖有博地衆民不以其道治之不可以致霸王是故昔者明王內修七教外行三至七教修然後可以守三至行然後可以征明王之道其守也則必折衝千里之外其征也則必還師衽席之上故曰內修七教而上不勞外行三至而財不費此之謂明王之道也曾子曰不勞不費之謂明王可得聞乎孔子曰昔者帝舜左禹而右皋陶不下席而天下治夫如此何上之勞乎政之不中君之患也令之不行臣之罪也若乃十一而稅用民之力歲不過三日入山澤以其時而無征關譏市鄽皆不收賦此則生財之路而明王節之何財之費乎曾子曰敢問何謂七教孔子曰上敬老則下益孝上尊齒則下益弟上樂施則下益寬上親賢則下擇友上好德則下不隱上惡貪則下恥爭上廉讓則下恥節此之謂七教七教者治民之本也政教定則本正矣凡上者民之表也表正則何物不正是故人君先立仁於己然後大夫忠而士信民敦俗朴男愨而女貞六者教之致也布諸天下四方而不窕納諸尋常之室而不塞等之以禮立之以義行之以順則民之棄惡如湯之灌雪焉曾子曰道則至矣弟子不足以明之孔子曰參以為姑止乎又有焉昔者明王之治民也有法必裂地以封之分屬以理之然後賢民無所隱㬥民無所伏使有司日省而時考之進用賢良退貶不肖然則賢者說而不肖者懼哀鰥寡養孤獨恤貧窮誘孝弟選才能此七者修則四海之內無刑民矣上之親下也如手足之於腹心下之親上也如幼子之於慈母矣上下相親如此故令則從施則刑民懷其德近者說服遠者來附政之致也夫布指知寸布手知尺舒肘知尋斯不遠之則也周制三百步為里千步而井三井而埒埒三而矩五十里而都封百里而有國乃為蓄積資聚焉恤行者有無是以蠻夷諸夏雖衣冠不同言語不合莫不來賓故曰無市而民不乏無刑而民不亂田獵罩弋非以盈宮室也徵斂百姓非以盈府庫也慘怛以補不足禮節以損有餘多信而寡貌其禮可守其言可復其跡可履如飢而食如渴而飲民之信之如寒暑之必驗故視遠若邇非道邇也見明德也是故兵革不動而威用利不施而親此之謂明王之守折衝千里之外者也曾子曰敢問何謂三至孔子曰至禮不讓而天下治至賞不費而天下之士說至樂無聲而天下之民和明王篤行三至故天下之君可得而知天下之士可得而臣天下之民可得而用曾子曰敢問此義何謂孔子曰古者明王必盡知天下良士之名既知其名又知其實又知其數及其所在焉然後因天下之爵以尊之此之謂至禮不讓而天下治因天下之祿以富天下之士此之謂至賞不費而天下之士說如此則天下之名譽興焉此之謂至樂無聲而天下之民和故曰所謂天下之至仁者能合天下之至親也所謂天下之至明者能舉天下之至賢者也此三者咸通然後可以征是故仁者莫大乎愛人智者莫大乎知賢賢政者莫大乎官能有土之君修此三者則四海之內共命而已矣夫明王之所征必道之所廢者也是故誅其君而改其政弔其民而不奪其財故明王之政猶時雨之降降至則民說矣是故行施彌博得親彌衆此之謂還師衽席之上
