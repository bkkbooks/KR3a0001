body:
  text: 問玉第三十六子貢問於孔子曰敢問君子玉貴而珉賤何也為玉之寡而珉之多歟孔子曰非為玉之寡故貴之也珉之多故賤之也夫昔者君子比德於玉焉溫潤而澤仁也縝密以栗智也廉而不劌義也垂之如墜禮也叩之其聲清越而長其終則絀然樂也瑕不掩瑜瑜不掩瑕忠也孚尹旁達信也氣如白虹天也精神見于山川地也圭璋特達德也天下莫不貴者道也詩云言念君子溫其如玉故君子貴之也孔子曰入其國其教可知也其為人也溫柔敦厚詩教也疏通知遠書教也廣博易良樂教也潔靜精微易教也恭儉莊敬禮教也屬辭比事春秋教也故詩之失愚書之失誣樂之失奢易之失賊禮之失煩春秋之失亂其為人溫柔敦厚而不愚則深於詩者矣疏通知遠而不誣則深於書者矣廣博易良而不奢則深於樂者矣潔靜精微而不賊則深於易者矣恭儉莊敬而不煩則深於禮者矣屬辭比事而不亂則深於春秋者也天有四時春夏秋冬風雨霜露無非教也地載神氣吐納雷霆流形庶物無非教也清明在躬氣志如神有物將至其兆必先是故天地之教與聖人相參其在詩曰嵩高惟嶽峻極于天惟嶽降神生甫及申惟申及甫惟周之翰四國于蕃四方于宣此文武之德也矢其文德協此四國此文王之德也凡三代之王必先其令問詩云明明天子令問不已三代之德也子張問聖人之所以教孔子曰師乎吾語汝聖人明於禮樂舉而措之而已子張又問孔子曰師爾以為必布几筵揖讓升降酌獻酬酢然後謂之禮乎爾以為必行綴兆執羽籥作鍾鼓然後謂之樂乎言而可履禮也行而可樂樂也聖人力此二者以躬己南面是故天下太平萬民順伏百官承事上下有禮也夫禮之所以興衆之所以治也禮之所以廢衆之所以亂也目巧之室則有隩阼席則有上下車則有左右行則竝隨立則有列序古之義也室而無隩阼則亂於堂室矣席而無上下則亂於席次矣車而無左右則亂於車上矣行而無竝隨則亂於階塗矣列而無次序則亂於著矣昔者明王聖人辨貴賤長幼正男女內外序親踈遠近莫敢相踰越者皆由此塗出也
