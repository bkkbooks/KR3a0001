body:
  text: 子貢問第四十三子夏問於孔子曰居父母之仇如之何孔子曰寢苫枕干不仕弗與共天下也遇於朝市不返兵而鬭曰請問居昆弟之仇如之何孔子曰仕弗與同國銜君命而使雖遇之不鬭曰請問從父昆弟之仇如之何曰不為魁主人能報之則執兵而陪其後子夏問三年之喪既卒哭金革之事無避禮與初有司為之乎孔子曰夏后氏之喪三年既殯而致事殷人既葬而致事周人既卒哭而致事記曰君子不奪人之親亦不奪故也子夏曰金革之事無避者非與孔子曰吾聞諸老聃曰魯公伯禽有為為之也今以三年之喪從利者吾弗知也子夏問於孔子曰記云周公相成王教之以世子之禮有諸孔子曰昔者成王嗣立幼未能莅阼周公攝政而治抗世子之法於伯禽欲王之知父子君臣之道所以善成王也夫知為人子者然後可以為人父知為人臣者然後可以為人君知事人者然後可以使人是故抗世子法伯禽使成王知父子君臣長幼之義焉凡君之於世子親則父也尊則君也有父之親有君之尊然後兼天下而有之不可不慎也行一物而善者唯世子齒於學之謂也世子齒於學則國人觀之曰此將君我而與我齒讓何也曰有父在則禮然然而眾知父子之道矣其二曰此將君我而與我齒讓何也曰有君在則禮然然而眾知君臣之義矣其三曰此將君我而與我齒讓何也曰長長也則禮然然而眾知長幼之節矣故父在斯為子君在則為臣居子與臣之位所以尊君而親親也在學學之為父子焉學之為君臣焉學之為長幼焉父子君臣長幼之道得而後國治語曰樂正司業父師司成一有元良萬國以貞世子之謂也聞之曰為人臣者曰殺其身有益於君則為之況于其身以善其君乎周公優為之子夏問於孔子曰居君之母與妻之喪如之何孔子曰居處言語飲食衎爾於喪所則稱其服而已敢問伯母之喪如之何孔子曰伯母叔母䟽衰期而踊不絕地姑姊妹之大功踊絕於地若知此者由文矣哉子夏問於夫子曰凡喪小功已上虞祔練祥之祭皆沐浴於三年之喪子則盡其情矣孔子曰豈徒祭而已哉三年之喪身有瘍則浴首有瘡則沐病則飲酒食肉毀瘠而為病君子不為也毀則死者君子為之且祭之沐浴為齊潔也非為飾也子夏問於孔子曰客至無所舍而夫子曰生於我乎館客死無所殯夫子曰死於我乎殯敢問禮與仁者之心與孔子曰吾聞諸老聃曰館人使若有之惡有有之而不得殯乎夫仁者制禮者也故禮者不可不省也禮不同不異不豐不殺稱其義以為之宜故曰我戰則剋祭則受福蓋得其道矣孔子食於季氏食祭主人不辭不食客不飲而餐子夏問曰禮與孔子曰非禮也從主人也吾食於少施氏而飽少施氏食我以禮吾食祭作而辭曰䟽食不足祭也吾餐而作辭曰䟽食不敢以傷吾子之性主人不以禮客不敢盡禮主人盡禮則客不敢不盡禮也子夏問曰官於大夫既外於公而反為之服禮與孔子曰管仲遇盜取二人焉上之為臣曰所以遊辟者可人也公許管仲卒桓公使為之服官於大夫者為之服也自管仲始也有君命焉子貢問居父母喪孔子曰敬為上哀次之瘠為下顏色稱情戚容稱服曰請問居兄弟之喪孔子曰兄弟之喪則存乎書筴矣子貢問於孔子曰殷人既定而弔於壙周人反哭而弔於家如之何孔子曰反哭之弔也喪之至也反而亡矣失之矣於斯為甚故弔之死人卒事也殷以愨吾從周殷人既練之明日而祔于祖周人既卒哭之明日而祔于祖祔祭神之始事也周以戚吾從殷子貢問曰聞諸晏子少連大連善居喪其有異稱乎孔子曰父母之喪三日不怠三月不解期悲哀三年憂東夷之子達於禮者也子游問曰諸侯之世子喪慈母如母禮與孔子曰非禮也古者男子外有傅父內有慈母君命所使教子者也何服之有昔魯孝公少喪其母其慈母良及其死也公弗忍欲喪之有司曰禮國君慈母無服今也君為之服是逆古之禮而亂國法也若終行之則有司將書之以示後世無乃不可乎公曰古者天子喪慈母練冠以燕居遂練冠以喪慈母喪慈母如母始則魯孝公之為也孔子適衛遇舊館人之喪入而哭之哀出使子貢脫驂以贈之子貢曰於所識之喪不能有所贈贈於舊館不已多乎孔子曰吾向入哭之遇一哀而出涕吾惡夫涕而無以將之小子行焉子路問於孔子曰魯大夫練而杖禮與孔子曰吾不知也子路出謂子貢曰吾以為夫子無所不知夫子亦徒有所不知也子貢曰子所問何哉子路曰由問魯大夫練而杖禮邪夫子曰吾不知也子貢曰止吾將為子問之遂趨而進曰練而杖禮與孔子曰非禮也子貢出謂子路曰子謂夫子而弗知之乎夫子徒無所不知也子問非也禮居是邦則不非其大夫叔孫武叔之母死既小歛舉尸者出戶武孫從之出戶乃袒且投其冠而括髮子路歎之孔子曰是禮也子路問曰將小歛則變服今乃出戶而夫子以為知禮何也孔子曰汝問非也君子不舉人以質事齊晏桓子卒平仲麤衰斬苴絰帶杖以菅屨食粥居傍廬寢苫枕草其老曰非大夫喪父之禮也晏子曰唯卿為大夫曾子以問孔子孔子曰晏平仲可謂能遠害矣不以己之是駮人之非愻辭以避咎義也夫季平子卒將以君之璵璠歛贈以珠玉孔子初為中都宰聞之歷級而救焉曰送而以寶玉是猶曝尸於中原也其示民以姦利之端而有害於死者安用之且孝子不順情以危親忠臣不兆姦以陷君乃止孔子之弟子琴張與宗魯友衛齊豹見宗魯於公子孟縶孟縶以為參乘焉及齊豹將煞孟縶告宗魯使行宗魯曰吾由子而事之今聞難而逃是僭子也子行事乎吾將死以事周子而歸死於公孟可也齊氏用戈擊公孟宗魯以背蔽之斷肱中公孟宗魯皆死琴張聞宗魯死將往弔之孔子曰齊豹之盜孟縶之賊也汝何弔焉君子不食姦不受亂不為利病於回不以回事人不蓋非義不犯非禮汝何弔焉琴張乃止郕人子蒲卒哭者呼滅子游曰若哭其野孔子惡野哭者哭者聞之遂改之公父文伯卒其妻妾皆行哭失聲敬姜戒之曰吾聞好外者士死之好內者女死之今吾子早夭吾惡其以好內聞也二三婦人之欲供先祀者請無瘠色無揮涕無拊膺無哀容無加服有降服從禮而靜是昭吾子也孔子聞之曰女智無若婦男智莫若夫公文氏之婦智矣剖情損禮欲以明其子之令德也子路與子羔仕於衛衛有蒯聵之難孔子在魯聞之曰柴也其來由也死矣既而衛使至曰子路死焉夫子哭之於中庭有人弔者而夫子拜之已哭進使者而問故使者曰醢之矣遂令左右皆覆醢曰吾何忍食此季桓子死魯大夫朝服而弔子游問於孔子曰禮乎夫子不荅他日又問夫子曰始死則矣羔裘玄冠者易之而已汝何疑焉子睪問於孔子曰始死之設重也何為孔子曰重主道也殷主綴重焉周人徹重焉請問喪朝子曰喪之朝也順死者之孝心故至於祖考廟而後行殷朝而後殯於祖周朝而後遂葬孔子之守狗死謂子貢曰路馬死則藏之以帷狗則藏之以蓋汝往埋之吾聞弊帷不棄為埋馬也弊蓋不棄為埋狗也今吾貧無蓋於其封也與之席無使其首陷於土焉
