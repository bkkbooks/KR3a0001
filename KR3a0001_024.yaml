body:
  text: 五帝第二十四季康子問於孔子曰舊聞五帝之名而不知其實請問何謂五帝孔子曰昔丘也聞諸老聃曰天有五行木火金水土分時化育以成萬物其神謂之五帝古之王者易代而改號取法五行五行更王終始相生亦象其義故其為明王者而死配五行是以太皞配木炎帝配火黃帝配土少皞配金顓頊配水康子曰太皞氏其始之木何如孔子曰五行用事先起於木木東方萬物之初皆出焉是故王者則之而首以木德王天下其次則以所生之行轉相承也康子曰吾聞勾芒為木正祝融為火正蓐收為金正玄冥為水正后土為土正此則五行之主而不亂稱曰帝者何也夫子曰凡五正者五行之官名五行佐成上帝而稱五帝太皞之屬配焉亦云帝從其號昔少皞氏之子有四叔曰重曰該曰修曰熙實能金木及水使重為勾芒該為蓐收修及熙為玄冥顓頊氏之子曰黎為祝融龔工氏之子曰勾龍為后土此五者各以其所能業為官職生為上公死為貴神別稱五祀不得同帝康子曰如此之言帝王改號於五行之德各所統則其所以相變者皆主何事孔子曰所尚則各從其所王之德次焉夏后氏以金德王而尚黑大事斂用昏戎事乘驪牲用玄殷人以水德尚白大事斂用日中戎事乘翰牲用白周人以木德王尚赤大事斂用日出戎事乘騵牲用騂此三代之所以不同康子曰唐虞二帝其所尚者何色孔子曰堯以火德王色尚黃舜以土德王色尚青康子曰陶唐有虞夏后殷周獨不得配五帝意者德不及上古耶將有限乎孔子曰古之平治水土及播殖百穀者衆矣唯勾龍兼食於社而棄為稷神易代奉之無敢益者明不可與等故自太皞以降逮于顓頊其應五行而王數非徒五而配五帝是其德不可以多也
