body:
  text: 刑政第三十一仲弓問於孔子曰雍聞至刑無所用政至政無所用刑至刑無所用政桀紂之世是也至政無所用刑成康之世是也信乎孔子曰聖人之治化也必刑政相參焉太上以德教民而以禮齊之其次以政言導民以刑禁之刑不刑也化之弗變導之弗從傷義以敗俗於是乎用刑矣顓五刑必即天倫行刑罰則輕無赦刑侀也侀成也一成而不可更故君子盡心焉仲弓曰古之聽訟尤罰麗於事不以其心可得聞乎孔子曰凡聽五刑之訟必原父子之情立君臣之義以權之意論輕重之序慎深淺之量以別之悉其聰明正其忠愛以盡大司寇正刑明辟以察獄獄必三訊焉有旨無簡則不聽也附從輕赦從重疑獄則泛與衆共之疑則赦之皆以小大之比成之是故爵人必於朝與衆共之也刑人必於市與衆棄之也古者公家不畜刑人大夫弗養其士遇之塗弗與之言屏諸四方唯其所之弗及與政弗欲生之也仲弓曰聽獄獄之成成何官孔子曰成獄於吏吏以獄之成告於正正既聽之乃告大司寇大司寇聽之乃奉於王王命三公卿士參聽棘木之下然後乃以獄之成疑于王王三宥之以聽命而制刑焉所以重之也仲弓曰其禁何禁孔子曰巧言破律遁名改作執左道與亂政者殺作淫聲造異服設伎奇器以蕩上心者殺行僞而堅言詐而辨學非而博順非而澤以惑衆者殺假於鬼神時日卜筮以疑衆者殺此四誅者不以聽仲弓曰其禁盡於此而已孔子曰此其急者其餘禁者十有四焉命服命車不粥於市圭璋璧琮不粥於市宗廟之器不粥於市兵軍旍旗不粥於市犧牲秬鬯不粥於市戎器兵甲不粥於市用器不中度不粥於市布帛精粗不中數廣狹不中量不粥於市姦色亂正色不粥於市文錦珠玉之器雕飾靡麗不粥於市衣服飲食不粥於市果食不時不粥於市五木不中伐不粥於市鳥獸魚鱉不中殺不粥於市凡執此禁以齊衆者不赦過也
