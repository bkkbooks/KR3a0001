body:
  text: 在厄第二十楚昭王聘孔子孔子往拜禮焉路出于陳蔡陳蔡大夫相與謀曰孔子聖賢其所刺譏皆中諸侯之病若用於楚則陳蔡危矣遂使徒兵距孔子孔子不得行絶糧七日外無所通黎羹不充從者皆病孔子愈慷慨講誦絃歌不衰乃召子路而問焉曰詩云匪兕匪虎率彼曠野吾道非乎奚為至於此子路慍作色而對曰君子無所困意者夫子未仁與人之弗吾信也意者夫子未智與人之弗吾行也且由也昔者聞諸夫子為善者天報之以福為不善者天報之以禍今夫子積德懷義行之久矣奚居之窮也子曰由未之識也吾語汝汝以仁者為必信也則伯夷叔齊不餓死首陽汝以智者為必用也則王子比干不見剖心汝以忠者為必報也則關龍逄不見刑汝以諫者為必聽也則伍子胥不見殺夫遇不遇者時也賢不肖者才也君子博學深謀而不遇時者衆矣何獨丘哉且芝蘭生於深林不以無人而不芳君子修道立德不為窮困而敗節為之者人也生死者命也是以晉重耳之有霸心生於曹衛越王句踐之有霸心生於會稽故居下而無憂者則思不遠處身而常逸者則志不廣庸知其終始乎子路出召子貢告如子路子貢曰夫子之道至大故天下莫能容夫子夫子盍少貶焉子曰賜良農能稼不必能穡良工能巧不能為順君子能修其道綱而紀之不必其能容今不修其道而求其容賜爾志不廣矣思不遠矣子貢出顏回入問亦如之顏回曰夫子之道至大天下莫能容雖然夫子推而行之世不我用有國者之醜也夫子何病焉不容然後見君子孔子欣然歎曰有是哉顏氏之子吾亦使爾多財吾為爾宰子路問於孔子曰君子亦有憂乎子曰無也君子之修行也其未得之則樂其意既得之又樂其治是以有終身之樂無一日之憂小人則不然其未之得也患弗得之既得之又恐失之是以有終身之憂無一日之樂也曾子弊衣而耕於魯魯君聞之而致邑焉曾子固辭不受或曰非子之求君自致之奚固辭也曾子曰吾聞受人施者常畏人與人者常驕人縱君有賜不我驕也吾豈能勿畏乎終不受孔子聞之曰參之言足以全其節也孔子厄於陳蔡從者七日不食子貢以所齎貨竊犯圍而出告糴於野人得米一石焉顏回仲由炊之於壞屋之下有埃墨墮飯中顏回取而食之子貢自井望見之不悅以為竊食也入問孔子曰仁人廉士窮改節乎孔子曰改節即何稱於仁廉哉子貢曰若回也其不改節乎子曰然子貢以所飯告孔子子曰吾信回之為仁久矣雖汝有云弗以疑也其或者必有故乎汝止吾將問之召顏回曰疇昔豫夢見先人豈或啓祐我哉子炊而進飯吾將進焉對曰向有埃墨墮飯中欲置之則不潔欲棄之則可惜回即食之不可祭也孔子曰然乎吾亦食之顏回出孔子顧謂二三子曰吾之信回也非待今日也二三子由此乃服之
