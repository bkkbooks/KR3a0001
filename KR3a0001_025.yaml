body:
  text: 執轡第二十五閔子騫為費宰問政於孔子子曰以德以法夫德法者御民之具猶御馬之有銜勒也君者人也吏者轡也刑者策也夫人君之政執其轡策而已子騫曰敢問古之為政孔子曰古者天子以內史為左右手以德法為銜勒以百官為轡以刑罰為策以萬民為馬故御天下數百年而不失善御馬者正銜勒齊轡策均馬力和馬心故口無聲而馬應轡策不舉而極千里善御民者一其德法正其百官以均齊民力和安民心故令不再而民順從刑不用而天下治是以天地德之而兆民懷之夫天地之所德兆民之所懷其政美其民而稱之今人言五帝三王者其盛無偶威察若存其故何也其法盛其德厚故思其德必稱其人朝夕祝之升聞於天上帝俱歆用永厥世而豐其年不能御民者棄其德法專用刑辟譬猶御馬棄其銜勒而專用箠策其不制也可必矣夫無銜勒而用箠策馬必傷車必敗無德法而用刑民必流國必亡治國而無德法則民無修民無修則迷惑失道如此上帝必以其為亂天道也苟亂天道則刑罰㬥上下相諛莫知念患俱無道故也今人言惡者必比之於桀紂其故何也其法不聽其德不厚故民惡其殘虐莫不吁嗟朝夕祝之升聞於天上帝不蠲降之以禍罰災害竝生用殄厥世故曰德法者御民之本古之御天下者以六官揔治焉冢宰之官以成道司徒之官以成德宗伯之官以成仁司馬之官以成聖司寇之官以成義司空之官以成禮六官在手以為轡司會均仁以為納故曰御四馬者執六轡御天下者正六官是故善御馬者正身以揔轡均馬力齊馬心回旋曲折唯其所之故可以取長道可赴急疾此聖人所以御天地與人事之法則也天子以內史為左右手以六官為轡已而天子與三公為執六官均五教齊五法故亦唯其所引無不如志以之道則國治以之德則國安以之仁則國和以之聖則國平以之禮則國定以之義則國義此御政之術過失人情莫不有焉過而改之是謂不過故屬不理分職不明法政不一百事失紀曰亂亂則飭冢宰地而不殖財物不蕃萬民飢寒教訓不行風俗淫僻人民流散曰危危則飭司徒父子不親長幼失序君臣上下乖離異志曰不和不和則飭宗伯賢能而失官爵功勞而失賞祿士卒疾怨兵弱不用曰不平不平則飭司馬刑罰㬥亂姦邪不勝曰不義不義則飭司寇度量不審舉事失理都鄙不修財物失所曰貧貧則飭司空故御者同是車馬或以取千里或不及數百里其所謂進退緩急異也夫治者同是官法或以致平或以致亂者亦其所以為進退緩急異也古者天子常以季冬考德正法以觀治亂德盛者治也德薄者亂也故天子考德則天下之治亂可坐廟堂之上而知之夫德盛則法修德不盛則飭法與政咸德而不衰故曰王者又以孟春論吏之德及功能能德法者為有德能行德法者為有行能成德法者為有功能治德法者為有智故天子論吏而德法行事治而功成夫季冬正法孟春論吏治國之要子夏問於孔子曰商聞易之生人及萬物鳥獸昆蟲各有奇偶氣分不同而凡人莫知其情唯達道德者能原其本焉天一地二人三三三如九九九八十一一主日日數十故人十月而生八九七十二偶以從奇奇主辰辰主月月主馬故馬十二月而生七九六十三三主斗斗主狗故狗三月而生六九五十四四主時時主豕故豕四月而生五九四十五五主音音主猿故猿五月而生四九三十六六主律律主鹿故鹿六月而生三九二十七七主星星主虎故虎七月而生二九一十八八主風風主蟲故蟲八月而生其餘各從其類也鳥魚生於陰而屬於陽故皆卵生魚遊於水鳥遊於雲故立冬則燕雀入海化為蛤蠶食而不飲蟬飲而不食蜉蝣不飲不食萬物之所以不同介鱗夏食而冬蟄齕吞者八竅而獸生齟𪚅者九竅而胎生四足者無羽翼戴角者無上齒無角無前齒者膏有角無齒者脂晝生者類父夜生者似母是以至陰主牝至陽主牡敢問其然乎孔子曰然吾昔聞諸老聃亦如汝之言子夏曰商聞山書曰地東西為緯南北為經山為積德川為積刑高者為生下者為死丘陵為牡溪谷為牝蚌蛤龜珠與日月而盛虛是故堅土之人剛弱土之人柔墟土之人大沙土之人細息土之人美耗土之人醜食水者善遊而耐寒食土者無心而不息食木者多力而不治食草者善走而愚食桑者有緒而蛾食肉者勇毅而捍食氣者神明而壽食穀者智惠而巧不食者不死而神故曰羽蟲三百有六十而鳳為之長毛蟲三百有六十而鱗為之長甲蟲三百有六十而龜為之長鱗蟲三百有六十而龍為之長倮蟲三百有六十而人為之長此乾坤之美也殊形異類之數王者動必以道靜必順理以奉天地之性而不害其所主謂之仁聖焉子夏言終而出子貢進曰商之論也何如孔子曰汝謂何也對曰微則微矣然則非治世之待也孔子曰然各其所能
