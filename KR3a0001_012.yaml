body:
  text: 弟子行第十二衛將軍文子問於子貢曰吾聞孔子之施教也先之以詩書導之以孝悌説之以仁義觀之以禮樂然後成之以文德蓋入室升堂者七十有餘人其孰為賢子貢對以不知文子曰以吾子常與學賢者也何為不知也子貢對曰賢人無妄知賢即難故君子之言曰智莫難於知人是以難對也文子曰若夫知賢莫不難今吾子親遊焉是以敢問也子貢對曰夫子之門人蓋有三千就焉賜有逮及焉有未逮及焉故不得遍知以告也文子曰吾子所及者請聞其行子貢對曰夫能夙興夜寐諷誦崇禮行不二過稱言不苟是顏回之行也孔子説之以詩曰媚茲一人應侯慎德永言孝思孝思惟則若逢有德之君世受顯命不失厥名以御于天子則王者之相也在貧如客使其臣如借不遷怒不深怨不録舊罪是冉雍之行也孔子論其材曰有土之君子也有衆使也有刑用也然後稱怒焉孔子告之以詩曰靡不有初鮮克有終匹夫不怒唯以亡其身不畏強禦不侮矜寡其言循性其都以富材任治戎是仲由之行也孔子和之以文説之以詩曰受小共大共而為下國駿厖荷天子之龍不戁不悚敷奏其勇強乎武哉文不勝其質恭老恤幼不忘賓旅好學博藝省物而勤也是冉求之行也孔子因而語之曰好學則智恤孤則惠恭則近禮勤則有繼堯舜篤恭以王天下其稱之也曰宜為國老齋莊而能肅志通而好禮儐相兩君之事篤雅有節是公西赤之行也孔子曰禮經三百可勉能也威儀三千則難也公西赤問曰何謂也孔子曰貌以儐禮禮以儐辭是謂難焉衆人聞之以為成也孔子語人曰當賓客之事則達矣謂門人曰二三子之欲學賓客之禮者其於赤也滿而不盈實而如虛過之如不及先王難之博無不學其貌恭其德敦其言於人也無所不信其驕大人也常以浩浩是以眉壽是曾參之行也孔子曰孝德之始也悌德之序也信德之厚也忠德之正也參中夫四德者也以此稱之美功不伐貴位不善不侮不佚不傲無告是顓孫師之行也孔子言之曰其不伐則猶可能也其不弊百姓則仁也詩云愷悌君子民之父母夫子以其仁為大學之深送迎必敬上交下接若截焉是卜商之行也孔子説之以詩曰式夷式已無小人殆若商也其可謂不險矣貴之不喜賤之不怒苟利於民矣廉於行己其事上也以佑其下是淡臺滅明之行也孔子曰獨貴獨富君子恥之夫也中之矣先成其慮及事而用之故動則不妄是言偃之行也孔子曰欲能則學欲知則問欲善則詳欲給則豫當是而行偃也得之矣獨居思仁公言言義其於詩也則一日三復白圭之玷是宮縚之行也孔子信其能仁以為異士自見孔子出入於戶未嘗越履往來過之足不履影啓蟄不殺方長不折執親之喪未嘗見齒是高柴之行也孔子曰柴於親喪則難能也啓蟄不殺則順人道也方長不折則恕仁也成湯恭而以恕是以日躋凡此諸子賜之所親覩者也吾子有命而訊賜賜也固不足以知賢文子曰吾聞之也國有道則賢人興焉中人用焉乃百姓歸之若吾子之論既富茂矣一諸侯之相也抑世未有明君所以不遇也子貢既與衛將軍文子言適魯見孔子曰衛將軍文子問二三子之於賜不一而三焉賜也辭不獲命以所見者對矣未知中否請以告孔子曰言之乎子貢以其辭狀告孔子子聞而笑曰賜汝次為人矣子貢對曰賜也何敢知人此以賜之所覩也孔子曰然吾亦語汝耳之所未聞目之所未見者豈思之所不至知之所未及哉子貢曰賜願得聞之孔子曰不克不忌不念舊怨蓋伯夷叔齊之行也思天而敬之服義而行信孝於父母恭於兄弟從善而不教道趙文子之行也其事君也不敢愛其死然亦不敢忘其身謀其身不遺其友君陳則進而用之不陳則行而退蓋隨武子之行也其為人之淵源也多聞而難誕內植足以沒其世國家有道其言足以治無道其默足以生蓋銅鞮伯華之行也外寬而內正自極於隱括之中直己而不直人汲汲於仁以善自終蓋蘧伯玉之行也孝恭慈仁允德圖義約貨去怨輕財不匱蓋柳下惠之行也其言曰君雖不量於其身臣不可以不忠於其君是故君擇臣而任之臣亦擇君而事之有道順命無道衡命蓋晏平仲之行也蹈忠而行信終日言不在尤之內國無道處賤不悶貧而能樂蓋老來子之行也易行以俟天命居下不援其上其親觀於四方也不忘其親不盡其樂以不能則學不為己終身之憂蓋介子山之行也子貢曰敢問夫子之所知者蓋盡於此而已乎孔子曰何謂其然亦略舉耳目之所及而已昔晉平公問祁奚曰羊舌大夫晉之良大夫也其行如何祁奚辭以不知公曰吾聞子少長乎其所今子掩之何也祁奚對曰其少也恭而順心有恥而不使其過宿其為大夫也悉善而謙其端其為輿尉也信而好直其功至於其為容也溫良而好禮博聞而時出其志公曰曩者問子子奚曰不知也祁奚曰每位改變未知所止是以不敢得知也此又羊舌大夫之行也子貢跪曰請退而記之
