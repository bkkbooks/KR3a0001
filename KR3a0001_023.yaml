body:
  text: 五帝德第二十三宰我問於孔子曰昔者吾聞諸榮伊曰黃帝三百年請問黃帝者人也抑非人也何以能至三百年乎孔子曰禹湯文武周公不可勝以觀也而上世黃帝之問將謂先生難言之故乎宰我曰上世之傳隱微之説卒采之辨暗忽之意非君子之道者則豫之問也固矣孔子曰可也吾略聞其説黃帝者少典之子也曰軒轅生而神靈弱而能言幼齊睿莊敦敏誠信長聰明治五氣設五量撫萬民度四方服牛乘馬擾馴猛獸以與炎帝戰于阪泉之野三戰而後剋之始垂衣裳作為黼黻治民以順天地之紀知幽明之故達死生存亡之説播時百穀嘗味草木仁厚及於鳥獸昆蟲考日月星辰勞耳目勤心力用水火財物以生民民賴其利百年而死民畏其神百年而亡民用其教百年而移故曰黃帝三百年宰我曰請問帝顓頊孔子曰五帝用説三王有度汝欲一日遍聞遠古之説躁哉豫也宰我曰昔豫也聞諸夫子曰小子毋或宿故敢問孔子曰顓頊黃帝之孫昌意之子也曰高陽淵而有謀疏通以知遠養財以任地履時以象天依鬼神而制義治氣性以教衆潔誠以祭祀巡四海以寧民北至幽陵南暨交趾西扺流沙東極蟠木動靜之類小大之物日月所照莫不底屬宰我曰請問帝嚳孔子曰玄枵之孫喬極之子也曰高辛生而神異自言其名博施厚利不於其身聰以知遠明以察微仁而威惠而信以順天地之義知民所急修身而天下服取地之財而節用之撫教萬民而誨利之歷日月之生朔而迎送之明鬼神而敬事之其色也和其德也重其動也時其服也衷春夏秋冬育護天下日月所照風雨所至莫不從化宰我曰請問帝堯孔子曰高辛氏之子曰陶唐其仁如天其智如神就之如日望之如雲富而不驕貴而能降伯夷典禮龍夔典樂舜時而仕趨視四時務先民始之流四凶而天下服其言不忒其德不回四海之內舟輿所及莫不夷説宰我曰請問帝舜孔子曰喬牛之孫瞽瞍之子也曰有虞舜孝友聞於四方陶魰事親寬裕而溫良敦敏而知時畏天而愛民恤遠而親近承受大命依于二女睿明智通為天下帝命二十二臣率堯舊職躬己而已天平地成巡狩四海五載一始三十年在位嗣帝五十載陟方嶽死于蒼梧之野而葬焉宰我曰請問禹孔子曰高陽之孫鯀之子也曰夏后敏給克齊其德不爽其仁可親其言可信聲為律身為度亹亹穆穆為紀為綱其功為百神主其惠為民父母左準繩右規矩履四時據四海任皋繇伯益以贊其治興六師以征不序四極之內民莫敢不服孔子曰豫大者如天小者如言民悅至矣豫也非其人也宰我曰豫也不足以戒也敬承命矣他日宰我以語子貢子貢以復孔子子曰吾欲以顏狀取人也則於滅明改之矣吾欲以辭言取人也則於宰我改之矣吾欲以容貌取人也則於子張改之矣宰我聞之懼弗敢見焉
