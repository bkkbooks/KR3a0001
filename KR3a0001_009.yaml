body:
  text: 三恕第九孔子曰君子有三恕有君不能事有臣而求其使非恕也有親不能孝有子而求其報非恕也有兄不能敬有弟而求其順非恕也士能明於三恕之本則可謂端身矣孔子曰君子有三思不可不察也少而不學長無能也老而不教死莫之思也有而不施窮莫之救也故君子少思其長則務學老思其死則務教有思其窮則務施伯常騫問於孔子曰騫固周國之賤吏也不自以不肖將北面以事君子敢問正道宜行不容於世隱道宜行然亦不忍今欲身亦不窮道亦不隱為之有道乎孔子曰善哉子之問也自丘之聞未有若吾子所問辨且說也丘嘗聞君子之言道矣聽者無察則道不入奇偉不稽則道不信又嘗聞君子之言事矣制無度量則事不成其政曉察則民不保又嘗聞君子之言志矣剛折不終徑易者則數傷浩倨者則不親就利者則無不敝又嘗聞養世之君子矣從輕勿為先從重勿為後見像而勿強陳道而勿怫此四者丘之所聞也孔子觀於魯桓公之廟有欹器焉夫子問於守廟者曰此謂何器對曰此蓋為宥坐之器孔子曰吾聞宥坐之器虛則欹中則正滿則覆明君以為至誡故常置之於坐側顧謂弟子曰試注水焉乃注之水中則正滿則覆夫子喟然歎曰嗚呼夫物惡有滿而不覆者哉子路進曰敢問持滿有道乎子曰聰明睿智守之以愚功被天下守之以讓勇力振世守之以怯富有四海守之以謙此所謂損之又損之之道也孔子觀於東流之水子貢問曰君子所以見大水必觀焉何也孔子曰以其不息且遍與諸生而不為也夫水有似乎德其流也則卑下倨拘必循其理此似義浩浩乎無屈盡之期此似道流行赴百仞之溪而不懼此似勇至量必平之此似法盛而不求概此似正綽約微達此似察發源必東此似志以出以入萬物就此化潔此似善化也水之德有若此是故君子見大水必觀焉子貢觀於魯廟之北堂出而問於孔子曰向也賜觀於太廟之北堂未既輟還瞻北蓋皆斷焉彼將有說邪匠之過也孔子曰太廟之堂官致良工之匠匠致良材盡其工巧蓋貴久矣尚有說也孔子曰吾有所恥有所鄙有所殆夫幼而不能強學老而無以教吾恥之去其鄉事君而達卒遇故人曾無舊言吾鄙之與小人處而不能親賢吾殆之子路見於孔子孔子曰智者若何仁者若何子路對曰智者使人知己仁者使人愛己子曰可謂士矣子路出子貢入問亦如之子貢對曰智者知人仁者愛人子曰可謂士矣子貢出顏回入問亦如之對曰智者自知仁者自愛子曰可謂士君子矣子貢問於孔子曰子從父命孝乎臣從君命貞乎奚疑焉孔子曰鄙哉賜汝不識也昔者明王萬乘之國有爭臣七人則主無過舉千乘之國有爭臣五人則社稷不危也百乘之家有爭臣三人則祿位不替父有爭子不陷無禮士有爭友不行不義故子從父命奚詎為孝臣從君命奚詎為貞夫能審其所從之謂孝之謂貞矣子路盛服見於孔子子曰由是倨倨者何也夫江始出於岷山其源可以濫觴及其至於江津不舫舟不避風則不可以涉非惟下流水多邪今爾衣服既盛顏色充盈天下且孰肯以非告汝乎子路趨而出改服而入蓋自若也子曰由志之吾告汝奮於言者華奮於行者伐夫色智而有能者小人也故君子知之曰知之言之要也不能曰不能行之至也言要則智行至則仁既仁且智夫惡不足哉子路問於孔子曰有人於此披褐而懷玉何如子曰國無道隱之可也國有道則袞冕而執玉
