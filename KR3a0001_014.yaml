body:
  text: 辨政第十四子貢問於孔子曰昔者齊君問政於夫子夫子曰政在節財魯君問政於夫子夫子曰政在諭臣葉公問政於夫子夫子曰政在悅近而來遠三者之問一也而夫子應之不同然政在異端乎孔子曰各因其事也齊君為國奢乎臺榭淫于苑囿五官伎樂不解於時一旦而賜人以千乘之家者三故曰政在節財魯君有臣三人內比周以愚其君外距諸侯之賓以蔽其明故曰政在諭臣夫荊之地廣而都狹民有離心莫安其居故曰政在悅近而來遠此三者所以為政殊矣詩云喪亂蔑資曾不惠我師此傷奢侈不節以為亂者也又曰匪其止共惟王之卭此傷姦臣蔽主以為亂者也又曰亂離瘼矣奚其適歸此傷離散以為亂者也察此三者政之所欲豈同乎哉孔子曰忠臣之諫君有五義焉一曰譎諫二曰戇諫三曰降諫四曰直諫五曰風諫唯度主而行之吾其從諷諫乎子曰夫道不可不貴也中行文子倍道失義以亡其國而能禮賢以活其身聖人轉禍為福此謂是與楚王將遊荊臺司馬子祺諫王怒之令尹子西賀於殿下諫曰今荊臺之觀不可失也王喜拊子西之背曰與子共樂之矣子西步馬十里引轡而止曰臣願言有道王肯聽之乎王曰子其言之子西曰臣聞為人臣而忠其君者爵祿不足以賞也諛其君者刑罰不足以誅也夫子祺者忠臣也而臣者諛臣也願主賞忠而誅諛焉王曰今我聽司馬之諫是獨能禁我耳若後世遊之可也子西曰欲禁後世易耳大王萬歲之後起山陵於荊臺之上則子孫必不忍遊於父祖之墓以為歡樂也王曰善乃還孔子聞之曰至哉子西之諫也入之於千里之上抑之於百世之後者也子貢問於孔子曰夫子之於子産晏子可為至矣敢問二大夫之所為目夫子之所以與之者孔子曰夫子産於民為惠主於學為博物晏子於君為忠臣於行為恭敏故吾皆以兄事之而加愛敬齊有一足之鳥飛習於公朝下止於殿前舒翅而跳齊侯大怪之使使聘魯問孔子孔子曰此鳥名曰商羊水祥也昔童兒有屈其一腳振訊兩眉而跳且謠曰天將大雨商羊鼓儛今齊有之其應至矣急告民趨治溝渠修隄防將有大水為災頃之大霖雨水溢泛諸國傷害民人唯齊有備不敗景公曰聖人之言信而有徵矣孔子謂宓子賤曰子治單父衆悅子何施而得之也子語丘所以為之者對曰不齊之治也父恤其子其子恤諸孤而哀喪紀孔子曰善小節也小民附矣猶未足也曰不齊所父事者三人所兄事者五人所友事者十一人孔子曰父事三人可謂教孝矣兄事五人可以教悌矣友事十一人可以舉善矣中節也中人附矣猶未足也曰此地民有賢於不齊者五人不齊事之而稟度焉皆教不齊之道孔子歎曰其大者乃於此乎有矣昔堯舜聽天下務求賢以自輔夫賢者百福之宗也神明之主也惜乎不齊之所以治者小也子貢為信陽宰將行辭於孔子孔子曰勤之慎之奉天子之時無奪無伐無暴無盜子貢曰賜也少而事君子豈以盜為纍哉孔子曰汝未之詳也夫以賢代賢是謂之奪以不肖代賢是謂之伐緩令急誅是謂之暴取善自與是謂之盜盜非竊財之謂也吾聞之知為吏者奉法以利民不知為吏者枉法以侵民此怨之所由生也治官莫若平臨財莫如廉廉平之守不可改也匿人之善斯謂蔽賢揚人之惡斯為小人內不相訓而外相謗非親睦也言人之善若己有之言人之惡若己受之故君子無所不慎焉子路治蒲三年孔子過之入其境曰善哉由也恭敬以信矣入其邑曰善哉由也忠信而寬矣至庭曰善哉由也明察以斷矣子貢執轡而問曰夫子未見由之政而三稱其善其善可得聞乎孔子曰吾見其政矣入其境田疇盡易草萊甚辟溝洫深治此其恭敬以信故其民盡力也入其邑牆屋完固樹木甚茂此其忠信以寬故其民不偷也至其庭庭甚清間諸下用命此其言明察以斷故其政不擾也以此觀之雖三稱其善庸盡其美矣
