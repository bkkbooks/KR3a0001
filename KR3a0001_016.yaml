body:
  text: 辨物第十六季桓子穿井獲如土缶其中有羊焉使使問於孔子曰吾穿井於費而於井中得一狗何也孔子曰以丘之所聞者羊也丘聞之木石之怪夔蝄蜽水之怪龍罔象土之怪羵羊也吳伐越隳會稽獲巨骨一節專車焉吳子使使來聘於魯且問之孔子命使者曰無以吾命也賓既將事乃發幣於大夫及孔子孔子爵之既徹俎而燕客執骨而問曰敢問骨何如為大孔子曰丘聞之昔禹致群臣於會稽之山防風氏後至禹殺而戮之其骨節專車焉此為大矣客曰敢問誰守為神孔子曰山川之靈足以紀綱天下者其守為神社稷之守為公侯山川之祀者為諸侯皆屬於王者客曰防風何守孔子曰汪芒氏之君守封嵎山者為漆姓在虞夏商為汪芒氏於周為長翟氏今曰大人有客曰人長之極幾何孔子曰焦僥氏長三尺短之至也長者不過十數之極也孔子在陳陳惠公賓之于上館時有隼集于陳侯之庭而死楛矢貫之石砮其長尺有咫惠公使人持隼如孔子館而問焉孔子曰隼之來也遠矣此肅慎氏之矢昔武王克商通道于九夷百蠻使各以其方賄來貢而無忘職業於是肅慎氏貢楛矢石砮其長尺有咫先王欲昭其令德之致遠物也以示後人使永鑒焉故銘其括曰肅慎氏貢楛矢以分大姬配胡公而封諸陳古者分同姓以珍玉所以展親親也分異姓以遠方之職貢所以無忘服也故分陳以肅慎氏貢焉君若使有司求諸故府其可得也公使人求得之金牘如之郯子朝魯魯人問曰少皓氏以鳥名官何也對曰吾祖也我知之昔黃帝以雲紀官故為雲師而雲名炎帝以火共工以水大昊以龍其義一也我高祖少皓摰之立也鳳鳥適至是以紀之於鳥故為鳥師而鳥名自顓頊氏以來不能紀遠乃紀於近為民師而命以民事則不能故也孔子聞之遂見郯子而學焉既而告人曰吾聞之天子失官學在四夷猶信邾隱公朝于魯子貢觀焉邾子執玉高其容仰定公受玉卑其容俯子貢曰以禮觀之二君者將有死亡焉夫禮生死存亡之體也將左右周旋進退俯仰於是乎取之朝祀喪戎於是乎觀之今正月相朝而皆不度心以亡矣嘉事不體何以能久高仰驕也卑俯替也驕近亂替近疾君為主其先亡乎夏五月公薨又邾子出奔孔子曰賜不幸而言中是賜多言孔子在陳陳侯就之燕焉子遊見行路之人云魯司鐸災及宗廟以告孔子子曰所及者其桓僖之廟陳侯曰何以知之子曰禮祖有功而宗有德故不毀其廟焉今桓僖之親盡矣又功德不足以存其廟而魯不毀是以天災加之三日魯使至問焉則桓僖也陳侯謂子貢曰吾乃今知聖人之可貴對曰君之知之可矣未若專其道而行其化之善也陽虎既奔齊自齊奔晉適趙氏孔子聞之謂子路曰趙氏其世有亂乎子路曰權不在焉豈能為亂孔子曰非汝所知夫陽虎親富而不親仁有寵於季孫又將殺之不剋而奔求容於齊齊人囚之乃亡歸晉是齊魯二國已去其疾趙簡子好利而多信必溺其説而從其謀禍敗所終非一世可知也季康子問於孔子曰今周十二月夏之十月而猶有螽何也孔子對曰丘聞之火伏而後蟄者畢今火猶西流司歷過也季康子曰所失者幾月也孔子曰於夏十月火既沒矣今火見再失閏也吳王夫差將與哀公見晉侯子服景伯對使者曰王合諸侯則伯率侯牧以見於王伯合諸侯則侯率子男以見於伯今諸侯會而君與寡君見晉君則晉成為伯矣且執事以伯召諸侯而以侯終之何利之有焉吳人乃止既而悔之遂囚景伯伯謂太宰嚭曰魯將以十月上辛有事于上帝先王季辛而畢何也世有職焉自襄已來未之改也若其不會祝宗將曰吳實然嚭言於夫差歸之子貢聞之見於孔子曰子服氏之子拙於説矣以實獲囚以詐得免孔子曰吳子為夷德可欺而不可以實是聽者之蔽非説者之拙叔孫氏之車士曰子鉏商採薪於大野獲麟焉折其前左足載以歸叔孫以為不祥棄之於郭外使人告孔子曰有麇而角者何也孔子往觀之曰麟也胡為來哉胡為來哉反袂拭面涕泣沾襟叔孫聞之然後取之子貢問曰夫子何泣爾孔子曰麟之至為明王也出非其時而見害吾是以傷焉
