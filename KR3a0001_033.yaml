body:
  text: 冠頌第三十三邾隱公既即位將冠使大夫因孟懿子問禮於孔子子曰其禮如世子之冠冠於阼者以著代也醮於客位加其有成也三加彌尊導喻其志也冠而字之敬其名也雖天子之元子猶士也其禮無變天下無生而貴者故也行冠事必於祖廟以祼享之禮以將之以金石之樂節也所以自卑而尊先祖示不敢擅懿子曰天子未冠即位長亦冠也孔子曰古者王世子雖幼其即位則尊為人君人君治成人之事者何冠之有懿子曰然則諸侯之冠異天子與孔子曰君薨而世子主喪是亦冠也已人君無所殊也懿子曰今邾君之冠非禮也孔子曰諸侯之有冠禮也夏之末造也有自來矣今無譏焉天子冠者武王崩成王年十有三而嗣立周公居冢宰攝政以治天下明年夏六月既葬冠成王而朝于祖以見諸侯示有君也周公命祝雍作頌曰祝王達而未幼祝雍辭曰使王近於民遠於年嗇於時惠於財親賢而任能其頌曰令月吉日王始加元服去王幼志心袞職欽若昊天六合是式率爾祖考永永無極此周公之制也懿子曰諸侯之冠其所以為賓主何也孔子曰公冠則以卿為賓無介公自為主迎賓揖升自阼立于席北其醴也則如士饗之以三獻之禮既醴降自阼諸侯非公而自為主者其所以異皆降自西階玄端與皮辨異朝服素畢公冠四加玄冕祭其酬幣于賓則束帛乘馬王太子庶子之冠擬焉皆天子自為主其禮與士無變饗食賓也皆同懿子曰始冠必加緇布之冠何也孔子曰示不亡古太古冠布齊則緇之其緌也吾未之聞也今則冠而幣之可也懿子曰三王之冠其異何也孔子曰周辨殷冔夏收一也三王共皮辨素績委貌周道也章甫殷道也毋追夏后氏之道
