body:
  text: 七十二弟子解第三十八顏回魯人字子淵少孔子三十歲年二十九而髮白三十一早死孔子曰自吾有回門人日益回以德行著名孔子稱其仁焉閔損魯人字子騫少孔子五十歲以德行著名孔子稱其孝焉冉耕魯人字伯牛以德著名有惡疾孔子曰命也夫斯人也而有斯疾命也夫冉雍字仲弓伯牛之宗族生於不肖之父以德行著名宰予字子我魯人有口才以言語著名仕齊為臨蕢大夫與田常為亂夷其三族孔子恥之曰不在利病其在宰予端木賜字子貢衛人少孔子三十一歲有口才著名孔子每詘其辯家富累千金常結駟連騎以造原憲憲居蒿廬蓬戶之中與之言先王之義原憲衣弊衣冠并日蔬食衎然有自得之志子貢曰甚矣子如何之病也原憲曰吾聞無財者謂之貧學道而不能行者謂之病吾貧也非病也子貢慚終身恥其言之過也子貢好販與時轉貨歷相魯衛而終齊冉求字子有仲弓之宗族少孔子二十九歲有才藝以政事著名仕為季氏宰進則理其官職退則受教聖師為性多謙退故子曰求也退故進之仲由弁人字子路一字季路少孔子九歲有勇力才藝以政事著名為人果烈而剛直性鄙而不達於變通仕衛為大夫遇蒯與其子輒爭國子路遂死輒難孔子痛之曰自吾有由而惡言不入於耳言偃魯人字子游少孔子三十五歲時習於禮以文學著名仕為武城宰嘗從孔子適衛與將軍之子蘭相善使之受學於夫子卜商衛人字子夏少孔子四十四歲習於詩能通其義以文學著名為人性不弘好論精微時人無以尚之嘗返衛見讀史志者云晉師伐秦三豕渡河子夏曰非也己亥耳讀史志曰問諸晉史果曰己亥於是衛以子夏為聖孔子卒後教於西河之上魏文侯師事之而諮國政焉顓孫師陳人字子張少孔子四十八歲為人有容貌資質寬沖博接從容自務居不務立於仁義之行孔子門人友之而弗敬曾參南武城人字子與少孔子四十六歲志存孝道故孔子因之以作孝經齊嘗聘欲以為卿而不就曰吾父母老食人之祿則憂人之事故吾不忍遠親而為人役參後母遇之無恩而供養不衰及其妻以藜烝不熟因出之人曰非七出也荅曰藜烝小物耳吾欲使熟而不用吾命況大事乎遂出之終身不娶妻其子元請焉告其子曰高宗以後妻殺孝己尹吉甫以後妻放伯奇吾上不及高宗中不比吉甫庸知其得免於非乎澹臺滅明武城人字子羽少孔子四十九歲有君子之資孔子嘗以容貌望其才其才不充孔子之望然其為人公正無私以取與去就以諾為名仕魯為大夫高柴齊人高氏之別族字子羔少孔子四十歲長不過六尺狀貌甚惡為人篤孝而有法正少居魯見知名於孔子之門仕為武城宰密不齊魯人字子賤少孔子四十歲仕為單父宰有才智仁愛百姓不忍欺孔子美之樊須魯人字子遲少孔子四十六歲弱仕於季氏有若魯人字子有少孔子三十六歲為人強識好古道公西赤魯人字子華少孔子四十二歲束帶立於朝閑賓主之儀原憲宋人字子思少孔子三十六歲清淨守節貧而樂道孔子為魯司寇原憲嘗為孔子宰孔子卒後原憲退隱居于衛公冶長魯人字子長為人能忍恥孔子以女妻之南宮韜魯人字子容以智自將世清不廢世濁不污孔子以兄子妻之公析哀齊人字季沉鄙天下多仕於大夫家者是故未嘗屈節人臣孔子特歎貴之曾點曾參父字子晳疾時禮教不行欲修之孔子善焉論語所謂浴乎沂風乎舞雩之下顏由顏回父字季路孔子始教學於閭里而受學少孔子六歲商瞿魯人字子木少孔子二十九歲特好易孔子傳之志焉漆雕開蔡人字子若少孔子十一歲習尚書不樂仕孔子曰子之齒可以仕矣時將過子若報其書曰吾斯之未能信孔子悅焉公良孺陳人字子正賢而有勇孔子周行常以家車五乘從秦商魯人字不慈少孔子四歲其父堇父與孔子父叔梁紇俱以力聞顏刻魯人字子驕少孔子五十歲孔子適衛子驕為僕衛靈公與夫人南子同車出而令宦者雍渠參乘使孔子為次乘遊過市孔子恥之顏刻曰夫子何恥之孔子曰詩云覯爾新婚以慰我心乃歎曰吾未見好德如好色者也司馬耕宋人字子牛牛為性躁好言語見兄桓魋行惡牛常憂之巫馬施陳人字子期少孔子三十歲孔子將近行命從者皆持蓋已而果雨巫馬期問曰旦無雲既日出而夫子命持雨具敢問何以知之孔子曰昨暮月宿于畢詩不云乎月離於畢俾滂沱矣以此知之梁鱣齊人字叔魚少孔子三十九歲年三十未有子欲出其妻商瞿謂曰子未也昔吾年三十八無子吾母為吾更取室夫子使吾之齊母欲請留吾夫子曰無憂也瞿過四十當有五丈夫今果然吾恐子自晚生耳未必妻之過從之二年而有子琴牢衛人字子開一字張與宗魯友聞宗魯死欲往弔焉孔子弗許曰非義也冉孺魯人字子魚少孔子五十歲顏幸魯人字子柳少孔子四十六歲伯虔字揩少孔子五十歲公孫龍衛人字子石少孔子五十三歲曹卹少孔子五十歲陳亢陳人字子元一字子禽少孔子四十歲叔仲會魯人字子期少孔子五十歲與孔璇年相比每孺子之執筆記事於夫子二人迭侍左右孟武伯見孔子而問曰此二孺子之幼也於學豈能識於壯哉孔子曰然少成則若性也習慣若自然也秦祖字子南奚箴字子楷公祖玆字子之廉潔字子曹公西與字子上宰父黑字子索公西減字子尚穰駟赤字子從冉季字子產薛邦字子從石處字子里懸亶字子象左郢字子行狄黑字哲之商澤字子秀任不齊字子選榮祈字子祺顏噲字子聲原抗字子藉公賓字子仲秦非字子之漆雕從字子文燕伋字子思公夏守字子乘勾井疆步叔乘字子車右作蜀字子明邽巽字子歛施之常字子恒申繢字子周樂欬字子聲顏之僕字子叔孔忠字子蔑漆雕哆字子歛懸成字子橫顏相字子襄
