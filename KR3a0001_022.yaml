body:
  text: 困誓第二十二子貢問於孔子曰賜倦於學困於道矣願息於事君可乎孔子曰詩云溫恭朝夕執事有恪事君之難也焉可息哉曰然則賜願息於事親孔子曰詩云孝子不匱永錫爾類事親之難也焉可以息哉曰然則賜請願息於妻子孔子曰詩云刑于寡妻至于兄弟以御于家邦妻子之難也焉可以息哉曰然則賜願息於朋友孔子曰詩云朋友攸攝攝以威儀朋友之難也焉可以息哉曰然則賜願息於耕矣孔子曰詩云晝爾于茅宵爾索綯亟其乘屋其始播百穀耕之難也焉可以息哉曰然則賜將無所息者也孔子曰有焉自望其廣則睪如也視其高則填如也察其從則隔如也此其所以息也矣子貢曰大哉乎死也君子息焉小人休焉大哉乎死也孔子自衛將入晉至河聞趙簡子殺竇犨鳴犢及舜華乃臨河而歎曰美哉水洋洋乎丘之不濟此命也夫子貢趨而進曰敢問何謂也孔子曰竇犨鳴犢舜華晉之賢大夫也趙簡子未得志之時須此二人而後從政及其已得志也而殺之丘聞之刳胎殺夭則麒麟不至其郊竭澤而漁則蛟龍不處其淵覆巢破卵則鳳凰不翔其邑何則君子違傷其類者也鳥獸之於不義尚知避之況於人乎遂還息於鄒作槃琴以哀之子路問於孔子曰有人於此夙興夜寐耕藝樹藝手足胼胝以養其親然而名不稱孝何也孔子曰意者身不敬與辭不順與色不悅與古之人有言曰人與己與不汝欺今盡力養親而無三者之闕何謂無孝之名乎孔子曰由汝志之吾語汝雖有國士之力而不能自舉其身非力之少也勢不可也夫內行不修身之罪也行修而名不彰友之罪也行修而名自立故君子入則篤行出則交賢何為無孝之名乎孔子遭厄於陳蔡之間絶糧七日弟子餒病孔子絃歌子路入見曰夫子之歌禮乎孔子弗應曲終而曰由來吾語汝君子好樂為無驕也小人好樂為無懾也其誰知之子不我知而從我者乎子路悅援戚而舞三終而出明日免於厄子貢執轡曰二三子從夫子而遭此難也其弗忘矣孔子曰善惡何也夫陳蔡之間丘之幸也二三子從丘者皆幸也吾聞之君不困不成王烈士不困行不彰庸知其非激憤厲志之始於是乎在孔子之宋匡人簡子以甲士圍之子路怒奮戟將與戰孔子止之曰惡有修仁義而不免俗者乎夫詩書之不講禮樂之不習是丘之過也若以述先王好古法而為咎者則非丘之罪也命夫歌豫和汝子路彈琴而歌孔子和之曲三終匡人解甲而罷孔子曰不觀高崖何以知巔墜之患不臨深泉何以知沒溺之患不觀巨海何以知風波之患失之者其不在此乎士慎此三者則無纍於身矣子貢問於孔子曰賜既為人下矣而未知為人下之道敢問之子曰為人下者其猶土乎汩之深則出泉樹其壤則百穀滋焉草木植焉禽獸育焉生則出焉死則入焉多其功而不意恢其志而無不容為人下者以此也孔子適鄭與弟子相失獨立東郭門外或人謂子貢曰東門外有一人焉其長九尺有六寸河目隆顙其頭似堯其頸似皋繇其肩似子産然自腰以下不及禹者三寸纍然如喪家之狗子貢以告孔子欣然而歎曰形狀末也如喪家之狗然乎哉然乎哉孔子適衛路出于蒲會公叔氏以蒲叛衛而止之孔子弟子有公良孺者為人賢長有勇力以私車五乘從夫子行喟然曰昔吾從夫子遇難于匡又伐樹於宋今又遇困於此命也夫與其見夫子仍遇於難寧我鬭而死挺劍而合衆將與之戰蒲人懼曰苟無適衛吾則出子乃盟孔子而出之東門孔子遂適衛子貢曰盟可負乎孔子曰要我以盟非義也衛侯聞孔子之來喜而於郊迎之問伐蒲對曰可哉公曰吾大夫以為蒲者衛之所以待晉楚也伐之無乃不可乎孔子曰其男子有死之志吾之所伐者不過四五人矣公曰善卒不果伐他日靈公又與夫子語見飛鴈過而仰視之色不悅孔子乃逝衛蘧伯玉賢而靈公不用彌子瑕不肖反任之史魚驟諫而不從史魚病將卒命其子曰吾在衛朝不能進蘧伯玉退彌子瑕是吾為臣不能正君也生而不能正君則死無以成禮我死汝置尸牖下於我畢矣其子從之靈公弔焉怪而問焉其子以其父言告公公愕然失容曰是寡人之過也於是命之殯於客位進蘧伯玉而用之退彌子瑕而遠之孔子聞之曰古之列諫之者死則已矣未有若史魚死而尸諫忠感其君者也可不謂直乎
