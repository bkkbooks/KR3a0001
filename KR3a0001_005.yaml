body:
  text: 儒行解第五孔子在衛冉求言於季孫曰國有聖人而不能用欲以求治是猶卻步而欲求及前人不可得已今孔子在衛將用之己有才而以資鄰國難以言智也請以重幣延之季孫以告哀公公從之孔子既至舍哀公館焉公自阼階孔子賓階升堂立侍公曰夫子之服其儒服與孔子對曰丘少居魯衣逢掖之衣長居宋冠章甫之冠丘聞之君子之學也博其服以鄉丘未知其為儒服也公曰敢問儒行孔子曰略言之則不能終其物悉數之則留更僕未可以對哀公命席孔子侍坐曰儒有席上之珍以待聘夙夜強學以待問懷忠信以待舉力行以待取其自立有如此者儒有衣冠中動作慎大讓如慢小讓如僞大則如威小則如愧難進而易退也粥粥若無能也其容貌有如此者儒有居處齊難其坐起恭敬言必誠信行必中正道塗不爭險易之利冬夏不爭陰陽之和愛其死以有待也養其身以有為也其備預有如此者儒有不寶金玉而忠信以為寶不祈土地而仁義以為土地不求多積而多文以為富難得而易祿也易祿而難畜也非時不見不亦難得乎非義不合不亦難畜乎先勞而後祿不亦易祿乎其近人情有如此者儒有委之以貨財而不貪淹之以樂好而不淫劫之以衆而不懼阻之以兵而不攝見利不虧其義見死不更其守鷙蟲攫搏不程其勇引重鼎不程其力往者不悔來者不豫過言不再流言不極不斷其威不習其謀其特立有如此者儒有可親而不可劫可近而不可迫可殺而不可辱其居處不過其飲食不溽其過失可微辨而不可面數也其剛毅有如此者儒有忠信以為甲胄禮義以為干櫓戴仁而行抱義而處雖有暴政不更其所其自立有如此者儒有一畝之宮環堵之室篳門圭窬蓬戶甕牖易衣而出并日而食上答之不敢以疑上不答不敢以諂其仕有如此者儒有今人以居古人以稽今世行之後世以為楷若不逄世上所不援下所不推詭諂之民有比黨而危之者身可危也其志不可奪也雖危起居猶竟信其志乃不忘百姓之病也其憂思有如此者儒有博學而不窮篤行而不倦幽居而不淫上通而不困禮必以和優游以法慕賢而容衆毀方而瓦合其寬裕有如此者儒有內稱不辟親外舉不辟怨程功積事不求厚祿推賢達能不望其報君得其志民賴其德苟利國家不求富貴其舉賢援能有如此者儒有澡身浴德陳言而伏言而正之上不知也默而翹之又不為急也不臨深而為高不加少而為多世治不輕世亂不沮同己不與異己不非其特立獨行有如此者儒有上不臣天子下不事諸侯慎靜尚寬砥礪廉隅強毅以與人博學以知服近文章雖以分國視如錙銖弗肯臣仕其規為有如此者儒有合志同方營道同術竝立則樂相下不厭久別則聞流言不信義同而進不同而退其交有如此者夫溫良者仁之本也慎敬者仁之地也寬裕者仁之作也遜接者仁之能也禮節者仁之貌也言談者仁之文也歌樂者仁之和也分散者仁之施也儒皆兼而有之猶且不敢言仁也其尊讓有如此者儒有不隕穫於貧賤不充詘於富貴不溷君王不纍長上不閔有司故曰儒今人之名儒也妄常以儒相詬疾哀公既聞此言也言加信行加敬曰終歿吾世弗敢復以儒為戲矣
