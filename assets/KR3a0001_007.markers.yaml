  - {type: variant, offset: 1248, length: 3, content: 殷王帝, WYG: 不為祭器今皆不假故非禮是為亂國故仕於公曰臣仕於家曰僕三年之喪與新有㛰者朞不使也以衰裳入朝與家僕雜居齊齒非禮也是謂臣典君共國天子有田以處其子孫諸侯有國以處其子孫大夫有采以處其子孫是謂制度天子適諸侯必舍其宗廟而不以禮籍入所謂臨諸侯將舍宗廟先告其鬼神以將入止也是謂天子壞法亂紀諸侯非問疾弔喪而入諸臣之家是謂君臣為謔戲謔故夫禮者君之柄柄亦秉持所以别嫌明㣲儐鬼神考制度别仁義立政教安君臣上下也故政不正則君位危君位危則大臣倍小臣竊刑肅而俗敝則法無常法無常則禮無别禮無别則士不事民不歸是謂疵國是故夫政者君之所以藏身言所藏於身不可以假人必本之天郊以降命郊天以下教令所謂則天之明命教於社之謂效地所謂因地之利降於祖廟之謂仁義奉祖廟彌近彌親彌逺彌尊仁義之道也降於山川之謂興作下命所謂祭山川者謂其興造雲雨作生萬物也降於五祀之謂制度下命使事五祀者以其能為人事之制度此聖人所以藏身固也藏身以此則固聖人參於天地並於鬼神以治政也處其所存禮之序也翫其所樂民之治也言聖人常所存處者禮之次序常翫樂者民之治安也天生時地生財人其父生而師教之四者君以政用之所以立於無過之地時及財天地之所生而師以教之君以政用之而已故常立於無過之地君者人所則非則人者也人所養非養人者也人所事非事人者也夫君者明人則有過為君徒欲明人而已則過謬也養人則不足時君失政不能為所養事人則失位故百姓則君以自治養君以自安事君以自顯是以禮達而分定人皆愛其死而患其生人皆愛惜其死而患其生之無禮也是故用人之智去其詐用人之勇去其怒用人之仁去其貪國有患君死社稷謂之義大夫死宗廟謂之變大夫有去就之義未必常死宗廟其死宗廟者以權變為也凡聖人能以天下為一家以中國為一人非意之非以意貪之必有數之也必知其情從於其義明於其利達於其患然後能為之何謂人情喜怒哀懼愛惡欲七者弗學而能何謂人義父慈子孝兄良弟悌夫義婦聴長恵幼順君仁臣忠十者謂之人義講信修睦謂之人利爭奪相殺謂之人患聖人之所以治人七情修十義講信修睦尚辭譲去爭奪舍禮何以治之飲食男女人之大欲存焉死亡貧苦人之大惡存焉欲惡者人之大端人藏其心不可測度美惡皆在其心不見其色欲以一窮之舍禮何以哉故人者天地之徳隂陽之交鬼神之會五行之秀天秉陽垂日星地秉隂載山川播五行於四時和四氣而後月生月生而後四時行焉布五行和四時而後月生焉是以三五而盈三五而缺月隂道不常滿故十五日滿十五日缺五行之動共相竭也竭盡也水用事盡則木用事五行用事更相盡也五行四氣十二月還相為本用事者為本也五聲六律十二管還相為宫五聲者宫商角徴羽也管十二月也一月一管陽律隂吕其用事者為宫也五味六和十二食還相為質五味酸苦鹹辛甘六和者和之各有宜者春多酸秋多}
