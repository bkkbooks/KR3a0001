  - {type: variant, offset: 1246, length: 1, content: 昔, krp: 天藏之也不得賜而是謂脅君其君迫於大夫具官祭器不假聲樂皆具非禮也祭器今皆不假故大夫無田}
  - {type: variant, offset: 1248, length: 3, content: 殷王帝, SBCK: 不為禮非是為亂國故仕於公曰臣仕於家曰僕三年之喪與新有㛰者朞不使也以衰嘗入朝與家僕雜居齊齒非禮也是謂臣與君共國天子有田以處其子孫諸侯有國以處其子孫大夫有采以處其子孫是謂制度天子適諸侯必舍其宗廟而不禮籍入告其鬼神以將入止也所謂臨諸侯將舍宗廟先是謂天子壞法亂紀諸侯非問疾弔喪而入諸臣之家是謂君臣為謔戯謔夫禮者君之柄秉持柄亦所以别嫌明㣲儐􅀑神考制度列仁義立政事之制度其能爲人此聖人所以藏身之固也以此藏身固則聖人參於天地並於􅀑神以治政也處其所存禮之序也翫其所樂民之治也聖言常所玩樂者民之治安也人常所存處者禮之次序天生時地生財人其父生而師教之四者君以政用之所以立於無過之地而師以教之君以政用時及財天地之所以生於無過之地也之而已故常立君者人所明非明人者也人所養非養人者也人所事非事人者也夫君者明人則有過而已則過謬也爲君徒欲明人故養人則不足能為民所養時君失政不事人則失位故百姓明君以自治養君以自安事君以自顯是以禮達而分定人皆愛其死而患其生患其生之無禮也人皆愛惜其死而是故用人之智去其詐用人之勇去其怒用人之仁去其貪國有患君死社稷爲之義大夫死宗廟爲之變廟者其死宗廟者權變為也大夫有去就之義未必常死宗凡聖人能以天下為一家以中國為一人非意之以非有致之也意貪之必必知其情從於其義明於其利達於其患然後為之何謂人情喜怒哀懼愛惡欲七者弗學而能何謂人義父慈子孝兄良弟悌夫義婦聴長恵㓜順君仁臣忠十者謂之人義講信修睦謂之人利爭奪相殺謂之人患聖人之所以治人七情脩十義講信脩睦尚辭譲去爭奪舍禮何以治之飲食男女人之大欲存焉死亡貧苦人之大惡存焉欲惡者人之大端人藏其心不可測度美惡皆在其心不見其色欲一以窮之舍禮何以哉故人者天地之徳隂陽之交鬼神之會五行之秀天秉陽垂日星地秉隂載於山川播五行於四時和四氣而後月生五行和四時四氣而後月生而後四時行焉布焉月生是以三五而盈三五而缺常滿故十月隂道不五日缺也五日滿十五行之動共相竭也用事盡則竭盡也水事更相盡也木用事五行用五行四氣十二月還相為本為本也用事者五聲五律十二管還相為宫聲五月一管陽律隂吕其用事為宫也者宫商角徴羽也管十二月也一五味六和十二食還相為質和者和之各有宜者五味酸苦酸辛甘六二食者十二月之食質本也春多酸秋多}
