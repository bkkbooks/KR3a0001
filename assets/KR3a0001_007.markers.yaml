  - {type: variant, offset: 1253, length: 1, content: 世, SBCK: 屬是也十五色六章十二衣還相為主曰水無當於五色五色不五色者青赤白黑黃學記待水而章也得不彰五色故人者天地之心如五藏之於天地間靈心五藏最聖也}
