  - {type: variant, offset: 1340, length: 9, content: 桑榖于朝七日大拱占, WYG: 也君子以厚小人以薄聖王修義之柄禮之序以治人情人情者聖王之田也修禮以耕之陳義以種之講學以耨之耨除穢也本仁以聚之播樂以安之故禮者義之實也協諸義而協則禮雖先王未之有可以義起焉義者藝之分仁之節藝理協諸藝講於仁得}
