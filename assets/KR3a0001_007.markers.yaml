  - {type: variant, offset: 869, length: 0, content: '', WYG: 妄行者生於不足不足生於無度無度則小者偷惰大者侈靡各不知節是以上有制度則民知所止民知所止則不犯故雖有奸邪賊盜靡法妄行之獄而無陷刑之民不孝者生於不仁不仁者生於喪祭之禮也明喪祭之禮所以教仁愛也能致仁愛則服喪思慕祭祀不懈人子饋養之道言孝子奉祭祀不敢懈與生時饋養之道同之喪祭之禮明則民孝矣故雖有不孝之獄而無陷刑之民殺上者生於不義義所以别貴賤明尊卑也貴賤有别尊卑有序則民莫不尊上而敬長朝聘之禮者所以明義也義必明則民不犯故雖有殺上之獄而無陷民之刑鬬變者生於相陵相陵者生於長幼無序而遺敬讓遺忘鄉飲酒之禮者所以明長幼之序而崇敬讓也長幼必序民懷敬譲故雖有變鬬之獄而無陷刑之民淫亂者生於男女無别男女無别則夫婦失義婚姻聘享者所以别男女明夫婦之義也男女旣别夫婦既明故雖有婬亂之獄而無陷刑之民此五者刑罰之所從生各有源焉不豫塞其源而輒繩之以刑是謂為民設穽而陷之也刑罰之源生於嗜慾不節夫禮度者所以禦民之嗜慾而明好惡順天道禮度既陳五教畢修而民猶或未化尚必明其法典以申固之尚猶也申令固其教也其犯姦邪靡法妄行之獄者則飭制量之度有犯不孝之獄者則飭喪祭之禮有犯殺上之獄者則飭朝覲之禮有犯鬬變之獄者則飭鄉飲酒之禮有犯媱亂之獄者則飭婚聘之禮三皇五帝之所化民者如此雖有五刑之用不亦可乎}
