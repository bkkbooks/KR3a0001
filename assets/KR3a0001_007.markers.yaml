  - {type: variant, offset: 1, length: 2, content: 儀解, WYG: 者足以正身安國矣彼國安而天下安矣故曰吾觀於鄉而知王道之易易也子貢觀於蜡蜡索也歳十有二月索羣神而祀之今之臘也孔子曰賜也樂乎對曰一國之人皆若狂言醉酒也賜未知其為樂也孔子曰百日之勞一日之樂一日之澤非爾所知也古民皆勤苦稼穡有百日之勞喻久也今一日使之飲酒燕樂之是君之恩澤也張而不弛文武弗能弛而不張文武弗為一張一弛文武之道也郊問}
