  - {type: variant, offset: 1359, length: 0, content: '', SBCK: 以仁猶耨而不穫合之以仁而不安之以樂猶穫而弗食安之以樂而不達於順猶食而不肥四體旣正膚革充盈人之肥也父子篤兄弟睦夫婦和家之肥也大臣法小臣廉官職相序君臣相正國之肥也天子以徳為車以樂為御諸侯以禮相與大夫以法相序士以信相考百姓以睦相守天下之肥也是謂大順順者所以養}
  - {type: page-break, offset: 1359, content: '', id: KR3a0001_SBCK_007-20b}
  - {type: variant, offset: 1359, length: 0, content: '', WYG: 之以仁猶耨而不穫合之以仁而不安之以樂猶穫而不食安之以樂而不達於順猶食而不肥四體旣正膚革充盈人之肥也父子篤兄弟睦夫婦和家之肥也大臣法而小臣廉官職相序君臣相正國之肥也天子以徳為車以樂為御諸侯以禮相與大夫以法相序士以信相考百姓以睦相守天下之肥也是謂大順大順者所以養}
