  - {type: line-break, offset: 5, content: '', id: WYG_001-19b.05}
  - {type: variant, offset: 5, length: 1, content: 哀, SBCK: 觀鄉射第二十八孔子觀於鄉射喟然歎曰射之以禮樂也何以射何以聴修身而發而不失正鵠者其唯賢者乎射者也正鵠所若夫不肖之人則將安能以求飲詩云發彼有的以祈爾爵實的飲爾爵也勝者飲不勝者也祈求也言發中的以求祈求也求所中以辭爵辭爵也中陟仲反飲彼則已不飲故曰以酒者所以養老所以養病也求中以辭爵辭其養也是故士使之射而弗能則辭以病懸弧之義射事也而今不能射唯病可以為辭也弧弓也男子生則懸弧於其門明必有於是退而與門人習射於矍相之圃蓋觀者如堵墙焉射至於司馬使子路執弓矢出列延謂射之者曰至使子路出延射子路為司馬故射奔軍之將亡國之大夫與為人後者不得入故曰與為人後世也人已有後而又為人後其餘皆入蓋去者半又使公罔之裘序點􅀭觶而語曰射鄉先行觶觶支義切飲酒故二人􅀭㓜壯孝悌耆老好禮報切好呼不從流俗修身以俟死者在此位蓋去者半序􅀧揚觶而語曰好學不倦好禮不變耄期稱道而不亂者此位耄言雖老而八十九十曰而不亂也能稱解道蓋僅有存焉射旣闋子路進曰由與二三子者之爲司馬何如孔子曰能用命矣孔子曰吾觀於鄉而知王道之易易也以易反豉主人親速賔及介而衆賔從之召速至於正門之外主人拜賔及介而衆自入貴賤之義别矣列反别彼三揖至於階三讓以賔升拜至獻酬辭譲之節繁及介升則省矣至于衆賔升而受爵坐祭立飲不酢而降殺之義辯矣戒反殺所工入升歌三終主人獻賔入三終主又獻之是也歌鹿鳴四牡皇皇記曰主人獻之於義不得為賔也下句笙人乃獻之是也者華三篇終主笙入三終主人又獻之南吹篇終主人獻也陔白華華黍三間歌三終歌南有嘉魚笙乃歌魚麗由庚臺笙由餘者也崇丘歌南山有合樂三闋歌周南召南三合笙聲同其音也篇工告樂備而遂出遂出自此至去不復樂正旣告備而降言也升一人􅀭觶乃立司正焉使一人􅀭觶乃賔將欲去故復儀請安賔也立司正主威知其能和樂而不流洺樂音賔酬主人主人酬介介酬衆賔賔少長以齒照切少詩終於沃洗者焉知其能弟長而無遺矣丈反長丁降脱􅋰升座修爵無筭飲酒之節旰不廢朝暮不廢夕罷旰古旦反旰晨飲早哺廢賔出主人拜送節文終遂焉知其能安燕而不亂也貴賤旣明降殺旣辯和樂而不流弟長而無遺安燕而不亂此五者足以正身安國矣彼國安而天下安矣故曰吾觀於鄉而知王道之易易也豉反易以子貢觀於蜡而祀之今之臘也蜡助駕蜡索也歳十有二月索羣神反孔子曰賜也樂乎洛樂音對曰一國之人皆若狂亂也言醉賜未知其爲樂也孔子曰百日之勞一日之樂一日之澤非爾所知也一日使之飲酒焉樂之是君之恩澤也古民皆勤苦稼穡有百日之勞喻久也今張而不弛文武弗能弛而不張文武弗爲一張一弛文武之道也氏反弛施郊問第二十九定}
