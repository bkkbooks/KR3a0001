  - {type: variant, offset: 1246, length: 1, content: 昔, WYG: 天子諸侯大夫冕弁復歸設奠服此謂不得賜而藏之也是謂脅君迫於其君大夫具官祭器不假聲樂皆具非禮也大夫無田}
