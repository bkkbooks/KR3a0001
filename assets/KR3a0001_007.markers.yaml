  - {type: variant, offset: 1092, length: 2, content: 惡惡, krp: 情立君臣之義以權之意論輕重之序慎測淺深之量以别之列反别彼悉其聰明正其忠愛以盡之大司寇正刑明辟以察獄獄必三訊焉曰訊群吏三曰一曰訊群臣二民也訊萬有指無簡則不聴也其誠者不論以簡誠也有意無也爲罪附從輕赦從重赦人之罪以重為比附人之罪以輕為比疑獄則泛與衆共之疑則赦之皆以小大之比成也志反比毗是故爵人必於朝與衆共之也刑人必於市與衆棄之也古者公家不畜刑人大夫弗養也士遇之塗以弗與之言屏諸四方唯其所之不及與政弗欲生之也仲弓曰聴獄獄之成成何官孔子曰成獄成於吏吏以獄成告於正吏正獄吏獄官長官正旣聴之乃告大司寇聴之乃奉於王王命三公卿士叅聴棘木之下九棘孤卿外朝法左子男位焉面三槐三公位大夫位焉右九棘公侯伯然後乃以獄之成疑于王王三宥之以聴命罪雖以定猶君王尚寛宥然後刑之者也三宥之不可得輕而制刑焉所以重之也仲弓曰其禁何禁孔子曰巧言破律法令巧賣也者遁名改作物名也變言與執左}
  - {type: variant, offset: 1095, length: 2, content: 至甚, SBCK: 與亂政者殺亂也左道作淫聲亂人之聲淫逆也惑造異服常見非所設伎奇器以蕩上心者殺懼人心之器蕩動怪異之伎可以􅅭行偽而堅也行下孟反行詐偽而守之堅言詐而辯學非而博順非而澤而滑澤順其非以惑衆者殺假於􅀑神時日卜筮以疑衆者殺此四誅者不以聴木之下不聴棘仲弓曰其禁盡於此而已孔子曰此其急者其餘禁者十有四焉命服命車不粥於市余六反粥賣粥珪璋璧琮不粥於市宗廟之器不粥於市兵車旍旗不粥於市犧牲秬鬯不粥於市戎器兵甲不粥於市用器不中度仲反中陟不粥於市布帛精麤不中數廣狹不中量不粥於市姦色亂正色不粥於市文錦珠玉之器雕飾靡麗不粥於市衣服飲食不粥於市非侈必偽賣成衣服食所以厲取也故禁之禁賣熟菓實不時不粥於市五木不中伐不粥於市鳥獸魚鼈不中殺不粥於市凡執此禁以齊衆者不赦過也禮運第三十二孔子為魯司寇與於蜡旣賔事畢之事也畢賔客乃出遊於觀之上所謂象魏者也觀宫門外闕周禮喟然而嘆言偃侍曰夫子何嘆}
