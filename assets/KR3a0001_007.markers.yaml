  - {type: variant, offset: 1232, length: 0, content: '', SBCK: 以鯀非令宋之郊也契是天子之事守也天子以􅂎宋二王之後周公攝政致太平而與天子同是禮也諸侯祭社稷宗廟上下皆奉其典而祝嘏莫敢易其常法是謂大嘉今使祝嘏辭説徒藏於宗祝巫史非禮也辭説之意議也言君臣皆當知是謂幽國於禮幽敝醆斚及尸君非禮也者之後則尸與君不夏}
  - {type: page-break, offset: 1232, content: '', id: KR3a0001_SBCK_007-14b}
  - {type: variant, offset: 1232, length: 0, content: '', WYG: 以鯀非令徳故令把郊禹宋之郊也契是天子之事守也天子以把宋二王之後周公攝政致太平而與天子同是禮也諸侯祭社稷宗廟上下皆奉其典而祝嘏莫敢易其常法是謂大嘉今使祝嘏辭説徒藏於宗祝巫史非禮也言君臣皆當知辭説之意義也是謂幽國幽敝於禮醆斝及尸君非禮也夏}
  - {type: variant, offset: 1232, length: 0, content: '', krp: 以鯀非令宋之郊也契是天子之事守也天子以𣏌宋二王之後周公攝政致太平而與天子同是禮也諸侯祭社稷宗廟上下皆奉其典而祝嘏莫敢易其常法是謂大嘉今使祝嘏辭説徒藏於宗祝巫史非禮也辭説之意議也言君臣皆當知是謂幽國於禮幽敝醆斚及尸君非禮也者之後則尸與君不夏}
