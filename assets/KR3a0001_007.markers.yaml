  - {type: variant, offset: 1322, length: 1, content: 又, WYG: 聖人作則作為則法必以天地為本以隂陽為端以四時為柄日星為紀月以為量鬼神以為徒五行以為質禮義以為器人情以為田四靈以為畜以天地為本故物可舉天地為本則萬物包在於}
  - {type: page-break, offset: 1322, content: '', id: KR3a0001_WYG_007-16a, image: WYG0695/WYG0695-0074a.png}
  - {type: variant, offset: 1324, length: 0, content: '', WYG: 中以隂陽為端故人情可睹隂陽為情之始以四時為柄故事可勸四時各有事故事可得而勸也以日星為紀故業可别日以紀晝星以紀夜故事可得而分别也以月為量故功有藝有度量以成四時猶功業各有分理也藝猶理鬼神以為徒故事有守鬼神不相干各有守五行以為質故事可復五行終則復始故事可修復也禮義以為器故事行有考考成人情以為田故人以為奥四靈以為畜故飲食有由四靈鳥獸之長四靈為畜則飲食可用何謂四靈麟鳳龜龍謂之四靈故龍以為畜而魚鮪不諗諗潛藏也鳳以為畜而鳥不䎀麟以為畜而獸不狘䎀飛走之貌也龜以為畜而人情不失易曰定天下之吉凶成天下亹亹者莫善於蓍龜故曰人情不失也}
  - {type: page-break, offset: 1324, content: '', id: KR3a0001_WYG_007-16b, image: WYG0695/WYG0695-0074b.png}
  - {type: variant, offset: 1325, length: 2, content: 世殷, WYG: ''}
  - {type: line-break, offset: 1326, content: '', id: SBCK_001-27b.09}
  - {type: variant, offset: 1328, length: 0, content: '', WYG: 秉蓍龜列祭祀瘞繒宣祝嘏辭説瘞謂祭祀之瘞繒謂若増封泰山宣謂播宣揚之設制度故國有禮官有御治也事有職禮有序先王患禮之不達於下故饗帝於郊所以定天位也祀社於國所以列地利也禘祖廟所以本仁也旅山川所以儐鬼神也祭五祀所以本事也故宗祝在廟三公在朝三老在學王養三老在學王前巫而後史卜筮鼓侑皆在左右王中心無違也以守至正是以禮行於郊而百神受職禮行於社而百貨可極禮行於祖廟而慈孝服焉孝慈之道為逺近所服焉禮行於五祀而正法則焉故郊社祖廟山川五祀義之修而禮之藏言禮之寶藏夫禮必本於}
  - {type: page-break, offset: 1328, content: '', id: KR3a0001_WYG_007-17a, image: WYG0695/WYG0695-0074c.png}
  - {type: variant, offset: 1329, length: 1, content: 戊, WYG: 一太一者元氣也分而為天地轉而為隂陽變而為四時列而為鬼神其降曰命即上所為命降於天地祖廟也其官於天也官為職分也言禮}
  - {type: variant, offset: 1331, length: 1, content: 時, WYG: 職分皆從天下來也協於分藝藝理其居於人也曰養言禮之於人身所以養成人也所以講信修睦而固人之肌膚之會筋骸之束也所以養生送死事鬼神之大端所以達天}
  - {type: page-break, offset: 1331, content: '', id: KR3a0001_WYG_007-17b, image: WYG0695/WYG0695-0074d.png}
