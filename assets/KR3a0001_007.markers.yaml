  - {type: variant, offset: 869, length: 0, content: '', SBCK: 妄行者生於不足不足生於無度無度則小者偷盗大者侈靡各不知節是以上有制度則民知所止民知所止則不犯故雖有姦邪賊盜靡法妄行之嶽而無陷刑之民不孝者生於不仁不仁者生於喪祭之禮明喪祭之禮所以教仁愛也能教仁愛則喪思慕祭祀不解人子饋養之道生時饋養之道同之也言孝子奉祭祀不敢解喪祭之禮明則民孝矣故雖有不孝之獄而無陷刑之民殺上者生於不義義所以别貴賤明尊卑也貴賤有别尊卑有序則民莫不尊上而敬長朝聘之禮者所以明義也義必明則民不犯故雖有殺上之獄而無陷刑之民鬬變者生於相陵相陵者生於長㓜無序而遺敬讓遺忘鄉飲酒之禮者所以明長幼之序而崇敬讓也長幼必序民懷敬譲故雖有鬬變之獄而無陷刑之民淫亂者生於男女無别男女無别則夫婦失義禮聘享者所以别男女明夫婦之義也男女旣别夫婦既明故雖有淫亂之獄而無陷刑之民此五者刑罰之所以生各有源焉不豫塞其源而輙繩之以刑是謂為民設穽而陷之刑罰之源生於嗜慾不節夫禮度者所以禦民之嗜慾而明好惡順天之道禮度既陳五教畢修而民猶或未化尚必明其法典以申固之令固其教尚猶也申也其犯姦邪靡法妄行之獄者則飭制量之度有犯不孝之獄者則飭喪祭之禮有犯殺上之獄者則飭朝覲之禮有犯鬬變之獄者則飭鄉飲酒之禮有犯淫亂之獄者則飭婚聘之禮三皇五帝之所化民者如此雖有五刑之用不亦可乎}
