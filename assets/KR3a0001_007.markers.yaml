  - {type: variant, offset: 1364, length: 12, content: 國亡乎大戊恐駭側身脩行思, SBCK: 不使居川渚者不使居原用水火金木飲食必時火季春岀火季秋納火也用金以用水漁人以時入澤粱乃漑灌用林飲食各隨四時之宜者也時采銅鐵用木斧斤以時入山冬合男女春頒爵位必當年徳皆所順也用民必順使民悦以故無水旱昆蟲之災民無凶饑妖孽之疾天不愛其道地不愛其寶人不愛其情是以天降甘露地出醴泉山出器車銀出及象車也甕丹竈之器河出馬圗負圖出龍似馬鳳凰麒麟皆在郊掫龜龍在宫沼其餘鳥獸及卵胎皆可俯而窺也則是無故}
