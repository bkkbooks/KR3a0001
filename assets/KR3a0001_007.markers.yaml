  - {type: variant, offset: 1257, length: 0, content: '', SBCK: 最而五行之端用五行也端始也能食味别聲被色而生者聖人作則則法作為必以天地為本以隂陽為端以四時為柄以日星為紀月以為量􅀑神以為徒五行以為質禮義以為器人情以為田四靈以為畜以天地為本故物可舉物苞在於其中天地為本則萬以隂陽為端故情可睹為情始隂陽之以四時為柄故事可勸事可得而勸也四時各有事故以日星為紀故業可别故事可得而分别也日以紀晝星以紀夜月以為量故功有藝業各有分理也藝猶理有度量以成四時猶功鬼神以為徒故事有守干各有守鬼神不相五行以為質故事可復也故事可修復也五行終則復始禮義以為器故事行有考成考人情以為田四靈以為畜靈四畜則飲食可用鳥獸之長四靈爲何謂四靈麟鳳􅀛龍謂之四靈故龍以為畜而魚鮪不諗藏也諗潛鳳以為畜而鳥不􅖬麟以為畜而獸不狘飛䎀况必反况越反飛走之貌也􅖬龜以為畜而人情不失亹者莫善於蓍龜人情不失也易曰定天下之吉凶成天下之亹先王秉蓍龜列祭祀瘞繒宣祝嘏繒謂若増封太瘞謂祭祀之瘞列反繒慈陵反嘏舉下反山宣謂播宣揚之􅄟於設制度祝嘏辭說故國有禮官有御也治職有序先王患禮之不達於下故饗帝于郊所以定天位也祀社於國所以列地利也禘祖廟所以本仁也旅山川所以儐鬼神也祭五祀所以本事也故宗祝在廟三公在朝三老在學老在學王養三王前巫而後史卜蓍瞽侑皆在左右王中心無爲也以守至正是以禮行于郊而百神受職禮行於社而百貨可極禮行於祖廟而孝慈服焉逺近所服焉孝慈之道為禮行於五祀而正法則焉故郊社宗廟山川五祀義之脩而禮之藏寶藏言禮之夫禮必本於太一元氣也太一者分而為天地轉而為隂陽變而為四時列而為鬼神其降曰命為命降即上所祖廟也於天地其官於天也分皆從天下來也官為職分也言禮職協於分藝理藝其居於人也曰養人身所以言禮之於人也養成所以講信修睦而固人之肌膚之會筋骸之束者所以養生送死事􅀑神之}
