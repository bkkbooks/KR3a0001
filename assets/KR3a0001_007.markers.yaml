  - {type: variant, offset: 1095, length: 2, content: 至甚, WYG: 與亂政者殺左道亂也作媱聲媱逸也惑亂人之聲造異服非人所常見設奇伎奇器以蕩上心者殺怪異之伎可以眩懼人心之器蕩動行偽而堅行詐偽而守之堅也言詐而辯學非而博順非而澤順其非而滑澤以惑衆者殺假於鬼神時日卜筮以疑衆者殺此四誅者不以聴不聴棘木之下仲弓曰其禁盡於此而已孔子曰此其急者其餘禁者十有四焉命服命車不粥於市粥賣珪璋璧琮不粥於市宗廟之器不粥於市兵軍旍旗不粥於市犧牲秬鬯不粥於市戎器兵甲不粥於市用器不中度不粥於市布帛精麤不中數廣狹不中量不粥於市姦色亂正色不粥於市文錦珠玉之器雕飾靡麗不粥於市衣服飲食不粥於市賣成衣服非侈必偽故禁之禁賣熟食所以厲恥也菓食不時不粥於市五木不中伐不粥於市鳥獸魚鼈不中殺不粥於市凡執此禁以齊衆者不赦過也禮運第三十二孔子為魯司寇與於蜡旣賔事畢畢賔客之事也乃出遊於觀之上觀宫門外闕周禮所謂象魏也喟然而嘆言偃侍曰夫子何嘆}
