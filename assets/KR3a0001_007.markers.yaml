  - {type: variant, offset: 706, length: 1, content: 正, SBCK: 朝服郊之日喪者不敢哭凶服者不敢入國門汜埽清路行者必止新土無復行之汜遍也清路以弗命而民聴敬之至也王以之不令而行之也恭敬事天故民化天子大裘以黼之被衮象天天之文故被之道路至大壇而脱之大裘為黼文也言被之大裘}
