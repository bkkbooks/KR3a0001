  - {type: variant, offset: 965, length: 0, content: '', SBCK: 不然凡治君子以禮御其心所以屬之以廉耻之節也故古之大夫其有坐不廉汙穢而退放之者不謂之不廉汙穢而退放則曰簠簋不飭齊也飭整有坐淫亂男女無别者不謂之淫亂男女無别則曰帷幕不修也有坐罔上不忠者不謂之罔上不忠則曰臣節未著有坐罷軟不勝任者不謂之罷軟不勝任則曰下官不職官不稱言其下斥其身也移其職不有坐干國之紀者不謂之干國之紀則曰行事不請而擅行言不請此五者大夫旣自定有罪名矣而猶不忍斥然正以呼之也旣而爲之諱所以愧耻之是故大夫之罪其在五刑之域者聞而譴發也發始譴譴譲露發則白冠釐纓盤水加劍造乎闕而自請罪君不}
