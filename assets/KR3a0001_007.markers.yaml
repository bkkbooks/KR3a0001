  - {type: variant, offset: 1360, length: 0, content: '', SBCK: 送死事鬼神之常也故事大積焉而不苑積也苑滯並行而不謬細行而不失深而通茂而有間理也言有連而不相及叙也言有動而不相害此順之至也明}
