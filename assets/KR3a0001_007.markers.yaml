  - {type: variant, offset: 1351, length: 5, content: 曰桑榖野木, SBCK: 强失之者喪仁者義之本順之體得之者尊故治國不以禮猶無耜而耕為禮而不本於義猶耕之而弗種為而不講於學猶種而弗耨講之以學}
