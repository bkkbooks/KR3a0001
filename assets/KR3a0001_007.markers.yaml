  - {type: variant, offset: 1160, length: 0, content: '', SBCK: 此謂三皇五帝與三代之英謂禹英秀武也湯文吾未之逮也而有記焉大道之行天下為公選賢與能講信修睦也睦親也講習也修行故人不獨親其親不獨子其子天下為公所謂大道老有所終壯有所用矜寡孤疾皆有所養貨惡其棄於地不必藏於己力惡其不出於身不必為人身不以為徳恵也言力惡其不出於是以姦謀閉而不興盜竊亂賊不作故外户而不閉謂之大同今大道旣隠天下為家各親其親各子其子貨則為己力則為人大人世及以為常城郭溝池以為固禹湯文武成王周公由此而選為之選也言用禮義未有不謹於禮禮之所興與天地並如有不由禮而在位者則以為殃言偃復問曰}
  - {type: page-break, offset: 1160, content: '', id: KR3a0001_SBCK_007-13b}
  - {type: variant, offset: 1160, length: 0, content: '', WYG: 與三代之英英秀謂禹湯文武也吾未之逮而有記焉大道之行天下為公選賢與能講信修睦講習也修行也睦親也故人不獨親其親不獨子其子所謂大道天下為公老有所終壯有所用矜寡孤疾皆有所養貨惡其棄於地不必藏於己力惡其不出於身不必為人言力惡其不出於身不以為徳恵也是以姦謀閉而弗興盜竊亂賊不作故外户而不閉謂之大同今大道旣隠天下為家各親其親各子其子貨則為己力則為人大人世及以為常城郭溝池以為固禹湯文武成王周公由此而選言用禮義為之選也未有不謹於禮禮之所興與天地並如有不由禮而在位者則以為殃言偃復問曰}
