  - {type: variant, offset: 1092, length: 2, content: 惡惡, SBCK: 情立君臣之義以權之意論輕重之序慎測淺深之量以别之列反别彼悉其聰明正其忠愛以盡之大司寇正刑明辟以察獄獄必三訊焉曰訊群吏三曰一曰訊群臣二民也訊萬有指無簡則不聴也其誠者不論以簡誠也有意無也爲罪附從輕赦從重赦人之罪以重為比附人之罪以輕為比疑獄則泛與衆共之疑則赦之皆以小大之比成也志反比毗是故爵人必於朝與衆共之也刑人必於市與衆棄之也古者公家不畜刑人大夫弗養也士遇之塗以弗與之言屏諸四方唯其所之不及與政弗欲生之也仲弓曰聴獄獄之成成何官孔子曰成獄成於吏吏以獄成告於正吏正獄吏獄官長官正旣聴之乃告大司寇聴之乃奉於王王命三公卿士叅聴棘木之下九棘孤卿外朝法左子男位焉面三槐三公位大夫位焉右九棘公侯伯然後乃以獄之成疑于王王三宥之以聴命罪雖以定猶君王尚寛宥然後刑之者也三宥之不可得輕而制刑焉所以重之也仲弓曰其禁何禁孔子曰巧言破律法令巧賣也者遁名改作物名也變言與執左}
  - {type: page-break, offset: 1092, content: '', id: KR3a0001_SBCK_007-11a}
  - {type: page-break, offset: 1092, content: '', id: KR3a0001_SBCK_007-11b}
  - {type: variant, offset: 1092, length: 2, content: 惡惡, WYG: 情立君臣之義以權之意論輕重之序慎測深淺之量以别之悉其聰明致其忠愛以盡之大司寇正刑明辟以察獄獄必三訊焉一曰訊羣臣二曰訊羣吏三曰訊萬民也有指無簡則不聴也簡誠也有其意無其誠者不論以為罪也附從輕赦從重附人之罪以輕為比赦人之罪以重為比疑獄則泛與衆共之疑則赦之皆以小大之比成之是故爵人必於朝與衆共之也刑人必於市與衆棄之也古者公家不畜刑人大夫弗養其士遇之塗弗與之言屏諸四方唯其所之弗及與政弗欲生之也仲弓曰聴獄獄之成成何官孔子曰成獄於吏吏以獄之成告於正吏獄官吏正獄官正正旣聴之乃告大司寇大司寇聴之乃奉於王王命三公卿士叅聴棘木之下外朝法左九棘孤卿大夫位焉右九棘公侯伯子男位焉而三槐三公位然後乃以獄之成告於王王三宥之以聴命君王尚寛宥罪雖以定猶三宥之不可得輕然後刑之者也而制刑焉所以重之也仲弓曰其禁何禁孔子曰巧言破律巧賣法令者也遁名改作變言與物名也執左}
