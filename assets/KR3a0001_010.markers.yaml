  - {type: variant, offset: 1641, length: 2, content: 總紕, krp: 知喪道也夫子始死則矣羔裘玄冠者易之而巳汝何疑焉子罕問}
  - {type: variant, offset: 1644, length: 1, content: 此, SBCK: 孔子曰始死之設重也何爲孔子曰重主道也殷主綴重焉作主而連其綴連也殷人廟也重懸諸周人徹重焉就所􅀝處而治周人作主徹重請問䘮朝廟而後行焉䘮將􅁙朝於子曰䘮之朝也順死者之孝心故至於祖者廟而後行殷朝而後殯於祖周朝而後遂􅁙孔子之守狗死謂子貢曰路馬死所乘馬路馬常則藏之以帷狗則藏之以蓋汝徃埋之吾聞弊幃不棄爲埋馬也􅁦蓋不棄爲埋狗也今吾貧無蓋於其封也與之蓆無使其首䧟於土焉曲禮公西赤問第四十四公西赤問於孔子曰大夫以罪免卒其􅁙也如之何孔子曰大夫廢其事終身不仕死則􅁙之以士禮老而政仕者死則從其列公儀仲子嫡子死而立其弟檀􅃓問子服伯子曰何居我未之前聞也子服伯子曰仲子亦猶行古人之道昔者文王捨伯邑考文王亦立子而不立孫也伯邑考文王之長子也言而立武王微子捨其孫腯立其弟衍子游以聞諸孔子子曰否周制立孫孔子之母旣􅁙將立􅁙焉曰古者不祔􅁙爲不忍先死者之復見也詩云死則同穴自周公已來祔􅁙矣故衛人之祔也離之有以聞焉魯人之祔也合之美夫吾從魯遂合􅁙於防曰吾聞之有備物而不可用也是故竹不}
