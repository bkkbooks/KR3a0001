  - {type: variant, offset: 1299, length: 2, content: 者期, SBCK: 也位在廟門之外也毁宗廟而出行神出于大門及墓男子西靣婦人東靣旣封而歸殷道也孔子行之子游問曰君子行禮不求變俗夫子變之矣孔子曰非此之謂也喪事則從其質而巳矣宣公八年六月辛巳有事于太廟而東門襄仲卒壬午猶繹日又祭也繹祭之明子游見其故以問孔子曰禮與孔子曰非禮也卿卒不繹季桓子喪康子練而無衰子游問}
