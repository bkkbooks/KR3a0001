  - {type: variant, offset: 1369, length: 1, content: 行, SBCK: 也我則旣言之矣敢不勉乎與其鄰嬖童汪錡乘徃奔敵死焉皆殯魯人欲勿殤童汪錡問於孔子曰能執干戈以衛社稷可無殤乎魯昭公夫人吳孟子卒不赴于諸侯孔子旣致仕而徃弔焉適于季氏季氏不絰孔子投絰而不拜巳亦不成禮以季氏無故子游問曰禮與孔子曰主人未成服則吊者不絰焉禮也公父穆伯之喪敬姜晝哭文伯之喪晝夜哭孔子曰季氏之婦可謂知禮矣愛而無上下有章晝哭哭子晝夜哭哭夫與子各上謂夫下謂子也章别也哭夫也有别南宫縚之妻孔子兄之女喪其姑而誨之髽曰爾毋從從爾毋扈扈爾大也扈言䘮從從髙扈扈勑髙反髽則􅀲反百無容節也縚蓋榛以爲笄長尺而總八寸者齊衰之總八寸也總束髪束髪垂為飾子張有父之䘮公明儀相焉問啓顙於孔子孔子曰拜而後啓顙頽乎其順啓顙而後拜頎乎其至也三年之䘮吾從其至}
