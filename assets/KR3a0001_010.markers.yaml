  - {type: variant, offset: 340, length: 167, content: 古之君子忠以為質仁以為衛不出環堵之室而知千里之外有不善則以忠化之侵㬥則以仁固之何待劍乎子路曰由乃今聞此言請攝齊以受教楚恭王出遊亡烏嘷之弓左右請求之王曰止楚王失弓楚人得之又何求之孔子聞之惜乎其不大也不曰人遺弓人得之而已何必楚也孔子謂魯司寇斷獄訟皆進眾議者而問之曰子以為奚若某以為何若皆曰云云如是然後夫子曰當從某子幾是孔子問漆雕憑曰子事臧, SBCK: 昔}
