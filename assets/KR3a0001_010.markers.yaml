  - {type: punctuation, offset: 1629, content: 「, id: KR3a0001_CHANT_010-bkkpn447}
  - {type: variant, offset: 1629, length: 1, content: 為, SBCK: 晏平仲可謂能逺害矣不以已知是駮人之非愻辭以避咎義也夫者記大夫士喪父母有異亦怪也乃舉人避害之愻以辭而謂季平子卒將以君之璵璠歛贈以珠玉孔子初爲中都宰聞之歷級而救焉登階不歷級遽足聚曰送而以寶玉是猶曝尸於中原也其示民以姦利之端而有害於死者安用之且孝子不順情以危親忠臣不兆姦以䧟君之兆成也兆姦爲姦乃止孔子之弟子琴張與宗友衛齊豹見宗魯於公子孟縶孟縶以爲參乗焉及齊豹將殺孟縶告宗魯使行宗魯曰吾由子而事之今聞難而逃是僣子也子言不信僣不信使子行事乎吾將死以事周子而歸死於公孟可也齊氏用戈擊公孟宗以背蔽之斷肱中公孟宗魯皆死琴張聞宗魯死將徃弔之孔子曰齊豹之盗孟縶之賊也汝何弔焉君不食姦不受亂不爲利病於囘不以利囘邪也於邪也放而病不以囘事人不蓋非義揜蓋不犯非禮汝何弔焉琴張乃止郕人子革卒哭之呼滅人少名滅者又哭舊説以滅子蒲名以孤窮自謂亡滅也名其父不近人情疑子游曰若是哭也其野哉孔子惡野哭者哭者聞之遂改之公父文伯卒其妻妾皆行哭失聲敬姜戒之曰吾聞好外者士死之好内者女死之今吾子早殀吾惡其以好内聞也二三婦人之欲供先祀者供奉先人之祀言欲留不改嫁請無瘠色無揮涕無拊膺之拊猶撫也膺謂胷也揮涕不哭流涕以手揮無哀容無加服有降服從禮而靜是昭吾子也孔子聞之曰女智無若婦男智莫若夫公文氏之婦智矣剖情損禮欲以明其子爲令德也子路與子羔仕於衞衞有蒯聵之難孔子在魯聞之曰柴也其來由也死矣旣而衞使至曰子路死焉夫子哭之於中庭有人弔者而夫子拜之巳哭進使者而問故使者曰醢之矣遂令左右皆覆醢曰吾何忍食}
