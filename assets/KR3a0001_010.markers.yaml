  - {type: variant, offset: 4, length: 2, content: 魯哀, SBCK: 曲禮子貢問第四十二子貢問於孔子曰􅀳文公實召天子而使諸侯朝焉且使狩於河陽因使諸侯朝􅀳文公㑹諸侯于溫召襄王夫子作春秋云天王狩于河陽何也孔子曰以臣召君不可以訓亦書其率諸侯事天子而已孔子在宋見桓魋自爲石槨三年而不成工匠皆病夫子愀然曰若是其靡也侈靡死不如杇之速愈冉子僕曰禮凶事不豫此何謂也夫子曰旣死而議謚謚定而卜􅁙旣􅁙而立廟皆臣子之事非所豫屬也况自爲之哉南宫敬叔以富得罪於定公奔衞衞侯請復之載其寶以朝夫子聞之曰若是其貨也喪不若速貧之愈位也喪失子游侍曰敢問何謂如此孔子曰富而不好禮殃也敬叔以富喪矣而又弗改吾懼其將有後患也敬叔聞之驟如孔氏而後循禮施散焉孔子在齊齊大旱春饑景}
