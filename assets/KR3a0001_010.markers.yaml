  front:
  - {type: variant, offset: 0, length: 2, content: 好生, SBCK: 孔子家語卷}
  - {type: page-break, offset: 0, content: '', id: KR3a0001_SBCK_010-1a}
  - {type: variant, offset: 0, length: 1676, content: 好生第十魯哀公問於孔子曰昔者舜冠何冠乎孔子不對公曰寡人有問於子而子無言何也對曰以君之問不先其大者故方思所以為對公曰其大何乎孔子曰舜之為君也其政好生而惡殺其任授賢而替不肖德若天地而靜虛化若四時而變物是以四海承風暢於異類鳳翔麟至鳥獸馴德無他好生故也君舍此道而冠冕是問是以緩對孔子讀史至楚復陳喟然歎曰賢哉楚王輕千乘之國而重一言之信匪申叔之信不能達其義匪莊王之賢不能受其訓孔子嘗自筮其卦得賁焉愀然有不平之狀子張進曰師聞卜者得賁卦吉也而夫子之色有不平何也孔子對曰以其離邪在周易山下有火謂之賁非正色之卦也夫質也黑白宜正焉今得賁非吾兆也吾聞丹漆不文白玉不琱何也質有餘不受飾故也孔子曰吾於甘棠見宗廟之敬也甚矣思其人必愛其樹尊其人必敬其位道也子路戎服見於孔子拔劍而舞之曰古之君子固以劍而自衛乎孔子曰古之君子忠以為質仁以為衛不出環堵之室而知千里之外有不善則以忠化之侵㬥則以仁固之何待劍乎子路曰由乃今聞此言請攝齊以受教楚恭王出遊亡烏嘷之弓左右請求之王曰止楚王失弓楚人得之又何求之孔子聞之惜乎其不大也不曰人遺弓人得之而已何必楚也孔子謂魯司寇斷獄訟皆進眾議者而問之曰子以為奚若某以為何若皆曰云云如是然後夫子曰當從某子幾是孔子問漆雕憑曰子事臧文仲武仲及孺子容此三大夫者孰賢對曰臧氏家有守龜焉名曰蔡文仲三年而為一兆武仲三年而為二兆孺子容三年而為三兆憑從此之見若問三人之賢與不賢所未敢識也孔子曰君子哉漆雕氏之子其言人之美也隱而顯言人之過也微而著智而不能及明而不能見孰克如此魯公索氏將祭而亡其牲孔子聞之曰公索氏不及二年將亡後一年而亡門人問曰昔公索氏亡其祭牲而夫子知其將亡何也曰夫祭者孝子所以自盡於其親將祭而亡其牲則其餘所亡者多矣若此而不亡者未之有也虞芮二國爭田而訟連年不決乃相謂曰西伯仁人也盍往質之入其境則耕者讓畔行者讓路入其邑男女異路斑白不提挈入其朝士讓為大夫大夫讓為卿虞芮之君曰嘻吾儕小人也不可以履君子之庭遂自相與而退咸以所爭之田為閑田矣孔子曰以此觀之文王之道其不可加焉不令而從不教而聽至矣哉曾子曰狎甚則相簡莊甚則不親是故君子之狎足以交歡其莊足以成禮孔子聞斯言也曰二三子志之孰為參也不知禮也哀公問曰紳委章甫有益於仁乎孔子作色而對曰君胡然焉衰麻苴杖者志不存乎樂非耳弗聞服使然也黼紱袞冕者容不褻慢非性矜莊服使然也介冑執戈者無退惴之氣非體純猛服使然也且臣聞之好肆不守折而長者不為市竊夫其有益與無益君子所以知孔子謂子路曰見長者而不盡其辭雖有風雨吾不能入其門矣故君子以其所能敬人小人反是孔子謂子路曰君子以心導耳目立義以為勇小人以耳目導心不愻以為勇故曰退之而不怨先之斯不從已孔子曰君子有三患未之聞患不得聞既得聞之患弗得學既得學之患弗能行有其德而無其言君子恥之有其言而以無其行君子恥之既得之而又失之君子恥之地有餘而民不足君子恥之眾寡均而人功倍己焉君子恥之魯人有獨處室者鄰之釐婦亦獨處一室夜暴風雨至釐婦室壞趨而託焉魯人閉戶而不納釐婦自牖與之言子何不仁而不納我乎魯人曰吾聞男子不六十不閒居今子幼吾亦幼是以不敢納爾也婦人曰子何不如柳下惠然嫗不逮門之女國人不稱其亂魯人曰柳下惠則可吾固不可吾將以吾之不可學柳下惠之可孔子聞之曰善哉欲學柳下惠者未有似於此者期於至善而不襲其為可謂智乎孔子曰小辯害義小言破道關雎興于鳥而君子美之取其雄雌之有別鹿鳴興於獸而君子大之取其得食而相呼若以鳥獸之名嫌之固不可行也孔子謂子路曰君子而強氣則不得其死小人而強氣則刑戮荐臻豳詩曰殆天之未陰雨徹彼桑土綢繆牖戶今汝下民或敢侮余孔子曰能治國家之如此雖欲侮之豈可得乎周自后稷積行累功以有爵土公劉重之以仁及至大王亶甫敦以德讓其樹根置本備豫遠矣初大王都豳翟人侵之事之以皮幣不得免焉事之以犬馬不得免焉事之以珠玉不得免焉於是屬其耆老而告曰狄人之所欲者吾土地也吾聞之也君子不以其所以養人者害人二三子何患乎無君遂獨與大姜去之踰梁山邑于岐山之下豳人曰仁人之君不可失也從之如歸市焉天之與周民之去殷久矣若此而不能天下未之有也武庚惡能侮鄭詩曰執轡如組兩驂如儛孔子曰為此詩者其知政乎夫為組者總紕於此成文於彼言其動於近行於遠也執此法以御民豈不化乎竿旄之忠告至矣哉, WYG: ''}
