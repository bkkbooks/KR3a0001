  - {type: 'tls:seg', offset: 1288, content: '', id: KR3a0001_CHANT_010-15a.28}
  - {type: variant, offset: 1288, length: 0, content: '', SBCK: 覘國乎詩云凡民有喪匍匐救之子罕有焉雖非晉國其天下孰能當之非晉言雖者猶不能當也國使天下有强是以周任有言曰民悦其愛者弗可敵也楚伐吳工尹商陽與陳棄疾追吳師及之棄疾曰王事也子手􅃓而可商陽手􅃓棄疾曰子射諸射之􅁦一人韔其􅃓韜韔又及棄疾謂之又及棄疾復謂之斃二人每斃一人輙掩其目止其御曰吾朝不坐燕不與故也亡􅂌殺三人亦足以反命矣孔子聞之曰殺人之中又有禮焉子路怫然進曰人臣之節當君大事唯力所及死而後巳夫子何善此子曰然如汝言也吾取其有不忍殺人之心而巳孔子在衛司徒敬子卒夫子弔焉主人不哀夫子哭不盡聲而退璩伯玉請曰衛鄙俗不習喪禮煩吾子辱相焉孔子許之掘中霤而浴力救反室中霤毁竈而綴足襲於牀及􅁙毁宗而􅺺行也綴足不}
  - {type: page-break, offset: 1288, content: '', id: KR3a0001_SBCK_010-4b}
  - {type: page-break, offset: 1288, content: '', id: KR3a0001_SBCK_010-5a}
