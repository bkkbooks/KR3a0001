  - {type: variant, offset: 1373, length: 0, content: '', SBCK: 在衞衞之人有送􅁙者而夫子觀之曰善哉爲喪乎足以爲法也小子識之子貢問曰夫子何善爾也徃也如慕其返也如疑子貢曰豈若速返而虞哉謂之虞也返􅁙而祭子曰此情之至者也小子識之我未之能也卞人有母死而孺子之泣者孔子曰哀則哀矣而難繼也夫禮爲可傳也爲可繼也故哭踊有節而變除有期孟獻子禫懸而不樂可御而處内子游問於孔子曰若是則過禮也孔子曰獻子可謂加於人一等矣魯人有朝祥而暮歌者子路笑之孔子曰由爾責於人終無已夫三年之喪亦以久矣子路出孔子曰又多乎哉可以歌不復又復也言其也久踰月則其善也子路問於孔子曰傷哉貧也生而無以供飬死則無以爲禮也孔子曰啜菽飲水盡其歡心斯爲之孝乎歛手足形旋􅁙而無槨便旋稱其財爲之禮貧何傷乎吴延陵季子聘于上國適齊於其返也其長子死於嬴博之間名也嬴博地孔子聞之曰延陵季子呉之習於禮者也徃而觀其􅁙焉其歛以時服而已服無所加隨冬夏之其壙掩坎深不至於泉其􅁙無盟器之贈旣􅁙其封廣輪揜坎其髙可時隱也旣封則季子乃左􅃝右還其封且號者三曰骨肉歸于土命也若䰟氣則無所不之則無所不之而遂行孔子曰延陵季子之禮其合矣子游問喪之具孔子曰稱家之有亡焉子游曰有亡惡於齊齊限惡何孔子曰有也則無過禮苟亡矣則歛手足形還􅁙懸棺而封人豈有非之者哉故夫喪亡與其哀不足而禮有餘不若禮不足而哀有餘也祭祀與其敬不足而禮有餘不若禮不足而敬有餘也伯髙死於衞赴於孔子子曰吾惡乎哭諸兄弟吾哭諸廟父之友吾哭諸廟門之外師吾哭之寢朋友吾哭之寢門之外所知吾哭之諸野今於野則已踈於􅆍則巳重夫由賜也而見我吾哭於賜氏遂命子貢爲之主曰爲爾哭也來者汝拜之知伯髙而來者汝勿拜旣哭使子張徃弔焉未至冉求在衞攝束帛乗馬而以將之孔子聞之曰異哉徒使我不成禮於伯髙者是冉求也子路有姊之喪可以除之矣而弗除孔子曰何不除也子路曰吾寡兄弟而弗忍也孔子曰行道之人皆弗忍先王制禮過之者俯而就之不至者企而及之子路聞之遂除之伯魚之喪母也期而猶哭夫子聞之曰誰也門人曰鯉也孔子曰嘻其甚也非禮也伯魚聞之遂除之衞公使其大夫求婚於季氏桓子問禮於孔子子曰同姓爲宗有合族之義故繋之以姓而弗别綴之以食而弗殊人之禮雖君有食族族食多少也親盡不異之雖百世㛰姻不得通周道然也桓子曰魯衞之先雖寡兄弟今已絶逺矣可乎孔子曰固非禮也夫上治祖禰以尊尊之下治子孫以親親之旁治昆弟所以教睦也此先王不易之教也有若問於孔子曰國君之於百姓如之何孔子曰皆有宗道焉故雖國君之尊猶百姓不廢其親所以崇愛也雖以族人之親而不敢戚君所以謙也不敢如其親也戚親也尊敬君曲禮子夏問第四十三子夏問於孔子曰居父母之􅄷如之何孔子曰寢苫枕干不仕楯干弗與共天下也遇於朝市不返兵而鬬離於身兵常不曰請問居昆弟之􅄷如之何孔子曰仕弗與同國衘君命而使雖遇之不鬬曰請問從昆弟之􅄷如之何曰不為魁主人能報之則執兵而陪其後子夏問三年之喪旣卒哭金革之事無避禮與初有司爲之乎吏職也有司當孔子曰夏后氏之喪三年旣殯而致仕殷人旣􅁙而致事周人旣卒哭而致事子哭之無時之哭致事還政於君也卒哭士旣􅁙而卒哭也大夫三月而􅁙三月而記曰君子不奪人之親亦不奪故也子夏曰金革之事無避非與孔子曰吾聞諸老聃曰魯公伯禽有爲爲之也義伯禽為方伯以不得不誅之伯禽有母之喪東方有戎為不公以三年之喪從利者吾弗知也子夏問於孔子曰記云周公相成王教之以世子之禮有諸孔子曰昔者成王嗣立㓜未能蒞阼周公攝政而治抗世子之法於伯禽欲王之知父子君臣之道所以善成王也夫知爲人子者然後可以爲人父知爲人臣者然後可以爲人君知事人者然後可以使人是故抗世子法於伯禽使成王知父子君臣長㓜之義焉凡君之於世子親則父也尊則君也有父之親有君之尊然後兼天下而有之不可不愼也行一物而三善皆得唯世子齒於學之謂也世子齒於學則國人觀之曰此將君我而與我齒讓何也曰有父在則禮然然而衆知父子之道矣其一曰此將君我而與我齒讓何也曰有臣在則禮然而衆知君臣之義矣其三曰此將君我而與我齒讓何也曰長長也則禮然然而衆知長㓜之節矣故父在斯爲子君在則為臣居子與臣之位所以尊君而親親也在學學之為父子焉學之爲君臣焉學之為長㓜焉父子君臣長㓜之道得而後國治語曰樂正司業父師司成成生人者師有父道一有元良萬國以貞元善太子也一謂天子也世子之謂聞之曰為人臣者殺其身而有益於君則為之况于其身大也于寛也以善其君乎周公優爲也子夏問於孔子曰居君之母與妻之喪如之何孔子曰居處言語飲食衎爾於喪所則稱其服而已敢問伯母之喪如之何孔子曰伯母叔母䟽衰期而踊不絶地姑姊妹之大功踊絶於地若知此者由文矣哉妹而已姊上長姑自也言如禮文意當言姑姊子夏問於夫子曰凡喪小功已上虞祔練祥之祭皆沐浴於三年之喪子則盡其情矣孔子曰豈徒祭而已哉三年之喪身有痬則浴首有瘡則沐病則飲酒食肉毁瘠而病君子不爲也毁則死者君子爲之無子則祭之沐浴爲齊潔也非爲飾也子夏問於孔子曰客至無所舍而夫子曰生於我乎館客死無所殯矣夫子曰於我乎殯敢問禮與仁者之心與孔子曰吾聞諸老聃曰館人使若有之惡有之惡有之而不得殯乎夫仁者制禮者也故禮者不可不省也禮不同不異不豐不殺稱其義以爲之宜故曰我戰則剋祭則受福蓋得其道矣孔子食於季氏食祭主人不辭不食亦不飲而飡子夏問曰禮也孔子曰非禮也從主人也吾食於少施氏而飽少施氏食我以禮吾食祭作而辭曰䟽食不足祭也吾飡而作辭曰䟽食不敢以傷吾子之性主人不以禮客不敢盡禮主人盡禮則客不敢不盡禮也子夏問曰官於大夫旣升於公而反爲之服禮與孔子曰管仲遇盗取二人焉上之爲公臣曰所以遊僻者可人也公許管仲卒桓公使爲之官於大夫者爲之服自管仲始也有君命焉子貢問居父母䘮孔子曰敬爲上哀次之瘠爲下顔色稱情戚容稱服曰請問居兄弟之喪孔子曰則存乎書筴已子貢問於孔子曰殷人旣定而弔於壙周人反哭而弔於家如之何孔子曰反哭之弔也喪之至也反而亡矣失之矣於斯爲甚故弔之死人卒事也殷以慤吾從周殷人旣練之明日而祔于祖周人旣卒哭之明日祔于祖祔祭神之始事也周以戚吾從殷促也戚猶子貢問曰聞諸晏子少連大連善居喪其有異稱乎孔子曰父母之喪三日不怠三月不解朞悲哀三年憂東夷之子達於禮者也子游問曰諸侯之世子喪慈母如母禮與孔子曰非禮也古者男子外有傅父内有慈母君命所使教子者也何服之有昔魯孝公少喪其母其慈母良及其死也公弗忍欲喪之有司曰禮國君慈母無服今也君爲之服是逆古之禮而亂國法也若終行之則有司將書之以示後世無乃不可乎公曰古者天子喪慈母練冠以燕居庻謂其母也子王為遂練以喪慈母喪慈母如母始則魯孝公之爲也孔子適衞遇舊館人之喪入而哭之哀出使子貢脱驂以贈之子貢曰所於識之喪不能有所贈贈於舊館不巳多乎孔子曰吾向入哭之遇一哀而出涕吾惡夫涕而無以將之小子行焉子路問於孔子曰魯大夫練而杖禮也孔子曰吾不知也子路出謂子貢曰吾以爲夫子無所不知夫子亦徒有所不知也子貢曰子所問何哉子路曰止吾將爲子問之遂趨而進曰練而杖禮與孔子曰非禮也子貢出}
