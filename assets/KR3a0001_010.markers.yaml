  - {type: variant, offset: 1316, length: 0, content: '', SBCK: 無衰衣者不以見賔何以除焉邾人以同母異父之昆弟死將爲之服因顔克而問禮於孔子子曰繼父同居者則異父昆弟從爲之服不同居繼父且猶不服况其子乎齊師侵魯公叔務人子公爲昭公之遇人入保􅀒杖而息頸上兩手掖之休息者也保縣邑見先避入齊師將入保疲倦加杖也}
