  - {type: variant, offset: 1646, length: 1, content: 文, SBCK: 用無縁也謂􅇼之而瓦不成􅂰鑌􅂰琴瑟張而不平笙竽備而不和有鐘磬而無簨簴簨先尹反簴其舉反簨簴可以懸鐘磬也其曰盟􅄊神明之也哀哉死者而用生者之􅄊不殆而用殉也死謂之殉殺人以從子游問}
  - {type: variant, offset: 1646, length: 1, content: 文, krp: 用無縁也謂籩之而瓦不成膝鑌膝琴瑟張而不平笙竽備而不和有鐘磬而無簨簴簨先尹反簴其舉反簨簴可以懸鐘磬也其曰盟器神明之也哀哉死者而用生者之器不殆而用殉也死謂之殉殺人以從子游問}
  - {type: variant, offset: 1648, length: 1, content: 彼, SBCK: 孔子曰􅁙者􅂗車芻靈自古有之然今人或有偶人也偶亦是無益於䘮孔子曰爲芻靈者善矣爲偶者不仁不殆於用人乎顔淵之喪旣祥顔路饋祥肉於孔子孔子自出而受之入彈琴以散情而後乃食之孔子嘗奉薦而進祭也嘗秋其親也慤奉薦也慤親之也慈質其行也趨趨以數威儀}
