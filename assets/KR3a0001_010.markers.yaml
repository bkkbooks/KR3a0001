  - {type: variant, offset: 1638, length: 0, content: '', SBCK: 子不答他日又問墓而不墳孔子曰今丘也東西南北之人不可以弗識也吾見封之若堂者矣若髙者堂形四方又見若坊者矣平上而長坊形殺殺又見􅂂夏屋者矣又見若斧形者矣吾從斧者焉於是封之崇四尺孔子先反虞門人後雨甚至墓崩修之而歸孔子問焉曰爾來何遲對曰防墓崩孔子不應三云孔子泫然而流涕曰吾聞之古不修墓及二十五月而大祥五日而彈琴不成聲十日過禫而成笙歌大祥孔子日踚月而歌也􅊨二十五月禫故十孔子有母之喪旣練陽虎弔焉私於孔子曰今季氏將大饗境内之士子聞諸孔子答曰丘弗聞也若聞之雖在衰絰亦欲與徃陽虎曰子謂不然乎季氏饗士不及子也陽虎出曽􅀧問曰吾之何謂也孔子曰巳則衰服猶應其言示所以不非也衰服孔子之以示不非其言者也陽虎之言犯禮故孔子答顔囘死魯定公弔焉使人訪於孔子孔子對曰凡在封内皆臣子也禮君弔其臣升自東階向尸而哭其恩賜之施不有笇也計也又竹􅄊也笇蘇亂反笇原思言於曽子曰夏后氏之送􅁙也用盟􅄊示民無知也殷人用祭􅄊示民有知也周人兼而用之示民疑也曽子曰其不然矣夫以盟􅄊􅀑􅄊也祭􅄊人􅄊也古之人胡}
