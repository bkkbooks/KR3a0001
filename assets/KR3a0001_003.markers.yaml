  - {type: variant, offset: 107, length: 0, content: '', SBCK: 道而能下人有此三者以定天下也何難乎哉子路曰㓜而好學壯而有勇則可也若夫有道下人又誰下哉子曰由不知吾聞以衆攻寡無不尅也以貴下賤無不得也昔者周公居冢宰之尊制天下之政而猶下白屋之士也草屋日見百七十人斯豈以無道也欲得士之用也惡有道而無下天下君子哉齊景公來適魯舎于公館使晏嬰迎孔子孔子至景公問政焉孔子答曰政在節財公悅又問曰秦穆公國小處僻而霸何也孔子曰其國雖小其志大處雖僻而政其中其舉也果其謀也和法無私而令不愉愉苟且也愉宜爲偷首拔五叛爵之大夫五叛大夫首宜爲身奚也百里與語三日而授之以政此取之雖王可其霸少矣景公曰善哉哀公問政於孔子孔子對曰政之急者莫大乎使民富且壽也公曰爲之柰何孔子曰省力役薄賦歛則民富矣敦禮教逺罪疾則民夀矣公曰寡人欲行夫子之言恐吾國貧矣孔子曰詩云愷悌君子民之父母未有子富而父母貧者也衛􅂕公問於孔子曰有語寡人有國家者計之於廟堂之上則政治矣何如孔子曰其可也愛人者則人愛之惡人者則人惡之知得之已者則知得之人所謂不出環堵之室而知天下者知反已之謂也孔子見宋君君問孔子曰吾欲使長有國而列都得之皆得其道國之列都吾欲使民無惑吾欲使士竭力吾欲使日月當時吾欲使聖人自來吾欲使官府治理為之柰何孔子對曰千乗之君問丘者多矣而未有若主君之問問之悉也然主君所欲者盡可得也丘聞之隣國相親則長有國君惠臣忠則列都得之不殺無辜無釋罪人則民不惑士益之禄則皆竭力尊天敬鬼則日月當時崇道貴徳則聖人自來任能黜否則官府治理宋君曰善哉豈不然乎寡人不佞不足以致之也孔子曰此事非難唯欲行之云耳辨政第十四子貢問於孔子曰昔者齊君問政於夫子夫子曰政在節財魯君問政於夫子子曰政在諭臣葉公問政於夫子夫子曰政在悦近而遠來三者之問一也而夫子應之不同然政在異端乎孔子曰各因其事也齊君為國奢乎臺榭淫于苑囿五官伎樂不解於時一旦而賜人以千乗之家者三故曰政在節財魯君有臣三人季孫三也孟孫叔孫内比周以愚其君外距諸侯之賔以蔽其明故曰政在諭臣夫荆之地廣而都狹民有離心莫安其居故曰政在悦近而來遠此三者所以為政殊矣詩云喪亂蔑資曾不惠我師亂之政重賦厚歛民無資財曾蔑無也資財也師衆也夫爲亡我衆莫肯愛此傷奢侈不節以為亂者也又曰匪其止共惟王之卭人不共所止息故惟止止息也卭病也䜛病王之此傷姦臣蔽主以為亂也又曰亂離瘼矣奚其適歸成憂憶禍亂於斯歸於禍離憂也瘼病也言離散以也亂者此傷離散以為亂者也察此三者政之所欲豈同乎哉孔子曰忠臣之諌君有五義焉一曰譎諌譎諫其君正其事以二曰戅諌文飾也戅諫無三曰降諫降卑以諫也其體所四曰直諌五曰風諫唯度主而行之吾從其風諫乎罪避害者也風諫依違逺子曰夫道不可不貴也中行文子倍道失義以亡其國而能禮賢以活其身道失義此􅀃陪配又文子無禮賢之事中行文子得罪於不宜􅀃得道之意而云禮賢不與上相次故休馬待駿者文子曰吾好音以子遺吾晉出亡至邊從者曰謂此嗇夫者君子也我者也吾怨其以我求容也遂不入車人琴好珮子遺吾玉是以不振吾過自容於文子陪道失義以亡其國然得之由活其問文子之所右執而不殺之孔子聞之曰宜以然後得也身而能禮賢以爲聖人轉禍爲福此謂是與活故曰轉禍爲福􅀂入將死不入得楚王將遊荆臺司馬子祺諫王怒之令尹子西賀於殿下諫曰今荆臺之觀不可失也王喜拊子西之背曰與子共樂之矣子西歩馬十里引轡而止曰臣願言有道王肯聽之乎王曰子其言之子西曰臣聞為人臣而忠其君者爵禄不足以賞也諛其君者刑罰不足以誅也夫子祺者忠臣也而臣者諛臣也願王賞忠而誅諛焉王曰我今聴司馬之諫是獨能禁我耳若後世遊之何也子西曰禁後世易耳大王萬歲之後起山陵於荆臺之上則子孫必不忍遊於父祖之墓以為歡樂也王曰善乃還孔子聞之曰至哉子西之諫也入之於千里之上抑之於百世之後者也子貢聞於孔子曰夫子之於子産晏子可為至矣敢問二大夫之所為目夫子之所以與之者孔子曰夫子産於民為惠主於學為博物晏子於君為忠臣而行為恭敏故吾皆以兄事之而加愛敬齊有一足之鳥飛集於宫朝下止于殿前舒翅而跳齊侯大怪之使使聘魯問孔子孔子曰此鳥名曰商羊水祥也昔童兒有屈其一脚振訊兩眉而跳且謡曰天將大雨商羊鼔儛今齊有之其應至矣急告民趨治溝渠修隄防將有大水為灾}
