  - {type: variant, offset: 85, length: 1, content: 敢, WYG: 與之者孔子曰夫子産於民為惠主於學為博物晏子於君為忠臣於行為恭敏故吾皆以兄事之而加愛敬齊有一足之鳥飛集於公朝下止於殿前舒翅而跳齊侯大怪之使使聘魯}
