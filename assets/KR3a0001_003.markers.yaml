  - {type: variant, offset: 21, length: 2, content: 唯士, SBCK: 曰夫説者流於辯也失也流猶過聽者亂於辭如此二者則道不可以忘也弟子行第十二衛將軍文子彌牟也衞卿名問於子貢曰吾聞孔子之施敎也先之以詩書而道之以孝悌説之以仁義觀之以禮樂然後成之以文徳盖入室升堂者七十有餘人其孰為賢子貢對以不知文子曰以吾子常}
  - {type: page-break, offset: 21, content: '', id: KR3a0001_SBCK_003-5a}
  - {type: variant, offset: 21, length: 1, content: 唯, WYG: 對曰丘未之見也抑有衛靈公乎公曰吾聞其閨門之内無别而子次之賢何也孔子曰臣語其朝廷行事不論其私家之際也公曰其事何如孔子對曰靈公之弟曰公子渠牟其智足以治千乗其信足以守之靈公愛而任之又有}
  - {type: page-break, offset: 21, content: '', id: KR3a0001_WYG_003-11a, image: WYG0695/WYG0695-0031c.png}
  - {type: variant, offset: 21, length: 2, content: 唯士, krp: 曰夫説者流於辯也失也流猶過聽者亂於辭如此二者則道不可以忘也弟子行第十二衛將軍文子彌牟也衞卿名問於子貢曰吾聞孔子之施敎也先之以詩書而道之以孝悌説之以仁義觀之以禮樂然後成之以文徳盖入室升堂者七十有餘人其孰為賢子貢對以不知文子曰以吾子常}
  - {type: variant, offset: 23, length: 0, content: '', WYG: 曰林國者見賢必進之而退}
  - {type: variant, offset: 24, length: 4, content: 大夫言聞, SBCK: 學賢者}
  - {type: variant, offset: 24, length: 0, content: '', WYG: 分其禄是以靈公無逰放之士靈公賢而尊之又有士曰慶足者衛國有大事則必起而治之國無事則退而容賢言其所以退者欲以容賢於朝靈公悦而敬之又有}
  - {type: variant, offset: 24, length: 4, content: 大夫言聞, krp: 學賢者}
  - {type: line-break, offset: 26, content: '', id: WYG_001-6b.02}
  - {type: variant, offset: 26, length: 0, content: '', WYG: 史鰌以道去衛而靈公郊舎三日琴瑟不御必待史鰌之入而後敢入臣以此取之雖次之賢不亦可乎子貢問於孔子曰今之人臣孰為賢子曰吾未識也往者齊有鮑叔鄭有子皮則賢者矣子貢曰齊無管仲鄭無子産子曰賜汝徒知其一未知其二也汝聞用力為賢乎進賢為賢乎子貢曰進賢賢哉子曰然吾聞鮑叔達管仲子皮達子産未聞二子之達賢已之才者也哀公問於孔子曰寡人聞忘之甚者徙而忘其妻有諸孔子對曰此猶未甚者也甚者乃忘其身公曰可得而聞乎孔子曰昔者夏桀貴為天子富有四海忘其聖祖之道壊其典法廢其世祀荒于滛樂躭湎于酒佞臣諂諛窺導其心忠士折口逃罪不}
  - {type: page-break, offset: 26, content: '', id: KR3a0001_WYG_003-11b, image: WYG0695/WYG0695-0031d.png}
  - {type: page-break, offset: 26, content: '', id: KR3a0001_WYG_003-12a, image: WYG0695/WYG0695-0032a.png}
  - {type: variant, offset: 27, length: 0, content: '', WYG: 折口杜口天下誅桀而有其國此謂忘其身之甚矣顔淵將西遊於宋問於孔子曰何以為身子曰恭敬忠信而已矣恭則遠於患敬則人愛之忠則和於衆信則人任之勤斯四者可以政國豈特一身者哉特但故夫不比於數而比於疎不亦逺乎不比親數近疎逺也不修其中而修外者不亦反乎慮不先定臨事而謀不亦晚乎孔子讀詩于正月六章惕然如懼曰彼不達之君子豈不殆哉從上依世則道廢違上離俗則身危時不興善已獨由之則曰非妖即妄也故賢也既不遇天恐不終其命焉桀殺龍逄紂殺比干皆是類也詩曰謂天葢髙不敢不局謂地葢厚不敢不蹐此正月六章之辭也局曲也言天至髙已不敢不曲身危行恐上觸忌諱也蹐累足也言地至厚己不敢不累足懼陷累在位之羅􅃠也此言上下畏罪無所自容也子路問於孔子曰賢君治國所先者何孔子曰在於尊賢而賤不肖子路曰由}
  - {type: page-break, offset: 27, content: '', id: KR3a0001_WYG_003-12b, image: WYG0695/WYG0695-0032b.png}
  - {type: page-break, offset: 27, content: '', id: KR3a0001_WYG_003-13a, image: WYG0695/WYG0695-0032c.png}
  - {type: variant, offset: 28, length: 0, content: '', WYG: 晉中行氏尊賢而賤不肖矣其亡何}
  - {type: punctuation, offset: 29, content: 。, id: KR3a0001_CHANT_003-bkkpn7}
  - {type: line-break, offset: 29, content: '', id: SBCK_001-7a.09_dup2}
  - {type: 'tls:seg', offset: 29, content: '', id: KR3a0001_CHANT_003-1a.8}
  - {type: variant, offset: 29, length: 2, content: 至於, SBCK: 不知何謂子貢對曰賢人無妄無妄賢人不妄舉動知賢即難故}
  - {type: variant, offset: 29, length: 0, content: '', WYG: 孔子曰中行氏尊賢而不能用賤不肖而不能去賢者知其不用而怨之不肖者知其必已賤而讐之怨讐竝存於國隣敵搆兵於郊中行氏雖欲無亡豈可得乎孔子閒處喟然而嘆曰嚮使銅鞮伯華無死則天下其有定矣子路曰由願聞其人也子曰其㓜也敏而好學其壯也有勇而不屈其老也有道能下人有此三者以定天下也何難乎哉子路曰㓜而好學壯而有勇則可也若夫有道下人又誰下哉子曰由不知吾聞以衆攻寡無不剋也以貴下賤無不得也昔者周公居冡宰之尊制天下之政而猶下白屋之士草屋也日見百七十人斯豈以無道也欲得士之用也惡有有道而無下天下君子哉齊景公來適魯舎于公館使晏嬰迎孔子孔子}
  - {type: page-break, offset: 29, content: '', id: KR3a0001_WYG_003-13b, image: WYG0695/WYG0695-0032d.png}
  - {type: variant, offset: 29, length: 2, content: 至於, krp: 不知何謂子貢對曰賢人無妄無妄賢人不妄舉動知賢即難故}
  - {type: variant, offset: 30, length: 0, content: '', WYG: 景公問政焉孔子荅曰政在節財公悦又問曰秦穆公國小處僻而霸何也孔子曰其國雖小其志大處雖僻而其政中其舉也果其謀也和法無私而令不愉愉宜為偷偷苟且也首拔五羖爵之大夫首宜為身五羖大夫百里奚也與語三日而授之以政此取之雖王可其覇少矣景公曰善哉哀公問政}
  - {type: page-break, offset: 30, content: '', id: KR3a0001_WYG_003-14a, image: WYG0695/WYG0695-0033a.png}
  - {type: variant, offset: 31, length: 1, content: 君, WYG: 孔子孔子對曰政之急者莫大乎使民富且夀也公曰為之奈何孔子曰省力役薄賦斂則民富矣敦禮教逺罪疾則民夀矣公曰寡人欲行夫}
  - {type: page-break, offset: 35, content: '', id: KR3a0001_SBCK_001-7b}
  - {type: variant, offset: 35, length: 2, content: 者希, SBCK: 曰智莫難於知人是以難對}
  - {type: variant, offset: 35, length: 0, content: '', WYG: 恐吾國貧矣孔子曰詩云愷悌君子民之父母未有子富而父母貧}
  - {type: variant, offset: 35, length: 2, content: 者希, krp: 曰智莫難於知人是以難對}
  - {type: punctuation, offset: 36, content: ，, id: KR3a0001_CHANT_003-bkkpn8}
  - {type: 'tls:seg', offset: 36, content: '', id: KR3a0001_CHANT_003-1a.9}
  - {type: variant, offset: 36, length: 1, content: 希, WYG: ''}
  - {type: punctuation, offset: 38, content: 。, id: KR3a0001_CHANT_003-bkkpn9}
  - {type: 'tls:seg', offset: 38, content: '', id: KR3a0001_CHANT_003-1a.10}
  - {type: variant, offset: 38, length: 36, content: 於乎吾以王言之其出不戶牖而化天下曾子起下席而對曰敢問何謂王者言孔子不應曾, SBCK: 文}
  - {type: variant, offset: 38, length: 0, content: '', WYG: 衛􅂕公問}
  - {type: variant, offset: 38, length: 36, content: 於乎吾以王言之其出不戶牖而化天下曾子起下席而對曰敢問何謂王者言孔子不應曾, krp: 文}
  - {type: variant, offset: 39, length: 0, content: '', WYG: 孔子曰有語寡人有國家者計之於廟堂之上則政治矣何如孔子曰其可也愛人者則人愛之惡人者則人惡之知得之已者則知得之人所謂不出環堵之室而知天下者知反已之謂也孔子見宋君君問孔子曰吾欲使長有國而列都得之國之列都皆得其道吾欲使民無惑吾欲使士竭力吾欲使日月當時吾欲使聖人自來吾欲使官府治理為之奈何孔子對曰千乗之君問丘者多矣而未有若主君之問問之悉也然主君所欲者盡可得也丘聞之鄰國相親則長有國君惠臣忠則列都得之不殺無辜無釋罪人則民不惑士益之禄則皆竭力尊天敬鬼則日月當時崇道貴徳則聖人自來任能黜否則官府治理宋君曰善哉豈不然}
  - {type: page-break, offset: 39, content: '', id: KR3a0001_WYG_003-14b, image: WYG0695/WYG0695-0033b.png}
  - {type: page-break, offset: 39, content: '', id: KR3a0001_WYG_003-15a, image: WYG0695/WYG0695-0033c.png}
  - {type: punctuation, offset: 40, content: ！, id: KR3a0001_CHANT_003-bkkpn10}
  - {type: 'tls:seg', offset: 40, content: '', id: KR3a0001_CHANT_003-1a.11}
  - {type: variant, offset: 40, length: 0, content: '', WYG: 寡人不佞不足以致之也孔子曰此事非難唯欲行之云耳辨政第十四子貢問於孔子曰昔哉齊君問政於夫子夫子曰政在節財魯君問政於夫子夫子曰政在諭臣葉公問政於夫子夫子曰政在悦近而來遠三者之問一也而夫子應之不同然政在異端乎孔子曰各因其事也齊君為國奢乎臺榭淫于苑囿五官伎樂不懈於時一旦而賜人以千乗之家者三故曰政在節財魯君有臣三人孟孫叔孫季孫三人内比周以愚其君外距諸侯之賔以蔽其明故曰政在諭臣夫荆之地廣而都狹民有離心莫安其居故曰政在悦近而來遠此三者所以為政殊矣詩云喪亂蔑資曾不惠我師蔑無也資財也師衆也夫為亡亂之政重賦厚斂民無資財曾莫肯愛我衆此傷奢侈不節以為亂者也又曰匪其止共惟王之卭止息也卭病也纔人不共所止息故惟王之病此傷姦臣蔽主以為亂也又曰亂罹瘼矣奚其適歸離憂也瘼病也言離散以成憂憶禍亂於斯歸於禍亂者也此傷離散以為亂者也察此三者政之所欲豈同乎哉孔子曰忠臣之諌君有五義焉一曰譎諌正其事以譎諫其君二曰戅諌戅諫無文餙也三曰降諌卑降其體所以諫也四曰直諌五曰諷諌唯度主而行之}
  - {type: page-break, offset: 40, content: '', id: KR3a0001_WYG_003-15b, image: WYG0695/WYG0695-0033d.png}
  - {type: page-break, offset: 40, content: '', id: KR3a0001_WYG_003-16a, image: WYG0695/WYG0695-0034a.png}
  - {type: variant, offset: 41, length: 0, content: '', WYG: 從其諷諌乎風誦依違逺罪避害者也子曰夫道不可不貴也中行文子倍道失義}
  - {type: variant, offset: 42, length: 0, content: '', WYG: 亡其國而能禮賢以活其身此説背義失道不且説得道之意而云禮賢不與上相次配又文子無禮賢之事中行文子得罪於晉出亡至邊從者曰謂此嗇夫者君子也故休馬待駿者文子曰吾好音子遺吾琴好珮子遺吾玉是以不振吾過自容於我者也吾恐其以我求容也遂不入車人聞文子之所言執而不殺之孔子聞之曰文子倍道失義以亡其國然得之由活其身而能禮賢以為宜以然後得也聖人轉禍為福此謂是與若入將死不入得活故曰轉禍為福楚}
  - {type: page-break, offset: 42, content: '', id: KR3a0001_WYG_003-16b, image: WYG0695/WYG0695-0034b.png}
  - {type: variant, offset: 43, length: 0, content: '', WYG: 將遊荆臺司馬子祺諌王怒之令尹子西賀於殿下諌曰今荆臺之樂不可失也王喜拊子西之背曰與子共樂之矣子西歩馬十里引轡而止曰臣願言有道王肯聴之乎王曰子其}
  - {type: variant, offset: 45, length: 0, content: '', WYG: 子西曰臣聞為人臣而忠}
  - {type: line-break, offset: 46, content: '', id: WYG_001-6b.03}
  - {type: variant, offset: 46, length: 1, content: 出, WYG: 君者爵禄}
  - {type: variant, offset: 48, length: 2, content: 戶牖, WYG: 足以賞也諛其君者刑罰不足以誅也夫子祺者忠臣也}
  - {type: page-break, offset: 48, content: '', id: KR3a0001_WYG_003-17a, image: WYG0695/WYG0695-0034c.png}
  - {type: line-break, offset: 51, content: '', id: SBCK_001-7b.02}
  - {type: variant, offset: 51, length: 4, content: 化天下曾, WYG: 臣者諛臣也願主賞忠而誅諛焉王曰今我聴司馬之諫是獨能禁我耳若後世遊之可也}
  - {type: punctuation, offset: 54, content: 。, id: KR3a0001_CHANT_003-bkkpn11}
  - {type: punctuation, offset: 54, content: 」, id: KR3a0001_CHANT_003-bkkpn12}
  - {type: 'tls:seg', offset: 54, content: '', id: KR3a0001_CHANT_003-1a.12}
  - {type: variant, offset: 56, length: 0, content: '', WYG: 西曰禁後世易耳大王萬歲之後}
