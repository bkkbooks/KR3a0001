  - {type: variant, offset: 12, length: 0, content: '', SBCK: 御敬叔與俱至周問禮於老聃訪樂於萇弘大夫弘周歴郊社之所考明堂之則法則察廟朝之度之法度也宗廟朝廷於是喟然曰吾乃今知周公之聖與周之所以王也及去周老子送之曰吾聞富貴者送人以財仁者送人以言吾雖不能富貴而竊仁者之號請送子以言乎凡當今之士聰明深察而近於死者好譏議人者也博辯閎達而危其身好發人之惡者也無以有已為人子者有之也身父母無以惡已為人臣者聽言身全行臣之節也則仕不用則退保}
  - {type: page-break, offset: 12, content: '', id: KR3a0001_SBCK_003-2b}
  - {type: variant, offset: 12, length: 0, content: '', krp: 御敬叔與俱至周問禮於老聃訪樂於萇弘大夫弘周歴郊社之所考明堂之則法則察廟朝之度之法度也宗廟朝廷於是喟然曰吾乃今知周公之聖與周之所以王也及去周老子送之曰吾聞富貴者送人以財仁者送人以言吾雖不能富貴而竊仁者之號請送子以言乎凡當今之士聰明深察而近於死者好譏議人者也博辯閎達而危其身好發人之惡者也無以有已為人子者有之也身父母無以惡已為人臣者聽言身全行臣之節也則仕不用則退保}
