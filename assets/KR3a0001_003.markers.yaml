  - {type: variant, offset: 87, length: 0, content: '', krp: 子貢曰夫子之門人蓋有三千就焉賜有逮及焉未逮及焉故不得徧知以告也文子曰吾子所及者請問其行子貢對曰夫能夙興夜寐諷誦崇禮行不貳過不知知之未甞復行貳再也有不善未甞也稱言不苟不苟且也舉言典法是顔囘之行也}
