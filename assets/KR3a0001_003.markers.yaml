  - {type: variant, offset: 757, length: 514, content: 百步為里千步而井三井而埒埒三而矩五十里而都封百里而有國乃為蓄積資聚焉恤行者有無是以蠻夷諸夏雖衣冠不同言語不合莫不來賓故曰無市而民不乏無刑而民不亂田獵罩弋非以盈宮室也徵斂百姓非以盈府庫也慘怛以補不足禮節以損有餘多信而寡貌其禮可守其言可復其跡可履如飢而食如渴而飲民之信之如寒暑之必驗故視遠若邇非道邇也見明德也是故兵革不動而威用利不施而親此之謂明王之守折衝千里之外者也曾子曰敢問何謂三至孔子曰至禮不讓而天下治至賞不費而天下之士說至樂無聲而天下之民和明王篤行三至故天下之君可得而知天下之士可得而臣天下之民可得而用曾子曰敢問此義何謂孔子曰古者明王必盡知天下良士之名既知其名又知其實又知其數及其所在焉然後因天下之爵以尊之此之謂至禮不讓而天下治因天下之祿以富天下之士此之謂至賞不費而天下之士說如此則天下之名譽興焉此之謂至樂無聲而天下之民和故曰所謂天下之至仁者能合天下之至親也所謂天下之至明者能舉天下之至賢者也此三者咸通然後可以征是故仁者莫大乎愛人智者莫大乎知賢賢政者莫大乎官能有土之君修此三者則四海之內共命而已矣夫明王之所征必道之所廢者也是故誅其君而改其政弔其民而不奪其財故明王之政猶時雨之降降至則民說矣是故行施彌博得親彌眾此之謂還師衽席之上, SBCK: 終}
