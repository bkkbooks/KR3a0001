  - {type: variant, offset: 371, length: 449, content: 時而無征關譏市鄽皆不收賦此則生財之路而明王節之何財之費乎曾子曰敢問何謂七教孔子曰上敬老則下益孝上尊齒則下益弟上樂施則下益寬上親賢則下擇友上好德則下不隱上惡貪則下恥爭上廉讓則下恥節此之謂七教七教者治民之本也政教定則本正矣凡上者民之表也表正則何物不正是故人君先立仁於己然後大夫忠而士信民敦俗樸男愨而女貞六者教之致也布諸天下四方而不窕納諸尋常之室而不塞等之以禮立之以義行之以順則民之棄惡如湯之灌雪焉曾子曰道則至矣弟子不足以明之孔子曰參以為姑止乎又有焉昔者明王之治民也有法必裂地以封之分屬以理之然後賢民無所隱㬥民無所伏使有司日省而時考之進用賢良退貶不肖然則賢者說而不肖者懼哀鰥寡養孤獨恤貧窮誘孝弟選才能此七者修則四海之內無刑民矣上之親下也如手足之於腹心下之親上也如幼子之於慈母矣上下相親如此故令則從施則刑民懷其德近者說服遠者來附政之致也夫布指知寸布手知尺舒肘知尋斯不遠之則也周制三百步為里千步而井三井而埒埒三而矩五十里而都封百里而有國乃為蓄積資聚焉恤行者有無是以蠻夷諸夏雖衣冠不同言語不合莫不來賓故曰無市而, WYG: ''}
