  - {type: variant, offset: 108, length: 0, content: '', SBCK: 之大霖雨水溢泛諸國傷害民人唯齊有備不敗景公曰聖人之言信而徴矣孔子謂宓子賤曰子治單父衆悦子何施而得之也子語丘所以為之者對曰不齊之治也父恤其子其子䘏諸孤而哀喪紀孔子曰善小節也小民附矣猶未足也曰不齊所父事者三人所兄事者五人所友事者十一人孔子曰父事三人可以敎孝矣兄事五人可以敎悌矣友事十一人可以舉善矣中節也中人附矣猶未足也曰此地民有賢於不齊者五人不齊事之而禀度焉皆敎不齊之道}
