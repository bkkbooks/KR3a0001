  - {type: variant, offset: 17, length: 0, content: '', krp: 明堂覩四門墉有堯舜之容桀紂之象而各有善惡之状興廢之誡焉又有周公相成王抱之負斧扆南靣以朝諸侯之圖焉天子之位失之逺矣也世之博學者謂周公便履孔子徘徊而望之謂從者曰此周公所以盛也夫明鏡所以察形徃古者所以知}
  - {type: variant, offset: 18, length: 0, content: '', SBCK: 人主不務襲迹於其所以安存而忽怠所以危亡是猶未有以異於却走而欲求及前人也豈不惑哉孔子觀周遂入太祖后稷之廟廟堂右階之前有金人焉三緘其口而銘其背曰古之慎言人也戒之哉無多言多言多敗無多事多事多患安樂必戒必警戒也雖處安樂無所行悔悔之事不可復行言當詳而後行所勿謂何傷其禍將長勿謂何害其禍將大勿謂不聞神􅀅伺人熖熖不滅炎炎若何涓涓不壅終為江河綿綿不絶或成網羅則有成羅網者也綿綿微細若不絶毫末不札將尋斧柯札㧞也㝷用者也如毫之末言至微也誠能慎之福之根也口是何傷禍之門也强梁者不得其死好勝者必遇其敵盗憎主人民怨其上君子知天下之不可上也故下之知衆人之不可先也故後之温恭慎徳使人慕之執雌持下人莫踰之人皆趨彼我獨守此人皆或之我獨不徙東西或之之貌轉移内藏我智不示人技我雖尊髙人弗我害誰能於此江海雖左長於百川以其卑也而能爲百川長以其能下水隂長右江海雖在於其左天道無親而能下人戒之哉孔子既讀斯文也顧謂弟子曰小人識之志音此言實而中情而信詩曰戰戰競競如臨深淵如履薄氷戰戰恐墜也恐䧟也恐也競競戒也行身如此豈以口過患哉孔子見老聃而問焉曰甚矣道之於今難行也吾比執道而今委質以求當世}
