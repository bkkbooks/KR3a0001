  - {type: variant, offset: 94, length: 1, content: 肅, SBCK: 對曰靈公之弟曰靈公弟子渠牟其智足以治千乗其信足以守之靈公愛而任之又有士林國者見賢必進之而退與分其禄是以靈公無逰放之士靈公賢而尊之又有士曰慶足者衛國有大事則必起而治之國無事則退而容賢欲以容賢於朝言其所以退者靈公悦而敬之又有大夫史鰌以道去衛而靈公郊舎三日琴瑟不御必待史鰌之入而後敢入臣以此取之雖次之賢不亦可乎子貢問於孔子曰今之人臣孰為賢子曰吾未識也徃者齊有鮑叔鄭有子皮則賢者矣子貢曰齊無管仲鄭無子産子曰賜汝徒知其一未知其二也汝聞用力為賢乎進賢為賢乎子貢曰進賢賢哉子曰然吾聞鮑叔達管仲子皮達子産未聞二子之達賢已之才者也哀公問於孔子曰寡人聞忘之甚者徙而忘其妻有諸孔子對曰此猶未甚者也甚者乃忘其身公曰可得而聞乎孔子曰昔者夏桀貴為天子富有四海忘其聖祖之道壊其典法廢其世祀荒於滛樂躭􅊺於酒佞臣諂諛窺導其心忠士折口逃罪不言杜口折口天下誅桀而有其國此謂忘其身之甚矣顔淵將西遊於宋問於孔子曰何以為身子曰恭敬忠信而已矣恭則遠於患敬則人愛之忠則和於衆信則人任之勤斯四者可以政國豈特一身者哉但特故夫不比於數而比於踈不亦逺乎近踈逺也不比親數不修其中而修外者不亦反乎慮不先定臨事而謀不亦晚乎孔子讀詩于正月六章惕焉如懼曰彼不達之君子豈不殆哉從上依世則道廢違上離俗則身危時不興善已獨由之則曰非妖即妄也故賢也既不遇天恐不終其命焉桀殺龍逄紂殺比干皆類是也詩曰謂天蓋髙不敢不局謂地蓋厚不敢不蹐不敢不曲身危行恐上干忌諱也蹐累足此正月六章之辭也局曲也言天至髙已足恐䧟累在位之羅網也言地至厚已不敢不累此言上下畏罪無所自容也子路問於孔子曰賢君治國所先者何孔子曰在於尊賢而賤不肖子路曰由聞晉中行氏尊賢而賤不肖矣其亡何也孔子曰中行氏尊賢而不能用賤不肖而不能去賢者知其不用而怨之不肖者知其必已賤而讎之怨讎並存於國鄰敵搆兵於郊中行氏雖欲無亡豈可得乎孔子閒處喟}
