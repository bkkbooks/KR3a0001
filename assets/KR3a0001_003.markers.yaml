  - {type: 'tls:seg', offset: 17, content: '', id: KR3a0001_CHANT_003-1a.6}
  - {type: variant, offset: 17, length: 0, content: '', SBCK: 明堂覩四門墉有堯舜之容桀紂之象而各有善惡之状興廢之誡焉又有周公相成王抱之負斧扆南靣以朝諸侯之圖焉天子之位失之逺矣也世之博學者謂周公便履孔子徘徊而望之謂從者曰此周公所以盛也夫明鏡所以察形徃古者所以知}
  - {type: page-break, offset: 17, content: '', id: KR3a0001_SBCK_003-3a}
  - {type: variant, offset: 17, length: 0, content: '', WYG: 子貢以其辭狀告孔子子聞而笑曰賜汝次為人矣言為知人之次子貢對曰賜也何敢知人此以賜之所覩也孔子曰然吾亦語汝耳之所未聞目之所未見者豈思之所不至智之所未及哉子貢曰賜願得聞之孔子曰不克不忌不念舊怨葢伯夷叔齊之行也思天而敬人服義而行信孝於父母恭於兄弟從善而不教道趙文子之行也其事君也不敢愛其死然亦不敢忘其身謀其身不遺其友君陳則進而用之陳謂陳列於君為君之使用也不陳則行而退葢隨武子之行也其為人之淵源也多聞而難誕誕欺内植足以沒其世國家有道其言足以治無道其黙足以生葢銅鞮伯華之行也外寛而内正自極於隱括之中隠括所以自極直已而不直人汲汲於仁以善自終葢蘧伯玉之行也孝恭慈仁允徳圖義允信也圖謀也約貨去怨夫利怨之所聚故約省其貨以逺去其怨輕財不匱葢栁下惠之行也其言曰君雖不量於其身謂不量度其臣之徳噐也臣不可以不忠於其君是故君既擇臣而任之臣亦擇君而事之有道順命君有道則順從其命無道衡命衡横也謂不受其命而隠居者也葢晏平仲之行也蹈忠而行信終日言不在尤之内尤過國無道處賤不悶悶憂貧而能樂葢老萊子之行也易行以俟天命易治居下不援其上雖在下位不攀援其上以求進其親觀於四方也不忘其親不盡其樂雖有觀四方之樂常念其親不盡其歸之以不能則學不為巳終身之憂凡憂憂所知不能則學何憂之有葢介子山之行也子貢曰敢問夫子之所知者葢盡於此而已乎孔子曰何謂其然亦略舉耳目之所及而已昔晉平公問祁奚曰羊舌大夫晉之良大夫也其行如何祁奚辭以不知公曰吾聞子少長乎其所於其所長今子掩之何也祁奚對曰其少也恭而順心有恥而不使其過宿心常有所恥惡及其有過不令更宿輒改其為大夫悉善而謙其端盡善道而謙讓是其正也其為輿尉也信而好直其功言其功直至於其為容也温良而好禮博聞而時出其志時出以其出之誨未及之是其志也公曰曩者問子子奚曰不知也祁奚曰毎位改變未知所止是以不敢得知也此又羊舌大夫之行也子貢跪曰請退而記之賢君第十三哀公問於孔子曰當}
