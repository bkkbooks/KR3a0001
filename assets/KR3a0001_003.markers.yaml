  - {type: variant, offset: 7, length: 2, content: 閑居, SBCK: 謂南宫敬叔曰吾聞老聃博古知今老子博古知今而好道敬叔孟僖子子也老􅆅通禮樂之原明道徳之歸則吾師也今將徃矣對曰謹受命遂言於魯君曰臣受先臣之命僖子先臣云孔子聖人之後也殷湯聖人滅於宋宋奔魯故曰孔子之先去宋也滅於其祖弗父何始有國而授厲公何緡弗父曰以有宋而授厲公宜始始也始有宋也公世子厲公兄也讓國以授厲公春秋傳及正考父佐戴武宣也戴武宣三公也正考父何之}
  - {type: page-break, offset: 7, content: '', id: KR3a0001_SBCK_003-1b}
  - {type: variant, offset: 7, length: 5, content: 閑居曾參侍, WYG: 言之曰其不伐則猶可能也其不弊百姓則仁也不弊愚百姓即所謂不傲之也詩云愷悌君子民之父母愷樂也悌易也樂以强敎之易以悦安之民皆有父之尊母之親也夫子以其仁為大學之深學而能入其深義也送迎必敬送迎賔客常能敬也上交下接若截焉是卜商之行也孔子説之以詩曰式夷式已無小人殆式用夷平也言用平則已也殆危者無以小人至於危也若商也其可謂不險矣險危也言子夏常厲以斷之近小人斯不危貴之不喜賤之不怒苟利於民矣廉於行已其事上也以佑其下言所以事上乃欲佑助其下也是澹臺㓕明之行也}
  - {type: page-break, offset: 7, content: '', id: KR3a0001_WYG_003-7b, image: WYG0695/WYG0695-0029d.png}
