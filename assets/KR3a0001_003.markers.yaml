  - {type: variant, offset: 10, length: 1, content: 參, SBCK: 孫三命兹益恭再命卿三命是也考父士一命其大夫故其鼎銘曰於其宗廟之鼎也臣有功德君命銘之一命而僂再命而傴三命而俯俯恭於傴傴恭於僂循墻而走之甚言恭亦莫余敢侮恭如此故人亦莫之侮余我也我考父也以其饘於是粥於是以餬其口此鼎言至儉也饘麋也爲糜粥於其恭儉也若此臧孫紇有言聖人之後若不當世之後而不繼世爲宋君紇臧武仲弗父何殷湯則必有明君而達者焉孔子少而好禮其將在矣孔子將在屬臣曰汝必師之今孔子將適周觀先生之遺制考禮樂之所極斯大業也君盍以乗資之臣請與徃公曰諾與孔子車一乗馬二疋堅其}
  - {type: page-break, offset: 10, content: '', id: KR3a0001_SBCK_003-2a}
