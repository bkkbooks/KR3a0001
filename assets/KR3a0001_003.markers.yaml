  - {type: variant, offset: 89, length: 0, content: '', SBCK: 説之以詩曰媚兹一人應侯慎徳天子一人以媚愛天子當於其心惟愼德也應當也侯惟也言顔淵之德之永言孝思孝思惟則足以爲法則也言能長是孝道若逄有徳之君世受顯命不失厥名以御于天子則王者之相也在貧如客矜莊如爲客也言不以貧累志使其臣如借如借使之也言不有其臣不遷怒不深怨不録舊罪是冉雍之行也孔子論其材曰有土之君子也有衆使也有刑用也然後稱怒焉後可以稱怒冉雍非有土之君故使其言有土地之君有衆足使有刑足用然不加怒也臣如借而孔子告之以詩曰靡不有初鮮克有終終其行冉雍能疋夫不怒唯以亡其身說因疋夫以怒亡身不怒之義遂及不畏强禦不侮矜寡其言循性言不誣其爾循其性也而其都以富於富貴仲由長材任治戎旅也戎軍是仲由之行也孔子和之以文説之以詩曰受小拱大拱而為下國駿龎荷天子之龍詳此其義也拱法也駿大也孔子曰和仲由以文說之以下國大厚乃可任天下道也龎厚也龍荷之言受大小法爲不戁不悚敷奏其勇敷陳奏薦戁恐悚懼强乎武哉文不勝其質文不勝其質言子路强勇恭老䘏㓜不忘賔旅謂􅀉賔旅也客好學博藝省物而勤也而能勸也省錄諸事是冉求之行也孔子因而語之曰好學則智䘏孤則惠恭則近禮勤則有繼堯舜篤恭以王天下其稱之也曰宜為國老宣徳教國老助齊莊而能肅志通而好禮擯相兩君之事篤雅有節是公西赤之行也子曰禮經三百可勉能也勉學而能知禮經三百可威儀三千則難也可爲而公西赤能躬行之能躬行三千之威儀則難公西赤問曰何謂也子曰貌以儐禮禮以儐辭是謂難焉其禮而儐相其辭度事制儀故難也言所以爲者當觀容貌而儐相其禮度衆人聞之以為成也孔子語人曰當賔客之事則達矣儀故以爲成也孔子曰當賔客衆人聞公西赤能行三千之威於治國之本體也之事則達未盡達謂門人曰二三子之欲學賔客之禮者其於赤也滿而不盈實而者是顓孫師之行也孔子言之曰其不伐則猶可能也其不􅁦百姓則仁也百姓即不􅁦愚傲之也所謂不詩云愷悌君子民之父母易也樂愷樂悌皆有是父之尊母之親也以强教之易以說安之民夫子以其仁爲大學之深其深義也學而能入送迎必敬常能敬也送迎賔客上交下接若截焉是卜商之行也孔子説之以詩曰式夷式已無小人殆也言用平式用夷平以小人至於危也則已也殆危也無若商也其可謂不險矣斷之近小人斷不危險危也言子夏常厲以貴之不喜賤之不怒苟利於民矣廉於行已其事上也以佑其下欲佑助其下也言所以事上乃是澹臺滅明之行也孔子曰獨貴獨富君子助之夫也中之矣中猶當也夫謂㓕明先成其慮及事而用之故動則不妄是言偃之行也孔子曰欲能則學欲知則問欲善則詳當詳慎也欲善其事欲給則豫欲事莫若於豫給而不礙則當是而行偃也得之矣獨居思仁公言仁義其於詩也則一日三覆白圭之玷斯言之玷不可爲也一日三覆之玷缺也詩曰白圭之玷尚可磨也至也慎之是宫縚之行也孔子信其能仁以為異士姓婚姻也以兄之女妻之者也殊異之士也大戴引之曰以爲異自見孔子出入於户未嘗越禮徃來過之足不履影故跡不履影也言其徃來常跡啓蟄不殺發蟄蟲春分當時不殺生也啓戸咸出於此方長不折時草木不折春夏生長飬執親之喪未嘗見齒是髙柴之行也孔子曰柴於親喪則難能也啓蟄不殺則順人道方長不折則恕仁也成湯恭而以恕是以日隮焉四靣絶網乃去其三靣詩曰湯降隮升也成湯行恭而能恕出見博鳥之道其聖敬之德日升聞也不遲聖敬日隮言湯疾行下人凡此諸子賜之所親覩者也吾子有命而訊賜問訊賜也固不足以知賢文子曰吾聞之也國有道則賢人興焉中人用焉爲時用也中庸之人乃百姓歸之若吾子之論既富茂矣壹諸侯之相也皆壹抑世未有明君所以不遇也子貢既與衛將軍文子言適魯見孔子曰衛將軍文子問二三子之於賜不壹而三焉賜也辭不獲命以所見者對矣未知中否請以告孔子曰言之乎子貢以其辭狀告孔子子聞而笑曰賜汝次焉人矣人之次言爲知子貢對曰賜也何敢知人此以賜之所覩也孔子然吾亦語汝耳之所未聞目之所未見者豈思之所不至智之所未及哉子貢曰賜願得聞之孔子曰不克不忌不念舊怨蓋伯夷叔齊之行也思天而敬人服義而行信孝於父母恭於兄弟從善而不教蓋趙文子之行也其事君也不敢愛其死然亦不敢忘其身謀其身不遺其友君陳則進而用之爲君之使用也陳謂陳列於君不陳則行而退蓋隨武子之行也其爲人之淵源也多聞而難誕歎誕内植足以沒其世國家有道其言足以治無道其黙足以生蓋銅鍉伯華之行也外寛而内正自極於隱括之中以自極隱括所直已而不直人汲汲於仁以善自終蓋蘧伯玉之行也孝恭慈仁允徳圖義圖謀也允信也約貨去怨省其貨以逺去其怨夫利怨之所聚故約輕財不匱蓋桺下惠之行也其言曰君雖不量於其身臣之德􅄊也謂不量度其臣不可以不忠於其君是故君擇臣而任之臣亦擇君而事之有道順命順從其命君有道則無道衡命謂不受衡横也居者也其命之隱蓋晏平仲之行也蹈忠而行信終日言不在尤之内過尤國無道處賤不悶憂悶貧而能樂蓋老子之行也易行以俟天命治易居下不援其上援其上以求進雖在下位不攀其親觀於四方也不忘其親不盡其樂四方之雖有觀不盡其歸之樂常念其親以不能則學不為巳終身之憂則學何憂之有凡憂憂所知不能蓋介子山之行也子貢曰敢問夫子之所知者蓋盡於此而已乎孔子曰何謂其然亦畧舉耳目之所及而矣昔晉平公問祁奚曰羊舌大夫晉之良大夫也其行如何祁奚辭以不知公曰吾聞子少長乎其所所長於其今子掩之何也祁奚對曰其少也恭而順心有耻而不使其過􅀫有過不令更􅀫輙改心常有所耻惡及其其為大夫悉善而謙其端讓是其正也盡善道而謙其爲輿尉也信而好直其功言其功直至於其爲容也温良而好禮博聞而時出其志之誨未及之時出以其出志也是其公曰曩者問子子奚曰不知也祁奚曰毎位改變未知所止是以不敢得知也此}
