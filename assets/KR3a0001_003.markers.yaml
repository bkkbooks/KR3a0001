  - {type: variant, offset: 15, length: 1, content: 參, SBCK: 敬奉敎自周反魯道彌尊矣逺方弟子之進蓋三千焉孔子觀}
  - {type: variant, offset: 15, length: 1, content: 參, WYG: 獨貴獨富君子恥之夫也中之矣夫謂滅明中猶當也先成其慮及事而用之故動則不妄是言偃之行也孔子曰欲能則學欲知則問欲善則詳欲善其事當詳慎也欲給則豫事欲給而不礙則莫若於豫當是而行偃也得之矣獨居思仁公言言義其於詩也則一日三復白圭之玷玷缺也詩曰白圭之玷尚可磨也斯言之玷不可為也一日三復之慎之至也是宫縚之行也孔子信其能仁以為異士殊異之士也大戴引之曰以為異姓婚姻也以兄之女妻之者也自見孔子出入於户未嘗越履往來過之足不履影其言往來常跡故跡不履影也啓蟄不殺春分當發蟄蟲啓户咸出於此時不殺生也方長不折春夏生長養時草木不折執親之喪未嘗見齒是髙柴之行也孔子曰柴於親喪則難能也啓蟄不殺則順人道方長不折則恕仁也成湯恭而以恕是以日躋躋升也成湯行恭而能恕出見摶鳥焉四靣施綢乃去其三靣詩曰湯降不遲聖敬曰躋言湯疾行下人之道其聖敬之徳日升聞也凡此諸子賜之所親覩者也吾子有命而訊賜訊問賜也固不足以知賢文子曰吾聞之也國有道則賢人興焉中人用焉中庸之人為時用也乃百姓歸之若吾子之論既富茂矣壹諸侯之相也壹皆抑世未有明君所以不遇也子貢既與衛將軍文子言適魯見孔子曰衛將軍文子問二三子之於賜不壹而三焉賜也辭不獲命以所見者對矣未知中否請以告孔子曰言之}
