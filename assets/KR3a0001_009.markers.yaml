  - {type: variant, offset: 782, length: 0, content: '', SBCK: 君子也詩云君子是則是傚孟僖子可則傚矣懲已所病以誨其嗣大雅所謂詒厥孫謀以燕翼子是類也夫遺詒子孫加謀學安敬之道也也燕安也翼敬也言遺其衞孫文子得罪於獻公居戚父得罪以戚文子衞卿林也叛公卒未􅁙文子擊鐘焉延陵季子子札呉公適晉過戚聞之曰異哉夫子之在此猶燕子巢于幕也言至危也燕巢于幕懼猶未也又何樂焉君又在殯可乎文子於是終身不聽琴瑟孔子聞之曰季子能以義正人文子能克巳服義可謂善改矣孔子覽晉志史記晉之晉趙穿殺靈公從弟也穿趙盾趙盾亡未及山而還之境山晉史書趙盾弑君盾曰不然史曰子爲正卿亡不出境返不討賊非子而誰盾曰嗚呼我之懷矣自詒伊戚其我之謂乎孔子嘆曰董狐古之良史也書法不隱趙宣子古之良大夫也爲法受惡惜也越境乃免於譏而受弑君之惜盾不越境以免也責鄭伐陳入之使子産獻捷于晉晉人問陳之罪焉子産對曰陳亡周之大徳元女大武王以而封諸陳姬以配胡公介恃楚衆大介馮陵􅁦邑是以有徃年之告陳所侵告晉爲未獲命陳之成命未得晉平則又有東門之役至其東門也與楚共伐陳當陳隧者井陻木刋塞刋斫也勝陳人陻􅁦邑大懼天誘其􅇆進誘善大執陳者也􅇆善也天導其啓􅁦邑心知其罪校首於我用敢獻功晉人曰何故侵小對曰先王之命惟罪所在各致其辟誅辟且昔天子一圻列國一同方百里曰同也地方千里曰圻自是以衰周之制也十里子男五十里周之制也而説大國方百里從是以爲差伯方七七百里失之矣學者以周大國方今大國多數圻矣}
