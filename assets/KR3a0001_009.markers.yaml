  - {type: variant, offset: 7, length: 0, content: '', WYG: 仲思名衍或名泄嗣微子後故號微仲生宋公稽胄子雖遷爵易位而班級不及其故者得以故官為稱故二微雖為宋公而猶以微之號自終至于稽乃稱公焉宋公生丁公申申公生緡公共及襄公熙熙生弗父何及厲公方祀方祀以下世為宋卿弗父何生送父周周生世子勝勝生正考甫考甫生孔父嘉五世親盡别為公族故後以孔為氏焉一曰孔父者生時所賜號也是以子孫遂以氏族孔父生子木金父金父生睪夷睪夷生防叔避華氏之禍而犇魯防叔生伯夏夏生叔梁紇曰雖有九女是無子其妾生孟皮孟皮一字伯尼有足病於是乃求婚於顔氏顔氏有三女其小曰徵在顔父問三女曰陬大夫雖父祖為士然其先聖王之裔今其人身長十尺武力絶倫吾甚貪之雖年大性嚴不足為疑三子孰能為之妻二女莫對徵在進曰從父所制將何問焉父曰即爾能矣遂以妻之徵在旣往廟見以夫之年大懼不時有男而私禱尼丘山以祈焉生孔子故名丘字仲尼孔子三嵗而叔梁紇卒葬於防至十九娶於宋之上官氏生伯魚魚之生也魯昭公以鯉魚賜孔子榮君之貺故因以名鯉而字伯魚魚年五十先孔子卒齊太史子與適魯見孔子孔子與之言道子與悦曰吾鄙人也聞子之名不覩子之形久矣而未知寶貴也乃今而後知泰山之為髙淵海為大惜乎夫子之不逢明王道德不加於民而將垂寶以貽後世遂退而謂南宫敬叔曰今孔子先聖之嗣自弗父何以來世有德讓天所祚也成湯以武德王天下其配在文殷宗已下未始有也孔子生於衰周先王典籍錯亂無紀而乃論百家之遺記考正其義祖述堯舜憲章文武刪詩述書定禮理樂制作春秋讚明易道垂訓後嗣以為法式其文德著矣然凡所教誨束脩已上三千餘人或者天將欲與素王之乎夫何其盛也敬叔曰殆如吾子之言夫物莫能兩大吾聞聖人之後而非繼世之統其必有興者焉今孔子之道至矣乃將施乎無窮雖欲辭天之祚故未得耳子貢聞之以二子告孔子子曰豈若是哉亂而治之滯而起之自吾志天何與焉終記解第四十孔子蚤晨作作起負手曳杖逍遥於門而歌曰㤗山其頽乎梁木其壞乎喆人其萎乎委頓旣歌而入當户而坐子貢聞之曰㤗山其頺則吾將安仰梁木其壞則吾將安杖喆人其萎吾將安放放法夫子殆將病也遂趨而入夫子歎而言曰賜汝來何遲疇㫺夢坐奠於兩楹之間疇昔猶近昨夜兩楹之間殷人所殯夢而具奠於殯處故自知死也夏后氏殯於東階之上則猶在阼殷人殯於兩楹之間則與賓主夾之周人殯於西階之上則猶賓之而丘也即殷人夫明王不興則天下其孰能宗余言天下無明王莫能宗己道臨終其有命傷道之不行也余殆將死遂寢病七日而終時年七十二矣哀公誄曰旻天不弔不愸遺一老弔善也愸且也一老孔子也俾屏余一人以在位㷀㷀余在疚疚病於乎哀哉尼父無自律父丈夫之顯稱律法言無以自為法子貢曰公其不没於魯乎夫子有言曰禮失則昏名失則愆失志為昏失所為愆生不能用死而誄之非禮也稱一人非名一人天子之稱也君兩失之也旣卒門人疑所以服夫子者子貢曰昔夫子喪顔回也若喪其子而無服喪子路亦然今請喪夫子若喪父而無服於是弟子皆弔服而加麻出有所之則由絰子夏曰入宜絰可也出則不絰子游曰吾聞諸夫子喪朋友居則絰出則否喪所尊雖絰而出可也孔子之喪公西赤掌殯葬焉含以疎米三具疎稉米禮記曰稻曰嘉疎襲衣十有一稱加朝服一冠章甫之冠珮象環徑五寸而綨組綬組雜色組綬所以繫象環桐棺四寸柏棺五寸飭棺牆置翣設披周也設崇殷也綢練設旐夏也披柩行夾引棺者崇崇牙旍旗飾也綢練以練綢旌之杠此旌塟乘車所建也旌之旒緇布廣充幅長尋曰旐兼用三王禮所以尊師且備古也葬於魯城北泗水上藏入地不及泉而封為偃斧之形高四尺樹松柏為志焉弟子皆家於墓行心喪之禮旣葬有自燕來觀者舍於子夏氏子夏謂之曰吾亦人之葬聖人非聖人之葬人子奚觀焉㫺夫子言曰吾見封若夏屋者夏屋今之殿形中髙而四方下也見若斧矣從若斧者也上難登狹又易為功馬鬛封之謂也俗間之名今徒一日三斬板而以封板葢廣三尺長六尺斬板謂斬其縮三斬上傍殺葢髙四尺也尚行夫子之志而已尚庶何觀乎哉二三子三年喪畢或畱或去惟子貢廬於墓六年自後羣弟子及魯人處墓如家者百有餘家因名其居曰孔里焉正論解第四十一孔子在齊齊侯出田田獵招虞人以弓不進虞人掌山澤之官公使執之對曰昔先君之田也旃以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍之孔子聞之曰善哉守道不如守官道為恭敬之道見君召便往守官非守召不往也}
