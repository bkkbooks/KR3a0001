  - {type: variant, offset: 806, length: 0, content: '', WYG: 惜也不如多與之邑唯器與名不可以假人器禮樂之器名尊卑之名君之所司也名以出信信以守器器以藏禮有器然後得行其禮故曰器以藏禮禮以行義義以生利利以平民政之大節也若以假人與人政也政亡則國家從不可止已公父文伯之母文伯母敬姜也紡績不解文伯諫焉其母曰古者王后親織𤣥紞紞冠垂者公侯之夫人加之紘綖纓屈而上者謂之紘綖冠之上覆也卿之内子為大帶卿之妻為内子命婦成祭服大夫之妻為命婦列士之妻加之以朝服自庶士已下各衣其夫社而賦事烝而獻功男女春秋而勤歳事冬烝祭而獻其功也男女紡績愆則有辟績功也辟法也聖王之制也今我寡也爾又在位朝夕恪勤猶恐亡先人之業況有怠惰其何以避辟孔子聞之曰弟子志之季氏之婦}
