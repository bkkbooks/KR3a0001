  - {type: variant, offset: 784, length: 0, content: '', SBCK: 以至焉晉人曰其辭順孔子聞之謂子貢曰志有之書也志古之言以足志足成言以志其文以足言足成其言加以文章以不言誰知其志言之無文行之不逺雖行而不逺也有言而無文章晉爲鄭伯入陳非文辭不爲功小子愼哉楚靈王汰侈奢侈驕汰右尹子革侍坐名子革右尹官舟煞左史􅀝相趨而過王曰是良史也子善視之是能讀三墳五典八索九丘皇之書三墳三索法丘丘團聚也五典五帝之典八索對曰夫良史者記君之過揚君之善而此子以潤辭爲官不可爲良史曰臣又乃嘗聞焉昔周穆王欲肆其心極肆將過行天下使皆有車轍並馬迹焉祭公謀父作祈昭名猶齊景公作君臣謀父周卿士祈昭詩是也昭宜為招耳補作招相説之樂葢曰徴招角招以止王心心之止王逰逸王是以獲殆於文宫臣聞其詩焉而弗知若問逺焉其焉能知王曰子能乎對曰能其詩曰祈昭之愔愔乎式昭徳音愔愔祈昭足以昭其徳音者也言祈昭樂之安和其法思我王度式如玉式如金詩云追琢其章金玉其相思王之法度如金玉純美刑民之力而無有醉飽之心之不勝不節無有醉長而字刑傷民力用無厭足飽之心言靈王揖而入饋不食寢不寐數日則固不能勝其情以及於難孔子讀其志曰古者有志克己復禮爲}
