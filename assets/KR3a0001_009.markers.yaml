  - {type: variant, offset: 785, length: 0, content: '', krp: 勝巳私情克勝言能則爲仁也復之於禮信善哉楚靈王若能如是豈期辱於乾谿谿國人潰畔遂死焉靈王起章華之臺於乾子革之非左史所以風也稱詩以諫順哉叔孫穆子避難奔齊如淫亂故避之而出穆子叔孫豹其兄僑齊奔宿於庚宗之邑庚宗寡婦通焉而生牛牛名穆子返魯以牛爲内豎外之命豎通内相家遂長相家命為牛䜛叔孫二人殺之叔孫有病牛不通其饋不食而死牛遂輔叔孫庻子昭而立之孫婼子叔昭子旣立朝其家衆曰豎牛禍叔孫氏使亂大從順從殺適立庶又披其邑以求舍罪十邑以行賂也牛取叔氏鄙三罪莫大焉必速殺之遂殺豎牛孔子曰叔孫昭子之不勞立巳爲功勞力也不以不可能也周任有言曰古之周任人賢爲政}
  - {type: variant, offset: 786, length: 0, content: '', SBCK: 不賞私勞不罰私怨詩云有覺徳行四國順之直覺昭子有焉晉邢侯與雍子爭田叔魚攝理弟理獄官叔魚叔向名之罪在雍子雍子納其女於叔魚叔魚􅁦獄邢侯歸邢侯弊斷㫁罪邢侯怒殺叔魚與雍子於朝韓宣子問罪於叔向卿韓起也宣子晉正叔向曰三姦同坐施生戮死可也猶行行生者施宜爲與與也之罪雍子自知其罪而賂以置直鮒也鬻獄邢侯專殺其罪一也已惡而掠美爲昏即以賂求善爲惡也掠美善昏亂也巳惡貪以敗官爲黙冐苟黙猶畏罪貪不殺人不忌爲賊憚忌夏書曰昏黙賊殺者宜皆殺者也夏書夏家之書三咎陶之刑也請從之乃施邢侯而尸雍子叔魚於市孔子曰叔向古之遺直也治國制刑不隱於親三數叔魚之罪不爲末薄末或曰義作咸也或左傳可謂直矣平丘之㑹數其賄也以寛衞國晉不爲􅁀人患之賂叔向叔向使與叔魚客末追諸侯㑹于平丘晉人􅁋蒭蕘者於衞衞之而禁歸魯季孫稱其詐也以寛魯國晉不爲虐貴禮不肯歸叔向言叔魚能歸之叔魯季孫見執諮於晉晉人歸之季孫孫懼乃歸之魚説季孫季邢侯之獄言其貪也以正刑書晉不爲頗偏頗三言而除三惡加三利衞暴三惡加三利也虐魯殺三罪去殺親益榮由義也夫鄭有鄉校學校鄉之鄉校之士非論執政鬷明欲毁鄉校然明鬷明子産曰何以毁爲也夫人朝夕退而遊焉以議執政之善否其所善者吾則行之其所否者吾則改之}
