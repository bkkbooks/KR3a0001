  - {type: variant, offset: 786, length: 0, content: '', WYG: 不賞私勞不罰私怨詩云有覺徳行四國順之覺直也昭子有焉晉邢侯與雍子爭田叔魚攝理叔魚叔向弟理獄官之名罪在雍子雍子納其女於叔魚叔魚弊其邢獄弊斷㫁罪歸邢侯也邢侯怒殺叔魚與雍子於朝韓宣子問罪於叔向宣子晉正卿韓起也叔向曰三姧同罪施生戮死可也施宜為與與猶行也行生者之罪也雍子自知其罪而賂以置直鮒也鬻獄邢侯專殺其罪一也己惡而掠美為昏取善昏亂也己惡以賂求善為亂也貪以賂官為黙黙猶冒苟貪不畏罪殺人不忌為賊忌憚夏書曰昏黙賊殺夏書夏家之書三者宜皆殺也咎陶之刑也請從之乃施邢侯而尸雍子叔魚於市孔子曰叔向古之遺直也治國制刑不隱於親三數叔魚之罪不為末末薄或曰義或左傳作義也可謂直矣平丘之㑹數其賄也以寛衞國晉不為㬥諸侯㑹于平丘晉人淫芻蕘者於衞衞人患之賂叔向叔向使與叔魚客未追而禁之歸魯季孫稱其詐也以寛魯國晉不為虐魯季孫見執諮於晉晉人歸之季孫責禮不肯歸叔向言叔魚能歸之叔魚説季孫季孫懼乃歸之邢侯之獄言其貪也以正刑書晉不為頗頗偏三言而除三惡加三利暴衞虐魯殺三罪去三惡加三利也殺親益榮由義也夫鄭有鄉校鄉之學校鄉校之士非論執政鬷明欲毁鄉校鬷明然明子産曰何以毁為夫人朝夕退而遊焉以議執政之善否其所善者吾則行之其所否者吾則改之}
