  - {type: variant, offset: 7, length: 0, content: '', SBCK: 仲思名衍或名泄嗣微之後故號微仲生宋公稽胄子雖遷爵易位而班級不及其故者得以故官爲稱故二微雖爲宋公而猶以微之號自終至于稽乃稱公焉宋公生丁公申申公生緡公共及襄公熙熙生弗父何及厲公方祀方祀以下世爲宋卿弗父何生宋父周周生世子勝勝生正考甫考甫生孔父嘉五世親盡别爲公族故後以孔爲氏焉一曰孔父者生時所賜號也是以子孫遂以氏族孔父生子木金父金父生睪夷睪夷生防叔避華氏之禍而奔魯方叔生伯夏伯夏生叔梁紇曰雖有九女是無子其妾生孟皮孟皮一字伯尼有足病於是乃求㛰於顔氏顔氏有三女其小曰徵在顔父問三女曰陬大夫雖父祖爲士然其先聖王之裔今其人身長十尺武力絶倫吾甚貪之雖年長性嚴不足爲疑三子孰能爲之妻二女莫對徵在進曰從父所制將何問焉父曰即爾能矣遂以妻之徵在旣徃廟見以夫之年大懼不時有勇而私禱尼丘之山以祈焉生孔子故名丘字仲尼孔子三嵗而叔梁紇卒􅁙於防至十九娶于宋之并官氏一歳而生伯魚魚之生也魯昭公以鯉魚賜孔子榮君之貺故因以名曰鯉而字伯魚魚年五十先孔子卒齊太史子與適魯見孔子孔子與之言道子與悦曰吾鄙人也聞子之名不覩子之形久矣而求知之寶貴也乃今而後知㤗山之爲高淵海之爲大惜乎夫子之不逢明王道德不加于民而將垂寶以貽後世遂退而謂南宫敬叔曰今孔子先聖之嗣自弗父何以來世有德讓天所祚也成湯以武德王天下其配在文殷宗以下未始有也孔子生於衰周先王典籍錯亂無紀而乃論百家之遺記考正其義祖述堯舜憲章文武刪詩述書定禮理樂制作春秋讃明易道垂訓後嗣以爲法式其文德著矣然凡所教誨束脩已上三千餘人或者天將欲與素王之乎夫何其盛也敬叔曰殆如吾子之言夫物莫能兩大吾聞聖人之後而非繼世之綂其必有興者焉今夫子之道至矣乃將施之無窮雖欲辭天之祚故未得耳子貢聞之以二子之言告孔子子曰豈若是哉亂而治之滯而起之自吾志天何與焉終記解第四十孔子蚤晨作起作負手曵杖逍遥於門而歌曰㤗山其頽乎梁木其壞乎爲梁者梁木木主喆人其萎乎頓萎旣歌而入當戸而坐子貢聞之曰㤗山其頽則吾將安仰梁木其壞吾將安杖喆人其萎吾將安放放去聲放法夫子殆將病也遂趨而入夫子歎而言曰賜汝來何遲予疇昔夢坐奠於兩楹之間猶近疇昔而具奠於殯處故自知死也昨夜兩楹之間殷人所殯處夏后氏殯於東階之上則猶在阼殷人殯於兩楹之間即與賔主夾之殯於西階之上則猶賓之而丘也即殷人夫明王不興則天下其孰能宗余臨終其有命傷道之不行也言天下無明主莫能宗巳道余逮將死遂寢病七日而終時年七十二矣哀公誄曰昊天不弔不慗遺一老願且一老弔善也慗慗魚僅切孔子也俾屏余一人以在位焭焭余在疚病疚於乎哀哉尼父無自律稱律法言無父丈夫之顯爲法以自子貢曰公其不没於魯乎夫子有言曰禮失則昬名失則􅄽失志爲昬失所爲􅄽生不能用死而誄之非禮也稱一人非名之稱也一人天子君兩失之矣旣卒門人所以服夫子者子貢曰昔夫子之䘮顔囘也若䘮其子而無服䘮子路亦然今請䘮夫子如䘮父而無服於是弟子皆弔服而加麻出有所之則由絰子夏曰入宜絰可居出則不絰子游曰吾聞諸夫子䘮朋友居則絰出則否䘮所尊雖絰而出可也孔子之䘮公西掌殯􅁙焉唅以踈米三貝禮記曰踈粳米絰徒結反稻曰嘉䟽襲衣十有一稱加朝服一冠章甫之冠珮象環徑五寸而綨組綬組綬所綨雜色箕反組則古反以繫象環綨巨桐棺四寸柏棺五寸􅅚廟置翣設披周也設崇殷也綢練設旐夏也以旌之杜於葬乘車所建也踈練廣􅂶披樞行夾引棺者崇崇牙旌旗飾綢練色甲反綢直留反長尋曰旐也翣兼用三王禮所以尊師且備古也􅁙於魯城北泗水上藏入地不及泉而封爲偃斧之形髙四尺􅀣松柏爲志焉弟子皆家于墓行心喪之禮旣􅁙有自燕來觀者舍於子夏氏子貢謂之曰吾亦人之􅁙聖人非聖人之􅁙人子奚觀焉昔夫子言曰見吾封若夏屋者殿形中髙夏屋今之下也而四方見若斧矣從若斧者也又易為功上難登狹馬􅺹封之謂也力葉反又作鬛俗間之名􅺹今徒一日三斬板而以封謂斬其縮縮斬上傍殺蓋板蓋廣二尺長六尺斬板尺也髙四尚行夫子之志而巳庻尚何觀乎哉二三子三年喪畢或留或去惟子貢廬於墓六年自後群弟子及魯人處於墓如家者百有餘家因名其居曰孔里焉正論解第四十一孔子在齊齊侯出田獵田招虞人以旌不進澤之官也虞人掌山公使執之對曰昔先君之田也旌以招大夫􅃓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍之孔子聞之曰善哉守道不如守官召便徃守官非守召道爲恭敬之道見君也不徃}
