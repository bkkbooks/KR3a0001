  - {type: variant, offset: 6, length: 0, content: '', SBCK: 之先宋之後也微子啓帝乙之元子紂之庶兄以圻内諸侯入爲王卿士微國名子爵初武王尅殷封紂之子武庚於朝歌使奉湯祀武王崩而與管蔡霍三叔作難周公相成王東征之二年罪人斯得乃命微子於殷後作微子之命由之與國于宋徙殷之子孫唯微子先徃仕周故封之賢其弟}
