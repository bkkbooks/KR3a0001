  - {type: variant, offset: 1, length: 1, content: 恕, WYG: 十八顔回魯人字子淵少孔子三十歳年二十九而髪白三十一早死此書久逺年數錯誤未可詳挍其年則顔回死時孔子年六十一歳然伯魚五十先孔子卒卒時孔子且七十此謂顔回先伯魚死而論語云顔回死顔路請子之車以為之槨子曰鯉也死有棺而無槨或為設事之辭孔子曰自吾有回門人日益顔回為孔子䟽附之友能使門人益親夫子回以德行著名孔子稱其仁焉閔損魯人字子騫少孔子五十歳以德行著名孔子稱其孝焉冉耕魯人字伯牛以德著名有惡疾孔子曰命也夫冉雍字仲弓伯牛之宗族生於不肖之父以德行著名宰予字子我魯人有口才以言語著名仕齊為臨菑大夫與田常為亂夷其三族孔子恥之曰不在利病其在宰予言宰予為病利端木賜字子貢衞人少孔子三十一歳有口才著名孔子毎詘其辯家富累千金常結駟連騎以造原憲憲居蒿廬蓬户之中與之言先王之義原憲衣敝衣冠并日蔬食旣蔬食并日而後食也衎然有自得之志子貢曰甚矣子如何之病也原憲曰吾聞無財者謂之貧學道不能行者謂之病吾貧也非病也子貢慙終身恥其言之過子貢行販與時轉貨販發舉買賤賣貴隨時轉作以有其貨也歴相魯衞而終齊冉求字子有仲弓之宗族少孔子二十九歳有才藝以政事著名仕為季氏宰進則理其官職退則受教聖師為性多謙退故子曰求也退故進之仲由卞人字子路一字季路少孔子九歳有勇力才藝以政事著名為人果烈而剛直性鄙而不達於變通仕衞為大夫蒯聵與其子輒爭國子路遂死輒難孔子痛之曰自吾有由而惡言不入於耳子路夫子禦侮之友惡言不入夫子之耳言偃魯人字子游少孔子三十五歳時習於禮以文學著名仕為武城宰嘗從孔子適衞與將軍之子蘭相善使之受學於夫子卜商衞人字子夏少孔子四十四歳習於詩能通其義子夏所叙詩義今之毛詩序是以文學著名為人性不𢎞好論精微時人無以尚之嘗返衞見讀史志者云晉師伐秦三豕渡河子夏曰非也己亥耳讀史志曰問諸晉史果曰己亥於是衞以子夏為聖孔子卒後教於西河之上魏文侯師事之而諮國政焉顓孫師陳人字子張少孔子四十八歳為人有容貌資質寛沖博接從容自務居不務立於仁義之行子張不侮鰥寡性凱悌寛沖故子貢以為未仁然不務立仁義之行故子貢激之以為未有也孔子門人友之而弗敬曾參南武城人字子輿少孔子四十六歳志存孝道故孔子因之以作孝經齊嘗聘欲以為卿而不就曰吾父母老食人之禄則憂人之事故吾不忍逺親而為人役參後母遇之無恩而供養不衰及其妻以藜烝不熟因出之人曰非七出也荅曰藜烝小物耳吾欲使熟而不用吾命況大事乎遂出之終身不娶妻其子元請焉告其子曰髙宗以後妻殺孝已尹吉甫以後妻放伯竒吾上不及髙宗中不比吉甫庸知其得免於非乎澹臺滅明武城人字子羽少孔子四十九歳有君子之資孔子嘗以容貌望其才其才不充孔子之望然其為人公正無私以取與去就以諾為名仕魯為大夫髙柴齊人髙氏之别族字子羔少孔子四十歳長不過六尺狀貌甚惡為人篤孝而有法正少居魯見知名於孔子之門仕為武城宰宓不齊魯人字子賤少孔子四十嵗仕為單父宰有才智仁愛百姓不忍欺孔子美之樊須魯人字子遲少孔子四十六歳弱仕於季氏有若魯人字子有少孔子三十六歳為人强識好古道公西赤魯人字子華少孔子四十二歳束帶立於朝閑賔主之儀原憲宋人字子思少孔子三十六嵗清淨守節貧而樂道孔子為魯司寇原憲嘗為孔子宰孔子卒後原憲退隱居于衞公冶長魯人字子長為人能忍恥孔子以女妻之南宫縚魯人字子容以智自將世清不廢世濁不汚孔子以兄子妻之公析哀齊人字季沈鄙天下多仕於大夫家者是故未嘗屈節人臣孔子特歎貴之曾㸃曾參父字子晳疾時禮教不行欲修之孔子善焉論語所謂浴乎沂風乎舞雩之下顔由顔回父字季路孔子始教學於閭里而受學少孔子六嵗商瞿魯人字子木少孔子二十九嵗特好易孔子傳之志焉漆雕開蔡人字子若少孔子十一嵗習尚書不樂仕孔子曰子之齒可以仕矣時將過子若報其書曰吾斯之未能信言未能明信此書義孔子悦焉公良孺陳人字子正賢而有勇孔子周行常以家車五乗從秦商魯人字丕兹少孔子四嵗其父堇父與孔子父叔梁紇俱以力聞顔亥魯人字子驕少孔子五十嵗孔子適衞子驕為僕衞靈公與夫人南子同車出而令宦者雍渠參乗使孔子為次乗遊過市孔子恥之顔亥曰夫子何恥之孔子曰詩云覯爾新婚以慰我心慰安乃歎曰吾未見好德如好色者也司馬耕宋人字子牛牛為性躁好言語見兄桓魋行惡牛常憂之巫馬施陳人字子期少孔子三十嵗孔子將近行命從者皆持葢已而果雨巫馬期問曰旦無雲旣日出而夫子命持雨具敢問何以知之孔子曰昨暮月宿于畢詩不云乎月離於畢俾滂沱矣以此知之梁鱣齊人字叔魚少孔子三十九嵗年三十未有子欲出其妻商瞿謂曰子未也㫺吾年三十八無子吾母為吾更取室夫子使吾之齊母欲請留吾夫子曰無憂也瞿過四十當有五丈夫今果然吾恐子自晚生耳未必妻之過從之二年而有子琴牢衞人字子開一字張與宗魯友聞宗魯死欲往弔焉孔子弗許曰非義也冉孺魯人字子魯少孔子五十嵗顔幸魯人字子柳少孔子四十六嵗伯䖍字揩少孔子五十嵗公孫龍衞人字子石少孔子五十三嵗曹䘏少孔子五十嵗陳亢陳人字子元一字子禽少孔子四十嵗叔仲㑹魯人字子期少孔子五十四歲與孔璇年相比毎孺子之執筆記事於夫子二人迭侍左