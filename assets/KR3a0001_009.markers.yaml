  - {type: variant, offset: 1, length: 1, content: 恕, SBCK: 十八顔囘魯人字子淵年二十九而髪白三十一早死孔子曰自吾有囘門人日益親囘之德行著名孔子稱其仁焉閔損魯人字子騫以德行著名孔子稱其孝焉冉耕魯人字伯牛以德行著名有惡疾孔子曰命也夫冉雍字仲􅃓伯牛之宗族生於不肖之父以德行著名宰予字子我魯人有口才著名端木賜字子貢衛人有口才著名冉求字子有仲􅃓之族有才藝以政事著名仲由弁人字子路有勇力才藝以政事著名言偃魯人字子游以文學著名卜商衛人無以尚之嘗返衞見讀史志者云晉師伐秦三豕渡河子夏曰非也己亥耳讀史志曰問諸晉史果曰巳亥於是衞以子夏爲聖孔子卒後教於西河之上魏文侯師事之而諮國政焉顓孫師陳人字子張少孔子四十八歳爲人有容貌資質寛冲博接從容自務居不務立於仁義之行寛冲故子貢以為未仁子張不侮鰥寡性凱悌子貢激之以爲未仁也然不務立仁義之行故孔子門人友之而弗敬曾參南武城人字子輿少孔子四十六歳志存孝道故孔子因之以作孝經齊嘗聘欲與爲卿而不就曰吾父母老食人之禄則憂人之事故吾不忍逺親而爲人役參後母遇之無恩而供飬不衰及其妻以藜烝不熟因出之人曰非七出也參曰藜烝小物耳吾欲使熟而不用吾命况大事乎遂出之終身不取妻其子元請焉告其子曰髙宗以後妻殺孝巳尹吉甫以後妻放伯竒吾上不及髙宗中不比吉甫庸知其得免於非乎澹臺滅明武城人字子羽少孔子四十九歳有君子之姿孔子嘗以容貌望其才其才不充孔子之望然其爲人公正無私以取與去就以諾爲名仕魯爲大夫也髙柴齊人髙氏之别族字子羔少孔子四十歳長不過六尺狀貌甚惡爲人篤孝而有法正少居魯見知名於孔子之門仕爲武城宰宓不齊魯人字子賤少孔子四十九嵗仕爲單父宰有才智仁愛百姓不忍欺孔子大之樊湏魯人字子遲少孔子四十六歳弱仕於季氏有若魯人字子有少孔子三十六歳爲人强識好古道公公西赤魯人字子華少孔子四十二歳束帶立朝閑賔主之儀原憲宋人字子思少孔子三十六嵗清淨守節貧而樂道孔子爲魯司冦原憲嘗爲孔子宰孔子卒後原憲退隱居于衞公冶長魯人字子長爲人能忍耻孔子以女妻之南宫縚魯人字子容以智自將世清不廢世濁不洿孔子以兄子妻之公析哀齊人字季沉鄙天下多仕於大夫家者是故未嘗屈節人臣孔子特歎貴之曾㸃曾參父字子晢疾時禮教不行欲修之孔子善焉論語所謂浴乎沂風乎舞雩之下顔由顔囘父字季路孔子始教學於闕里而受學少孔子六嵗商瞿魯人字子木少孔子二十九嵗特好易孔子傳之志焉漆雕開蔡人字子若少孔子十一嵗習尚書不樂仕孔子曰子之齒可以仕矣時將過子若報其書曰吾斯之未能信明信此言未能意書孔子悦焉公良儒陳人字子正賢而有勇孔子周行常以家車五乗從秦商魯人字不慈少孔子四嵗其父堇父甫父音與孔子父叔梁紇俱力聞顔刻魯人字子驕少孔子五十嵗孔子適衛子驕爲僕衛靈公與夫人南子同車出而令宦者雍梁參乘使孔子爲次乗遊過市孔子耻之顔刻曰夫子何耻之孔子曰詩云覯爾新婚以慰我心安慰乃歎曰吾未見好德如好色者也司馬黎耕宋人字子牛牛爲性躁好言語見兄桓魋行惡牛常憂之巫馬期陳人字子期少孔子三十嵗孔子將近行命從者皆持葢巳而果雨巫馬期問曰旦無雲旣日出而夫子命持雨具敢問何以知之孔子曰昨暮月宿畢詩不云乎月離於畢俾滂沱矣以此知之梁鱣齊人字叔魚少孔子三十九嵗年三十未有子欲出其妻商瞿謂曰子未也昔吾年三十八無子吾母爲吾更取室夫子使吾之齊母欲請留吾夫子曰無憂也瞿過四十當有五丈夫今果然吾恐子自晚生耳未必妻之過從之二年而有子琴牢衛人字子開一字張與宗魯友聞宗魯死欲徃弔焉孔子弗許曰非義也冉儒魯人字子魚少孔子五十歳顔辛魯人字子桺少孔子四十六歳伯䖍字楷少孔子五十歳公孫寵衞人字子石少孔子五十三歳曹䘏少孔子五十嵗陳亢陳人字子亢一字子禽少孔子四十嵗叔仲㑹魯人字子期少孔子五十歲與孔琁年相比毎孺子之執筆記事於夫子二人迭侍左右孟武伯見孔子而問曰此二孺子之㓜也於學豈能識於壯哉孔子曰然少成則若性也習慣若自然也秦祖字子南奚蒧字子偕公祖兹字子之廉潔字子曹公西與字子上宰父黑字子黑公西减字子尚穰駟赤字子從冉季字子産薛􅀖字子從石處字里之懸亶字子象左郢字子行狄黑字哲之商澤字子秀任不齊字子選榮祈字子祺顔噲字子聲原桃字子籍公肩字子仲秦非字子之漆雕從字子文燕級字子思公夏守字子乘勾井疆字子疆歩叔乗字子車石子蜀字子明邽選字子飲施之常字子常申績字子周樂欣字子聲顔之僕字子叔孔弗字子蔑兄弟孔子漆雕侈字子歛懸成字子横顔相字子襄右件夫子七十二人弟子皆升堂入室者本姓解}
