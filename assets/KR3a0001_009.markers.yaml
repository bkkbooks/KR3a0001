  - {type: variant, offset: 784, length: 0, content: '', krp: 以至焉晉人曰其辭順孔子聞之謂子貢曰志有之書也志古之言以足志足成言以志其文以足言足成其言加以文章以不言誰知其志言之無文行之不逺雖行而不逺也有言而無文章晉爲鄭伯入陳非文辭不爲功小子愼哉楚靈王汰侈奢侈驕汰右尹子革侍坐名子革右尹官舟煞左史倚相趨而過王曰是良史也子善視之是能讀三墳五典八索九丘皇之書三墳三索法丘丘團聚也五典五帝之典八索對曰夫良史者記君之過揚君之善而此子以潤辭爲官不可爲良史曰臣又乃嘗聞焉昔周穆王欲肆其心極肆將過行天下使皆有車轍並馬迹焉祭公謀父作祈昭名猶齊景公作君臣謀父周卿士祈昭詩是也昭宜為招耳補作招相説之樂葢曰徴招角招以止王心心之止王逰逸王是以獲殆於文宫臣聞其詩焉而弗知若問逺焉其焉能知王曰子能乎對曰能其詩曰祈昭之愔愔乎式昭徳音愔愔祈昭足以昭其徳音者也言祈昭樂之安和其法思我王度式如玉式如金詩云追琢其章金玉其相思王之法度如金玉純美刑民之力而無有醉飽之心之不勝不節無有醉長而字刑傷民力用無厭足飽之心言靈王揖而入饋不食寢不寐數日則固不能勝其情以及於難孔子讀其志曰古者有志克己復禮爲}
  - {type: variant, offset: 785, length: 0, content: '', SBCK: 勝巳私情克勝言能則爲仁也復之於禮信善哉楚靈王若能如是豈期辱於乾谿谿國人潰畔遂死焉靈王起章華之臺於乾子革之非左史所以風也稱詩以諫順哉叔孫穆子避難奔齊如淫亂故避之而出穆子叔孫豹其兄僑齊奔宿於庚宗之邑庚宗寡婦通焉而生牛牛名穆子返魯以牛爲内豎外之命豎通内相家遂長相家命為牛䜛叔孫二人殺之叔孫有病牛不通其饋不食而死牛遂輔叔孫庻子昭而立之孫婼子叔昭子旣立朝其家衆曰豎牛禍叔孫氏使亂大從順從殺適立庶又披其邑以求舍罪十邑以行賂也牛取叔氏鄙三罪莫大焉必速殺之遂殺豎牛孔子曰叔孫昭子之不勞立巳爲功勞力也不以不可能也周任有言曰古之周任人賢爲政}
  - {type: page-break, offset: 785, content: '', id: KR3a0001_SBCK_009-19b}
  - {type: page-break, offset: 785, content: '', id: KR3a0001_SBCK_009-20a}
  - {type: variant, offset: 785, length: 0, content: '', WYG: 克勝言能勝己私情復之於禮則為仁也信善哉楚靈王若能如是豈其辱於乾谿靈王起章華之臺於乾谿國人潰畔遂死焉子革之非左史所以風也稱詩以諫順哉叔孫穆子避難奔齊穆子叔孫豹其兄僑如淫亂故避之而出奔齊宿於庚宗之邑庚宗寡婦通焉而生牛名牛穆子反魯以牛為内豎豎通内外之命相家長遂命為相家牛䜛叔孫二子殺之叔孫有病牛不通其饋不食而死牛遂輔叔孫庶子昭而立之子叔孫諾昭子旣立朝其家衆曰豎牛禍叔孫氏使亂大從從順殺適立庶又披其邑以求舍罪牛取叔氏鄙三十邑以行賂也罪莫大焉必速殺之遂殺竪牛孔子曰叔孫昭子之不勞勞功不以立已為功不可能也周任有言曰周任古之賢人為政}
