  - {type: variant, offset: 806, length: 0, content: '', SBCK: 惜也不如多與之邑惟器與名不可以假人名尊卑以名器禮樂以器君之所司主司名以出信信以守器器以藏禮禮故曰器以藏禮有器然後得行其禮以行義義以生利利以平民政之大節也若以假人與人政也政亡則國家從之不可止也公父文伯之母敬姜也文伯母紡績不解文伯諫焉其母曰古者王后親織玄紞紞丅敢反紞冠垂者公侯之夫人加之紘綖紘綖冠之上覆也纓屈而上者謂之令戰余旃二反紘爲萌反綖卿之内子爲大帶為内子卿之妻命婦成祭服爲命婦大夫之妻列士之妻加之以朝服自庶士已下各衣其夫社而賦事烝而獻功各祭祭而獻其功也男女春秋而勤歳事男女紡績􅄽則有辟辟法也績功也聖王之制也今我寡也爾又在位朝夕恪勤猶恐忘先人之業況有怠墮其何以避辟孔子聞之曰弟子志之季氏之婦}
