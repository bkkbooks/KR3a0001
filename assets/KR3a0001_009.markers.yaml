  - {type: variant, offset: 788, length: 0, content: '', SBCK: 其毁也我聞忠言以損怨不聞立威以防怨防怨猶防水也大决所犯傷人必多吾弗克救也不如小决使導之不如吾所聞而藥之療也藥治孔子聞是言也曰吾以是觀之人謂子産不仁吾不信也晉平公㑹諸侯于平丘齊侯及盟鄭子産爭貢賦之所承輕重也所承之曰昔日天子班貢輕重以列尊卑貢周之制也卑而貢重者甸服外諸侯異故貢重也甸服王圻之内與圻鄭伯男南也而使從公侯之貢多有作此南連言之猶言南左輔作男古字作南亦也公侯懼弗給也敢以爲請自日中爭之以至于昬晉人許之孔子曰子産於是行也是以爲國基也詩云樂只君子􅀖家之基也本子産君子之於樂者則人樂藝也能爲國之本且曰合諸侯而藝貢事禮也獻之事也藝分别貢鄭子産有疾謂子太叔曰我死子必爲政唯有徳者能以寛服民其次莫如猛夫火烈民望而畏之故鮮死焉水濡弱民狎而翫之翫習狎易則多死焉故寛難子産卒子太叔爲政不忍猛而寛鄭國多掠盗掠抄太叔悔之曰吾早從夫子必不及此孔子聞之曰善哉政寛則民慢慢則糺於猛攝也糺猶猛則民殘民殘猛政民殘則施之以寛寛以濟猛猛以濟寛寛猛相濟政是以和詩曰民亦勞止汔可小康可小變故以安也汔危也勞民人病汔惠此中國以綏四方施之以寛母縱詭隨隨人詭人惡者也遺人小以謹無良懲之也謹以小式遏㓂虐慘不畏明也曾不畏天之明道者言威也慘曾也當用遏止為冦虐之人糺之以猛也柔逺能邇能安近言能者以定我王安王以定也位平之以和也又曰不競不絿不剛不柔絿中和不競不布政優優百禄是遒遒聚優優和和之至也子産之卒也孔子聞之出涕曰古之遺愛孔子適齊過㤗山之側有婦人哭於野者而哀夫子式而聽之曰此哀一似重有憂者使子貢徃問之而曰昔舅死於虎吾夫又死焉今吾子又死焉子貢曰何不去乎婦人曰無苛政子貢以告孔子子曰小子識之苛政猛於􅁀虎晉魏獻子爲政魏舒獻子分祁氏及羊舌氏之田荀櫟㓕氏故獻子分其田晉大夫祁氏羊舌以賞諸大夫及其子成皆以賢舉也又將賈辛曰今汝有力於王室吾是以舉汝賈辛帥師救周周有子朝之亂行乎敬之哉毋墮乃力孔子聞之曰魏子之舉也近不失親而舉也子可舉逺不失舉逺故不以舉不可謂美矣又聞其命賈辛以爲忠詩云永言配命自求多福忠也我長配天命而言我文王之詩福人多福忠也行庶國亦當求多魏子之舉也義其命也忠其長有後於晉國乎趙簡子賦晉國一鼓鐘四謂之石石四謂三十斤謂之鐘鐘鼔之以鑄刑鼎著范宣子所爲刑書晉卿范范宣子書著鼎也自銘其刑孔子曰晉其亡乎失其度矣夫晉國將守唐叔之所受法度弟始封於晉唐叔成王母也者以經緯其民者也以成文也經緯猶織卿大夫以序守之序也序次民是以能遵其道而守其業貴賤不􅄽所謂度也文公是以作執秩之官爲被廬之法執秩之官以為晉國法也晉文公旣霸彊于時蓋作以爲盟主今棄此度也而爲刑鼎銘在􅂦矣何以尊貴書不復戴奉上也民將棄神而徴於何業之守也上無所守也民不奉上則貴賤無序何以爲國且夫宣子之刑夷之蒐也􅀳國亂制變易軍師夷蒐之時殺故曰亂制也陽唐父為賈季所若之何其爲法乎楚昭王有疾卜曰河神爲祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望望祀天子故曰祭不越望也天地諸侯祀境内江漢沮漳楚之望也水四也名禍福之至不是過乎不榖雖不德河非所獲罪也遂不祭孔子曰楚昭王知大道矣不越祀也求之於巳其不失國也冝哉㓕昭王出楚為呉所國者也奔巳復夏書曰維彼陶唐率彼天常堯率陶唐天之常道猶循天堂在此兾方為兾中國今失厥道亂其紀綱乃㓕而亡夏桀謂變又曰允出兹在兹由巳率常可矣在此以能循常道可也言善惡各有類信出此則衞孔文子使太叔疾出其妻而以其女妻之岀文子使疾出其妻而已妻之初疾娶於宋子朝其婦孽子朝疾誘其初妻之娣爲之立宫與文子女如二妻之禮文子怒將攻之孔子舍璩伯玉之家文子就而訪焉孔子曰簠簋之事則嘗聞學之矣兵甲之事未之聞也退而命駕而行曰鳥則擇木木豈能擇鳥乎文子遽自止之曰圉也豈敢度其私哉謀度亦訪衞國之難也將止㑹季康子問冉求之戰冉求旣對之又曰夫子播之百姓質諸􅀑神而無憾也恨用之則有名康子言於哀公以幣迎孔子曰人之於冉求信之矣將大用之齊陳恒弑其簡公孔子聞之三日沐浴而􅃴朝告於哀公曰陳恒弑其君請伐之公弗許三請公曰魯爲齊弱久矣子之伐也將若之何對曰陳恒弑其君民之不與者半以魯之衆加齊之半可克也公曰子告季氏孔子辭季氏不告退而告人曰以吾從大夫之後吾不敢不告也子張問曰書云髙宗三年不言言乃雍有諸雍和有諸問有之也雍歡聲貌尚書云言乃孔子曰胡為其不然也古者天子崩則世子委政於冡宰三年成湯旣没太甲聽於伊尹湯孫太甲武王旣喪成王聽於周公其義一也衞孫桓子侵齊遇敗焉齊與齊師遇為齊桓子孫良夫也侵也所敗齊人乗之執新築大夫仲叔于奚以其衆救桓子桓子乃免衞人以邑賞仲叔于奚于奚辭請曲懸之樂闕一向也故謂諸侯軒懸軒懸之樂之曲懸繁纓以朝衘以黄金為飾也馬纓當膺以索群許之書在三官服司空書勲也司徒書名司馬書}
