  - {type: variant, offset: 198, length: 534, content: 之問也自丘之聞未有若吾子所問辯且說也丘嘗聞君子之言道矣聽者無察則道不入奇偉不稽則道不信又嘗聞君子之言事矣制無度量則事不成其政曉察則民不保又嘗聞君子之言志矣剛折不終徑易者則數傷浩倨者則不親就利者則無不敝又嘗聞養世之君子矣從輕勿為先從重勿為後見像而勿強陳道而勿怫此四者丘之所聞也孔子觀於魯桓公之廟有欹器焉夫子問於守廟者曰此謂何器對曰此蓋為宥坐之器孔子曰吾聞宥坐之器虛則欹中則正滿則覆明君以為至誡故常置之於坐側顧謂弟子曰試注水焉乃注之水中則正滿則覆夫子喟然歎曰嗚呼夫物惡有滿而不覆者哉子路進曰敢問持滿有道乎子曰聰明叡智守之以愚功被天下守之以讓勇力振世守之以怯富有四海守之以謙此所謂損之又損之之道也孔子觀於東流之水子貢問曰君子所以見大水必觀焉何也孔子曰以其不息且徧與諸生而不為也夫水有似乎德其流也則卑下倨拘必循其理此似義浩浩乎無屈盡之期此似道流行赴百仞之谿而不懼此似勇至量必平之此似法盛而不求概此似正綽約微達此似察發源必東此似志以出以入萬物就此化絜此似善化也水之德有若此是故君子見大水必觀焉子貢觀於魯廟之北堂出而問於孔子曰向也賜觀於太廟之北堂未既輟還瞻北蓋皆斷焉彼將有說邪匠之過也孔子曰太廟之堂官致良工之匠匠致良材盡其工巧蓋貴久矣尚有說也孔子曰吾有所恥有所鄙有所殆夫幼而不能強, SBCK: ''}
