  - {type: variant, offset: 1164, length: 0, content: '', WYG: 謂在愛民而已矣子游曰愛民謂之德教何翅施惠哉孔子曰夫子産者猶衆人之母也能食之而不能教也子游曰其事可言乎孔子曰子産以所乘之車濟冬涉是愛而無教也定公問於孔子曰二三大夫皆勸寡人使隆敬於髙年何也孔子對曰君之及此言也將天下實賴之豈唯魯哉公曰何也其義可得聞乎孔子曰㫺者有虞氏貴徳而尚齒夏后氏貴爵而尚齒殷人貴富而尚齒富貴世禄之家周人貴親而尚齒虞夏殷周天下之上王也未有遺年者焉年者貴於天下久矣次于事親是故朝廷同爵而尚齒七十杖於朝君問則席君欲問之則為之設席而問焉八十則不仕朝君問則就之而悌達乎朝廷矣其行也肩而不竝不敢與長若竝肩也不錯則隨錯雁行父黨隨行兄黨雁行也班白之老不以其任於路任檐也少者代之也而悌達乎道路矣居鄉以齒而老窮不匱强不犯弱衆不㬥寡而悌達乎州巷矣古之道五十不為甸役五十始老不為力役之事不為田獵之徒也頒禽隆之長者而悌達乎蒐狩矣軍旅伍什同列則尚齒而悌達乎軍旅矣夫聖人之教孝悌發諸朝廷行於道路至于州巷放于蒐狩循于軍旅則衆感以義死之而弗敢犯公曰善哉寡人雖聞之弗能成哀公問於孔子曰寡人聞東益不祥東益之宅信有之乎孔子曰不祥有五而東益不與焉夫損人自益身之不祥棄老而取幼家之不祥釋賢而任不肖}
