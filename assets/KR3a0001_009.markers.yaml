  - {type: variant, offset: 1164, length: 0, content: '', SBCK: 惠在愛民而已矣子游曰愛民謂之德教何翅施惠哉孔子曰夫子産者猶衆人之母也能食之弗能教也子游曰其事可言乎孔子曰子産以所乘之輿濟冬涉者是愛無教也哀公問於孔子曰二三大夫皆勸寡人使隆敬於髙年何也孔子對曰君之及此言將天下實頼之豈唯魯哉公曰何也其義可得聞乎孔子曰昔者有虞氏貴徳而尚齒夏后氏貴爵而尚齒殷人貴富而尚齒禄之家富貴世周人貴親而尚齒虞夏殷周天下之盛王也未有遺年者焉年者貴於天下久矣次于事親是故朝廷同爵而尚齒七十杖於朝君問則席之設席而問焉君欲問之則爲八十則不仕朝君問則就之而悌達乎朝廷矣其行也肩而不並者並肩也不敢與長不錯則隨鴈錯兄黨雁行也行父黨隨行斑白者不以其任於道路􅀒任代之也也少者而悌達乎道路矣居鄉以齒而老窮不匱强不犯弱衆不􅁀寡而悌達乎州巷矣古之道五十不爲甸役爲力役之事五十始老不之徒也不為田獵頒禽隆之長者而悌達乎蒐狩矣軍旅什伍同爵則尚齒而悌達乎軍旅矣夫聖王之教孝悌發諸朝廷行於道路至於州巷放於蒐狩循於軍旅則衆感以義死之而弗敢犯公曰善哉寡人雖聞之弗能成哀公問之於孔子曰寡人聞東益不祥益東宅之信有之乎孔子曰不祥有五而東益不與焉夫損人自益身之不祥棄老而取㓜家之不祥擇賢而任不肖}
  - {type: page-break, offset: 1164, content: '', id: KR3a0001_SBCK_009-30a}
