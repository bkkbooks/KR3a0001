  - {type: variant, offset: 788, length: 0, content: '', WYG: 其毁也我聞忠善以損怨不聞立威以防怨防怨猶防水也大決所犯傷人必多吾弗克救也不如小決使導之不如吾所聞而藥之藥療也孔子聞是言也曰吾以是觀之人謂子産不仁吾不信也晉平公㑹諸侯于平丘齊侯及盟鄭子産爭貢賦之所承所承之輕重也曰昔者天子班貢輕重以列列尊卑而貢周之制也卑而貢重者甸服甸服王圻之内與圻外諸侯異故貢重也鄭伯南也而使從公侯之貢南左氏作男古字作南亦多有作此南連言之猶言公侯也懼弗給也敢以為請自日中爭之以至于昏晉人許之孔子曰子産於是行也是以為國也詩云樂只君子邦家之基本也子産君子之於樂者能為國之本則人樂藝也且曰合諸侯而藝貢事禮也藝分别貢獻之事也鄭子産有疾謂子太叔曰我死子必為政唯有徳者能以寛服民其次莫如猛夫火烈民望而畏之故鮮死焉水懦弱民狎而翫之狎易翫習則多死焉故寛難子産卒子太叔為政不忍猛而寛鄭國多掠盜抄掠太叔悔之曰吾早從夫子必不及此孔子聞之曰善哉政寛則民慢慢則糺於猛糺猶攝也猛則民殘猛政殘民民殘則施之以寛寛以濟猛猛以濟寛寛猛相濟政是以和詩云民亦勞止汔可小康汔危也勞民人病汔可小變故以安也惠此中國以綏四方施之以寛母縱詭隨詭人隨人遺人小惡者也以謹無良謹小以懲之也式遏寇虐慘不畏明慘曾也當用遏止為寇虐之人也曾不畏天之明道者言威也糺之以猛也柔逺能邇言能安逺者能安近以定我王以定安王位也平之以和也又曰不競不絿不剛不柔絿急言得中和布政優優百禄是遒優優和遒聚和之至也子産之卒也孔子聞之出涕曰古之遺愛孔子適齊過㤗山之側有婦人哭於野者而哀夫子式而聽之曰此哀一似重有憂者使子貢往問之而曰舅死於虎吾夫又死焉今吾子又死焉子貢曰何不去乎婦人曰無苛政子貢以告孔子子曰小子識之苛政猛於㬥虎晉魏獻子為政獻子魏舒分祁氏及羊舌氏之田荀櫟滅晉大夫祁氏羊舌氏故獻子分其田以賞諸太夫及其子成皆以賢舉也又謂賈辛曰今汝有力於王室吾是以舉汝周有子朝之亂賈辛帥師救周行乎敬之哉毋墮乃力孔子聞之曰魏子之舉也近不失親子可舉而舉也逺不失舉不以逺故不舉可謂美矣又聞其命賈辛以為忠詩云永言配命自求多福忠也大雅文王之詩言能長配天命而魏獻子亦能永天命以求多福忠也魏子之舉也義其命也忠其長有後於晉國乎趙簡子賦晉國一鼓鐘三十斤謂之鈞鈞四謂之石石四謂之鼔以鑄刑鼎著范宣子所為刑書范宣子晉卿范匄銘其刑書著鼎也孔子曰晉其亡乎失其度矣夫晉國將守唐叔之所受法度唐叔成王母弟始封於晉者也以經緯其民者也經緯猶織以成文也卿大夫以序守之序次序也民是以能遵其道而守其業貴賤不􅄽謂度也文公是以作執秩之官為被廬之法晉文公旣霸蒐于被廬作執秩之官以為晉國法也以為盟主今棄此度也而為刑鼎民在鼎矣何以尊貴民將禮棄而徴於書不復戴奉上也何業之守也民不奉上則上無所守也貴賤無序何以為國且夫宣子之刑夷之蒐也晉國亂制夷蒐之時變易軍師陽唐父為賈季所殺故曰亂制也若之何其為法乎楚昭王有疾卜曰河為祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望天子祀天地諸侯望祀境内故曰祭不越望也江漢沮漳楚之望也四水名也禍福之至不是過乎不穀雖不德河非所獲罪也遂不祭孔子曰楚昭王知大道矣取之於已不越祀也其不失國也宜哉楚為呉所滅昭王出奔已復國者也夏書曰維彼陶唐率彼天常陶唐堯率循天之常道在此冀方中國為冀今失其行亂其紀綱乃滅而亡謂夏桀又曰允出兹在兹由己率常可矣言善惡各有類信出此則在此以能循常道可也衞孔文子使太叔疾出其妻而以其女妻之初疾娶于宋子朝其婦嬖于朝文子使疾出其妻而已妻之疾誘其初妻之娣為之立宫與文子女如二妻之禮文子怒將攻之孔子舍蘧伯玉之家文子就而訪焉孔子曰簠簋之事則嘗聞學之矣兵甲之事未之聞也退而命駕而行曰鳥則擇木木豈能擇鳥乎文子遽自止之曰圉也豈敢度其私哉度謀亦訪衞國之難也將止㑹季康子問冉求之戰冉求旣對之又曰夫子播之百姓質諸鬼神而無憾恨也用之則有名康子言於哀公以幣迎孔子曰人之於冉求信之矣將大用之齊陳恒弑其君簡公孔子聞之三日沭浴而適朝告於哀公曰陳恒弑其君請伐之公弗許三請公曰魯為齊弱久矣子之伐也將若之何對曰陳恒弑其君民之不與者半以魯之衆加齊之半可克也公曰子告季氏孔子辭不告季氏退而告人曰以吾從大夫之後不敢不告也子張問曰書云髙宗三年不言言乃雍有諸雍歡聲貌尚書云言乃雍和有諸也孔子曰胡為其不然也古者天子崩則世子委政於冡宰三年成湯旣殁太甲聽於伊尹太甲湯孫武王旣喪成王聽於周公其義一也衞孫桓子侵齊遇敗焉桓子孫良夫也侵齊與齊師遇為齊所敗也齊人乗之新築大夫仲叔于奚以其衆救桓子桓子乃免衞人以邑賞仲叔于奚于奚辭請曲懸之樂諸侯軒懸軒懸闕一面也故謂之曲懸之樂繁纓以朝馬纓當膺以索羣銜以黄金為飾也許之書在三官司徒書名司馬書服司空書勲也}
