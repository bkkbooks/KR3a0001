  - {type: variant, offset: 784, length: 0, content: '', WYG: 以至焉晉人曰其辭順孔子聞之謂子貢曰志有之志古之書也言以足志言以足成其志文以足言加以文章以足成其言不言誰知其志言之無文行之不逺有言而無文章雖行而不逺也晉為伯鄭入陳非文辭不為功慎辭哉楚靈王汰侈驕汰奢侈右尹子革侍坐右尹官名子革然丹左史倚相趨而過王曰是良史也子善視之是能讀三墳五典八索九丘三墳三皇之書五典五帝之典八索索法九丘國聚也對曰夫良史者記君之過揚君之善而此子以潤辭為官不可為良史臣又嘗問焉昔周穆王欲肆其心肆極將過行天下使皆有車轍馬迹焉祭公謀父作祈昭謀父周卿士祈昭詩名猶齊景公作君臣相悦之樂葢曰徴昭角昭是也昭宜為招左傳作招以止王心止王心之逸逰王是以獲殁於文宫臣問其詩焉而弗知若問逺焉其焉能知王曰子能乎對曰能其詩曰祈昭之愔愔乎式昭徳音祈為德愔愔言祈昭樂之安和其法足以昭其徳音者也思我王度式如玉式如金思王之法度如金玊然美詩云追琢其章金玉其相刑民之力而無有醉飽之心刑傷民力用之不勝不節無有醉飽之心言無厭足靈三揖而入饋不食寢不寐數日則固不能勝其情以及於難孔子讀其志曰克己復禮為}
