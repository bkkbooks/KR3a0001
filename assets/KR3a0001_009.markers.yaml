  - {type: variant, offset: 782, length: 0, content: '', WYG: 君子也詩云君子是則是效孟僖子可則傚矣懲已所病以誨其嗣大雅所謂貽厥孫謀以燕翼子是類也夫詒遺也燕安也翼敬也言遺其子孫嘉謀學安敬之道衞孫文子得罪於獻公居戚文子衞卿林父得罪以戚叛也公卒未葬文子擊鐘焉延陵季子呉季子札適晉過戚聞之曰異哉夫子之在此猶燕子巢于幕也燕巢于幕言至危也懼猶未也又何樂焉君又在殯可乎文子於是終身不聽琴瑟孔子聞之曰季子能以義正人文子能克已服義可謂善改矣孔子覽晉志晉之史記晉趙穿殺靈公穿趙盾從弟也趙盾亡未及山而還山晉之境史書趙盾弑君盾曰不然史曰子為正卿亡不出境返不討賊非子而誰盾曰嗚呼我之懷矣自詒伊戚其我之謂乎孔子歎曰董狐古之良史也書法不隱趙宣子古之良大夫也為法受惡惜也越境乃免惜盾不越境以免於譏而受弑君之責也鄭伐陳入之使子産獻捷于晉晉人問陳之罪焉子産對曰陳亡周之大徳武王以元女大姬以配胡公而封諸陳豕恃楚衆豕犬馮陵敝邑是以有往年之告告晉為陳所侵未獲命未得晉平陳之成命則又有東門之役與楚共伐鄭至其東門當陳隧者井堙木刋隧陳人堙塞刋斫也敝邑大懼天誘其衷誘導衷善也天導其善大尅陳者也啓敝邑心陳知其罪授首于我用敢獻功晉人曰何故侵小對曰先王之命惟罪所在各致其辟辟誅且昔天子一圻列國一同地方千里曰圻方百里曰同自是以衰周之制也大國方百里從是以為差伯方七十里子男五十里周之制也而説學者以周大國方七百里失之逺矣今大國多數圻矣}
