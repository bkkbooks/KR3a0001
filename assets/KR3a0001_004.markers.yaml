  - {type: variant, offset: 707, length: 0, content: '', SBCK: 好學近乎智力行近乎仁知耻近乎勇知斯三者則知所以修身知所以修身則知所以治人知所以治人則能成天下國家者矣公曰政其盡此而已乎孔子曰凡為天下國家有九經曰修身也尊賢也親親也敬大臣也體群臣也子庶民也來百工也柔逺人也懐諸侯也夫修身則道立尊賢則不惑親親則諸父兄弟不怨敬大臣則不􅅭體群臣則士之報禮重子庻民則百姓勸來百工則財用足柔逺人則四方歸之懐諸侯則天下畏之公曰為之奈何孔子曰齊㓗盛服非禮不動所以修身也去讒逺色賤財而}
  - {type: page-break, offset: 707, content: '', id: KR3a0001_SBCK_004-18b}
  - {type: variant, offset: 707, length: 0, content: '', WYG: 好學近乎智力行近乎仁知恥近乎勇知斯三者則知所以修身知所以修身則知所以治人知所以治人則能成天下國家者矣公曰政其盡此而已乎孔子曰凡為天下國家有九經曰修身也尊賢也親親也敬大臣也體羣臣也重庶民也來百工也柔逺人也懐諸侯也夫修身則道立尊賢則不惑親親則諸父昆弟不怨敬大臣則不眩體羣臣則士之報禮重重庻民則百姓勸來百工則財用足柔逺人則四方歸之懐諸侯則天下畏之公曰為之奈何孔子曰齋絜盛服非禮不動所以修身也去讒逺色賤利而}
