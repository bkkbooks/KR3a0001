  - {type: variant, offset: 7, length: 2, content: 侍坐, SBCK: 曰行已有六本焉然後為君子也立身有義矣而孝為本喪紀有禮矣而哀為本戰陣有列矣而勇為本治政有理矣而農為本居國有道矣而嗣為本則亂之萌繼嗣不立生財有時矣而力為本置本不固無務農桑親戚不悦無務外交事不終始無務多業記聞而言無務多説不岀說中故不可但說所聞而言言多說以務比近不安無務求逺是故反本修邇君子之道也孔子曰良藥苦}
  - {type: page-break, offset: 7, content: '', id: KR3a0001_SBCK_004-1b}
  - {type: variant, offset: 7, length: 2, content: 侍坐, WYG: 曰行已有六本焉然後為君子也立身有義矣而孝為本喪紀有禮矣而哀為本戰陣有列矣而勇為本治政有理矣而農為本居國有道矣而嗣為本繼嗣不立則亂之萌生財有時矣而力為本置本不固無務農桑親戚不悦無務外交事不終始無務多業記聞而言無務多説但記所聞而言言不出説中故不可以務多説比近不安無務求逺是故反本修迹君子之道也孔子曰良藥苦}
