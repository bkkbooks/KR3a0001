  - {type: variant, offset: 13, length: 0, content: '', WYG: 悦焉請置廩丘之養以為養孔子辭而不受入謂弟子曰吾聞君子當功受賞今吾言於齊君君未之有行而賜吾邑其不知丘亦甚矣於是遂行孔子在齊舎於外館景公造焉賔主之辭既接而左右白曰周使適至言先王廟災景公復問災何王之廟也孔子曰此必釐王之廟公曰何以知之孔子曰詩云皇皇上天其命不忒天之以善必報其徳此逸詩也皇皇美貌也忒差也禍亦如之夫釐王變文武之制而作𤣥黄華麗之飾宫室崇峻輿馬奢侈而弗可振也振拔故天殃所冝加其廟焉以是占之為然公曰天何不殃其身而加罰其廟也孔子曰葢以文武故也若殃其身則文武之嗣無乃殄乎故當殃其廟以彰其過俄頃左右報曰所災者釐王廟也景公驚起再拜曰善哉聖之智過人逺矣子夏三年之喪畢見於孔子子曰與之琴使之絃侃侃而樂作而曰先王制禮不敢不及子曰君子也閔子三年之喪畢見於孔子子曰與之琴使之絃切切而悲作而曰先王制禮弗敢過也子曰君子也子貢曰閔子哀未盡夫子曰君子也子夏哀已盡又曰君子也二者殊情而俱曰君子賜也惑敢問之孔子曰閔子哀未忘能斷之以禮子夏哀已盡能引之及禮雖均之君子不亦可乎孔子曰無體之禮敬也無服之喪哀也無聲之樂歡也不言而信不動而威不施而仁志夫鐘之音怒而擊之則武憂而擊之則悲其志變者聲亦隨之故志誠感之通於金石而況人乎孔子見羅雀者所得皆黄口小雀夫子問之曰大雀獨不得何也羅者曰大雀善驚而難得黄口貪食而易得黄口從大雀則不得大雀黄口亦不得孔子顧謂弟子曰善驚以逺害利食而忘患自其心矣而獨以所從為禍福故君子慎其所從以長者之慮則有全身之階隨小者之戅而有危亡之敗也孔子讀易至於損益喟然而歎子夏避席問曰夫子何歎焉孔子曰夫自損者必有益之自益者必有决之易損卦次得益益次夬决也損而不已必益故受之以益益而不已必决故受之以夬吾是以歎也子夏曰然則學者不可以益乎子曰非道益之謂也道彌益而身彌損夫學者損其自多以虛受人故能成其滿博也天道成而必變凡持滿而能久者未嘗有也故曰自賢者天下之善言不得聞於耳矣昔堯治天下之位猶允恭以持之克讓以接下允信也克能也是以千歲而益盛迄今而逾彰夏桀昆吾昆吾國與夏桀作亂自滿而無極亢意而不節斬刈黎民如草芥焉天下討之如誅匹夫是以千載而惡著迄今而不滅滿也如在輿遇三人則下之遇二人則式之調其盈虛不令自滿所以能久也子夏曰商請志之而終身奉行焉子路問於孔子曰請釋古之道而行由之意可乎子曰不可昔東夷之子慕諸夏之禮有女而寡為内私壻終身不嫁嫁則不嫁矣亦非貞節之義也蒼梧嬈娶妻而美讓與其兄讓則讓矣然非禮之讓也不慎其初而悔其後何嗟及矣言事至而後悔吁嗟又何及矣今汝欲舍古之道行子之意庸知子意不以是為非以非為是乎後雖欲悔難哉曾子耘瓜誤斬其根曾晳怒建大杖以撃其背曾子仆地而不知人久之有頃乃蘇欣然而起進於曾晳曰嚮也參得罪於大人大人用力敎參得無疾乎退而就房援琴而歌欲令曾晳而聞之知其體康也孔子聞之而怒告門弟子曰參來勿内曾參自以為無罪使人請於孔子子曰汝不聞乎昔瞽叟有子曰舜舜之事瞽叟欲使之未嘗不在於側索而殺之未嘗可得小棰則待過大杖則逃走故瞽叟不犯不父之罪而舜不失烝烝之孝今參事父委身以待㬥怒殪而不避殪死既身死而䧟父於不義其不孝孰大焉汝非天子之民也殺天子之民其罪奚若曾參聞之曰參罪大矣遂造孔子而謝過荆公子行年十五而攝荆相事孔子聞之使人往觀其為政焉使者反曰視其朝清淨而少事其堂上有五老焉其廊下有二十壯士焉孔子曰合两二十五之智以治天下其固免矣況荆乎子夏問於孔子曰顔囘之為人奚若子曰囘之信賢於丘曰子貢之為人奚若子曰賜之敏賢於丘曰子路之為人奚若子曰由之勇賢於丘曰子張之爲人奚若子曰師之莊賢於丘子夏避席而問曰然則四子何為事先生子曰居吾語汝夫回能信而不能反反謂反信也君子言不必信唯義所在耳賜能敏而不能詘言人雖敏辯亦宜有屈折時也由能勇而不能怯師能莊而不能同言人雖矜莊亦當有和同時也兼四子者之有以易吾弗與也此其所以事吾而弗貳也孔子遊於泰山見榮聲期聲宜為啓或曰榮益期也行乎郕之野鹿裘帶索鼓琴而歌孔子問曰先生所以為樂者何也期對曰吾樂甚多而至者三天生萬物唯人為貴吾旣得為人是一樂也男女之别男尊女卑故人以男為貴吾旣得為男是二樂也人生有不見日月不免襁褓者吾旣以行年九十五矣是三樂也貧者士之常死者人之終處常得終當何憂哉孔子曰善哉能自寛者也得宜為待孔子曰回有君子之道四焉强於行義弱於受諫􅇶於待禄怵怵􅅥也待宜為持也慎於治身史鰌有君子之道三焉不仕而敬上不祀而敬鬼直已而曲於人曾子侍曰參昔者常聞夫子之三言而未之能行也夫子見人之一善而忘其百非是夫子之易事也見人之有善若已有之是夫子之不争也聞善必躬行之然後導之是夫子之能勞也學夫子之三言而未能行以自知終不及二子者也二子顔囘史鰌也孔子曰吾死之後則商也日益賜也日損曾子曰何謂也子曰商也好與賢已者處賜也好説不若已者不知其子視其父不知其人視其友不知其君視其所使不知其地視其草木故曰與善人居如入芝蘭之室久而不聞其香即與之化矣與不善人居如入鮑魚之肆久而不聞其臭亦與之化矣丹之所藏者赤漆之所藏者黒是以君子必慎其所與處者焉曾子從孔子於齊齊景公以下卿之禮聘曾子曾子固辭將行晏子送之曰吾聞之君子遺人以財不若善言今夫蘭本三年湛之以鹿醢既成噉之則易之匹馬非蘭之本性也所以湛者美矣願子詳其所湛者夫君子居必擇處遊必擇方仕必擇君擇君所以求仕擇方所以修道遷風移俗嗜慾移性可不慎乎孔子聞之曰晏子之言君子哉依賢者固不困依冨者固不窮馬斬足而復行何也以其輔之者衆孔子曰以富貴而下人何人不闕以富貴而愛人何人不親發言不逆可謂知言矣言而衆響之可謂知時矣是故以富而能富人者欲貧不可得也以貴而能貴人者欲賤不可得也以達而能達人者欲窮不可得也孔子曰中人之情也有餘則侈不足則儉無禁則淫無度則逸從欲則敗是故鞭扑之子不從父之敎刑戮之民不從君之令此言疾之難忍急之難行也故君子不急斷不急制使飲食有量衣服有節宫室有度畜積有數車器有限所以防亂之原也夫度量不可不明是中人所由之令敎令之令孔子曰巧而好度必攻攻堅勇而好問必勝智而好謀必成以愚者反之是以非其人告之弗聼非其地樹之弗生得其人如聚砂而雨之言立入也非其人如㑹聾而鼔之夫處重擅寵專事妬賢愚者之情也位髙則危任重則崩可立而待孔子曰舟非水不行水入舟則沒君非民不治民犯上則傾是故君子不可不嚴也小人不可不整一也齊髙庭問於孔子曰庭不曠山不直地庭髙庭名也曠隔也不以山為隔踰山而來直宜為植不根於地不逺來也衣穰而提贄穰蒿草衣提持贄所以執為禮也精氣以問事君子之道願夫子告之孔子曰貞以幹之貞正以為幹植敬以輔之施仁無倦見君子則舉之見小人則退之去汝惡心而忠與之効其行修其禮千里之外親如兄弟行不効禮不修則對門不汝通矣夫終日言不遺已之憂終日行不遺已之患唯智者能之故自修者必恐懼以除患恭儉以避難者也終身為善一言則敗之可不慎乎辨物第十六季桓子穿井獲如土缶其中有羊焉使使問於孔子曰吾穿井於費而於井中得一狗何也孔子曰丘之所聞者羊也丘聞之木石之怪夔魍魉水之怪龍罔象土之怪羵羊也呉伐越隳㑹稽呉王夫差敗越王勾踐棲於㑹稽呉人隳之㑹稽山也隳毁也獲巨骨一節專車焉呉子使來聘於魯且問之孔子命使者曰無以吾命也賔既將事乃發幣於大夫及孔子賜大夫及孔子孔子爵之飲酒既徹爼而燕客執骨而問}
