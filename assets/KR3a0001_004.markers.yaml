  - {type: variant, offset: 23, length: 1, content: 愀, krp: 曰丘聞之昔禹致群臣於㑹稽之山防風後至禹殺而戮之其骨專車焉此為大矣客曰敢問誰守為神孔子曰山川之靈足以紀綱天下者其守為神祀者爲神守山川之諸侯社稷之守為公侯祀者直爲公侯而巳但守社稷無山川之山川之祀者為諸侯皆屬於王之屬也神與公侯客曰防風何守孔子曰汪芒氏之君守封嵎山者封嵎山名汪芒國名為漆姓在虞夏商為汪芒氏於周為長翟氏今曰大人之時其名異也周之初及當孔子有客曰人長之極幾何孔子曰焦僥氏長三尺短之至也長者不過十數之極也孔子在陳陳惠公賔之于上館時有隼集陳侯之庭而死集庭便死隼鳥也始楛矢貫之石砮砮箭鏃楛木名其長尺有咫寸也咫八惠公使人持隼如孔子館而問焉孔子曰隼之來逺矣此肅慎氏之矢之矢也肅慎氏昔武王克商通道于九夷百蠻百蠻夷狄百種九夷東方九種使各以其方賄來貢而無忘職業於是肅慎氏貢楛矢石砮其長尺有咫先王欲昭其令徳之致逺物也以示後人使永鑒焉故銘其栝曰肅慎氏貢楛矢栝也楛箭以分大姬配胡公而封諸陳胡公舜之後大姫武王女古者分同姓以珍玉所以展親親也分異姓以逺方之職貢所以無忘服也故分陳以肅慎氏貢焉君若使有司求諸故府其可得也公使人求得之金牘如之也牘匱郯子朝魯魯人問曰少昊氏以鳥名官何也少昊金天氏也魯人叔孫昭子對曰吾祖也我知之昔黄帝以雲紀官故為雲師而雲名轅氏師黄帝軒而爲官名者也長也雲紀其官長炎帝以火氏也神農共工以水九州也共工霸大昊以龍氏也包犧其義一也而火火師而龍名也名也龍師我髙祖少昊摰之立也鳳鳥適至是以紀之於鳥故為鳥師而鳥名自顓頊氏以來不能紀逺乃紀於近為民師而命以民事則不能故也紀逺方言不能孔子聞之遂見郯子而學焉既而告人曰吾聞之天子失官學在四夷猶信郯季文子歎曰中郯小國也故呉伐官學在四夷疾時之廢學也郯少昊之後國不振旅蠻夷之伐吾亡無日矣孔子稱以其世則逺矣以其國則大矣}
  - {type: page-break, offset: 25, content: '', id: KR3a0001_WYG_001-10b}
  - {type: variant, offset: 25, length: 2, content: 作色, SBCK: 其知禮以其世則逺矣以其國則小矣魯公之後此言疾時之不學也不若郯子故孔子發邾隠公朝于魯子貢觀焉魯大夫也子貢時爲邾子執玉髙其容仰定公受玉卑其容俯以聘玉所玉子子貢曰以禮觀之二君者將有死亡焉夫禮生死存亡之體將左右周旋進退俯仰於是乎取之朝祀喪戎於是乎觀之今正月相朝}
  - {type: page-break, offset: 25, content: '', id: KR3a0001_SBCK_004-14a}
  - {type: variant, offset: 25, length: 2, content: 作色, WYG: 其知禮不若郯子故孔子發此言疾時之不學也邾隠公朝于魯子貢觀焉子貢時為魯大夫也邾子執玉髙其容仰定公受玉卑其容俯玉所以聘于王子貢曰以禮觀之二君者將有死亡焉夫禮生死存亡之體將左右周旋進退俯仰於是乎取之朝祀喪戎於是乎觀之今正月相朝}
  - {type: variant, offset: 25, length: 2, content: 作色, krp: 其知禮以其世則逺矣以其國則小矣魯公之後此言疾時之不學也不若郯子故孔子發邾隠公朝于魯子貢觀焉魯大夫也子貢時爲邾子執玉髙其容仰定公受玉卑其容俯以聘玉所玉子子貢曰以禮觀之二君者將有死亡焉夫禮生死存亡之體將左右周旋進退俯仰於是乎取之朝祀喪戎於是乎觀之今正月相朝}
  - {type: variant, offset: 28, length: 0, content: '', SBCK: 皆不度法度也不得其心以亡矣嘉事不體不體不得其體朝聘亦嘉事也何以能久高仰驕卑俯替驕近亂替近疾若為主其先亡乎夏五月公薨又邾子出奔孔子曰賜不幸而言中是賜多言孔子在陳陳侯就之燕遊焉行路之人云魯司鐸災官名司驛及宗廟以告孔子子曰所及者其桓僖之廟僖公桓公陳侯曰何以知之子曰禮祖有功而宗有徳故不毁其廟焉今桓僖之親盡矣又功徳不足以存其廟而魯不毁是以天災加之三日魯使至問焉則桓僖也陳侯謂子貢曰吾乃今知聖人之可貴}
  - {type: page-break, offset: 28, content: '', id: KR3a0001_SBCK_004-14b}
  - {type: page-break, offset: 28, content: '', id: KR3a0001_SBCK_004-15a}
  - {type: variant, offset: 28, length: 0, content: '', WYG: 皆不度不得其法度也心以亡矣嘉事不體朝聘亦嘉事也不體不得其體何以能久高仰驕也卑俯替也驕近亂替近疾君為主其先亡乎夏五月公薨又邾子出奔孔子曰賜不幸而言中是賜多言孔子在陳陳侯就之燕焉子遊行路之人云魯司鐸災司鐸官名及宗廟以告孔子子曰所及者其桓僖之廟桓公僖公陳侯曰何以知之子曰禮祖有功而宗有徳故不毁其廟焉今桓僖之親盡矣又功徳不足以存其廟而魯不毁是以天災加之三日魯使至問焉則桓僖也陳侯謂子貢曰吾乃今知聖人之可貴}
