  - {type: punctuation, offset: 830, content: 「, id: KR3a0001_CHANT_004-bkkpn220}
  - {type: variant, offset: 830, length: 0, content: '', SBCK: 吾聞鬼神之名而不知所謂敢問焉孔子曰人生有氣有魂氣者人之盛也神之盛也精氣者人夫生必死死必歸土此謂􅀑魂氣歸天此謂神合鬼與神而享之敎之至也至孝者教之所由生也合神鬼而事之者孝道之骨肉斃於下化為野土其氣發􅀭于上者此神之著也聖人因物之精制為之極制爲極中法中明命􅀑神以為民之則民事其祖襧也明命猶尊名使而猶以是為未足也故築為宫室設為宗祧有二祧諸侯謂始祖爲祧也宗宗廟也祧逺廟也天子特春秋祭祀以别親踈敎民反古復始不敢忘其所由生也衆之服自此聽且速焉教令也聽謂慎敎以二端二端既立報以二禮二禮謂薦黍稷二端氣與魄也也建設朝事時也薦醒燔燎羶薌所以報魄也鬰樽也鬰香草此敎民修本反始崇愛上下用情禮之至也愛也上不謂尊卑用情謂親也民能不忘其所由生然後能相}
  - {type: page-break, offset: 830, content: '', id: KR3a0001_SBCK_004-20b}
  - {type: page-break, offset: 830, content: '', id: KR3a0001_SBCK_004-21a}
  - {type: variant, offset: 830, length: 0, content: '', WYG: 吾聞鬼神之名而不知所謂敢問焉孔子曰人生有氣有魄氣者神之盛也精氣者人神之盛也衆生必死死必歸土此謂鬼魂氣歸天此謂神合鬼與神而享之敎之至也合神鬼而事之者孝道之至孝者敎之所由生也骨肉斃於下化為野土其氣揚於上此神之著也聖人因物之精制為之極極中制為中法明命鬼神以為民之則明命猶尊名使民事其祖禰也而猶以是為未足也故築為宫室設為宗祧宗宗廟也祧逺廟也天子特有二祧諸侯為始祖為祧也春秋祭祀以别親疎敎民反古復始不敢忘其所由生也衆之服自此故聴且速焉聴謂慎敎令也敎以二端二端既立報以二禮二端謂氣魄也二禮謂薦黍稷也建設朝事薦腥時也燔燎羶薌所以報氣也謂以蕭光取祭脂以合羶香也薦黍稷所謂饋食脩肺肝加以鬱鬯所以報魄也鬰香草鬯樽也此敎民脩本反始崇愛上下用情禮之至也民能不忘其所由生然後能相愛也上下謂尊卑用情謂親也}
