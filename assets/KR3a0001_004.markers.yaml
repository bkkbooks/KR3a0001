  - {type: variant, offset: 23, length: 1, content: 愀, SBCK: 曰丘聞之昔禹致群臣於㑹稽之山防風後至禹殺而戮之其骨專車焉此為大矣客曰敢問誰守為神孔子曰山川之􅂕足以紀綱天下者其守為神祀者爲神守山川之諸侯社稷之守為公侯祀者直爲公侯而巳但守社稷無山川之山川之祀者為諸侯皆屬於王之屬也神與公侯客曰防風何守孔子曰汪芒氏之君守封嵎山者封嵎山名汪芒國名為漆姓在虞夏商為汪芒氏於周為長翟氏今曰大人之時其名異也周之初及當孔子有客曰人長之極幾何孔子曰焦僥氏長三尺短之至也長者不過十數之極也孔子在陳陳惠公賔之于上館時有隼集陳侯之庭而死集庭便死隼鳥也始楛矢貫之石砮砮箭鏃楛木名其長尺有咫寸也咫八惠公使人持隼如孔子館而問焉孔子曰隼之來逺矣此肅慎氏之矢之矢也肅慎氏昔武王克商通道于九夷百蠻百蠻夷狄百種九夷東方九種使各以其方賄來貢而無忘職業於是肅慎氏貢楛矢石砮其長尺有咫先王欲昭其令徳之致逺物也以示後人使永鑒焉故銘其栝曰肅慎氏貢楛矢栝也楛箭以分大姬配胡公而封諸陳胡公舜之後大姫武王女古者分同姓以珍玉所以展親親也分異姓以逺方之職貢所以無忘服也故分陳以肅慎氏貢焉君若使有司求諸故府其可得也公使人求得之金牘如之也牘匱郯子朝魯魯人問曰少昊氏以鳥名官何也少昊金天氏也魯人叔孫昭子對曰吾祖也我知之昔黄帝以雲紀官故為雲師而雲名轅氏師黄帝軒而爲官名者也長也雲紀其官長炎帝以火氏也神農共工以水九州也共工霸大昊以龍氏也包犧其義一也而火火師而龍名也名也龍師我髙祖少昊摰之立也鳳鳥適至是以紀之於鳥故為鳥師而鳥名自顓頊氏以來不能紀逺乃紀於近為民師而命以民事則不能故也紀逺方言不能孔子聞之遂見郯子而學焉既而告人曰吾聞之天子失官學在四夷猶信郯季文子歎曰中郯小國也故呉伐官學在四夷疾時之廢學也郯少昊之後國不振旅蠻夷之伐吾亡無日矣孔子稱以其世則逺矣以其國則大矣}
