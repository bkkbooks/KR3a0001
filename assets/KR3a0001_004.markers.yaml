  - {type: variant, offset: 10, length: 1, content: 哀, SBCK: 口而利於病忠言逆於耳而利於行湯武以諤諤而昌桀紂以唯唯而亡君無争臣父無争子兄無争弟士無争友無其過者未之有也故曰君失之臣得之父失之子得之兄失之弟得之已失之友得之是以國無危亡之兆家無悖亂之惡父子兄弟無失而交友無絶也孔子見齊景}
