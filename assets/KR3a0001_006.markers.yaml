  - {type: variant, offset: 56, length: 0, content: '', WYG: 第二十七孔子閒居子張子貢言游侍論及於禮孔子曰居汝三人者吾語汝以禮周流無不遍也子貢越席而對曰敢問如何子曰敬而不中禮謂之野恭而不中禮謂之給勇而不中禮謂之逆子曰給奪慈仁巧言足恭捷給之人似仁非仁故曰給奪慈仁子貢曰敢問何以}
  - {type: variant, offset: 56, length: 0, content: '', krp: 第二十七孔子閒居子張子貢言游侍論及於禮孔子曰居汝三人者吾語汝以禮周流無不遍也子貢越席而對曰敢問如何子曰敬而不中禮謂之野恭而不中禮謂之給勇而不中禮謂之逆子曰給奪慈仁恭捷給巧言足慈仁中陟仲反下同之人似仁非仁故言給奪子貢曰敢問將何以}
  - {type: variant, offset: 57, length: 1, content: 大, SBCK: 此中禮者子曰禮乎夫禮所以制中也子貢退言游進曰敢問禮也領惡而全好者與呼報反與羊諸反領理惡烏故反好子曰然子貢問何也子曰郊社之禮所以仁􅀑神也禘嘗之禮所以仁昭穆也饋奠之禮所以仁死喪也射饗之禮所以仁鄉黨也食饗之禮所以仁賔客也明乎郊社之義禘甞之禮治國其如指諸掌而已是故居家有禮故長幼辨以之閨門有禮故三族和以之朝廷有禮故官爵序以之田獵有禮故戎事閑以之軍旅有禮故武功成是以宫室得其度鼎俎得其象物得其時樂得其節車得其軾􅀑神得其享喪紀得其哀辯説得其黨類黨百官得其禮政事得其施得各施行之其所宜加於身而措於前凡衆之動得其宜也言游退子張進曰敢問禮何謂也子曰禮者即事之治也君子有其事必有其治治國而無禮譬猶瞽之無相倀倀乎何所之倀三良反相息亮反譬猶終夜有求於幽室之中}
  - {type: page-break, offset: 57, content: '', id: KR3a0001_SBCK_006-15a}
