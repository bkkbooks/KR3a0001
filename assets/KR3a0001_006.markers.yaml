  - {type: variant, offset: 1, length: 0, content: '', SBCK: 於孔子曰舊聞五帝之名而不知其實請問何謂五帝孔子曰昔丘也聞諸老耼曰天有五行木火金水土分時化育以成萬物七十二日也化生長育一嵗一嵗三百六十日五行各主莫敢不成之功萬物其神謂之五帝佐生物者而䜟五帝五行之神亦爲妖怪妄言緯皆為之名字古之王者易代而改號取法五行五行更王終始相生亦象其義五法以生之行轉相承而諸說乃謂五精之帝行更王終始相生始以木德王天下其次言也更古衡反王音旺下生王者其為帝或無可故其為明王者而死配五行是以太皥配木炎帝配火黄帝配土少皥配金顓頊配水康子曰太皥氏其始之木何如孔子曰五行用事先起於木木東方萬物之初皆出焉是故王者則之而首以木德王天下其次則以所生之行轉相承也屬王天音旺木生火火生土之康子曰吾聞勾芒為木正祝融為火正蓐收為金正􅀇冥為水正后土為土正此五行之主而不亂稱曰帝者何也孔子曰凡五正者五行之官名五行佐成上帝而稱五帝太皥之屬配焉亦云帝従其號可以同其號天至尊物不之五帝以地有五行而其精神在上故亦亦兼稱上帝上天以其五行佐成天事謂帝之號故王者雖號稱帝而不而不或曰天帝為帝五帝黄帝之屬故亦稱帝稱帝亦從天五去逺矣曰天王者言乃天下之王也而曰天子者而天子與父其尊卑相昔少皥氏之子有四叔曰重曰該曰脩曰熙實能金木及水使重為勾芒該為蓐收脩及熈爲玄㝠顓頊氏之子曰黎爲祝融共工氏之子曰勾龍爲后土此五者各以其所能業爲官職爲職業之事各以一行之官生爲上公死爲貴神别穪五祀不得同帝神故不得稱五祀上公之地而不設者以祭社爲祭地不亦失之逺帝也正史者五正不及五帝五帝不及天以子為母不亦顚倒失尊卑之序也矣且土與火水俱爲五行是地之子也康子曰如此之言帝王改號於五行之德各有所統則其所以相變者皆主何事家而在木以問也尚赤所孔子曰所尚則各從其所王之德次焉德義之著修其母兼其子木次火而木家尚赤者以木夏后氏以金德王色尚黑大事歛用昬時亦黒也大事喪昬戎事乗驪也黒馬牲用玄殷人用水德王色尚白者避土家之尚青水家尚青而尚白大事歛用日中中日也白戎事乘翰色馬翰白牲用白周人以木德王色尚赤大事歛用日出亦赤也日出時戎事乗騵白腹騵馬牲用騂色也騂赤此三代之所以不同康子曰唐虞二帝其所尚者何色孔子曰堯以火德王色尚黄舜以土德王色尚青家土事先起於水色青是以水家避土土家尚宜尚白土者四行之主王於四季五行用白康子曰陶唐有虞夏后殷周獨不配五帝意者德不及上古耶將有限乎孔子曰古之平治水土及播殖百穀者衆矣唯勾龍氏兼食於社配也兼猶而棄為稷神易代奉之無敢益者明不可與等故自太皥以降逮于顓頊其應五行而王數非徒五而配五帝是其德不可以多也執轡第二十五閔子騫為費宰問政於孔子子曰以德以法夫德法者御民之具猶御馬之有衘勒也君者人也吏者轡也刑者䇿也夫人君之政執其轡䇿而已子騫曰敢問古之為政孔子曰古者天子以内史為左右手史内孤卿大夫則䇿命以四方之事書則讀之掌王八柄及叙事之法納以詔王聽治命故王以為左右手費芳未反王制禄則費爲之賞則亦如之以德法為衘勒以百官為轡以刑罰為䇿以萬民為馬故御天下數百年而不失善御馬正衘勒齊轡䇿均馬力和馬心故口無聲而馬應轡䇿不舉而極千里善御民壹其德法正其百官以均齊民力和安民心故令不再而民順従刑不用而天下治是以天地德之有爲德天地以而兆民懷之歸懷夫天地之所德兆民之所懷其政美其民而衆稱之民其稱舉也為衆所今人言五帝三王者其盛無偶威察若存察帝若存其盛以明其故何也其法盛其德厚故思其德必稱其人朝夕祝之升聞於天上帝俱歆用永厥世而豐其年不能御民者棄其德法専用刑辟譬猶御馬棄其衘勒而専用箠䇿其不制也可必矣夫無衘勒而用箠䇿馬必傷車必敗無德法而用刑民必流國必亡治國而無德法則民無脩民無脩則迷惑失道如此上帝必以其為亂天道也苟亂天道則刑罰暴上下相諛諛諂莫知念患俱無道故也今人言惡者必比之於桀紂其故何也其法不聽其德不厚故民惡其殘虐莫不吁嗟朝夕祝之升聞于天上帝不蠲降之以禍罰災害並生用殄厥世故曰德法者御民之本古之御天下者以六官總治焉冢宰之官以成道以成道治官所司徒之官以成德以成徳敎官所宗伯之官以成仁以成仁祀官所司馬之官以成聖征伐所以通天下也治官所以成聖聖通司冦之官以成義官刑成義所以司空之官以成}
