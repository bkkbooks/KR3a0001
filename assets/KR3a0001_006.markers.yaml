  - {type: variant, offset: 354, length: 0, content: '', WYG: 志氣塞于天地行之充於四海此之謂五至矣子夏曰敢問何謂三無孔子曰無聲之樂無體之禮無服之喪此之謂三無子夏曰敢問三無何詩近之孔子曰夙夜基命宥密無聲之樂也夙夜恭也基始也命信也宥寛也宻寧也言已行與民信五敎在寛民以安寜故謂之無聲之樂也威儀逮逮不可選也無體之禮也凡民有喪扶伏救之無服之喪也子夏曰言則美矣大矣言盡於此而已}
