  - {type: variant, offset: 49, length: 1, content: 民, WYG: 端女子十五許嫁有適人之道於此而往則自婚矣羣生閉藏乎隂而為化育之始隂為冬也冬藏物而為化育始故聖人因時以合偶男子窮天數也極也霜降而婦功成嫁娶者行焉季秋霜降嫁娶者始於此詩云將子無怒秋以為期也冰泮而農桑起婚禮而殺於此泮散也正月農事起蠶者援桑婚禮始殺言未止也至二月農事始起㑹男女之無夫家者奔者期盡此月故也詩云士如歸妻迨冰未泮言如欲使妻歸當及冰未泮散之盛時男子者任天道而長萬物者也知可為知不可為知可言知不可言知可行知不可行者也是故審其倫而明其别謂之知所以効匹夫之聽也聽宜為德女子者順男子之敎而長其理者也為男女長養其理分是故無專制之義而有三従之道幼従父兄既嫁従夫夫死従子言無再醮之端始嫁言醮禮無再醮之端言不改事人也敎令不出於閨門事在供酒食而已無閫外之非義也閫門限婦人以貞専無閫外之儀詩云無非無儀惟酒食是議不越境而奔喪事無擅為行無獨成叅知而後動可驗而後言晝不遊庭夜行以火所以効疋婦之德也孔子遂言曰女有五不取逆家子也亂家子也世有刑人子也世有惡疾子也喪父長子也此五者皆不取也逆家子者謂其逆德亂家子者謂其亂倫世有刑人子者謂其棄於人也有惡疾子者謂其棄於天也喪父長子者謂其無受命也婦有七出三不去七出者不順父母出無子出淫僻出嫉妒出惡疾出多口舌出竊盜出不順父母出者其逆德也無子者謂其絶世也婬僻者謂其亂族嫉妬者謂其亂家惡疾者謂其不可供粢盛多口舌者謂其離親竊盜者謂其反義三不去者謂有所取而無所歸一也與共更三年之喪二也先貧賤後富貴者三也凡此聖人所以順男女之際重婚姻之始也孔子曰禮}
