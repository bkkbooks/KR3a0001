  - {type: punctuation, offset: 55, content: 、, id: KR3a0001_CHANT_006-bkkpn19}
  - {type: variant, offset: 55, length: 0, content: '', SBCK: 也資於事父以事母而愛同天無二日國無二君家無二尊以治之故父在為母齊衰朞者見無二尊也百官備百物具不言而事行者扶而起天謂侯也子諸言而後事行者杖而起士也卿大夫身自執事行者面垢而已人也謂庶此以權制者也親始死三日不怠三月不懈朞悲號三年憂哀之殺也聖人因殺以制節也戒反殺所論}
  - {type: variant, offset: 55, length: 0, content: '', WYG: 也資於事父以事母而愛同天無二日國無二君家無二尊以治之故父在為母齊衰朞者見無二尊也百官備百物具不言而事行者扶而起謂天子諸侯也言而後事行者杖而起卿大夫士也身自執事行者面垢而已謂庶人也此以權制者也親始死三日不怠三月不懈朞悲號三年憂哀之殺也聖人因殺以制節也論}
