  - {type: variant, offset: 2, length: 0, content: '', WYG: 為祭地不亦失之逺矣且土與水火俱為五行是地之子也以子為母不亦顛倒失尊卑之序康子曰如此之言帝王改號於五行之德各所統則其所以相變者皆主何事怪木家而尚赤所以問也孔子曰所尚則各従其所王之德次焉木次火而木家尚赤者以木德義之著修其母兼其子夏后氏以金德王而尚黑大事斂用昏大事喪昏時亦黒也戎事乗驪黒馬也牲用𤣥殷人以水德王尚白水家尚青而尚白者避木家之尚青大事斂用日中日中白也戎事乘翰翰白色馬牲用白周人以木德王尚赤大事斂用日出日出時亦赤也戎事乗騵騵騮馬白腹牲用騂騂赤類也此三代之所以不同康子曰唐虞二帝其所尚者何色孔子曰堯以火德王色尚黄舜以土德王色尚青土家宜尚白土者四行之主王於四季五行用事先起於木色青是以木家避土土家之所尚白康子曰陶唐有虞夏后殷周獨不得配五帝意者德不及上古耶將有限乎孔子曰古之平治水土及播殖百穀者衆矣唯勾龍兼食於社兼猶配也而棄為稷神易代奉之無敢益者明不可與等故自太皥以降逮於顓頊其應五行而王數非徒五而配五帝是其德不可以多也執轡}
