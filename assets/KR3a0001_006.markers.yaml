  - {type: variant, offset: 4, length: 0, content: '', WYG: 官總治焉冢宰之官以成道治官所以成道也司徒之官以成德敎官所以成徳宗伯之官以成仁禮官所以成仁司馬之官以成聖治官所以成聖聖通征伐所以通天下也司冦之官以成義刑官所以成義司空之官以成禮事官所以成禮禮非事不立也六官在手以為轡可㑹均仁以為納納驂馬轡轡繋軾前者司會掌邦之六典八法之戒以周知四方之治冢宰之副故不在其六轡而當納故位故曰御四馬者執六轡御天下者正六官是故善御馬者正身以總轡均馬力齊馬心逥旋曲折唯其所之故可以取長道可赴急疾此聖人所以御天地與人事之法則也天子以内史為左右手以六官為轡已而與三公為執六官均五敎齊五法仁義禮智信之法也故亦唯其所引無不如志以之道則國治冢宰治官以之德則國安德敎成以之仁則國和禮之用和為貴則國安以之仁則國和以之聖則國平通治逺近則國平也以之禮則國定事物以禮則國定也以之義則國義義平也刑罰當罪則國平此御政之術過失人情莫不有焉過而改之是謂不過故官屬不理分職不明法政不一百事失紀曰亂亂則飭冢宰飭謂整矗之也地而不殖財物不蕃萬民飢寒敎訓不行風俗淫僻人民流散曰危危則飭司徒父子不親長幼失序君臣上下乖離異志曰不和不和則飭宗伯賢能而失官爵功勞而失賞禄司勲之職屬大司馬士卒疾怨兵弱不用曰不平不平則飭司馬刑罰暴亂姦邪不勝曰不義不義則飭司冦度量不審舉事失理都鄙不修財物失所曰貧貧則飭司空故御者同是車馬或以取千里或不及數百里其所謂進退緩急異也夫治者同是官法或以致平或以致亂者亦其所以為進退緩急異也古者天子常以季冬考德正法以觀治亂德盛者治也德薄者亂也故天子考德則天下之治亂可坐廟堂之上而知之夫德盛則法修德不盛則飭法與政咸德而不衰治與政皆合於徳則不殺故曰王者又以孟春論吏之德及功能能德法者為有徳能行徳法者為有行能成德法者為有功能治德法者為有智故天子論吏而德法行事治而功成夫季冬正法孟春論吏治國之要子夏問於孔子曰商聞易之生人及萬物鳥獸昆蟲各有竒偶氣分不同易主天地以生萬物言受氣各有分數不齊同而凡人莫知其情唯達道德者能原其本焉天一地二人三三三如九九九八十一一主日日數十故人十月而生一主日日従一而生日者陽従竒數日數十従甲至癸也八九七十二偶以承竒竒主辰辰為月月主馬故馬十二月而生偶以承竒隂以承陽辰數十二従子至亥也七九六十三三主斗斗主狗故狗三月而生斗次日月故三主斗六九五十四四主時時主豕故豕四月而生時以次斗五九四十五五為音音主猨故猨五月而生音不過五故五為音四九三十六六為律律主鹿故鹿六月而生三九二十七七主星星主虎故虎七月而生星二十八宿為四方方有七故七主星也二九一十八八主風風為蟲故蟲八月而生風之數盡於八凡蟲為風風為主也其餘各従其類矣鳥魚生隂而屬於陽故皆卵生魚遊於水鳥遊於雲故立冬則鷰雀入海化為蛤蠶食而不飲蟬飲而不食蜉蝣不飲不食萬物之所以不同介鱗夏食而冬蟄介甲蟲也齕吞者八竅而卵生八竅鳥屬齟􅻾者九竅而胎生九竅人及獸屬四足者無羽翼戴角者無上齒無角無前齒者膏有角無齒者脂淮南取此義曰無角者膏而無前有角者脂而無後膏豕屬而脂羊屬無前後皆謂鋭小也晝生者類父夜生者似母是以至隂主牝至陽主牡敢問其然乎孔子曰然吾昔聞諸老耼亦如汝之言子夏曰商聞山書曰地東西為緯南北為經山為積德川為積刑髙者為生下者為死丘陵為牡谿谷為牝蜯蛤龜珠與日月而盛虚月盛則蜯蛤之屬滿月虧則虚也是故堅土之人剛弱土之人柔墟土之人大沙土之人細息土之人美㘪土之人醜㘪耗字也息土細緻㘪土麄疎者也食水者善遊而耐寒食土者無心而不息螾屬不氣息也食木者多力而不治血氣不治淮南子曰多力而弗戾亦不治之貌者也食草者善走而愚食桑者有緒而蛾食肉者勇毅而捍食氣者神明而壽食穀者智恵而巧不食者不死而神故曰羽蟲三百有六十而鳯為之長毛蟲三百有六十而麟為之長甲蟲三百有六十而龜為之長鱗蟲三百有六十而龍為之長倮蟲三百有六十而人為之長此乾坤之美也乾天象也殊形異類之數王者動必以道靜必順理以奉天地之性而不害其所主謂之仁聖焉子夏言終而出子貢進曰商之論也何如孔子曰汝謂何也對曰微則微矣然則非治世之待也孔子曰然各其所能孔子曰然子貢治世不待此事此事之急然亦各其所知能也本命解第二十六魯}
