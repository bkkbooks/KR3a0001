  - {type: variant, offset: 495, length: 255, content: 者未有宮室冬則居營窟夏則居橧巢未有火化食草木之實鳥獸之肉飲其血茹其毛未有絲麻衣其羽皮後聖有作然後脩火之利範金合土以為臺榭宮室戶牖以炮以燔以烹以炙以為醴酪治其絲麻以為布帛以養生送死以事鬼神故玄酒在室醴醆在戶粢醍在堂澄酒在下陳其犧牲備其鼎俎列其琴瑟管磬鐘鼓以其祝嘏以降其上神與其先祖以正君臣以篤父子以睦兄弟以齊上下夫婦有所是謂承天之祜作其祝號玄酒以祭薦其血毛腥其俎熟其殽趏席以坐疏布以罩衣其浣帛醴醆以獻薦其燔炙君與夫人交獻以嘉魂魄是謂合莫然後退而合烹體其犬豕牛羊實其簠簋籩豆鉶羹祝以孝告嘏以慈告是為大祥此禮之大成也, WYG: 肅注}
