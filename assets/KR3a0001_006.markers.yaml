  - {type: variant, offset: 1, length: 0, content: '', WYG: 於孔子曰舊聞五帝之名而不知其實請問何謂五帝孔子曰昔丘也聞諸老耼曰天有五行木火金水土分時化育以成萬物一嵗三百六十日五行各主七十二日也化生長育一嵗之功萬物莫敢不成其神謂之五帝五帝五行之神佐天生物者後世讖緯皆為之名字亦為妖怪妄言古之王者易代而改號取法五行五行更王終始相生亦象其義法五行更王終始相生始以木德王天下其次以生之行轉相承而諸説乃謂五精之帝下生王者其為蔽惑無可言者也故其為明王者而死配五行是以太皥配木炎帝配火黄帝配土少皥配金顓頊配水康子曰太皥氏其始之木何如孔子曰五行用事先起於木木東方萬物之初皆出焉是故王者則之而首以木德王天下其次則以所生之行轉相承也木生火火生土之屬康子曰吾聞勾芒為木正祝融為火正蓐收為金正𤣥冥為水正后土為土正此則五行之主而不亂稱曰帝者何也夫子曰凡五正者五行之官名五行佐成上帝而稱五帝太皥之屬配焉亦云帝従其號天至尊物不可以同其號亦兼稱上帝上得包下五行佐成天事謂之五帝以地有五行而其精神在上故亦為之上帝黄帝之屬故亦稱帝葢従天五帝之號故王者雖號稱帝而不得稱天帝而曰天子者而天子與父其尊卑相去逺矣曰天王者言乃天下之王也昔少皥氏之子有四叔曰重曰該曰修曰熙實能金木及水使重為勾芒該為蓐收修及熙為𤣥𡨕顓頊氏之子曰黎為祝融龔工氏之子曰勾龍為后土此五者各以其所能業為官職各以一行之官為職業之事生為上公死為貴神别稱五祀不得同帝五祀上公之神故不得稱帝也其序則五正不及五帝五帝不及天地而不知者以祭}
