  - {type: variant, offset: 56, length: 0, content: '', SBCK: 第二十七孔子閒居子張子貢言游侍論及於禮孔子曰居汝三人者吾語汝以禮周流無不遍也子貢越席而對曰敢問如何子曰敬而不中禮謂之野恭而不中禮謂之給勇而不中禮謂之逆子曰給奪慈仁恭捷給巧言足慈仁中陟仲反下同之人似仁非仁故言給奪子貢曰敢問將何以}
