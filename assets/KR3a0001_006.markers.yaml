  - {type: variant, offset: 357, length: 0, content: '', WYG: 曰何謂其然吾語汝其義猶有五起焉子夏曰何如孔子曰無聲之樂氣至不違無體之禮威儀遲遲無服之喪内恕孔哀無聲之樂所願必従無體之禮上下和同無服之喪施及萬邦既然而又奉之以三無私而勞天下此之謂五起子夏曰何謂三無私孔子曰天無私覆地無私載日月無私照其在詩曰帝命不違至于湯齊至湯興天心齊湯降不遲聖敬日躋不遲}
