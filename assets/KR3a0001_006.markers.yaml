  - {type: variant, offset: 53, length: 0, content: '', SBCK: 象五行也有五等服之制其義四時也故喪禮有舉焉有恩有義有節有權象四時所以舉其恩厚者其服重故為父母斬衰三年以恩制者也門内之治恩掩義門外之治義掩恩資於事父以事君而敬同尊尊貴貴義之大也故為君亦服衰三年以義制者也三日而食三月而沐期而練毁不滅性不以死傷}
  - {type: variant, offset: 53, length: 0, content: '', WYG: 象五行也服之制有五等也其義四時也故喪禮有舉焉有恩有義有節有權所以舉象四時其恩厚者其服重故為父母斬衰三年以恩制者也門内之治恩掩義門外之治義掩恩資於事父以事君而敬同貴尊貴尊義之大也故為君亦服衰三年以義制者也三日而浴三月而沐期而練毁不滅性不以死傷}
