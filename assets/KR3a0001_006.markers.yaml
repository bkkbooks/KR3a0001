  - {type: variant, offset: 2, length: 0, content: '', krp: 禮非事不立也事官所以成禮六官在手以為轡㑹司均仁以為納轡繋軾前納驂馬轡方之治冢宰之副故不在其六轡至當納者司㑹掌邦之六典八法之戒以周知四位故曰御四馬者執六轡御天下者正六官是故善御馬者正身以總轡均馬力齊馬心囘旋曲折唯其所之故可以取長道可赴急疾此聖人所以御天地與人事之法則也天子以内史為左右手以六官為轡已而與三公為執六官均五敎齊五法信之法也仁義禮智故亦唯其所引無不如志以之道則國治治官冢宰以之德則國安之仁則國德敎成以爲貴則國安和禮之用和以之仁則國和以之聖則國平則國平也通治逺近以之禮則國安則國定也事物以禮以之義則國義當罪則國平義平也刑罰此御政之術過失人之情莫不有焉過而改之是爲不過故官屬不理分職不明法政不一百事失紀曰亂亂則飭冢宰攝人也飭謂整地而不殖財物不蕃萬民饑寒敎訓不行風俗淫僻人民流散曰危危則飭司徒父子不親長幼失序君臣上下乖離異志曰不和不和則飭宗伯賢能而失官爵功勞而失賞禄勲司之司馬之職屬士卒疾怨兵弱不用曰不平不平則飭司馬刑罰暴亂姦邪不勝曰不義不義則飭司冦度量不審舉事失理都鄙不脩財物失所曰貧貧則飭司空故御者同是車馬或以取千里或不及數百里其所謂進退緩急異也夫治者同是官法或以致平或以致亂者亦其所以爲進退緩急異也古者天子常以季冬考德正法以觀治亂德盛者治也德薄者亂也故天子考德則天下之治亂可坐廟堂之上而知之夫德盛則法修德不盛則飭法與政咸德而不衰於徳則不殺治與政皆合故曰王者又以孟春論之德及功能能德法者為有徳能行徳法者為有行孟反行下能成德法者為有功能治德法者為有智故天子論吏而德法行事治而功成夫季冬正法孟春論吏治國之要子夏問於孔子曰商聞易之生人及萬物鳥獸昆蟲各有竒耦氣分不同以生萬物易主天地齊同分扶問反言受氣各有分數不而凡人莫知其情唯達德者能原其本焉天一地二人三三如九九九八十一一主日日數十故人十月而生竒數日數十従甲至癸也一主日従一而生日者陽従八九七十二偶以從竒竒主辰辰為月月主馬故馬十二月而生十二従子至亥也奇居偶以承竒隂以承陽辰數反宜七九六十三三主斗斗主狗故狗三月而生故以主斗斗次日月六九五十四四主時時主豕故豕四月而生故五為音音不過五四九三十六六為律律主鹿故鹿六月而生三九二十七七主星星主虎故虎七月而生八宿為星二十度七主星也四方方有七二九一十八八主風風為蟲故蟲八月而生蟲為風風為蟲也風之數盡於八凡其餘各従其類矣鳥魚生隂而屬於陽故皆卵生魚遊於水鳥遊於雲故立冬則燕雀入海化為蛤蠶食而不飲蟬飲而不食蜉蝣不飲不食萬物之所以不同介鱗夏食而冬蟄蟲也介甲齕吞者八竅而卵生齕下没反八竅鳥屬齟􅻾者九竅而胎生壯所反􅻾疾雀反九竅人及獸屬齟四足者無羽翼戴角者無上齒無角無前齒者膏無角無後齒者脂角者膏而無前有淮南取此義曰無屬無前後皆謂其銳小者也角者脂而無後膏豚屬而脂羊晝生者類父夜生者似母是以至隂主牝至陽主牡敢問其然乎孔子曰然吾昔聞老耼亦如汝之言子夏曰商聞山書曰地東西為緯南北為經山為積德川為積刑髙者為生下者為死丘陵為牡谿谷為牝蜯蛤龜珠與日月而盛虚屬滿月虧則虚月盛則蜯蛤之是故堅土之人剛弱土之人柔墟土之人大沙土之人細息土之人美㘪土之人醜息土細緻㘪耗字也踈者也㘪土麤食水者善遊而耐寒食土者無心而不息氣息也螟屬不食木者多力而不治不治血氣戾亦不治之貌者也淮南子曰多力而弗食草者善走而愚食桑者有緒而蛾食肉者勇毅而捍食氣者神明而壽食穀者智恵而巧不食者不死而神故曰羽蟲三百有六十而鳯為之長毛蟲三百有六十而麟為之長甲蟲三百有六十而龜為之長鱗蟲三百有六十而龍為之長倮蟲三百有六十而人為之長此乾巛之美也巛地乾天殊形異類之數王者動必以道動靜必以道靜必順理以奉天地之性而不害其所主謂之仁聖焉子夏言終而出子貢進曰商之論也何如孔子曰汝謂何也對曰微則微矣然則非治世之待也孔子曰然各其所能貢治世不待孔子曰然子亦各其所知能也此事此事之急然本命解}
