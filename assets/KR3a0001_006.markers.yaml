  - {type: variant, offset: 49, length: 1, content: 民, SBCK: 端女子十五許嫁有適人之道於此而徃則自婚矣群生閉藏乎隂而為化育之始物而為化育始隂為冬也冬藏故聖人因時以合偶男子窮天數也極霜降而婦功成嫁娶者行焉詩云將子無怒秋以為期季秋霜降嫁娶者始於此也冰泮而農桑起婚禮而殺於此正月農泮散也月農事始起㑹男女之無夫家者奔者期事起蠶者採桑婚禮始殺言未正也至二如欲使妻歸當及冰未泮散之盛時也盡此月故也詩云士如歸妻迨冰未泮言戒反殺所男子者任天道而長萬物者也知可為知不可為知可言知不可言知可行知不可行者是故審其倫而明其别謂之知所以效匹夫之聽也為德聽宜女子者順男子之敎而長其理者也養其理也為男子長是故無專制之義而有三従之道幼従父兄既嫁従夫夫死従子言無再醮之端無再醮之端始嫁言醮禮也人醮子肖反綂言不改事人敎令不出於閨門事在供酒食而已無閫外之非義也以自専無閫閫門限婦人酒食是議閫苦本反外之威儀詩云無非無儀不越境而奔喪事無擅為行無獨成叅知而後動可驗而後言晝不遊庭夜行以火所以效匹婦之德也孟反行下孔子遂言曰女有五不取子也逆家也喪父長子也此五者皆不取也矣亂家子也世有刑人子也世有惡疾子逆家子者逆德謂其亂家子者亂倫謂其世有刑人子者於人也謂其棄有惡疾子者於天也謂其棄喪父長子受命也謂其無婦有七出三不去七出者母出無不順父疾出多口舌出竊盜出子出淫僻出惡疾出姑不順父母出者其謂也逆德無子者世也謂其絶淫僻者族也謂其亂嫉妬者家也謂其亂惡疾者供粢盛也謂其不可多口舌者其謂也離親竊盜者義也謂其反三不去者謂有所取無所歸也一與共更三年之喪也二先貧賤後富貴也三凡此聖人所以順男女之際重婚姻之始也孔子曰禮}
