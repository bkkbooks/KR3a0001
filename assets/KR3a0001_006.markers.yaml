  - {type: variant, offset: 3, length: 0, content: '', WYG: 二十五閔子騫為費宰問政於孔子子曰以德以法夫德法者御民之具猶御馬之有衘勒也君者人也吏者轡也刑者䇿也夫人君之政執其轡䇿而已子騫曰敢問古之為政孔子曰古者天子以内史為左右手内史掌王八柄及叙事之法受納以詔王聽治命孤卿大夫則䇿命以四方之事書而讀之王制禄則書之䇿賞則亦如之故王以為左右手以德法為衘勒以百官為轡以刑罰為䇿以萬民為馬故御天下數百年而不失善御馬者正銜勒齊轡䇿均馬力和馬心故口無聲而馬應轡䇿不舉而極千里善御民者壹其德法正其百官以均齊民力和安民心故令不再而民順従刑不用而天下治是以天地德之天地以為有德而兆民懷之懷歸夫天地之所德兆民之所懷其政美其民而稱之其民為衆所稱舉也今人言五帝三王者其盛無偶威察若存其盛以明察帝若存其故何也其法盛其德厚故思其德必稱其人朝夕祝之升聞於天上帝俱歆用永厥世而豐其年不能御民者棄其德法専用刑辟譬猶御馬棄其衘勒而専用箠䇿其不制也可必矣夫無衘勒而用箠䇿馬必傷車必敗無德法而用刑民必流國必亡治國而無德法則民無修民無修則迷惑失道如此上帝必以其為亂天道也苟亂天道則刑罰暴上下相諛諂諛莫知念患俱無道故也今人言惡者必比之於桀紂其故何也其法不聽其德不厚故民惡其殘虐莫不吁嗟朝夕祝之升聞於天上帝不蠲降之以禍罰災害竝生用殄厥世故曰德法者御民之本古之御天下者以}
