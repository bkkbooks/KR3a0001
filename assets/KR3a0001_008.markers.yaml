  - {type: variant, offset: 916, length: 0, content: '', krp: 貫革之射息也首騶虞所為節也左東學右西學貍禆冕搢笏而虎賁之士脱劍禆冕脱劒解劍也衮冕之屬通謂之分反賁符郊祀后稷而民知尊父焉配明堂而民知孝焉朝覲然後諸侯知所以臣耕籍然後民知所以敬親奉祠祀之粢盛親耕藉田所以六者}
  - {type: variant, offset: 918, length: 1, content: 正, SBCK: 之大教也食三老五更於太學天子􅃝而割牲執醬而饋執爵而酳謂之酳也食已飲酒㣧酳音冕而總干舞位親在所以教諸侯之弟也如此則周道四達禮樂交通夫武之遲久不亦宜乎問玉第三十六子貢問於孔子曰敢問君子貴玉而賤珉何也為玉之寡而珉多歟珉眉巾反珉石似玉孔子曰非為玉之寡故貴之珉之多故賤之夫昔者君子比徳於玉温􅃳而澤仁也縝密以栗智也縝之忍反緻直利反縝密緻塞貎栗堅也廉而不劌義也割傷也劌呼外反割而有廉隅而不垂之如墜禮也尚禮卑謙叩之}
  - {type: page-break, offset: 918, content: '', id: KR3a0001_SBCK_008-12a}
  - {type: variant, offset: 918, length: 1, content: 正, WYG: 之大教也食三老五更於太學天子袒而割牲執醬而饋執爵而酳食已飲酒謂之酳也冕而總干親在舞位所以教諸侯之弟如此則周道四達禮樂交通夫武之遲久不亦宜乎問玉第三十六子貢問於孔子曰敢問君子玉貴而珉賤何也為玉之寡而珉之多歟珉石似玉孔子曰非為玉之寡故貴之珉之多故賤之夫昔者君子比徳於玉温潤而澤仁也縝密以栗智也縝宻緻塞貎栗堅也廉而不劌義也劌割有廉隅而不割傷也垂之如墜禮也禮尚謙卑叩之}
