  - {type: variant, offset: 1028, length: 147, content: 人與之一簞食一壺漿孔子聞之使子貢止之子路忿然不說往見孔子曰由也以暴雨將至恐有水災故與民脩溝洫以備之而民多匱餓者是以簞食壺漿而與之夫子使賜止之是夫子止由之行仁也夫子以仁教而禁其行仁也由不受也孔子曰汝以民為餓也何不白於君發倉廩以賑之而私以爾食饋之是汝明君之無惠而見己之德美汝速已則可不則汝之見罪必矣, SBCK: 屈節解第三十七}
