  - {type: variant, offset: 749, length: 1, content: 說, WYG: 有廟者以太祖故曰不為太祖雖在禘郊其廟則毁據后稷而言殷人之郊㝠㝠以有大功契旣為太祖之廟若復郊則冥永不與於祀典是以郊㝠耳古者祖有功而宗有德諸見祖宗者其廟皆不毁祖宗者不毁之名其廟有功者謂之祖至於周文王是也有徳者謂之宗武王是也二廟自有祖宗乃謂之二祧又以為配食明堂之名亦可謂違聖相失實事也子羔問曰祭典云昔有虞氏祖顓頊而宗堯夏后氏亦祖顓頊而宗禹殷人祖契而宗湯周人祖文王而宗武王此四祖四宗或乃異代或其考祖之有功徳其廟可也若有虞宗堯夏祖顓頊皆異代之有功徳者也亦可以存其廟乎孔子曰善如汝所問也如殷周之祖宗其廟可以不毁其他祖宗者功徳不殊雖在殊代亦可以無疑矣詩云蔽茀甘棠勿翦勿伐召伯所憩蔽茀小貎甘棠杜也憩息也周人之於召公也愛其人猶敬其所舍之樹況祖宗其功徳而可以不尊奉其廟焉辯樂解第三十五孔子學琴於師襄子襄子曰吾雖以擊磬為官然能於琴今子於琴已習可以益矣孔子曰丘未得其數也有間曰已習其數可以益矣孔子曰丘未得其志也有間曰已習其志可以益矣孔子曰丘未得其為人也有間曰孔子有所繆然思焉繆然深思貎有所然髙望而逺眺眺見曰丘迨得其為人矣迨近黮而黑黮黑貎頎然長頎長貎曠如望羊曠用志廣逺望羊逺視也掩有四方掩同也文王之時三分天下有其二後周有四方文武之功也非文王其孰能為此師襄子避席葉拱而對曰葉拱兩手薄其心也}
