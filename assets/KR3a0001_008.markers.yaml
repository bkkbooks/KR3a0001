  - {type: variant, offset: 916, length: 0, content: '', SBCK: 貫革之射息也首騶虞所為節也左東學右西學貍禆冕搢笏而虎賁之士脱劍禆冕脱劒解劍也衮冕之屬通謂之分反賁符郊祀后稷而民知尊父焉配明堂而民知孝焉朝覲然後諸侯知所以臣耕籍然後民知所以敬親奉祠祀之粢盛親耕藉田所以六者}
  - {type: page-break, offset: 916, content: '', id: KR3a0001_SBCK_008-11b}
  - {type: variant, offset: 916, length: 0, content: '', WYG: 貫革之射息也左東學右西學狸首騶虞所為節也裨冕搢笏而虎賁之士脱劒衮冕之屬通謂之裨冕脱劒解劒也郊配后稷而民知尊父焉配明堂而民知孝焉朝覲然後諸侯知所以臣耕藉然後民知所以敬親親耕藉田所以奉祠祀之粢盛六者}
