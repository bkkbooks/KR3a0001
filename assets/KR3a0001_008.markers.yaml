  - {type: variant, offset: 966, length: 0, content: '', SBCK: 其教可知也其為人也温柔敦厚詩教也䟽通知逺書教也廣博易良樂教也㓗靜精微易教也恭儉莊敬禮教也屬辭比事春秋教也故詩之失愚厚敦書之失誣之失知逺樂之失奢易之失賊之失精微禮之失煩春秋之失亂事之失屬辭比其為人也温柔敦厚而不愚則深於詩者矣䟽通知逺而不誣則深於書者矣廣博易良而不奢則深於樂者矣㓗靜精微而不賊則深於易者矣恭儉莊敬而不煩則深於禮者屬辭比事而不亂則深於春秋者矣天有四時者春夏秋冬風雨霜露無非教也地載神氣吐納雷霆流形庶物無非教也清明在躬氣志如神則其氣志如神也清明之徳在身也有物將至其兆必先必先有兆應之者也物事}
  - {type: page-break, offset: 966, content: '', id: KR3a0001_SBCK_008-13a}
