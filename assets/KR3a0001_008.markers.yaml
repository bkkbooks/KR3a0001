  - {type: variant, offset: 904, length: 1, content: 正, SBCK: 分陜蚤成欲事久立於綴所以待諸侯之至也今汝獨未聞牧野之語乎武王克殷而反商之政未及下車則封黃帝之後於薊封帝堯之後於祝封帝舜之後於陳下車又封夏之士使為諸侯命之曰鞬橐矢而不用者言所以藏弓橐也將即亮反率徒對反鞬居言反將率之士力也故使以為諸侯為之鞬然後}
  - {type: page-break, offset: 904, content: '', id: KR3a0001_SBCK_008-10a}
  - {type: page-break, offset: 904, content: '', id: KR3a0001_SBCK_008-11a}
  - {type: variant, offset: 904, length: 1, content: 正, WYG: 商為殷之賢人行者使箕子求商容乎行猶索也庶民弛政解其力役之事旣濟河西馬㪚之華山之陽而弗復乘牛㪚之桃林之野而弗復服桃林西方塞也車甲則釁之而藏諸府庫以示弗復用倒載干戈而包之以虎皮將率之士使為諸侯命之鞬橐言所以橐弓矢而不用者將率之士力也故建以為諸侯為之鞬橐也然後}
