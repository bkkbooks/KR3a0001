  - {type: variant, offset: 345, length: 0, content: '', SBCK: 諸侯之有冠禮也夏之末造也造諸侯冠禮夏之末世乃有自來矣今無譏焉故今無所譏言有所從來天子冠者武王崩成王年十有三而嗣立周公居冢宰攝政以治天下明年夏六月旣􅁙歲十有三周書亦曰橫為年紀蹙促成年少又命周公武王崩武王崩元年六月􅁙與此若合符而説者可為冠與痛哉後五月乃攝政良冠成王而朝于祖以見諸侯亦有君也周公命祝雍作頌曰祝王達而未㓜祝雍辭曰使王近於民之心也常得民逺於年長壽嗇於時}
