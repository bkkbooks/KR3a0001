  - {type: variant, offset: 1185, length: 0, content: '', SBCK: 地而不能屈節以求伸則不足以論乎人之域矣孔子曰君子之行巳期於必達於巳可以屈則屈可以伸則伸故屈節者所以有待求也待知求伸者所以及時時也及良是以雖受屈而不毁其節志達而不犯於義乃行合於義也孔子在衛聞齊國田常將欲}
