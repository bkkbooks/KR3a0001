  - {type: variant, offset: 759, length: 0, content: '', SBCK: 冉有以告子路子路懼而自悔靜思不食以至骨立夫子曰過而能改其進矣乎周賔牟賈侍坐於孔子孔子與之言及樂曰夫武之備誡之以久何也誡擊鼓警衆武謂周武備也對曰病疾不得其衆其士衆之心敬者病憂也憂恐不得也詠歎之淫液之何也淫滋味淫液歆對曰恐不逮事安民和衆事言汲汲欲及此發揚蹈厲之巳蚤何也至其發作又疾厲病備戒雖久對曰及時事及其時欲令事武坐致右而軒左何也膝不至地也右膝至地左對曰非武坐武坐言無聲淫及商何也淫貪商言聲歆對曰非武音也下除殘賊非苟貪商武王之事不得巳}
