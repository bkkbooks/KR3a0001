  - {type: variant, offset: 1632, length: 1054, content: 日不倦者其惟學焉其容體不足觀也其勇力不足憚也其先祖不足稱也其族姓不足道也終而有大名以顯聞四方流聲後裔者豈非學者之效也故君子不可以不學其容不可以不飭不飭無類無類失親失親不忠不忠失禮失禮不立夫遠而有光者飭也近而愈明者學也譬之污池水潦注焉萑葦生焉雖或以觀之孰知其源乎子路見於孔子曰負重涉遠不擇地而休家貧親老不擇祿而仕昔者由也事二親之時常食藜藿之實為親負米百里之外親歿之後南遊於楚從車百乘積粟萬鍾累茵而坐列鼎而食願欲食藜藿為親負米不可復德也枯魚衘索幾何不蠹二親之壽忽若過隙孔子曰由也事親可謂生事盡力死事盡思者也孔子之郯遭程子於塗傾蓋而語終日甚相親顧謂子路曰取束帛以贈先生子路屑然對曰由聞之士不中閒見女嫁無媒君子不以交禮也有閒又顧謂子路子路又對如初孔子曰由詩不云乎有美一人清揚宛兮邂逅相遇適我願兮今程子天下賢士也於斯不贈則終身弗能見也小子行之孔子自衛反魯息駕於河梁而觀焉有懸水三十仞圜流九十里魚鱉不能道黿鼉不能居有一丈夫方將厲之孔子使人竝涯止之曰此懸水三十仞圜流九十里魚鱉黿鼉不能居也意者難可濟也丈夫不以措意遂度而出孔子問之曰子巧乎有道術乎所以能入而出者何也丈夫對曰始吾之入也先以忠信及吾之出也又從以忠信措吾軀於波流而吾不敢以用私所以能入而復出也孔子謂弟子曰二三子識之水且猶可以忠信成身親之而況於人乎孔子將行雨而無蓋門人曰商也有之孔子曰商之為人也甚恡於財吾聞與人交推其長者違其短者故能久也楚王渡江江中有物大如斗圓而赤直觸王舟舟人取之王大怪之遍問群臣莫之能識王使使聘于魯問於孔子子曰此所謂萍實者也可剖而食之吉祥也唯霸者為能獲焉使者反王遂食之大美久之使來以告魯大夫大夫因子游問曰夫子何以知其然乎曰吾昔之鄭過乎陳之野聞童謠曰楚王渡江得萍實大如斗赤如日剖而食之甜如蜜此是楚王之應也吾是以知之子貢問於孔子曰死者有知乎將無知乎子曰吾欲言死之有知將恐孝子順孫妨生以送死吾欲言死之無知將恐不孝之子棄其親而不葬賜欲知死者有知與無知非今之急後自知之子貢問治民於孔子子曰懍懍焉若持腐索之扞馬子貢曰何其畏也孔子曰夫通達之御皆人也以道導之則吾畜也不以道導之則吾讎也如之何其無畏也魯國之法魯人有贖臣妾於諸侯者皆取金於府子貢贖人於諸侯而還其金孔子聞之曰賜失之矣夫聖人之舉事也可以移風易俗而教導可以施於百姓非獨適身之行也今魯國富者寡而貧者眾贖人受金則為不廉不受金則何以相贖乎自今以後魯人不復贖人於諸侯矣子路治蒲請見於孔子曰由願受教於夫子子曰蒲其何如對曰邑多壯士又難治也子曰然吾語爾恭而敬可以攝勇寬而正可以懷強愛而恕可以容困溫而斷可以抑姦如此而正不難矣, SBCK: ''}
