  - {type: variant, offset: 1390, length: 241, content: 適齊中路聞哭者之聲其音甚哀孔子謂其僕曰此哭哀則哀矣然非喪者之哀也驅而前少進見有異人焉擁鐮帶索哭音不哀孔子下車追而問曰子何人也對曰吾丘吾子也曰子今非喪之所奚哭之悲也丘吾子曰吾有三失晚而自覺悔之何及曰三失可得聞乎願子告吾無隱也丘吾子曰吾少時好學周徧天下後還喪吾親是一失也長事齊君君驕奢失士臣節不遂是二失也吾平生厚交而今皆離絕是三失也夫樹欲靜而風不停子欲養而親不待往而不來者年也不可再見者親也請從此辭遂投水而死孔子曰小子識之斯足為戒矣自是弟子辭歸養親者十有三人孔子謂伯魚曰鯉乎吾聞可以與人, SBCK: 家語卷第八}
