  - {type: variant, offset: 1001, length: 0, content: '', SBCK: 目巧作室阼阼階也隩於到反位室西南隅謂之隩席則有上下車則有左右行則並隨立則有列序古之義也室而無隩阼則亂於堂室矣席而無上下則亂於席次矣之次第亂於席上車而無左右則亂於車上矣行而無並隨則亂於階􅂗矣階升則階􅂗亂塗無並隨列而無次序則亂於著矣立之著所間謂之著也位也門屏之昔者明王聖人辯貴賤長㓜正男女内外序親踈逺近而莫敢相踰越者皆由}
