  - {type: variant, offset: 968, length: 27, content: 信於群臣而留可也行忠於卿大夫則仕可也澤施於百姓則富可也, SBCK: 有事將至是故天地之教與聖人相參其在詩曰嵩髙惟嶽峻極于天惟嶽降神生甫及申靈和氣岳降神問}
