  - {type: variant, offset: 1186, length: 0, content: '', SBCK: 亂無君之專齊有也心而憚鮑晏之卿大夫也鮑氏晏氏齊因欲移其兵以伐魯孔子㑹諸弟子而告之曰魯父母之國不可不救不忍視其受敵今吾欲屈節於田常以救魯二三子誰爲使於是子路曰請徃齊孔子弗許子張請徃又弗許子石請徃又弗許三子退謂子貢曰今夫子欲屈節以救父母之國吾三}
