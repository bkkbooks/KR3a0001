  - {type: variant, offset: 531, length: 0, content: '', SBCK: 公冠則以卿為賓無介公自為主迎賓揖升自阼立于席北其醴也則如士饗之以三獻之禮旣醴降自阼階諸侯非公而自為主者其所以異皆降自西階賓也西階玄端與皮弁端玄弁自服其服也緇布冠之服皮異朝服素畢示不忘古服朝而畢公冠四加冠公四加玄冕祭着祭服加玄冕其酬幣于賓則束帛乘馬謂之人幣乘馬駟馬也已冠而饗既饗與賓幣王太子庻子之冠擬焉擬諸侯冠禮也王之太子庻子皆皆天子自為三其禮與士無變饗食賔也皆同懿子曰始冠必加緇布之冠何也孔子曰示不忘古太古冠布齋則緇之其緌也}
  - {type: page-break, offset: 531, content: '', id: KR3a0001_SBCK_008-3a}
