  - {type: variant, offset: 1191, length: 0, content: '', WYG: 緩師吾請救於吳令救魯而伐齊子因以兵迎之田常許諾子貢遂南說吳王曰王者不滅國霸者無強敵千鈞之重加銖兩而移今以齊國而私千乘之魯與吳爭強甚為王患之且夫救魯以顯名以撫泗上諸侯泗水名也誅暴齊以服晉利莫大焉名存亡魯實困强齊智者不疑吳王曰善然吳常困越越王今苦身養士有報吳之心子待我伐越然後乃可子貢曰越之勁不過魯吳之强不過齊而王置齊而伐越則齊以私魯矣王方以存亡繼絶之名棄強齊而伐小越非勇也勇者不避難}
