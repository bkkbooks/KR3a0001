  - {type: variant, offset: 876, length: 0, content: '', SBCK: 之志荒矣賔牟賈起免席而請曰夫武之備誡之以久則旣聞命矣敢問遲矣而又久立於綴何也子曰居吾語爾夫樂者象成者也而為樂象成功據反語魚總干而山立武王之事也山立不動總持干若發揚蹈厲太公之志也鷹􅀭志在武亂皆坐周邵之治也以象安民之事也武亂武治皆坐而且夫武始成而北出再成而㓕商三成而南反而南也誅紂已四成而南國是疆以為疆界言有南國五成而分陜}
