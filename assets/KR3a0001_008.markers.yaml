  - {type: variant, offset: 1303, length: 373, content: 殘於齊而無憂色是知權命也桎梏居檻車而無慚心自裁審也事所射之君通於變也不死子糾量輕重也夫子糾未成君而管仲未成臣管仲才度義管仲不死束縛而立功名未可非也召忽雖死過於取仁未足多也孔子適齊中路聞哭者之聲其音甚哀孔子謂其僕曰此哭哀則哀矣然非喪者之哀也驅而前少進見有異人焉擁鐮帶索哭音不哀孔子下車追而問曰子何人也對曰吾丘吾子也曰子今非喪之所奚哭之悲也丘吾子曰吾有三失晚而自覺悔之何及曰三失可得聞乎願子告吾無隱也丘吾子曰吾少時好學周徧天下後還喪吾親是一失也長事齊君君驕奢失士臣節不遂是二失也吾平生厚交而今皆離絕是三失也夫樹欲靜而風不停子欲養而親不待往而不來者年也不可再見者親也請從此辭遂投水而死孔子曰小子識之斯足為戒矣自是弟子辭歸養親者十有三人孔子謂伯魚曰鯉乎吾聞可以與人終日不倦者其惟學焉其容體不足觀也其勇力不足憚也其先祖不足稱也其族姓不足道也終而有大名以顯聞, WYG: 語卷八欽定}
