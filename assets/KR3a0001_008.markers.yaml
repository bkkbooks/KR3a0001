  - {type: variant, offset: 1191, length: 0, content: '', krp: 緩師吾請於吳令救魯而伐齊子因以兵迎之田常許諾子貢遂南說吳王曰王者不滅國霸者無强敵千鈞之重加銖兩而移今以齊國而私千乘之魯與吾爭強甚為王患之且夫救魯以顯名以撫泗上諸侯名也泗水誅暴齊以服晉利莫大焉名存亡魯實困强齊智者不疑吳王曰善然吳常困越越王今苦身飬士有報吳之心子待我先越然後乃可子貢曰越之勁不過魯吳之彊不過齊而王置齊而伐越則齊必私魯矣王方以存亡繼絶之名棄齊而伐小越非勇也勇者不避難旦反難乃}
  - {type: variant, offset: 1192, length: 0, content: '', SBCK: 者不窮約智者不失時義者不絶世今存越示天下以仁救魯伐齊威加􅀳國諸侯必相率而朝霸業盛矣且王必惡越臣請見越君令出兵以從此則實害越而名從諸侯以伐齊吳王悦乃遣子貢之越越王郊迎而自爲子貢御曰此蠻夷之國大夫何足儼然辱而臨之子貢曰今者吾説吳王以救魯伐齊税説音其志欲之而心畏越曰待我伐越而後可則破越必矣且無報人之志而令人疑之拙矣有報人之意而使人知之殆乎事未發而先聞者危矣三者舉事之患}
  - {type: page-break, offset: 1192, content: '', id: KR3a0001_SBCK_008-17a}
  - {type: variant, offset: 1192, length: 0, content: '', WYG: 者不窮約智者不失時義者不絶世今存越示天下以仁救魯伐齊威加晉國諸侯必相率而朝霸業盛矣且王必惡越臣請見越君令出兵以從此則實害越而名從諸侯以伐齊吳王悦乃遣子貢之越越王郊迎而自為子貢御曰此蠻夷之國大夫何足儼然辱而臨之子貢曰今者吾説吳王以救魯伐齊其志欲之而心畏越曰待我伐越乃可此則破越必矣且無報人之志而令人疑之拙矣有報人之意而使人知之殆乎事未發而先聞者危矣三者舉事之患}
