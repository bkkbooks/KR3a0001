  - {type: variant, offset: 968, length: 1, content: 信, WYG: 有事將至必先有兆應之者也是故天地之教與聖人相參其在詩曰嵩髙惟嶽峻極于天惟嶽降神生甫及申嶽降神靈和氣生申甫成大功也惟申及甫唯周之翰翰幹美其宗族世有大功}
