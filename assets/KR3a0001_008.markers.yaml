  - {type: variant, offset: 749, length: 1, content: 說, SBCK: 有廟自以太為太祖之廟若復郊則􅄀永不與於祀典后稷而言殷人不郊􅄀以􅄀有大功契旣􅄀者也是以郊古者祖有功而宗有德謂之祖宗者其廟皆不毁功者謂之祖至於周文王祖宗者不毁之名其廟有宗乃謂之二祧又以為配食明堂之名亦是也有徳者謂之周武王是二廟自有祖失寔事也可謂逹聖指子羔問曰祭典云昔有虞氏祖顓頊而宗堯夏后氏亦祖顓頊而宗禹殷人祖契而宗湯周人祖文王而宗武王此四祖四宗或乃異代或其考祖之有功徳其廟可也若有虞宗堯夏祖顓頊皆異代之有功徳者也亦可以存其廟乎孔子曰善如汝所聞也如殷周之祖宗其廟可以不毁其他祖宗者功徳不殊雖在殊代亦可以無疑矣詩云蔽芾甘棠勿翦勿伐邵伯所憇芾蔽也憇席也小貎甘棠杜周人之於邵公也愛其人猶敬其所舍之􅀣况祖宗其功徳而可以不尊奉其廟焉辯樂解第三十五孔子學琴於師襄子襄子曰吾雖以擊磬為官然能於琴今子於琴已習可以益矣孔子曰丘未得其數也有間曰已習其數可以益矣孔子曰丘未得其志也有間曰已習其志可以益矣孔子曰丘未得其為人也有間曰孔子有所謬然思焉思貎謬然深有所睪然髙望而逺眺反眺他弔反眺見也睪羊益曰丘迨得其為人矣近黮而黑黮勑感反黮黑貎頎然長頎渠希反頎長貎曠如望羊望羊逺視也曠用志廣逺奄有四方其二後周有四方文王之功也奄同也文王之時三分天下有非文王其孰能為此師襄子避席葉拱而對曰薄其心也葉拱兩手}
