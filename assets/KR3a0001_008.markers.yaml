  - {type: variant, offset: 597, length: 3, content: 缺季羔, SBCK: 虞以至于周之所不變也有廟以有文武故祧當遷者而以為文廟自有虞以至於周周禮不異而説者以周記云王者禘其祖之所自以其祖所岀以或有甚矣禮典皆有七廟之文唯䘮服小故立四廟今有虞亦始王者而旣立七廟其祖配之而立四廟謂始王者未有始祖之言亦妄矣矣則喪服小記凡四代帝王之所謂郊者皆以配天其所謂禘者皆五年大祭之所及也年大祭而及殷周禘嚳五應爲太祖者則其廟不毁不及太祖雖在禘郊其廟則毁矣享考諸禘祖故}
  - {type: page-break, offset: 597, content: '', id: KR3a0001_SBCK_008-5b}
  - {type: variant, offset: 597, length: 3, content: 缺季羔, WYG: 王分地建國設祖宗祖有功宗有徳乃為親疎貴賤多少之數是故天子立七廟三昭三穆與太祖之廟而七太祖近廟皆月祭之近為髙祖下親為近逺廟為祧有二祧焉祧逺意親盡為祧二祧者髙祖及父母祖是也享嘗乃止四時祭也諸侯立五廟降天子二二昭二穆與太祖之廟而五祖考廟始祖廟也享嘗乃止大夫立三廟降諸侯二也一昭一穆與太祖之廟而三享嘗乃止士立一廟降大夫二}
