  - {type: variant, offset: 757, length: 1, content: 善, SBCK: 甚矣由之不才也夫先王之制音也奏中聲以為節流入於南不歸於北夫南者生育之鄉北者殺伐之城故君子之音温柔居中以飬生育之氣憂愁之感不加于心也暴厲之動不在于體也夫然者乃所謂治安之風也小人之音則不然亢麗微末以象殺伐之氣中和之感不載於心温和之動不存于體夫然者乃所以為亂之風昔者舜彈五絃之琴造南風之詩其詩曰南風之薫兮可以解吾民之愠兮南風之時兮可以阜吾民之財兮阜盛也得其時唯脩此化故其興也勃焉徳如泉流至于今王公大人述而弗忘殷紂好為北鄙之聲其廢也忽焉至于今王公大人舉以為誡夫舜起布衣積徳含和而終以帝紂為天子荒淫􅁀亂而終以亡非各所修之致乎由今也匹夫之徒曾無意于先王之制而習亡國之聲豈能保其六七尺之體}
