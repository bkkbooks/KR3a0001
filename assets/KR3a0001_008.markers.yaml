  - {type: variant, offset: 1187, length: 0, content: '', SBCK: 請使而不獲徃此則吾子用辯之時也吾子盍請行焉子貢請使夫子許之遂如齊説田常曰今子欲收功於魯實難不若移兵於吳則易豉反易以田常不悦子貢曰夫憂在内者攻强憂在外者攻弱吾聞子三封而三不成是則大臣不聽令戰勝以驕主破國以尊臣國則益尊者也鮑晏等率師若破而子之功不與焉則交日䟽於主而與大臣爭如此則子之位危矣田常曰善然兵甲巳加魯矣不可更耕更音}
  - {type: page-break, offset: 1187, content: '', id: KR3a0001_SBCK_008-15b}
