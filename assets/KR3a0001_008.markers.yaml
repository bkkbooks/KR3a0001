  - {type: variant, offset: 1193, length: 0, content: '', krp: 勾踐頓首曰孤嘗不料力而興吳難旦反難乃受困㑹稽痛於骨髓日夜焦唇乾舌徒欲與吳王接踵而死孤之願也今大夫幸告以利害子貢曰吳王爲人猛暴群臣不堪國家疲弊百姓怨上大臣内變申胥以諫死子胥也申胥伍大宰嚭也嚭普鄙反嚭吳王佞臣用事此則報吳之時也王誠能發卒佐之以邀其志邀激射其志而重寶以悦其心卑辭以尊其禮則其伐齊必矣此聖人所謂屈節求其達者也彼戰不勝王之福若勝則必以兵臨晉臣還北請見晉君共攻之其弱吳必矣鋭兵盡於齊重甲困於晉而王制其弊焉越王頓首許諾子貢返五日越使大夫文種頓首言於吳王曰越悉境内之士三千人以事吳吳王告子貢曰越王欲身從寡人可乎子貢曰悉人之率衆又從其君非義也吳王乃受越王卒謝留勾踐遂自發國内之兵以伐齊敗之子貢遂北見晉君令承其弊吳晉遂遇於黃池越王襲吳之國吳王歸與越戰㓕焉孔子曰夫其亂齊存魯吾之始願若能强晉以弊吳使吳亡而越霸者賜之說之也美言傷信慎言哉六年卒吳以二孔子以哀公十己將亡而言之也十二年㓕時吳知孔子弟子有宓子賤者仕於魯為單父宰善單音恐魯君聽讒言使巳不得行其政於是辭行故請君之近史二人與之俱至官宓子戒其邑吏密宓音令二史書方書輙掣其肘書不善則從而怒之二史患之辭請歸魯宓子曰子之書甚不善子勉而歸矣二史歸報於君曰宓子使臣書而掣肘書惡而又怒臣邑吏皆笑之此臣所以去之而來也魯君以問孔子子曰宓不齊君子也其才任霸王之佐屈節治單父將以自試也意者以此為諫乎公窹太息而歎曰此寡人之不肖寡人亂宓子之政而責其善者非矣微二史寡人無以知其過微夫子寡人無以自窹遽發所愛之使告宓子曰自今已徃單父非吾有也從子之制有便於民者子决為之五年一言其要宓子敬奉詔遂得行其政於是單父治焉躬敦厚明親親尚篤敬施至仁加懇誠致忠信百姓化之齊人攻魯道由單父單父之老請曰麥已熟矣今齊冦至不及人人自收其麥請放民出皆穫傳郭之麥可以益糧且不資於冦三請而宓子不聽俄而齊冦逮于麥季孫聞之怒使人以讓宓子曰民寒耕熱耘曾不得食豈不哀哉不知猶可以告者而子不聽非所以爲民也宓子蹵然曰今兹無麥明年可樹若使不耕者穫是使民樂有冦洛樂音且得單父一歲之麥於魯不加强䘮之不加弱浪反䘮身若使民有自取之心其創必數世不息季孫聞之赧然而愧曰地若可入吾豈忍見宓子哉乃赧反版三年孔子使巫馬期逺觀政焉巫馬期隂免衣衣弊裘下於旣反衣衣上如字入單父界見夜漁者得魚輙舍之捨舎音巫馬期問焉曰凡漁者爲得何以得魚即舍之漁者曰魚之大者名爲䲖吾大夫愛之其小者名爲鱦懐任之者也鱦戈證反䲖宜爲鱣新序作鱨鮑魚之吾大夫欲長之是以得二者輙舍之巫馬期返以告孔子曰宓子之徳至使民闇行若有嚴刑於旁敢問宓子何行而得於是孔子曰吾嘗與之言曰誠於此者刑乎彼宓子行此術於單父也孔子之舊曰原壤其毋死夫子將助之以沐槨}
