  - {type: variant, offset: 893, length: 1, content: 正, WYG: 四面會振威武四伐者伐四方與紂同惡也分夾而進所以事蚤濟所以分夾而蚤進者欲事蚤成久立於綴所以待諸侯之至也今汝獨未聞牧野之語乎武王克殷而反商之政未及下車則封黃帝之後於薊封帝堯之後於祝封帝舜之後於陳下車又封夏后氏之後於把殷之後於宋武王伐殷封}
