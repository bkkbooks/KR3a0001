  - {type: variant, offset: 998, length: 1, content: 參, SBCK: 師爾以為必布几筵揖讓升降酌獻酬酢然後謂之禮乎爾以必行綴兆執羽籥作鐘鼓然後謂之樂乎言而可履禮也行而可樂樂也音洛下音岳綴知劣反樂上聖人力此二者以躬巳南面是故天下太平萬民順伏百官承事上下有禮也夫禮之所以興衆之所以治也禮之所以廢衆之所以亂也目巧之室則有隩阼必有隩阼}
