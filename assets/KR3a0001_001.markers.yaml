  - {type: variant, offset: 863, length: 0, content: '', SBCK: 無所之也言如歸家始誅第二孔子為魯司冦攝行相事有喜色仲由問曰由聞君子禍至不懼福至不喜今夫子得位而喜何也孔子曰然有是言也不曰樂以貴下人乎於是朝政七日而誅亂政大夫少正卯戮之于兩觀之下闕名兩觀尸於朝三日子貢進曰夫少正卯魯之聞人也今夫子為政而始誅之或者為失乎孔子曰居吾語汝以其故天下有大惡者五而竊盗不與焉一曰心逆而險二曰行僻而堅三曰言偽而辯四曰記醜而博非義醜謂五曰順非而澤此五者有一於人則不免君子之誅而少正卯皆兼有之其居處足以撮徒成黨聚撮其談説足以飾褒榮衆其強禦足以反是獨立此乃人之姦雄者也不可以不除夫殷湯誅尹諧文王誅潘正周公誅管蔡太公誅華士聚黨也而韓非謂士之為人虚偽亦而太公誅之豈所以謂太公者哉華士耕而後食鑿井而飲信其如此管仲誅付乙子産誅史何是此七子皆異世而同誅者以七子異世而同惡故不可赦也詩云憂心悄悄愠于羣小小人成羣斯足憂矣孔子為魯大司㓂有父子訟者夫子同狴執之牢也狴獄三月不别其父請止夫子赦之焉季孫聞之不悦曰司冦欺余曩告余曰國家必先以孝余今戮一不孝以教民孝不亦可乎而又赦何哉冉有以告孔子子喟然歎曰嗚呼上失其道而殺其下非理也不教以孝而聽其獄是殺不辜三軍大敗不可斬也獄犴不治不可刑也何者上教之不行罪不在民故也夫慢令謹誅賊也徵歛無時􅁀也不試責成虐也政無此三者然後刑可即也書云義刑義殺勿庸以即汝心惟曰未有慎事言必教而後刑也就汝心之所安當謹之自謂未有順事庸用也即就也刑教皆當以義勿用以而後為順是先教而後刑也且陳道徳以服之以無刑殺既陳道德以先服之而猶不可尚賢以勸之又不可即廢之又不可而後以威憚之若是三年而百姓正矣其有邪民不從化者然後待之以刑則民咸知罪矣詩云天子是毗俾民不迷當毗輔天子使民不迷毗輔也俾使也言師尹是以威厲而不試刑錯而不用今世則不然亂其教繁其刑使民迷惑而䧟焉又從而制之故刑彌繁而盗不勝也夫三尺之限空車不能登者何哉峻故也百仞之山重載陟焉何哉陵遲故也陂池也陵遲猶今世俗之陵遲久矣雖有刑法民能勿踰乎王言解第三曾子閒居曽參侍孔子曰參乎今之君子唯士與大夫之言可聞也至於君子之言者希也於乎吾以王言之其不出户牖而化天下曽子起下席而對曰敢問何謂王之言孔子不應曽子曰侍夫子之閒也難對是以敢問孔子又不應曽子肅然而懼摳衣而退負席而立有頃孔子歎息顧謂曽子曰參汝可語明王之道與曽子曰非敢以為足也請因所聞而學焉子曰居吾語汝夫道者所以明德也德者所以尊道也是以非德道不尊非道德不明雖有國之良馬不以其道服乗之不可以道里雖有博地衆民不以其道治之不可以致霸王是故昔者明王内修七教外行三至七教修然後可以守三至行然後可以征明王之道其守也則必折衝千里之外其征則必還師衽席之上故曰内修七教而上不勞外行三至而財不費此之謂明王之道也曽子曰不勞不費之謂明王可得聞乎孔子曰昔者帝舜左禹而右臯陶不下席而天下治夫如此何上之勞乎政之不平君之患也令之不行臣之罪也若乃十一而税用民之力歲不過三日入山澤以其時而無征闗譏市鄽皆不收賦譏異服譏呵也不賦稅古之法也識異言及市􅆵皆此則生財之路而明王節之何財之費乎曽子曰敢問何謂七教孔子曰上敬老則下益孝上尊齒則下益悌上樂施則下益寛上親賢則下擇友上好德則下不隠上惡貧則下耻争上廉讓則下耻節此之謂七教七教者治民之本也政教定則本正也凡上者民之表也表正則何物不正是故人君先立仁於已然後大夫忠而士信民敦俗璞愿貌璞慤男慤而女貞六者教之致也布諸天下四方而不怨納諸尋常之室而不塞等之以禮立之以義行之以順則民之棄惡如湯之灌雪焉曽子曰道則至矣弟子不足以明之孔子曰參以為姑止乎又有焉昔者明王之治民也法必裂地以封之分屬以理之然後賢民無所隠􅁀民無所伏使有司日省而時考之進用賢良退貶不肖然則賢者悦而不肖者懼哀鰥寡養孤獨恤貧窮誘孝悌選才能此七者修則四海之内無刑民矣上之親下也如手足之於腹心下之親上也如㓜子之於慈母矣上下相親如此故令則從施則行民懐其德近者悦服逺者来附政之致也夫布指知寸布手知尺舒肘知尋斯不逺之則也周制三百步為里千步爲井三井而埒埒三而矩里數此說方里之名疑此誤不可以言井井自五十里而都封百里而有國乃爲福積資求焉恤行者有亡是以蠻夷諸夏雖衣冠不同言語不合莫不來賔故曰無市而民不乏無刑而民不亂田獵罩弋弋繳射􅇁掩網非以盈宫室也徵歛百姓非以盈府庫也慘怛以補不足禮節以損有餘多信而寡貌其禮可守其言可覆其迹可履如飢而食如渴而飲民之信之如寒暑之必驗故視逺若邇非道邇也見明德也是故兵革不動而威用利不施而親萬民懐其惠此之謂明王之守折衝千里之外者也曽子曰敢問何謂三至孔子曰至禮不讓而天下治至賞不費而天下士悦至樂無聲而天下民和明王篤行三至故天下之君可得而知天下之士可得而臣天下之民可得而用曽子曰敢問此義何謂孔子曰古者明王必盡知天下良士之名既知其名又知其實又知其數及其所在焉然後因天下之爵以尊之此之謂至禮不讓而天下治因天下之禄以富天下之士此之謂至賞不費而天下之士悦如此則天下之民名譽興焉此之謂至樂無聲而天下之民和故曰所謂天下之至仁者能合天下之至親也所謂天下之至明者能舉天下之至賢者也此三者咸通然後可以征是故仁者莫大乎愛人智者莫大乎知賢賢政者莫大乎官能有土之君修此三者則四海之内供命而已矣夫明王之所征必道之所廢者也是故誅其君而改其政弔其民而不奪其財故明王之政猶時雨之降降至則民悦矣是故行施彌博得親彌衆此之謂還師衽席之上而無憂言安安大婚解第四孔子侍坐於哀公公問曰敢問人道孰為大孔子愀然作色而對曰君及此言也百姓之惠也固臣敢無辭而對人道政為大夫政者正也君為正則百姓從而正矣君之所為百姓之所從君不為正百姓何所從乎公曰敢問為政如之何孔子對曰夫婦别男女親君臣信三者正則庻物從之公曰寡人雖無能也願知所以行三者之道可得聞乎孔子對曰古之政愛人為大所以治愛人禮為大所以治禮敬為大敬之至矣大婚為大大婚至矣冕而親迎親迎者敬之也是故君子興敬為親捨敬則是遺親也弗親弗敬弗尊也愛與敬其政之本與公曰寡人願有言也然冕而親迎不已重乎孔子愀然作色而對曰合二姓之好以繼先聖之後以為天下宗廟社稷之主君何謂已重焉故言以為天下之主魯周公之後得郊天也公曰寡人實固陋鄙不固安得聞此言乎寡人欲問不能爲辭請少進孔子曰天地不合萬物不生大婚萬世之嗣也君何謂已重焉孔子遂言曰内以治宗廟之禮足以配天地之神地神之次言宗廟天出以治直言之禮以立上下之敬言禮矣身正然可以正夫婦正則始可以治正也人者物耻則足以振之足以振救之耻事不知禮國耻足以興之以興起者也耻國不知足故爲政先乎禮禮其政之本與孔子遂言曰昔三代明王必敬妻子也蓋有道焉妻也者親之主也子也者親之後也敢不敬與是故君子無不敬敬也者敬身為大身也者親之支也敢不敬與不敬其身是傷其親傷其親是傷本也傷其本則支從之而亡三者百姓之象也所法而行言百姓之身以及身子以及子妃以及妃君以修此三者則大化愾乎天下矣滿氣昔太王之道也女國無鰥民愛其身以太王出亦姜女入亦姜人之子故曰太王之道及人之身愛其子以及如此國家順矣公曰敢問何謂敬身孔子對曰君子過言則民作辭過行則民作則言不過辭動不過則百姓恭敬以從命若是則可謂能敬其身則能成其親矣公曰何謂成其親孔子對曰君子者乃人之成名也百姓與名謂之君子則是成其親為君而為其子也孔子遂言曰愛政而不能愛人則不能成其身不能成其身則不能安其土不能安其土則不能樂天也天道公曰敢問何能成身孔子對曰夫其行已不過乎物謂之成身不過乎合天道也公曰君子何貴乎天道也孔子曰貴其不已也如日月東西相從而不已也是天道也不閉而能久通而能不閉常無極乆言是天道也無為而物成是天道也已成而明之是天道也公曰寡人且愚㝠惷言暗也愚􅄀幸煩子之於心其心所能行也欲煩孔子議識孔子蹴然避席而對曰仁人不過乎物孝子不過乎親是故仁人之事親也如事天事天如事親此謂孝子成身公曰寡人既聞如此言無如後罪何孔子對曰君子及此言是臣之福也儒行解第五孔子在衛冉求言於季孫曰國有聖人而不能用欲以求治是猶却步而欲求及前人不可得已今孔子在衛衛將用之已有才而以資鄰國難以言智也請以重幣迎之季孫以告哀公公從之孔子既至舍哀公館焉子舍就孔公自阼階孔子賔階升堂立侍公曰夫子之服其儒服與孔子對曰丘少居魯衣逢掖之衣褒大也深衣之長居宋冠章甫之冠丘聞之君子之學也博其服以鄉鄉也隨其丘未知其為儒服也公曰敢問儒行孔子曰略言之則不能終其物悉數之則留僕未可以對正位掌儐相更衣之爲久留乆也僕太僕君燕朝則相代者也將倦使之哀公命席孔子侍坐曰儒有席上之珍以待聘王之道以為政治席上之珍能敷陳先夙夜强學以待問懐忠信以待舉力行以待取徳以待人取力行仁義道其自立有如此者儒有衣冠中動作順其大讓如慢畧也慢簡小讓如偽大則如威小則如媿難進而易退粥粥若無能也其容貌有如此者儒有居處齊難荘齊難也可畏其起坐恭敬言必誠信行必忠正道塗不争險易之利冬夏不争隂陽之和愛其死以有待也養其身以有為也其備預有如此者儒有不寳金玉而忠信以為寳不祈土地而仁義以為土地不求多積多文以為富難得而易禄也易禄而難畜也非時不見不亦難得乎非義不合不亦難畜乎先勞而後禄不亦易禄乎其近人情有如此者儒有委之以財貨而不貪淹之以樂好而不滛劫之以衆而不懼阻之以兵而不懾兵爲之難阻難也以見利不虧其義見死不更其守徃者不悔來者不豫過言不再過言不再流言不極不窮極也流言相毀不斷其威莊也常嚴不習其謀其謀慮不豫習其特立有如此者儒有可親而不可刼可近而不可迫可殺而不可辱其居處不過其飲食不溽其過失可微辯而不可面數也其剛毅有如此者儒有忠信以為甲胄禮義以為干櫓櫓大㦸干楯也戴仁而行抱德而處雖有􅁀政不更其所其自立有如此者儒有一畆之宫環堵之室言其小者也方丈曰堵一堵蓽門圭窬門也圭窬穿蓽門荆竹織如圭也墻爲之蓬戶甕牖破甕爲牖也以編蓬爲戸易衣而出後可以出更相易衣而并日而食以爲一食也并一日之粮上答之不敢以疑疑貳事君也君用之不敢上不答之不敢以謟其爲士有如此者儒有今人以居古人以同稽今世行之後世以為楷也法若不逢世上所不受下所不推詭謟之民有比黨而危之身可危也其志不可奪也雖危起居猶竟身其志乃不忘百姓之病也居起危動静猶終身不忘百姓猶動静也竟終也言身雖其憂思有如此者儒有博學而不窮篤行而不倦幽居而不滛上通而不困禮必以和優游以法慕賢而容衆毁方而瓦合下與衆人小合去已之大圭角其寛裕有如此者儒有内稱不避親外舉不避怨程功積事不求厚禄効而已不求厚程猶効也言功也禄推賢達能不望其報君得其志民頼其德苟利國家不求富貴其舉賢援能有如此者儒有澡身浴德沐浴於徳行也常目潔淨其身陳言而伏不望其報陳言於君靜言而正之而上下不知也黙而翹之又不急爲也事而止之則君言事君清靜因急爲所以爲不爲不知黙而翹發之不不臨深而爲髙不加少而為多位自矜莊言不因勢世治不輕世亂不沮不自沮不自輕同已不與異已不非其特立獨行有如此者儒有上不臣天子下不事諸侯慎静尚寛底厲廉隅强毅以與人博學以知服雖以分國視之如錙銖銖八兩爲錙視之輕如錙弗肯臣仕其規為有如此者儒有合志同方營道同術並立則樂相下不厭久别則聞流言不信義同而進不同而退其交有如此者夫温良者仁之本也慎敬者仁之地也寛裕者仁之作也作動遜接者仁之能也禮節者仁之貌也言談者仁之文也歌樂者仁之和也分散者仁之施也儒皆兼此而有之猶且不敢言仁也其尊讓有如此者儒有不隕穫於貧賤不安之貌隕穫憂悶不充詘於富貴參擾之貌充詘踊躍不溷君王不累長上不閔有司故曰儒所辱病儒者中和之名溷辱閔疾言不爲君長今人之名儒也忘常以儒相詬疾辱詬哀公既得聞此言也言加信行加敬曰終殁吾世弗敢復以儒為戲矣問禮第六哀公問於孔子曰大禮何如子之言禮何其尊也孔子對曰丘也鄙人不足以知大禮也公曰吾子言焉孔子曰丘聞之民之所以生者禮為大非禮則無以節事天地之神焉非禮則無以辯君臣上下長幼之位焉非禮則無以别男女父子兄弟婚姻親族踈數之交焉是故君子此之為尊敬然後以其所能教順百姓不廢其㑹節能所會節謂親踈之節也謂禮也會謂男女之既有成事而後治其文章黼黻以别尊卑上下之等其順之也而後言其䘮祭之紀宗廟之序品其犧牲設其豕腊修其歲時以敬其祭祀别其親疎序其昭穆而後宗族㑹醼即安其居以綴恩義卑其宫室節其服御車不雕璣器不彤鏤食不二味心不滛志以與萬民同利古之明王行禮也如此公曰今之君子胡莫之行也孔子對曰今之君子好利無厭滛行不倦荒怠慢遊固民是盡以遂其心以怨其政忤其衆以伐有道求得當欲不以其所其情欲而已言苟求得當虐殺刑誅不以其治夫昔之用民者由前所言用上今之用民者由後所言用下是即今之君子莫能為禮也言偃問曰夫子之極言禮也可得而聞乎孔子言我欲觀夏是故之杞於杞也夏后封而不足徵也成徵吾得夏時焉夏數得天心中於四時之正正我欲觀殷道是故之宋封宋殷后而不足徵也吾得乾坤焉地隂陽之書也乾天坤地得天乾坤之義夏時之等吾以此觀之夫禮初也始於飲食太古之時燔黍擘豚加於燒石之上而食之古未有釜甑釋米擗肉汙鐏杯飲蕢桴土鼓手飲之也鑿地爲罇以猶可以致敬鬼神求備物也神饗德不及其死也升屋而號告曰髙某復然後飲腥苴熟將葬苞苴以遣始死含以珠貝送之奠以形體則降魂氣則上是謂天望而地藏也形體藏而在地魂氣升而在天故生者南嚮死者北首皆從其初也昔之王者未有宫室冬則居營窟夏則居橧巢有柴謂櫓在樹曰巢掘地而居謂之營窟未有火化食草木之實鳥獸之肉飲其血茹其毛未有絲麻衣其羽皮後聖有作然後修火之利範金用刑範也治金爲器合土作瓦物合和以以為宫室户牖以炮以燔火曰燔也毛曰炮加以烹以炙炮之曰炙煑之曰烹以為醴酪酪漿酢醴醴酒治其絲麻以為布帛以養生送死以事鬼神故玄酒在室尚古在略近玄酒水也言醴醆在户五齊二曰醴食齊也曰食齊醴齊三粢醍在堂澄齊深醍澄酒在下其酒也澄清漏陳其犧牲備其鼎爼列其琴瑟管磬鐘鼓以降上神天神上神與其先祖以正君臣以篤父子以睦兄弟以齊上下夫婦有所是謂承天之祐作其祝號皆異爲之號也犧牲玉帛祝辭玄酒以祭薦其血毛腥其爼熟其殽熟猶有所言雖有所忘古也腥腥本不越席以坐席也翦蒲䟽布以羃酒巾羃覆用踈也也質故衣其浣帛爲祭服練染以醴醆以獻薦其燔炙君與夫人交獻以嘉魂魄樂也嘉善然後退而合烹禮無復醒也合其烹熟之體其犬豕牛羊觧體而薦之其牲禮實其簠簋之器也受黍稷籩豆鉶羮籩木竹曰以盛羮也曰豆鉶所祝以孝告語於先祖祝通孝子嘏以慈告語於孝子嘏傳先祖是為大祥善祥此禮之大成也五儀解第七哀公問於孔子曰寡人欲論魯國之士與之為治敢問如何取之孔子對曰生今之世志古之道居今之俗服古之服舎此而為非者不亦鮮乎曰然則章甫絇履冠也章甫有鉤飾也絇履履頭紳帶縉笏者皆賢人也縉捶也紳大帶書思對命笏所以執孔子曰不必然也丘之所言非此之謂也夫端衣玄裳冕而乗軒者則志不在於食焄軒軒車焄辛菜也端衣玄裳齋服也斬衰管菲杖而歠粥者則志不在於酒肉生今之世志古之道居今之俗服古之服謂此類也公曰善哉盡此而已乎孔子曰人有五儀有庸人有士人有君子有賢人有聖人審此五者則治道畢矣公曰敢問何如斯可謂之庸人孔子曰所謂庸人者心不存慎終之規口不吐訓格之言法格不擇賢以託其身不力行以自定見小闇大而不知所務從物如流不知其所執此則庸人也公曰何謂士人孔子曰所謂士人者心有所定計有所守雖不能盡道術之本必有率也行也率猶雖不能備百善之美必有處也是故知不務多必審其所知言不務多必審其所謂言之要也所務者謂行不務多必審其所由智既知之言既道之要也得其行既由之則若性命之形骸之不可易也富貴不足以益貧賤不足以損此則士人也公曰何謂君子孔子曰所謂君子者言必忠信而心不怨咎怨仁義在身而色無伐之色也無伐善思慮通明而辭不專篤行信道自强不息油然若将可越而終不可及者此則君子也不進油然越過也之貌也公曰何謂賢人孔子曰所謂賢人者德不踰閑法閑行中規繩言足以法於天下而不傷於身無口過也言滿天下道足以化於百姓而不傷於本身本亦富則天下無宛財積宛故或誤不着草矣也古字亦或作此施則天下不病貧此則賢者也公曰何謂聖人孔子曰所謂聖者德合於天地變通無方窮萬事之終始協庻品之自然敷其大道而遂成情性明並日月化行若神下民不知其德覩者不識其鄰此謂聖人也界畔也鄰以喻公曰善哉非子之賢則寡人不得聞此言也雖然寡人生於深宫之内長於婦人之手未嘗知哀未嘗知憂未嘗知勞未嘗知懼未嘗知危恐不足以行五儀之教若何孔子對曰如君之言已知之矣則丘亦無所聞焉言已爲君如此謙以誘進哀公矣知之故無所復言公曰非吾子寡人無以啓其心吾子言也孔子曰君子入廟如右登自阼階仰視榱桷俯察机筵其器皆存而不覩其人君以此思哀則哀可知矣昧爽夙興正其衣冠明也夙早興起爽明也昧明始平旦視朝慮其危難一物失理亂亡之端君以此思憂則憂可知矣日出聽政至于中􅄀日中映中中􅄀諸侯子孫徃來為賔行禮揖讓慎其威儀君以此思勞則勞亦可知矣緬然長思出於四門周章逺望覩亡國之墟必将有數焉墟非但一言亡國故君以此思懼則懼可知矣夫君者舟也庻人者水也水所以載舟亦所以覆舟君以此思危則危可知矣君既明此五者又少留意於五儀之事則於政治何有失矣哀公問於孔子曰請問取人之法孔子對曰事任於官能之事任於官言各當以其所無取捷捷無取鉗鉗不謹誠鉗鉗妄對無取啍啍多言啍啍捷捷貪也所以爲貪也捷捷而不已食鉗鉗亂也啍啍誕也欺誕也詐故弓調而後求勁焉馬服而後求良焉士必慤而後求智能者焉不慤而多能譬之豺狼不可邇能爲大惡不慤信而有智言人無智者雖性慤信不可畏也然後乃哀公問於孔子曰寡人欲吾國小而能守大則攻其道如何孔子對曰使君朝廷有禮上下相親天下百姓皆君之民将誰攻之苟爲此道民畔如歸皆君之讎也将與誰守公曰善哉於是廢山澤之禁弛闗市之税以惠百姓哀公問於孔子曰吾聞君子不博有之乎孔子曰有之公曰何為對曰為其二乗公曰有二乗則何為不博子曰為其兼行惡道也十六道也此具博三哀公懼焉有間復問曰若是乎君子惡惡道至甚也孔子曰君子之惡惡道不甚則好善道亦不甚好善道不甚則百姓之親上亦不甚詩云未見君子憂心惙惙亦既見止亦既覯止我心則悦詩之好善道甚也如此公曰美哉夫君子成人之善不成人之惡微吾子言焉吾弗之聞也哀公問於孔子曰夫國家之存亡禍福信有天命非唯人也孔子對曰存亡禍福皆已而已天災地妖不能加也公曰善吾子之言豈有其事乎孔子曰昔者殷王帝辛之世紂帝有雀生大鳥於城隅焉占之曰凡以小生大則國家必王而名必昌於是帝辛介雀之德之德爲助也介助也以雀不修國政亢􅁀無極朝臣莫救外冦乃至殷國以亡此即以已逆天時詭福反為禍者也又其先世殷王太戊之時道缺法圮以致夭蘖桑榖于朝七日大拱占之者曰桑榖野木而不合生朝意者國亡乎大戊恐駭側身修行思先王之政明養民之道三年之後逺方慕義重譯至者十有六國此即以已逆天時得禍爲福者也故天災地妖所以儆人主者也寤夣徵恠所以儆人臣者也戒儆災妖不勝善政寤夢不勝善行能知此者至治之極也唯明王達此公曰寡人不鄙固此亦不得聞君子之教也哀公問於孔子曰智者壽乎仁者壽乎孔子對曰然人有三死而非其命也行已自取也夫寢處不時飲食不節逸勞過度者疾共殺之居下位而上干其君嗜慾無厭而求不止者刑共殺之以少犯衆以弱侮强忿怒不類動不量力者兵共殺之此三者死非命也人自取之若夫智士仁人將身有節行將動靜以義喜怒以時無害其性雖得壽焉不亦可乎孔子家語卷第一}
