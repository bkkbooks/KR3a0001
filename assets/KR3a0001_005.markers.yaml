  - {type: variant, offset: 153, length: 1, content: 敢, WYG: 善卒不果伐他日靈公又與夫子語見飛鴈過而仰視之色不悦孔子乃逝逝行衞蘧伯玉賢而靈公不用彌子瑕不肖反任之史魚驟諫而不従史魚病將卒命其子曰吾在衞朝不能進蘧伯玉退彌子瑕是吾為臣不能正君也生而不能正君則死無以成禮我死汝置屍牖下於我畢矣禮飯於牖下小斂於户内大斂於阼殯於客位也其子従之靈公弔焉怪而}
