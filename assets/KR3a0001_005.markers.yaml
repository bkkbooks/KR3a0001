  - {type: variant, offset: 148, length: 2, content: 儒服, WYG: 人下者當恢𢎞其志如地無所不容也為人下者以此也孔子適鄭與弟子相失獨立東郭門外或人謂子貢曰東門外有一人焉其長九尺有六寸河目隆顙河目上下匡平而長顙頰也其頭似堯其頸似臯繇其肩似子産然自腰以下不及禹者三寸纍然如喪家之狗喪家狗主人哀荒不見飲食故纍然不得意孔子生於亂世道不得行故纍然是不得意之貌也子貢以告孔子欣然而歎曰形狀未也如喪家之狗然乎哉然乎哉孔子適衞路出于蒲㑹公叔氏以蒲叛衞而止之孔子弟子有公良孺者為人賢長有勇力以私車五乘従夫子行喟然曰昔吾従夫子遇難于匡又伐樹於宋孔子與弟子行禮於大樹之下桓魋欲害之故先伐其樹焉今遇困於此命也夫與其見夫子仍遇於難寧我鬭死挺劒而合衆將與之戰蒲人懼曰苟無適衞吾則出子乃盟孔子而出之東門孔子遂適衞子貢曰盟可負乎孔子曰要我以盟非義也衞侯聞孔子之来喜而於郊迎之問伐蒲對曰可哉公曰吾大夫以為蒲者衞之所以恃晉楚也伐之無乃不可乎孔子曰其男子有死之志公叔氏欲蒲適他國故男子欲死之不樂適也吾之所伐者不過四五人矣本與叔孫同叛者}
