  - {type: variant, offset: 159, length: 0, content: '', SBCK: 與害之故先伐其樹焉禮於大樹之下桓魋欲今遇困於此命也夫與其見夫子仍遇於難寧我鬭死挺劒而合衆將與之戰蒲人懼}
