  - {type: 'tls:seg', offset: 163, content: '', id: KR3a0001_CHANT_005-1a.37}
  - {type: variant, offset: 163, length: 0, content: '', SBCK: 故乎問上世黄帝將為先生長言禹湯以下不可勝觀乃之故問老難言宰我曰上世之傳隱微之説卒采之辯終也其事之説也采事也辯説也卒闇忽之意逺不明闇忽友非君子之道者}
  - {type: variant, offset: 163, length: 0, content: '', WYG: 故乎言禹湯以下不可勝觀乃問上世黄帝將為先生長老難言之故問宰我曰上世之傳隱微之説卒采之辯采事也辯説也卒終也其事之説也闇忽之意闇忽乆逺不明非君子之道者}
