  - {type: variant, offset: 155, length: 2, content: 儒行, WYG: 焉其子以其父言告公公愕然失容曰是寡人之過也於是命之殯於客位進蘧伯玉而用之退彌子瑕而逺之孔子聞之曰古之列諫之者死則已矣未有若史魚死而屍諌忠感其君者也可不謂直乎五帝德第二十三宰我問於}
  - {type: page-break, offset: 155, content: '', id: KR3a0001_WYG_005-21b, image: WYG0695/WYG0695-0055d.png}
  - {type: variant, offset: 155, length: 0, content: '', krp: 何謂也孔子曰竇犫鳴犢舜華晉之賢大夫也趙簡子未得志之時須此二人而後従政及其已得志也而殺之丘聞之刳胎殺夭則麒麟不至其郊竭澤而漁則蛟龍不處其淵覆巢破卵則鳯凰不翔其邑何則君子違傷其類者也或爲諱也違去也違鳥獸之於不義尚知避之况於人乎遂還息於鄒作槃琴以哀之曲名也槃操琴子路問於孔子曰有人於此夙興夜寐耕芸樹藝手足胼胝以養其親然而名不稱孝何也孔子曰意者身不敬與辭不順與色不悦與古之人有言曰人與已與不汝欺相通不相欺也言人與已事實今盡力養親而無三者之闕何謂無孝之名乎孔子曰由汝志之吾語汝雖有國士之力而不能自舉其身非力之少勢不可矣夫内行不修身之罪也行修而名不彰友之罪也行修而名自立故君子入則篤行出則交賢何謂無孝名乎孔子遭厄於陳蔡之間絶糧七日弟子餒病孔子絃歌子路入見曰夫子之歌禮乎孔子弗應曲終而曰由来吾語汝君子好樂為無驕也小人好樂為無懾也懼懾其誰之子不我知而従我者乎以誰氏子謂子其誰之子猶言而不知我也路曰雖從我子路悦援戚而舞三終而出明日免於厄子貢執轡曰二三子従夫子而遭此難也其弗忘矣孔子曰善惡何也何猶言是何也善子貢言也惡夫陳蔡之間丘之幸也二三子従丘者皆幸也吾聞之君不困不成王烈士不困行不彰庸知其非激憤厲志之始於是乎在孔子之宋匡人簡子以甲士圍之子路怒奮㦸將與戰孔子止之曰惡有修仁義而不免世俗之惡者乎夫詩書之不講禮樂之不習是丘之過也若以述先王好古法而爲咎者則非丘之罪也命之夫歌予和汝子路彈琴而歌孔子和之曲三終匡人解甲而罷孔子曰不觀髙崖何以知顚墜之患不臨深泉何以知没溺之患不觀巨海何以知風波之患失之者其在此乎在不之或也此三者士慎此三者則無累於身矣子貢問於孔子曰賜既為人下矣而未知為人下之道敢問之子曰為人下者其猶土乎汨之之深則出泉渥汨樹其壤則百穀滋焉草木植焉禽獸育焉生則出焉死則入焉多其功而不意無所意也功雖多而弘其志而無不容如地無所不容也為人下者當弘志為人下者以此也孔子適鄭與弟子相失獨立東郭門外或人謂子貢曰東門外有一人焉其長九尺有六寸河目隆顙而長顙頰也河目上下匡平其頭似堯其頸似臯繇其肩似子産然自腰巳下不及禹者三寸纍然如喪家之狗主人哀喪家狗世道不得行故纍然是不得意之貌也荒不見飲食故纍然不得意孔子生於亂子貢以告孔子欣然而歎曰形狀末也如喪家之狗然乎哉然乎哉孔子適衞路出于蒲㑹公叔氏以蒲叛衞而止之孔子弟子有公良}
  - {type: variant, offset: 156, length: 0, content: '', SBCK: 者為人賢長有勇力以私車五乘従夫子行喟然曰昔吾従夫子遇難于匡又伐樹於宋弟子}
