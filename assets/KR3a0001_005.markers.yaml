  - {type: variant, offset: 12, length: 0, content: '', SBCK: 兵討而挫鋭於邾是智不足名也曰我君小子侏儒使我敗於邾武仲與邾戰而敗績國人頌之夫文仲其身雖殁而言不朽惡有未賢之言故立不朽賢以爲孔子曰身殁言立所以為文仲也然猶有不仁者三不智者三是則不及武仲也回曰可得聞乎孔子曰下展禽下恵知展禽柳不與立於朝也其賢而使在下位置六關無此關文仲置六關關名魯本仁傅曰廢六關非也之以税行者故為不妾織蒲席也言文仲傳曰織蒲蒲於貪利也為國為家在三不仁設虚器之守龜非文居蔡蔡天子曰虚器也仲所有故縦逆祀公於閔公之上文仲縱夏父弗忌爲宋人躋僖禁也而不祠海鳥不知而令國人祠之是不知海鳥止于魯東門之上文仲也三不智武仲在齊齊將有禍不受其田以避其難仲知莊公將有難辭而不受也武仲奔齊齊莊公將與之田武是智之難也夫臧文仲之智而不容於魯抑有由焉作而不順施而不恕也夫不恕不順以然欲為施於季氏也為廢適立庶武仲之所夏書曰念兹在兹順事恕施其事恕其施也今此在常當順顔回問於君子孔子曰愛近仁度近智事度於智也而行近為已不重為人不輕君子也夫重不人為回曰敢問其次子曰弗學而行弗思而得小子勉之仲孫何忌問於顔回曰仁者一言而必有益於仁智可得聞乎回曰一言而有益於智莫如預一言而有益於仁莫如恕夫知其所不可由斯知所由矣顔回問小人孔子曰毁人之善以為辯狡訐懷詐以為智幸人之有過耻學而羞不能小人也顔回問子路曰力猛於德而得其死者鮮矣盍慎諸焉孔子謂顔回曰人莫不知此道之美而莫之御也待也御猶莫之為也何居為聞者盍日思也夫聞而後言者為聞盍日有顔回問於孔子曰小人之言有同乎君子者不可不察也孔子曰君子以行言小人以舌言故君子為義之上相疾也退而相愛勸令為仁義相病急欲相小人於為亂之上相愛也退而相惡人之情不能乆親也樂並為亂是以相愛小顔回問朋友之際如何孔子曰君子之於朋友也心必有非焉而弗能謂吾不知其仁人也不忘乆德不思乆怨仁矣夫叔孫武叔見未仕於顔回回曰賔之武叔多稱人之過而已評論之顔回曰固子之來辱也宜有得於回焉吾聞知諸孔子曰言人之惡非所以美已言人之枉非所以正已故君子攻其惡無攻人惡顔回謂子貢曰吾聞諸夫子身不用禮而望禮於人身不用德而望德於人亂也夫子之言不可不思也子路初見第十九子路見孔子子曰汝何好樂對曰好長劍孔子曰吾非此之問也徒謂以子之所能而加之以學問豈可及乎子路曰學豈益哉也孔子曰夫人君而無諫臣則失正士而無敎友則失聽御狂馬不釋䇿者不得御狂馬䇿也釋箠操弓不反檠然後可持也弓不反於檠木受繩則直人受諌則聖受學重問孰不順哉毁仁惡仕必近於刑人必主於刑也謗毁仁者憎怨士君子不可不學子路曰南山有竹不柔自直斬而用之達于犀革以此言之何學之有孔子曰括而羽之鏃而礪之其入之不亦深乎子路再拜曰敬而受敎子路將行辭於孔子子曰贈汝以車乎贈汝以言乎子路曰請以言孔子曰不强不達則不能自達人不以强力不勞無功不忠無親不信無復今而不信則無可復信近於義言可復也不恭失禮慎此五者而矣子路曰由請終身奉之敢問親交取親若何言寡可行若何長為善士而無犯若何孔子曰汝所問苞在五者中矣親交取親其忠也言寡可行其信乎長為善士而無犯於禮也孔子為魯司冦見季康子康子不悦桓子當為子也非康孔子又見之宰予進曰昔予也常聞諸夫子曰王公不我聘則弗動今夫子之於司寇也日少官少日淺謂在司冦而屈節數矣屈謂}
