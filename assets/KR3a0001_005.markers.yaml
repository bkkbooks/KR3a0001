  - {type: variant, offset: 151, length: 1, content: 公, SBCK: 莫善乎以道御之故雖服必强以威强之非言民雖服必也哉心服自非忠信則無可以取親於百姓者矣内外不相應則無巳取信於庶民者矣此治民之至道矣入官之大統矣子張既聞孔子斯言遂退而記之困誓第二十二子貢問於孔子曰賜倦於學困於道矣願息於事君可乎孔子曰詩云溫恭朝夕執事有恪也敬事君之難也焉可息哉曰然則賜願息而事親孔子曰詩云孝子不匱永錫爾􅁼者能以􅁼相傳長錫爾以善道也匱竭也􅁼善也孝子之道不匱竭事親之難也焉可以息哉曰然賜請願息於妻子孔子曰詩云刑于寡妻至于兄弟以御于家邦以正法接其寡妻至于同姓刑法也寡適也御正也文王下之國家者矣兄弟以正治天妻子之難也焉可以息哉曰然賜願息於朋友孔子曰詩云朋友攸攝攝以威儀朋友之難也焉可以息哉曰然則賜願息於耕矣孔子曰詩云晝爾于茅宵爾索綯亟其乘屋其始播百穀綯絞宵夜善治之也其復當脩農播百穀言無懈怠也當以時治屋也亟疾也當亟乗爾屋以耕之難也焉可以息哉曰然則賜將無所息者也孔子曰有焉自望其廣則睪如也墉而髙冢是也廣反為壙睪髙貌視其髙則填如也實貌填塞而塞實也也冢雖髙察其従則隔如也得復相從也言其隔而不此其所以息也矣子貢曰大哉乎死也君子息焉小人休焉大哉乎死也孔子自衞將入晉至河聞趙簡子殺竇犫鳴犢及舜華乃臨河而歎曰美哉水洋洋乎丘之不濟此命也夫子貢趍而進}
