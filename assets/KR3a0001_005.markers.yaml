  - {type: variant, offset: 12, length: 0, content: '', WYG: 兵討而挫鋭於邾是智不足名也武仲與邾戰而敗績國人頌之曰我君小子侏儒是使侏儒侏儒使我敗於邾夫文仲其身雖殁而言不朽惡有未賢立不朽之言故以為賢孔子曰身殁言立所以為文仲也然猶有不仁者三不智者三是則不及武仲也回曰可得聞乎孔子曰下展禽展禽柳下恵知其賢而使在下位不與立於朝也置六關六關關名魯本無此關文仲置之以税行者故為不仁傳曰廢六關非也妾織蒲傳曰織蒲蒲席也言文仲為國為家在於貪刋也三不仁設虚器居蔡蔡天子之守龜非文仲所有故曰虚器也縦逆祀夏父弗忌為宗人躋僖公於閔公之上文仲縦而不禁也祠海鳥海鳥止於魯東門之上文仲不知而令國人祠之是不知也三不智武仲在齊齊將有禍不受其田以避其難武仲在齊齊莊公將與之田武仲知莊公將有難辭而不受也是智之難也夫臧武仲之智而不容於魯抑有由焉作而不順施而不恕也夫不順不恕為廢嫡立庶武仲之所以然欲為施於季氏也夏書曰念兹在兹順事恕施念此在常當順其事恕其施也顔回問君子孔子曰愛近仁度近智度事而行近於智也為已不重為人不輕君子也夫不重為人回曰敢問其次子曰弗學而行弗思而得小子勉之仲孫何忌問於顔回曰仁者一言而必有益於仁智可得聞乎回曰一言而有益於智莫如豫一言而有益於仁莫如恕夫知其所不可由斯知所由矣顔回問小人孔子曰毁人之善以為辯狡訐懷詐以為智幸人之有過恥學而羞不能小人也顔回問子路曰力猛於德而得其死者鮮矣盍慎諸焉孔子謂顔回曰人莫不知此道之美而莫之御也御猶待也莫之為也何居為聞者盍曰思也夫為聞盍曰有聞而後言者而已顔回問於孔子曰小人之言有同乎君子者不可不察也孔子曰君子以行言小人以舌言故君子於為義之上相疾也退而相愛相疾急欲相勸令為仁義小人於為亂之上相愛也退而相惡樂施為亂是以相愛小人之不能乆親也顔回問朋友之際如何孔子曰君子之於朋友也心必有非焉而弗能謂吾不知其仁人也不忘乆德不思乆怨仁矣夫叔孫武叔見未仕於顔回回曰賔之武叔多稱人之過而已評論之顔回曰固子之来辱也宜有得於回焉吾聞諸孔子曰言人之惡非所以美已言人之枉非所以正已故君子攻其惡無攻人之惡顔回謂子貢曰吾聞諸夫子身不用禮而望禮於人身不用德而望德於人亂也夫子之言不可不思也子路初見第十九子路見孔子子曰汝何好樂對曰好長劒孔子曰吾非此之問也徒謂以子之所能而加之以學問豈可及乎子路曰學豈益也哉孔子曰夫人君而無諫臣則失正士而無敎友則失聽御狂馬不釋䇿御狂馬者不得釋箠䇿也操弓不反檠弓不反於檠然後可持也木受繩則直人受諌則聖受學重問孰不順哉毁仁惡士必近於刑謗毁仁者憎怨士人必主於刑也君子不可不學子路曰南山有竹不揉自直斬而用之達于犀革以此言之何學之有孔子曰括而羽之鏃而礪之其入之不亦深乎子路再拜敬而受敎子路將行辭於孔子子曰贈汝以車乎贈汝以言乎子路曰請以言孔子曰不强不達人不以强力則不能自達不勞無功不忠無親不信無復信近於義言可復也令而不信則無可復不恭失禮慎此五者而已子路曰由請終身奉之敢問親交取親若何言寡可行若何長為善士而無犯若何孔子曰汝所問苞在五者中矣親交取親其忠也言寡可行其信乎長為善士而無犯於禮也孔子為魯司冦見季康子康子不悦當為桓子非康子也孔子又見之宰予進曰昔予也嘗聞諸夫子曰王公不我聘則弗動今夫子之於司寇也日少謂在司冦官少日淺而屈節數矣謂屈節數見}
