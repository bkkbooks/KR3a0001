  - {type: punctuation, offset: 160, content: 「, id: KR3a0001_CHANT_005-bkkpn43}
  - {type: variant, offset: 160, length: 1, content: 略, SBCK: 苟無適衞吾則出子以盟孔子而出之東門孔子遂適衞子貢曰盟可負乎孔子曰要我以盟非義也衞侯聞孔子之来喜而於郊迎之問伐蒲對曰可哉公曰吾大夫以為蒲者衞之所以恃晉楚也伐之無乃不可乎孔子曰其男子有死之志故男子欲死之不樂公叔氏欲蒲適他國也適吾之所伐者不過四五人矣同伴者也本與叔孫公曰善卒不果伐他日靈公又與夫子語見飛鴈過而仰視之色不悦孔子乃逝行逝衞籧伯玉賢而靈公不用彌子瑕不肖反任之史魚驟諫而不従史魚病將卒命其子曰吾在衞朝不能進籧伯玉退彌子瑕是吾為臣不能正君也生而不能正君則死無以成禮我死汝置屍牖下於我畢矣内大歛於阼殯於客位也禮飯含於牖下小歛於户其子従之靈公弔焉怪而問焉其子以其父言告公公愕然失容曰是寡人之過也於是命之殯於客位進籧伯玉而用之退彌子瑕而逺之孔子聞之曰古之列諫之者死則已矣未有若史魚死而屍諌忠感其君者也不可謂直乎五帝德第二十三宰我問於孔子曰昔者吾聞諸榮伊曰黄帝三百年請問黄帝者人也抑非人也何以能至三百年乎孔子曰禹湯文武周公不可勝以觀也而上世黄帝之問將謂先生難}
