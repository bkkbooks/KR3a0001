  - {type: variant, offset: 8, length: 3, content: 衛冉求, SBCK: 衞昧旦晨興顔回侍側聞哭者之聲甚哀子曰回汝知此何所哭乎對曰回以此哭聲非但為死者而已又有生離别者也子曰何以知之對曰回聞桓山之鳥生四子焉羽翼既成將分于四海其母悲鳴而送之哀聲有似於此謂其徃而不返也回竊以音類知之孔子使人問哭者果曰父死家貧賣子以葬與之長決子曰回也善於識音矣顔回問於孔子曰成人之行若何子曰達于情性之理通於物類之變知幽明之故覩㳺氣之原若此可謂成人矣既能成人而又加之以仁義禮樂成人之行也若乃窮神知禮德之盛也為化禮宜顔回問於孔子曰臧文仲武仲孰賢孔子曰武仲賢哉顔回曰武仲世稱聖人而身不免於罪是智不足稱也􅃴立庶為孟氏武仲為季氏廢奔于齊所譛出好}
