  - {type: variant, offset: 136, length: 0, content: '', SBCK: 長雪菓之下者是従上雪下臣以為妨於敎害於義故不敢公曰善哉子貢曰陳靈公宣婬於朝共婬夏姬靈公與卿泄冶正諌而殺之是與比干諌而死同可謂仁乎子曰比干於紂親則諸父官則少師忠報之心在於宗廟而已固必以死爭之兾身死之後紂將悔寤其本志情在於仁者也泄冶之於靈公位在大夫無骨肉之親懷寵不去仕於亂朝以區區之一身欲正一國之婬昏死而無益可謂􅂢矣詩云民之多辟無自立辟辟僻邪其泄治之謂乎孔子相魯齊人患其將霸欲敗其政乃選好女子八十人衣以文飾而舞容璣舞曲容璣及文馬四十駟馬也駟四以遺魯君陳女樂列文馬于魯城南髙門外季桓子㣲服徃觀之再三將受焉告魯君為周道遊觀觀之終日怠於政事子路言於孔子曰夫子可以行矣孔子曰魯今且郊若致膰於大夫肉也膰祭是則未廢其常吾猶可以止也桓子既受女樂君臣淫荒三日不聽國政郊又不致膰俎孔子遂行宿於郭屯師以送曰夫子非罪也孔子曰吾歌可乎歌曰彼婦人之口可以出走彼婦人之請可以死敗使人死敗故可出走言婦人口請謁足以優哉㳺哉􅂓以卒嵗游以終嵗也言士不遇優澹臺子羽有君子之容而行不勝其貌宰我有文雅之辭而智不􅂶其辯孔子曰里語云相馬以輿相士以居弗可廢矣以容取人則失之子羽以辭取人則失之宰予孔子曰君子以其所不能畏人小人以其所不能不信人故君子長人之才小人抑人而取勝焉孔篾問行已之道子曰知而弗為莫如勿知親而弗信莫如勿親樂之方至樂而勿驕患之將至思而勿憂孔篾曰行已乎子曰攻其所不能補其所不備毋以其所不能疑人毋以其所能驕人終日言無遺已之憂終日行不遺已患唯智者有之在厄第二十楚昭王聘孔子孔子徃拜禮焉路出于陳蔡陳蔡大夫相與謀曰孔子聖賢其所刺譏皆中諸侯之病若用於楚則陳蔡危矣遂使徒兵距孔子孔子不得行絶糧七日外無所通藜羮不充従者皆病孔子愈慷慨講􅃶歌不衰乃召子路而問焉曰詩云匪兕匪虎率彼曠野虎而修曠野也率修也言非兕吾道非乎奚為至於此子路慍作色而對曰君子無所困意者夫子未仁與人之弗吾信也以未仁故也言人不信豈意者夫子未智與人之弗吾行也窮者豈以吾未智也言人不使通行而困且由也昔者聞諸夫子為善者天報之以福為不善者天報之以禍今夫子積德懷義行之乆矣奚居之窮也子曰由未之識也吾語汝汝以仁者為必信也則伯夷叔齊不餓死首陽汝以智者為必用也則王子比干不見剖心汝以忠者為必報也則關龍逄不見刑汝以諌者為必聽也則伍子胥不見殺夫遇不遇者時也賢不肖者才也君子博}
