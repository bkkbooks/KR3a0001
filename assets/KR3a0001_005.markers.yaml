  - {type: variant, offset: 140, length: 0, content: '', WYG: 終始乎庸用也汝何用知其終始或者若文公越王之時也子路出召子貢告如子路子貢曰夫子之道至大故天下莫能容夫子夫子盍少貶焉子曰賜良農能稼不必能穡種之為稼斂之為穡言良農能善種之未必能斂穫之也良工能巧不能為順言良工能巧不能每順人意也君子能修其道綱而紀之不必其能容今不修其道而求其容賜爾志不廣矣思不逺矣子貢出顔回入問亦如之顔回曰夫子之道至大天下莫能容雖然夫子推而行之世不我用有國者之醜也夫子何病焉不容然後見君子孔子欣然歎曰有是哉顔氏之子吾亦使爾多財吾為爾宰宰主財者也為汝主財言志之同也子路問於孔子曰君子亦有憂乎子曰無也君子之修行也其未得之則樂其意既得之又樂其治是以有終身之樂無一日之憂小人則不然其未得也患弗得之既得之又恐失之是以有終身之憂無一日之樂也曾子弊衣而耕於魯魯君聞之而致邑焉曾子固辭不受或曰非子之求君自致之奚固辭也曾子曰吾聞受人施者常畏人與人者常驕人縦君有賜不我驕也吾豈能勿畏乎孔子聞之曰參之言足以全其節也孔子厄於陳蔡従者七日不食子貢以所賫貨竊犯圍而出告糴於野人得米一石焉顔回仲由炊之於壊屋之下有埃墨墮飯中顔回取而食之子貢自井望見之不悦以為竊食也入問孔子曰仁人亷士窮改節乎孔子曰改節即何稱於仁亷哉子貢曰若回也其不改節乎子曰然子貢以所飯告孔子子曰吾信回之為仁乆矣雖汝有云弗以疑也其或者必有故乎汝止吾將問之召顔回曰疇昔予夢見先人豈或啓佑我哉子炊而進飯吾將進焉對曰向有埃墨墮飯中欲置之則不㓗欲棄之則可惜回即食之不可祭也孔子曰然乎吾亦食之顔回出孔子顧謂二三子曰吾之信回也非待今日也二三子由此乃}
