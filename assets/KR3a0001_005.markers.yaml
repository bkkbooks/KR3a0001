  - {type: variant, offset: 138, length: 1, content: 博, WYG: 生死者命也是以晉重耳之有霸心生於曹衞重耳晉文公也為公子時出奔困於曹衞越王勾踐之有霸心生於㑹稽言越王之有霸心乃坐困於㑹稽之時也故居下而無憂者則思不逺處身而常逸者則志不廣庸知}
