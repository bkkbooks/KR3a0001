  - {type: variant, offset: 428, length: 666, content: 阻之以兵而不攝見利不虧其義見死不更其守鷙蟲攫搏不程其勇引重鼎不程其力往者不悔來者不豫過言不再流言不極不斷其威不習其謀其特立有如此者儒有可親而不可劫可近而不可迫可殺而不可辱其居處不過其飲食不溽其過失可微辯而不可面數也其剛毅有如此者儒有忠信以為甲冑禮義以為干櫓戴仁而行抱義而處雖有暴政不更其所其自立有如此者儒有一畝之宮環堵之室篳門圭窬蓬戶甕牖易衣而出并日而食上荅之不敢以疑上不荅不敢以諂其仕有如此者儒有今人以居古人以稽今世行之後世以為楷若不逄世上所不援下所不推詭諂之民有比黨而危之者身可危也其志不可奪也雖危起居猶竟信其志乃不忘百姓之病也其憂思有如此者儒有博學而不窮篤行而不倦幽居而不淫上通而不困禮必以和優游以法慕賢而容眾毀方而瓦合其寬裕有如此者儒有內稱不辟親外舉不辟怨程功積事不求厚祿推賢達能不望其報君得其志民賴其德苟利國家不求富貴其舉賢援能有如此者儒有澡身浴德陳言而伏言而正之上不知也默而翹之又不為急也不臨深而為高不加少而為多世治不輕世亂不沮同己不與異己不非其特立獨行有如此者儒有上不臣天子下不事諸侯慎靜尚寬砥礪廉隅強毅以與人博學以知服近文章雖以分國視如錙銖弗肯臣仕其規為有如此者儒有合志同方營道同術竝立則樂相下不厭久別則聞流言不信義同而進不同而退其交有如此者夫溫良者仁之本也慎敬者仁之地也寬裕者仁之作也遜接者仁之能也禮節者仁之貌也言談者仁之文也歌樂者仁之和也分散者仁之施也儒皆兼而有之猶且不敢言仁也其尊讓有如此者儒有不隕穫於貧賤不充詘於富貴不溷君王不累長上不閔有司故曰儒今人之名儒也妄常以儒相詬疾哀公既聞此言也言加信行加敬曰終歿吾世, SBCK: ''}
