  - {type: variant, offset: 142, length: 3, content: 鄉丘未, SBCK: 晉重耳之有霸心生於曹衞子時出奔困於曹衞重耳晉文公也爲公越王勾踐之有霸心生於㑹稽生困於㑹稽之時也言越王之有霸心乃故居下而無憂者則思不逺處身而常逸者則志不廣庸}
  - {type: variant, offset: 142, length: 1, content: 鄉, WYG: 為已有者也敎不能勿怠怠懈已過勿發言人已過誤無所傷害勿發揚失言勿掎有人失言勿掎角之不善勿遂已有不善不可遂行行事勿留宜行之事勿令留滯君子入官自此六者則身安譽至而政従矣衆従其政無違敎也且夫忿數者官獄所由生也距諌者慮之所以塞也慢易者禮之所以失也怠惰者時之所以後也奢侈者財之所以不足也専獨者事之所以不成也君子入官除此六者則身安譽至而政従矣故君子南面臨官大域之中而公治之大域猶大較也精智而略行之以情知之略舉其要而行之合是忠信考是大倫存是美惡進是利而除是害無求其報焉而民之情可得也夫臨之無抗民之惡治民無抗揚之志也勝之無犯民之言以慎勝民言不犯民量之無佼民之辭佼猶周也度量而施政辭不周民也養之無擾於其時愛之無寛於刑法言雖愛民不可寛於刑法威剋其愛故事無不成也若此則身安譽至而民得也君子以臨官所見則邇故明不可蔽也所見邇謂察於微也所求於邇故不勞而得也所求者近故不勞而得也所以治者約故不用衆而譽立凡法象在内故法不逺而源泉不竭法象近在於内故不逺而源泉不竭盡是以天下積而本不寡言天下之事皆積聚而成如源泉之本非徒不竭乃不寡短長得其量人志治而不亂政德貫乎心藏乎志形乎色發乎聲若此而身安譽至民咸自治矣是故臨官不治則亂亂生則爭之者至爭之至又於亂小亂則爭爭之甚者又大亂至矣明君必寛裕以容其民慈愛優柔之而民自得矣行者政之始也行為政始言民従行不従言也説者情之導也言説者但導達其情善政行易則民不怨言善政行簡易而民無怨者也言調説和則民不變調適也言適於事説和於民則不變法在身則民象之言法度常在身則民法之明在已則民顯之若乃供已而不節則財利之生者微矣言自供不節於財財不可供生財之道㣲矣貪以不得則善政必簡矣言徒貪於不得財善政則簡略而不修也苟以亂之則善言必不聽也詳以納之則規諌日至納善言也言之善者在所日聞日聞善言可行於今日也行之善者在所能為故君上者民之儀也有司執政者民之表也邇臣便僻者羣僕之倫也僻宜為辟便僻執事在君之左右者倫紀也為衆之紀故儀不正則民失表不端則百姓亂邇臣便辟則羣臣汙矣是以人主不可不敬乎三倫君子修身反道察里言而服之服行則身安譽至終始在焉故夫女子必自擇絲麻良工必自擇完材賢君必自擇左右勞於取人佚於治事君子欲譽則必謹其左右為上者譬如縁木焉務髙而畏下兹甚六馬之乖離必於四達之交衢萬民之叛道必於君上之失政上者尊嚴而危民者卑賤而神君有愛思之心感於民故謂如神愛之則存惡之則亡長民者必明此之要故南面臨官貴而不驕富而能供供宜為共古恭字也有夲而能圖末修事而能建業既能修治舊事又能建立功業也乆居而不滯情近而暢乎逺察一物而貫乎多治一物而萬物不能亂者以身本者也君子莅民不可以不知民之性而達諸民之情既知其性又習其情然後民乃従命矣故世舉則民親之政均則民無怨故君子蒞民不臨以髙不抗揚也不導以逺不責民之所不為不强民之所不能以明王之功不因其情則民嚴而不迎迎奉也民嚴畏其上而不奉迎其敎篤之以累年之業不因其力則民引而不従引導也敎之以非其力之所堪則民引而不従其敎者矣若責民所不為强民所不能則民疾疾則僻矣民疾其上即邪僻之心生古者聖主冕而前旒所以蔽明也紘紞充耳所以掩聰也水至清即無魚人至察則無徒枉而直之使自得之優而柔之使自求之優寛也柔和也使自求其宜也揆而度之使自索之揆度其法以開示之使自索得之也民有小過必求其善以赦其過民有大罪必原其故以仁輔化如有死罪其使之生則善也是以上下親而不離道化流而不蘊藴滯積也故德者政之始也政不和則民不従其敎矣不従敎則民不習不習則不可得而使也君子欲言之見信也莫善乎先虚其内虚其内謂直道而行無情欲也欲政之速行也莫善乎以身先之欲民之速服也莫善乎以道御之故雖服必强言民雖服必以威强之非心服也自非忠信則無可以取親於百姓者矣内外不相應則無可以取信於庶民者矣此治民之至道矣入官之大統矣子張既聞孔子斯言遂退而記之困誓第二十二子貢問於孔子曰賜倦於學困於道矣願息而事君可乎孔子曰詩云溫恭朝夕執事有恪敬也事君之難也焉可息哉曰然則賜願息而事親孔子曰詩云孝子不匱永錫爾類匱竭也類善也孝子之道不匱竭者能以類相傳長錫爾以善道也事親之難也焉可以息哉曰然則賜請願息於妻子孔子曰詩云刑于寡妻至于兄弟以御于家邦刑法也寡適也御正也文王以正法接其寡妻至于同姓兄弟以正治天下之國家者矣妻子之難也焉可以息哉曰然則賜願息於朋友孔子曰詩云朋友攸攝攝以威儀朋友之難也焉可以息哉曰然則賜願息於耕矣孔子曰詩云晝爾于茅宵爾索綯亟其乘屋其始播百穀宵夜綯絞也當以時治屋也亟疾也當亟乗爾屋以善治之也其復當修農播百穀言無懈怠耕之難也焉可以息哉曰然則賜將無所息者也孔子曰有焉自望其廣則睪如也廣宜為壙睪髙貌壙而髙冢是也視其髙則填如也填塞實貌也冢雖髙而塞實也察其従則隔如也言其隔而不得復相従也此其所以息也矣子貢曰大哉乎死也君子息焉小人休焉大哉乎死也孔子自衞將入晉至河聞趙簡子殺竇犫鳴犢及舜華乃臨河而歎曰美哉水洋洋乎}
