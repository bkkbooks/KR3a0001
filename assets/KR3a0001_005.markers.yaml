  - {type: variant, offset: 189, length: 1, content: 儒, SBCK: 可也吾畧聞其説黄帝者少昊之子曰軒轅生而神靈弱而能言㓜齊叡莊敦敏誠信長聰明治五氣之氣五行設五量量五丈里步十百權衡升斛尺撫萬民度四方而無安定商度四方服牛乗馬擾馴猛獸以與炎帝戰于阪泉之野氏之後也炎帝神農三戰而後剋之始垂衣裳作為黼黻與青謂之黻若兩已相戾白與黒謂之黼若斧文黒治民以順天地之紀知幽明之故達生死存亡之説播時百穀是時嘗味草木仁厚及於鳥獸昆蟲考日月星辰勞耳目勤心力用水火財物以生民民頼其利百年而死民畏其神百年而亡民用其敎百年而移故曰黄帝三百年宰我曰請問帝顓頊孔子曰五帝用説三王}
