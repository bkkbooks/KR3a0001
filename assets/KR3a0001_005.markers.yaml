  - {type: variant, offset: 148, length: 1, content: 儒, krp: 未必能歛穫之也哉爲穯良農能蓋種之良工能巧不能為順能每順人意也言良工能巧不君子能修其道綱而紀之不必其能容今不修其道而求其容賜爾志不廣矣思不逺矣子貢出顔回入問亦如之顔回曰夫子之道至大天下莫能容雖然夫子推而行之世不我用有國者之醜也夫子何病焉不容然後見君子孔子欣然歎曰有是哉顔氏之子吾亦使爾多財吾為爾宰主財意志同也宰主財者為汝子路問於孔子曰君子亦有憂乎子曰無也君子之修行也其未得之則樂其意既得之又樂其治是以有終身之樂無一日之憂小人則不然其未得也患弗得之既得之又恐失之是以有終身之憂無一日之樂也曾子弊衣而耕於魯魯君聞之而致邑焉曾子固辭不受或曰非子之求君自致之奚固辭也曾子曰吾聞受人施者常畏人與人者常驕人縦君有賜不我驕也吾豈能勿畏乎孔子聞之曰參之言足以全其節也孔子厄於陳蔡従者七日不食子貢以所齎貨竊犯圍而出告糴於野人得米一石焉顔回仲由炊之於壤屋之下有埃墨墮飯中顔回取而食之子貢自井望見之不悦以為竊食也入問孔子曰仁人亷士窮改節乎孔子曰改節即何稱於仁亷哉子貢曰若回也其不改節乎子曰然子貢以所飯告孔子子曰吾信回之為仁乆矣雖汝有云弗以疑也其或者必有故乎汝止吾將問之召顔囬曰疇昔予夢見先人豈或啓祐我哉子炊而進飯吾將進焉對曰向有埃墨墮飯中欲置之則不㓗欲棄之則可惜回即食之不可祭也孔子曰然乎吾亦食之顔回出孔子顧謂二三子曰吾之信回也非待今日也二三子由此乃服之入官第二十一子張問入官於孔子治民之職也入官謂當官孔子曰安身取譽爲難子張曰爲之如何孔子曰已有善勿専勿専以爲已有者也雖有善當與下共之敎不能勿怠懈怠已過勿發所傷害勿發揚言人已過誤無失言勿掎勿掎角之有人失言不善勿遂不可遂行已有不善行事勿留勿令留滯宜行之事君子入官自此六者則身安譽至而政従矣無違教也衆従其政且夫忿數者官獄所由生也距諌者慮之所以塞也慢易者禮之所以失也怠惰者時之所以後也奢侈者財之所以不足也専獨者事之所以不成也君子入官除此六者則身安譽至而政従矣故君子南面臨官大域之中而公治之辜較也大域猶精智而畧行之之畧行以精知而行之舉其要合是忠信考是大倫存是美惡進是利而除是害無求其報焉而民之情可得也夫臨之無抗民之惡揚之志也治民無抗勝之無犯民之言言不犯民以慎勝民量之無佼民之辭施政辭不周民也佼猶周也度量而養之無擾於其時愛之無寛於刑法威尅其愛故事無不成也言雖愛民不可寛於刑法若此則身安譽至而民得也君子以臨官所見則邇故明不可蔽也察於微也所見邇謂所求於邇故不勞而得也不勞而得也所求者近故所以治者約故不用衆而譽立凡法象在内故法不逺而源泉不竭逺而源泉不竭盡法象近在於内故不是以天下積而本不寡成如源泉之本非徒不言天下之事皆積聚而不寡竭乃短長得其量人志治而不亂政德貫乎心藏乎志形乎色發乎聲若此而身安譽至民咸自治矣是故臨官不治則亂亂生則爭之者至爭之至又於亂爭之甚者小亂則爭至矣也又大亂明君必寛裕以容其民慈愛優柔之而民自得矣行者政之始也言民従行行爲政始言也不從説者情之導也導達其情言説者但善政行易而民不怨而民無怨者也言善政行簡易言調説和則民不變説和於民則不變調適也言適於事法在身則民象法言則民法之度常在身明在已則民顯之若乃供已而不節則財利之生者微矣財財不可供生言自供不節於㣲矣財之道貪以不得則善政必簡矣於不得言徒貪畧而不脩也財善政則簡苟以亂之則善言必不聽也詳以納之則規諌日至言也納善言之善者在所日聞行於今日也日聞善言可行之善者在所能為故君上者民之儀也有司執政者民之表也邇臣便僻者羣僕之倫也辟執事在君僻宜為辟便也為衆之紀之左右者倫紀故儀不正則民失表不端則百姓亂邇臣便辟則群臣汙矣是以人主不可不敬乎三倫君子修身反道察里言而服之行服則身安譽至終始在焉故夫女子必自擇絲麻良工必自擇貌材賢君必自擇左右勞於取人佚於治事君子欲譽則必謹其左右為上者譬如縁木焉務髙而畏下兹甚六馬之乖離必於四達之交衢萬民之叛道必於君上之失政上者尊嚴而危民者卑賤而神感於民故謂如君有愛思之心神愛之則存惡之則亡長民者必明此之要故南面臨官貴而不驕富而能供為共供宜字也古恭有夲而能圖末修事而能建業修治既能建乎功業也舊事又人君能乆居而不滯情近而暢乎逺察一物而貫乎多治一物而萬物不能亂者以身本者也君子莅民不可以不知民之性而達諸民之情既知其性又習其情然後民乃従命矣故世舉則民親之政均則民無怨故君子蒞民不臨以髙揚也不亢不導以逺不責民之所不為不强民之所不能以明王之功不因其情則民嚴而不迎上而不奉迎其敎迎奉也民嚴畏其篤之以累年之業不因其力則民引而不從其力之所堪則民引弘也敎之以非其敎也矣引弘而不従若責民所不為强民所不能則民疾疾則僻矣邪僻之心生民疾其上即古者聖主冕而前旒所以蔽明也紘紞充耳所以掩聰也水至清則無魚人至察則無徒枉而直之使自得之優而柔之使自求之也柔優寛求其宜也和也使自揆而度之使自索之以關示之揆度其法得之也使自索民有小罪必求其善以赦其過民有大罪必原其故以仁輔化如有死罪其使之生則善也是以上下親而不離道化流而不蘊積也藴滯故德者政之始也政不和則民不從其敎矣不從教則民不習不習則不可得而使也君子欲言之見信也莫善乎先虚其内而行無情故也虚其内謂直道欲政之速行也莫善乎以身先之欲民之速}
