  - {type: variant, offset: 4, length: 1, content: 五, WYG: 十八魯定公問於顔回曰子亦聞東野畢之善御乎對曰善則善矣雖然其馬將必佚定公色不悦謂左右曰君子固有誣人也顔回退後三日牧来訴之曰東野畢之馬佚兩驂曳兩服入于廏公聞之越席而起促駕召顔回回至公曰前日寡人問吾子以東野畢之御而子曰善則善矣其馬將佚不識吾子奚以知之顔回對曰以政知之昔者帝舜巧於使民造父巧於使馬舜不窮其民力造父不窮其馬力是以舜無佚民造父無佚馬今東野畢之御也升馬執轡銜體正矣馬非為車步驟馳騁朝禮畢矣馬步驟馳騁盡禮之儀也歴險致逺馬力盡矣然而猶乃求馬不已臣以此知之公曰善誠若吾子之言也吾子之言其義大矣願少進乎顔回曰臣聞之鳥窮則啄獸窮則攫人窮則詐馬窮則佚自古及今未有窮其下而能無危者也公悦遂以告孔子孔子對曰夫其所以為顔回者此之類也豈足多哉}
