  - {type: variant, offset: 205, length: 2, content: 懷忠, SBCK: 帝嚳孔子曰􅀇枵之孫喬極之子曰髙辛生而神異自言其名博施厚利不於其身聰以知逺明以察㣲仁以威恵而}
  - {type: variant, offset: 205, length: 2, content: 懷忠, WYG: 帝嚳孔子曰𤣥枵之孫喬極之子曰髙辛生而神異自言其名博施厚利不於其身聰以知逺明以察㣲仁而威恵而}
  - {type: variant, offset: 205, length: 2, content: 懷忠, krp: 帝嚳孔子曰玄枵之孫喬極之子曰髙辛生而神異自言其名博施厚利不於其身聰以知逺明以察㣲仁以威恵而}
  - {type: variant, offset: 209, length: 3, content: 待舉力, SBCK: 順天地之義知民所急修身而天下服取地之財而節用焉撫敎萬民而誨利之歴日月之生朔而迎送之明􅀑神而敬事之其色也和其德也重其動也時其服也哀春夏秋冬育䕶天下日月所照風雨所至莫不從化宰我曰請問帝堯孔子曰髙辛氏之子曰陶唐其仁如天其智如神就之如日望之如雲富而不驕貴而能降伯夷典禮夔龍典樂則堯時龍亦典樂者也舜時䕫典樂龍作納言然舜時而仕趨視四時務元民始之以為始也務先民事流四凶而天下服其言不忒其德不回四海之内舟輿所及莫不夷説通以為悦字夷平心説古宰我曰請問帝舜孔子曰喬牛之孫瞽䏂之子也曰有虞舜孝友聞於四方陶漁事親魚以養父母為陶器躬捕寛裕而溫良敦敏而知時畏天而愛民恤逺而親近承受大命依于二女動靜謀之於二女堯妻舜以二女舜叡明智通為天下帝命二十二臣率堯舊職躬已而已天平地成巡狩四海五載一始三十年在位嗣帝五十載陟方岳死于蒼梧之野而葬焉宰我曰請問禹孔子曰髙陽之孫鮌之子也曰夏后敏給克齊其德不爽忒爽其仁可親其言可信聲為律身為度法度也以身為亹亹穆穆為紀為綱其功為百神之主天下既禹治水神得其所平然後百其恵為民父母左凖繩右規矩帝用也左右言履四時四時之宜所}
