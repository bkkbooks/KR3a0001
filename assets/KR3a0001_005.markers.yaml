  - {type: variant, offset: 189, length: 1, content: 儒, WYG: 可也吾畧聞其説黄帝者少典之子曰軒轅生而神靈弱而能言幼齊叡莊敦敏誠信長聰明治五氣五行之氣設五量五量權衡升斛尺丈里步十百撫萬民度四方商度四方而安定之服牛乗馬擾馴猛獸以與炎帝戰于阪泉之野炎帝神農氏之後也三戰而後尅之始垂衣裳作為黼黻白與黒謂之黼若斧文黒與青謂之黻若兩已相戾治民以順天地之紀知幽明之故達死生存亡之説播時百穀時是嘗味草木仁厚及於鳥獸昆蟲考日月星辰勞耳目勤心力用水火財物以生民民賴其利百年而死民畏其神百年而亡民用其敎百年而移故曰黄帝三百年宰我曰請問帝顓頊孔子曰五帝用説三王}
