  - {type: variant, offset: 340, length: 155, content: 義以為土地不求多積而多文以為富難得而易祿也易祿而難畜也非時不見不亦難得乎非義不合不亦難畜乎先勞而後祿不亦易祿乎其近人情有如此者儒有委之以貨財而不貪淹之以樂好而不淫劫之以眾而不懼阻之以兵而不攝見利不虧其義見死不更其守鷙蟲攫搏不程其勇引重鼎不程其力往者不悔來者不豫過言不再流言不極不斷其威不習其謀其特立有如此者儒有, WYG: ''}
