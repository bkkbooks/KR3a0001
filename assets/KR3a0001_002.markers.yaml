  - {type: variant, offset: 120, length: 0, content: '', SBCK: 自南宫敬叔之乗我車也而道加行敬叔言於魯君給孔子車孔子欲見老􅅨而西觀周自周而還弟子四方來習也馬問禮於老子孔子歷觀郊廟故道雖貴必有時而後重有勢而後行微夫二子之貺財則丘之道殆将廢矣孔子曰王者有似乎春秋萬物皆正正}
  - {type: variant, offset: 120, length: 0, content: '', WYG: 施與衆而交益親自南宫敬叔之乗我車也而道加行孔子欲見老聃而西觀周敬叔言於魯君給孔子車馬問禮於老子孔子厯觀郊廟自周而還弟子四方来習也故道雖貴必有時而後重有勢而後行微夫二子之貺財則丘之道殆将廢矣孔子曰王者有似于春秋正}
  - {type: page-break, offset: 120, content: '', id: KR3a0001_WYG_002-4a, image: WYG0695/WYG0695-0018a.png}
  - {type: variant, offset: 120, length: 0, content: '', krp: 自南宫敬叔之乗我車也而道加行敬叔言於魯君給孔子車孔子欲見老𣆀而西觀周自周而還弟子四方來習也馬問禮於老子孔子歷觀郊廟故道雖貴必有時而後重有勢而後行微夫二子之貺財則丘之道殆将廢矣孔子曰王者有似乎春秋萬物皆正正}
  - {type: variant, offset: 121, length: 1, content: 故, SBCK: 本而文王以王季為父以太任為母以太姒為妃以武王周公為子以太顛閎夭為臣其本美矣武王正其身以正其國正其國以正}
