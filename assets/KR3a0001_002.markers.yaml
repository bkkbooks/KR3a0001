  - {type: variant, offset: 397, length: 1, content: 理, SBCK: 正色之卦也夫質也黑白宜正焉今得賁非吾兆也飾賁吾聞丹􅃮不文白玉不雕何也質有餘不受飾故也孔子曰吾於甘棠見宗廟之敬甚矣其樹作甘棠之詩也邵伯聽訟於甘棠愛思其人必愛其樹尊其人必敬其位道也子路戎服見於孔子㧞劒而舞之曰古之君子以劒自衛乎孔子曰古之君子忠以為質仁以為衛不出環堵之室而知千里之外有不善則以忠化之侵暴則以仁固之何持劒乎子路曰由乃今聞此言請攝齊以受教教者攝齊升堂齊裳下緝也受楚王出遊亡弓左右請求之王曰止楚王失弓楚人得之又何求之孔子聞之惜乎其不大}
