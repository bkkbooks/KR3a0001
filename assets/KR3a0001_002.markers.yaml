  - {type: variant, offset: 568, length: 2, content: 威厲, WYG: 眉夀不慕富貴安静虚無所以為之富貴是曾參之行也孔子曰孝徳之始也悌徳之序也悌以敬長是徳之次序也信徳之厚也忠徳之正也參中夫四徳者也以此稱之美功不伐貴位不善不侮不佚侮佚貪功慕勢之貌不傲無告鰥寡孤獨此四者天民之窮}
