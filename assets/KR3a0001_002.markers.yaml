  - {type: variant, offset: 124, length: 0, content: '', SBCK: 伐無道刑有罪一動而天下正其事成矣春秋致其時而萬物皆及王者致其道而萬民皆治周公載已行化行已以行化載亦行矣言令而行也其身正不而天下順之其誠至矣曽子曰入是國也言信於羣臣而留可也行忠於卿大夫則仕可也澤施於百姓則富可也孔子曰參之言此可謂善安身矣子路為蒲宰為水備與其民修溝瀆以民之勞煩苦也人與之一簞食笥簞一壺漿孔子聞之使子貢止之子路忿不悦徃見孔子曰由也以暴雨将至恐有水災故與民修溝洫以備之而民多匱餓者是以簞食壺漿而與之夫子使賜止之是夫子止由之行仁也夫子以仁教而禁其行由不受也孔子曰汝以民為餓也何不白於君發倉廩以賑之而私以爾食饋之是汝明君之無惠而見巳之德美矣汝速已則可不則汝之見罪必矣子路問於孔子曰管仲之爲人何如子曰仁也道也得仁子路曰昔管仲説襄公公不受是不辯也欲立公子紏而不能是不智也矣奉公子小白出奔莒公孫無知殺襄公齊襄立無常鮑叔牙曰君使民慢亂將作魯伐齊納子紏小白自莒先入是爲桓公管夷吾召忽奉公子紏奔魯齊人殺無知召忽死之也公乃殺子紏家殘於齊而無憂色是不慈也桎梏而居檻車無慙心是無醜也耻惡言無心之事所射之君是不貞也召忽死之管仲不死是不忠也仁人之道固若是乎孔子曰管仲説襄公襄公不受公之闇也欲立子紏而不能不遇時也家殘於齊而無憂色是知權命也桎梏而無慙心自裁審也事所射之君通於變也不死子紏量輕重也夫子紏未成君管仲未成臣管仲才度義管仲不死束縛而立功名未可非也召忽雖死過與取仁未足多也孔子適齊中路聞哭者之聲其音甚哀孔子謂其僕曰此哭哀則哀矣然非䘮者之哀矣驅而前少進見有異人焉擁鐮帶索哭者不哀孔子下車追而問曰子何人也對曰吾丘吾子也曰子今非䘮之所奚哭之悲也丘吾子曰吾有三失晚而自覺悔之何及曰三失可得聞乎願子告吾無隠也丘吾子曰吾少時好學周遍天下後還䘮吾親是一失也長事齊君君驕奢失士臣節不遂是二失也吾平生厚交而今皆離絶是三失也夫樹欲静而風不停子欲養而親不待徃而不來者年也不可再見者親也請從此辭遂投水而死孔子曰小子識之斯足為戒矣自是弟子辭歸養親者十有三孔子謂伯魚曰鯉乎吾聞可以與人終日不倦者其唯學焉其容體不足觀也其勇力不足憚也其先祖不足稱也其族姓不足道也終而}
