  - {type: variant, offset: 303, length: 0, content: '', SBCK: 曰君子有三思不可不察也少而不學長無能也老而不教死莫之思也有而不施窮莫之救也故君子少思其長則務學老思其死則務教有思其窮則務施伯常騫問於孔子曰騫固周國之賤吏也不自以不肖将北面以事君子敢問正道宜行不容於世貴故行之則不容於世正道宜行而出莫之能隠道宜行然亦不忍然亦不忍爲隱事世亂則隱道爲行今欲身亦不窮道亦不隠}
  - {type: page-break, offset: 303, content: '', id: KR3a0001_SBCK_002-12b}
  - {type: variant, offset: 303, length: 0, content: '', WYG: 曰君子有三思不可不察也少而不學長無能也老而不教死莫之思也有而不施窮莫之救也故君子少思其長則務學老思其死則務教有思其窮則務施伯常騫問於孔子曰騫固周國之賤吏也不自以不肖将北面以事君子敢問正道宜行不容於世正道宜行而世莫之能貴故行之則不容於世隠道宜行然亦不忍世亂則隠道}
  - {type: page-break, offset: 303, content: '', id: KR3a0001_WYG_002-10b, image: WYG0695/WYG0695-0021b.png}
  - {type: variant, offset: 303, length: 0, content: '', krp: 曰君子有三思不可不察也少而不學長無能也老而不教死莫之思也有而不施窮莫之救也故君子少思其長則務學老思其死則務教有思其窮則務施伯常騫問於孔子曰騫固周國之賤吏也不自以不肖将北面以事君子敢問正道宜行不容於世貴故行之則不容於世正道宜行而出莫之能隠道宜行然亦不忍然亦不忍爲隱事世亂則隱道爲行今欲身亦不窮道亦不隠}
  - {type: variant, offset: 304, length: 0, content: '', SBCK: 之有道乎孔子曰善哉子之問也自丘之聞未有若吾子所問辯且説也得其説矣辯當其理丘嘗聞君子之言道矣聽者無察則道不入道則不能入也言聽者不明察竒偉不稽則道不信考校奇偉則道不見稽考也聽道者不能人道不虚行信此言苟非其又嘗聞君子之言事矣制無度量則事不成其政曉察則民不保安保察則民不安矣也政大曉了分又嘗聞君子之言志矣㓻折者不終終其性命矣㓻則折矣不徑易者則數傷輕徑傷於義矣也志輕則數浩倨者則不親恭如是則不浩倨簡略不矣親就利者則無不弊不可久也言好利者又嘗聞養世之君子矣從輕勿為先從重勿為後憂赴重者宜爲先養世者也患從勞苦輕者宜爲後見像而勿强也見像法以強世也法而已不陳道而勿怫不與世相詭違也怫詭也陳道而已此四者丘之所聞也孔子觀於}
  - {type: page-break, offset: 304, content: '', id: KR3a0001_SBCK_002-13a}
  - {type: variant, offset: 304, length: 0, content: '', WYG: 行然亦不忍為隠事今欲身亦不窮道亦不隠為之有道乎孔子曰善哉子之問也自丘之聞未有若吾子所問辨且説也辯當其理得其説矣丘嘗聞君子之言道矣聽者無察則道不入言聽者不明察道則不能入也竒偉不稽則道不信稽考也聽道者不能考校竒偉則道不見信此言苟非其人道不虚行又嘗聞君子之言事矣制無度量則事不成其政曉察則民不保保安也政大曉了分察則民不安也又嘗聞君子之言志矣剛折者不終剛則折矣不終其性命矣俓易者則數傷俓輕也志輕則數傷於義矣浩倨者則不親浩倨簡畧不恭如是則不親矣就利者則無不弊言好利者不可久也又嘗聞養世之君子矣從輕勿為先從重勿為後赴憂患從勞苦輕者宜為後重者宜為先養世者也見像而勿强像法也見法而已不以强世也陳道而勿怫怫詭也陳道而已不與世相詭違也此四者丘之所聞也孔子觀於}
