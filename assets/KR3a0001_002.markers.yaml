  - {type: variant, offset: 538, length: 1, content: 邪, WYG: 益與無益君子所以知竊宜為察孔子謂子路曰見長者而不盡其辭雖有風雨吾不能入其門矣故君子以其所能敬人小人反是孔子謂子路曰君子以心導耳目立義以為勇小人以耳目導心不愻以為勇故曰退之而不怨先之斯可從已言人退之不怨先之則可從足以為師也孔子曰君子有三患未之聞患不得聞既聞之患弗得學既得學之患弗能行有其德而無其言君子恥之有其言而以無其行君子恥之既得之而又失之君子恥之地有而}
