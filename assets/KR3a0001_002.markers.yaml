  - {type: variant, offset: 395, length: 0, content: '', WYG: 君楚荘王討之因陳取之而申叔時諫荘王從之還復陳喟然嘆曰賢哉楚王輕千乗之國而重一言之信匪申叔之信不能達其義匪荘王之賢不能受其訓孔子嘗自筮其卦得賁焉愀然有不平之状子張進曰師聞卜者得賁卦吉也而夫子之色有不平何也孔子對曰以其离耶在周易山}
