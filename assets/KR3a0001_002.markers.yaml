  - {type: variant, offset: 228, length: 6, content: 殷湯誅尹諧文, SBCK: 逺而有光者飭也近而愈明者學也譬之汙池水潦注焉雚葦生焉雖或以觀之孰知其源乎水潦注於源泉源也學者雖從外入及其用之人誰知其非從池而生雚葦觀者誰知其非源泉乎以言者乎此出也子路見於孔子曰負重渉逺不擇地而休家貧親老不擇禄而仕昔者由也事二親之時常食藜藿之實為親負米百里之外親殁之後南遊於楚從車百乗積粟萬鍾累茵而坐列鼎而食願欲食藜藿為親負米不可復得也枯魚衘索幾何不蠧二親之夀忽若過隟孔子曰由也事親可謂生事盡力死事盡思者也孔子之郯也郯子達禮孔子故徃諮問焉郯國名也少昊之後吾之本縣遭程子於塗傾蓋而語駐車傾蓋終日甚相親顧謂子路曰取束帛以贈先生送贈子路屑然對曰由聞之士不中間見女嫁無媒君子不以交禮也始介也中間謂有間又顧謂子路子路又對如初孔子曰由詩不云乎有美一人清􅀭宛兮邂逅相遇適我願兮眉目清揚幽期而會令願也之間也宛然美也今程子天下賢士也於斯不贈則終身弗能見也小子行之孔子自衞反魯息駕于河梁而觀焉無梁河水言事者通渭水爲河也莊周書說孔子於閭梁有懸水三十仞尺八四丈者也曰仞懸二十圜流九十里水深急則然圜流廻流也魚鱉不能導黿鼉不能居行道有一丈夫方將厲之渡厲孔子使人並涯止之曰此懸水三十仞圜流九十里魚鼈黿鼉不能居也意者難可濟也丈夫不以措意遂渡而出孔子問之曰子乎有道術乎所以能入而出者何也丈夫對曰始吾之入也先以忠信及吾之出也又從以忠信忠信措吾軀於波流而吾不敢以用私所以能入而復出也孔子謂弟子曰二三子識之水且猶可以忠信成身親之而况於人乎孔子将行雨而無蓋門人曰商也有之夏子也名孔子曰商之為人也甚恡於財甚也恡嗇吾聞與人交推其長者違其短者故能久也楚}
