  - {type: 'tls:seg', offset: 544, content: '', id: KR3a0001_CHANT_002-2a.55}
  - {type: variant, offset: 544, length: 0, content: '', SBCK: 鄰之釐婦婦也􅁵寡亦獨處一室夜暴風雨至釐婦室壊趨而託焉魯人閉戶而不納釐婦自牖與之言何不仁而不納我乎魯人曰吾聞男女不六十不同居今子㓜吾亦幼是以不敢納爾也婦人曰子何不如柳下惠}
  - {type: variant, offset: 544, length: 0, content: '', WYG: 樂乎善道告人取喻於素絲良馬如組紕之義家語卷二欽定四庫全書家語卷三魏王肅註觀周第十一孔子謂南宫敬叔曰吾聞老聃博古知今敬叔孟僖子子也老聃老子博古知今而好道通禮樂之原明道徳之歸則吾師也今將往矣對曰謹受命遂言於魯君曰臣受先臣之命先臣僖子云孔子聖人之後也聖人殷湯滅於宋孔子之先去宋奔魯故曰滅於宋也其祖弗父何始有國而受厲公弗父何緍公世子厲公兄也讓國以授厲公春秋傳曰以有宋而授厲公有者始有也始有宋也及正考父佐戴武宣正考父何之曽孫也戴武宣三公也三命兹益恭命為士一命為大夫再命為卿三命是也故其鼎銘曰臣有功徳君命銘之於其宗廟之鼎也一命而僂再命而傴三命而俯傴㳟於僂俯㳟於傴循墻而走言㳟之甚亦莫余敢侮余我也我考父也以其恭如此故人亦莫之侮饘於是粥於是以餬其口饘糜也為糜粥於此鼎言至儉也其恭儉也若此臧孫紇有言聖人之後若不當世紇威武仲弗父何殷湯之後而不繼世為宋君則必有明徳而達者焉孔子少而好禮其將在矣將在孔子屬臣汝必師之今孔子將適周觀先生之遺制考禮樂之所極斯大業也君盍以乗資之臣請與往公曰諾與孔子車一乗馬二匹豎子侍御敬叔與俱至周問禮於老聃訪樂於萇𢎞𢎞周大夫歴郊社之所考明堂之則則法察廟朝之度宗廟朝廷之法度也於是喟然曰吾乃今知周公之聖與周之所以王也及去周老子送之曰吾聞富貴者送人以財仁者送人以言吾雖不能富貴而竊仁者之號請送子以言乎凡當今之士聰明深察而近於死者好譏議人者也博辯閎達而危其身好發人之惡者也無以有已為人子者身父母之有也無以惡已為人臣者言聴則仕不用則退保身全行臣之節也孔子曰敬奉敎自周反魯道彌尊矣逺方弟子之進葢三千焉孔子觀乎明堂覩四門墉有堯舜與桀紂之象而各有善惡之状興廢之誡焉又有周公相成王抱之負斧扆南靣以朝諸侯之圖焉世之博學者謂周公便履天子之位失之逺矣孔子徘徊而望之謂從者曰此周公所以盛也夫明鏡所以察形往古者所以知今人主不務襲迹於其所以安存而急急所以危亡是猶未有以異於却走而欲求及前人也豈不惑哉孔子觀周遂入太祖后稷之廟廟堂右階之前有金人焉參緘其口而銘其背曰古之慎言人也戒之哉無多言多言多敗無多事多事多患安樂必戒雖處安樂必警戒也無所行悔言當詳而後行所悔之事不可復行勿謂何傷其禍將長勿謂何害其禍將大勿謂不聞神將伺人熖熖不滅炎炎若何涓涓不壅終為江河綿綿不絶或成網羅綿綿微細若不絶則有成羅網者也毫末不札將尋斧柯如毫之末言至微也札拔也尋用也誠能慎之福之根也口是何傷禍之門也强梁者不得其死好勝者必遇其敵盜憎主人民怨其上君子知天下之不可上也故下之知衆人之不可先也故後之温恭慎徳使人慕之執雌持下人莫踰之人皆趨彼我獨守此人皆或之我獨不徙或之東西轉移之貌内藏我智不示人技我雖尊髙人弗我害誰能於此江海雖左長於百川以其卑也水隂長右海江雖在於其左而能為百川長以其能下天道無親而能下人戒之哉孔子既讀斯文也顧謂弟子曰小子識之音志此言實而中情而信詩云戰戰兢兢如臨深淵如履薄冰戰戰恐也兢兢戒也恐墜也恐䧟也行身如此豈以口過患哉孔子見老聃而問焉曰甚矣道之於今難行也吾比執道而今委質以求當世之君而弗受也道於今難行也老子曰夫説者流於辯流猶過也失也聴者亂於辭知此二者則道不可以忘也弟子行第十二衛將軍文子衛卿名彌牟也問於子貢曰吾聞孔子之施敎也先之以詩書導之以孝悌説之以仁義觀之以禮樂}
