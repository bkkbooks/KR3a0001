  - {type: variant, offset: 390, length: 0, content: '', SBCK: 也千乗之國有争臣五人則社稷不危也内外者也故有五人焉諸侯有三卿股肱之臣有百乗之家有争臣三人宰凡三人能以義諫諍大夫之臣有室老家相邑則禄位不替父有争子不陷無禮士有争友不行不義君故湏朋友之諫爭於巳然後不義士雖有臣旣微且陋不能以義匡}
  - {type: variant, offset: 390, length: 0, content: '', WYG: 也四輔前曰疑後曰丞左曰輔右曰弼也千乗之國有争臣五人則社稷不危也諸侯有三卿股肱之臣有内外者也故有五人焉百乗之家有争臣三人大夫有臣室老家相邑宰凡三人能以義諫諍則禄位不替父有争子不陷無禮士有争友不行不義士雖有臣既微且陋不能以義匡}
  - {type: variant, offset: 390, length: 0, content: '', krp: 也千乗之國有争臣五人則社稷不危也内外者也故有五人焉諸侯有三卿股肱之臣有百乗之家有争臣三人宰凡三人能以義諫諍大夫之臣有室老家相邑則禄位不替父有争子不陷無禮士有争友不行不義君故湏朋友之諫爭於巳然後不義士雖有臣旣微且陋不能以義匡}
  - {type: variant, offset: 391, length: 0, content: '', SBCK: 行之者也之事不得故子從父命奚詎為孝臣從君命奚詎為貞夫能審其所從宜從與不當詳審所之謂孝之謂貞矣子路盛服見於孔子子曰由是倨倨者何也夫江始出於岷山其源可以濫觴以盛觴可其微酒言及其至于江津不舫舟不避風則不可以渉非唯下流水多耶今爾衣服既盛顔色充盈天下且孰肯以非告汝乎子路趨而出改服而入蓋自若也子曰由志之吾告汝奮於言者華者華而無實自矜奮於言奮於行者伐者是自伐自矜奮行夫色智而有能者小人也故君子知之曰智言之要也不能曰不能行之至也言要則智行至則仁既仁且智惡不足哉子路問於孔子曰有人於此披褐而懐玉何如布衣褐毛子曰國無道隠之可也國有道則衮冕而執玉衣盛􅅚衮冕文好生第十魯哀公問於孔子曰昔者舜冠何冠乎孔子不對公曰寡人有問於子而子無言何也對曰以君之問不先其大者故方思所以為對公曰其大何乎孔子曰舜之為君也其政好生而惡殺其任授賢而替不肖德若天地而静虚化若四時而變物是以四海承風暢於異類之夷狄也異􅀋四方鳳翔麟至鳥獸馴德順馴無他也好生故也君舎此}
  - {type: page-break, offset: 391, content: '', id: KR3a0001_SBCK_002-16a}
  - {type: page-break, offset: 391, content: '', id: KR3a0001_SBCK_002-16b}
  - {type: page-break, offset: 391, content: '', id: KR3a0001_SBCK_002-17a}
  - {type: variant, offset: 391, length: 0, content: '', WYG: 君故須朋友之諫諍於已然後不義之事不得行之者也故子從父命奚詎為孝臣從君命奚詎為貞夫能審其所從當詳審所宜從與不之謂孝之謂貞矣子路盛服見於孔子子曰由是倨倨者何也夫江始出於岷山其源可以濫觴觴可以盛酒言其微及其至于江津不舫舟不避風則不可以渉非唯下流水多邪今爾衣服既盛顔色充盈天下且孰肯以非告汝乎子路趨而出改服而入葢自若也子曰由志之吾告汝奮於言者華自矜奮於言者華而無實奮於行者伐自矜奮行者是自伐夫色智而有能者小人也故君子知之曰智言之要也不能曰不能行之至也言要則智行至則仁既仁且智惡不足哉子路問於孔子曰有人於此被褐而懐玉何如褐毛布衣子曰國無道隠之可也國有道則衮冕而執玉衮冕文衣盛飾也好生第十魯哀公問於孔子曰昔者舜冠何冠乎孔子不對公曰寡人有問於子而子無言何也對曰以君之問不先其大者故方思所以為對公曰其大何乎孔子曰舜之為君也其政好生而惡殺其任授賢而替不肖德若天地而静虚化若四時而變物是以四海承風暢於異類異類四方之夷狄也鳳翔麟至鳥獸馴德馴順無他也好生故也君舎此}
