  - {type: variant, offset: 22, length: 0, content: '', SBCK: 願得白羽若月赤羽若日鍾鼓之音上震於天旍旗繽紛下蟠于地委蟠由當一隊而敵之必也攘地千里却攘搴旗執聝聝截耳也以效獲也搴取也取敵之旍旗唯由能之使二子者從我焉夫子曰勇哉子貢復進曰賜願使齊楚合戰於漭瀁之野大之􅁼漭瀁廣兩壘相望塵埃相接挺刃交兵賜著縞衣白冠凶兵冠服也事故白陳説其間推論利害釋國之患唯賜能之使夫二子者從我焉夫子曰辯哉顔囘退而不對孔子曰回来汝奚獨無願乎顔回對曰文武之事則二子者既言之矣回何云焉孔子曰雖然各言爾志也小子言之對曰回}
  - {type: page-break, offset: 22, content: '', id: KR3a0001_SBCK_002-1b}
  - {type: variant, offset: 22, length: 0, content: '', WYG: 願得白羽若月赤羽若日鐘鼓之音上震於天旍旗繽紛下蟠于地蟠委由當一隊而敵之必也攘地千里攘却搴旗執馘搴取也取敵之旍旗馘截耳也以效獲也唯由能之使二子者從我焉夫子曰勇哉子貢復進曰賜願使齊楚合戰於漭瀁之野漭瀁廣大之類兩壘相望塵埃相接挺刃交兵賜著縞衣白冠兵凶事故白冠服也陳説其間推論利害釋二國之患唯賜能之使夫二子者從我焉夫子曰辯哉顔回退而不對孔子曰回来汝奚獨無願乎顔回對曰文武之事則二子者既言之矣回何云焉雖然各言爾志也小子言之對曰回}
  - {type: page-break, offset: 22, content: '', id: KR3a0001_WYG_002-1b, image: WYG0695/WYG0695-0016d.png}
  - {type: variant, offset: 22, length: 0, content: '', krp: 願得白羽若月赤羽若日鍾鼓之音上震於天旍旗繽紛下蟠于地委蟠由當一隊而敵之必也攘地千里却攘搴旗執聝聝截耳也以效獲也搴取也取敵之旍旗唯由能之使二子者從我焉夫子曰勇哉子貢復進曰賜願使齊楚合戰於漭瀁之野大之類漭瀁廣兩壘相望塵埃相接挺刃交兵賜著縞衣白冠凶兵冠服也事故白陳説其間推論利害釋國之患唯賜能之使夫二子者從我焉夫子曰辯哉顔囘退而不對孔子曰回来汝奚獨無願乎顔回對曰文武之事則二子者既言之矣回何云焉孔子曰雖然各言爾志也小子言之對曰回}
  - {type: variant, offset: 23, length: 0, content: '', SBCK: 薰蕕不同器而藏蕕臭薰香堯桀不共國而治以其類異也回願得明王聖主輔相之敷其五敎義母慈兄友弟敷布也五教父孝也恭子導之以禮樂使民城郭不修溝池不越越溝池言無踰鑄劒㦸以為農器放牛馬於原藪無水曰藪也廣平曰原澤室家無離曠之思千歲無戰闘之患則由無所施其勇而賜無所用其辯矣夫子凛然曰美哉徳也子路抗手而對曰夫子何選焉孔子曰不傷財不害民不繁詞則顔氏之子有矣魯有儉嗇者瓦鬲煑食釜瓦食之自謂其美盛之土型之器甂瓦以進孔子孔子受之歡然而悦如受大牢之饋饋餽也牛羊豕子路曰瓦甂陋器也煑食薄膳也夫子何喜之如此乎子曰夫好諫者思其君食美者念其親吾非以饌具之為厚以其食厚而我思焉孔子之楚而有漁者而獻魚焉孔子不受漁者曰天暑市逺無所鬻也思慮棄之糞壤不如獻之}
  - {type: page-break, offset: 23, content: '', id: KR3a0001_SBCK_002-2a}
  - {type: page-break, offset: 23, content: '', id: KR3a0001_SBCK_002-2b}
  - {type: variant, offset: 23, length: 0, content: '', WYG: 薰蕕不同器而藏薫香猶臭堯桀不共國而治以其類異也回願得明王聖主輔相之敷其五敎敷布也五教父義母慈兄友弟恭子孝也導之以禮樂使民城郭不修溝池不越言無踰越溝池鑄劒㦸以為農器放牛馬於原藪廣平曰原澤無水曰藪也室家無離曠之思千歲無戰鬬之患則由無所施其勇而賜無所用其辯矣夫子凛然曰美哉徳也子路抗手而對曰夫子何選焉孔子曰不傷財不害民不繁詞則顔氏之子有矣魯有儉嗇者瓦鬲煮食瓦釡食之自謂其美盛之土型之器瓦甂以進孔子孔子受之歡然而悦如受大牢之饋牛羊豕饋遺也子路曰瓦甂陋器也煮食薄膳也夫子何喜之如此乎子曰夫好諫者思其君食美者念其親吾非以饌具之為厚以其食厚而我思焉孔子之楚而有䰻者而獻魚焉孔子不受䰻者曰天暑市逺無所鬻也思慮棄之糞壤不如獻之}
