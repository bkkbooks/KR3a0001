  - {type: variant, offset: 45, length: 0, content: '', SBCK: 吾聞諸惜其腐䭃而欲以務施者仁人之偶也惡有受仁人之饋而無祭者乎季羔為衛之士師官獄刖人之足俄而衛有蒯聵之亂晉靈公卒立其子輙蒯聵自晉初衞靈公太子蒯聵得罪出奔路並位於衞也襲衞時子羔子季羔逃之走郭門刖者守門焉謂季羔曰彼有􅆙季羔曰君子不踰又曰彼有竇季羔曰君子不隧竇出隧從又曰於此有室季羔乃入焉既而追者罷季羔将去謂刖者吾不能􅃜主之法而親刖子之足矣今吾在難此正子之報怨之時而逃我者三何故哉刖者曰斷足固我之罪無可奈何曩者君治臣以法令先人後臣欲臣之免也臣知獄决罪定臨當論刑君愀}
  - {type: page-break, offset: 45, content: '', id: KR3a0001_SBCK_002-3b}
