  - {type: 'tls:seg', offset: 550, content: '', id: KR3a0001_CHANT_002-2a.56}
  - {type: variant, offset: 552, length: 3, content: 咸知罪, SBCK: 敢侵侮我周道謂管蔡之屬孔子曰能治國家之如此雖欲侮之豈可得乎周自后稷積行累功以有爵土公劉重之以仁及至大王亶甫敦以德讓其樹根置本備豫逺}
  - {type: variant, offset: 552, length: 3, content: 咸知罪, krp: 敢侵侮我周道謂管蔡之屬孔子曰能治國家之如此雖欲侮之豈可得乎周自后稷積行累功以有爵土公劉重之以仁及至大王亶甫敦以德讓其樹根置本備豫逺}
  - {type: variant, offset: 554, length: 2, content: 罪矣, WYG: 文子曰以吾子常與學賢者也何為不知子貢對曰賢人無妄賢人無妄妄言舉動不知賢即難故君子之言曰智莫難於知人是以難對也文子曰若夫知賢莫不難今吾子親遊焉是以敢問子貢曰夫子之門人葢有三千就焉賜有逮及焉未逮及焉故不得徧知以告也文子曰吾子所及者請聞其行子貢對曰夫能夙興夜寐諷誦崇禮行不貳過貳再也有不善未甞不知知之未甞復行也稱言不苟舉言典法不苟且也是顔囘之行也孔子説之以}
  - {type: page-break, offset: 554, content: '', id: KR3a0001_WYG_003-5a, image: WYG0695/WYG0695-0028c.png}
  - {type: punctuation, offset: 556, content: 。, id: KR3a0001_CHANT_002-bkkpn126}
  - {type: 'tls:seg', offset: 556, content: '', id: KR3a0001_CHANT_002-2a.57}
  - {type: punctuation, offset: 556, content: 《, id: KR3a0001_CHANT_002-bkkpn127}
  - {type: variant, offset: 556, length: 2, content: 詩云, SBCK: 初大王都􅃎翟人侵之事之以皮幣不得免焉事之以珠玉不得免焉於是屬耆老而告之所欲吾土地吾聞之君子不以所養而害人二三子何患乎無君遂獨與大姜去之踰梁山邑于岐山之下􅃎人曰仁人之君不可失也從之如歸市焉}
  - {type: page-break, offset: 556, content: '', id: KR3a0001_SBCK_002-23a}
  - {type: variant, offset: 556, length: 2, content: 詩云, krp: 初大王都豳翟人侵之事之以皮幣不得免焉事之以珠玉不得免焉於是屬耆老而告之所欲吾土地吾聞之君子不以所養而害人二三子何患乎無君遂獨與大姜去之踰梁山邑于岐山之下豳人曰仁人之君不可失也從之如歸市焉}
  - {type: punctuation, offset: 557, content: 》, id: KR3a0001_CHANT_002-bkkpn128}
  - {type: variant, offset: 557, length: 1, content: 云, WYG: 曰媚兹一人應侯慎徳一人}
