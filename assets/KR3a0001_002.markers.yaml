  - {type: variant, offset: 564, length: 6, content: 不迷是以威厲, SBCK: 之去殷久矣若此}
  - {type: variant, offset: 564, length: 6, content: 不迷是以威厲, krp: 之去殷久矣若此}
  - {type: variant, offset: 565, length: 1, content: 迷, WYG: 失厥名以御於天子則王者之相也在貧如客言不以貧累志矜荘如為客也使其臣如借言不有其臣如借使之也不遷怒不深怨不録舊罪是冉雍之行也孔子論其材曰有土之君子也有衆使也有刑用也然後稱怒焉言有土地之君有衆足使有刑足用然後可以稱怒冉雍非有土之君故使其臣如借而不加怒也孔子告之以詩曰靡不有初鮮克有終冉雍能終其行匹夫不怒唯以亡其身因説不怒之義遂及匹夫以怒亡身不畏强禦不侮矜寡其言循性循其性也而言不誣其情其都以富仲由長於政事材任治戎戎軍旅也是仲由之行也孔子和之以文説之以詩曰受小共大共而為下國駿庬荷天子之龍孔子曰和仲由以文説之以詩此其義也其法也駿大也庬厚也龍和也言受大小法為下國大厚乃可任天下道也不戁不悚敷奏其勇戁恐悚懼敷陳奏薦强乎武哉文不勝其質言子路强勇文不勝其質恭老䘏㓜不忘賓旅賔旅謂寄客也好學博藝省物而勤也省録諸事而能勤也是冉求之行也孔子因而語之曰好學則智恤孤則惠恭則近禮勤則有繼堯舜篤恭以王天下其稱之也曰宜為國老國老助宣徳敎齋莊而能肅志通而好禮儐相两君之事篤雅有節是公西赤之行也子曰禮經三百可勉能也禮經三百可勉學而能知威儀三千則難也能躬行三千之威儀則難可為而公西赤能躬行之公西赤問曰何謂也子曰貌以儐禮禮以儐辭是謂難焉言所以為者當觀容貌而儐相其禮度其禮而儐相其辭度事制冝故難也衆人聞之以為成也孔子語人曰當賔客之事則達矣衆人聞公西赤能行三千之威儀故以為成也孔子曰當賔客之事則達未盡達於治國之本體也謂門人曰二三子之欲學賔客之禮者其於赤也滿而不盈實而如虚過之如不及先王難之盈而如虚過而不及是先王之所難而曽參體其行博無不學其貌恭其徳敦其言於人也無所不信其驕大人也常以浩浩浩然志大驕大貌也大人富貴者也}
