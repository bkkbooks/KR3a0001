  - {type: variant, offset: 532, length: 2, content: 百姓, SBCK: 為一兆武仲三年而為二兆孺子容三年而為三兆憑從此之見若問三人之賢與不賢所未敢識也孔子曰君子哉漆雕氏之子其言人之美也隠而顯言人之過也微而著智而不能及明而不能見孰克如此宜爲如也克能也而魯公索氏反先落将祭而亡其牲孔子聞之曰公索氏不及二年将亡後一年而亡門人問曰昔公索氏亡其祭牲而夫子曰不及二年必亡今過朞而亡夫子何以知其然孔子曰夫祭者孝子所以自盡於其親将祭而亡其牲則其餘所亡者多矣若此而不亡者未之有也虞芮二國争田而訟連年不决乃相謂曰西伯仁也文王西伯盍徃質之質}
  - {type: page-break, offset: 532, content: '', id: KR3a0001_SBCK_002-19b}
  - {type: variant, offset: 532, length: 2, content: 百姓, WYG: 為一兆武仲三年而為二兆孺子容三年而為三兆憑從此之見若問三人之賢與不賢所未敢識也孔子曰君子哉漆雕氏之子其言人之美也隠而顯言人之過也微而著智而不能及明而不能見孰克如此克能也而宜為如也魯公索氏先落反将祭而亡其牲孔子聞之曰公索氏不及二年将亡後一年而亡門人問曰昔公索氏亡其祭牲而夫子知其将亡何也曰夫祭者孝子所以自盡於其親将祭而亡其牲則其餘所亡者多矣若此而不亡者未之有也虞芮二國争田而訟連年不決乃相謂曰西伯仁人也西伯文王盍往質之盍何不質}
