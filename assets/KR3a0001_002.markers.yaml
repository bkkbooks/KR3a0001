  - {type: variant, offset: 262, length: 0, content: '', SBCK: 貢問於孔子曰死者有知乎将無知乎子曰吾欲言死之有知将恐孝子順孫妨生以送死吾欲言死之無知将恐不孝之子棄其親而不葬賜不欲知死者有知與無知非今之急後自知之子貢問治民於孔子子曰懔懔焉若持腐索之扞馬貌扞馬突馬懔懔戒懼之子貢曰何其畏也孔子曰夫通達御皆人也以道導之則吾畜也不以道導之則吾讎也如之何其無畏也魯國之法贖人臣妾于諸侯}
