  - {type: variant, offset: 393, length: 0, content: '', krp: 冠冕是問是以緩對孔子讀史至楚復陳莊王討之因陳取之陳夏徵舒}
  - {type: variant, offset: 395, length: 0, content: '', SBCK: 君楚王從之還復陳而申叔時諫莊喟然歎曰賢哉楚王輕千乗之國而重一言之信匪申叔之信不能達其義匪荘王之賢不能受其訓孔子常自筮其卦得賁焉愀然有不平之状子張進曰師聞卜者得賁卦吉也而夫子之色有不平何也孔子對曰以其離耶在周易山}
