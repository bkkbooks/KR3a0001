  - {type: variant, offset: 541, length: 2, content: 從化, krp: 足君子耻之衆寡均而人功倍已焉君子耻之而功殊倍已故耻之也凡興功業多少與人同魯人有獨處室}
  - {type: variant, offset: 542, length: 0, content: '', WYG: 之如歸市焉天之與周民之去殷久矣若此而不能天下未之有也武庚惡能侮武庚紂子名禄父與管蔡共為亂也鄁詩曰執轡如組兩驂如儛驂之以服和諧中節孔子曰為此詩者其知政乎夫為組者總紕於此成文於彼言其動於近行於逺也執此法以御民豈不}
  - {type: page-break, offset: 542, content: '', id: KR3a0001_WYG_002-19b, image: WYG0695/WYG0695-0025d.png}
  - {type: variant, offset: 543, length: 0, content: '', WYG: 乎竿旄之忠告至矣哉竿旄之詩}
