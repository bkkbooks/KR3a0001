  - {type: 'tls:seg', offset: 536, content: '', id: KR3a0001_CHANT_002-2a.54}
  - {type: variant, offset: 536, length: 0, content: '', SBCK: 孔子曰以此觀之文王之道其不可加焉不令而從不教而聽至矣哉曽子曰狎甚則相簡荘甚則不親是故君子之狎足以交歡其荘足以成禮孔子聞斯言也曰二三子志之孰謂參也不知禮乎哀公問曰紳委章甫甫冠名也委委貌章有益於仁乎孔子作色而對曰君胡然焉衰麻苴杖者志不存乎樂非耳弗聞服使然也黼黻衮冕者容不襲慢非性矜莊服使然也介胃執戈者無退懦之氣非體純猛服使然也且臣聞之好肆不守折好肆不守折也言市弗能爲廉而長者不為市不爲市買之事言長者之行則竊夫}
  - {type: page-break, offset: 536, content: '', id: KR3a0001_SBCK_002-20b}
  - {type: variant, offset: 536, length: 0, content: '', WYG: 孔子曰以此觀之文王之道其不可加焉不令而從不教而聽至矣哉曽子曰狎甚則相簡荘甚則不親是故君子之狎足以交歡其荘足以成禮孔子聞斯言也曰二三子志之孰為參也不知禮也哀公問曰紳委章甫委委貌章甫冠名也有益於仁乎孔子作色而對曰君胡然焉衰麻苴杖者志不存乎樂非耳弗聞服使然也黼紱衮冕者容不䙝慢非性矜荘服使然也介胄執戈者無退懦之氣非體純猛服使然也且臣聞之好肆不守折言市弗能為廉好肆不守折也而長者不為市言長者之行則不為市買之事竊夫}
