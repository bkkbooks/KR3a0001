  - {type: variant, offset: 532, length: 2, content: 百姓, krp: 為一兆武仲三年而為二兆孺子容三年而為三兆憑從此之見若問三人之賢與不賢所未敢識也孔子曰君子哉漆雕氏之子其言人之美也隠而顯言人之過也微而著智而不能及明而不能見孰克如此宜爲如也克能也而魯公索氏反先落将祭而亡其牲孔子聞之曰公索氏不及二年将亡後一年而亡門人問曰昔公索氏亡其祭牲而夫子曰不及二年必亡今過朞而亡夫子何以知其然孔子曰夫祭者孝子所以自盡於其親将祭而亡其牲則其餘所亡者多矣若此而不亡者未之有也虞芮二國争田而訟連年不决乃相謂曰西伯仁也文王西伯盍徃質之質}
  - {type: variant, offset: 535, length: 0, content: '', SBCK: 也盍何不入其境則耕者讓畔行者讓路入其朝士讓為大夫大夫讓于卿虞芮之君曰嘻吾儕小人也等儕不可以入君子之朝逺自相與而退咸以所争之田為閒田}
  - {type: page-break, offset: 535, content: '', id: KR3a0001_SBCK_002-20a}
  - {type: variant, offset: 535, length: 0, content: '', WYG: 也入其境則耕者讓畔行者讓路入其邑男女異路斑白不提挈入其朝士讓為大夫大夫讓為卿虞芮之君曰嘻吾儕小人也儕等不可以履君子之庭遂自相與而退咸以所争之田為閒田}
  - {type: variant, offset: 535, length: 0, content: '', krp: 也盍何不入其境則耕者讓畔行者讓路入其朝士讓為大夫大夫讓于卿虞芮之君曰嘻吾儕小人也等儕不可以入君子之朝逺自相與而退咸以所争之田為閒田}
