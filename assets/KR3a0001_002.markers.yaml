  - {type: variant, offset: 545, length: 2, content: 後待, SBCK: 嫗不逮門之女國人不稱其亂魯人曰柳下惠則可吾固不可吾将以吾之不可學柳下惠之可孔子聞之曰善哉欲學柳下惠者未有似於此者期於至善而不襲其為可謂智乎孔子曰小辯害義小言破道關雎興于鳥而君子美之取其雄雌之有别鹿鳴興於獸而君子大之取其得食而相呼若以鳥獸之名嫌之固不可行也孔子謂子路曰君子而强氣則不得其死小人而强氣則刑戮荐蓁􅃎詩曰殆天之未隂雨徹彼桑土綢繆牖戶也桑土桑根殆及也徹剥喻我國家積累之功乃難成之苦者也也鴟鴞天未雨剥取桑根以􅆞綿其牖戸今汝下民或敢侮余王致此大功至艱而今者周公時言我先不可不遏絶}
