  - {type: variant, offset: 226, length: 1, content: 除, SBCK: 學其容不可以不飭不飭無類無類失親宜􅀋禮貌矜莊然後親愛可久故曰無􅀋失親爲貌不在飭故無貌不得言不飭無􅀋也也失親不忠則無忠誠情不相親不忠失禮信爲本禮以忠失禮不立無以立非禮則}
