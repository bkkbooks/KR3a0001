  - {type: variant, offset: 388, length: 1, content: 上, WYG: 夫物惡有滿而不覆哉子路進曰敢問持滿有道乎子曰聰明睿知守之以愚功被天下守之以讓勇力振世守之以法富有四海守之以謙此所謂損之又損之之道也孔子觀於東流之水子貢問曰君子所見大水必觀焉何也孔子曰以其不息且遍與諸生而不為也夫水似乎德遍與諸生者物德水而後生水不與生而又不德也其流也則卑下倨邑必循其理此似義浩浩乎無屈盡之期此似道流行赴百仞之嵠而不懼此似勇至量必平之此似法盛而不求概此似正綽約微達此似察發源必東此似志以出以入萬物就以化絜此似善化也水之德有若此是故君子見必觀焉子貢觀於魯廟之北堂出而問於孔子曰向也賜觀於太廟之堂未既輟還瞻北葢皆斷焉輟止觀北面之葢斷絶也彼将有説耶匠過之也孔子曰太廟之堂官致良工之匠匠致良材盡其功巧葢貴久矣尚有説也尚猶必也言必有説孔子曰吾有所恥有所鄙有所殆夫㓜而不能强學老而無以教吾恥之去其鄉事君而逹卒遇故人曽無舊言吾鄙之事君而達得志於君而見故人曽無舊言是棄其平生之舊交而無進之心者乎與小人處而不能親賢吾殆之殆危也夫疎賢而近小人是危亡之道子路見於孔子孔子曰智者若何仁者若何子路對曰智者使人知己仁者使人愛已子曰可謂士矣子路出子貢入問亦如之子貢對曰智者知人仁者愛人子曰可謂士矣子貢出顔回入問亦如之對曰智者自知仁者自愛子曰可謂士君子矣子貢問於孔子曰子從父命孝臣從君命貞乎奚疑焉孔子曰鄙哉賜汝不識也昔者明王萬乗之國有争臣七人則主無過舉天子有三公四輔主諫争以救其過}
