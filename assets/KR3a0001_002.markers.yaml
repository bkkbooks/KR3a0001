  - {type: variant, offset: 538, length: 1, content: 邪, krp: 益與無益君子所以知爲察竊宜孔子謂子路曰見長者而不盡其辭雖有風雨吾不能入其門矣故君子以其所能敬人小人反是孔子謂子路曰君子以心導耳目立義以為勇小人以耳目導心不愻以為勇故曰退之而不怨先之斯可從已怨先之則可言人退之不爲師也從足以孔子曰君子三患未之聞患不得聞既得聞之患弗得學既得學之患弗能行有其德而無其言君子耻之有其言而無其行君子耻之既得之而又失之君子耻之地有餘}
  - {type: variant, offset: 541, length: 2, content: 從化, SBCK: 足君子耻之衆寡均而人功倍已焉君子耻之而功殊倍已故耻之也凡興功業多少與人同魯人有獨處室}
  - {type: variant, offset: 541, length: 0, content: '', WYG: 足君子恥之衆寡均而人功倍已焉君子恥之凡興功業多少與人同而功殊倍已故恥之魯人有獨處室者隣之釐婦釐寡婦也亦獨處一室夜㬥風雨至釐婦室壊趨而託焉魯人閉户而不納釐婦自牖與之言子何不仁而不納我乎魯人曰吾聞男子不六十不間居今子㓜吾亦㓜是以不敢納爾也婦人曰子何不如柳下惠然嫗不逮門之女國人不稱其亂魯人曰柳下惠則可吾固不可吾将以吾之不可學柳下惠之可孔子聞之曰善哉欲學柳下惠者未有似於此者期於至善而不襲其為可謂智乎孔子曰小辯害義小言破道闗雎興于鳥而君子美之取其雄雌之有别鹿鳴興于獸而君子大之取其得食而相呼若以鳥獸之名嫌之固不可行也孔子謂子路曰君子而强氣則不得其死小人而强氣則刑戮薦臻豳詩曰迨天之未隂雨徹彼桑土綢繆牖户迨及也徹剥也桑土桑根也鴟鴞天未雨剥取桑根以纒綿其牖户喻我國家積累之功乃難成之若此也今汝下民或敢侮余今者周公時言我先祖致此大功至艱而下民敢侵侮我周道謂管蔡之亂不可不遏絶之以存周室者也孔子曰能治國家之如此雖欲侮之豈可得乎周自后稷積行累功以有爵土公劉重之以仁及至大王亶父敦以德讓其樹根置本備豫逺矣初大王都豳狄人侵之事之以皮幣不得免焉事之以珠玉不得免焉於是屬耆老而告之所欲吾土地吾聞之君子不以所養而害人二三子何患乎無君遂獨與大姜去之踰梁山邑於岐山之下豳人曰仁人之君不可失也}
  - {type: page-break, offset: 541, content: '', id: KR3a0001_WYG_002-18a, image: WYG0695/WYG0695-0025a.png}
