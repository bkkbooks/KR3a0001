  - {type: variant, offset: 388, length: 1, content: 上, SBCK: 夫物惡有滿而不覆哉子路進曰敢問持滿有道乎子曰聦明睿智守之以愚功被天下守之以讓勇力振世守之以怯富有四海守之以謙此所謂損之又損之之道也孔子觀於東流之水子貢問曰君子所見大水必觀焉何也孔子對曰以其不息且遍與諸生而不爲也夫水似乎德生者物遍與諸與生而又不德也得水而後生水不其流也則卑下倨邑必修其理似義浩浩乎無屈盡之期此似道流行赴百仞之嵠而不懼此似勇至量必平之此似法盛而不求概此似正綽約微達此似察發源必東此似志以出以入萬物就以化絜此似善化也水之德有若此是故君子見必觀焉子貢觀於魯廟之北堂出而問於孔子曰向也賜觀於太廟之堂未既輟還瞻北蓋皆斷焉之盖斷絶也輟止觀北面彼将有説耶匠過之也孔子曰太廟之堂宫致良工之匠匠致良材盡其功巧蓋貴久矣尚有説也必也尚猶有說言必孔子曰吾有所齒有所鄙有所殆夫㓜而不能强學老而無以教吾耻之去其鄉事君而逹卒遇故人曽無舊言吾鄙之而達事君其平生之舊交而無進之之心者乎得志於君而見故人曾無舊言是棄與小人處而不能親賢吾殆之而近小人是危殆危也夫踈賢道也亡之子路見於孔子孔子曰智者若何仁者若何子路對曰智者使人知己仁者使人愛己子曰可謂士矣子路出子貢入問亦如之子貢對曰智者知人仁者愛人子曰可謂士矣子貢出顔回入問亦如之對曰智者自知仁者自愛子曰可謂士君子矣子貢問於孔子曰子從父命孝臣從君命貞乎奚疑焉孔子曰鄙哉賜汝不識也昔者明王萬乗之國有争臣七人則主無過舉也四輔前曰疑後曰丞左曰輔右曰弼天子有三公四輔主諫爭以救其過}
