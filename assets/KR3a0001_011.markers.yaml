  - {type: variant, offset: 445, length: 0, content: '', WYG: 則有司將書之以示後世無乃不可乎公曰古者天子喪慈母練冠以燕居}
  - {type: variant, offset: 446, length: 0, content: '', WYG: 庶子王為其母也遂練冠以喪慈母喪慈母如母始則魯孝公之為也孔子適衞遇舊館人之喪入而哭之哀出使子貢脱驂以贈之子貢曰於所識之喪不能有所贈贈於舊館不已多乎孔子曰吾向入哭之遇一哀而出涕吾惡夫涕而無以將之小子行焉子路問於孔子曰魯大夫練而杖禮與孔子曰吾不知也子路出謂子貢曰吾以為夫子無所不知夫子亦徒有所不知也子貢曰子所問何哉子路曰止吾將為子問之遂趨而進曰練而杖禮與孔子曰非禮也子貢出謂子路曰子謂夫子而弗知之乎夫子徒無所不知也子問非也禮居是邦則不非其大夫叔孫武叔之母死既小斂舉尸者出户武叔}
  - {type: page-break, offset: 446, content: '', id: KR3a0001_WYG_010-13b, image: WYG0695/WYG0695-0104d.png}
  - {type: page-break, offset: 446, content: '', id: KR3a0001_WYG_010-14a, image: WYG0695/WYG0695-0105a.png}
  - {type: variant, offset: 447, length: 0, content: '', WYG: 之出户乃袒投其冠而括髪子路歎之孔子曰是禮也子路問曰將小斂則變服今乃出户而夫子以為知禮何也孔子曰汝問非也君子不舉人以質事質猶止也齊晏桓子卒平仲麤衰斬苴絰帶杖以菅屨食粥居傍廬寢苫枕草其老曰非大夫喪父之禮也晏子曰唯卿大夫曽子以問孔子孔子曰晏平仲可謂能逺害矣不以己之是駮人之非愻辭以避咎義也夫記者乃舉人避害之愻以辭而謂大夫士喪父母有異亦􅏜也季平子卒將以君之璵璠斂贈以珠玉孔子初為中都宰聞之歴級而救焉歴級遽登階不聚足曰送而以寶玉是猶曝尸於中原也其示民以姦利之端而有害於死者安用之且孝子不順情以危親忠臣不兆姦以䧟君兆姦為姦之兆臣也乃止孔子之弟子琴張與宗魯友衛齊豹見宗魯於公子孟縶孟縶以為參乗焉及齊豹將煞孟縶告宗魯使行宗魯曰吾由子而事之今聞難而逃是僭子也僭不信使子言不信子行事乎吾將死以事周子而歸死於公孟可也齊氏用戈擊公孟宗魯以背蔽之斷肱中公孟宗魯皆死琴張聞宗魯死將往弔之孔子曰齊豹之盜孟縶之賊也汝何弔焉君不食姦不受亂不為利病於囘囘邪也不以利故而病於邪也不以囘事人不葢非義葢掩不犯非禮汝何弔焉琴張乃止郕人子蒲卒哭之呼滅舊説以滅子蒲名人少名滅者又哭名其父不近人情疑以孤窮自謂將亡滅也子游曰若哭其野孔子惡野哭者哭者聞之遂改之公父文伯卒其妻妾皆行哭失聲敬姜戒之曰吾聞好外者士死之好内者女死之今吾子早夭吾惡其以好内聞也二三婦人之欲供先祀者言欲畱不改嫁供奉先人之祀請無瘠色無揮涕無拊膺揮涕不哭流涕以手揮之拊猶撫也膺謂胷也無哀容無加服有降服從禮而靜是昭吾子也孔子聞之曰女智無若婦男智莫若夫公父氏之婦智矣剖情損禮欲以明其子為令德也子路與子羔仕於衞衞有蒯聵之難孔子在魯聞之曰柴也其來由也死矣旣而衞使至曰子路死焉夫子哭之於中庭有人弔者而夫子拜之已哭進使者而問故使}
