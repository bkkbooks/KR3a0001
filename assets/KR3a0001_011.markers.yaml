  - {type: variant, offset: 880, length: 0, content: '', SBCK: 言畧授可以絶口粹昭而梗則􅆸原淂而支則舍三墳五典何必顯顯八索九丘何必優優六經二論何必諄諄特以聖質罕聞而淵参短列睿心希觸而冉閔續依性天遐轍髙堅逺路此所以必叢其辭必繁其篇譬之繫臂以姸珠而珠存斯貴帶腰以良玉而玉在斯奇此書雖若言之廣且曲道則載焉古人所謂載道之器余敢以先歸諸今考之藝文志有二十一卷王肅所註何乃至宋人梓傳者止十卷巳亡其太半如由混簡錯袠則又不可分柝比之王廣謀句觧者又止三卷近何氏孟春所註則卷雖盈於前本而文多不齊余頗惜王肅所註之少播於丗力求宋刻者而校仇之僅淂十之七八雖宋刻亦有訛謬者}
  - {type: page-break, offset: 880, content: '', id: KR3a0001_SBCK_011-2a}
