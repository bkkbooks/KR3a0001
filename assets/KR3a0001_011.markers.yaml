  - {type: variant, offset: 466, length: 0, content: '', WYG: 文科斗尚書孝經論語世人莫有能言}
  - {type: variant, offset: 467, length: 0, content: '', WYG: 安國為之今文讀而訓傳其義又撰孔子家語旣畢㑹值巫蠱事起遂各廢不行于時然其典雅正實與世}
  - {type: variant, offset: 468, length: 0, content: '', WYG: 傳者不同日而論也光禄大夫向以為其時所未施之故尚書則不記於别録論語則不使名家也臣竊惜之且百家章句無不畢記況孔子家語古文正實而疑之哉又戴聖近世小儒以曲禮不足而乃取孔子家語雜亂者及子思孟軻孫卿之書以禆益之總名曰禮記今尚見其已在禮記者則便除家語之本篇是滅其原而存其末不亦難乎臣之愚以為宜如此為例皆記録别見故敢冐昧以聞奏上天子許之未即論定而遇帝崩向又病亡遂不果立嗟乎是書之亡久矣一亡于勝國王氏其病在割裂一亡於包山陸氏其病在倒顛先輩毎慶是書未遭秦熖至于今日何異與􅞆炬同􅈣銷耶予毎展讀即長跪宣尼像前誓願遘止及見郴陽何燕泉叙中云云不覺泣涕如雨夫燕泉生於正徳間又極稽古尚未獲一見余又何望哉余又何望哉撫卷浩歎愈久愈痛忽丁卯秋吳興賈人持一編至廼北宋板王肅注本子大書深刻與今本逈異惜二卷十六葉已前皆已蠧蝕因復向先聖焚香叩首願窺全豹幸己卯春從錫山酒家復覯一函冠冕巋然亦宋刻王氏注也所逸者僅末二卷余不覺合掌頓足急倩能書者一補其首一補其尾二冊儼然雙璧矣縱未必夫子舊堂壁中故物已不失王肅本注矣三百年割裂顛倒之紛紛一旦而垂紳正笏於夫子廟堂之上矣是書幸矣余幸矣亟公之同好凡架上王氏陸氏本俱可覆諸醬瓿矣即何氏所注亦是暗中摸索疵病甚多未必賢于王陸二家也但其一序亦可叅考因綴旒于跋之下虞山毛晉識何孟春曰孔子家語如孔衍言則壁藏之餘實孔安國為之而王肅代安國序未始及焉不知何謂此書源委流傳肅序詳矣愚考漢書藝文志載家語二十七卷顔師古曰非今所有家語也唐書藝文志有王肅注家語十卷然則師古所謂今之家語者歟班史所志大都劉向較録已定之書肅序稱四十四篇乃先聖二十一世孫猛之所傳者肅闢鄭氏學猛嘗學扵肅肅從猛得此書遂行於世然則肅之所注家語也非安國之所撰次及向之所較者明矣虞舜南風之詩𤣥注樂記云其辭未聞今家語有之馬昭謂王肅増加非鄭𤣥所見其言豈無據耶肅之􅀢異於𤣥葢毎如此旣於曽子問篇不録又言諸弟子所稱引皆不取而胡為贅此此自有為云爾肅之注愚不獲見而見其序今世相傳家語殆非肅本非師古所謂今之所有者安國本世逺不復可得今於何取正哉司馬貞與師古同代人也貞作史記索隱引及家語今本或有或無有亦不同愚有}
