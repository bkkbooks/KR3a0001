  - {type: variant, offset: 62, length: 292, content: 後也滅於宋其祖弗父何始有國而受厲公及正考父佐戴武宣三命玆益恭故其鼎銘曰一命而僂再命而傴三命而俯循牆而走亦莫余敢侮饘於是粥於是以餬其口其恭儉也若此臧孫紇有言聖人之後若不當世則必有明德而達者焉孔子少而好禮其將在矣屬臣汝必師之今孔子將適周觀先王之遺制考禮樂之所極斯大業也君盍以乘資之臣請與往公曰諾與孔子車一乘馬二匹豎子侍御敬叔與俱至周問禮於老聃訪樂於萇弘歷郊社之所考明堂之則察廟朝之度於是喟然曰吾乃今知周公之聖與周之所以王也及去周老子送之曰吾聞富貴者送人以財仁者送人以言吾雖不能富貴而竊仁者之號請送子以言乎凡當今之士聰明深察而近於死者好譏議人者也博辯閎達而危其身好發人之惡者也無以有己為人子, SBCK: 道傳}
