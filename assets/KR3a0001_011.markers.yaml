  - {type: variant, offset: 456, length: 0, content: '', WYG: 孔子衰服陽虎之言犯禮故孔子荅之以示不非其言者也顔囘死魯定公弔焉使人訪於孔子孔子對曰凡在封内皆臣子也禮君弔其臣升自東階向尸而哭其恩賜之施不有􅀢也原思言於曽子曰夏后氏之送葬也用明器示民無知也殷人用祭器示民有知也周人兼而用之示民疑也曽子曰其不然矣}
  - {type: page-break, offset: 456, content: '', id: KR3a0001_WYG_010-18b, image: WYG0695/WYG0695-0107b.png}
