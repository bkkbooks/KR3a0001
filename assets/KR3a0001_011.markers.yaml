  - {type: variant, offset: 7, length: 15, content: 謂南宮敬叔曰吾聞老聃博古知今通, SBCK: 家語后序呉郡黃魯曽􅁧嗚呼至㦲孔子之文徳而有是書也孔子生於過曆上不逮於文武而為大行中不親於成康而為共和而欲行其道周流於齊椘蔡衛之􅀖所遇者皆晏嬰子西之徒未􅀗多契於東魯本國乃卑秩膴仕兩不辤焉但相以攝而輕會以兵而瀆且有容璣之沮懐寳之誚不一也終與門人小子相明道以傳后丗是以孔氏獨多述作自魯論齊論言之又有家語疑多鯉伋所記并門人先后襍附之者要之咸孔子之意也故一典一事莫非宗􅈲一􅁤一物莫非玄訓信義美文包二變於獨覺}
  - {type: page-break, offset: 7, content: '', id: KR3a0001_SBCK_011-1b}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 曰晉文公實召天子而使諸侯朝焉晉文公㑹諸侯于溫召襄王且使狩於河陽因使諸侯朝夫子作春秋云天王狩于河陽何也孔子曰以臣召君不可以訓亦書其率諸侯事天子而已孔子在宋見桓魋自為石槨三年而不成工匠皆病夫子愀然曰若是其靡也侈靡死不如速朽之愈冉子僕曰禮凶事不豫此何}
  - {type: page-break, offset: 7, content: '', id: KR3a0001_WYG_010-1b, image: WYG0695/WYG0695-0098d.png}
  - {type: variant, offset: 7, length: 15, content: 謂南宮敬叔曰吾聞老聃博古知今通, krp: 家語后序呉郡黃魯曽撰嗚呼至㦲孔子之文徳而有是書也孔子生於過曆上不逮於文武而為大行中不親於成康而為共和而欲行其道周流於齊椘蔡衛之邦所遇者皆晏嬰子西之徒未獲多契於東魯本國乃卑秩膴仕兩不辤焉但相以攝而輕會以兵而瀆且有容璣之沮懐寳之誚不一也終與門人小子相明道以傳后丗是以孔氏獨多述作自魯論齊論言之又有家語疑多鯉伋所記并門人先后襍附之者要之咸孔子之意也故一典一事莫非宗旨一軌一物莫非玄訓信義美文包二變於獨覺}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 也乎夫子曰旣死而議諡諡定而卜葬旣葬而立廟皆臣子之事非所豫屬也況自為之哉}
  - {type: variant, offset: 9, length: 1, content: 宮, WYG: 宫}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 以富得罪於定公犇衞衞侯請復之載其寶以朝夫子聞之曰若是其貨也喪不若速貧之愈喪失位也子游侍曰敢問何謂如此孔子曰富而不好禮殃也敬叔以富喪矣而又弗改吾懼其將有後患也敬叔聞之驟如孔氏而後循禮施散焉孔子在齊齊大旱春饑景公問於孔子曰如之何孔子曰凶年則乗駑馬力役不興馳道不修馳道君行之道祈以幣玉君所祈請用幣及玉不用牲也祭事不懸不作樂也祀以下牲當用太牢者用少牢此則賢君自貶以救民之禮也孔子適季氏康子晝居内寢孔子問其所疾康子出見之言終孔子退子貢問曰季孫不疾而問諸疾禮與孔子曰夫禮君子不有大故則不宿於外非致齊也非疾也則不晝處於内是故夜居外雖弔之可也晝居於内雖問其疾可也孔子為大司寇國廏焚子退朝而之火所鄉人有自為火來者則拜之士一大夫再子貢曰敢問何也孔子曰其來者亦相弔之道也吾為有司故拜之子貢問曰管仲失於奢晏子失於儉與其俱失也二者孰賢孔子曰管仲鏤簋而朱紘鏤刻而飾之朱紘天子冕之紘旅樹而反玷旅施也樹屏也天子外屏諸侯内屏反玷在兩楹之間人君好㑹獻酢禮畢反爵於其上也山節藻梲節栭也刻為山雲梲梁山楹也畫藻文也賢大夫也而難為上晏平仲祀其先祖而䐁肩不掩豆言陋小也一狐裘三十年賢大夫也而難為下君子上不僭下下不偪上冉求曰臧文仲知魯國之政立言垂法于今不可亡可謂知禮者矣孔子曰昔臧文仲安知禮夏父弗忌逆祀而不止燔柴於竈以祀焉夫竈者老婦之所祭謂祭竈執其功老婦主祭也盛於甕尊於瓶非所祭也故曰禮也者猶體也體不備謂之不成人設之不當猶不備也子路問於孔子曰臧武仲率師與邾人戰于狐鮐遇敗焉師人多喪而無罰古之道然與孔子曰凡謀人之軍師敗則死之謀人之國邑危則亡之古之道也其君在焉者有詔則無討詔君之教也有君教則臣無討晉將伐宋使人覘之觀也宋陽門之介夫死陽門宋城門也介夫被甲衛門者也司城子罕哭之哀覘者反言於晉侯曰陽門之介夫死而子罕哭之哀民咸悦宋殆未可伐也孔子聞之曰善哉覘國乎詩云凡民有喪匍匐救之子罕有焉雖非晉國天下其孰能當之言雖非晉國使天下有强者猶不能當也是以周任有言曰民悦其愛者弗可敵也楚伐吳工尹商陽與陳棄疾追吳師及之棄疾曰王事也子手弓而可商陽手弓棄疾曰子射諸射之斃一人韔其弓韔韜又及棄疾謂之又斃二人每斃一人輒掩其目止其御曰吾朝不坐燕不與士卑故也殺三人亦足以反命矣孔子聞之曰殺人之中又有禮焉子路怫然進曰人臣之節當君大事唯力所及死而後已夫子何善此子曰然如汝言也吾取其有不忍殺人之心而已孔子在衛司徒敬子卒夫子弔焉主人不哀夫子哭不盡聲而退蘧伯玉請曰衛鄙俗不習喪禮煩吾子辱相焉孔子許之掘中􅋼而浴室中毁竈而綴足襲於牀及塟毁宗而躐行明不復有事於此也綴足不欲解戾矣毁宗廟而出行神位在廟門之外也出于大門及墓男子西面婦人東面旣封而歸殷道也孔子行之子游問曰君子行禮不求變俗夫子變之矣孔子曰非此之謂也喪事則從其質而已宣公八年六月辛巳有事于太廟而東門襄仲卒壬午猶繹繹祭之明日又祭也子由見其故以問孔子曰禮與孔子曰非禮也卿卒不繹季桓子喪康子練而無衰子游問於孔子曰旣服練服可以除衰乎孔子曰無衰衣者不以見賓何以除焉邾人以同母異父之昆弟死將為之服因顔克而問禮於孔子子曰繼父同居者則異父昆弟從為之服不同居繼父且猶不服況其子乎齊師侵魯公叔務人務人昭公之子遇人入保負杖而息遇見也見􅋅辟齊師將入保疲倦加杖於頸上兩手掖之休息者也保縣邑小城也務人泣曰使之雖病謂時徭役任之雖重謂時賦税君子弗能謀士弗能死不可也我則旣言之矣敢不勉乎與其隣嬖童汪錡乘往犇敵死焉皆殯魯人欲勿殤童汪錡問於孔子子曰能執干戈以衛社稷可無殤乎魯昭公夫人吴孟子卒不赴於諸侯孔子旣致仕而往弔焉適于季氏季氏不絰孔子投絰而不拜以季氏無故已亦不成禮子游問曰禮與孔子曰主人未成服則弔者不絰焉禮也公父穆伯之喪敬姜晝哭文伯之喪晝夜哭孔子曰季氏之婦可謂知禮矣愛而無私上下有章上謂夫下謂子也章别也哭夫晝哭哭子晝夜哭哭夫與子各有别南宫縚之妻孔子之兄女喪其姑夫子誨之髽曰爾毋從從爾毋扈扈爾從從髙也扈扈大也皆言喪者無容飾也蓋榛以為笄長尺而總八寸總束髪束髪垂為飾者齊衰之總八寸也子張有父之喪公明儀相焉問稽顙於孔子孔子曰拜而後稽顙頽乎其順也稽顙而後拜頎乎其至也三年之喪吾從其至者孔子在衞衞之人有送葬者而夫子觀之曰善哉為喪乎足以為法也小子識之子貢問曰夫子何善爾也曰其往也如慕其返也如疑子貢曰豈若速返而虞哉返葬而祭謂之虞也子曰此情之至者也小子識之我未之能也卞人有母死而孺子之泣者孔子曰哀則哀矣而難繼也夫禮為可傳也為可繼也故哭踊有節而變除有期孟獻子禫懸而不樂可御而不處内子游問於孔子曰若是則過禮也孔子曰獻子可謂加於人一等矣魯人有朝祥而暮歌者子路笑之孔子曰由爾責於人終無已夫三年之喪亦已久矣子路出孔子曰又多乎哉又復也言其可以歌不復久也踰月則其善也子路問於孔子曰傷哉貧也生而無以供養死則無以為禮也孔子曰啜菽飲水盡其歡心斯謂之孝斂手足形旋葬而無椁旋便稱其財斯謂之禮貧何傷乎吴延陵季子聘于上國適齊於其返也其長子死於嬴博之間嬴博齊地今泰山縣是也孔子聞之曰延陵季子呉之習於禮者也往而觀其葬焉其斂以時服而已隨冬頁之服無所加其壙揜坎深不至於泉其葬無明器之贈旣葬其封廣輪揜坎其髙可肘隱也旣封則季子左􅃝右還其封且號者三曰骨肉歸于土命也若魂氣則無所不之無所不之而遂行孔子曰延陵季子之於禮其合矣子游問喪之具孔子曰稱家之有亡焉子游曰有亡惡乎齊惡何齊限孔子曰有也則無過禮苟亡矣則斂手足形還塟懸棺而封人豈有非之者哉故夫喪禮與其哀不足而禮有餘不若禮不足而哀有餘也祭禮與其敬不足而禮有餘不若禮不足而敬有餘也伯髙死於衞赴於孔子子曰吾惡乎哭諸兄弟吾哭諸廟父之友吾哭諸廟門之外師吾哭之寢朋友吾哭之寢門之外所知吾哭之諸野今於野則己疎於寢則己重夫由賜也而見我吾哭於賜氏遂命子貢為之主曰為爾哭也來者汝拜之知伯髙而來者汝勿拜旣哭使子張往弔焉未至冉求在衞攝束帛乗馬而以將之孔子聞之曰異哉徒使我不成禮於伯髙者是冉求也子路有姊之喪可以除之矣而弗除孔子曰何不除也子路曰吾寡兄弟而弗忍也孔子曰行道之人皆弗忍先王制禮過之者俯而就之不至者企而望之子路聞之遂除之伯魚之喪母也期而猶哭夫子聞之曰誰也門人曰鯉也孔子曰嘻其甚也非禮也伯魚聞之遂除之衞公使其大夫求婚於季氏桓子問禮於孔子子曰同姓為宗有合族之義故繋之以姓而弗别啜之以食而弗殊君有食族人之禮雖親盡不異之族食多少也雖百世婚姻不得通周道然也桓子曰魯衞之先雖寡兄弟今已絶逺矣可乎孔子曰固非禮也夫上治祖禰以尊尊之下治子孫以親親之旁治昆弟所以敦睦也此先王不易之教也有若問於孔子曰國君之於同姓如之何孔子曰皆有宗道焉故雖國君之尊猶百世不廢其親所以崇愛也雖於族人之親而不敢戚君所以謙也戚親也尊敬君不敢如其親也子夏問第四十三子夏問於孔子曰居父母之仇如之何孔子曰寢苫枕干不仕干盾弗與共天下也遇於朝市不返兵而鬬兵常不離於身曰請問居昆弟之仇如之何孔子曰仕弗與同國御國命而使雖遇之不鬬曰請問從父昆弟之仇如之何曰不為魁主人能報之則執兵而陪其後子夏問三年之喪旣卒哭金革之事無避禮與初有司為之乎有司當職吏也孔子曰夏后氏之喪三年旣殯而致事殷人旣葬而致事周人旣卒哭而致事致事還政於君也卒哭止無時之哭大夫三月而葬正月而卒哭士旣虞而卒哭也記曰君子不奪人之親亦不奪故也子夏曰金革之事無避者非與孔子}
