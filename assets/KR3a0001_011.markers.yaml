  - {type: variant, offset: 458, length: 1, content: 鏡, WYG: 器鬼器也祭器人器也古之人胡為而死其親也子游問於孔子曰之死而致死乎不仁不可為也之死而致生乎不智不可為也凡為明器}
  - {type: variant, offset: 460, length: 0, content: '', WYG: 知喪道矣備物而不可用也是故竹不成用謂籩之無縁也而瓦不成膝膝鑌琴瑟張而不平笙竽備而不和有鐘磬而無簨簴簨簴可以懸鐘磬也其曰明器神明之也哀哉死者而用生者之器不殆於用殉也殺人以從死謂之殉子游問於孔子曰塟者塗車芻靈自古有之然今人或有偶偶木人也是無益於喪孔子曰為芻靈者善矣為偶者不仁不殆於用人乎顔淵之喪旣祥顔路饋祥肉於孔子孔子自出而受之入彈琴以散情而後乃食之孔子嘗奉薦而進嘗秋祭也其親也慤慤親之奉薦也慤質也其行也趨趨以數言少威儀已祭子貢問曰夫子之言祭也濟濟漆漆焉威儀容止今夫子之祭無濟濟漆漆何也孔子曰濟濟漆漆者容也逺也言賓客疏逺之容也漆漆者以自反謂安辭之容也容以逺若容以自反夫何神明之及交必如此則何濟濟漆漆之有反饋樂成進則燕俎序其禮樂備其百官於是君子致其濟濟漆漆焉夫言豈一端而已哉亦各有所當子路為季氏宰季氏祭逮昏而奠逮昏未明終日不足繼以燭雖有强力之容肅敬之心皆倦怠矣有司跛倚以臨事跛偏任也其為不敬也大矣他日祭子路與焉室事交于户堂事當于階質明而始行事晏朝而徹質明平明孔子聞之曰以此觀之孰為由也而不知禮衞莊公之反國改舊制變宗廟易朝市高子臯問於孔子曰周禮繹祭於祊祊在廟門之西前朝而後市今衞君欲其事事一更之如之何孔子曰繹之於庫門内祊之於東市朝於西方失之矣季桓子將祭齊三日而二日鐘鼓之音不絶冉有問於孔子子曰孝子之祭也散齋七日慎思其事三日致齋而一用之情一而用之也猶恐其不敬也而二日伐鼓何居焉公父文伯之母季康子之從祖母康子往焉側門而與之言内皆不踰閥側門於門之側而與之言言不外身不踰門限文伯祭其祖悼子康子與焉悼子文伯始祖進俎而不受進俎康子而不親授徹俎而不與燕徹俎之後而不與歡燕之坐宗老不具則不繹繹又祭宗老大夫家臣也典祭祀及宗族之事不具不在繹不盡飫則退飫獻神不盡厭飫之禮而去也孔子聞之曰男女之别禮之大經公父氏之婦動中德􅃐度於禮矣中意之􅃐合禮之度季康子朝服以縞曾子問於孔子曰禮乎孔子曰諸侯皮弁以告朔然後服之以視朝若此禮者也朝服以縞僣宗禮也孔子惡指斥康子但言諸侯之禮而已而諸侯以皮弁以告朔卒然後朝服以視朝朝服明不用縞後序孔子家語者皆當時公卿士大夫及七十二弟子之所諮訪交相對問言語者旣而諸弟子各自記其所問焉與論語孝經竝時弟子取其正實而切事者别出為論語其餘則都集録名之曰孔子家語凡所論辨流判較歸實自夫子本旨也屬文下辭往往頗有浮説煩而不要者亦猶七十二子各共叙述首尾加之潤色其材或有優劣故使之然也孔子旣没而微言絶七十二弟子終而大義乖六國之世儒道分散遊説之士各以巧意而為枝葉唯孟軻孫卿守其所習當秦昭王時孫卿入秦昭王從之問儒術孫卿以孔子之語及諸國事七十二弟子之言凡百餘篇與之由此秦悉有焉始皇之世李斯焚書而孔子家語與諸子同列故不見滅髙祖克秦悉斂得之皆載於二尺竹簡多有古文字及吕氏專漢取歸藏之其後被誅亡而孔子家語乃散在人間好事亦各以意増損其言故使同是一事而輒異辭孝景皇帝末年募求天下禮書于時士大夫皆送官得吕氏之所傳孔子家語而與諸國事及七十二子辭妄相錯雜不可得知以付掌書與曲禮衆篇亂簡合而藏之祕府元封之時吾仕京師竊懼先人之典辭將遂泯滅於是因諸公卿士大夫私以人事募求其副悉得之乃以事類相次撰集為四十四篇又有曾子問禮一篇自别屬曽子問故不復録其諸弟子書所稱引孔子之言者本不存乎家語亦以其已自有所傳也是以皆不取也將來君子不可不鑑孔安國字子國孔子十二世孫也孔子生伯魚魚生子思名伋伋常遭困于宋作中庸之書四十七篇以述聖祖之業授弟子孟軻之徒數百人年六十二而卒子思生子上名白年四十七而卒自叔梁紇始出妻及伯魚亦出妻至子思又出妻故稱孔氏三世出妻子上生子家名傲後名永年四十五而卒子家生子直名􅳘年四十六而卒子直生子髙名穿亦著儒家語十二篇名曰􅀈言年五十七而卒子髙生武字子順名微後名斌為魏文王相年五十七而卒子武生子魚名鮒及子襄名騰子文名祔子魚後名甲子襄以好經書博學畏秦法峻急乃壁藏其家語孝經尚書及論語於夫子之舊堂壁中子魚為陳王涉博士太師卒陳下生元路一字元生名育後名隨子文生㝡字子産子産後從髙祖以左司馬將軍從韓信破楚於垓下以功封蓼侯年五十三而卒諡曰夷侯長子滅嗣官至太常次子襄字子士後名讓為孝惠皇帝博士遷長沙王太傅年五十七而卒生季中名員年五十七而卒生武及子國子國少學詩於申公受尚書於伏生長則博覽經傳問無常師年四十為諫議大夫遷侍中博士天漢後魯恭王壞夫子故宅得壁中詩書悉以歸子國子國乃考論古今文字撰衆師之義為古文論語訓十一篇孝經傳二篇尚書傳五十八篇皆所得壁中科斗本也又集録孔氏家語為四十四篇旣成㑹值巫蠱事寢不施行子國由博士為臨淮太守在官六年以病免年六十卒于家其後孝成皇帝詔光禄大夫劉向校定衆書都記録名古今文書論語别録子國孫衍為博士上書辨之曰臣聞明王不掩人之功大聖不遺人小善}
