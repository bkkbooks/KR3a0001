  - {type: variant, offset: 449, length: 0, content: '', WYG: 醢之矣遂令左右皆覆醢曰吾何忍食}
  - {type: variant, offset: 450, length: 427, content: 周公所以盛也夫明鏡者所以察形往古者所以知今人主不務襲迹於其所以安存而急急所以危亡是猶未有以異於卻走而欲求及前人也豈不惑哉孔子觀周遂入太祖后稷之廟廟堂右階之前有金人焉參緘其口而銘其背曰古之慎言人也戒之哉無多言多言多敗無多事多事多患安樂必戒無所行悔勿謂何傷其禍將長勿謂何害其禍將大勿謂不聞神將伺人焰焰不滅炎炎若何涓涓不壅終為江河綿綿不絕或成網羅毫末不札將尋斧柯誠能慎之福之根也口是何傷禍之門也強梁者不得其死好勝者必遇其敵盜憎主人民怨其上君子知天下之不可上也故下之知眾人之不可先也故後之溫恭慎德使人慕之執雌持下人莫踰之人皆趨彼我獨守此人皆或之我獨不徙內藏我智不示人技我雖尊高人弗我害誰能於此江海雖左長於百川以其卑也天道無親而能下人戒之哉孔子既讀斯文也顧謂弟子曰小人識之此言實而中情而信詩云戰戰兢兢如臨深淵如履薄冰行身如此豈以口過患哉孔子見老聃而問焉曰甚矣道之於今難行也吾比執道而今委質以求當世之君而弗受也道之於今難行也老子曰夫說者流於辯聽者亂於辭知此二者則道不, SBCK: 數字}
  - {type: variant, offset: 450, length: 0, content: '', WYG: 季桓子死魯大夫朝服而弔子游問於孔子曰禮乎夫子不答他日又問夫子曰始死則已羔裘𤣥冠者易之而已汝何疑焉子睪問於孔子曰始死之設重也何為孔子曰重主道也殷主綴重焉綴連也殷人作主而連其重懸諸廟也周人徹重焉周人作主徹重就所倚處而治請問喪朝喪將葬朝於廟而後行焉子曰喪之朝也順死者之孝心故至於祖考廟而後行殷朝而後殯於祖周朝而後遂葬孔子之守狗死謂子貢曰路馬死路馬常所乘馬則藏之以帷狗則藏之以葢汝往埋之吾聞弊帷不棄為埋馬也弊葢不棄為埋狗也今吾貧無葢於其封也與之席無使其首䧟於土焉公西赤問第四十四公西赤問於孔子曰大夫以罪免卒其葬也如之何孔子曰大夫廢其事終身不仕死則葬之以士禮老而致事者死則從其列公儀仲子嫡子死而立其弟檀弓謂子服伯子曰何居我未之前聞也子服伯子曰仲子亦猶行古人之道昔者文王舍伯邑考伯邑考文王之長子也言文王亦立子而不立孫也而立武王微子舍其孫腯立其弟衍子游以問諸孔子子曰否周制立孫孔子之母旣喪將合葬焉曰古者不祔葬為不忍先死者之復見也詩云死則同穴自}
