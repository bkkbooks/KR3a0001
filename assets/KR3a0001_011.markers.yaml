  - {type: variant, offset: 432, length: 1, content: 朝, WYG: 世子之禮有諸孔子曰昔者成王嗣立幼未能莅阼周公攝政而治抗世子之法於伯禽欲王之知父子君臣之道所以善成王也夫知為子者然後可以為父知為人臣者然後可以為人君知事人者然後可以使人是故抗世子法伯禽使成王知父子君臣長幼之義焉凡君之於世子親則父也尊則君也有父之親有君之尊然後兼天下而有之不可不慎也行一物而善者唯世子齒於學之謂也世子齒於學則國人觀之曰此將君我而與我齒讓何也曰有父在則禮然然而衆知父子之道矣其二曰此將君我而與我齒讓何也曰有臣在則禮然然而衆知君臣之義矣其三曰此將君我而與我齒讓何也曰長長也則禮然然而衆知長幼之節矣故父在斯為子君在則為臣居子與臣之位所以尊君而親親也在學學之為父子焉學之為君臣焉學之為長幼焉父子君臣長幼之道得而後國治語曰樂正司業父師司成師有父道成生人者一有元良萬國以貞一謂天子也大善太子也世子之謂聞之曰為人臣者曰殺其身有益於君則為之況于其身于鄭氏讀為迃寛也大也以善其君乎周公優為之子夏問於孔子曰居君之母與妻之喪如之何孔子曰居處言語飲食衎爾於喪所則稱其服而已敢問伯母之喪如之何孔子曰伯母叔母疏衰期而踊不絶地姑姊妹之大功踊絶於地若知此者由文矣哉言如禮文意當言姑姊妹而已妹上長姑字也子夏問於夫子曰凡喪小功已上虞祔練祥之祭皆沐浴於三年之喪子則盡其情矣孔子曰豈徒祭而已哉三年之喪身有瘍則浴首有瘡則沐病則飲酒食肉毁瘠而為病君子不為也毁則死者君子為之且祭之沭浴為齊潔也非為飾也子夏問於孔子曰客至無所舍而夫子曰生於我乎館客死無所殯夫子曰於我乎殯敢問禮與仁者之心與孔子曰吾聞諸老聃曰館人使若有之惡有有之而不得殯乎夫仁者制禮者也故禮者不可不省也禮不同不異不豐不殺稱其義以為之宜故曰我戰則剋祭則受福葢得其道矣孔子食於季氏食祭主人不辭不食客不飲而飡子夏問曰禮與孔子曰非禮也從主人也吾食於少施氏而飽少施氏食我以禮吾食祭作而辭曰疏食不足祭也吾飡而作辭曰疏食不敢以傷吾子之性主人不以禮客不敢盡禮主人盡禮則客不敢不盡禮也子夏問曰官於大夫旣升於公而反為之服禮與孔子曰管仲遇盜取二人焉上之為臣曰所以遊辟者可人也公許管仲卒桓公使為之服官於大夫者為之服自管仲始也有君命焉子貢問居父母喪孔子曰敬為上哀次之瘠為下顔色稱情戚容稱服曰請問居兄弟之喪孔子曰則存乎書筴矣子貢問於孔子曰殷人旣定而弔於壙周人反哭而弔於家如之何孔子曰反哭之弔也喪之至也反而亡矣失之矣於斯為甚故弔之死人卒事也殷以慤吾從周殷人旣練之明日而祔于祖周人旣卒哭之明日而祔于祖祔祭神之始事也周以戚吾從殷戚猶促也子貢問曰聞諸晏子少連大連善居喪其有異稱乎孔子曰父母之喪三日不怠三月不解期悲哀三年憂東夷之子達於禮者也子游問曰}
