  - {type: variant, offset: 452, length: 0, content: '', WYG: 已來祔葬矣故衛人之祔也離之有以間焉魯人之祔也合之美夫吾從魯遂合葬於防曰吾聞之古者墓而不墳今丘也東西南北之人不可以弗識也吾見封之若堂者矣堂形四方若髙者又見若坊者矣坊形旁殺平上而長又見若覆夏屋者矣又見若斧形者矣吾從斧者焉於是封之崇四尺孔子先反虞門人後雨甚至墓崩修之而孔子問焉曰爾來何遲對曰防墓崩孔子不應三云孔子泫然而流涕曰吾聞之古不修墓及二十五月而祥五日而彈琴不成聲十日過禫而成笙歌孔子大祥二十五月禫而十日踰月而歌孔子有母之喪旣練陽虎弔焉私於孔子曰今季氏將大饗境内之士子聞諸孔子曰丘弗聞也若聞之雖在衰絰亦欲與往陽虎曰子謂不然乎季氏饗士不及子也陽虎出曽參問曰語之何謂也孔子曰已則喪服猶應其言示}
  - {type: page-break, offset: 452, content: '', id: KR3a0001_WYG_010-17b, image: WYG0695/WYG0695-0106d.png}
