  - {type: variant, offset: 440, length: 2, content: 俳佪, WYG: 曰非禮也古者男子外有傅父内有慈母君命所使教子者也何服之有昔魯孝公少喪其母其慈母良及其死也公弗忍欲喪之有司曰禮國君慈母無服今也君為之服是逆古之禮}
