  - {type: variant, offset: 462, length: 3, content: 察形往, WYG: 能其明聖也陛下發明詔諮羣儒集天下書籍無言不悉命通才大夫校定其義使遐載之文以大著於今日立言之士垂於不朽此則蹈明王之軌遵大聖之風者也雖唐帝之煥然周王之彧彧未若斯之極也故述作之士莫不樂測大倫焉臣祖故臨淮太守安國建仕於孝武皇帝之世以經學為名以儒雅為官讃明道義見稱前朝時魯恭王壞孔子故宅得}
