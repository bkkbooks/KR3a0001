body:
  text: 本命解第二十六魯哀公問於孔子曰人之命與性何謂也孔子對曰分於道謂之命形於一謂之性化於陰陽象形而發謂之生化窮數盡謂之死故命者性之始也死者生之終也有始則必有終矣人始生而有不具者五焉目無見不能食不能行不能言不能化及生三月而微煦然後有見八月生齒然後能食三年囟合然後能言十有六而精通然後能化陰窮反陽故陰以陽變陽窮反陰故陽以陰化是以男子八月生齒八歲而齓女子七月生齒七歲而齓十有四而化一陽一陰奇偶相配然後道合化成性命之端形於此也公曰男子十六精通女子十四而化是則可以生民矣而禮男必三十而有室女必二十而有夫也豈不晚哉孔子曰夫禮言其極不是過也男子二十而冠有為人父之端女子十五許嫁有適人之道於此而往則自婚矣群生閉藏乎陰而為化育之始故聖人因時以合耦男子窮天數也霜降而婦功成嫁娵者行焉冰泮而農桑起婚禮而殺於此男子者任天道而長萬物者也知可為知不可為知可言知不可言知可行知不可行者也是故審其倫而明其別謂之知所以效匹夫之聽也女子者順男子之教而長其理者也是故無專制之義而有三從之道幼從父兄既嫁從夫死從子言無再醮之端教令不出于閨門事在供酒食而已無閫外之非義也不越境而奔喪事無擅為行無獨成參知而後動可驗而後言晝不遊庭夜行以火所以效匹婦之德也孔子遂言曰女有五不取逆家子者亂家子者世有刑人子者有惡疾子者喪父長子者婦有七出三不去七出者不順父母出者無子者淫僻者嫉妬者惡疾者多口舌者竊盜者三不去者謂有所取無所歸一也與共更三年之喪二也先貧賤後富貴者三也凡此聖人所以順男女之際重婚姻之始也孔子曰禮之所以象五行也其義四時也故喪禮有舉焉有恩有義有節有權其恩厚者其服重故為父母斬衰三年以恩制者也門內之治恩掩義門外之治義掩恩資於事父以事君而敬同貴貴尊尊義之大者也故為君亦服衰三年以義制者也三日而浴三月而沐期而練毀不滅性不以死傷生喪不過三年苴衰不補墳不修除服之日鼓素琴示民有終也凡此以節制者也資於事父以事母而愛同天無二日國無二君家無二尊以治之也故父在為母齊衰期者見無二尊也百官備百物具不言而事行者扶而起言而後事行者杖而起身自執事行者面垢而已此以權制者也親始死三日不怠三月不懈期悲號三年憂哀之殺也聖人因殺以制節也
