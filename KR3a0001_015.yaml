body:
  text: 六本第十五孔子曰行己有六本焉然後為君子也立身有義矣而孝為本喪紀有禮矣而哀為本戰陳有列矣而勇為本治政有理矣而農為本居國有道矣而嗣為本生財有時矣而力為本置本不固無務農桑親戚不悅無務外交事不終始無務多業記聞而言無務多説比近不安無務求遠是故反本修迹君子之道也孔子曰藥酒苦於口而利於病忠言逆於耳而利於行湯武以諤諤而昌桀紂以唯唯而亡君無爭臣父無爭子兄無爭弟士無爭友無其過者未之有也故曰君失之臣得之父失之子得之兄失之弟得之己失之友得之是以國無危亡之兆家無悖亂之惡父子兄弟無失而交友無絶也孔子見齊景公公悅焉請置稟丘之邑以為養孔子辭而不受入謂弟子曰吾聞君子當功以受賞今吾言於齊君君未之有行而賜吾邑其不知丘亦甚矣於是遂行孔子在齊舍於外館景公造焉賓主之辭既接而左右白曰周使適至言先王廟災景公復問災何王之廟也孔子曰此必釐王之廟也公曰何以知之孔子曰詩云皇皇上天其命不忒天之以善必報其德禍亦如之夫釐王變文武之制而作玄黃華麗之飾宮室崇峻輿馬奢侈而弗可振也故天殃所宜加其廟焉以是占之為然公曰天何不殃其身而加罰其廟也孔子曰蓋以文武故也若殃其身則文武之嗣無乃殄乎故當殃其廟以彰其過俄頃左右報曰所災者釐王廟也景公驚起再拜曰善哉聖人之智過人遠矣子夏三年之喪畢見於孔子子曰與之琴使之絃侃侃而樂作而曰先王制禮不敢不及也子曰君子也閔子三年之喪畢見於孔子子曰與之琴使之絃切切而悲作而曰先王制禮弗敢過也子曰君子也子貢曰閔子哀未盡夫子曰君子也子夏哀已盡又曰君子也二者殊情而俱曰君子賜也惑敢問之孔子曰閔子哀未忘能斷之以禮子夏哀已盡能引之及禮雖均之君子不亦可乎孔子曰無體之禮敬也無服之喪哀也無聲之樂歡也不言而信不動而威不施而仁志也夫鐘之音怒而擊之則武憂而擊之則悲其志變者聲亦隨之故至誠感之通於金石而況人乎孔子見羅雀者所得皆黃口小雀夫子問之曰大雀獨不得何也羅者對曰大雀善驚而難得黃口貪食而易得黃口從大雀者則不得大雀從黃口者亦不得孔子顧謂弟子曰善驚以遠害利食而忘患自其心矣而獨以所從為禍福故君子慎其所從以長者之慮則有全身之階隨小者之戇而有危亡之敗也孔子讀易至於損益喟然而歎子夏避席問曰夫子何歎焉孔子曰夫自損者必有益之自益者必有決之吾是以歎也子夏曰然則學者不可以益乎子曰非道益之謂也道彌益而身彌損夫學者損其自多以虛受人故能成其滿博也天道成而必變凡持滿而能久者未嘗有也故曰自賢者天下之善言不得聞於耳矣昔堯治天下之位猶允恭以持之克讓以接下是以千歲而益盛迄今而逾彰夏桀昆吾自滿而無極亢意而不節斬刈黎民如草芥焉天下討之如誅匹夫是以千載而惡著迄今而不滅滿也如在輿遇三人則下之遇二人則式之調其盈虛不令自滿所以能久也子夏曰商請志之而終身奉行焉子路問於孔子曰請釋古之道而行由之意可乎子曰不可昔東夷之子慕諸夏之禮有女而寡為內私壻終身不嫁嫁則不嫁矣亦非貞節之義也蒼梧嬈娶妻而美讓與其兄讓則讓矣然非禮之讓也不慎其初而悔其後何嗟及矣今汝欲舍古之道行子之意庸知子意不以是為非以非為是乎後雖欲悔難哉曾子耘瓜誤斬其根曾晳怒建大杖以擊其背曾子仆地而不知人久之有頃乃蘇欣然而起進於曾晳曰嚮也參得罪於大人大人用力教參得無疾乎退而就房援琴而歌欲令曾晳而聞之知其體康也孔子聞之而怒告門弟子曰參來勿內也曾參自以為無罪使人請於孔子子曰汝不聞乎昔瞽瞍有子曰舜舜之事瞽瞍欲使之未嘗不在於側索而殺之未嘗可得小捶則待過大杖則逃走故瞽瞍不犯不父之罪而舜不失蒸蒸之孝今參事父委身以待暴怒殪而不避既身死而陷父於不義其不孝孰大焉汝非天子之民也殺天子之民其罪奚若曾參聞之曰參罪大矣遂造孔子而謝過荊公子行年十五而攝荊相事孔子聞之使人往觀其為政焉使者反曰視其朝清淨而少事其堂上有五老焉其廊下有二十壯士焉孔子曰合兩二十五之智以治天下其固免矣況荊乎子夏問於孔子曰顏回之為人也奚若子曰回之信賢於丘也曰子貢之為人也奚若子曰賜之敏賢於丘也曰子路之為人也奚若子曰由之勇賢於丘也曰子張之為人也奚若子曰師之莊賢於丘也子夏避席而問曰然則四子者何為事先生子曰居吾語汝夫回能信而不能反賜能敏而不能詘由能勇而不能怯師能莊而不能同兼四子者之有以易吾弗與也此其所以事吾而弗二也孔子遊於泰山見榮聲期行乎郕之野鹿裘帶索鼓琴而歌孔子問曰先生所以為樂者何也期對曰吾樂甚多而至者三天生萬物唯人為貴吾既得為人矣是一樂也男女之別男尊女卑故人以男為貴吾既得為男矣是二樂也人生有不見日月不免襁褓者吾既以行年九十五矣是三樂也夫貧者士之常也死者人之終也處常得終當何憂哉孔子曰善哉能自寬者也孔子曰回有君子之道四焉強於行義弱於受諫怵於待祿慎於治身史鰌有君子之道三焉不仕而敬上不祀而敬鬼直己而曲於人曾子侍曰參昔者常聞夫子三言而未之能行也夫子見人之一善而忘其百非是夫子之易事也見人之有善若己有之是夫子之不爭也聞善必躬行之然後導之是夫子之能勞也學夫子之三言而未能行以自知終不及二子者也孔子曰吾死之後則商也日益賜也日損曾子曰何謂也子曰商也好與賢己者處賜也好説不若己者不知其子視其父不知其人視其友不知其君視其所使不知其地視其草木故曰與善人居如入芝蘭之室久而不聞其香即與之化矣與不善人居如入鮑魚之肆久而不聞其臭亦與之化矣丹之所藏者赤漆之所藏者黑是以君子必慎其所與處者焉曾子從孔子于齊齊景公以下卿之禮聘曾子曾子固辭將行晏子送之曰吾聞之君子遺人以財不若善言今夫蘭本三年湛之以鹿醢既成噉之則易之匹馬非蘭之本性也所以湛者美矣願子詳其所湛者夫君子居必擇處遊必擇方仕必擇君擇君所以求仕擇方所以修道遷風移俗嗜欲移性可不慎乎孔子聞之曰晏子之言君子哉依賢者固不困依富者固不窮馬蚿斬足而復行何也以其輔之者衆孔子曰以富貴而下人何人不以富貴而愛人何人不親發言不逆可謂知言矣言而衆響之可謂知時矣是故以富而能富人者欲貧不可得也以貴而能貴人者欲賤不可得也以達而能達人者欲窮不可得也孔子曰中人之情也有餘則侈不足則儉無禁則淫無度則逸從欲則敗是故鞭撲之子不從父之教刑戮之民不從君之令此言疾之難忍急之難行也故君子不急斷不急制使飲食有量衣食有節宮室有度畜積有數車器有限所以防亂之原也夫度量不可不明是中人所由之令孔子曰巧而好度必攻勇而好問必勝智而好謀必成以愚者反之是以非其人告之弗聽非其地樹之弗生得其人如聚砂而雨之非其人如會聾而鼓之夫處重擅寵專事妬賢愚者之情也位高則危任重則崩可立而待孔子曰舟非水不行水入舟則沒君非民不治民犯上則傾是故君子不可不嚴也小人不可不整一也齊高庭問於孔子曰庭不曠山不直地衣穰而提贄精氣以問事君子之道願夫子告之孔子曰貞以幹之敬以輔之施仁無倦見君子則舉之見小人則退之去汝惡心而忠與之效其行修其禮千里之外親如兄弟行不效禮不修則對門不汝通矣夫終日言不遺己之憂終日行不遺己之患唯智者能之故自修者必恐懼以除患恭儉以避難者也終身為善一言則敗之可不慎乎
