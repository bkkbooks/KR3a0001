body:
  text: 禮運第三十二孔子為魯司寇與於蠟既賓事畢乃出遊於觀之上喟然而歎言偃侍曰夫子何歎也孔子曰昔大道之行也與三代之英吾未之逮而有記焉大道之行也天下為公選賢與能講信修睦故人不獨親其親不獨子其子老有所終壯有所用幼有所長矜寡孤疾皆有所養貨惡其棄於地也不必藏於己力惡其不出於身也不必為人是以姦謀閉而弗興盜竊亂賊不作故外戶而不閉謂之大同今大道既隱天下為家各親其親各子其子貨則為己力則為人大人世及以為常城郭溝池以為固禹湯文武成王周公由此而選未有不謹於禮者也禮之所興與天地竝如有不由禮而在位者則以為殃言偃復問曰如此乎禮之急也孔子曰夫禮先王所以承天之道以治人之情列其鬼神達於喪祭鄉射冠婚朝聘故聖人以禮示之則天下國家可得以禮正矣言偃曰今之在位莫知由禮何也孔子曰嗚呼哀哉我觀周道幽厲傷也吾捨魯何適夫魯之郊及禘皆非禮也周公其已衰矣杞之郊也禹宋之郊也契是天子之事守也天子杞宋以二王之後周公攝政致太平而與天子同是禮也諸侯祭社稷宗廟上下皆奉其典而祝嘏莫敢易其常法是謂大嘉今使祝嘏辭說徒藏於宗祝巫史非禮也是謂幽國盞斝及尸君非禮也是謂僭君冕辨兵革藏於私家非禮也是謂脅君大夫具官祭器不假聲樂皆具非禮也是謂亂國故仕於公曰臣仕於家曰僕三年之喪與新有婚者朞不使也以衰裳入朝與家僕雜居齊齒非禮也是謂臣與君共國故天子有田以處其子孫諸侯有國以處其子孫大夫有采以處其子孫是謂制度天子適諸侯必舍其宗廟而不以禮籍入是謂天子壞法亂紀諸侯非問疾弔喪而入諸臣之家是謂君臣為謔故夫禮者君之柄所以別嫌明微儐鬼神考制度別仁義立政教安君臣上下也故政不正則君位危君位危則大臣倍小臣竊刑肅而俗敝則法無常法無常則禮無別禮無別則士不事民不歸是謂疵國是故夫政者君之所以藏身也必本之天郊以降命命教於社之謂效地降於祖廟之謂仁義降于山川之謂興作降于五祀之謂制度此聖人所以藏身固也聖人參於天地竝於鬼神以治政也處其所存禮之序也玩其所樂民之治也天生時地生財人其父生而師教之四者君以政用之所以立於無過之地也君者人所明非明人者也人所養非養人者也人所事非事人者也夫君者明人則有過養人則不足事人則失位故百姓則君以自治養君以自安事君以自顯是以禮達而分定人皆愛其死而患其生是故用人之智去其詐用人之勇去其怒用人之仁去其貪故國有患君死社稷謂之義大夫死宗廟謂之變凡聖人能以天下為一家以中國為一人者非意之也必知其情從於其義明於其利達於其患然後能為之何謂人情喜怒哀懼愛惡欲七者弗學而能何謂人義父慈子孝兄良弟悌夫義婦聽長惠幼順君仁臣忠十者謂之人義講信修睦謂之人利爭奪相殺謂之人患聖人之所以治人七情修十義講信修睦尚辭讓去爭奪舍禮何以治之飲食男女人之大欲存焉死亡貧苦人之大惡存焉欲惡者人之大端也人藏其心不可測度也美惡皆在其心不見其色也欲以一窮之舍禮何以哉故人者天地之德陰陽之交鬼神之會五行之秀也故天秉陽垂日星地秉陰載山川播五行於四時和四氣而後月生是以三五而盈三五而缺五行之動共相竭也五行四氣十二月還相為本五聲六律十二管還相為宮五味六和十二食還相為質五色六章十二衣還相為質故人者天地之心而五行之端也食味別聲被色而生者也聖人作則必以天地為本以陰陽為端以四時為柄日星為紀月為量鬼神以為徒五行以為質禮義以為器人情以為田四靈以為畜以天地為本故物可舉以陰陽為端故人情可睹以四時為柄故事可勸以日星為紀故業可別以月為量故功有藝鬼神以為徒故事有守五行以為質故事可復禮義以為器故事行有考人情以為田故人以為奧四靈以為畜故飲食有由何謂四靈麟鳳龜龍謂之四靈故龍以為畜而魚鮪不諗鳳以為畜而鳥不翅麟以為畜而獸不龜以為畜而人情不失先王秉蓍龜列祭祀瘞繒宣祝嘏辭說設制度故國有禮官有御事有職禮有序先王患禮之不達於下也故饗帝於郊所以定天位也祀社於國所以列地利也禘祖廟所以本仁也旅山川所以儐鬼神也祭五祀所以本事也故宗祝在廟三公在朝三老在學王前巫而後史卜筮鼓侑皆在左右王中心無違也以守至正是以禮行於郊而百神受職焉禮行於社而百貨可極焉禮行於祖廟而慈孝服焉禮行於五祀而正法則焉故郊社祖廟山川五祀義之修而禮之藏夫禮必本於太一分而為天地轉而為陰陽變而為四時列而為鬼神其降曰命其官於天也協於分藝其居於人也曰養所以講信修睦而固人之肌膚之會筋骸之束也所以養生送死事鬼神之大端所以達天道順人情之大竇故唯聖人為知禮之不可以已也故破國喪家亡人必先去其禮故禮之於人也猶酒之有糱也君子以厚小人以薄聖王修義之柄禮之序以治人情故人情者聖王之田也修禮以耕之陳義以種之講學以耨之本仁以聚之播樂以安之故禮者義之實也協諸義而協則禮雖先王未之有可以義起焉義者藝之分仁之節也協諸藝講於仁得之者強失之者喪仁者義之本也順之體也得之者尊故治國不以禮猶無耜而耕也為禮而不本於義猶耕而不種也為義而不講於學猶種而不耨也講之以學而不合之以仁猶耨而不穫也合之以仁而不安之以樂猶穫而不食也安之以樂而不達於順猶食而不肥也四體既正膚革充盈人之肥也父子篤兄弟睦夫婦和家之肥也大臣法而小臣廉官職相序君臣相正國之肥也天子以德為車以樂為御諸侯以禮相與大夫以法相序士以信相考百姓以睦相守天下之肥也是謂大順大順者所以養生送死事鬼神之常也故事大積焉而不苑竝行而不謬細行而不失深而通茂而不閒連而不相及動而不相害也此順之至也故明於順然後乃能守危也夫禮之不同也不豐也不殺也所以持情而合危也山者不使居川渚者不使居原用水火金木飲食必時冬合男女春頒爵位必當年德皆所謂順也用民必順故無水旱昆蟲之災民無凶飢妖孽之疾故天不愛其道地不愛其寶人不愛其情是以天降甘露地出醴泉山出器車河出馬圖鳳凰麒麟皆在近郊龜龍在宮沼其餘鳥獸及卵胎皆可俯而窺也則是無故先王能循禮以達義體信以達順此順之實也
