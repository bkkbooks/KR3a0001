body:
  text: 論禮第二十七孔子閒居子張子貢言游侍論及於禮孔子曰居汝三人者吾語汝以禮周流無不遍也子貢越席而對曰敢問如何子曰敬而不中禮謂之野恭而不中禮謂之給勇而不中禮謂之逆子曰給奪慈仁子貢曰敢問何以為中禮者子曰禮乎夫禮所以制中也子貢退言游進曰敢問禮也領惡而全好者與子曰然子貢問何也子曰郊社之禮所以仁鬼神也禘嘗之禮所以仁昭穆也饋奠之禮所以仁死喪也射饗之禮所以仁鄉黨也食饗之禮所以仁賓客也明乎郊社之義禘嘗之禮治國其如指諸掌而已是故以之居家有禮故長幼辯以之閨門有禮故三族和以之朝廷有禮故官爵敘以之田獵有禮故戎事閑以之軍旅有禮故武功成是以宮室得其度鼎俎得其象物得其時樂得其節車得其軾鬼神得其享喪紀得其哀辯說得其黨百官得其體政事得其施加於身而措於前凡眾之動得其宜也言游退子張進曰敢問禮何謂也子曰禮者即事之治也君子有其事必有其治治國而無禮譬猶瞽之無相倀倀乎何所之譬如終夜有求於幽室之中非燭何以見故無禮則手足無所措耳目無所加進退揖讓無所制是以其居處長幼失其別閨門三族失其和朝廷官爵失其序田獵戎事失其策軍旅失其勢宮室失其度鼎俎失其象物失其時樂失其節車失其軾鬼神失其饗喪紀失其哀辯說失其黨百官失其體政事失其施加於身而措於前凡眾之動失其宜如此則無以祖祫四海子曰慎聽之汝三人者吾語汝禮猶有九焉大饗有四焉苟知此矣雖在畎畝之中事之聖人矣兩君相見揖讓而入門入門而懸興揖讓而升堂升堂而樂闋下管象舞夏籥序興陳其薦俎序其禮樂備其百官如此而後君子知仁焉行中規旋中矩鑾和中采齊客出於雍徹以振羽是故君子無物而不在於禮焉入門而金作示情也升歌清廟示德也下管象舞示事也古之君子不必親相與言也以禮樂相示而已夫禮者理也樂者節也無理不動無節不作不能詩於禮謬不能樂於禮素薄於德於禮虛子貢作而問曰然則夔其窮與子曰古之人與上古之人也達於禮而不達於樂謂之素達於樂而不達於禮謂之偏夫夔達於樂而不達於禮是以傳於此名也古之人也凡制度在禮文為在禮行之其在人也三子者既得聞此論於夫子也煥若發矇焉子夏侍坐於孔子曰敢問詩云愷悌君子民之父母何如斯可謂民之父母孔子曰夫民之父母必達於禮樂之源以致五至而行三無以橫於天下四方有敗必先知之此之謂民之父母子夏曰敢問何謂五至孔子曰志之所至詩亦至焉詩之所至禮亦至焉禮之所至樂亦至焉樂之所至哀亦至焉詩禮相成哀樂相生是以正明目而視之不可得而見傾耳而聽之不可得而聞志氣塞于天地行之充于四海此之謂五至矣子夏曰敢問何謂三無孔子曰無聲之樂無體之禮無服之喪此之謂三無子夏曰敢問三無何詩近之孔子曰夙夜基命宥密無聲之樂也威儀逮逮不可選也無體之禮也凡民有喪扶伏救之無服之喪也子夏曰言則美矣大矣言盡於此而已乎孔子曰何謂其然吾語汝其義猶有五起焉子夏曰何如孔子曰無聲之樂氣至不違無體之禮威儀遲遲無服之喪內恕孔哀無聲之樂所願必從無體之禮上下和同無服之喪施及萬邦既然而又奉之以三無私而勞天下此之謂五起子夏曰何謂三無私孔子曰天無私覆地無私載日月無私照其在詩曰帝命不違至于湯齊湯降不遲聖敬日躋昭假遲遲上帝是祗帝命式于九圍是湯之德也子夏蹶然而起負墻而立曰弟子敢不志之
