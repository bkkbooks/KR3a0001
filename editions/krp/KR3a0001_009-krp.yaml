body:
  text: 右件夫子七十二人弟子皆升堂入室者本姓解第三十九孔子之先宋之後也微子啓帝乙之元子紂之庶兄以圻内諸侯入爲王卿士微國名子爵初武王尅殷封紂之子武庚於朝歌使奉湯祀武王崩而與管蔡霍三叔作難周公相成王東征之二年罪人斯得乃命微子於殷後作微子之命由之與國于宋徙殷之子孫唯微子先徃仕周故封之賢其弟曰仲思名衍或名泄嗣微之後故號微仲生宋公稽胄子雖遷爵易位而班級不及其故者得以故官爲稱故二微雖爲宋公而猶以微之號自終至于稽乃稱公焉宋公生丁公申申公生緡公共及襄公熙熙生弗父何及厲公方祀方祀以下世爲宋卿弗父何生宋父周周生世子勝勝生正考甫考甫生孔父嘉五世親盡别爲公族故後以孔爲氏焉一曰孔父者生時所賜號也是以子孫遂以氏族孔父生子木金父金父生睪夷睪夷生防叔避華氏之禍而奔魯方叔生伯夏伯夏生叔梁紇曰雖有九女是無子其妾生孟皮孟皮一字伯尼有足病於是乃求㛰於顔氏顔氏有三女其小曰徵在顔父問三女曰陬大夫雖父祖爲士然其先聖王之裔今其人身長十尺武力絶倫吾甚貪之雖年長性嚴不足爲疑三子孰能爲之妻二女莫對徵在進曰從父所制將何問焉父曰即爾能矣遂以妻之徵在旣徃廟見以夫之年大懼不時有勇而私禱尼丘之山以祈焉生孔子故名丘字仲尼孔子三嵗而叔梁紇卒葬於防至十九娶于宋之并官氏一歳而生伯魚魚之生也魯昭公以鯉魚賜孔子榮君之貺故因以名曰鯉而字伯魚魚年五十先孔子卒齊太史子與適魯見孔子孔子與之言道子與悦曰吾鄙人也聞子之名不覩子之形久矣而求知之寶貴也乃今而後知㤗山之爲高淵海之爲大惜乎夫子之不逢明王道德不加于民而將垂寶以貽後世遂退而謂南宫敬叔曰今孔子先聖之嗣自弗父何以來世有德讓天所祚也成湯以武德王天下其配在文殷宗以下未始有也孔子生於衰周先王典籍錯亂無紀而乃論百家之遺記考正其義祖述堯舜憲章文武刪詩述書定禮理樂制作春秋讃明易道垂訓後嗣以爲法式其文德著矣然凡所教誨束脩已上三千餘人或者天將欲與素王之乎夫何其盛也敬叔曰殆如吾子之言夫物莫能兩大吾聞聖人之後而非繼世之綂其必有興者焉今夫子之道至矣乃將施之無窮雖欲辭天之祚故未得耳子貢聞之以二子之言告孔子子曰豈若是哉亂而治之滯而起之自吾志天何與焉終記解第四十孔子蚤晨作起作負手曵杖逍遥於門而歌曰㤗山其頽乎梁木其壞乎爲梁者梁木木主喆人其萎乎頓萎旣歌而入當戸而坐子貢聞之曰㤗山其頽則吾將安仰梁木其壞吾將安杖喆人其萎吾將安放放去聲放法夫子殆將病也遂趨而入夫子歎而言曰賜汝來何遲予疇昔夢坐奠於兩楹之間猶近疇昔而具奠於殯處故自知死也昨夜兩楹之間殷人所殯處夏后氏殯於東階之上則猶在阼殷人殯於兩楹之間即與賔主夾之殯於西階之上則猶賓之而丘也即殷人夫明王不興則天下其孰能宗余臨終其有命傷道之不行也言天下無明主莫能宗巳道余逮將死遂寢病七日而終時年七十二矣哀公誄曰昊天不弔不慗遺一老願且一老弔善也慗慗魚僅切孔子也俾屏余一人以在位焭焭余在疚病疚於乎哀哉尼父無自律稱律法言無父丈夫之顯爲法以自子貢曰公其不没於魯乎夫子有言曰禮失則昬名失則愆失志爲昬失所爲愆生不能用死而誄之非禮也稱一人非名之稱也一人天子君兩失之矣旣卒門人所以服夫子者子貢曰昔夫子之䘮顔囘也若䘮其子而無服䘮子路亦然今請䘮夫子如䘮父而無服於是弟子皆弔服而加麻出有所之則由絰子夏曰入宜絰可居出則不絰子游曰吾聞諸夫子䘮朋友居則絰出則否䘮所尊雖絰而出可也孔子之䘮公西掌殯葬焉唅以踈米三貝禮記曰踈粳米絰徒結反稻曰嘉䟽襲衣十有一稱加朝服一冠章甫之冠珮象環徑五寸而綨組綬組綬所綨雜色箕反組則古反以繫象環綨巨桐棺四寸柏棺五寸飾廟置翣設披周也設崇殷也綢練設旐夏也以旌之杜於葬乘車所建也踈練廣充披樞行夾引棺者崇崇牙旌旗飾綢練色甲反綢直留反長尋曰旐也翣兼用三王禮所以尊師且備古也葬於魯城北泗水上藏入地不及泉而封爲偃斧之形髙四尺樹松柏爲志焉弟子皆家于墓行心喪之禮旣葬有自燕來觀者舍於子夏氏子貢謂之曰吾亦人之葬聖人非聖人之葬人子奚觀焉昔夫子言曰見吾封若夏屋者殿形中髙夏屋今之下也而四方見若斧矣從若斧者也又易為功上難登狹馬􅺹封之謂也力葉反又作鬛俗間之名􅺹今徒一日三斬板而以封謂斬其縮縮斬上傍殺蓋板蓋廣二尺長六尺斬板尺也髙四尚行夫子之志而巳庻尚何觀乎哉二三子三年喪畢或留或去惟子貢廬於墓六年自後群弟子及魯人處於墓如家者百有餘家因名其居曰孔里焉正論解第四十一孔子在齊齊侯出田獵田招虞人以旌不進澤之官也虞人掌山公使執之對曰昔先君之田也旌以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍之孔子聞之曰善哉守道不如守官召便徃守官非守召道爲恭敬之道見君也不徃君子韙之是韙齊國師伐魯齊卿國師季康子使冉求率左師禦之樊遲爲右非不能也不信子德不素言季孫所信也著爲民請三刻而踰之刻而踰蒲也與衆要信三如之衆從之師入齊軍齊軍遁逃遁冉有用戈故能入焉孔子聞之曰義也敵合於義在軍能却旣戰季孫謂冉有曰子之於戰學之乎性達之乎對曰學之季孫曰從事孔子惡乎學冉有曰即學之孔子也夫孔子者大聖無不該包該文武並用兼通求也適聞其戰法猶未之詳也季孫悦樊遲以告孔子孔子曰季孫於是乎可謂悦人之有能矣南容説仲孫何忌旣除喪子之䘮除父禧而昭公在外孫所逐時爲季未之命也爲卿大夫未命二人定公即位乃命之辭曰先臣有遺命焉知禮及其僖子病不子使事孔子將死而屬其二曰夫禮人之幹也非禮則無以立囑家老使命二臣必事孔子而學禮以定其位公許之二子學於孔子孔子曰能補過者君子也詩云君子是則是傚孟僖子可則傚矣懲已所病以誨其嗣大雅所謂詒厥孫謀以燕翼子是類也夫遺詒子孫加謀學安敬之道也也燕安也翼敬也言遺其衞孫文子得罪於獻公居戚父得罪以戚文子衞卿林也叛公卒未葬文子擊鐘焉延陵季子子札呉公適晉過戚聞之曰異哉夫子之在此猶燕子巢于幕也言至危也燕巢于幕懼猶未也又何樂焉君又在殯可乎文子於是終身不聽琴瑟孔子聞之曰季子能以義正人文子能克巳服義可謂善改矣孔子覽晉志史記晉之晉趙穿殺靈公從弟也穿趙盾趙盾亡未及山而還之境山晉史書趙盾弑君盾曰不然史曰子爲正卿亡不出境返不討賊非子而誰盾曰嗚呼我之懷矣自詒伊戚其我之謂乎孔子嘆曰董狐古之良史也書法不隱趙宣子古之良大夫也爲法受惡惜也越境乃免於譏而受弑君之惜盾不越境以免也責鄭伐陳入之使子産獻捷于晉晉人問陳之罪焉子産對曰陳亡周之大徳元女大武王以而封諸陳姬以配胡公介恃楚衆大介馮陵弊邑是以有徃年之告陳所侵告晉爲未獲命陳之成命未得晉平則又有東門之役至其東門也與楚共伐陳當陳隧者井陻木刋塞刋斫也勝陳人陻弊邑大懼天誘其衷進誘善大執陳者也衷善也天導其啓弊邑心知其罪校首於我用敢獻功晉人曰何故侵小對曰先王之命惟罪所在各致其辟誅辟且昔天子一圻列國一同方百里曰同也地方千里曰圻自是以衰周之制也十里子男五十里周之制也而説大國方百里從是以爲差伯方七七百里失之矣學者以周大國方今大國多數圻矣若無侵小何以至焉晉人曰其辭順孔子聞之謂子貢曰志有之書也志古之言以足志足成言以志其文以足言足成其言加以文章以不言誰知其志言之無文行之不逺雖行而不逺也有言而無文章晉爲鄭伯入陳非文辭不爲功小子愼哉楚靈王汰侈奢侈驕汰右尹子革侍坐名子革右尹官舟煞左史倚相趨而過王曰是良史也子善視之是能讀三墳五典八索九丘皇之書三墳三索法丘丘團聚也五典五帝之典八索對曰夫良史者記君之過揚君之善而此子以潤辭爲官不可爲良史曰臣又乃嘗聞焉昔周穆王欲肆其心極肆將過行天下使皆有車轍並馬迹焉祭公謀父作祈昭名猶齊景公作君臣謀父周卿士祈昭詩是也昭宜為招耳補作招相説之樂葢曰徴招角招以止王心心之止王逰逸王是以獲殆於文宫臣聞其詩焉而弗知若問逺焉其焉能知王曰子能乎對曰能其詩曰祈昭之愔愔乎式昭徳音愔愔祈昭足以昭其徳音者也言祈昭樂之安和其法思我王度式如玉式如金詩云追琢其章金玉其相思王之法度如金玉純美刑民之力而無有醉飽之心之不勝不節無有醉長而字刑傷民力用無厭足飽之心言靈王揖而入饋不食寢不寐數日則固不能勝其情以及於難孔子讀其志曰古者有志克己復禮爲仁勝巳私情克勝言能則爲仁也復之於禮信善哉楚靈王若能如是豈期辱於乾谿谿國人潰畔遂死焉靈王起章華之臺於乾子革之非左史所以風也稱詩以諫順哉叔孫穆子避難奔齊如淫亂故避之而出穆子叔孫豹其兄僑齊奔宿於庚宗之邑庚宗寡婦通焉而生牛牛名穆子返魯以牛爲内豎外之命豎通内相家遂長相家命為牛䜛叔孫二人殺之叔孫有病牛不通其饋不食而死牛遂輔叔孫庻子昭而立之孫婼子叔昭子旣立朝其家衆曰豎牛禍叔孫氏使亂大從順從殺適立庶又披其邑以求舍罪十邑以行賂也牛取叔氏鄙三罪莫大焉必速殺之遂殺豎牛孔子曰叔孫昭子之不勞立巳爲功勞力也不以不可能也周任有言曰古之周任人賢爲政者不賞私勞不罰私怨詩云有覺徳行四國順之直覺昭子有焉晉邢侯與雍子爭田叔魚攝理弟理獄官叔魚叔向名之罪在雍子雍子納其女於叔魚叔魚弊獄邢侯歸邢侯弊斷㫁罪邢侯怒殺叔魚與雍子於朝韓宣子問罪於叔向卿韓起也宣子晉正叔向曰三姦同坐施生戮死可也猶行行生者施宜爲與與也之罪雍子自知其罪而賂以置直鮒也鬻獄邢侯專殺其罪一也已惡而掠美爲昏即以賂求善爲惡也掠美善昏亂也巳惡貪以敗官爲黙冐苟黙猶畏罪貪不殺人不忌爲賊憚忌夏書曰昏黙賊殺者宜皆殺者也夏書夏家之書三咎陶之刑也請從之乃施邢侯而尸雍子叔魚於市孔子曰叔向古之遺直也治國制刑不隱於親三數叔魚之罪不爲末薄末或曰義作咸也或左傳可謂直矣平丘之㑹數其賄也以寛衞國晉不爲暴人患之賂叔向叔向使與叔魚客末追諸侯㑹于平丘晉人淫蒭蕘者於衞衞之而禁歸魯季孫稱其詐也以寛魯國晉不爲虐貴禮不肯歸叔向言叔魚能歸之叔魯季孫見執諮於晉晉人歸之季孫孫懼乃歸之魚説季孫季邢侯之獄言其貪也以正刑書晉不爲頗偏頗三言而除三惡加三利衞暴三惡加三利也虐魯殺三罪去殺親益榮由義也夫鄭有鄉校學校鄉之鄉校之士非論執政鬷明欲毁鄉校然明鬷明子産曰何以毁爲也夫人朝夕退而遊焉以議執政之善否其所善者吾則行之其所否者吾則改之若之何其毁也我聞忠言以損怨不聞立威以防怨防怨猶防水也大决所犯傷人必多吾弗克救也不如小决使導之不如吾所聞而藥之療也藥治孔子聞是言也曰吾以是觀之人謂子産不仁吾不信也晉平公㑹諸侯于平丘齊侯及盟鄭子産爭貢賦之所承輕重也所承之曰昔日天子班貢輕重以列尊卑貢周之制也卑而貢重者甸服外諸侯異故貢重也甸服王圻之内與圻鄭伯男南也而使從公侯之貢多有作此南連言之猶言南左輔作男古字作南亦也公侯懼弗給也敢以爲請自日中爭之以至于昬晉人許之孔子曰子産於是行也是以爲國基也詩云樂只君子邦家之基也本子産君子之於樂者則人樂藝也能爲國之本且曰合諸侯而藝貢事禮也獻之事也藝分别貢鄭子産有疾謂子太叔曰我死子必爲政唯有徳者能以寛服民其次莫如猛夫火烈民望而畏之故鮮死焉水濡弱民狎而翫之翫習狎易則多死焉故寛難子産卒子太叔爲政不忍猛而寛鄭國多掠盗掠抄太叔悔之曰吾早從夫子必不及此孔子聞之曰善哉政寛則民慢慢則糺於猛攝也糺猶猛則民殘民殘猛政民殘則施之以寛寛以濟猛猛以濟寛寛猛相濟政是以和詩曰民亦勞止汔可小康可小變故以安也汔危也勞民人病汔惠此中國以綏四方施之以寛母縱詭隨隨人詭人惡者也遺人小以謹無良懲之也謹以小式遏㓂虐慘不畏明也曾不畏天之明道者言威也慘曾也當用遏止為冦虐之人糺之以猛也柔逺能邇能安近言能者以定我王安王以定也位平之以和也又曰不競不絿不剛不柔絿中和不競不布政優優百禄是遒遒聚優優和和之至也子産之卒也孔子聞之出涕曰古之遺愛孔子適齊過㤗山之側有婦人哭於野者而哀夫子式而聽之曰此哀一似重有憂者使子貢徃問之而曰昔舅死於虎吾夫又死焉今吾子又死焉子貢曰何不去乎婦人曰無苛政子貢以告孔子子曰小子識之苛政猛於暴虎晉魏獻子爲政魏舒獻子分祁氏及羊舌氏之田荀櫟㓕氏故獻子分其田晉大夫祁氏羊舌以賞諸大夫及其子成皆以賢舉也又將賈辛曰今汝有力於王室吾是以舉汝賈辛帥師救周周有子朝之亂行乎敬之哉毋墮乃力孔子聞之曰魏子之舉也近不失親而舉也子可舉逺不失舉逺故不以舉不可謂美矣又聞其命賈辛以爲忠詩云永言配命自求多福忠也我長配天命而言我文王之詩福人多福忠也行庶國亦當求多魏子之舉也義其命也忠其長有後於晉國乎趙簡子賦晉國一鼓鐘四謂之石石四謂三十斤謂之鐘鐘鼔之以鑄刑鼎著范宣子所爲刑書晉卿范范宣子書著鼎也自銘其刑孔子曰晉其亡乎失其度矣夫晉國將守唐叔之所受法度弟始封於晉唐叔成王母也者以經緯其民者也以成文也經緯猶織卿大夫以序守之序也序次民是以能遵其道而守其業貴賤不愆所謂度也文公是以作執秩之官爲被廬之法執秩之官以為晉國法也晉文公旣霸彊于時蓋作以爲盟主今棄此度也而爲刑鼎銘在鼎矣何以尊貴書不復戴奉上也民將棄神而徴於何業之守也上無所守也民不奉上則貴賤無序何以爲國且夫宣子之刑夷之蒐也晉國亂制變易軍師夷蒐之時殺故曰亂制也陽唐父為賈季所若之何其爲法乎楚昭王有疾卜曰河神爲祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望望祀天子故曰祭不越望也天地諸侯祀境内江漢沮漳楚之望也水四也名禍福之至不是過乎不榖雖不德河非所獲罪也遂不祭孔子曰楚昭王知大道矣不越祀也求之於巳其不失國也冝哉㓕昭王出楚為呉所國者也奔巳復夏書曰維彼陶唐率彼天常堯率陶唐天之常道猶循天堂在此兾方為兾中國今失厥道亂其紀綱乃㓕而亡夏桀謂變又曰允出兹在兹由巳率常可矣在此以能循常道可也言善惡各有類信出此則衞孔文子使太叔疾出其妻而以其女妻之岀文子使疾出其妻而已妻之初疾娶於宋子朝其婦孽子朝疾誘其初妻之娣爲之立宫與文子女如二妻之禮文子怒將攻之孔子舍璩伯玉之家文子就而訪焉孔子曰簠簋之事則嘗聞學之矣兵甲之事未之聞也退而命駕而行曰鳥則擇木木豈能擇鳥乎文子遽自止之曰圉也豈敢度其私哉謀度亦訪衞國之難也將止㑹季康子問冉求之戰冉求旣對之又曰夫子播之百姓質諸鬼神而無憾也恨用之則有名康子言於哀公以幣迎孔子曰人之於冉求信之矣將大用之齊陳恒弑其簡公孔子聞之三日沐浴而適朝告於哀公曰陳恒弑其君請伐之公弗許三請公曰魯爲齊弱久矣子之伐也將若之何對曰陳恒弑其君民之不與者半以魯之衆加齊之半可克也公曰子告季氏孔子辭季氏不告退而告人曰以吾從大夫之後吾不敢不告也子張問曰書云髙宗三年不言言乃雍有諸雍和有諸問有之也雍歡聲貌尚書云言乃孔子曰胡為其不然也古者天子崩則世子委政於冡宰三年成湯旣没太甲聽於伊尹湯孫太甲武王旣喪成王聽於周公其義一也衞孫桓子侵齊遇敗焉齊與齊師遇為齊桓子孫良夫也侵也所敗齊人乗之執新築大夫仲叔于奚以其衆救桓子桓子乃免衞人以邑賞仲叔于奚于奚辭請曲懸之樂闕一向也故謂諸侯軒懸軒懸之樂之曲懸繁纓以朝衘以黄金為飾也馬纓當膺以索群許之書在三官服司空書勲也司徒書名司馬書子路仕衞見其故以訪孔子孔子曰惜也不如多與之邑惟器與名不可以假人名尊卑以名器禮樂以器君之所司主司名以出信信以守器器以藏禮禮故曰器以藏禮有器然後得行其禮以行義義以生利利以平民政之大節也若以假人與人政也政亡則國家從之不可止也公父文伯之母敬姜也文伯母紡績不解文伯諫焉其母曰古者王后親織玄紞紞丅敢反紞冠垂者公侯之夫人加之紘綖紘綖冠之上覆也纓屈而上者謂之令戰余旃二反紘爲萌反綖卿之内子爲大帶為内子卿之妻命婦成祭服爲命婦大夫之妻列士之妻加之以朝服自庶士已下各衣其夫社而賦事烝而獻功各祭祭而獻其功也男女春秋而勤歳事男女紡績愆則有辟辟法也績功也聖王之制也今我寡也爾又在位朝夕恪勤猶恐忘先人之業況有怠墮其何以避辟孔子聞之曰弟子志之季氏之婦可謂不過矣樊遲問於孔子曰鮑牽事齊君執政不撓可謂忠矣告匡武子武子召慶剋而讓之齊慶尅通於夫人鮑牽知之以於諸侯髙鮑去守還將及至閉門而牵客慶剋告夫人夫人怒閔子子因需公以㑹納君遂刖鮑牽之足夫人訴之曰髙鮑將不而君刖之其爲至闇乎孔子曰古之士者國有道則盡忠以輔之國無道則退身以避之今鮑疾子食於淫亂之朝不量主之明暗以受大刖是智之不如葵葵猶能衞其足轉故曰衞其葵傾葉隨日也足季康子欲以一井田出法賦焉使訪孔子子曰丘弗識也冉有三發卒曰子爲國老待子而行若之何子之不言孔子不對而私於冉有曰求汝來汝弗聞乎先王制土藉田以力以治公田也田有税收藉力而底其逺近平底十一而中平其逺近俱賦里以入而量其無有里有里廛多少之入也税度其有無為任力以夫而議其老㓜作力長㓜或重或輕度之事丅夫任其於是鰥寡孤疾老者軍旅之出則徵之無則已寡孤疾或有所共於軍旅之役則鰥則止也無軍事其嵗收田一井出獲禾秉缶米芻藁不是過固稜穗連藁芻不可分故曰歩其嵗軍旅之嵗一把曰秉四秉曰康也缶十六斗先王以爲之足君子之行必度於禮施取其厚爲德也施以厚事舉其中爲節事以中歛從其薄若是其巳丘亦足矣六井丘十不度於禮而貪冐無厭則雖賦田將有不足且子孫若以行之而取法則有周公之典在若欲犯法則苟行之又何訪焉子游問於孔子曰夫子之極言子産之惠也可得聞乎孔子曰惠在愛民而已矣子游曰愛民謂之德教何翅施惠哉孔子曰夫子産者猶衆人之母也能食之弗能教也子游曰其事可言乎孔子曰子産以所乘之輿濟冬涉者是愛無教也哀公問於孔子曰二三大夫皆勸寡人使隆敬於髙年何也孔子對曰君之及此言將天下實頼之豈唯魯哉公曰何也其義可得聞乎孔子曰昔者有虞氏貴徳而尚齒夏后氏貴爵而尚齒殷人貴富而尚齒禄之家富貴世周人貴親而尚齒虞夏殷周天下之盛王也未有遺年者焉年者貴於天下久矣次于事親是故朝廷同爵而尚齒七十杖於朝君問則席之設席而問焉君欲問之則爲八十則不仕朝君問則就之而悌達乎朝廷矣其行也肩而不並者並肩也不敢與長不錯則隨鴈錯兄黨雁行也行父黨隨行斑白者不以其任於道路負任代之也也少者而悌達乎道路矣居鄉以齒而老窮不匱强不犯弱衆不暴寡而悌達乎州巷矣古之道五十不爲甸役爲力役之事五十始老不之徒也不為田獵頒禽隆之長者而悌達乎蒐狩矣軍旅什伍同爵則尚齒而悌達乎軍旅矣夫聖王之教孝悌發諸朝廷行於道路至於州巷放於蒐狩循於軍旅則衆感以義死之而弗敢犯公曰善哉寡人雖聞之弗能成哀公問之於孔子曰寡人聞東益不祥益東宅之信有之乎孔子曰不祥有五而東益不與焉夫損人自益身之不祥棄老而取㓜家之不祥擇賢而任不肖國之不祥老者不教㓜者不學俗之不祥聖人伏匿愚者擅權天下不祥不祥有五東益不與焉孔子適季孫季孫之宰謁曰君使求假於田特與之乎季孫未言孔子曰吾聞之君取於臣謂之取與於臣謂之賜臣取於君謂之假與於君謂之獻季孫色然悟曰吾誠未達此義遂命其宰曰自今巳徃君有取之一切不得復言假也孔子家語卷第九終
