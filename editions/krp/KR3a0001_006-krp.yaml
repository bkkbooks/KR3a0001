body:
  text: 家孔子家語卷六五帝第二十四季康子問於孔子曰舊聞五帝之名而不知其實請問何謂五帝孔子曰昔丘也聞諸老耼曰天有五行木火金水土分時化育以成萬物七十二日也化生長育一嵗一嵗三百六十日五行各主莫敢不成之功萬物其神謂之五帝佐生物者而䜟五帝五行之神亦爲妖怪妄言緯皆為之名字古之王者易代而改號取法五行五行更王終始相生亦象其義五法以生之行轉相承而諸說乃謂五精之帝行更王終始相生始以木德王天下其次言也更古衡反王音旺下生王者其為帝或無可故其為明王者而死配五行是以太皥配木炎帝配火黄帝配土少皥配金顓頊配水康子曰太皥氏其始之木何如孔子曰五行用事先起於木木東方萬物之初皆出焉是故王者則之而首以木德王天下其次則以所生之行轉相承也屬王天音旺木生火火生土之康子曰吾聞勾芒為木正祝融為火正蓐收為金正玄冥為水正后土為土正此五行之主而不亂稱曰帝者何也孔子曰凡五正者五行之官名五行佐成上帝而稱五帝太皥之屬配焉亦云帝従其號可以同其號天至尊物不之五帝以地有五行而其精神在上故亦亦兼稱上帝上天以其五行佐成天事謂帝之號故王者雖號稱帝而不而不或曰天帝為帝五帝黄帝之屬故亦稱帝稱帝亦從天五去逺矣曰天王者言乃天下之王也而曰天子者而天子與父其尊卑相昔少皥氏之子有四叔曰重曰該曰脩曰熙實能金木及水使重為勾芒該為蓐收脩及熈爲玄㝠顓頊氏之子曰黎爲祝融共工氏之子曰勾龍爲后土此五者各以其所能業爲官職爲職業之事各以一行之官生爲上公死爲貴神别穪五祀不得同帝神故不得稱五祀上公之地而不設者以祭社爲祭地不亦失之逺帝也正史者五正不及五帝五帝不及天以子為母不亦顚倒失尊卑之序也矣且土與火水俱爲五行是地之子也康子曰如此之言帝王改號於五行之德各有所統則其所以相變者皆主何事家而在木以問也尚赤所孔子曰所尚則各從其所王之德次焉德義之著修其母兼其子木次火而木家尚赤者以木夏后氏以金德王色尚黑大事歛用昬時亦黒也大事喪昬戎事乗驪也黒馬牲用玄殷人用水德王色尚白者避土家之尚青水家尚青而尚白大事歛用日中中日也白戎事乘翰色馬翰白牲用白周人以木德王色尚赤大事歛用日出亦赤也日出時戎事乗騵白腹騵馬牲用騂色也騂赤此三代之所以不同康子曰唐虞二帝其所尚者何色孔子曰堯以火德王色尚黄舜以土德王色尚青家土事先起於水色青是以水家避土土家尚宜尚白土者四行之主王於四季五行用白康子曰陶唐有虞夏后殷周獨不配五帝意者德不及上古耶將有限乎孔子曰古之平治水土及播殖百穀者衆矣唯勾龍氏兼食於社配也兼猶而棄為稷神易代奉之無敢益者明不可與等故自太皥以降逮于顓頊其應五行而王數非徒五而配五帝是其德不可以多也執轡第二十五閔子騫為費宰問政於孔子子曰以德以法夫德法者御民之具猶御馬之有衘勒也君者人也吏者轡也刑者䇿也夫人君之政執其轡䇿而已子騫曰敢問古之為政孔子曰古者天子以内史為左右手史内孤卿大夫則䇿命以四方之事書則讀之掌王八柄及叙事之法納以詔王聽治命故王以為左右手費芳未反王制禄則費爲之賞則亦如之以德法為衘勒以百官為轡以刑罰為䇿以萬民為馬故御天下數百年而不失善御馬正衘勒齊轡䇿均馬力和馬心故口無聲而馬應轡䇿不舉而極千里善御民壹其德法正其百官以均齊民力和安民心故令不再而民順従刑不用而天下治是以天地德之有爲德天地以而兆民懷之歸懷夫天地之所德兆民之所懷其政美其民而衆稱之民其稱舉也為衆所今人言五帝三王者其盛無偶威察若存察帝若存其盛以明其故何也其法盛其德厚故思其德必稱其人朝夕祝之升聞於天上帝俱歆用永厥世而豐其年不能御民者棄其德法専用刑辟譬猶御馬棄其衘勒而専用箠䇿其不制也可必矣夫無衘勒而用箠䇿馬必傷車必敗無德法而用刑民必流國必亡治國而無德法則民無脩民無脩則迷惑失道如此上帝必以其為亂天道也苟亂天道則刑罰暴上下相諛諛諂莫知念患俱無道故也今人言惡者必比之於桀紂其故何也其法不聽其德不厚故民惡其殘虐莫不吁嗟朝夕祝之升聞于天上帝不蠲降之以禍罰災害並生用殄厥世故曰德法者御民之本古之御天下者以六官總治焉冢宰之官以成道以成道治官所司徒之官以成德以成徳敎官所宗伯之官以成仁以成仁祀官所司馬之官以成聖征伐所以通天下也治官所以成聖聖通司冦之官以成義官刑成義所以司空之官以成禮禮非事不立也事官所以成禮六官在手以為轡㑹司均仁以為納轡繋軾前納驂馬轡方之治冢宰之副故不在其六轡至當納者司㑹掌邦之六典八法之戒以周知四位故曰御四馬者執六轡御天下者正六官是故善御馬者正身以總轡均馬力齊馬心囘旋曲折唯其所之故可以取長道可赴急疾此聖人所以御天地與人事之法則也天子以内史為左右手以六官為轡已而與三公為執六官均五敎齊五法信之法也仁義禮智故亦唯其所引無不如志以之道則國治治官冢宰以之德則國安之仁則國德敎成以爲貴則國安和禮之用和以之仁則國和以之聖則國平則國平也通治逺近以之禮則國安則國定也事物以禮以之義則國義當罪則國平義平也刑罰此御政之術過失人之情莫不有焉過而改之是爲不過故官屬不理分職不明法政不一百事失紀曰亂亂則飭冢宰攝人也飭謂整地而不殖財物不蕃萬民饑寒敎訓不行風俗淫僻人民流散曰危危則飭司徒父子不親長幼失序君臣上下乖離異志曰不和不和則飭宗伯賢能而失官爵功勞而失賞禄勲司之司馬之職屬士卒疾怨兵弱不用曰不平不平則飭司馬刑罰暴亂姦邪不勝曰不義不義則飭司冦度量不審舉事失理都鄙不脩財物失所曰貧貧則飭司空故御者同是車馬或以取千里或不及數百里其所謂進退緩急異也夫治者同是官法或以致平或以致亂者亦其所以爲進退緩急異也古者天子常以季冬考德正法以觀治亂德盛者治也德薄者亂也故天子考德則天下之治亂可坐廟堂之上而知之夫德盛則法修德不盛則飭法與政咸德而不衰於徳則不殺治與政皆合故曰王者又以孟春論之德及功能能德法者為有徳能行徳法者為有行孟反行下能成德法者為有功能治德法者為有智故天子論吏而德法行事治而功成夫季冬正法孟春論吏治國之要子夏問於孔子曰商聞易之生人及萬物鳥獸昆蟲各有竒耦氣分不同以生萬物易主天地齊同分扶問反言受氣各有分數不而凡人莫知其情唯達德者能原其本焉天一地二人三三如九九九八十一一主日日數十故人十月而生竒數日數十従甲至癸也一主日従一而生日者陽従八九七十二偶以從竒竒主辰辰為月月主馬故馬十二月而生十二従子至亥也奇居偶以承竒隂以承陽辰數反宜七九六十三三主斗斗主狗故狗三月而生故以主斗斗次日月六九五十四四主時時主豕故豕四月而生故五為音音不過五四九三十六六為律律主鹿故鹿六月而生三九二十七七主星星主虎故虎七月而生八宿為星二十度七主星也四方方有七二九一十八八主風風為蟲故蟲八月而生蟲為風風為蟲也風之數盡於八凡其餘各従其類矣鳥魚生隂而屬於陽故皆卵生魚遊於水鳥遊於雲故立冬則燕雀入海化為蛤蠶食而不飲蟬飲而不食蜉蝣不飲不食萬物之所以不同介鱗夏食而冬蟄蟲也介甲齕吞者八竅而卵生齕下没反八竅鳥屬齟􅻾者九竅而胎生壯所反􅻾疾雀反九竅人及獸屬齟四足者無羽翼戴角者無上齒無角無前齒者膏無角無後齒者脂角者膏而無前有淮南取此義曰無屬無前後皆謂其銳小者也角者脂而無後膏豚屬而脂羊晝生者類父夜生者似母是以至隂主牝至陽主牡敢問其然乎孔子曰然吾昔聞老耼亦如汝之言子夏曰商聞山書曰地東西為緯南北為經山為積德川為積刑髙者為生下者為死丘陵為牡谿谷為牝蜯蛤龜珠與日月而盛虚屬滿月虧則虚月盛則蜯蛤之是故堅土之人剛弱土之人柔墟土之人大沙土之人細息土之人美㘪土之人醜息土細緻㘪耗字也踈者也㘪土麤食水者善遊而耐寒食土者無心而不息氣息也螟屬不食木者多力而不治不治血氣戾亦不治之貌者也淮南子曰多力而弗食草者善走而愚食桑者有緒而蛾食肉者勇毅而捍食氣者神明而壽食穀者智恵而巧不食者不死而神故曰羽蟲三百有六十而鳯為之長毛蟲三百有六十而麟為之長甲蟲三百有六十而龜為之長鱗蟲三百有六十而龍為之長倮蟲三百有六十而人為之長此乾巛之美也巛地乾天殊形異類之數王者動必以道動靜必以道靜必順理以奉天地之性而不害其所主謂之仁聖焉子夏言終而出子貢進曰商之論也何如孔子曰汝謂何也對曰微則微矣然則非治世之待也孔子曰然各其所能貢治世不待孔子曰然子亦各其所知能也此事此事之急然本命解第二十六魯哀公問於孔子曰人之命與性何謂也孔子對曰分於道謂之命為人故下句云分於道謂始得之始性命形於一謂之性之性故曰形於一也人各受隂陽以剛柔化於隂陽象形而發謂之生化窮數盡謂之死故命者性之始也死者生之終也有始則必有終矣人始生而有不具者五焉目無見不能食不能行不能言不能化及生三月而微煦煦子句反煦睛人也然後有見八月生齒然後能食三年顋合然後能言十有六而精通然後能化隂窮反陽故隂以陽變陽窮反隂故陽以隂化是以男子八月生齒八嵗而齓女子七月生齒七嵗而齓十有四而化一陽一隂竒偶相配隂偶數陽竒數覲反奇居宜反顋桑才反齓初然後道合化成性命之端形於此也公曰男子十六精通女子十四而化是則可以生民矣而禮男子三十而有室女子二十而有夫也豈不晚哉孔子曰夫禮言其極不是過也男子二十而冠有為人父之端女子十五許嫁有適人之道於此而徃則自婚矣群生閉藏乎隂而為化育之始物而為化育始隂為冬也冬藏故聖人因時以合偶男子窮天數也極霜降而婦功成嫁娶者行焉詩云將子無怒秋以為期季秋霜降嫁娶者始於此也冰泮而農桑起婚禮而殺於此正月農泮散也月農事始起㑹男女之無夫家者奔者期事起蠶者採桑婚禮始殺言未正也至二如欲使妻歸當及冰未泮散之盛時也盡此月故也詩云士如歸妻迨冰未泮言戒反殺所男子者任天道而長萬物者也知可為知不可為知可言知不可言知可行知不可行者是故審其倫而明其别謂之知所以效匹夫之聽也為德聽宜女子者順男子之敎而長其理者也養其理也為男子長是故無專制之義而有三従之道幼従父兄既嫁従夫夫死従子言無再醮之端無再醮之端始嫁言醮禮也人醮子肖反綂言不改事人敎令不出於閨門事在供酒食而已無閫外之非義也以自専無閫閫門限婦人酒食是議閫苦本反外之威儀詩云無非無儀不越境而奔喪事無擅為行無獨成叅知而後動可驗而後言晝不遊庭夜行以火所以效匹婦之德也孟反行下孔子遂言曰女有五不取子也逆家也喪父長子也此五者皆不取也矣亂家子也世有刑人子也世有惡疾子逆家子者逆德謂其亂家子者亂倫謂其世有刑人子者於人也謂其棄有惡疾子者於天也謂其棄喪父長子受命也謂其無婦有七出三不去七出者母出無不順父疾出多口舌出竊盜出子出淫僻出惡疾出姑不順父母出者其謂也逆德無子者世也謂其絶淫僻者族也謂其亂嫉妬者家也謂其亂惡疾者供粢盛也謂其不可多口舌者其謂也離親竊盜者義也謂其反三不去者謂有所取無所歸也一與共更三年之喪也二先貧賤後富貴也三凡此聖人所以順男女之際重婚姻之始也孔子曰禮之所以象五行也有五等服之制其義四時也故喪禮有舉焉有恩有義有節有權象四時所以舉其恩厚者其服重故為父母斬衰三年以恩制者也門内之治恩掩義門外之治義掩恩資於事父以事君而敬同尊尊貴貴義之大也故為君亦服衰三年以義制者也三日而食三月而沐期而練毁不滅性不以死傷生喪不過三年齊衰不補墳墓不修除服之日鼓素琴示民有終也凡此以節制者也資於事父以事母而愛同天無二日國無二君家無二尊以治之故父在為母齊衰朞者見無二尊也百官備百物具不言而事行者扶而起天謂侯也子諸言而後事行者杖而起士也卿大夫身自執事行者面垢而已人也謂庶此以權制者也親始死三日不怠三月不懈朞悲號三年憂哀之殺也聖人因殺以制節也戒反殺所論禮第二十七孔子閒居子張子貢言游侍論及於禮孔子曰居汝三人者吾語汝以禮周流無不遍也子貢越席而對曰敢問如何子曰敬而不中禮謂之野恭而不中禮謂之給勇而不中禮謂之逆子曰給奪慈仁恭捷給巧言足慈仁中陟仲反下同之人似仁非仁故言給奪子貢曰敢問將何以為此中禮者子曰禮乎夫禮所以制中也子貢退言游進曰敢問禮也領惡而全好者與呼報反與羊諸反領理惡烏故反好子曰然子貢問何也子曰郊社之禮所以仁鬼神也禘嘗之禮所以仁昭穆也饋奠之禮所以仁死喪也射饗之禮所以仁鄉黨也食饗之禮所以仁賔客也明乎郊社之義禘甞之禮治國其如指諸掌而已是故居家有禮故長幼辨以之閨門有禮故三族和以之朝廷有禮故官爵序以之田獵有禮故戎事閑以之軍旅有禮故武功成是以宫室得其度鼎俎得其象物得其時樂得其節車得其軾鬼神得其享喪紀得其哀辯説得其黨類黨百官得其禮政事得其施得各施行之其所宜加於身而措於前凡衆之動得其宜也言游退子張進曰敢問禮何謂也子曰禮者即事之治也君子有其事必有其治治國而無禮譬猶瞽之無相倀倀乎何所之倀三良反相息亮反譬猶終夜有求於幽室之中非燭何以見故無禮則手足無所措耳目無所加進退揖讓無所制是故以其居處長幼失其别閨門三族失其和朝廷官爵失其序田獵戎事失其䇿軍旅武功失其勢宫室失其度鼎俎失其象物失其時樂失其節車失其軾鬼神失其享喪紀失其哀辯説失其黨百官失其體政事失其施加於身而措於前凡動之衆失其宜如此則無以祖洽四海無以為衆法無以合祖始也洽合無禮則衆聚子曰慎聽之汝三人者吾語汝禮猶有九焉大饗有四焉以待賔之禮其五動靜語汝有九其四大饗所語魚據反之威儀也苟知此矣雖在畎畒之中事之聖人矣猶焉爲聖人在畎畒之中兩軍相見揖讓而入門入門而懸興一也興作樂揖讓而升堂升堂而樂闋也二下管象舞夏籥序興吹管象武下管堂下如笛序以更作三也舞也夏文舞也執籥籥陳其薦俎序其禮樂備其百官饗有四也四也所以大如此而後君子知仁焉行中規反中陟仲反五也行下孟旋中矩也六鑾和中采薺爲和鑾之節七也采薺樂曲名所以客出以雍周頌八也雍樂曲名在徹以振羽名九也亦樂曲是故君子無物而不在於禮焉入門而金作示情也一故以示情也金既鳴聲終始若升歌清廟示德也所以清廟之德也頌文王下管象舞示事也舉事凡舞是故古之君子不必親相與言也以禮樂相示而已夫禮者理也樂者節也無禮不動無節不作不能詩於禮謬言禮詩以不能樂於禮素質素於德薄於禮虚禮不虚行非其人則子貢作而問曰然則䕫其窮與禮者也與音余言達於樂而不達於子曰古之人與上古之人也達於禮而不達於樂謂之素達於樂而不達於禮謂之偏謂達達非殊徧有所夫䕫達於樂而不達於禮是以傳於此名也古之人也故遂傳名樂言達於樂多凡制度在禮文爲在禮行之其在人乎三子者既得聞此論於夫子也煥若發矇焉子夏侍坐於孔子曰敢問詩云愷悌君子民之父母何如斯可謂民之父母孔子曰夫民之父母必達於禮樂之源以致五至而行三無以横於天下四方有敗必先知之此之謂民之父母子夏曰敢問何謂五至孔子曰志之所至詩亦至焉詩之所至禮亦至焉禮之所至樂亦至焉樂之所至哀亦至焉詩禮相成哀樂相生是以正明目而視之不可得而見傾耳而聽之不可得而聞志氣塞于天地行之充于四海此之謂五至矣子夏曰敢問何謂三無孔子曰無聲之樂無體之禮無服之喪此之謂三無子夏曰敢問三無何詩近之孔子曰夙夜基命宥密無聲之樂也始也命信也夙夜恭也基在寛民以安寜故謂之無聲之樂也宥寛也宻寧也言以行與民信王敎威儀逮逮不可選也無體之禮也凡民有喪扶伏救之無服之喪也子夏曰言則美矣大矣言盡於此而已孔子曰何謂其然吾語汝其義猶有五起焉據反語魚子夏曰何如孔子曰無聲之樂氣志不違無體之禮威儀遲遲無服之喪内恕孔悲無聲之樂所願必従無體之禮上下和同無服之喪施及萬邦既然而又奉之以三無私而勞天下此之謂五起子夏曰何謂三無私孔子曰天無私覆地無私載日月無私照其在詩曰帝命不違至于湯齊大心齊至湯以湯降不遲聖敬日躋之道其聖敬之德日升聞也不遲言疾躋升也湯疾行下人昭假遲遲上帝是祗化行寛舒遲遲然故湯之威徳昭明遍至其德上帝敬帝命式于九圍用于九州謂以爲九圍九州也天命王天下是湯之德也子夏蹶然而起負墻而立曰弟子敢不志之孔子家語卷第六
