body:
  text: 孔子家語卷第三觀周第十一孔子謂南宫敬叔曰吾聞老聃博古知今老子博古知今而好道敬叔孟僖子子也老𥅆通禮樂之原明道徳之歸則吾師也今將徃矣對曰謹受命遂言於魯君曰臣受先臣之命僖子先臣云孔子聖人之後也殷湯聖人滅於宋宋奔魯故曰孔子之先去宋也滅於其祖弗父何始有國而授厲公何緡弗父曰以有宋而授厲公宜始始也始有宋也公世子厲公兄也讓國以授厲公春秋傳及正考父佐戴武宣也戴武宣三公也正考父何之曾孫三命兹益恭再命卿三命是也考父士一命其大夫故其鼎銘曰於其宗廟之鼎也臣有功德君命銘之一命而僂再命而傴三命而俯俯恭於傴傴恭於僂循墻而走之甚言恭亦莫余敢侮恭如此故人亦莫之侮余我也我考父也以其饘於是粥於是以餬其口此鼎言至儉也饘麋也爲糜粥於其恭儉也若此臧孫紇有言聖人之後若不當世之後而不繼世爲宋君紇臧武仲弗父何殷湯則必有明君而達者焉孔子少而好禮其將在矣孔子將在屬臣曰汝必師之今孔子將適周觀先生之遺制考禮樂之所極斯大業也君盍以乗資之臣請與徃公曰諾與孔子車一乗馬二疋堅其侍御敬叔與俱至周問禮於老聃訪樂於萇弘大夫弘周歴郊社之所考明堂之則法則察廟朝之度之法度也宗廟朝廷於是喟然曰吾乃今知周公之聖與周之所以王也及去周老子送之曰吾聞富貴者送人以財仁者送人以言吾雖不能富貴而竊仁者之號請送子以言乎凡當今之士聰明深察而近於死者好譏議人者也博辯閎達而危其身好發人之惡者也無以有已為人子者有之也身父母無以惡已為人臣者聽言身全行臣之節也則仕不用則退保孔子曰敬奉敎自周反魯道彌尊矣逺方弟子之進蓋三千焉孔子觀乎明堂覩四門墉有堯舜之容桀紂之象而各有善惡之状興廢之誡焉又有周公相成王抱之負斧扆南靣以朝諸侯之圖焉天子之位失之逺矣也世之博學者謂周公便履孔子徘徊而望之謂從者曰此周公所以盛也夫明鏡所以察形徃古者所以知今人主不務襲迹於其所以安存而忽怠所以危亡是猶未有以異於却走而欲求及前人也豈不惑哉孔子觀周遂入太祖后稷之廟廟堂右階之前有金人焉三緘其口而銘其背曰古之慎言人也戒之哉無多言多言多敗無多事多事多患安樂必戒必警戒也雖處安樂無所行悔悔之事不可復行言當詳而後行所勿謂何傷其禍將長勿謂何害其禍將大勿謂不聞神将伺人熖熖不滅炎炎若何涓涓不壅終為江河綿綿不絶或成網羅則有成羅網者也綿綿微細若不絶毫末不札將尋斧柯札㧞也㝷用者也如毫之末言至微也誠能慎之福之根也口是何傷禍之門也强梁者不得其死好勝者必遇其敵盗憎主人民怨其上君子知天下之不可上也故下之知衆人之不可先也故後之温恭慎徳使人慕之執雌持下人莫踰之人皆趨彼我獨守此人皆或之我獨不徙東西或之之貌轉移内藏我智不示人技我雖尊髙人弗我害誰能於此江海雖左長於百川以其卑也而能爲百川長以其能下水隂長右江海雖在於其左天道無親而能下人戒之哉孔子既讀斯文也顧謂弟子曰小人識之志音此言實而中情而信詩曰戰戰競競如臨深淵如履薄氷戰戰恐墜也恐䧟也恐也競競戒也行身如此豈以口過患哉孔子見老聃而問焉曰甚矣道之於今難行也吾比執道而今委質以求當世之君而弗受也道於今難行也老子曰夫説者流於辯也失也流猶過聽者亂於辭如此二者則道不可以忘也弟子行第十二衛將軍文子彌牟也衞卿名問於子貢曰吾聞孔子之施敎也先之以詩書而道之以孝悌説之以仁義觀之以禮樂然後成之以文徳盖入室升堂者七十有餘人其孰為賢子貢對以不知文子曰以吾子常與學賢者也不知何謂子貢對曰賢人無妄無妄賢人不妄舉動知賢即難故君子之言曰智莫難於知人是以難對也文子曰若夫知賢莫不難今吾子親遊焉是以敢問子貢曰夫子之門人蓋有三千就焉賜有逮及焉未逮及焉故不得徧知以告也文子曰吾子所及者請問其行子貢對曰夫能夙興夜寐諷誦崇禮行不貳過不知知之未甞復行貳再也有不善未甞也稱言不苟不苟且也舉言典法是顔囘之行也孔子説之以詩曰媚兹一人應侯慎徳天子一人以媚愛天子當於其心惟愼德也應當也侯惟也言顔淵之德之永言孝思孝思惟則足以爲法則也言能長是孝道若逄有徳之君世受顯命不失厥名以御于天子則王者之相也在貧如客矜莊如爲客也言不以貧累志使其臣如借如借使之也言不有其臣不遷怒不深怨不録舊罪是冉雍之行也孔子論其材曰有土之君子也有衆使也有刑用也然後稱怒焉後可以稱怒冉雍非有土之君故使其言有土地之君有衆足使有刑足用然不加怒也臣如借而孔子告之以詩曰靡不有初鮮克有終終其行冉雍能疋夫不怒唯以亡其身說因疋夫以怒亡身不怒之義遂及不畏强禦不侮矜寡其言循性言不誣其爾循其性也而其都以富於富貴仲由長材任治戎旅也戎軍是仲由之行也孔子和之以文説之以詩曰受小拱大拱而為下國駿龎荷天子之龍詳此其義也拱法也駿大也孔子曰和仲由以文說之以下國大厚乃可任天下道也龎厚也龍荷之言受大小法爲不戁不悚敷奏其勇敷陳奏薦戁恐悚懼强乎武哉文不勝其質文不勝其質言子路强勇恭老䘏㓜不忘賔旅謂寄賔旅也客好學博藝省物而勤也而能勸也省錄諸事是冉求之行也孔子因而語之曰好學則智䘏孤則惠恭則近禮勤則有繼堯舜篤恭以王天下其稱之也曰宜為國老宣徳教國老助齊莊而能肅志通而好禮擯相兩君之事篤雅有節是公西赤之行也子曰禮經三百可勉能也勉學而能知禮經三百可威儀三千則難也可爲而公西赤能躬行之能躬行三千之威儀則難公西赤問曰何謂也子曰貌以儐禮禮以儐辭是謂難焉其禮而儐相其辭度事制儀故難也言所以爲者當觀容貌而儐相其禮度衆人聞之以為成也孔子語人曰當賔客之事則達矣儀故以爲成也孔子曰當賔客衆人聞公西赤能行三千之威於治國之本體也之事則達未盡達謂門人曰二三子之欲學賔客之禮者其於赤也滿而不盈實而者是顓孫師之行也孔子言之曰其不伐則猶可能也其不弊百姓則仁也百姓即不弊愚傲之也所謂不詩云愷悌君子民之父母易也樂愷樂悌皆有是父之尊母之親也以强教之易以說安之民夫子以其仁爲大學之深其深義也學而能入送迎必敬常能敬也送迎賔客上交下接若截焉是卜商之行也孔子説之以詩曰式夷式已無小人殆也言用平式用夷平以小人至於危也則已也殆危也無若商也其可謂不險矣斷之近小人斷不危險危也言子夏常厲以貴之不喜賤之不怒苟利於民矣廉於行已其事上也以佑其下欲佑助其下也言所以事上乃是澹臺滅明之行也孔子曰獨貴獨富君子助之夫也中之矣中猶當也夫謂㓕明先成其慮及事而用之故動則不妄是言偃之行也孔子曰欲能則學欲知則問欲善則詳當詳慎也欲善其事欲給則豫欲事莫若於豫給而不礙則當是而行偃也得之矣獨居思仁公言仁義其於詩也則一日三覆白圭之玷斯言之玷不可爲也一日三覆之玷缺也詩曰白圭之玷尚可磨也至也慎之是宫縚之行也孔子信其能仁以為異士姓婚姻也以兄之女妻之者也殊異之士也大戴引之曰以爲異自見孔子出入於户未嘗越禮徃來過之足不履影故跡不履影也言其徃來常跡啓蟄不殺發蟄蟲春分當時不殺生也啓戸咸出於此方長不折時草木不折春夏生長飬執親之喪未嘗見齒是髙柴之行也孔子曰柴於親喪則難能也啓蟄不殺則順人道方長不折則恕仁也成湯恭而以恕是以日隮焉四靣絶網乃去其三靣詩曰湯降隮升也成湯行恭而能恕出見博鳥之道其聖敬之德日升聞也不遲聖敬日隮言湯疾行下人凡此諸子賜之所親覩者也吾子有命而訊賜問訊賜也固不足以知賢文子曰吾聞之也國有道則賢人興焉中人用焉爲時用也中庸之人乃百姓歸之若吾子之論既富茂矣壹諸侯之相也皆壹抑世未有明君所以不遇也子貢既與衛將軍文子言適魯見孔子曰衛將軍文子問二三子之於賜不壹而三焉賜也辭不獲命以所見者對矣未知中否請以告孔子曰言之乎子貢以其辭狀告孔子子聞而笑曰賜汝次焉人矣人之次言爲知子貢對曰賜也何敢知人此以賜之所覩也孔子然吾亦語汝耳之所未聞目之所未見者豈思之所不至智之所未及哉子貢曰賜願得聞之孔子曰不克不忌不念舊怨蓋伯夷叔齊之行也思天而敬人服義而行信孝於父母恭於兄弟從善而不教蓋趙文子之行也其事君也不敢愛其死然亦不敢忘其身謀其身不遺其友君陳則進而用之爲君之使用也陳謂陳列於君不陳則行而退蓋隨武子之行也其爲人之淵源也多聞而難誕歎誕内植足以沒其世國家有道其言足以治無道其黙足以生蓋銅鍉伯華之行也外寛而内正自極於隱括之中以自極隱括所直已而不直人汲汲於仁以善自終蓋蘧伯玉之行也孝恭慈仁允徳圖義圖謀也允信也約貨去怨省其貨以逺去其怨夫利怨之所聚故約輕財不匱蓋桺下惠之行也其言曰君雖不量於其身臣之德器也謂不量度其臣不可以不忠於其君是故君擇臣而任之臣亦擇君而事之有道順命順從其命君有道則無道衡命謂不受衡横也居者也其命之隱蓋晏平仲之行也蹈忠而行信終日言不在尤之内過尤國無道處賤不悶憂悶貧而能樂蓋老子之行也易行以俟天命治易居下不援其上援其上以求進雖在下位不攀其親觀於四方也不忘其親不盡其樂四方之雖有觀不盡其歸之樂常念其親以不能則學不為巳終身之憂則學何憂之有凡憂憂所知不能蓋介子山之行也子貢曰敢問夫子之所知者蓋盡於此而已乎孔子曰何謂其然亦畧舉耳目之所及而矣昔晉平公問祁奚曰羊舌大夫晉之良大夫也其行如何祁奚辭以不知公曰吾聞子少長乎其所所長於其今子掩之何也祁奚對曰其少也恭而順心有耻而不使其過宿有過不令更宿輙改心常有所耻惡及其其為大夫悉善而謙其端讓是其正也盡善道而謙其爲輿尉也信而好直其功言其功直至於其爲容也温良而好禮博聞而時出其志之誨未及之時出以其出志也是其公曰曩者問子子奚曰不知也祁奚曰毎位改變未知所止是以不敢得知也此又羊舌大夫之行也子貢跪曰請退而記之賢君第十三哀公問於孔子曰當今之君孰爲最賢孔子對曰丘未之見也抑有衛靈公乎公曰吾聞其閨門之内無别而子次之賢何也孔子曰臣語其朝廷行事不論其私家之際也公曰其事何如孔子對曰靈公之弟曰靈公弟子渠牟其智足以治千乗其信足以守之靈公愛而任之又有士林國者見賢必進之而退與分其禄是以靈公無逰放之士靈公賢而尊之又有士曰慶足者衛國有大事則必起而治之國無事則退而容賢欲以容賢於朝言其所以退者靈公悦而敬之又有大夫史鰌以道去衛而靈公郊舎三日琴瑟不御必待史鰌之入而後敢入臣以此取之雖次之賢不亦可乎子貢問於孔子曰今之人臣孰為賢子曰吾未識也徃者齊有鮑叔鄭有子皮則賢者矣子貢曰齊無管仲鄭無子産子曰賜汝徒知其一未知其二也汝聞用力為賢乎進賢為賢乎子貢曰進賢賢哉子曰然吾聞鮑叔達管仲子皮達子産未聞二子之達賢已之才者也哀公問於孔子曰寡人聞忘之甚者徙而忘其妻有諸孔子對曰此猶未甚者也甚者乃忘其身公曰可得而聞乎孔子曰昔者夏桀貴為天子富有四海忘其聖祖之道壊其典法廢其世祀荒於滛樂躭湎於酒佞臣諂諛窺導其心忠士折口逃罪不言杜口折口天下誅桀而有其國此謂忘其身之甚矣顔淵將西遊於宋問於孔子曰何以為身子曰恭敬忠信而已矣恭則遠於患敬則人愛之忠則和於衆信則人任之勤斯四者可以政國豈特一身者哉但特故夫不比於數而比於踈不亦逺乎近踈逺也不比親數不修其中而修外者不亦反乎慮不先定臨事而謀不亦晚乎孔子讀詩于正月六章惕焉如懼曰彼不達之君子豈不殆哉從上依世則道廢違上離俗則身危時不興善已獨由之則曰非妖即妄也故賢也既不遇天恐不終其命焉桀殺龍逄紂殺比干皆類是也詩曰謂天蓋髙不敢不局謂地蓋厚不敢不蹐不敢不曲身危行恐上干忌諱也蹐累足此正月六章之辭也局曲也言天至髙已足恐䧟累在位之羅網也言地至厚已不敢不累此言上下畏罪無所自容也子路問於孔子曰賢君治國所先者何孔子曰在於尊賢而賤不肖子路曰由聞晉中行氏尊賢而賤不肖矣其亡何也孔子曰中行氏尊賢而不能用賤不肖而不能去賢者知其不用而怨之不肖者知其必已賤而讎之怨讎並存於國鄰敵搆兵於郊中行氏雖欲無亡豈可得乎孔子閒處喟然而歎曰嚮使銅鞮伯華無死則天下其有定矣子路曰由願聞其人也子曰其㓜也敏而好學其壯也有勇而不屈其老也有道而能下人有此三者以定天下也何難乎哉子路曰㓜而好學壯而有勇則可也若夫有道下人又誰下哉子曰由不知吾聞以衆攻寡無不尅也以貴下賤無不得也昔者周公居冢宰之尊制天下之政而猶下白屋之士也草屋日見百七十人斯豈以無道也欲得士之用也惡有道而無下天下君子哉齊景公來適魯舎于公館使晏嬰迎孔子孔子至景公問政焉孔子答曰政在節財公悅又問曰秦穆公國小處僻而霸何也孔子曰其國雖小其志大處雖僻而政其中其舉也果其謀也和法無私而令不愉愉苟且也愉宜爲偷首拔五叛爵之大夫五叛大夫首宜爲身奚也百里與語三日而授之以政此取之雖王可其霸少矣景公曰善哉哀公問政於孔子孔子對曰政之急者莫大乎使民富且壽也公曰爲之柰何孔子曰省力役薄賦歛則民富矣敦禮教逺罪疾則民夀矣公曰寡人欲行夫子之言恐吾國貧矣孔子曰詩云愷悌君子民之父母未有子富而父母貧者也衛靈公問於孔子曰有語寡人有國家者計之於廟堂之上則政治矣何如孔子曰其可也愛人者則人愛之惡人者則人惡之知得之已者則知得之人所謂不出環堵之室而知天下者知反已之謂也孔子見宋君君問孔子曰吾欲使長有國而列都得之皆得其道國之列都吾欲使民無惑吾欲使士竭力吾欲使日月當時吾欲使聖人自來吾欲使官府治理為之柰何孔子對曰千乗之君問丘者多矣而未有若主君之問問之悉也然主君所欲者盡可得也丘聞之隣國相親則長有國君惠臣忠則列都得之不殺無辜無釋罪人則民不惑士益之禄則皆竭力尊天敬鬼則日月當時崇道貴徳則聖人自來任能黜否則官府治理宋君曰善哉豈不然乎寡人不佞不足以致之也孔子曰此事非難唯欲行之云耳辨政第十四子貢問於孔子曰昔者齊君問政於夫子夫子曰政在節財魯君問政於夫子子曰政在諭臣葉公問政於夫子夫子曰政在悦近而遠來三者之問一也而夫子應之不同然政在異端乎孔子曰各因其事也齊君為國奢乎臺榭淫于苑囿五官伎樂不解於時一旦而賜人以千乗之家者三故曰政在節財魯君有臣三人季孫三也孟孫叔孫内比周以愚其君外距諸侯之賔以蔽其明故曰政在諭臣夫荆之地廣而都狹民有離心莫安其居故曰政在悦近而來遠此三者所以為政殊矣詩云喪亂蔑資曾不惠我師亂之政重賦厚歛民無資財曾蔑無也資財也師衆也夫爲亡我衆莫肯愛此傷奢侈不節以為亂者也又曰匪其止共惟王之卭人不共所止息故惟止止息也卭病也䜛病王之此傷姦臣蔽主以為亂也又曰亂離瘼矣奚其適歸成憂憶禍亂於斯歸於禍離憂也瘼病也言離散以也亂者此傷離散以為亂者也察此三者政之所欲豈同乎哉孔子曰忠臣之諌君有五義焉一曰譎諌譎諫其君正其事以二曰戅諌文飾也戅諫無三曰降諫降卑以諫也其體所四曰直諌五曰風諫唯度主而行之吾從其風諫乎罪避害者也風諫依違逺子曰夫道不可不貴也中行文子倍道失義以亡其國而能禮賢以活其身道失義此說陪配又文子無禮賢之事中行文子得罪於不宜說得道之意而云禮賢不與上相次故休馬待駿者文子曰吾好音以子遺吾晉出亡至邊從者曰謂此嗇夫者君子也我者也吾怨其以我求容也遂不入車人琴好珮子遺吾玉是以不振吾過自容於文子陪道失義以亡其國然得之由活其問文子之所右執而不殺之孔子聞之曰宜以然後得也身而能禮賢以爲聖人轉禍爲福此謂是與活故曰轉禍爲福若入將死不入得楚王將遊荆臺司馬子祺諫王怒之令尹子西賀於殿下諫曰今荆臺之觀不可失也王喜拊子西之背曰與子共樂之矣子西歩馬十里引轡而止曰臣願言有道王肯聽之乎王曰子其言之子西曰臣聞為人臣而忠其君者爵禄不足以賞也諛其君者刑罰不足以誅也夫子祺者忠臣也而臣者諛臣也願王賞忠而誅諛焉王曰我今聴司馬之諫是獨能禁我耳若後世遊之何也子西曰禁後世易耳大王萬歲之後起山陵於荆臺之上則子孫必不忍遊於父祖之墓以為歡樂也王曰善乃還孔子聞之曰至哉子西之諫也入之於千里之上抑之於百世之後者也子貢聞於孔子曰夫子之於子産晏子可為至矣敢問二大夫之所為目夫子之所以與之者孔子曰夫子産於民為惠主於學為博物晏子於君為忠臣而行為恭敏故吾皆以兄事之而加愛敬齊有一足之鳥飛集於宫朝下止于殿前舒翅而跳齊侯大怪之使使聘魯問孔子孔子曰此鳥名曰商羊水祥也昔童兒有屈其一脚振訊兩眉而跳且謡曰天將大雨商羊鼔儛今齊有之其應至矣急告民趨治溝渠修隄防將有大水為灾頃之大霖雨水溢泛諸國傷害民人唯齊有備不敗景公曰聖人之言信而徴矣孔子謂宓子賤曰子治單父衆悦子何施而得之也子語丘所以為之者對曰不齊之治也父恤其子其子䘏諸孤而哀喪紀孔子曰善小節也小民附矣猶未足也曰不齊所父事者三人所兄事者五人所友事者十一人孔子曰父事三人可以敎孝矣兄事五人可以敎悌矣友事十一人可以舉善矣中節也中人附矣猶未足也曰此地民有賢於不齊者五人不齊事之而禀度焉皆敎不齊之道孔子歎曰其大者乃於此乎有矣昔堯舜聽天下務求賢以自輔夫賢者百福之宗也神明之主也惜乎不齊之以所治者小也子貢為信陽宰將行辭於孔子孔子曰勤之慎之奉天子之時無奪無伐無㬥無盗子貢曰賜也少而事君子豈以盗為累哉孔子曰汝未之詳也夫以賢代賢是謂之奪以不肖代賢是謂之伐緩令急誅是謂之暴取善自與謂之盗盗非竊財之謂也吾聞之知為吏者奉法以利民不知為吏者枉法以侵民此怨之所由也治官莫若平臨財莫如亷廉平之守不可改也匿人之善斯謂蔽賢揚人之惡斯為小人内不相訓而外相謗非親睦也言人之善若已有之言人之惡若已受之故君子無所不慎焉子路治蒲三年孔子過之入其境曰善哉由也恭敬以信矣入其邑曰善哉由也忠信而寛矣至廷曰善哉由也明察以斷矣子貢執轡而問曰夫子未見由之政而三稱其善其善可得聞乎孔子曰吾見其政矣入其境田疇盡易草萊甚辟溝洫深治此其恭敬以信故其民盡力也入其邑墻屋完固樹木甚茂此其忠信以寛故其民不偷也至其庭庭甚清閒諸下用命此其言明察以斷故其政不擾也以此觀之雖三稱其善庸盡其美乎孔子家語卷第三終
