  - {type: variant, offset: 6770, length: 0, content: '', WYG: 二欽定四庫全書家語卷三魏王肅註觀周}
  - {type: page-break, offset: 6770, content: '', id: KR3a0001_WYG_003-1a, image: WYG0695/WYG0695-0026a.png}
  - {type: variant, offset: 6771, length: 0, content: '', WYG: 十一孔子謂南宫敬叔曰吾聞老聃博古知今敬叔孟僖子子也老聃老子博古知今而好道通禮樂之原明道徳之歸則吾師也今將往矣對曰謹受命遂言於魯君曰臣受先臣之命先臣僖子云孔子聖人之後也聖人殷湯滅於宋孔子之先去宋奔魯故曰滅於宋也其祖弗父何始有國而受厲公弗父何緍公世子厲公兄也讓國以授厲公春秋傳曰以有宋而授厲公有者始有也始有宋也及正考父佐戴武宣正考父何之曽孫也戴武宣三公也三命兹益恭命為士一命為大夫再命為卿三命是也故其鼎銘曰臣有功徳君命銘之於其宗廟之鼎也一命而僂再命而傴三命而俯傴㳟於僂俯㳟於傴循墻而走言㳟之甚亦莫余敢侮余我也我考父也以其恭如此故人亦莫之侮饘於是粥於是以餬其口饘糜也為糜粥於此鼎言至儉也其恭儉也若此臧孫紇有言聖人之後若不當世紇威武仲弗父何殷湯之後而不繼世為宋君則必有明徳而達者焉孔子少而好禮其將在矣將在孔子屬臣汝必師之今孔子將適周觀先生之遺制考禮樂之所極斯大業也君盍以乗資之臣請與往公曰諾與孔子車一乗馬}
  - {type: page-break, offset: 6771, content: '', id: KR3a0001_WYG_003-1b, image: WYG0695/WYG0695-0026b.png}
  - {type: page-break, offset: 6771, content: '', id: KR3a0001_WYG_003-2a, image: WYG0695/WYG0695-0027a.png}
