      ', id: KR3a0001_krp_002-bkkkrnewl454}
  - {type: variant, offset: 6772, length: 0, content: '', WYG: 匹豎子侍御敬叔與俱至周問禮於老聃訪樂於萇𢎞𢎞周大夫歴郊社之所考明堂之則則法察廟朝之度宗廟朝廷之法度也於是喟然曰吾乃今知周公之聖與周之所以王也及去周老子送之曰吾聞富貴者送人以財仁者送人以言吾雖不能富貴而竊仁者之號請送子以言乎凡當今之士聰明深察而近於死者好譏議人者也博辯閎達而危其身好發人之惡者也無以有已為人子者身父母之有也無以惡已為人臣者言聴則仕不用則退保身全行臣之節也孔子曰敬奉敎自周反魯道彌尊矣逺方弟子之進葢三千焉孔子觀乎明堂覩四門墉有堯舜與桀紂之象而各有善惡之状興廢之誡焉又有周公相成王抱之負斧扆南靣以朝諸侯之圖焉世之博學者謂周公便履天子之位失之逺矣孔子徘徊而望之謂從者曰此周公所以盛也夫明鏡所以察形往古者所以知今人主不務襲迹於其所以安存而急急所以危亡是猶未有以異於却走而欲求及前人也豈不惑哉孔子觀周遂入太祖后稷之廟廟堂右階之前有金人焉參緘其口而銘其背曰古之慎言人也戒之哉無多言多言多敗無多事多事多患安樂必戒雖處安樂必警戒也無所行悔言當詳而後行所悔之事不可復行勿謂何傷其禍將長勿謂何害其禍將大勿謂不聞神將伺人熖熖不滅炎炎若何涓涓不壅終為江河綿綿不絶或成網羅綿綿微細若不絶則有成羅網者也毫末不札將尋斧柯如毫之末言至微也札拔也尋用也誠能慎之福之根也口是何傷禍之門也强梁者不得其死好勝者必遇其敵盜憎主人民怨其上君子知天下之不可上也故下之知衆人之不可先也故後之温恭慎徳使人慕之執雌持下人莫踰之人皆趨彼我獨守此人皆或之我獨不徙或之東西轉移之貌内藏我智不示人技我雖尊髙人弗我害誰能於此江海雖左長於百川以其卑也水隂長右海江雖在於其左而能為百川長以其能下天道無親而能下人戒之哉孔子既讀斯文也顧謂弟子曰小子識之音志此言實而中情而信詩云戰戰兢兢如臨深淵如履薄冰戰戰恐也兢兢戒也恐墜也恐䧟也行身如此豈以口過患哉孔子見老聃而問焉曰甚矣道之於今難行也吾比執道而今委質以求當世之君而弗受也道於今難行也老子曰夫説者流於辯流猶過也失也聴者亂於辭知此二者則道不可以忘也弟子行第十二衛將軍文子衛卿名彌牟也問於子貢曰吾聞孔子之施敎也先之以詩書導之以孝悌説之以仁義觀之以禮樂然後成之以文徳葢入室升堂者七十有餘人其孰為賢子貢對以不知文子曰以吾子常與學賢者也何為不知子貢對曰賢人無妄賢人無妄妄言舉動不知賢即難故君子之言曰智莫難於知人是以難對也文子曰若夫知賢莫不難今吾子親遊焉是以敢問子貢曰夫子之門人葢有三千就焉賜有逮及焉未逮及焉故不得徧知以告也文子曰吾子所及者請聞其行子貢對曰夫能夙興夜寐諷誦崇禮行不貳過貳再也有不善未甞不知知之未甞復行也稱言不苟舉言典法不苟且也是顔囘之行也孔子説之以詩曰媚兹一人應侯慎徳一人天子也應當也侯惟也言顔淵之徳足以媚愛天子當於其心惟慎徳永言孝思孝思維則言能長是孝道足以為法則也若逄有徳之君世受顯命不失厥名以御於天子則王者之相也在貧如客言不以貧累志矜荘如為客也使其臣如借言不有其臣如借使之也不遷怒不深怨不録舊罪是冉雍之行也孔子論其材曰有土之君子也有衆使也有刑用也然後稱怒焉言有土地之君有衆足使有刑足用然後可以稱怒冉雍非有土之君故使其臣如借而不加怒也孔子告之以詩曰靡不有初鮮克有終冉雍能終其行匹夫不怒唯以亡其身因説不怒之義遂及匹夫以怒亡身不畏强禦不侮矜寡其言循性循其性也而言不誣其情其都以富仲由長於政事材任治戎戎軍旅也是仲由之行也孔子和之以文説之以詩曰受小共大共而為下國駿庬荷天子之龍孔子曰和仲由以文説之以詩此其義也其法也駿大也庬厚也龍和也言受大小法為下國大厚乃可任天下道也不戁不悚敷奏其勇戁恐悚懼敷陳奏薦强乎武哉文不勝其質言子路强勇文不勝其質恭老䘏㓜不忘賓旅賔旅謂寄客也好學博藝省物而勤也省録諸事而能勤也是冉求之行也孔子因而語之曰好學則智恤孤則惠恭則近禮勤則有繼堯舜篤恭以王天下其稱之也曰宜為國老國老助宣徳敎齋莊而能肅志通而好禮儐相两君之事篤雅有節是公西赤之行也子曰禮經三百可勉能也禮經三百可勉學而能知威儀三千則難也能躬行三千之威儀則難可為而公西赤能躬行之公西赤問曰何謂也子曰貌以儐禮禮以儐辭是謂難焉言所以為者當觀容貌而儐相其禮度其禮而儐相其辭度事制冝故難也衆人聞之以為成也孔子語人曰當賔客之事則達矣衆人聞公西赤能行三千之威儀故以為成也孔子曰當賔客之事則達未盡達於治國之本體也謂門人曰二三子之欲學賔客之禮者其於赤也滿而不盈實而如虚過之如不及先王難之盈而如虚過而不及是先王之所難而曽參體其行博無不學其貌恭其徳敦其言於人也無所不信其驕大人也常以浩浩浩然志大驕大貌也大人富貴者也是以眉夀不慕富貴安静虚無所以為之富貴是曾參之行也孔子曰孝徳之始也悌徳之序也悌以敬長是徳之次序也信徳之厚也忠徳之正也參中夫四徳者也以此稱之美功不伐貴位不善不侮不佚侮佚貪功慕勢之貌不傲無告鰥寡孤獨此四者天民之窮而無告者也子張之行不傲此四}
