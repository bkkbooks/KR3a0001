  - {type: variant, offset: 0, length: 633, content: 孔子家語序王氏鄭氏學行五十載矣自肅成童始志于學而學鄭氏學矣然尋文責實考其上下義理不安違錯者多是以奪而易之然世未明其欵情不謂其苟駮前師以見異於前人乃慨然而嘆曰予豈好難哉予不得巳也聖人之門方壅不通孔氏之路枳棘充焉豈得不開而辟之哉若無由之者亦非予之罪也是以撰經禮申明其義及朝論制度皆據所見而言孔子二十二世孫有孔猛者家有其先人之書昔相從學頃還家方取巳來與予所論有若重規疊矩昔仲由曰文王旣沒文不在兹乎天之將䘮斯文也後死者不得與於斯文也天之未䘮斯文也匡人其如予何言天䘮斯文故令巳傳斯文於天也今或者天未欲亂斯文故令從予學而予從猛得斯論以明相與孔氏之無違也斯皆聖人實事之論而恐其將絕故特爲解以貽好事之君子語云牢曰子云吾不試故藝談者不知爲誰多妄爲之說孔子家語弟子有琴張一名牢字子開子張衞人也宗魯死將徃吊孔子止焉春秋外傳曰昔堯臨民以五說者曰堯五載一巡狩五載一巡狩不得稱臨民以五也經曰五載一巡狩此乃說舜之文非說堯孔子說論五帝各道其異事於舜云巡狩天下五載一始則堯之巡狩年數未明周十二歲一巡寧可言周臨民十二乎孔子曰堯以火德王天下而尚黃黃土徳五土之數故曰臨民以五此其義也孔子家語目錄卷之一相魯始誅王言解大婚解儒行解問禮五儀解卷之二致思三恕好生卷之三觀周弟子行賢君辯政卷之四六本辯物哀公問政卷之五顔囘子路初見在厄入官困誓五帝德卷之六五帝執轡本命解論禮卷之七觀鄕郊問五刑解刑政禮運卷之八冠頌解廟制解辯樂問玉屈節解卷之九七十二弟子解本姓解終記解正論解卷之十曲禮子貢問曲禮子夏問曲禮公西赤問孔子家語目錄, WYG: ''}
