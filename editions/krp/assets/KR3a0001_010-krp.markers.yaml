  - {type: variant, offset: 0, length: 6563, content: 孔子家語卷第十曲禮子貢問第四十二子貢問於孔子曰晉文公實召天子而使諸侯朝焉且使狩於河陽因使諸侯朝晉文公㑹諸侯于溫召襄王夫子作春秋云天王狩于河陽何也孔子曰以臣召君不可以訓亦書其率諸侯事天子而已孔子在宋見桓魋自爲石槨三年而不成工匠皆病夫子愀然曰若是其靡也侈靡死不如杇之速愈冉子僕曰禮凶事不豫此何謂也夫子曰旣死而議謚謚定而卜葬旣葬而立廟皆臣子之事非所豫屬也况自爲之哉南宫敬叔以富得罪於定公奔衞衞侯請復之載其寶以朝夫子聞之曰若是其貨也喪不若速貧之愈位也喪失子游侍曰敢問何謂如此孔子曰富而不好禮殃也敬叔以富喪矣而又弗改吾懼其將有後患也敬叔聞之驟如孔氏而後循禮施散焉孔子在齊齊大旱春饑景公問於孔子曰如之何孔子曰凶年則乗駑馬力役不興馳道不修行之道馳道君祈以幣玉幣及玉不用君所祈請用也牲祭祀不懸樂也不作祀以下牲者用少牢當用大牢此賢君自貶以救民之禮也孔子適季氏康子晝居内寢孔子問其所疾康子出見之言終孔子退子貢問曰季孫不疾而問諸疾禮與孔子曰夫禮君子不有大故則不宿於外非致齊也非疾也則不晝處於内是故夜居外雖弔之可也晝居於内雖問其疾可也孔子為大司冦國廏焚子退朝而之火所鄉人有自爲火來者則拜之士一大夫再子貢曰敢問何也孔子曰其來者亦相弔之道也吾爲有司故拜之子貢問曰管仲失於奢晏子失於儉與其俱失矣二者孰賢孔子曰管仲鏤簋而朱紘紘天子冕之紱鏤刻而飾之朱旅樹而反坫屏也天子旅施也樹人君好㑹獻酢禮畢反爵於其上外屏諸侯内屏反坫在兩楹之間山節藻梲梁上楹也畵藻文也節栭也刻為山雲梲賢大夫也而難爲上晏平仲祀其先祖而豚肩不揜豆小也言陋一狐裘三十年賢大夫也而難爲下君子上不僣下下不偪上冉求曰昔文仲知魯國之政立言垂法于今不亡可謂知禮矣孔子曰昔臧文仲安知禮夏父弗綦逆祀而不止燔柴於竈以祀焉夫竈者老婦之所祭老婦主祭也謂祭竈報其功盛於甕尊於瓶非所柴也故曰禮也者由體也體不備謂之不成人設之不當猶不備也子路問於孔子曰臧武仲率師與邾人戰于狐鮐遇敗焉師人多䘮而無罰古之道然與孔子曰凡謀人之軍師敗則死之謀人之國邑危則亡之古之正也其君在焉者有詔則無討君教則臣無討詔君之教也有晉將伐宋使人覘之也觀宋陽門之介夫死夫被甲御門者陽門宋城門也介司城子罕哭之哀覘之反言於晉侯曰陽門之介夫死而子罕哭之哀民咸悦宋殆未可伐也孔子聞之曰善哉覘國乎詩云凡民有喪匍匐救之子罕有焉雖非晉國其天下孰能當之非晉言雖者猶不能當也國使天下有强是以周任有言曰民悦其愛者弗可敵也楚伐吳工尹商陽與陳棄疾追吳師及之棄疾曰王事也子手弓而可商陽手弓棄疾曰子射諸射之弊一人韔其弓韜韔又及棄疾謂之又及棄疾復謂之斃二人每斃一人輙掩其目止其御曰吾朝不坐燕不與故也亡卑殺三人亦足以反命矣孔子聞之曰殺人之中又有禮焉子路怫然進曰人臣之節當君大事唯力所及死而後巳夫子何善此子曰然如汝言也吾取其有不忍殺人之心而巳孔子在衛司徒敬子卒夫子弔焉主人不哀夫子哭不盡聲而退璩伯玉請曰衛鄙俗不習喪禮煩吾子辱相焉孔子許之掘中霤而浴力救反室中霤毁竈而綴足襲於牀及葬毁宗而􅺺行也綴足不欲令僻戾長胡不復有事於此也位在廟門之外也毁宗廟而出行神出于大門及墓男子西靣婦人東靣旣封而歸殷道也孔子行之子游問曰君子行禮不求變俗夫子變之矣孔子曰非此之謂也喪事則從其質而巳矣宣公八年六月辛巳有事于太廟而東門襄仲卒壬午猶繹日又祭也繹祭之明子游見其故以問孔子曰禮與孔子曰非禮也卿卒不繹季桓子喪康子練而無衰子游問於孔子曰旣服練服可以除衰乎孔子曰無衰衣者不以見賔何以除焉邾人以同母異父之昆弟死將爲之服因顔克而問禮於孔子子曰繼父同居者則異父昆弟從爲之服不同居繼父且猶不服况其子乎齊師侵魯公叔務人子公爲昭公之遇人入保負杖而息頸上兩手掖之休息者也保縣邑見先避入齊師將入保疲倦加杖也小城務人泣曰使之雖病徭役謂時任之雖重賦税謂時君子弗能謀士弗能死不可也我則旣言之矣敢不勉乎與其鄰嬖童汪錡乘徃奔敵死焉皆殯魯人欲勿殤童汪錡問於孔子曰能執干戈以衛社稷可無殤乎魯昭公夫人吳孟子卒不赴于諸侯孔子旣致仕而徃弔焉適于季氏季氏不絰孔子投絰而不拜巳亦不成禮以季氏無故子游問曰禮與孔子曰主人未成服則吊者不絰焉禮也公父穆伯之喪敬姜晝哭文伯之喪晝夜哭孔子曰季氏之婦可謂知禮矣愛而無上下有章晝哭哭子晝夜哭哭夫與子各上謂夫下謂子也章别也哭夫也有别南宫縚之妻孔子兄之女喪其姑而誨之髽曰爾毋從從爾毋扈扈爾大也扈言䘮從從髙扈扈勑髙反髽則瓜反百無容節也縚蓋榛以爲笄長尺而總八寸者齊衰之總八寸也總束髪束髪垂為飾子張有父之䘮公明儀相焉問啓顙於孔子孔子曰拜而後啓顙頽乎其順啓顙而後拜頎乎其至也三年之䘮吾從其至也孔子在衞衞之人有送葬者而夫子觀之曰善哉爲喪乎足以爲法也小子識之子貢問曰夫子何善爾也徃也如慕其返也如疑子貢曰豈若速返而虞哉謂之虞也返葬而祭子曰此情之至者也小子識之我未之能也卞人有母死而孺子之泣者孔子曰哀則哀矣而難繼也夫禮爲可傳也爲可繼也故哭踊有節而變除有期孟獻子禫懸而不樂可御而處内子游問於孔子曰若是則過禮也孔子曰獻子可謂加於人一等矣魯人有朝祥而暮歌者子路笑之孔子曰由爾責於人終無已夫三年之喪亦以久矣子路出孔子曰又多乎哉可以歌不復又復也言其也久踰月則其善也子路問於孔子曰傷哉貧也生而無以供飬死則無以爲禮也孔子曰啜菽飲水盡其歡心斯爲之孝乎歛手足形旋葬而無槨便旋稱其財爲之禮貧何傷乎吴延陵季子聘于上國適齊於其返也其長子死於嬴博之間名也嬴博地孔子聞之曰延陵季子呉之習於禮者也徃而觀其葬焉其歛以時服而已服無所加隨冬夏之其壙掩坎深不至於泉其葬無盟器之贈旣葬其封廣輪揜坎其髙可時隱也旣封則季子乃左袒右還其封且號者三曰骨肉歸于土命也若䰟氣則無所不之則無所不之而遂行孔子曰延陵季子之禮其合矣子游問喪之具孔子曰稱家之有亡焉子游曰有亡惡於齊齊限惡何孔子曰有也則無過禮苟亡矣則歛手足形還葬懸棺而封人豈有非之者哉故夫喪亡與其哀不足而禮有餘不若禮不足而哀有餘也祭祀與其敬不足而禮有餘不若禮不足而敬有餘也伯髙死於衞赴於孔子子曰吾惡乎哭諸兄弟吾哭諸廟父之友吾哭諸廟門之外師吾哭之寢朋友吾哭之寢門之外所知吾哭之諸野今於野則已踈於寝則巳重夫由賜也而見我吾哭於賜氏遂命子貢爲之主曰爲爾哭也來者汝拜之知伯髙而來者汝勿拜旣哭使子張徃弔焉未至冉求在衞攝束帛乗馬而以將之孔子聞之曰異哉徒使我不成禮於伯髙者是冉求也子路有姊之喪可以除之矣而弗除孔子曰何不除也子路曰吾寡兄弟而弗忍也孔子曰行道之人皆弗忍先王制禮過之者俯而就之不至者企而及之子路聞之遂除之伯魚之喪母也期而猶哭夫子聞之曰誰也門人曰鯉也孔子曰嘻其甚也非禮也伯魚聞之遂除之衞公使其大夫求婚於季氏桓子問禮於孔子子曰同姓爲宗有合族之義故繋之以姓而弗别綴之以食而弗殊人之禮雖君有食族族食多少也親盡不異之雖百世㛰姻不得通周道然也桓子曰魯衞之先雖寡兄弟今已絶逺矣可乎孔子曰固非禮也夫上治祖禰以尊尊之下治子孫以親親之旁治昆弟所以教睦也此先王不易之教也有若問於孔子曰國君之於百姓如之何孔子曰皆有宗道焉故雖國君之尊猶百姓不廢其親所以崇愛也雖以族人之親而不敢戚君所以謙也不敢如其親也戚親也尊敬君曲禮子夏問第四十三子夏問於孔子曰居父母之仇如之何孔子曰寢苫枕干不仕楯干弗與共天下也遇於朝市不返兵而鬬離於身兵常不曰請問居昆弟之仇如之何孔子曰仕弗與同國衘君命而使雖遇之不鬬曰請問從昆弟之仇如之何曰不為魁主人能報之則執兵而陪其後子夏問三年之喪旣卒哭金革之事無避禮與初有司爲之乎吏職也有司當孔子曰夏后氏之喪三年旣殯而致仕殷人旣葬而致事周人旣卒哭而致事子哭之無時之哭致事還政於君也卒哭士旣葬而卒哭也大夫三月而葬三月而記曰君子不奪人之親亦不奪故也子夏曰金革之事無避非與孔子曰吾聞諸老聃曰魯公伯禽有爲爲之也義伯禽為方伯以不得不誅之伯禽有母之喪東方有戎為不公以三年之喪從利者吾弗知也子夏問於孔子曰記云周公相成王教之以世子之禮有諸孔子曰昔者成王嗣立㓜未能蒞阼周公攝政而治抗世子之法於伯禽欲王之知父子君臣之道所以善成王也夫知爲人子者然後可以爲人父知爲人臣者然後可以爲人君知事人者然後可以使人是故抗世子法於伯禽使成王知父子君臣長㓜之義焉凡君之於世子親則父也尊則君也有父之親有君之尊然後兼天下而有之不可不愼也行一物而三善皆得唯世子齒於學之謂也世子齒於學則國人觀之曰此將君我而與我齒讓何也曰有父在則禮然然而衆知父子之道矣其一曰此將君我而與我齒讓何也曰有臣在則禮然而衆知君臣之義矣其三曰此將君我而與我齒讓何也曰長長也則禮然然而衆知長㓜之節矣故父在斯爲子君在則為臣居子與臣之位所以尊君而親親也在學學之為父子焉學之爲君臣焉學之為長㓜焉父子君臣長㓜之道得而後國治語曰樂正司業父師司成成生人者師有父道一有元良萬國以貞元善太子也一謂天子也世子之謂聞之曰為人臣者殺其身而有益於君則為之况于其身大也于寛也以善其君乎周公優爲也子夏問於孔子曰居君之母與妻之喪如之何孔子曰居處言語飲食衎爾於喪所則稱其服而已敢問伯母之喪如之何孔子曰伯母叔母䟽衰期而踊不絶地姑姊妹之大功踊絶於地若知此者由文矣哉妹而已姊上長姑自也言如禮文意當言姑姊子夏問於夫子曰凡喪小功已上虞祔練祥之祭皆沐浴於三年之喪子則盡其情矣孔子曰豈徒祭而已哉三年之喪身有痬則浴首有瘡則沐病則飲酒食肉毁瘠而病君子不爲也毁則死者君子爲之無子則祭之沐浴爲齊潔也非爲飾也子夏問於孔子曰客至無所舍而夫子曰生於我乎館客死無所殯矣夫子曰於我乎殯敢問禮與仁者之心與孔子曰吾聞諸老聃曰館人使若有之惡有之惡有之而不得殯乎夫仁者制禮者也故禮者不可不省也禮不同不異不豐不殺稱其義以爲之宜故曰我戰則剋祭則受福蓋得其道矣孔子食於季氏食祭主人不辭不食亦不飲而飡子夏問曰禮也孔子曰非禮也從主人也吾食於少施氏而飽少施氏食我以禮吾食祭作而辭曰䟽食不足祭也吾飡而作辭曰䟽食不敢以傷吾子之性主人不以禮客不敢盡禮主人盡禮則客不敢不盡禮也子夏問曰官於大夫旣升於公而反爲之服禮與孔子曰管仲遇盗取二人焉上之爲公臣曰所以遊僻者可人也公許管仲卒桓公使爲之官於大夫者爲之服自管仲始也有君命焉子貢問居父母䘮孔子曰敬爲上哀次之瘠爲下顔色稱情戚容稱服曰請問居兄弟之喪孔子曰則存乎書筴已子貢問於孔子曰殷人旣定而弔於壙周人反哭而弔於家如之何孔子曰反哭之弔也喪之至也反而亡矣失之矣於斯爲甚故弔之死人卒事也殷以慤吾從周殷人旣練之明日而祔于祖周人旣卒哭之明日祔于祖祔祭神之始事也周以戚吾從殷促也戚猶子貢問曰聞諸晏子少連大連善居喪其有異稱乎孔子曰父母之喪三日不怠三月不解朞悲哀三年憂東夷之子達於禮者也子游問曰諸侯之世子喪慈母如母禮與孔子曰非禮也古者男子外有傅父内有慈母君命所使教子者也何服之有昔魯孝公少喪其母其慈母良及其死也公弗忍欲喪之有司曰禮國君慈母無服今也君爲之服是逆古之禮而亂國法也若終行之則有司將書之以示後世無乃不可乎公曰古者天子喪慈母練冠以燕居庻謂其母也子王為遂練以喪慈母喪慈母如母始則魯孝公之爲也孔子適衞遇舊館人之喪入而哭之哀出使子貢脱驂以贈之子貢曰所於識之喪不能有所贈贈於舊館不巳多乎孔子曰吾向入哭之遇一哀而出涕吾惡夫涕而無以將之小子行焉子路問於孔子曰魯大夫練而杖禮也孔子曰吾不知也子路出謂子貢曰吾以爲夫子無所不知夫子亦徒有所不知也子貢曰子所問何哉子路曰止吾將爲子問之遂趨而進曰練而杖禮與孔子曰非禮也子貢出謂子路曰子謂夫子而弗知之乎夫子徒無所不知也子問非也禮居是邦則不非其大夫叔孫毋叔之毋死既小歛舉尸者出户武孫從之出户乃袒投其冠而括髪子路歎之孔子曰是禮也子路問曰將小歛則變服今乃出戸而夫子以為知禮何也孔子曰由汝問非也君子不舉人以質士正也質猶齊晏桓子卒平仲麤衰斬苴絰帶杖以菅屨食粥居傍廬寢苫枕草其老曰非大夫喪父之禮也晏子曰唯卿大夫曽子以問孔子孔子曰晏平仲可謂能逺害矣不以已知是駮人之非愻辭以避咎義也夫者記大夫士喪父母有異亦怪也乃舉人避害之愻以辭而謂季平子卒將以君之璵璠歛贈以珠玉孔子初爲中都宰聞之歷級而救焉登階不歷級遽足聚曰送而以寶玉是猶曝尸於中原也其示民以姦利之端而有害於死者安用之且孝子不順情以危親忠臣不兆姦以䧟君之兆成也兆姦爲姦乃止孔子之弟子琴張與宗友衛齊豹見宗魯於公子孟縶孟縶以爲參乗焉及齊豹將殺孟縶告宗魯使行宗魯曰吾由子而事之今聞難而逃是僣子也子言不信僣不信使子行事乎吾將死以事周子而歸死於公孟可也齊氏用戈擊公孟宗以背蔽之斷肱中公孟宗魯皆死琴張聞宗魯死將徃弔之孔子曰齊豹之盗孟縶之賊也汝何弔焉君不食姦不受亂不爲利病於囘不以利囘邪也於邪也放而病不以囘事人不蓋非義揜蓋不犯非禮汝何弔焉琴張乃止郕人子革卒哭之呼滅人少名滅者又哭舊説以滅子蒲名以孤窮自謂亡滅也名其父不近人情疑子游曰若是哭也其野哉孔子惡野哭者哭者聞之遂改之公父文伯卒其妻妾皆行哭失聲敬姜戒之曰吾聞好外者士死之好内者女死之今吾子早殀吾惡其以好内聞也二三婦人之欲供先祀者供奉先人之祀言欲留不改嫁請無瘠色無揮涕無拊膺之拊猶撫也膺謂胷也揮涕不哭流涕以手揮無哀容無加服有降服從禮而靜是昭吾子也孔子聞之曰女智無若婦男智莫若夫公文氏之婦智矣剖情損禮欲以明其子爲令德也子路與子羔仕於衞衞有蒯聵之難孔子在魯聞之曰柴也其來由也死矣旣而衞使至曰子路死焉夫子哭之於中庭有人弔者而夫子拜之巳哭進使者而問故使者曰醢之矣遂令左右皆覆醢曰吾何忍食此季桓子死魯大夫朝服而弔子游問於孔子曰禮乎夫子不答他日又問墓而不墳孔子曰今丘也東西南北之人不可以弗識也吾見封之若堂者矣若髙者堂形四方又見若坊者矣平上而長坊形殺殺又見履夏屋者矣又見若斧形者矣吾從斧者焉於是封之崇四尺孔子先反虞門人後雨甚至墓崩修之而歸孔子問焉曰爾來何遲對曰防墓崩孔子不應三云孔子泫然而流涕曰吾聞之古不修墓及二十五月而大祥五日而彈琴不成聲十日過禫而成笙歌大祥孔子日踚月而歌也􅊨二十五月禫故十孔子有母之喪旣練陽虎弔焉私於孔子曰今季氏將大饗境内之士子聞諸孔子答曰丘弗聞也若聞之雖在衰絰亦欲與徃陽虎曰子謂不然乎季氏饗士不及子也陽虎出曽點問曰吾之何謂也孔子曰巳則衰服猶應其言示所以不非也衰服孔子之以示不非其言者也陽虎之言犯禮故孔子答顔囘死魯定公弔焉使人訪於孔子孔子對曰凡在封内皆臣子也禮君弔其臣升自東階向尸而哭其恩賜之施不有笇也計也又竹器也笇蘇亂反笇原思言於曽子曰夏后氏之送葬也用盟器示民無知也殷人用祭器示民有知也周人兼而用之示民疑也曽子曰其不然矣夫以盟器鬼器也祭器人器也古之人胡為而死其親也子游問於孔子曰之死而致死乎不仁不可爲也之死而致生乎不智不可爲也凡爲盟器者知喪道也夫子始死則矣羔裘玄冠者易之而巳汝何疑焉子罕問於孔子曰始死之設重也何爲孔子曰重主道也殷主綴重焉作主而連其綴連也殷人廟也重懸諸周人徹重焉就所倚處而治周人作主徹重請問䘮朝廟而後行焉䘮將葬朝於子曰䘮之朝也順死者之孝心故至於祖者廟而後行殷朝而後殯於祖周朝而後遂葬孔子之守狗死謂子貢曰路馬死所乘馬路馬常則藏之以帷狗則藏之以蓋汝徃埋之吾聞弊幃不棄爲埋馬也弊蓋不棄爲埋狗也今吾貧無蓋於其封也與之蓆無使其首䧟於土焉曲禮公西赤問第四十四公西赤問於孔子曰大夫以罪免卒其葬也如之何孔子曰大夫廢其事終身不仕死則葬之以士禮老而政仕者死則從其列公儀仲子嫡子死而立其弟檀弓問子服伯子曰何居我未之前聞也子服伯子曰仲子亦猶行古人之道昔者文王捨伯邑考文王亦立子而不立孫也伯邑考文王之長子也言而立武王微子捨其孫腯立其弟衍子游以聞諸孔子子曰否周制立孫孔子之母旣葬將立葬焉曰古者不祔葬爲不忍先死者之復見也詩云死則同穴自周公已來祔葬矣故衛人之祔也離之有以聞焉魯人之祔也合之美夫吾從魯遂合葬於防曰吾聞之有備物而不可用也是故竹不成用無縁也謂籩之而瓦不成膝鑌膝琴瑟張而不平笙竽備而不和有鐘磬而無簨簴簨先尹反簴其舉反簨簴可以懸鐘磬也其曰盟器神明之也哀哉死者而用生者之器不殆而用殉也死謂之殉殺人以從子游問於孔子曰葬者塗車芻靈自古有之然今人或有偶人也偶亦是無益於䘮孔子曰爲芻靈者善矣爲偶者不仁不殆於用人乎顔淵之喪旣祥顔路饋祥肉於孔子孔子自出而受之入彈琴以散情而後乃食之孔子嘗奉薦而進祭也嘗秋其親也慤奉薦也慤親之也慈質其行也趨趨以數威儀言少已祭子貢問曰夫子之言祭也濟濟􅃮􅃮焉容止威儀今夫子路爲季氏宰季氏祭逮昏而奠終日不足繼以燭雖有彊力之容肅敬之心皆倦怠矣有司跛倚以臨其爲不敬也大矣他日子路與焉室事交于戸堂事當于階質明而始行事晏朝而徹孔子聞之曰孰爲士也而不知禮孔子家語卷第十用書黃周賢金賢刻終歳申寅端陽朢吳峕道光甲午孟冬耕蘭氏校, WYG: ''}
