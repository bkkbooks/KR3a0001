body:
  text: 孔子家語卷第七觀鄉射第二十八孔子觀於鄉射喟然歎曰射之以禮樂也何以射何以聴修身而發而不失正鵠者其唯賢者乎射者也正鵠所若夫不肖之人則將安能以求飲詩云發彼有的以祈爾爵實的飲爾爵也勝者飲不勝者也祈求也言發中的以求祈求也求所中以辭爵辭爵也中陟仲反飲彼則已不飲故曰以酒者所以養老所以養病也求中以辭爵辭其養也是故士使之射而弗能則辭以病懸弧之義射事也而今不能射唯病可以為辭也弧弓也男子生則懸弧於其門明必有於是退而與門人習射於矍相之圃蓋觀者如堵墙焉射至於司馬使子路執弓矢出列延謂射之者曰至使子路出延射子路為司馬故射奔軍之將亡國之大夫與為人後者不得入故曰與為人後世也人已有後而又為人後其餘皆入蓋去者半又使公罔之裘序點揚觶而語曰射鄉先行觶觶支義切飲酒故二人揚㓜壯孝悌耆老好禮報切好呼不從流俗修身以俟死者在此位蓋去者半序點揚觶而語曰好學不倦好禮不變耄期稱道而不亂者此位耄言雖老而八十九十曰而不亂也能稱解道蓋僅有存焉射旣闋子路進曰由與二三子者之爲司馬何如孔子曰能用命矣孔子曰吾觀於鄉而知王道之易易也以易反豉主人親速賔及介而衆賔從之召速至於正門之外主人拜賔及介而衆自入貴賤之義别矣列反别彼三揖至於階三讓以賔升拜至獻酬辭譲之節繁及介升則省矣至于衆賔升而受爵坐祭立飲不酢而降殺之義辯矣戒反殺所工入升歌三終主人獻賔入三終主又獻之是也歌鹿鳴四牡皇皇記曰主人獻之於義不得為賔也下句笙人乃獻之是也者華三篇終主笙入三終主人又獻之南吹篇終主人獻也陔白華華黍三間歌三終歌南有嘉魚笙乃歌魚麗由庚臺笙由餘者也崇丘歌南山有合樂三闋歌周南召南三合笙聲同其音也篇工告樂備而遂出遂出自此至去不復樂正旣告備而降言也升一人揚觶乃立司正焉使一人揚觶乃賔將欲去故復儀請安賔也立司正主威知其能和樂而不流洺樂音賔酬主人主人酬介介酬衆賔賔少長以齒照切少詩終於沃洗者焉知其能弟長而無遺矣丈反長丁降脱屨升座修爵無筭飲酒之節旰不廢朝暮不廢夕罷旰古旦反旰晨飲早哺廢賔出主人拜送節文終遂焉知其能安燕而不亂也貴賤旣明降殺旣辯和樂而不流弟長而無遺安燕而不亂此五者足以正身安國矣彼國安而天下安矣故曰吾觀於鄉而知王道之易易也豉反易以子貢觀於蜡而祀之今之臘也蜡助駕蜡索也歳十有二月索羣神反孔子曰賜也樂乎洛樂音對曰一國之人皆若狂亂也言醉賜未知其爲樂也孔子曰百日之勞一日之樂一日之澤非爾所知也一日使之飲酒焉樂之是君之恩澤也古民皆勤苦稼穡有百日之勞喻久也今張而不弛文武弗能弛而不張文武弗爲一張一弛文武之道也氏反弛施郊問第二十九定公問於孔子曰古之帝王必郊祀其祖以配天何也孔子對曰萬物本於天人本乎祖郊之祭也大報本反始也故以配上帝天垂象聖人則之郊所以明天道也公曰寡人聞郊而莫同何也孔子曰郊之祭也迎長日之至也月冬日至而日長周人始以日至之大報天而主日配以月故周之始郊其月以日至其日用上辛至於啓蟄之月則又祈榖于上帝春之月乃以元日祈榖于上帝兼祈求也為農祈榖于上帝月令孟春秋傳曰夫郊祀后稷以祈農事也是故無仲冬大郊之事至於祈農與天子同故禮之指歸皮膚妄說至乃顚倒神祗變易啓蟄而郊郊而後耕而説學者不知推經良可痛心者也時日遷改兆位此二者天子之禮也魯無冬至大郊之事降殺於天子是以不同也公曰其言郊何也孔子曰兆正於南所以就陽位也於郊故謂之郊焉之圓丘兆之兆丘於南謂以象天自然故謂之圓丘圓丘之人所造於南郊也然則郊之名有三焉築為圓丘與圓丘異若是則詩易尚書謂不圜丘也故謂之泰壇於南郊在南說學者謂南郊圜丘虛妄之言皆不通典制也又不通泰壇之名或乃謂周官曰其牲器何如孔子曰上帝之牛角蠒栗必在滌三月養牲具滌所以后稷之牛唯具芻之三月配天别祀稷時牲亦唯具之也之時獻故所以别事天神與人鬼也列切别彼牲用騂尚赤也用犢貴誠也誠之美也犢質慤貴掃地而祭於其質也而祭貴其質也地圜丘之地掃焉器用陶匏以象天地之性也之故取天地之性人之作物無可稱然也以自萬物無可稱之者故因其自然之體也公曰天子之郊其禮儀可得聞乎孔子對曰臣聞天子卜郊則受命于祖廟而作龜于禰宫命於祖而作龜於父廟禰宫父廟也受祭天之尊祖親考之義也卜之日王親立于澤宫以聴誓命受教諌之義也行威儀也王親受之故澤宫宫也誓命祭天所諫之義曰受教旣卜獻命庫門之内所以誡百官也將郊則天子皮弁以聴報示民嚴上也以待白祭事後服袞報白也王夙興朝服郊之日喪者不敢哭凶服者不敢入國門汜埽清路行者必止新土無復行之汜遍也清路以弗命而民聴敬之至也王以之不令而行之也恭敬事天故民化天子大裘以黼之被衮象天天之文故被之道路至大壇而脱之大裘為黼文也言被之大裘其有象乗素車貴其質也旂十有二旒龍章而設以日月所以法天也旣至泰壇王脱裘矣服衮以臨燔柴戴冕璪十有二旒則天數也臣聞之誦詩三百不足以一獻小祀祭群一獻之禮不足以大饗祭天王大饗祫大饗之禮不足以大旅五帝也大旅祭大旅具矣不足以饗帝祭天饗帝是以君子無敢輕議於禮者也五刑解第三十冉有問於孔子曰古者三皇五帝不用五刑信乎孔子曰聖人之設防貴其不犯也制五刑而不用所以為至治也凡夫之為姦邪竊盜靡法妄行者生於不足不足生於無度無度則小者偷盗大者侈靡各不知節是以上有制度則民知所止民知所止則不犯故雖有姦邪賊盜靡法妄行之嶽而無陷刑之民不孝者生於不仁不仁者生於喪祭之禮明喪祭之禮所以教仁愛也能教仁愛則喪思慕祭祀不解人子饋養之道生時饋養之道同之也言孝子奉祭祀不敢解喪祭之禮明則民孝矣故雖有不孝之獄而無陷刑之民殺上者生於不義義所以别貴賤明尊卑也貴賤有别尊卑有序則民莫不尊上而敬長朝聘之禮者所以明義也義必明則民不犯故雖有殺上之獄而無陷刑之民鬬變者生於相陵相陵者生於長㓜無序而遺敬讓遺忘鄉飲酒之禮者所以明長幼之序而崇敬讓也長幼必序民懷敬譲故雖有鬬變之獄而無陷刑之民淫亂者生於男女無别男女無别則夫婦失義禮聘享者所以别男女明夫婦之義也男女旣别夫婦既明故雖有淫亂之獄而無陷刑之民此五者刑罰之所以生各有源焉不豫塞其源而輙繩之以刑是謂為民設穽而陷之刑罰之源生於嗜慾不節夫禮度者所以禦民之嗜慾而明好惡順天之道禮度既陳五教畢修而民猶或未化尚必明其法典以申固之令固其教尚猶也申也其犯姦邪靡法妄行之獄者則飭制量之度有犯不孝之獄者則飭喪祭之禮有犯殺上之獄者則飭朝覲之禮有犯鬬變之獄者則飭鄉飲酒之禮有犯淫亂之獄者則飭婚聘之禮三皇五帝之所化民者如此雖有五刑之用不亦可乎孔子曰大罪有五而殺人為下逆天地者罪及五世誣文武者罪及四世逆人倫者罪及三世謀鬼神者罪及二世手殺人者罪及其身故曰大罪有五而殺人為下矣冉有問於孔子曰先王制法使刑不上於大夫禮不下於庶人然則大夫犯罪不可以加刑庶人之行事不可以治於禮乎孔子曰不然凡治君子以禮御其心所以屬之以廉耻之節也故古之大夫其有坐不廉汙穢而退放之者不謂之不廉汙穢而退放則曰簠簋不飭齊也飭整有坐淫亂男女無别者不謂之淫亂男女無别則曰帷幕不修也有坐罔上不忠者不謂之罔上不忠則曰臣節未著有坐罷軟不勝任者不謂之罷軟不勝任則曰下官不職官不稱言其下斥其身也移其職不有坐干國之紀者不謂之干國之紀則曰行事不請而擅行言不請此五者大夫旣自定有罪名矣而猶不忍斥然正以呼之也旣而爲之諱所以愧耻之是故大夫之罪其在五刑之域者聞而譴發也發始譴譴譲露發則白冠釐纓盤水加劍造乎闕而自請罪君不使有司執縳牽掣而加之也其有大罪者聞命則北面再拜跪而自裁君不使人捽引而刑殺没反捽昨曰子大夫自取之耳吾遇子有禮矣以刑不上大夫而大夫亦不失其罪者教使然也所謂禮不下庶人者以庶人遽其事而不能充禮故不責之以備禮也冉有跪然免席曰言則美矣求未之聞退而記之刑政第三十一仲弓問於孔子曰雍聞至刑無所用政至政無所用刑至刑無所用政桀紂之世是也至政無所用刑成康之世是也信乎孔子曰聖人之治化也必刑政相參焉太上以徳教民而以禮齊之其次以政言導民以刑禁之刑不刑也化之弗變導之弗從傷義以敗俗於是乎用刑矣顓五刑必即天倫倫謂合天意即就也就天行刑罰則輕無赦罰之行刑得作威作福官雖輕猶不刑侀也侀成也壹成而不可更故君子盡心焉行反更古仲弓曰古之聽訟尤罰麗於事不以其心可得聞乎麗附也尤過也相當而不與其心也怪遇人罰之必以事孔子曰凡聴五刑之訟必原父子之情立君臣之義以權之意論輕重之序慎測淺深之量以别之列反别彼悉其聰明正其忠愛以盡之大司寇正刑明辟以察獄獄必三訊焉曰訊群吏三曰一曰訊群臣二民也訊萬有指無簡則不聴也其誠者不論以簡誠也有意無也爲罪附從輕赦從重赦人之罪以重為比附人之罪以輕為比疑獄則泛與衆共之疑則赦之皆以小大之比成也志反比毗是故爵人必於朝與衆共之也刑人必於市與衆棄之也古者公家不畜刑人大夫弗養也士遇之塗以弗與之言屏諸四方唯其所之不及與政弗欲生之也仲弓曰聴獄獄之成成何官孔子曰成獄成於吏吏以獄成告於正吏正獄吏獄官長官正旣聴之乃告大司寇聴之乃奉於王王命三公卿士叅聴棘木之下九棘孤卿外朝法左子男位焉面三槐三公位大夫位焉右九棘公侯伯然後乃以獄之成疑于王王三宥之以聴命罪雖以定猶君王尚寛宥然後刑之者也三宥之不可得輕而制刑焉所以重之也仲弓曰其禁何禁孔子曰巧言破律法令巧賣也者遁名改作物名也變言與執左道與亂政者殺亂也左道作淫聲亂人之聲淫逆也惑造異服常見非所設伎奇器以蕩上心者殺懼人心之器蕩動怪異之伎可以眩行偽而堅也行下孟反行詐偽而守之堅言詐而辯學非而博順非而澤而滑澤順其非以惑衆者殺假於鬼神時日卜筮以疑衆者殺此四誅者不以聴木之下不聴棘仲弓曰其禁盡於此而已孔子曰此其急者其餘禁者十有四焉命服命車不粥於市余六反粥賣粥珪璋璧琮不粥於市宗廟之器不粥於市兵車旍旗不粥於市犧牲秬鬯不粥於市戎器兵甲不粥於市用器不中度仲反中陟不粥於市布帛精麤不中數廣狹不中量不粥於市姦色亂正色不粥於市文錦珠玉之器雕飾靡麗不粥於市衣服飲食不粥於市非侈必偽賣成衣服食所以厲取也故禁之禁賣熟菓實不時不粥於市五木不中伐不粥於市鳥獸魚鼈不中殺不粥於市凡執此禁以齊衆者不赦過也禮運第三十二孔子為魯司寇與於蜡旣賔事畢之事也畢賔客乃出遊於觀之上所謂象魏者也觀宫門外闕周禮喟然而嘆言偃侍曰夫子何嘆也孔子曰昔大道之行時大道行也此謂三皇五帝與三代之英謂禹英秀武也湯文吾未之逮也而有記焉大道之行天下為公選賢與能講信修睦也睦親也講習也修行故人不獨親其親不獨子其子天下為公所謂大道老有所終壯有所用矜寡孤疾皆有所養貨惡其棄於地不必藏於己力惡其不出於身不必為人身不以為徳恵也言力惡其不出於是以姦謀閉而不興盜竊亂賊不作故外户而不閉謂之大同今大道旣隠天下為家各親其親各子其子貨則為己力則為人大人世及以為常城郭溝池以為固禹湯文武成王周公由此而選為之選也言用禮義未有不謹於禮禮之所興與天地並如有不由禮而在位者則以為殃言偃復問曰如此乎禮之急也孔子曰夫禮先王所以承天之道以治人之情列其鬼神達於喪祭鄉射冠㛰朝聘故聖人以禮示之則天下國家可得以禮正矣言偃曰今之在位莫知由禮何也孔子曰嗚呼哀哉我觀周道幽厲傷也皆傷周道也幽厲二王者吾捨魯何適風猶勝諸國魯有聖人之也夫魯之郊及禘皆非禮而亡其義言失於禮周公其已衰矣行其禮義子孫不能𣏌之郊也禹本郊鯀𣏌夏后徳故令𣏌郊禹周公以鯀非令宋之郊也契是天子之事守也天子以𣏌宋二王之後周公攝政致太平而與天子同是禮也諸侯祭社稷宗廟上下皆奉其典而祝嘏莫敢易其常法是謂大嘉今使祝嘏辭説徒藏於宗祝巫史非禮也辭説之意議也言君臣皆當知是謂幽國於禮幽敝醆斚及尸君非禮也者之後則尸與君不夏曰醆殷曰斚非王用得是謂僭君之君僭侈冕弁兵車藏於私家非禮也子諸侯大夫冕弁服歸設奠後此謂大夫稱家冕弁大夫之服孔子曰天藏之也不得賜而是謂脅君其君迫於大夫具官祭器不假聲樂皆具非禮也祭器今皆不假故大夫無田者不為禮非是為亂國故仕於公曰臣仕於家曰僕三年之喪與新有㛰者朞不使也以衰嘗入朝與家僕雜居齊齒非禮也是謂臣與君共國天子有田以處其子孫諸侯有國以處其子孫大夫有采以處其子孫是謂制度天子適諸侯必舍其宗廟而不禮籍入告其鬼神以將入止也所謂臨諸侯將舍宗廟先是謂天子壞法亂紀諸侯非問疾弔喪而入諸臣之家是謂君臣為謔戯謔夫禮者君之柄秉持柄亦所以别嫌明㣲儐鬼神考制度列仁義立政事之制度其能爲人此聖人所以藏身之固也以此藏身固則聖人參於天地並於鬼神以治政也處其所存禮之序也翫其所樂民之治也聖言常所玩樂者民之治安也人常所存處者禮之次序天生時地生財人其父生而師教之四者君以政用之所以立於無過之地而師以教之君以政用時及財天地之所以生於無過之地也之而已故常立君者人所明非明人者也人所養非養人者也人所事非事人者也夫君者明人則有過而已則過謬也爲君徒欲明人故養人則不足能為民所養時君失政不事人則失位故百姓明君以自治養君以自安事君以自顯是以禮達而分定人皆愛其死而患其生患其生之無禮也人皆愛惜其死而是故用人之智去其詐用人之勇去其怒用人之仁去其貪國有患君死社稷爲之義大夫死宗廟爲之變廟者其死宗廟者權變為也大夫有去就之義未必常死宗凡聖人能以天下為一家以中國為一人非意之以非有致之也意貪之必必知其情從於其義明於其利達於其患然後為之何謂人情喜怒哀懼愛惡欲七者弗學而能何謂人義父慈子孝兄良弟悌夫義婦聴長恵㓜順君仁臣忠十者謂之人義講信修睦謂之人利爭奪相殺謂之人患聖人之所以治人七情脩十義講信脩睦尚辭譲去爭奪舍禮何以治之飲食男女人之大欲存焉死亡貧苦人之大惡存焉欲惡者人之大端人藏其心不可測度美惡皆在其心不見其色欲一以窮之舍禮何以哉故人者天地之徳隂陽之交鬼神之會五行之秀天秉陽垂日星地秉隂載於山川播五行於四時和四氣而後月生五行和四時四氣而後月生而後四時行焉布焉月生是以三五而盈三五而缺常滿故十月隂道不五日缺也五日滿十五行之動共相竭也用事盡則竭盡也水事更相盡也木用事五行用五行四氣十二月還相為本為本也用事者五聲五律十二管還相為宫聲五月一管陽律隂吕其用事為宫也者宫商角徴羽也管十二月也一五味六和十二食還相為質和者和之各有宜者五味酸苦酸辛甘六二食者十二月之食質本也春多酸秋多辛之屬是也十五色六章十二衣還相為主曰水無當於五色五色不五色者青赤白黑黃學記待水而章也得不彰五色故人者天地之心如五藏之於天地間靈心五藏最聖也有心矣人有生最而五行之端用五行也端始也能食味别聲被色而生者聖人作則則法作為必以天地為本以隂陽為端以四時為柄以日星為紀月以為量鬼神以為徒五行以為質禮義以為器人情以為田四靈以為畜以天地為本故物可舉物苞在於其中天地為本則萬以隂陽為端故情可睹為情始隂陽之以四時為柄故事可勸事可得而勸也四時各有事故以日星為紀故業可别故事可得而分别也日以紀晝星以紀夜月以為量故功有藝業各有分理也藝猶理有度量以成四時猶功鬼神以為徒故事有守干各有守鬼神不相五行以為質故事可復也故事可修復也五行終則復始禮義以為器故事行有考成考人情以為田四靈以為畜靈四畜則飲食可用鳥獸之長四靈爲何謂四靈麟鳳龜龍謂之四靈故龍以為畜而魚鮪不諗藏也諗潛鳳以為畜而鳥不􅖬麟以為畜而獸不狘飛䎀况必反况越反飛走之貌也􅖬龜以為畜而人情不失亹者莫善於蓍龜人情不失也易曰定天下之吉凶成天下之亹先王秉蓍龜列祭祀瘞繒宣祝嘏繒謂若増封太瘞謂祭祀之瘞列反繒慈陵反嘏舉下反山宣謂播宣揚之瘞於設制度祝嘏辭說故國有禮官有御也治職有序先王患禮之不達於下故饗帝于郊所以定天位也祀社於國所以列地利也禘祖廟所以本仁也旅山川所以儐鬼神也祭五祀所以本事也故宗祝在廟三公在朝三老在學老在學王養三王前巫而後史卜蓍瞽侑皆在左右王中心無爲也以守至正是以禮行于郊而百神受職禮行於社而百貨可極禮行於祖廟而孝慈服焉逺近所服焉孝慈之道為禮行於五祀而正法則焉故郊社宗廟山川五祀義之脩而禮之藏寶藏言禮之夫禮必本於太一元氣也太一者分而為天地轉而為隂陽變而為四時列而為鬼神其降曰命為命降即上所祖廟也於天地其官於天也分皆從天下來也官為職分也言禮職協於分藝理藝其居於人也曰養人身所以言禮之於人也養成所以講信修睦而固人之肌膚之會筋骸之束者所以養生送死事鬼神之大端所以達天道順人情之大竇唯聖人為知禮之不可以已也故破國喪家亡人必先去其禮禮之於人猶酒之有蘖也君子以厚小人以薄聖人脩義之柄禮之序以治人情人情者聖王之田也修禮以耕之陳義以種之講學以耨之穢也耨除本仁以聚之播樂以安之故禮者義之實也協諸義而協則禮雖先王未有可以義起焉義者藝之分仁之節協於藝講於仁得之者强失之者喪仁者義之本順之體得之者尊故治國不以禮猶無耜而耕為禮而不本於義猶耕之而弗種為而不講於學猶種而弗耨講之以學而不合以仁猶耨而不穫合之以仁而不安之以樂猶穫而弗食安之以樂而不達於順猶食而不肥四體旣正膚革充盈人之肥也父子篤兄弟睦夫婦和家之肥也大臣法小臣廉官職相序君臣相正國之肥也天子以徳為車以樂為御諸侯以禮相與大夫以法相序士以信相考百姓以睦相守天下之肥也是謂大順順者所以養生送死事鬼神之常也故事大積焉而不苑積也苑滯並行而不謬細行而不失深而通茂而有間理也言有連而不相及叙也言有動而不相害此順之至也明於順然後乃能守危以長守危高而不危夫禮之不同不豐殺所以持情而合危也安也合禮山者不使居川渚者不使居原用水火金木飲食必時火季春岀火季秋納火也用金以用水漁人以時入澤粱乃漑灌用林飲食各隨四時之宜者也時采銅鐵用木斧斤以時入山冬合男女春頒爵位必當年徳皆所順也用民必順使民悦以故無水旱昆蟲之災民無凶饑妖孽之疾天不愛其道地不愛其寶人不愛其情是以天降甘露地出醴泉山出器車銀出及象車也甕丹竈之器河出馬圗負圖出龍似馬鳳凰麒麟皆在郊掫龜龍在宫沼其餘鳥獸及卵胎皆可俯而窺也則是無故先王能循禮以達義體信以達順此順之實也孔子家語卷第七
