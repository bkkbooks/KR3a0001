body:
  text: 五刑解第三十冉有問於孔子曰古者三皇五帝不用五刑信乎孔子曰聖人之設防貴其不犯也制五刑而不用所以為至治也凡民之為姦邪竊盜靡法妄行者生於不足不足生於無度無度則小者偷惰大者侈靡各不知節是以上有制度則民知所止民知所止則不犯故雖有姦邪賊盜靡法妄行之獄而無陷刑之民不孝者生於不仁不仁者生於喪祭之禮也明喪祭之禮所以教仁愛也能致仁愛則服喪思慕祭祀不解人子饋養之道喪祭之禮明則民孝矣故雖有不孝之獄而無陷刑之民殺上者生於不義義所以別貴賤明尊卑也貴賤有別尊卑有序則民莫不尊上而敬長朝聘之禮者所以明義也義必明則民不犯故雖有殺上之獄而無陷民之刑鬭變者生於相陵相陵者生於長幼無序而遺敬讓鄉飲酒之禮者所以明長幼之序而崇敬讓也長幼必序民懷敬讓故雖有變鬭之獄而無陷刑之民淫亂者生於男女無別男女無別則夫婦失義婚姻聘享者所以別男女明夫婦之義也男女既別夫婦既明故雖有淫亂之獄而無陷刑之民此五者刑罰之所從生各有源焉不豫塞其源而輒繩之以刑是謂為民設穽而陷之也刑罰之源生於嗜慾不節夫禮度者所以禦民之嗜慾而明好惡順天道禮度既陳五教畢修而民猶或未化尚必明其法典以申固之其犯姦邪靡法妄行之獄者則飭制量之度有犯不孝之獄者則飭喪祭之禮有犯殺上之獄者則飭朝覲之禮有犯鬭變之獄者則飭鄉飲酒之禮有犯婬亂之獄者則飭婚聘之禮三皇五帝之所化民者如此雖有五刑之用不亦可乎孔子曰大罪有五而殺人為下逆天地者罪及五世誣文武者罪及四世逆人倫者罪及三世謀鬼神者罪及二世手殺人者罪止其身故曰大罪有五而殺人為下矣冉有問於孔子曰先王制法使刑不上於大夫禮不下於庶人然則大夫犯罪不可以加刑庶人之行事不可以治於禮乎孔子曰不然凡治君子以禮御其心所以屬之以廉恥之節也故古之大夫其有坐不廉汙穢而退放之者不謂之不廉汙穢而退放則曰簠簋不飭有坐婬亂男女無別者不謂之婬亂男女無別則曰帷幕不修也有坐罔上不忠者不謂之罔上不忠則曰臣節未著有坐罷軟不勝任者不謂之罷軟不勝任則曰下官不職有坐干國之紀者不謂之干國之紀則曰行事不請此五者大夫既自定有罪名矣而猶不忍斥然正以呼之也既而為之諱所以媿恥之是故大夫之罪其在五刑之域者聞而譴發則白冠釐纓盤水加劍造乎闕而自請罪君不使有司執縛牽掣而加之也其有大罪者聞命則北面再拜跪而自裁君不使人捽引而刑殺之也曰子大夫自取之耳吾遇子有禮矣以刑不上大夫而大夫亦不失其罪者教使然也凡所謂禮不下庶人者以庶人遽其事而不能充禮故不責之以備禮也冉求跪然免席曰言則美矣求未之聞退而記之
