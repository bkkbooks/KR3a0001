body:
  text: 觀鄉射第二十八孔子觀於鄉射喟然歎曰射之以樂也何以射何以聽循聲而發不失正鵠者其唯賢者乎若夫不肖之人則將安能以求飲詩云發彼有的以祈爾爵祈求也求所中以辭爵也酒者所以養老也所以養病也求中以辭爵者辭其養也是故士使之射而弗能則辭以病懸弧之義也於是退而與門人習射於矍相之圃蓋觀者如牆堵焉試射至於司馬使子路執弓矢出列延謂射之者曰奔軍之將亡國之大夫與為人後不得入其餘皆入蓋去者半又使公罔之裘序點揚觶而語曰幼壯孝弟耆老好禮不從流俗脩身以俟死者不在此位也蓋去者半序點又揚觶而語曰好學不倦好禮不變耄期稱道而不亂者則在此位蓋僅有存焉射既闋子路進曰由與二三子者之為司馬何如孔子曰能用命矣孔子曰吾觀於鄉而知王道之易易也主人親速賓及介而眾賓皆從之至於正門之外主人拜賓及介而眾賓自入貴賤之義別矣三揖至於階三讓以賓升拜至獻酬辭讓之節繁及介升則省矣至于眾賓升而受爵坐祭立飲不酢而降隆殺之義辨矣工入升歌三終主人獻賓笙入三終主人又獻之間歌三終合樂三闋工告樂備而遂出一人揚觶乃立司正焉知其能和樂而不流也賓酬主人主人酬介介酬眾賓少長以齒終於沃洗者焉知其能弟長而無遺矣降脫履升座脩爵無算飲酒之節旰不廢朝暮不廢夕賓出主人迎送節文終遂焉知其能安燕而不亂也貴賤既明降殺既辨和樂而不流弟長而無遺安燕而不亂此五者足以正身安國矣彼國安而天下安矣故曰吾觀於鄉而知王道之易易也子貢觀於蜡孔子曰賜也樂乎對曰一國之人皆若狂賜未知其為樂也孔子曰百日之勞一日之樂百日之蜡一日之澤非爾所知也張而不弛文武弗能也弛而不張文武弗為也一張一弛文武之道也
