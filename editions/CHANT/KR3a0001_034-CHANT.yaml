body:
  text: 廟制第三十四衛將軍文子將立先君之廟於其家使子羔訪於孔子子曰公廟設於私家非古禮之所及吾弗知子羔曰敢問尊卑上下立廟之制可得而聞乎孔子曰天下有王分地建國設祖宗乃為親踈貴賤多少之數是故天子立七廟三昭三穆與太祖之廟而七太祖近廟皆月祭之遠廟為祧有二祧焉享嘗乃止諸侯立五廟二昭二穆與太祖之廟而五祖考廟享嘗乃止大夫立三廟一昭一穆與太祖之廟而三享嘗乃止士立一廟曰考廟王考無廟合而享嘗乃止庶人無廟四時祭於寢此自有虞以至于周之所不變也凡四代帝王之所謂郊者皆以配天其所謂禘者皆五年大祭之所及也應為太祖者則其廟不毀不及太祖雖在禘郊其廟則毀矣古者祖有功而宗有德諸見祖宗者其廟皆不毀子羔問曰祭典云虞氏祖顓頊而宗堯夏后氏亦祖顓頊而宗禹殷人祖契而宗湯周人祖文王而宗武王此四祖四宗或乃異代或其考祖之有功德其廟可也若有虞宗堯夏祖顓頊皆異代之有功德者也亦可以存其廟乎孔子曰善如汝所問也如殷周之祖宗其廟可以不毀其他祖宗者功德不殊雖在殊代亦可以無疑矣詩云蔽茀甘棠勿翦勿伐邵伯所憩周人之於邵公也愛其人猶敬其所舍之樹況祖宗其功德而可以不尊奉其廟焉
