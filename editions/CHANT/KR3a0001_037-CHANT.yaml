body:
  text: 屈節解第三十七子路問於孔子曰由聞丈夫居世富貴不能有益於物處貧賤之地而不能屈節以求伸則不足以論乎人之域矣孔子曰君子之行己其於必達於己可以屈則屈可以伸則伸故屈節者所以有待求伸者所以及時是以雖受屈而不毀其節志達而不犯於義孔子在衛聞齊國田常將欲為亂而憚鮑晏因欲移其兵以伐魯孔子會諸弟子而告之曰魯父母之國不可不救不忍視其受敵今吾欲屈節於田常以救魯二三子誰為使於是子路請往焉孔子弗許子張請往又弗許子石請往又弗許三子退謂子貢曰今夫子欲屈節以救父母之國吾三人請使而不獲往此則吾子用辯之時也吾子盍請行焉子貢請使夫子許之遂如齊說田常曰今子欲收功於魯實難不若移兵於吳則易田常不悅子貢曰夫憂在內者攻強憂在外者攻弱吾聞子三封而三不成者是則大臣不聽令戰勝以驕主破國以尊臣而子之功不與焉則交日䟽於主而與大臣爭如此則子之位危矣田常曰善然兵業已加魯矣不可更如何子貢曰緩師吾請救於吳令救魯而伐齊子因以兵迎之田常許諾子貢遂南說吳王曰王者不滅國霸者無強敵千鈞之重加銖兩而移今以齊國而私千乘之魯與吳爭強甚為王患之且夫救魯以顯名以撫泗上諸侯誅暴齊以服晉利莫大焉名存亡魯實困強齊智者不疑吳王曰善然吳常困越越王今苦身養士有報吳之心子待我伐越然後乃可子貢曰越之勁不過魯吳之強不過齊而王置齊而伐越則齊以私魯矣王方以存亡繼絕為名棄強齊而伐小越非勇也勇者不避難仁者不窮約智者不失時義者不絕世今存越示天下以仁救魯伐齊威加晉國諸侯必相率而朝吳霸業盛矣且王必惡越臣請見越君令出兵以從此則實害越而名從諸侯以伐齊吳王悅乃遣子貢之越越王郊迎而自為子貢御曰此蠻夷之國大夫何足儼然辱而臨之子貢曰今者吾說吳王以救魯伐齊其志欲之而心畏越曰待我伐越乃可此則破越必矣且無報人之志而令人疑之拙矣有報人之意而使人知之殆矣事未發而先聞者危矣三者舉事之患也勾踐頓首曰孤嘗不料力而興吳難受困會稽痛於骨髓日夜焦唇乾舌徒欲與吳王接踵而死孤之願也今大夫幸告以利害子貢曰吳王為人猛暴群臣不堪國家疲弊百姓怨上大臣內變申胥以諫死大宰嚭用事此則報吳之時也王誠能發卒佐之以邀射其志而重寶以悅其心卑辭以尊其禮則其伐齊必矣此聖人所謂屈節求其達者也彼戰不勝王之福矣若勝則必以兵臨晉臣還北請見晉君共攻之其弱吳必矣銳兵盡於齊重甲困於晉而王制其弊焉越王頓首許諾子貢反五日越使大夫文種頓首言於吳王曰越悉境內之士三千人以事吳吳王告子貢曰越王欲身從寡人伐齊可乎子貢曰不可悉人之眾又從其君非義也吳王乃受越王卒謝留勾踐遂自發國內之兵以伐齊敗之子貢遂北見晉君令承其弊吳晉遂遇於黃池越王襲吳之國吳王歸與越戰滅焉孔子曰夫其亂齊存魯吾之始願若能強晉以弊吳使吳亡而越霸者賜之說也美言傷信慎言哉孔子弟子有宓子賤者仕於魯為單父宰恐魯君之聽讒言使己不得行其政也於是辭行故請君之近史二人與之俱至官宓子戒其邑吏令二史書方將書輒掣其肘書不善則從而怒之二史患之辭請歸魯宓子曰子之書甚不善子勉而歸矣二史歸報於君曰宓子使臣書而掣臣肘書惡而又怒臣邑吏皆笑之此臣所以去之而來也魯君以問孔子子曰宓不齊君子也其才任霸王之佐屈節治單父將以自試也意者以此為諫乎公寤太息而歎曰此諫寡人之不肖寡人亂宓子之政而責其善者數矣微二吏寡人無以知其過微夫子寡人無以自寤遽發所愛之使告宓子曰自今已往單父非吾有也從子之制有便於民者子決為之五年一言其要宓子敬奉詔遂得行其政於是單父治焉躬敦厚明親親尚篤敬施至仁加懇誠致忠信百姓化之齊人攻魯道由單父單父之老請曰麥已熟矣今齊寇至不及人人自收其麥請放民出皆穫傅郭之麥可以益糧且不資於寇三請而宓子不聽俄而齊寇逮于麥季孫聞之怒使人以讓宓子曰民寒耕熱芸曾不得食豈不哀哉不知猶可以告者而子不聽非所以為民宓子蹙然曰今玆無麥明年可樹若使不耕者穫是使民樂有寇且得單父一歲之麥於魯不加強喪之不加弱若使民有自取之心其創必數世不息季孫聞之𧹞然而愧曰地若可入吾豈忍見宓子哉三年孔子使巫馬期往觀政焉巫馬期陰免衣衣弊裘入單父界見夜漁者得魚輒舍之巫馬期問焉曰凡漁者為得也何以得魚即舍之漁者曰魚之大者名為䲖吾大夫愛之其小者名鱦吾大夫欲長之是以得二者輒舍之巫馬期返以告孔子曰宓子之德至矣使民闇行若有嚴刑於旁者敢問宓子何行而得於是孔子曰吾嘗與之言曰誠於此者刑乎彼宓子行此術於單父也孔子之舊曰原壤其母死夫子將助之以木槨子路曰由也昔者聞諸夫子無友不如己者過則勿憚改夫子憚矣姑已若何孔子曰凡民有喪匍匐救之況故舊乎非友也吾其往及為槨原壤登木曰久矣予之不託於音也遂歌曰狸首之班然執女手之卷然夫子為之隱佯不聞以過之子路曰夫子屈節而極於此失其與矣豈未可以已乎孔子曰吾聞之親者不失其為親也故者不失其為故也
