front:
  text: 孔子家語后序
  hash: sha256:5b3c285233a96a27fb3faa8d6db84a4bbc0d9db2c1b8467bb3460a2db7f48d85
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0001_SBCK_011-1a}
body:
  text: 呉郡黃魯曽􅁧嗚呼至㦲孔子之文徳而有是書也孔子生於過曆上不逮於文武而為大行中不親於成康而為共和而欲行其道周流於齊椘蔡衛之􅀖所遇者皆晏嬰子西之徒未􅀗多契於東魯本國乃卑秩膴仕兩不辤焉但相以攝而輕會以兵而瀆且有容璣之沮懐寳之誚不一也終與門人小子相明道以傳后丗是以孔氏獨多述作自魯論齊論言之又有家語疑多鯉伋所記并門人先后襍附之者要之咸孔子之意也故一典一事莫非宗􅈲一􅁤一物莫非玄訓信義美文包二變於獨覺禮樂刑政歛四逹於大鳴何也盖孔子之道傳者無㡬惟一貫􅀤自聖思卓爾闡於賢力此數字可以忘言畧授可以絶口粹昭而梗則􅆸原淂而支則舍三墳五典何必顯顯八索九丘何必優優六經二論何必諄諄特以聖質罕聞而淵参短列睿心希觸而冉閔續依性天遐轍髙堅逺路此所以必叢其辭必繁其篇譬之繫臂以姸珠而珠存斯貴帶腰以良玉而玉在斯奇此書雖若言之廣且曲道則載焉古人所謂載道之器余敢以先歸諸今考之藝文志有二十一卷王肅所註何乃至宋人梓傳者止十卷巳亡其太半如由混簡錯袠則又不可分柝比之王廣謀句觧者又止三卷近何氏孟春所註則卷雖盈於前本而文多不齊余頗惜王肅所註之少播於丗力求宋刻者而校仇之僅淂十之七八雖宋刻亦有訛謬者也然此書乃孔氏久成之典余距孔氏一千五百餘年序之僭妄深矣觀者勿以無􅂑尤之
  hash: sha256:2d27dae3780d51fc40f7c5461f3a504ec9555185796da94151151e09e07fc1e6
