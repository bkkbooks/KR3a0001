body:
  text: 孔子家語卷第二致思第八孔子北遊於農山子路子貢顔淵侍側孔子四望喟然而嘆曰於斯致思無所不至矣所不至言思無二三子各言爾志吾将擇焉子路進曰由願得白羽若月赤羽若日鍾鼓之音上震於天旍旗繽紛下蟠于地委蟠由當一隊而敵之必也攘地千里却攘搴旗執聝聝截耳也以效獲也搴取也取敵之旍旗唯由能之使二子者從我焉夫子曰勇哉子貢復進曰賜願使齊楚合戰於漭瀁之野大之􅁼漭瀁廣兩壘相望塵埃相接挺刃交兵賜著縞衣白冠凶兵冠服也事故白陳説其間推論利害釋國之患唯賜能之使夫二子者從我焉夫子曰辯哉顔囘退而不對孔子曰回来汝奚獨無願乎顔回對曰文武之事則二子者既言之矣回何云焉孔子曰雖然各言爾志也小子言之對曰回聞薰蕕不同器而藏蕕臭薰香堯桀不共國而治以其類異也回願得明王聖主輔相之敷其五敎義母慈兄友弟敷布也五教父孝也恭子導之以禮樂使民城郭不修溝池不越越溝池言無踰鑄劒㦸以為農器放牛馬於原藪無水曰藪也廣平曰原澤室家無離曠之思千歲無戰闘之患則由無所施其勇而賜無所用其辯矣夫子凛然曰美哉徳也子路抗手而對曰夫子何選焉孔子曰不傷財不害民不繁詞則顔氏之子有矣魯有儉嗇者瓦鬲煑食釜瓦食之自謂其美盛之土型之器甂瓦以進孔子孔子受之歡然而悦如受大牢之饋饋餽也牛羊豕子路曰瓦甂陋器也煑食薄膳也夫子何喜之如此乎子曰夫好諫者思其君食美者念其親吾非以饌具之為厚以其食厚而我思焉孔子之楚而有漁者而獻魚焉孔子不受漁者曰天暑市逺無所鬻也思慮棄之糞壤不如獻之君子故敢以進焉於是夫子再拜受之使弟子掃地将以享祭門人曰彼将棄之而夫子以祭之何也孔子曰吾聞諸惜其腐䭃而欲以務施者仁人之偶也惡有受仁人之饋而無祭者乎季羔為衛之士師官獄刖人之足俄而衛有蒯聵之亂晉靈公卒立其子輙蒯聵自晉初衞靈公太子蒯聵得罪出奔路並位於衞也襲衞時子羔子季羔逃之走郭門刖者守門焉謂季羔曰彼有􅆙季羔曰君子不踰又曰彼有竇季羔曰君子不隧竇出隧從又曰於此有室季羔乃入焉既而追者罷季羔将去謂刖者吾不能􅃜主之法而親刖子之足矣今吾在難此正子之報怨之時而逃我者三何故哉刖者曰斷足固我之罪無可奈何曩者君治臣以法令先人後臣欲臣之免也臣知獄决罪定臨當論刑君愀然不樂見君顔色臣又知之君豈私臣哉天生君子其道固然此臣之所以悦君也孔子聞之曰善哉為吏其用法一也思仁恕則樹德加嚴􅁀則樹怨公以行之其子羔乎孔子曰季孫之賜我粟千鍾也而交益親施與衆而交益親得季孫千鍾之粟以自南宫敬叔之乗我車也而道加行敬叔言於魯君給孔子車孔子欲見老􅅨而西觀周自周而還弟子四方來習也馬問禮於老子孔子歷觀郊廟故道雖貴必有時而後重有勢而後行微夫二子之貺財則丘之道殆将廢矣孔子曰王者有似乎春秋萬物皆正正其本而文王以王季為父以太任為母以太姒為妃以武王周公為子以太顛閎夭為臣其本美矣武王正其身以正其國正其國以正天下伐無道刑有罪一動而天下正其事成矣春秋致其時而萬物皆及王者致其道而萬民皆治周公載已行化行已以行化載亦行矣言令而行也其身正不而天下順之其誠至矣曽子曰入是國也言信於羣臣而留可也行忠於卿大夫則仕可也澤施於百姓則富可也孔子曰參之言此可謂善安身矣子路為蒲宰為水備與其民修溝瀆以民之勞煩苦也人與之一簞食笥簞一壺漿孔子聞之使子貢止之子路忿不悦徃見孔子曰由也以暴雨将至恐有水災故與民修溝洫以備之而民多匱餓者是以簞食壺漿而與之夫子使賜止之是夫子止由之行仁也夫子以仁教而禁其行由不受也孔子曰汝以民為餓也何不白於君發倉廩以賑之而私以爾食饋之是汝明君之無惠而見巳之德美矣汝速已則可不則汝之見罪必矣子路問於孔子曰管仲之爲人何如子曰仁也道也得仁子路曰昔管仲説襄公公不受是不辯也欲立公子紏而不能是不智也矣奉公子小白出奔莒公孫無知殺襄公齊襄立無常鮑叔牙曰君使民慢亂將作魯伐齊納子紏小白自莒先入是爲桓公管夷吾召忽奉公子紏奔魯齊人殺無知召忽死之也公乃殺子紏家殘於齊而無憂色是不慈也桎梏而居檻車無慙心是無醜也耻惡言無心之事所射之君是不貞也召忽死之管仲不死是不忠也仁人之道固若是乎孔子曰管仲説襄公襄公不受公之闇也欲立子紏而不能不遇時也家殘於齊而無憂色是知權命也桎梏而無慙心自裁審也事所射之君通於變也不死子紏量輕重也夫子紏未成君管仲未成臣管仲才度義管仲不死束縛而立功名未可非也召忽雖死過與取仁未足多也孔子適齊中路聞哭者之聲其音甚哀孔子謂其僕曰此哭哀則哀矣然非䘮者之哀矣驅而前少進見有異人焉擁鐮帶索哭者不哀孔子下車追而問曰子何人也對曰吾丘吾子也曰子今非䘮之所奚哭之悲也丘吾子曰吾有三失晚而自覺悔之何及曰三失可得聞乎願子告吾無隠也丘吾子曰吾少時好學周遍天下後還䘮吾親是一失也長事齊君君驕奢失士臣節不遂是二失也吾平生厚交而今皆離絶是三失也夫樹欲静而風不停子欲養而親不待徃而不來者年也不可再見者親也請從此辭遂投水而死孔子曰小子識之斯足為戒矣自是弟子辭歸養親者十有三孔子謂伯魚曰鯉乎吾聞可以與人終日不倦者其唯學焉其容體不足觀也其勇力不足憚也其先祖不足稱也其族姓不足道也終而有大名以顯聞四方流聲後裔者豈非學之効也故君子不可以不學其容不可以不飭不飭無類無類失親宜􅀋禮貌矜莊然後親愛可久故曰無􅀋失親爲貌不在飭故無貌不得言不飭無􅀋也也失親不忠則無忠誠情不相親不忠失禮信爲本禮以忠失禮不立無以立非禮則夫逺而有光者飭也近而愈明者學也譬之汙池水潦注焉雚葦生焉雖或以觀之孰知其源乎水潦注於源泉源也學者雖從外入及其用之人誰知其非從池而生雚葦觀者誰知其非源泉乎以言者乎此出也子路見於孔子曰負重渉逺不擇地而休家貧親老不擇禄而仕昔者由也事二親之時常食藜藿之實為親負米百里之外親殁之後南遊於楚從車百乗積粟萬鍾累茵而坐列鼎而食願欲食藜藿為親負米不可復得也枯魚衘索幾何不蠧二親之夀忽若過隟孔子曰由也事親可謂生事盡力死事盡思者也孔子之郯也郯子達禮孔子故徃諮問焉郯國名也少昊之後吾之本縣遭程子於塗傾蓋而語駐車傾蓋終日甚相親顧謂子路曰取束帛以贈先生送贈子路屑然對曰由聞之士不中間見女嫁無媒君子不以交禮也始介也中間謂有間又顧謂子路子路又對如初孔子曰由詩不云乎有美一人清􅀭宛兮邂逅相遇適我願兮眉目清揚幽期而會令願也之間也宛然美也今程子天下賢士也於斯不贈則終身弗能見也小子行之孔子自衞反魯息駕于河梁而觀焉無梁河水言事者通渭水爲河也莊周書說孔子於閭梁有懸水三十仞尺八四丈者也曰仞懸二十圜流九十里水深急則然圜流廻流也魚鱉不能導黿鼉不能居行道有一丈夫方將厲之渡厲孔子使人並涯止之曰此懸水三十仞圜流九十里魚鼈黿鼉不能居也意者難可濟也丈夫不以措意遂渡而出孔子問之曰子乎有道術乎所以能入而出者何也丈夫對曰始吾之入也先以忠信及吾之出也又從以忠信忠信措吾軀於波流而吾不敢以用私所以能入而復出也孔子謂弟子曰二三子識之水且猶可以忠信成身親之而况於人乎孔子将行雨而無蓋門人曰商也有之夏子也名孔子曰商之為人也甚恡於財甚也恡嗇吾聞與人交推其長者違其短者故能久也楚王渡江江中有物大如斗圓而赤直觸王舟舟人取之王大怪之遍問羣臣莫之能識王使使聘于魯問於孔子子曰此所謂萍實者也草也萍水可剖而食之吉祥也唯霸者爲能獲焉使者反王遂食之大美久之使來以告魯大夫大夫因子游問曰夫子何以知其然乎曰吾昔之鄭過乎陳之野聞童謠曰楚王渡江得萍實大如斗赤如日剖而食之甜如蜜此是楚王之應也吾是以知之子貢問於孔子曰死者有知乎将無知乎子曰吾欲言死之有知将恐孝子順孫妨生以送死吾欲言死之無知将恐不孝之子棄其親而不葬賜不欲知死者有知與無知非今之急後自知之子貢問治民於孔子子曰懔懔焉若持腐索之扞馬貌扞馬突馬懔懔戒懼之子貢曰何其畏也孔子曰夫通達御皆人也以道導之則吾畜也不以道導之則吾讎也如之何其無畏也魯國之法贖人臣妾于諸侯者皆取金於府子貢贖之辭而不取金孔子聞之曰賜失之矣夫聖人之舉事也可以移風易俗而教導可以施之於百姓非獨適身之行也今魯國富者寡而貧者衆贖人受金則為不廉則何以相贖乎自今以後魯人不復贖人於諸侯子路治蒲請見於孔子曰由願受教於夫子子曰蒲其何如對曰邑多壯士又難治也子曰然吾語爾恭而敬可以攝勇寛而正可以懐强愛而恕可以容困能容困窮言愛恕者温而斷可以抑姦如此而加之則正不難矣三恕第九孔子曰君子有三恕有君不能事有臣而求其使非恕也有親不能孝有子而求其報非恕也有兄不能敬有弟而求其順非恕也士能明於三恕之本則可謂端身矣孔子曰君子有三思不可不察也少而不學長無能也老而不教死莫之思也有而不施窮莫之救也故君子少思其長則務學老思其死則務教有思其窮則務施伯常騫問於孔子曰騫固周國之賤吏也不自以不肖将北面以事君子敢問正道宜行不容於世貴故行之則不容於世正道宜行而出莫之能隠道宜行然亦不忍然亦不忍爲隱事世亂則隱道爲行今欲身亦不窮道亦不隠為之有道乎孔子曰善哉子之問也自丘之聞未有若吾子所問辯且説也得其説矣辯當其理丘嘗聞君子之言道矣聽者無察則道不入道則不能入也言聽者不明察竒偉不稽則道不信考校奇偉則道不見稽考也聽道者不能人道不虚行信此言苟非其又嘗聞君子之言事矣制無度量則事不成其政曉察則民不保安保察則民不安矣也政大曉了分又嘗聞君子之言志矣㓻折者不終終其性命矣㓻則折矣不徑易者則數傷輕徑傷於義矣也志輕則數浩倨者則不親恭如是則不浩倨簡略不矣親就利者則無不弊不可久也言好利者又嘗聞養世之君子矣從輕勿為先從重勿為後憂赴重者宜爲先養世者也患從勞苦輕者宜爲後見像而勿强也見像法以強世也法而已不陳道而勿怫不與世相詭違也怫詭也陳道而已此四者丘之所聞也孔子觀於魯桓公之廟有欹器焉傾欹夫子問於守廟者曰此謂何器對曰此蓋為宥坐之器孔子曰吾聞宥坐之器虚則欹中則正滿則覆明君以為至誡故常置之於坐側顧謂弟子曰試注水焉乃注之水中則正滿則覆夫子喟然歎曰嗚呼夫物惡有滿而不覆哉子路進曰敢問持滿有道乎子曰聦明睿智守之以愚功被天下守之以讓勇力振世守之以怯富有四海守之以謙此所謂損之又損之之道也孔子觀於東流之水子貢問曰君子所見大水必觀焉何也孔子對曰以其不息且遍與諸生而不爲也夫水似乎德生者物遍與諸與生而又不德也得水而後生水不其流也則卑下倨邑必修其理似義浩浩乎無屈盡之期此似道流行赴百仞之嵠而不懼此似勇至量必平之此似法盛而不求概此似正綽約微達此似察發源必東此似志以出以入萬物就以化絜此似善化也水之德有若此是故君子見必觀焉子貢觀於魯廟之北堂出而問於孔子曰向也賜觀於太廟之堂未既輟還瞻北蓋皆斷焉之盖斷絶也輟止觀北面彼将有説耶匠過之也孔子曰太廟之堂宫致良工之匠匠致良材盡其功巧蓋貴久矣尚有説也必也尚猶有說言必孔子曰吾有所齒有所鄙有所殆夫㓜而不能强學老而無以教吾耻之去其鄉事君而逹卒遇故人曽無舊言吾鄙之而達事君其平生之舊交而無進之之心者乎得志於君而見故人曾無舊言是棄與小人處而不能親賢吾殆之而近小人是危殆危也夫踈賢道也亡之子路見於孔子孔子曰智者若何仁者若何子路對曰智者使人知己仁者使人愛己子曰可謂士矣子路出子貢入問亦如之子貢對曰智者知人仁者愛人子曰可謂士矣子貢出顔回入問亦如之對曰智者自知仁者自愛子曰可謂士君子矣子貢問於孔子曰子從父命孝臣從君命貞乎奚疑焉孔子曰鄙哉賜汝不識也昔者明王萬乗之國有争臣七人則主無過舉也四輔前曰疑後曰丞左曰輔右曰弼天子有三公四輔主諫爭以救其過失也千乗之國有争臣五人則社稷不危也内外者也故有五人焉諸侯有三卿股肱之臣有百乗之家有争臣三人宰凡三人能以義諫諍大夫之臣有室老家相邑則禄位不替父有争子不陷無禮士有争友不行不義君故湏朋友之諫爭於巳然後不義士雖有臣旣微且陋不能以義匡其行之者也之事不得故子從父命奚詎為孝臣從君命奚詎為貞夫能審其所從宜從與不當詳審所之謂孝之謂貞矣子路盛服見於孔子子曰由是倨倨者何也夫江始出於岷山其源可以濫觴以盛觴可其微酒言及其至于江津不舫舟不避風則不可以渉非唯下流水多耶今爾衣服既盛顔色充盈天下且孰肯以非告汝乎子路趨而出改服而入蓋自若也子曰由志之吾告汝奮於言者華者華而無實自矜奮於言奮於行者伐者是自伐自矜奮行夫色智而有能者小人也故君子知之曰智言之要也不能曰不能行之至也言要則智行至則仁既仁且智惡不足哉子路問於孔子曰有人於此披褐而懐玉何如布衣褐毛子曰國無道隠之可也國有道則衮冕而執玉衣盛􅅚衮冕文好生第十魯哀公問於孔子曰昔者舜冠何冠乎孔子不對公曰寡人有問於子而子無言何也對曰以君之問不先其大者故方思所以為對公曰其大何乎孔子曰舜之為君也其政好生而惡殺其任授賢而替不肖德若天地而静虚化若四時而變物是以四海承風暢於異類之夷狄也異􅀋四方鳳翔麟至鳥獸馴德順馴無他也好生故也君舎此道而冠冕是問是以緩對孔子讀史至楚復陳莊王討之因陳取之陳夏徵舒殺其君楚王從之還復陳而申叔時諫莊喟然歎曰賢哉楚王輕千乗之國而重一言之信匪申叔之信不能達其義匪荘王之賢不能受其訓孔子常自筮其卦得賁焉愀然有不平之状子張進曰師聞卜者得賁卦吉也而夫子之色有不平何也孔子對曰以其離耶在周易山下有火謂之賁爲火艮爲山離上艮下離非正色之卦也夫質也黑白宜正焉今得賁非吾兆也飾賁吾聞丹􅃮不文白玉不雕何也質有餘不受飾故也孔子曰吾於甘棠見宗廟之敬甚矣其樹作甘棠之詩也邵伯聽訟於甘棠愛思其人必愛其樹尊其人必敬其位道也子路戎服見於孔子㧞劒而舞之曰古之君子以劒自衛乎孔子曰古之君子忠以為質仁以為衛不出環堵之室而知千里之外有不善則以忠化之侵暴則以仁固之何持劒乎子路曰由乃今聞此言請攝齊以受教教者攝齊升堂齊裳下緝也受楚王出遊亡弓左右請求之王曰止楚王失弓楚人得之又何求之孔子聞之惜乎其不大也不曰人遺弓人得之而已何必楚也嘷之良弓王恭王弓鳥孔子爲魯司冦斷獄訟皆進衆議者而問之曰子以爲奚若某以爲何若皆曰云云如是然後夫子曰當從某子幾是獄事故近也重議之與衆孔子問漆雕憑曰子事臧文仲武仲及孺子容此三大夫孰賢對曰臧氏家有守龜焉名曰蔡文仲三年而為一兆武仲三年而為二兆孺子容三年而為三兆憑從此之見若問三人之賢與不賢所未敢識也孔子曰君子哉漆雕氏之子其言人之美也隠而顯言人之過也微而著智而不能及明而不能見孰克如此宜爲如也克能也而魯公索氏反先落将祭而亡其牲孔子聞之曰公索氏不及二年将亡後一年而亡門人問曰昔公索氏亡其祭牲而夫子曰不及二年必亡今過朞而亡夫子何以知其然孔子曰夫祭者孝子所以自盡於其親将祭而亡其牲則其餘所亡者多矣若此而不亡者未之有也虞芮二國争田而訟連年不决乃相謂曰西伯仁也文王西伯盍徃質之質正也盍何不入其境則耕者讓畔行者讓路入其朝士讓為大夫大夫讓于卿虞芮之君曰嘻吾儕小人也等儕不可以入君子之朝逺自相與而退咸以所争之田為閒田矣孔子曰以此觀之文王之道其不可加焉不令而從不教而聽至矣哉曽子曰狎甚則相簡荘甚則不親是故君子之狎足以交歡其荘足以成禮孔子聞斯言也曰二三子志之孰謂參也不知禮乎哀公問曰紳委章甫甫冠名也委委貌章有益於仁乎孔子作色而對曰君胡然焉衰麻苴杖者志不存乎樂非耳弗聞服使然也黼黻衮冕者容不襲慢非性矜莊服使然也介胃執戈者無退懦之氣非體純猛服使然也且臣聞之好肆不守折好肆不守折也言市弗能爲廉而長者不為市不爲市買之事言長者之行則竊夫其有益與無益君子所以知爲察竊宜孔子謂子路曰見長者而不盡其辭雖有風雨吾不能入其門矣故君子以其所能敬人小人反是孔子謂子路曰君子以心導耳目立義以為勇小人以耳目導心不愻以為勇故曰退之而不怨先之斯可從已怨先之則可言人退之不爲師也從足以孔子曰君子三患未之聞患不得聞既得聞之患弗得學既得學之患弗能行有其德而無其言君子耻之有其言而無其行君子耻之既得之而又失之君子耻之地有餘民不足君子耻之衆寡均而人功倍已焉君子耻之而功殊倍已故耻之也凡興功業多少與人同魯人有獨處室者鄰之釐婦婦也􅁵寡亦獨處一室夜暴風雨至釐婦室壊趨而託焉魯人閉戶而不納釐婦自牖與之言何不仁而不納我乎魯人曰吾聞男女不六十不同居今子㓜吾亦幼是以不敢納爾也婦人曰子何不如柳下惠然嫗不逮門之女國人不稱其亂魯人曰柳下惠則可吾固不可吾将以吾之不可學柳下惠之可孔子聞之曰善哉欲學柳下惠者未有似於此者期於至善而不襲其為可謂智乎孔子曰小辯害義小言破道關雎興于鳥而君子美之取其雄雌之有别鹿鳴興於獸而君子大之取其得食而相呼若以鳥獸之名嫌之固不可行也孔子謂子路曰君子而强氣則不得其死小人而强氣則刑戮荐蓁􅃎詩曰殆天之未隂雨徹彼桑土綢繆牖戶也桑土桑根殆及也徹剥喻我國家積累之功乃難成之苦者也也鴟鴞天未雨剥取桑根以􅆞綿其牖戸今汝下民或敢侮余王致此大功至艱而今者周公時言我先不可不遏絶之以存周室者也下民敢侵侮我周道謂管蔡之屬孔子曰能治國家之如此雖欲侮之豈可得乎周自后稷積行累功以有爵土公劉重之以仁及至大王亶甫敦以德讓其樹根置本備豫逺矣初大王都􅃎翟人侵之事之以皮幣不得免焉事之以珠玉不得免焉於是屬耆老而告之所欲吾土地吾聞之君子不以所養而害人二三子何患乎無君遂獨與大姜去之踰梁山邑于岐山之下􅃎人曰仁人之君不可失也從之如歸市焉天之與周民之去殷久矣若此而不能天下未之有也武庚惡能侮禄父與管叔武庚紂子名亂也共爲鄁詩曰執轡如組兩驂如儛服和調驂之以節中孔子曰為此詩者其知政乎夫為組者㥎紕於此成文於彼言其動於近行於逺也執此法以御民豈不化乎竿旄之忠告至矣哉喻於素絲良馬如組紕之義竿旄之詩者樂乎善道告人取孔子家語卷第二
