body:
  text: 廟制第三十四衛將軍文子將立先君之廟於其家文子名彌牟使子羔訪於孔子子曰公廟設於私家非古禮之所及吾弗知子羔曰敢問尊卑上下立廟之制可得而聞乎孔子曰天下有王分地建國設祖宗祖有功宗有徳乃為親疎貴賤多少之數是故天子立七廟三昭三穆與太祖之廟而七太祖近廟皆月祭之近為髙祖下親為近逺廟為祧有二祧焉祧逺意親盡為祧二祧者髙祖及父母祖是也享嘗乃止四時祭也諸侯立五廟降天子二二昭二穆與太祖之廟而五祖考廟始祖廟也享嘗乃止大夫立三廟降諸侯二也一昭一穆與太祖之廟而三享嘗乃止士立一廟降大夫二曰考廟王考無廟合而享嘗乃止祖合於父廟中庶人無廟四時祭於寢此自有虞以至于周之所不變也自有虞以至於周禮不異而説者以周有廟以有文武故祧當遷者而以為文武之廟或有甚矣禮典皆有七廟之文唯喪服小記云王者禘其祖所出以其祖配之而立四廟謂始王者未有始祖故立四廟今有虞亦始王者而旣七廟矣則喪服小記之言亦妄矣凡四代帝王之所謂郊者皆以配天其所謂禘者皆五年大祭之所及也殷周禘嚳五年大祭而及應為太祖者則其廟不毁不及太祖雖在禘郊其廟則毁矣諸禘享皆無廟郊亦無廟后稷之所以有廟者以太祖故曰不為太祖雖在禘郊其廟則毁據后稷而言殷人之郊㝠㝠以有大功契旣為太祖之廟若復郊則冥永不與於祀典是以郊㝠耳古者祖有功而宗有德諸見祖宗者其廟皆不毁祖宗者不毁之名其廟有功者謂之祖至於周文王是也有徳者謂之宗武王是也二廟自有祖宗乃謂之二祧又以為配食明堂之名亦可謂違聖相失實事也子羔問曰祭典云昔有虞氏祖顓頊而宗堯夏后氏亦祖顓頊而宗禹殷人祖契而宗湯周人祖文王而宗武王此四祖四宗或乃異代或其考祖之有功徳其廟可也若有虞宗堯夏祖顓頊皆異代之有功徳者也亦可以存其廟乎孔子曰善如汝所問也如殷周之祖宗其廟可以不毁其他祖宗者功徳不殊雖在殊代亦可以無疑矣詩云蔽茀甘棠勿翦勿伐召伯所憩蔽茀小貎甘棠杜也憩息也周人之於召公也愛其人猶敬其所舍之樹況祖宗其功徳而可以不尊奉其廟焉辯樂解第三十五孔子學琴於師襄子襄子曰吾雖以擊磬為官然能於琴今子於琴已習可以益矣孔子曰丘未得其數也有間曰已習其數可以益矣孔子曰丘未得其志也有間曰已習其志可以益矣孔子曰丘未得其為人也有間曰孔子有所繆然思焉繆然深思貎有所然髙望而逺眺眺見曰丘迨得其為人矣迨近黮而黑黮黑貎頎然長頎長貎曠如望羊曠用志廣逺望羊逺視也掩有四方掩同也文王之時三分天下有其二後周有四方文武之功也非文王其孰能為此師襄子避席葉拱而對曰葉拱兩手薄其心也君子聖人也其傳曰文王操子路鼓琴孔子聞之謂冉有曰甚矣由之不才也夫先王之制音也奏中聲以為節入於南不歸於北夫南者生育之鄉北者殺伐之城故君子之音温柔居中以養生育之氣憂愁之感不加于心也㬥厲之動不在于體也夫然者乃所謂治安之風也小人之音則不然亢麗微末以象殺伐之氣中和之感不載於心温和之動不存于體夫然者乃所以為亂之風昔者舜彈五弦之琴造南風之詩其詩曰南風之薫兮可以解吾民之愠兮南風之時兮可以阜吾民之財兮得其時阜盛也唯修此化故其興也勃焉徳如泉流至于今王公大人述而弗忘殷紂好為北鄙之聲其廢也忽焉至于今王公大人舉以為誡夫舜起布衣積徳含和而終以帝紂為天子荒滛暴亂而終以亡非各所修之致乎由今也匹夫之徒曾無意于先王之制而習亡國之聲豈能保其六七尺之體哉冉有以告子路子路懼而自悔靜思不食以至骨立夫子曰過而能改其進矣乎周賔牟賈侍坐於孔子孔子與之言及樂曰夫武之備戒之以久何也武謂周舞備戒擊鼓警衆也對曰病不得其衆病憂也憂恐不得其士衆之心敬者也詠歎之滛液之何也滛液歆滛滋味對曰恐不逮事言汲汲欲及此安民和衆事發揚蹈厲之已蚤何也厲病備戒雖久至其發作又疾對曰及時事欲令事及其時武坐致右而軒左何也右膝至地左膝不至地也對曰非武坐言武無坐聲滛及商何也言聲歆滛貪商對曰非武音也武王之事不得已為天下除殘賊非苟貪商孔子曰若非武音則何音也對曰有司失其傳也孔子曰唯丘聞諸萇𢎞亦若吾子之言是也若非有司失其傳則武王之志荒矣賓牟賈起免席而請曰夫武之備戒之以久則旣聞命矣敢問遲矣而又久立於綴何也子曰居吾語爾夫樂者象成者也象成功而為樂總干而山立武王之事總持干若山立不動發揚蹈厲太公之志也志在鷹揚武亂皆坐周召之治武亂武治皆坐而以象安民無事也且夫武始成而北出再成而滅商三成而南反誅紂已而南也四成而南國是壃言有南國以為壃界五成而分陜周公左召公右分東西而治也六成而復綴以崇其天子焉以象尊天子也凡成謂舞之節解也衆夾振之而四伐所以盛威於中國夾武王四面會振威武四伐者伐四方與紂同惡也分夾而進所以事蚤濟所以分夾而蚤進者欲事蚤成久立於綴所以待諸侯之至也今汝獨未聞牧野之語乎武王克殷而反商之政未及下車則封黃帝之後於薊封帝堯之後於祝封帝舜之後於陳下車又封夏后氏之後於把殷之後於宋武王伐殷封其子祿父武王崩祿父叛周公誅之封㣲子於宋以為殷後祿父不成殷後故成言之封王子比干之墓釋箕子之囚使人行商容之舊以復其位商容商之禮官其位舊居也傳說多以商為殷之賢人行者使箕子求商容乎行猶索也庶民弛政解其力役之事旣濟河西馬㪚之華山之陽而弗復乘牛㪚之桃林之野而弗復服桃林西方塞也車甲則釁之而藏諸府庫以示弗復用倒載干戈而包之以虎皮將率之士使為諸侯命之鞬橐言所以橐弓矢而不用者將率之士力也故建以為諸侯為之鞬橐也然後天下知武王之不復用兵也㪚軍而修郊射郊有學官可以習禮左射以狸首右射以騶虞而貫革之射息也左東學右西學狸首騶虞所為節也裨冕搢笏而虎賁之士脱劒衮冕之屬通謂之裨冕脱劒解劒也郊配后稷而民知尊父焉配明堂而民知孝焉朝覲然後諸侯知所以臣耕藉然後民知所以敬親親耕藉田所以奉祠祀之粢盛六者天下之大教也食三老五更於太學天子袒而割牲執醬而饋執爵而酳食已飲酒謂之酳也冕而總干親在舞位所以教諸侯之弟如此則周道四達禮樂交通夫武之遲久不亦宜乎問玉第三十六子貢問於孔子曰敢問君子玉貴而珉賤何也為玉之寡而珉之多歟珉石似玉孔子曰非為玉之寡故貴之珉之多故賤之夫昔者君子比徳於玉温潤而澤仁也縝密以栗智也縝宻緻塞貎栗堅也廉而不劌義也劌割有廉隅而不割傷也垂之如墜禮也禮尚謙卑叩之其聲清越而長其終則詘然樂也詘斷絶貎似樂之息瑕不掩瑜瑜不掩瑕忠也瑜其中美者也孚尹㫄達信也孚尹玉貌㫄達似信者無不通氣如白虹天也精神見于山川地也精神本出山川是故象地珪璋特達徳也天下莫不貴者道也詩云言念君子温其如玉故君子貴之也孔子曰入其國其教可知也其為人也温柔敦厚詩教也疏通知逺書教也廣博易良樂教也潔靜精㣲易教也恭儉莊敬禮教也屬辭比事春秋教也故詩之失愚敦厚之失書之失誣知逺之失樂之失奢易之失賊精微之失禮之失煩春秋之失亂屬辭比事之失其為人温柔敦厚而不愚則深於詩者矣疏通知逺而不誣則深於書者矣廣博易良而不奢則深於樂者矣潔靜精㣲而不賊則深於易者矣恭儉莊敬而不煩則深於禮者矣屬辭比事而不亂則深於春秋者矣天有四時春夏秋冬風雨霜露無非教也地載神氣吐納雷霆流形庶物無非教也清明在躬氣志如神清明之徳在身也則其氣志如神也有物將至其兆必先物事也言有事將至必先有兆應之者也是故天地之教與聖人相參其在詩曰嵩髙惟嶽峻極于天惟嶽降神生甫及申嶽降神靈和氣生申甫成大功也惟申及甫唯周之翰翰幹美其宗族世有大功於周甫侯相穆王制詳刑申伯佐宣王成徳教四國于蕃四方于宣言能藩屏四國宣王徳化於天下也此文武之徳也言文武聖徳篤佑周家天為之生良佐成中興之功弛其文徳協此四國毛詩矢其文徳矢陳協和此太王之徳也凡三代之王必先其令問詩云明明天子令問不已三代之徳也子張問聖人之所以教孔子曰師乎吾語汝聖人明於禮樂舉而措之而已子張又問孔子曰師爾以為必布几筵揖讓升降酌獻酬酢然後謂之禮乎爾以為必行綴兆執羽籥作鐘鼓然後謂之樂乎言而可履禮也行而可樂樂也聖人力此二者以躬已南面是故天下太平萬民順伏百官承事上下有禮也夫禮之所以興衆之所以治也禮之所以廢衆之所以亂也目巧之室則有奥阼言目巧作室必有奥阼之位室西南隅謂之隩阼階也席則有上下車則有左右行則並隨立則有列序古之義也室而無奥阼則亂於堂室矣席而無上下則亂於席次矣亂於席上之次第車而無左右則亂於車上矣行而無並隨則亂於階塗矣升階塗無並隨則階塗亂列而無次序則亂於者矣著所立之位也門屏之間謂之著也昔者明王聖人辨貴賤長幼正男女内外序親疎逺近而莫敢相踰越者皆由此塗出也屈節解第三十七子路問於孔子曰由聞丈夫居世富貴不能有益於物以道濟物不為身也處貧賤之地而不能屈節以求伸則不足以論乎人之域矣孔子曰君子之行已其於必達於已可以屈則屈可以伸則伸故屈節者所以有待待知已也求伸者所以及時及良時也是以雖受屈而不毁其節志達而不犯於義合義乃行孔子在衛聞齊國田常將欲為亂專齊有無君之心也而憚鮑晏鮑氏晏氏齊之卿大夫也因欲移其兵以伐魯孔子㑹諸弟子而告之曰魯父母之國不可不救不忍視其受敵今吾欲屈節於田常以救魯二三子誰為使於是子路請往焉孔子弗許子張請往又弗許子石請往又弗許三子退謂子貢曰今夫子欲屈節以救父母之國吾三人請使而不獲往此則吾子用辯之時也吾子盍請行焉子貢請使夫子許之遂如齊説田常曰今子欲收功於魯實難不若移兵於吳則易田常不悦子貢曰夫憂在内者攻強憂在外者攻弱吾聞子三封而三不成是則大臣不聴今戰勝以驕主破國以尊臣鮑晏等率師若破國則益尊者也而子之功不與焉則交日疏於主而與大臣爭如此則子之位危矣田常曰善然兵業已加魯矣不可更如何子貢曰緩師吾請救於吳令救魯而伐齊子因以兵迎之田常許諾子貢遂南說吳王曰王者不滅國霸者無強敵千鈞之重加銖兩而移今以齊國而私千乘之魯與吳爭強甚為王患之且夫救魯以顯名以撫泗上諸侯泗水名也誅暴齊以服晉利莫大焉名存亡魯實困强齊智者不疑吳王曰善然吳常困越越王今苦身養士有報吳之心子待我伐越然後乃可子貢曰越之勁不過魯吳之强不過齊而王置齊而伐越則齊以私魯矣王方以存亡繼絶之名棄強齊而伐小越非勇也勇者不避難仁者不窮約智者不失時義者不絶世今存越示天下以仁救魯伐齊威加晉國諸侯必相率而朝霸業盛矣且王必惡越臣請見越君令出兵以從此則實害越而名從諸侯以伐齊吳王悦乃遣子貢之越越王郊迎而自為子貢御曰此蠻夷之國大夫何足儼然辱而臨之子貢曰今者吾説吳王以救魯伐齊其志欲之而心畏越曰待我伐越乃可此則破越必矣且無報人之志而令人疑之拙矣有報人之意而使人知之殆乎事未發而先聞者危矣三者舉事之患也勾踐頓首曰孤嘗不料力而興吳難受困㑹稽痛於骨髓日夜焦唇乾舌徒欲與吳王接踵而死孤之願也今大夫幸告以利害子貢曰吳王為人猛暴羣臣不堪國家疲敝百姓怨上大臣内變申胥以諌死申胥伍子胥也太宰嚭嚭吴王佞臣也用事此則報吳之時也王誠能發卒佐之以邀射其志邀激其志而重寶以悦其心卑辭以尊其禮則其伐齊必矣此聖人所謂屈節求其達者也彼戰不勝王之福若勝則必以兵臨晉臣還北請見晉君共攻之其弱吳必矣鋭兵盡於齊重甲困於晉而王制其敝焉越王頓首許諾子貢返五日越使大夫文種頓首言於吳王曰越悉境内之士三千人以事吳吳王告子貢曰越王欲身從寡人可乎子貢曰悉人之衆又從其君非義也吳王乃受越王卒謝留勾踐遂自發國内之兵以伐齊敗之子貢遂北見晉君令承其敝吳晉遂遇於黃池越王襲吳之國吳王歸與越戰滅焉孔子曰夫其亂齊存魯吾之始願若能強晉以敝吳使吳亡而越霸者賜之說也美言傷信愼言哉孔子以哀公十六年卒吳以二十二年滅時吳知已將亾而言之也孔子弟子有宓子賤者仕於魯為單父宰恐魯君聴讒言使已不得行其政於是辭行故請君之近史二人與之俱至官宓子戒其邑吏令二史書方書輒掣其肘書不善則從而怒之二史患之辭請歸魯宓子曰子之書甚不善子勉而歸矣二史歸報於君曰宓子使臣書而掣臣肘書惡而又怒臣邑吏皆笑之此臣所以去之而來也魯君以問孔子子曰宓不齊君子也其才任霸王之佐屈節治單父將以自試也意者以此為諫乎公寤太息而歎曰此寡人之不肖寡人亂宓子之政而責其善者數矣微二史寡人無以知其過微夫子寡人無以自寤遽發所愛之使告宓子曰自今已往單父非吾有也從子之制有便於民者子決為之五年一言其要宓子敬奉詔遂得行其政於是單父治焉躬敦厚明親親尚篤敬施至仁加懇誠致忠信百姓化之齊人攻魯道由單父單父之老請曰麥已熟矣今齊寇至不及人人自收其麥請放民出皆穫𫝊郭之麥可以益糧且不資於寇三請而宓子不聴俄而齊寇逮于麥季孫聞之怒使人以譲宓子曰民寒耕熱芸曾不得食豈不哀哉不知猶可以告者而子不聴非所以為民宓子蹙然曰今兹無麥明年可樹若使不耕者穫是使民樂有寇且得單父一歲之麥於魯不加強喪之不加弱若使民有自取之心其創必數世不息季孫聞之赧然而愧曰地若可入吾豈忍見宓子哉三年孔子使巫馬期往觀政焉巫馬期隂免衣衣敝裘入單父界見夜䰻者得魚輒舍之巫馬期問焉曰凡䰻者為得何以得魚即舍之䰻者曰魚之大者名為䲖吾大夫愛之其小者名鱦䲖宜為䲔新序作鱨鱦魚之懐妊也吾大夫欲長之是以得二者輒舍之巫馬期返以告孔子曰宓子之徳至使民闇行若有嚴刑於旁敢問宓子何行而得於是孔子曰吾嘗與之言曰誠於此者刑乎彼宓子行此術於單父也孔子之舊曰原壤其母死夫子將助之以木槨子路曰由也昔者聞諸夫子無友不如已者過則勿憚改夫子憚矣姑已若何姑且也已止也孔子曰凡民有喪匍匐救之況故舊乎非友也吾其往及為槨原壤登木曰久矣予之不託於音也遂歌曰狸首之斑然執女手之卷然夫子為之隠佯不聞以過之子路曰夫子屈節而極於此失其與矣豈未可以已乎孔子曰吾聞之親者不失其為親也故者不失其為故也家語卷八欽定四庫全書家語卷九魏王肅注
