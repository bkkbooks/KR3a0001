front:
  text: 冠頌第三十三邾隠公旣即位將冠使大夫因孟懿子問禮於孔子子曰其禮如世子之冠冠於阼者以著代也阼主人之階以明其代父醮於客位加其有成冠於阼若不醴則醮用酒於客位敬而成之户西為客位三加彌尊導喻其志喻其志使加彌尊宜敬式始緇布次皮弁次爵弁冠而字之敬其名也雖天子之元子猶士也其禮無變天下無生而貴者故也行冠事必於祖廟以祼享之禮以將之祼灌鬯也灌鬯以享神享獻將行也以金石之樂節也金石者鍾磬也所以自卑而尊先祖示不敢擅懿子曰天子未冠即位長亦冠也孔子曰古者王世子雖幼其即位則尊為人君人君治成人之事者何冠之有懿子曰然則諸侯之冠異天子與怪天子無冠禮如諸侯之冠世子之冠故問之孔子曰君薨而世子主喪是亦冠也已人君無所殊也諸侯亦人君與天子無異懿子曰今邾君之冠非禮也懿子以諸侯無冠則邾君之冠非也孔子曰諸侯之有冠禮也夏之末造也夏之末世乃造諸侯冠禮有自來矣今無譏焉言有所從來故今無所譏天子冠者武王崩成王年十有三而嗣立周公居冢宰攝政以治天下明年夏六月旣葬周書亦曰歲十有二武王崩元年六月葬與此若合符而説者橫為年紀促成年少又命周公武王崩後五月乃攝政良可為冠與痛㦲冠成王而朝于祖以見諸侯示有君也周公命祝雍作頌曰祝王達而未㓜祝雍辭曰使王近於民常得民之心也逺於年壽長嗇於時嗇愛也於時不奪民時也恵於財親賢而任能其頌曰令月吉日王始加元服去王㓜志心衮職衮職盛服有禮文也欽若昊天欽敬若順六合是式天地四方謂之六合言為之法式率爾祖考永永無極此周公之制也懿子曰諸侯之冠其所以為賓主何也孔子曰公冠則以卿為賓無介公自為主迎賓揖升自阼立于席北其醴也則如士饗之以三獻之禮旣醴降自阼諸侯非公而自為主者其所以異皆降自西階西階賓也𤣥端與皮弁𤣥端緇布冠之服皮弁自服其服也異朝服素畢朝服而畢示不忘古公冠四公四加冠加𤣥冕祭加𤣥冕著祭服其酬幣于賓則束帛乘馬已冠而饗旣饗與賓幣謂之酬幣乘馬駟馬也王太子庶子之冠擬焉王之太子庶子皆擬諸侯冠禮也皆天子自為主其禮與士無變饗食賔也皆同懿子曰始冠必加緇布之冠何也孔子曰示不亡古太古冠布齋則緇之其緌也吾未之聞言今有緌未聞之於古古無緌也緌冠之飾也今則冠而敝之可也今不復冠白布敝之不復著也懿子曰三王之冠其異何也孔子曰周弁殷冔夏收一也皆祭服也三王共皮弁素績委貎周道也章甫殷道也毋追夏后氏之道常所服之冠也
