front:
  text: 七十二弟子解第三十八顔回魯人字子淵少孔子三十歳年二十九而髪白三十一早死此書久逺年數錯誤未可詳挍其年則顔回死時孔子年六十一歳然伯魚五十先孔子卒卒時孔子且七十此謂顔回先伯魚死而論語云顔回死顔路請子之車以為之槨子曰鯉也死有棺而無槨或為設事之辭孔子曰自吾有回門人日益顔回為孔子䟽附之友能使門人益親夫子回以德行著名孔子稱其仁焉
