body:
  text: 閔損魯人字子騫少孔子五十歳以德行著名孔子稱其孝焉冉耕魯人字伯牛以德著名有惡疾孔子曰命也夫冉雍字仲弓伯牛之宗族生於不肖之父以德行著名宰予字子我魯人有口才以言語著名仕齊為臨菑大夫與田常為亂夷其三族孔子恥之曰不在利病其在宰予言宰予為病利端木賜字子貢衞人少孔子三十一歳有口才著名孔子毎詘其辯家富累千金常結駟連騎以造原憲憲居蒿廬蓬户之中與之言先王之義原憲衣敝衣冠并日蔬食旣蔬食并日而後食也衎然有自得之志子貢曰甚矣子如何之病也原憲曰吾聞無財者謂之貧學道不能行者謂之病吾貧也非病也子貢慙終身恥其言之過子貢行販與時轉貨販發舉買賤賣貴隨時轉作以有其貨也歴相魯衞而終齊冉求字子有仲弓之宗族少孔子二十九歳有才藝以政事著名仕為季氏宰進則理其官職退則受教聖師為性多謙退故子曰求也退故進之仲由卞人字子路一字季路少孔子九歳有勇力才藝以政事著名為人果烈而剛直性鄙而不達於變通仕衞為大夫蒯聵與其子輒爭國子路遂死輒難孔子痛之曰自吾有由而惡言不入於耳子路夫子禦侮之友惡言不入夫子之耳言偃魯人字子游少孔子三十五歳時習於禮以文學著名仕為武城宰嘗從孔子適衞與將軍之子蘭相善使之受學於夫子卜商衞人字子夏少孔子四十四歳習於詩能通其義子夏所叙詩義今之毛詩序是以文學著名為人性不𢎞好論精微時人無以尚之嘗返衞見讀史志者云晉師伐秦三豕渡河子夏曰非也己亥耳讀史志曰問諸晉史果曰己亥於是衞以子夏為聖孔子卒後教於西河之上魏文侯師事之而諮國政焉顓孫師陳人字子張少孔子四十八歳為人有容貌資質寛沖博接從容自務居不務立於仁義之行子張不侮鰥寡性凱悌寛沖故子貢以為未仁然不務立仁義之行故子貢激之以為未有也孔子門人友之而弗敬曾參南武城人字子輿少孔子四十六歳志存孝道故孔子因之以作孝經齊嘗聘欲以為卿而不就曰吾父母老食人之禄則憂人之事故吾不忍逺親而為人役參後母遇之無恩而供養不衰及其妻以藜烝不熟因出之人曰非七出也荅曰藜烝小物耳吾欲使熟而不用吾命況大事乎遂出之終身不娶妻其子元請焉告其子曰髙宗以後妻殺孝已尹吉甫以後妻放伯竒吾上不及髙宗中不比吉甫庸知其得免於非乎澹臺滅明武城人字子羽少孔子四十九歳有君子之資孔子嘗以容貌望其才其才不充孔子之望然其為人公正無私以取與去就以諾為名仕魯為大夫髙柴齊人髙氏之别族字子羔少孔子四十歳長不過六尺狀貌甚惡為人篤孝而有法正少居魯見知名於孔子之門仕為武城宰宓不齊魯人字子賤少孔子四十嵗仕為單父宰有才智仁愛百姓不忍欺孔子美之樊須魯人字子遲少孔子四十六歳弱仕於季氏有若魯人字子有少孔子三十六歳為人强識好古道公西赤魯人字子華少孔子四十二歳束帶立於朝閑賔主之儀原憲宋人字子思少孔子三十六嵗清淨守節貧而樂道孔子為魯司寇原憲嘗為孔子宰孔子卒後原憲退隱居于衞公冶長魯人字子長為人能忍恥孔子以女妻之南宫縚魯人字子容以智自將世清不廢世濁不汚孔子以兄子妻之公析哀齊人字季沈鄙天下多仕於大夫家者是故未嘗屈節人臣孔子特歎貴之曾㸃曾參父字子晳疾時禮教不行欲修之孔子善焉論語所謂浴乎沂風乎舞雩之下顔由顔回父字季路孔子始教學於閭里而受學少孔子六嵗商瞿魯人字子木少孔子二十九嵗特好易孔子傳之志焉漆雕開蔡人字子若少孔子十一嵗習尚書不樂仕孔子曰子之齒可以仕矣時將過子若報其書曰吾斯之未能信言未能明信此書義孔子悦焉公良孺陳人字子正賢而有勇孔子周行常以家車五乗從秦商魯人字丕兹少孔子四嵗其父堇父與孔子父叔梁紇俱以力聞顔亥魯人字子驕少孔子五十嵗孔子適衞子驕為僕衞靈公與夫人南子同車出而令宦者雍渠參乗使孔子為次乗遊過市孔子恥之顔亥曰夫子何恥之孔子曰詩云覯爾新婚以慰我心慰安乃歎曰吾未見好德如好色者也司馬耕宋人字子牛牛為性躁好言語見兄桓魋行惡牛常憂之巫馬施陳人字子期少孔子三十嵗孔子將近行命從者皆持葢已而果雨巫馬期問曰旦無雲旣日出而夫子命持雨具敢問何以知之孔子曰昨暮月宿于畢詩不云乎月離於畢俾滂沱矣以此知之梁鱣齊人字叔魚少孔子三十九嵗年三十未有子欲出其妻商瞿謂曰子未也㫺吾年三十八無子吾母為吾更取室夫子使吾之齊母欲請留吾夫子曰無憂也瞿過四十當有五丈夫今果然吾恐子自晚生耳未必妻之過從之二年而有子琴牢衞人字子開一字張與宗魯友聞宗魯死欲往弔焉孔子弗許曰非義也冉孺魯人字子魯少孔子五十嵗顔幸魯人字子柳少孔子四十六嵗伯䖍字揩少孔子五十嵗公孫龍衞人字子石少孔子五十三嵗曹䘏少孔子五十嵗陳亢陳人字子元一字子禽少孔子四十嵗叔仲㑹魯人字子期少孔子五十四歲與孔璇年相比毎孺子之執筆記事於夫子二人迭侍左右孟武伯見孔子而問曰此二孺子之幼也於學豈能識於壯哉孔子曰然少成則若性也習慣若自然也秦祖字子南奚箴字子楷公祖兹字子之廉潔字子曹公西輿字子上罕父黑字子索公西蒧字子尚穰駟赤字子從冉季字子産薛邦字子從石處字子里懸亶字子象左郢字子行狄黑字哲之商澤字子秀任不齊字子選榮祈字子祺顔噲字子聲原忼字子籍公賓字子仲秦非字子之漆雕從字子文燕伋字子思公夏守字子乗勾井疆歩叔乗字子車石作蜀字子明邽㢲字子斂施之常字子恒申繢字子周樂欬字子聲顔之僕字子叔孔忠字子蔑孔子兄之子漆雕哆字子斂懸成字子横顔相字子襄右夫子弟子七十二人皆升堂入室者本姓解第三十九孔子之先宋之後也微子啓帝乙之元子紂之庶兄以圻内諸侯入為王卿士微國名子爵初武王克殷封紂之子武庚於朝歌使奉湯祀武王崩而與管蔡霍三叔作難周公相成王東征之二年罪人斯得乃命微子於殷後作微子之命由之與國于宋徙殷之子孫唯微子先往仕周故封之賢其弟曰仲思名衍或名泄嗣微子後故號微仲生宋公稽胄子雖遷爵易位而班級不及其故者得以故官為稱故二微雖為宋公而猶以微之號自終至于稽乃稱公焉宋公生丁公申申公生緡公共及襄公熙熙生弗父何及厲公方祀方祀以下世為宋卿弗父何生送父周周生世子勝勝生正考甫考甫生孔父嘉五世親盡别為公族故後以孔為氏焉一曰孔父者生時所賜號也是以子孫遂以氏族孔父生子木金父金父生睪夷睪夷生防叔避華氏之禍而犇魯防叔生伯夏夏生叔梁紇曰雖有九女是無子其妾生孟皮孟皮一字伯尼有足病於是乃求婚於顔氏顔氏有三女其小曰徵在顔父問三女曰陬大夫雖父祖為士然其先聖王之裔今其人身長十尺武力絶倫吾甚貪之雖年大性嚴不足為疑三子孰能為之妻二女莫對徵在進曰從父所制將何問焉父曰即爾能矣遂以妻之徵在旣往廟見以夫之年大懼不時有男而私禱尼丘山以祈焉生孔子故名丘字仲尼孔子三嵗而叔梁紇卒葬於防至十九娶於宋之上官氏生伯魚魚之生也魯昭公以鯉魚賜孔子榮君之貺故因以名鯉而字伯魚魚年五十先孔子卒齊太史子與適魯見孔子孔子與之言道子與悦曰吾鄙人也聞子之名不覩子之形久矣而未知寶貴也乃今而後知泰山之為髙淵海為大惜乎夫子之不逢明王道德不加於民而將垂寶以貽後世遂退而謂南宫敬叔曰今孔子先聖之嗣自弗父何以來世有德讓天所祚也成湯以武德王天下其配在文殷宗已下未始有也孔子生於衰周先王典籍錯亂無紀而乃論百家之遺記考正其義祖述堯舜憲章文武刪詩述書定禮理樂制作春秋讚明易道垂訓後嗣以為法式其文德著矣然凡所教誨束脩已上三千餘人或者天將欲與素王之乎夫何其盛也敬叔曰殆如吾子之言夫物莫能兩大吾聞聖人之後而非繼世之統其必有興者焉今孔子之道至矣乃將施乎無窮雖欲辭天之祚故未得耳子貢聞之以二子告孔子子曰豈若是哉亂而治之滯而起之自吾志天何與焉終記解第四十孔子蚤晨作作起負手曳杖逍遥於門而歌曰㤗山其頽乎梁木其壞乎喆人其萎乎委頓旣歌而入當户而坐子貢聞之曰㤗山其頺則吾將安仰梁木其壞則吾將安杖喆人其萎吾將安放放法夫子殆將病也遂趨而入夫子歎而言曰賜汝來何遲疇㫺夢坐奠於兩楹之間疇昔猶近昨夜兩楹之間殷人所殯夢而具奠於殯處故自知死也夏后氏殯於東階之上則猶在阼殷人殯於兩楹之間則與賓主夾之周人殯於西階之上則猶賓之而丘也即殷人夫明王不興則天下其孰能宗余言天下無明王莫能宗己道臨終其有命傷道之不行也余殆將死遂寢病七日而終時年七十二矣哀公誄曰旻天不弔不愸遺一老弔善也愸且也一老孔子也俾屏余一人以在位㷀㷀余在疚疚病於乎哀哉尼父無自律父丈夫之顯稱律法言無以自為法子貢曰公其不没於魯乎夫子有言曰禮失則昏名失則愆失志為昏失所為愆生不能用死而誄之非禮也稱一人非名一人天子之稱也君兩失之也旣卒門人疑所以服夫子者子貢曰昔夫子喪顔回也若喪其子而無服喪子路亦然今請喪夫子若喪父而無服於是弟子皆弔服而加麻出有所之則由絰子夏曰入宜絰可也出則不絰子游曰吾聞諸夫子喪朋友居則絰出則否喪所尊雖絰而出可也孔子之喪公西赤掌殯葬焉含以疎米三具疎稉米禮記曰稻曰嘉疎襲衣十有一稱加朝服一冠章甫之冠珮象環徑五寸而綨組綬組雜色組綬所以繫象環桐棺四寸柏棺五寸飭棺牆置翣設披周也設崇殷也綢練設旐夏也披柩行夾引棺者崇崇牙旍旗飾也綢練以練綢旌之杠此旌塟乘車所建也旌之旒緇布廣充幅長尋曰旐兼用三王禮所以尊師且備古也葬於魯城北泗水上藏入地不及泉而封為偃斧之形高四尺樹松柏為志焉弟子皆家於墓行心喪之禮旣葬有自燕來觀者舍於子夏氏子夏謂之曰吾亦人之葬聖人非聖人之葬人子奚觀焉㫺夫子言曰吾見封若夏屋者夏屋今之殿形中髙而四方下也見若斧矣從若斧者也上難登狹又易為功馬鬛封之謂也俗間之名今徒一日三斬板而以封板葢廣三尺長六尺斬板謂斬其縮三斬上傍殺葢髙四尺也尚行夫子之志而已尚庶何觀乎哉二三子三年喪畢或畱或去惟子貢廬於墓六年自後羣弟子及魯人處墓如家者百有餘家因名其居曰孔里焉正論解第四十一孔子在齊齊侯出田田獵招虞人以弓不進虞人掌山澤之官公使執之對曰昔先君之田也旃以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍之孔子聞之曰善哉守道不如守官道為恭敬之道見君召便往守官非守召不往也君子韙之韙是齊國書伐魯國書齊卿季康子使冉求率左師禦之樊遲為右非不能也不信乎言季孫德不素著為民所信也請三刻而踰之與衆要信三刻而踰溝也如之衆從之師入齊軍齊軍遁遁逃冉有用戈故能入焉孔子聞之曰義也在軍能却敵合法義旣戰季孫謂冉有曰子之於戰學之乎性達之乎對曰學之季孫曰從事孔子惡乎學冉有曰即學之孔子也夫孔子者大聖無不該該包文武竝用兼通求也適聞其戰法猶未之詳也季孫悦樊遲以告孔子孔子曰季孫於是乎可謂悦人之有能矣南容説仲孫何忌旣除喪除父僖子之䘮而昭公在外時為季孫所逐未之命也未命二人為卿大夫定公即位乃命之辭曰先臣有遺命焉僖子病不知禮及其將死而屬其二子使事孔子曰夫禮人之幹也非禮則無以立囑家老使命二臣必事孔子而學禮以定其位公許之二子學於孔子孔子曰能補過者君子也詩云君子是則是效孟僖子可則傚矣懲已所病以誨其嗣大雅所謂貽厥孫謀以燕翼子是類也夫詒遺也燕安也翼敬也言遺其子孫嘉謀學安敬之道衞孫文子得罪於獻公居戚文子衞卿林父得罪以戚叛也公卒未葬文子擊鐘焉延陵季子呉季子札適晉過戚聞之曰異哉夫子之在此猶燕子巢于幕也燕巢于幕言至危也懼猶未也又何樂焉君又在殯可乎文子於是終身不聽琴瑟孔子聞之曰季子能以義正人文子能克已服義可謂善改矣孔子覽晉志晉之史記晉趙穿殺靈公穿趙盾從弟也趙盾亡未及山而還山晉之境史書趙盾弑君盾曰不然史曰子為正卿亡不出境返不討賊非子而誰盾曰嗚呼我之懷矣自詒伊戚其我之謂乎孔子歎曰董狐古之良史也書法不隱趙宣子古之良大夫也為法受惡惜也越境乃免惜盾不越境以免於譏而受弑君之責也鄭伐陳入之使子産獻捷于晉晉人問陳之罪焉子産對曰陳亡周之大徳武王以元女大姬以配胡公而封諸陳豕恃楚衆豕犬馮陵敝邑是以有往年之告告晉為陳所侵未獲命未得晉平陳之成命則又有東門之役與楚共伐鄭至其東門當陳隧者井堙木刋隧陳人堙塞刋斫也敝邑大懼天誘其衷誘導衷善也天導其善大尅陳者也啓敝邑心陳知其罪授首于我用敢獻功晉人曰何故侵小對曰先王之命惟罪所在各致其辟辟誅且昔天子一圻列國一同地方千里曰圻方百里曰同自是以衰周之制也大國方百里從是以為差伯方七十里子男五十里周之制也而説學者以周大國方七百里失之逺矣今大國多數圻矣若無侵小何以至焉晉人曰其辭順孔子聞之謂子貢曰志有之志古之書也言以足志言以足成其志文以足言加以文章以足成其言不言誰知其志言之無文行之不逺有言而無文章雖行而不逺也晉為伯鄭入陳非文辭不為功慎辭哉楚靈王汰侈驕汰奢侈右尹子革侍坐右尹官名子革然丹左史倚相趨而過王曰是良史也子善視之是能讀三墳五典八索九丘三墳三皇之書五典五帝之典八索索法九丘國聚也對曰夫良史者記君之過揚君之善而此子以潤辭為官不可為良史臣又嘗問焉昔周穆王欲肆其心肆極將過行天下使皆有車轍馬迹焉祭公謀父作祈昭謀父周卿士祈昭詩名猶齊景公作君臣相悦之樂葢曰徴昭角昭是也昭宜為招左傳作招以止王心止王心之逸逰王是以獲殁於文宫臣問其詩焉而弗知若問逺焉其焉能知王曰子能乎對曰能其詩曰祈昭之愔愔乎式昭徳音祈為德愔愔言祈昭樂之安和其法足以昭其徳音者也思我王度式如玉式如金思王之法度如金玊然美詩云追琢其章金玉其相刑民之力而無有醉飽之心刑傷民力用之不勝不節無有醉飽之心言無厭足靈三揖而入饋不食寢不寐數日則固不能勝其情以及於難孔子讀其志曰克己復禮為仁克勝言能勝己私情復之於禮則為仁也信善哉楚靈王若能如是豈其辱於乾谿靈王起章華之臺於乾谿國人潰畔遂死焉子革之非左史所以風也稱詩以諫順哉叔孫穆子避難奔齊穆子叔孫豹其兄僑如淫亂故避之而出奔齊宿於庚宗之邑庚宗寡婦通焉而生牛名牛穆子反魯以牛為内豎豎通内外之命相家長遂命為相家牛䜛叔孫二子殺之叔孫有病牛不通其饋不食而死牛遂輔叔孫庶子昭而立之子叔孫諾昭子旣立朝其家衆曰豎牛禍叔孫氏使亂大從從順殺適立庶又披其邑以求舍罪牛取叔氏鄙三十邑以行賂也罪莫大焉必速殺之遂殺竪牛孔子曰叔孫昭子之不勞勞功不以立已為功不可能也周任有言曰周任古之賢人為政者不賞私勞不罰私怨詩云有覺徳行四國順之覺直也昭子有焉晉邢侯與雍子爭田叔魚攝理叔魚叔向弟理獄官之名罪在雍子雍子納其女於叔魚叔魚弊其邢獄弊斷㫁罪歸邢侯也邢侯怒殺叔魚與雍子於朝韓宣子問罪於叔向宣子晉正卿韓起也叔向曰三姧同罪施生戮死可也施宜為與與猶行也行生者之罪也雍子自知其罪而賂以置直鮒也鬻獄邢侯專殺其罪一也己惡而掠美為昏取善昏亂也己惡以賂求善為亂也貪以賂官為黙黙猶冒苟貪不畏罪殺人不忌為賊忌憚夏書曰昏黙賊殺夏書夏家之書三者宜皆殺也咎陶之刑也請從之乃施邢侯而尸雍子叔魚於市孔子曰叔向古之遺直也治國制刑不隱於親三數叔魚之罪不為末末薄或曰義或左傳作義也可謂直矣平丘之㑹數其賄也以寛衞國晉不為㬥諸侯㑹于平丘晉人淫芻蕘者於衞衞人患之賂叔向叔向使與叔魚客未追而禁之歸魯季孫稱其詐也以寛魯國晉不為虐魯季孫見執諮於晉晉人歸之季孫責禮不肯歸叔向言叔魚能歸之叔魚説季孫季孫懼乃歸之邢侯之獄言其貪也以正刑書晉不為頗頗偏三言而除三惡加三利暴衞虐魯殺三罪去三惡加三利也殺親益榮由義也夫鄭有鄉校鄉之學校鄉校之士非論執政鬷明欲毁鄉校鬷明然明子産曰何以毁為夫人朝夕退而遊焉以議執政之善否其所善者吾則行之其所否者吾則改之若之何其毁也我聞忠善以損怨不聞立威以防怨防怨猶防水也大決所犯傷人必多吾弗克救也不如小決使導之不如吾所聞而藥之藥療也孔子聞是言也曰吾以是觀之人謂子産不仁吾不信也晉平公㑹諸侯于平丘齊侯及盟鄭子産爭貢賦之所承所承之輕重也曰昔者天子班貢輕重以列列尊卑而貢周之制也卑而貢重者甸服甸服王圻之内與圻外諸侯異故貢重也鄭伯南也而使從公侯之貢南左氏作男古字作南亦多有作此南連言之猶言公侯也懼弗給也敢以為請自日中爭之以至于昏晉人許之孔子曰子産於是行也是以為國也詩云樂只君子邦家之基本也子産君子之於樂者能為國之本則人樂藝也且曰合諸侯而藝貢事禮也藝分别貢獻之事也鄭子産有疾謂子太叔曰我死子必為政唯有徳者能以寛服民其次莫如猛夫火烈民望而畏之故鮮死焉水懦弱民狎而翫之狎易翫習則多死焉故寛難子産卒子太叔為政不忍猛而寛鄭國多掠盜抄掠太叔悔之曰吾早從夫子必不及此孔子聞之曰善哉政寛則民慢慢則糺於猛糺猶攝也猛則民殘猛政殘民民殘則施之以寛寛以濟猛猛以濟寛寛猛相濟政是以和詩云民亦勞止汔可小康汔危也勞民人病汔可小變故以安也惠此中國以綏四方施之以寛母縱詭隨詭人隨人遺人小惡者也以謹無良謹小以懲之也式遏寇虐慘不畏明慘曾也當用遏止為寇虐之人也曾不畏天之明道者言威也糺之以猛也柔逺能邇言能安逺者能安近以定我王以定安王位也平之以和也又曰不競不絿不剛不柔絿急言得中和布政優優百禄是遒優優和遒聚和之至也子産之卒也孔子聞之出涕曰古之遺愛孔子適齊過㤗山之側有婦人哭於野者而哀夫子式而聽之曰此哀一似重有憂者使子貢往問之而曰舅死於虎吾夫又死焉今吾子又死焉子貢曰何不去乎婦人曰無苛政子貢以告孔子子曰小子識之苛政猛於㬥虎晉魏獻子為政獻子魏舒分祁氏及羊舌氏之田荀櫟滅晉大夫祁氏羊舌氏故獻子分其田以賞諸太夫及其子成皆以賢舉也又謂賈辛曰今汝有力於王室吾是以舉汝周有子朝之亂賈辛帥師救周行乎敬之哉毋墮乃力孔子聞之曰魏子之舉也近不失親子可舉而舉也逺不失舉不以逺故不舉可謂美矣又聞其命賈辛以為忠詩云永言配命自求多福忠也大雅文王之詩言能長配天命而魏獻子亦能永天命以求多福忠也魏子之舉也義其命也忠其長有後於晉國乎趙簡子賦晉國一鼓鐘三十斤謂之鈞鈞四謂之石石四謂之鼔以鑄刑鼎著范宣子所為刑書范宣子晉卿范匄銘其刑書著鼎也孔子曰晉其亡乎失其度矣夫晉國將守唐叔之所受法度唐叔成王母弟始封於晉者也以經緯其民者也經緯猶織以成文也卿大夫以序守之序次序也民是以能遵其道而守其業貴賤不􅄽謂度也文公是以作執秩之官為被廬之法晉文公旣霸蒐于被廬作執秩之官以為晉國法也以為盟主今棄此度也而為刑鼎民在鼎矣何以尊貴民將禮棄而徴於書不復戴奉上也何業之守也民不奉上則上無所守也貴賤無序何以為國且夫宣子之刑夷之蒐也晉國亂制夷蒐之時變易軍師陽唐父為賈季所殺故曰亂制也若之何其為法乎楚昭王有疾卜曰河為祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望天子祀天地諸侯望祀境内故曰祭不越望也江漢沮漳楚之望也四水名也禍福之至不是過乎不穀雖不德河非所獲罪也遂不祭孔子曰楚昭王知大道矣取之於已不越祀也其不失國也宜哉楚為呉所滅昭王出奔已復國者也夏書曰維彼陶唐率彼天常陶唐堯率循天之常道在此冀方中國為冀今失其行亂其紀綱乃滅而亡謂夏桀又曰允出兹在兹由己率常可矣言善惡各有類信出此則在此以能循常道可也衞孔文子使太叔疾出其妻而以其女妻之初疾娶于宋子朝其婦嬖于朝文子使疾出其妻而已妻之疾誘其初妻之娣為之立宫與文子女如二妻之禮文子怒將攻之孔子舍蘧伯玉之家文子就而訪焉孔子曰簠簋之事則嘗聞學之矣兵甲之事未之聞也退而命駕而行曰鳥則擇木木豈能擇鳥乎文子遽自止之曰圉也豈敢度其私哉度謀亦訪衞國之難也將止㑹季康子問冉求之戰冉求旣對之又曰夫子播之百姓質諸鬼神而無憾恨也用之則有名康子言於哀公以幣迎孔子曰人之於冉求信之矣將大用之齊陳恒弑其君簡公孔子聞之三日沭浴而適朝告於哀公曰陳恒弑其君請伐之公弗許三請公曰魯為齊弱久矣子之伐也將若之何對曰陳恒弑其君民之不與者半以魯之衆加齊之半可克也公曰子告季氏孔子辭不告季氏退而告人曰以吾從大夫之後不敢不告也子張問曰書云髙宗三年不言言乃雍有諸雍歡聲貌尚書云言乃雍和有諸也孔子曰胡為其不然也古者天子崩則世子委政於冡宰三年成湯旣殁太甲聽於伊尹太甲湯孫武王旣喪成王聽於周公其義一也衞孫桓子侵齊遇敗焉桓子孫良夫也侵齊與齊師遇為齊所敗也齊人乗之新築大夫仲叔于奚以其衆救桓子桓子乃免衞人以邑賞仲叔于奚于奚辭請曲懸之樂諸侯軒懸軒懸闕一面也故謂之曲懸之樂繁纓以朝馬纓當膺以索羣銜以黄金為飾也許之書在三官司徒書名司馬書服司空書勲也子路仕衞見其政以訪孔子孔子曰惜也不如多與之邑唯器與名不可以假人器禮樂之器名尊卑之名君之所司也名以出信信以守器器以藏禮有器然後得行其禮故曰器以藏禮禮以行義義以生利利以平民政之大節也若以假人與人政也政亡則國家從不可止已公父文伯之母文伯母敬姜也紡績不解文伯諫焉其母曰古者王后親織𤣥紞紞冠垂者公侯之夫人加之紘綖纓屈而上者謂之紘綖冠之上覆也卿之内子為大帶卿之妻為内子命婦成祭服大夫之妻為命婦列士之妻加之以朝服自庶士已下各衣其夫社而賦事烝而獻功男女春秋而勤歳事冬烝祭而獻其功也男女紡績愆則有辟績功也辟法也聖王之制也今我寡也爾又在位朝夕恪勤猶恐亡先人之業況有怠惰其何以避辟孔子聞之曰弟子志之季氏之婦可謂不過矣樊遲問於孔子曰鮑牽事齊君執政不撓可謂忠矣齊慶克通於夫人鮑牽知之告國武子武子召慶克而讓之慶克召夫人夫人怒國子相靈公以㑹于諸侯髙鮑處守及還將至閉門而索客夫人訴之曰高鮑將不納君遂刖鮑牽之足而君刖之其為至闇乎孔子曰古之士者國有道則盡忠以輔之無道則退身以避之今鮑莊子食於淫亂之朝不量主之明暗以受大刑是智之不如葵葵猶能衞其足葵傾葉隨日轉故曰衞其足也季康子欲以一井田出法賦焉使訪孔子子曰丘弗識也冉有三發卒曰子為國老待子而行若之何子之不言孔子不對而私於冉有曰求汝來汝弗聞乎先王制土藉田以力田有税收藉力以治公田也而底其逺近底平平其逺近則什一而中賦里以入而量其有無里廛里有税度其有無以為多少之入也任力以夫而議其老幼力作度之事丁夫召其老幼或重或輕於是鰥寡孤疾老者有軍旅之出則徵之無則已於軍旅之役則鰥寡孤疾或有所供無軍事則止也其嵗收田一井出稯秉缶米芻藁不是過其嵗軍旅之嵗一把曰秉四秉曰筥穗連藁筥不可分故曰芻缶十六斗曰庾也先王以為足君子之行必度於禮施取其厚施以厚為德也事舉其中事以中為節斂從其薄若是其以丘亦足矣丘十六井不度於禮而貪冒無厭則雖賦田將有不足且季孫若以行之而取法則有周公之典在若欲犯法則苟行之又何訪焉子游問於孔子曰夫子之極言子産之惠也可得聞乎孔子曰謂在愛民而已矣子游曰愛民謂之德教何翅施惠哉孔子曰夫子産者猶衆人之母也能食之而不能教也子游曰其事可言乎孔子曰子産以所乘之車濟冬涉是愛而無教也定公問於孔子曰二三大夫皆勸寡人使隆敬於髙年何也孔子對曰君之及此言也將天下實賴之豈唯魯哉公曰何也其義可得聞乎孔子曰㫺者有虞氏貴徳而尚齒夏后氏貴爵而尚齒殷人貴富而尚齒富貴世禄之家周人貴親而尚齒虞夏殷周天下之上王也未有遺年者焉年者貴於天下久矣次于事親是故朝廷同爵而尚齒七十杖於朝君問則席君欲問之則為之設席而問焉八十則不仕朝君問則就之而悌達乎朝廷矣其行也肩而不竝不敢與長若竝肩也不錯則隨錯雁行父黨隨行兄黨雁行也班白之老不以其任於路任檐也少者代之也而悌達乎道路矣居鄉以齒而老窮不匱强不犯弱衆不㬥寡而悌達乎州巷矣古之道五十不為甸役五十始老不為力役之事不為田獵之徒也頒禽隆之長者而悌達乎蒐狩矣軍旅伍什同列則尚齒而悌達乎軍旅矣夫聖人之教孝悌發諸朝廷行於道路至于州巷放于蒐狩循于軍旅則衆感以義死之而弗敢犯公曰善哉寡人雖聞之弗能成哀公問於孔子曰寡人聞東益不祥東益之宅信有之乎孔子曰不祥有五而東益不與焉夫損人自益身之不祥棄老而取幼家之不祥釋賢而任不肖國之不祥老者不教幼者不學俗之不祥聖人伏匿愚者擅權天下不祥不祥有五東益不與焉孔子適季孫季孫之宰謁曰君使求假於田將與之乎季孫未言孔子曰吾聞之君取於臣謂之取與於臣謂之賜臣取於君謂之假與於君謂之獻季孫色然悟曰吾誠未達此義遂命其宰曰自今已往君有取一切不得復言假也家語卷九欽定四庫全書家語卷十魏王肅注
