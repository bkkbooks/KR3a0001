front:
  text: 顔回第十八魯定公問於顔回曰子亦聞東野畢之善御乎對曰善則善矣雖然其馬將必佚定公色不悦謂左右曰君子固有誣人也顔回退後三日牧来訴之曰東野畢之馬佚兩驂曳兩服入于廏公聞之越席而起促駕召顔回回至公曰前日寡人問吾子以東野畢之御而子曰善則善矣其馬將佚不識吾子奚以知之顔回對曰以政知之昔者帝舜巧於使民造父巧於使馬舜不窮其民力造父不窮其馬力是以舜無佚民造父無佚馬今東野畢之御也升馬執轡銜體正矣馬非為車步驟馳騁朝禮畢矣馬步驟馳騁盡禮之儀也歴險致逺馬力盡矣然而猶乃求馬不已臣以此知之公曰善誠若吾子之言也吾子之言其義大矣願少進乎顔回曰臣聞之鳥窮則啄獸窮則攫人窮則詐馬窮則佚自古及今未有窮其下而能無危者也公悦遂以告孔子孔子對曰夫其所以為顔回者此之類也豈足多哉孔子在衞昧旦晨興顔回侍側聞哭者之聲甚哀子曰回汝知此何所哭乎對曰回以此哭聲非但為死者而已又有生離别者也子曰何以知之對曰回聞桓山之鳥生四子焉羽翼既成將分于四海其母悲鳴而送之哀聲有似於此謂其往而不返也回竊以音類知之孔子使人問哭者果曰父死家貧賣子以葬與之長決子曰回也善於識音矣顔回問於孔子曰成人之行若何子曰達於情性之理通於物類之變知幽明之故覩㳺氣之原若此可謂成人矣既能成人而又加之以仁義禮樂成人之行也若乃窮神知禮德之盛也禮宜為化顔回問於孔子曰臧文仲武仲孰賢孔子曰武仲賢哉顔回曰武仲世稱聖人而身不免於罪是智不足稱也武仲為季氏廢嫡立庶為孟氏所譛出奔於齊好言兵討而挫鋭於邾是智不足名也武仲與邾戰而敗績國人頌之曰我君小子侏儒是使侏儒侏儒使我敗於邾夫文仲其身雖殁而言不朽惡有未賢立不朽之言故以為賢孔子曰身殁言立所以為文仲也然猶有不仁者三不智者三是則不及武仲也回曰可得聞乎孔子曰下展禽展禽柳下恵知其賢而使在下位不與立於朝也置六關六關關名魯本無此關文仲置之以税行者故為不仁傳曰廢六關非也妾織蒲傳曰織蒲蒲席也言文仲為國為家在於貪刋也三不仁設虚器居蔡蔡天子之守龜非文仲所有故曰虚器也縦逆祀夏父弗忌為宗人躋僖公於閔公之上文仲縦而不禁也祠海鳥海鳥止於魯東門之上文仲不知而令國人祠之是不知也三不智武仲在齊齊將有禍不受其田以避其難武仲在齊齊莊公將與之田武仲知莊公將有難辭而不受也是智之難也夫臧武仲之智而不容於魯抑有由焉作而不順施而不恕也夫不順不恕為廢嫡立庶武仲之所以然欲為施於季氏也夏書曰念兹在兹順事恕施念此在常當順其事恕其施也顔回問君子孔子曰愛近仁度近智度事而行近於智也為已不重為人不輕君子也夫不重為人回曰敢問其次子曰弗學而行弗思而得小子勉之仲孫何忌問於顔回曰仁者一言而必有益於仁智可得聞乎回曰一言而有益於智莫如豫一言而有益於仁莫如恕夫知其所不可由斯知所由矣顔回問小人孔子曰毁人之善以為辯狡訐懷詐以為智幸人之有過恥學而羞不能小人也顔回問子路曰力猛於德而得其死者鮮矣盍慎諸焉孔子謂顔回曰人莫不知此道之美而莫之御也御猶待也莫之為也何居為聞者盍曰思也夫為聞盍曰有聞而後言者而已顔回問於孔子曰小人之言有同乎君子者不可不察也孔子曰君子以行言小人以舌言故君子於為義之上相疾也退而相愛相疾急欲相勸令為仁義小人於為亂之上相愛也退而相惡樂施為亂是以相愛小人之不能乆親也顔回問朋友之際如何孔子曰君子之於朋友也心必有非焉而弗能謂吾不知其仁人也不忘乆德不思乆怨仁矣夫叔孫武叔見未仕於顔回回曰賔之武叔多稱人之過而已評論之顔回曰固子之来辱也宜有得於回焉吾聞諸孔子曰言人之惡非所以美已言人之枉非所以正已故君子攻其惡無攻人之惡顔回謂子貢曰吾聞諸夫子身不用禮而望禮於人身不用德而望德於人亂也夫子之言不可不思也
