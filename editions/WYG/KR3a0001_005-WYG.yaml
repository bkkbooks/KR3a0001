body:
  text: 子路初見第十九子路見孔子子曰汝何好樂對曰好長劒孔子曰吾非此之問也徒謂以子之所能而加之以學問豈可及乎子路曰學豈益也哉孔子曰夫人君而無諫臣則失正士而無敎友則失聽御狂馬不釋䇿御狂馬者不得釋箠䇿也操弓不反檠弓不反於檠然後可持也木受繩則直人受諌則聖受學重問孰不順哉毁仁惡士必近於刑謗毁仁者憎怨士人必主於刑也君子不可不學子路曰南山有竹不揉自直斬而用之達于犀革以此言之何學之有孔子曰括而羽之鏃而礪之其入之不亦深乎子路再拜敬而受敎子路將行辭於孔子子曰贈汝以車乎贈汝以言乎子路曰請以言孔子曰不强不達人不以强力則不能自達不勞無功不忠無親不信無復信近於義言可復也令而不信則無可復不恭失禮慎此五者而已子路曰由請終身奉之敢問親交取親若何言寡可行若何長為善士而無犯若何孔子曰汝所問苞在五者中矣親交取親其忠也言寡可行其信乎長為善士而無犯於禮也孔子為魯司冦見季康子康子不悦當為桓子非康子也孔子又見之宰予進曰昔予也嘗聞諸夫子曰王公不我聘則弗動今夫子之於司寇也日少謂在司冦官少日淺而屈節數矣謂屈節數見於季孫不可以已乎孔子曰然魯國以衆相陵以兵相暴之日乆矣而有司不治則將亂也其聘我者孰大於是哉言聘我使在官其為治豈復有大於此者也魯人聞之曰聖人將治何不先自逺刑罰自此之後國無爭者孔子謂宰予曰違山十里蟪蛄之聲猶在於耳故政事莫如應之違去也蟪蛄蛁蟟也蛁蟟之聲去山十里猶在於耳以其鳴而不已言政事須慎聽之然後行之者也孔子兄子有孔篾者與宓子賤皆仕孔子往過孔篾而問之曰自汝之仕何得何亡對曰未有所得而所亡者三王事若龍龍宜為讋前後相因也已學焉得習言不得習學也是學不得明也俸禄少饘粥不及親戚是骨肉益疎也公事多急不得弔死問疾是朋友之道闕也其所亡者三即謂此也孔子不悦往過子賤問如孔篾對曰自来仕者無所亡其有所得者三始誦之今得而行之是學益明也俸禄所供被及親戚是骨肉益親也雖有公事而兼以弔死問疾是朋友篤也孔子喟然謂子賤曰君子哉若人若人猶言是人者也魯無君子者則子賤焉取此如魯無君子者此人安得而學之言魯有君子也孔子侍坐於哀公賜之桃與黍焉哀公曰請孔子先食黍而後食桃左右皆掩口而笑公曰黍者所以雪雪拭桃非為食之也孔子對曰丘知之矣然夫黍者五穀之長郊禮宗廟以為上盛菓屬有六而桃為下祭祀不用不登郊廟丘聞之君子以賤雪貴不聞以貴雪賤今以五穀之長雪菓之下者是従上雪下臣以為妨於敎害於義故不敢公曰善哉子貢曰陳靈公宣婬於朝靈公與卿共婬夏姬泄冶正諌而殺之是與比干諌而死同可謂仁乎子曰比干於紂親則諸父官則少師忠報之心在於宗廟而已固必以死爭之冀身死之後紂將悔悟其本志情在於仁者也泄冶之於靈公位在大夫無骨肉之親懷寵不去仕於亂朝以區區之一身欲正一國之婬昏死而無益可謂狷矣詩曰民之多僻無自立辟僻邪辟法其泄冶之謂乎孔子相魯齊人患其將霸欲敗其政乃選好女子八十人衣以文飾而舞容璣容璣舞曲及文馬四十駟駟四馬也以遺魯君陳女樂列文馬于魯城南髙門外季桓子㣲服往觀之再三將受焉告魯君為周道遊觀觀之終日怠於政事子路言於孔子曰夫子可以行矣孔子曰魯今且郊若致膰於大夫膰祭肉也則是未廢其常吾猶可以止也桓子既受女樂君臣婬荒三日不聽國政郊又不致膰俎孔子遂行宿於郭屯師已送曰夫子非罪也孔子曰吾歌可乎歌曰彼婦人之口可以出走彼婦人之謁可以死敗言婦人口請謁足以使人死敗故可出走優哉遊哉聊以卒嵗言士不遇優遊以終嵗也澹臺子羽有君子之容而行不勝其貌宰我有文雅之辭而智不充其辯孔子曰里語云相馬以輿相士以居弗可廢矣以容取人則失之子羽以辭取人則失之宰予孔子曰君子以其所不能畏人小人以其所不能不信人故君子長人之才小人抑人而取勝焉孔篾問行已之道子曰知而弗為莫如勿知親而弗信莫如勿親樂之方至樂而勿驕患之將至思而勿憂孔篾曰行已乎子曰攻其所不能補其所不備毋以其所不能疑人毋以其所能驕人終日言無遺已憂終日行不遺已患惟智者有之在厄第二十楚昭王聘孔子孔子往拜禮焉路出於陳蔡陳蔡大夫相與謀曰孔子聖賢其所刺譏皆中諸侯之病若用於楚則陳蔡危矣遂使徒兵距孔子孔子不得行絶糧七日外無所通藜羮不充従者皆病孔子愈慷慨講誦絃歌不衰乃召子路而問焉曰詩云匪兕匪虎率彼曠野率循也言非兕虎而循曠野也吾道非乎奚為至於此子路慍作色而對曰君子無所困意者夫子未仁與人之弗吾信也言人不信豈以未仁故也意者夫子未智與人之弗吾行也言人不使通行而困窮者豈以吾未智也且由也昔者聞諸夫子為善者天報之以福為不善者天報之以禍今夫子積德懷義行之乆矣奚居之窮也子曰由未之識也吾語汝汝以仁者為必信也則伯夷叔齊不餓死首陽汝以智者為必用也則王子比干不見剖心汝以忠者為必報也則關龍逄不見刑汝以諌者為必聽也則伍子胥不見殺夫遇不遇者時也賢不肖者才也君子博學深謀而不遇時者衆矣何獨丘哉且芝蘭生於深林不以無人而不芳君子修道立德不為窮困而敗節為之者人也生死者命也是以晉重耳之有霸心生於曹衞重耳晉文公也為公子時出奔困於曹衞越王勾踐之有霸心生於㑹稽言越王之有霸心乃坐困於㑹稽之時也故居下而無憂者則思不逺處身而常逸者則志不廣庸知其終始乎庸用也汝何用知其終始或者若文公越王之時也子路出召子貢告如子路子貢曰夫子之道至大故天下莫能容夫子夫子盍少貶焉子曰賜良農能稼不必能穡種之為稼斂之為穡言良農能善種之未必能斂穫之也良工能巧不能為順言良工能巧不能每順人意也君子能修其道綱而紀之不必其能容今不修其道而求其容賜爾志不廣矣思不逺矣子貢出顔回入問亦如之顔回曰夫子之道至大天下莫能容雖然夫子推而行之世不我用有國者之醜也夫子何病焉不容然後見君子孔子欣然歎曰有是哉顔氏之子吾亦使爾多財吾為爾宰宰主財者也為汝主財言志之同也子路問於孔子曰君子亦有憂乎子曰無也君子之修行也其未得之則樂其意既得之又樂其治是以有終身之樂無一日之憂小人則不然其未得也患弗得之既得之又恐失之是以有終身之憂無一日之樂也曾子弊衣而耕於魯魯君聞之而致邑焉曾子固辭不受或曰非子之求君自致之奚固辭也曾子曰吾聞受人施者常畏人與人者常驕人縦君有賜不我驕也吾豈能勿畏乎孔子聞之曰參之言足以全其節也孔子厄於陳蔡従者七日不食子貢以所賫貨竊犯圍而出告糴於野人得米一石焉顔回仲由炊之於壊屋之下有埃墨墮飯中顔回取而食之子貢自井望見之不悦以為竊食也入問孔子曰仁人亷士窮改節乎孔子曰改節即何稱於仁亷哉子貢曰若回也其不改節乎子曰然子貢以所飯告孔子子曰吾信回之為仁乆矣雖汝有云弗以疑也其或者必有故乎汝止吾將問之召顔回曰疇昔予夢見先人豈或啓佑我哉子炊而進飯吾將進焉對曰向有埃墨墮飯中欲置之則不㓗欲棄之則可惜回即食之不可祭也孔子曰然乎吾亦食之顔回出孔子顧謂二三子曰吾之信回也非待今日也二三子由此乃服之入官第二十一子張問入官於孔子入官謂當官治民之職也孔子曰安身取譽為難子張曰為之如何孔子曰已有善勿専雖有善當與下共之勿専以為已有者也敎不能勿怠怠懈已過勿發言人已過誤無所傷害勿發揚失言勿掎有人失言勿掎角之不善勿遂已有不善不可遂行行事勿留宜行之事勿令留滯君子入官自此六者則身安譽至而政従矣衆従其政無違敎也且夫忿數者官獄所由生也距諌者慮之所以塞也慢易者禮之所以失也怠惰者時之所以後也奢侈者財之所以不足也専獨者事之所以不成也君子入官除此六者則身安譽至而政従矣故君子南面臨官大域之中而公治之大域猶大較也精智而略行之以情知之略舉其要而行之合是忠信考是大倫存是美惡進是利而除是害無求其報焉而民之情可得也夫臨之無抗民之惡治民無抗揚之志也勝之無犯民之言以慎勝民言不犯民量之無佼民之辭佼猶周也度量而施政辭不周民也養之無擾於其時愛之無寛於刑法言雖愛民不可寛於刑法威剋其愛故事無不成也若此則身安譽至而民得也君子以臨官所見則邇故明不可蔽也所見邇謂察於微也所求於邇故不勞而得也所求者近故不勞而得也所以治者約故不用衆而譽立凡法象在内故法不逺而源泉不竭法象近在於内故不逺而源泉不竭盡是以天下積而本不寡言天下之事皆積聚而成如源泉之本非徒不竭乃不寡短長得其量人志治而不亂政德貫乎心藏乎志形乎色發乎聲若此而身安譽至民咸自治矣是故臨官不治則亂亂生則爭之者至爭之至又於亂小亂則爭爭之甚者又大亂至矣明君必寛裕以容其民慈愛優柔之而民自得矣行者政之始也行為政始言民従行不従言也説者情之導也言説者但導達其情善政行易則民不怨言善政行簡易而民無怨者也言調説和則民不變調適也言適於事説和於民則不變法在身則民象之言法度常在身則民法之明在已則民顯之若乃供已而不節則財利之生者微矣言自供不節於財財不可供生財之道㣲矣貪以不得則善政必簡矣言徒貪於不得財善政則簡略而不修也苟以亂之則善言必不聽也詳以納之則規諌日至納善言也言之善者在所日聞日聞善言可行於今日也行之善者在所能為故君上者民之儀也有司執政者民之表也邇臣便僻者羣僕之倫也僻宜為辟便僻執事在君之左右者倫紀也為衆之紀故儀不正則民失表不端則百姓亂邇臣便辟則羣臣汙矣是以人主不可不敬乎三倫君子修身反道察里言而服之服行則身安譽至終始在焉故夫女子必自擇絲麻良工必自擇完材賢君必自擇左右勞於取人佚於治事君子欲譽則必謹其左右為上者譬如縁木焉務髙而畏下兹甚六馬之乖離必於四達之交衢萬民之叛道必於君上之失政上者尊嚴而危民者卑賤而神君有愛思之心感於民故謂如神愛之則存惡之則亡長民者必明此之要故南面臨官貴而不驕富而能供供宜為共古恭字也有夲而能圖末修事而能建業既能修治舊事又能建立功業也乆居而不滯情近而暢乎逺察一物而貫乎多治一物而萬物不能亂者以身本者也君子莅民不可以不知民之性而達諸民之情既知其性又習其情然後民乃従命矣故世舉則民親之政均則民無怨故君子蒞民不臨以髙不抗揚也不導以逺不責民之所不為不强民之所不能以明王之功不因其情則民嚴而不迎迎奉也民嚴畏其上而不奉迎其敎篤之以累年之業不因其力則民引而不従引導也敎之以非其力之所堪則民引而不従其敎者矣若責民所不為强民所不能則民疾疾則僻矣民疾其上即邪僻之心生古者聖主冕而前旒所以蔽明也紘紞充耳所以掩聰也水至清即無魚人至察則無徒枉而直之使自得之優而柔之使自求之優寛也柔和也使自求其宜也揆而度之使自索之揆度其法以開示之使自索得之也民有小過必求其善以赦其過民有大罪必原其故以仁輔化如有死罪其使之生則善也是以上下親而不離道化流而不蘊藴滯積也故德者政之始也政不和則民不従其敎矣不従敎則民不習不習則不可得而使也君子欲言之見信也莫善乎先虚其内虚其内謂直道而行無情欲也欲政之速行也莫善乎以身先之欲民之速服也莫善乎以道御之故雖服必强言民雖服必以威强之非心服也自非忠信則無可以取親於百姓者矣内外不相應則無可以取信於庶民者矣此治民之至道矣入官之大統矣子張既聞孔子斯言遂退而記之困誓第二十二子貢問於孔子曰賜倦於學困於道矣願息而事君可乎孔子曰詩云溫恭朝夕執事有恪敬也事君之難也焉可息哉曰然則賜願息而事親孔子曰詩云孝子不匱永錫爾類匱竭也類善也孝子之道不匱竭者能以類相傳長錫爾以善道也事親之難也焉可以息哉曰然則賜請願息於妻子孔子曰詩云刑于寡妻至于兄弟以御于家邦刑法也寡適也御正也文王以正法接其寡妻至于同姓兄弟以正治天下之國家者矣妻子之難也焉可以息哉曰然則賜願息於朋友孔子曰詩云朋友攸攝攝以威儀朋友之難也焉可以息哉曰然則賜願息於耕矣孔子曰詩云晝爾于茅宵爾索綯亟其乘屋其始播百穀宵夜綯絞也當以時治屋也亟疾也當亟乗爾屋以善治之也其復當修農播百穀言無懈怠耕之難也焉可以息哉曰然則賜將無所息者也孔子曰有焉自望其廣則睪如也廣宜為壙睪髙貌壙而髙冢是也視其髙則填如也填塞實貌也冢雖髙而塞實也察其従則隔如也言其隔而不得復相従也此其所以息也矣子貢曰大哉乎死也君子息焉小人休焉大哉乎死也孔子自衞將入晉至河聞趙簡子殺竇犫鳴犢及舜華乃臨河而歎曰美哉水洋洋乎丘之不濟此命也夫子貢趨而進曰敢問何謂也孔子曰竇犫鳴犢舜華晉之賢大夫也趙簡子未得志之時須此二人而後従政及其已得志也而殺之丘聞之刳胎殺夭則麒麟不至其郊竭澤而漁則蛟龍不處其淵覆巢破卵則鳯凰不翔其邑何則君子違傷其類者也違去也違或作諱也鳥獸之於不義尚知避之况於人乎遂還息於鄒作槃操以哀之槃操琴曲名也子路問於孔子曰有人於此夙興夜寐耕芸樹藝手足胼胝以養其親然而名不稱孝何也孔子曰意者身不敬與辭不順與色不悦與古之人有言曰人與已與不汝欺言人與已事實相通不相欺也今盡力養親而無三者之闕何謂無孝之名乎孔子曰由汝志之吾語汝雖有國士之力而不能自舉其身非力之少勢不可矣夫内行不修身之罪也行修而名不彰友之罪也行修而名自立故君子入則篤行出則交賢何為無孝名乎孔子遭厄於陳蔡之間絶糧七日弟子餒病孔子絃歌子路入見曰夫子之歌禮乎孔子弗應曲終而曰由来吾語汝君子好樂為無驕也小人好樂為無懾也懾懼其誰之子不我知而従我者乎其誰之子猶言以誰氏子謂子路也雖従我而不知我也子路悦援戚而舞三終而出明日免於厄子貢執轡曰二三子従夫子而遭此難也其弗忘矣孔子曰善惡何也善子貢言也惡何猶言是何也夫陳蔡之間丘之幸也二三子従丘者皆幸也吾聞之君不困不成王烈士不困行不彰庸知其非激憤厲志之始於是乎在孔子之宋匡人簡子以甲士圍之子路怒奮㦸將與戰孔子止之曰惡有修仁義而不免俗者乎夫詩書之不講禮樂之不習是丘之過也若以述先王好古法而為咎者則非丘之罪也命夫歌予和汝子路彈琴而歌孔子和之曲三終匡人解甲而罷孔子曰不觀髙崖何以知巔墜之患不臨深泉何以知没溺之患不觀巨海何以知風波之患失之者其不在此乎不在此三者之域也士慎此三者則無累於身矣子貢問於孔子曰賜既為人下矣而未知為人下之道敢問之子曰為人下者其猶上乎泪之深則出泉泪渥樹其壤則百穀滋焉草木植焉禽獸育焉生則出焉死則入焉多其功而不意功雖多而無所意也恢其志而無不容為人下者當恢𢎞其志如地無所不容也為人下者以此也孔子適鄭與弟子相失獨立東郭門外或人謂子貢曰東門外有一人焉其長九尺有六寸河目隆顙河目上下匡平而長顙頰也其頭似堯其頸似臯繇其肩似子産然自腰以下不及禹者三寸纍然如喪家之狗喪家狗主人哀荒不見飲食故纍然不得意孔子生於亂世道不得行故纍然是不得意之貌也子貢以告孔子欣然而歎曰形狀未也如喪家之狗然乎哉然乎哉孔子適衞路出于蒲㑹公叔氏以蒲叛衞而止之孔子弟子有公良孺者為人賢長有勇力以私車五乘従夫子行喟然曰昔吾従夫子遇難于匡又伐樹於宋孔子與弟子行禮於大樹之下桓魋欲害之故先伐其樹焉今遇困於此命也夫與其見夫子仍遇於難寧我鬭死挺劒而合衆將與之戰蒲人懼曰苟無適衞吾則出子乃盟孔子而出之東門孔子遂適衞子貢曰盟可負乎孔子曰要我以盟非義也衞侯聞孔子之来喜而於郊迎之問伐蒲對曰可哉公曰吾大夫以為蒲者衞之所以恃晉楚也伐之無乃不可乎孔子曰其男子有死之志公叔氏欲蒲適他國故男子欲死之不樂適也吾之所伐者不過四五人矣本與叔孫同叛者也公曰善卒不果伐他日靈公又與夫子語見飛鴈過而仰視之色不悦孔子乃逝逝行衞蘧伯玉賢而靈公不用彌子瑕不肖反任之史魚驟諫而不従史魚病將卒命其子曰吾在衞朝不能進蘧伯玉退彌子瑕是吾為臣不能正君也生而不能正君則死無以成禮我死汝置屍牖下於我畢矣禮飯於牖下小斂於户内大斂於阼殯於客位也其子従之靈公弔焉怪而問焉其子以其父言告公公愕然失容曰是寡人之過也於是命之殯於客位進蘧伯玉而用之退彌子瑕而逺之孔子聞之曰古之列諫之者死則已矣未有若史魚死而屍諌忠感其君者也可不謂直乎五帝德第二十三宰我問於孔子曰昔者吾聞諸榮伊曰黄帝三百年請問黄帝者人也抑非人也何以能至三百年乎孔子曰禹湯文武周公不可勝以觀也而上世黄帝之問將謂先生難言之故乎言禹湯以下不可勝觀乃問上世黄帝將為先生長老難言之故問宰我曰上世之傳隱微之説卒采之辯采事也辯説也卒終也其事之説也闇忽之意闇忽乆逺不明非君子之道者則予之問也固矣固陋不得其問孔子曰可也吾畧聞其説黄帝者少典之子曰軒轅生而神靈弱而能言幼齊叡莊敦敏誠信長聰明治五氣五行之氣設五量五量權衡升斛尺丈里步十百撫萬民度四方商度四方而安定之服牛乗馬擾馴猛獸以與炎帝戰于阪泉之野炎帝神農氏之後也三戰而後尅之始垂衣裳作為黼黻白與黒謂之黼若斧文黒與青謂之黻若兩已相戾治民以順天地之紀知幽明之故達死生存亡之説播時百穀時是嘗味草木仁厚及於鳥獸昆蟲考日月星辰勞耳目勤心力用水火財物以生民民賴其利百年而死民畏其神百年而亡民用其敎百年而移故曰黄帝三百年宰我曰請問帝顓頊孔子曰五帝用説三王有度五帝乆逺故用説也三王邇則有成法度汝欲一日徧聞逺古之説躁哉予也宰我曰昔予也聞諸夫子曰小子毋或宿故敢問有所問當問勿令更宿也孔子曰顓頊黄帝之孫昌意之子曰髙陽淵而有謀疏通以知逺養財以任地履時以象天依鬼神而制義治氣性以敎衆潔誠以祭祀巡四海以寧民北至幽陵南暨交趾西陷流沙東極蹯木動靜之類小大之物日月所照莫不砥屬砥平也四逺皆平而來服屬之也宰我曰請問帝嚳孔子曰𤣥枵之孫喬極之子曰髙辛生而神異自言其名博施厚利不於其身聰以知逺明以察㣲仁而威恵而信以順天地之義知民所急修身而天下服取地之財而節用之撫敎萬民而誨利之歴日月之生朔而迎送之明鬼神而敬事之其色也和其德也重其動也時其服也衷春夏秋冬育䕶天下日月所照風雨所至莫不従化宰我曰請問帝堯孔子曰髙辛氏之子曰陶唐其仁如天其智如神就之如日望之如雲富而不驕貴而能降伯夷典禮龍䕫典樂舜時䕫典樂龍作納言然則堯時龍亦典樂者也舜時而仕趨視四時務先民始之務先民事以為始也流四凶而天下服其言不忒其德不回四海之内舟轝所及莫不夷説夷平心説古通以為悦字宰我曰請問帝舜孔子曰喬牛之孫瞽瞍之子也曰有虞舜孝友聞於四方陶䰻事親為陶器躬捕魚以養父母寛裕而溫良敦敏而知時畏天而愛民恤逺而親近承受大命依于二女堯妻舜以二女舜動靜謀之於二女叡明智通為天下帝命二十二臣率堯舊職恭已而已天平地成巡狩四海五載一始三十年在位嗣帝五十載陟方岳死于蒼梧之野而葬焉宰我曰請問禹孔子曰髙陽之孫鯀之子也夏后敏給克齊其德不爽爽忒其仁可親其言可信聲為律身為度以身為法度也亹亹穆穆為紀為綱其功為百神主禹治水天下既平然後百神得其所其恵為民父母左凖繩右規矩左右言帝用也履四時所行不違四時之宜據四海任臯繇伯益以贊其治興六師以征不序四極民莫敢不服孔子曰予大者如天小者如言民悦至矣予也非其人也言不足以明五帝之德也宰我曰予也不足以戒敬承矣他日宰我以語子貢子貢以復孔子曰吾欲以顔狀取人也則於滅明改之矣吾欲以辭言取人也則於宰我改之矣吾欲以容貌取人也則於子張改之矣宰我聞之懼弗敢見焉家語卷五欽定四庫全書
