front:
  text: 者是顓孫師之行也孔子言之曰其不伐則猶可能也其不弊百姓則仁也不弊愚百姓即所謂不傲之也詩云愷悌君子民之父母愷樂也悌易也樂以强敎之易以悦安之民皆有父之尊母之親也夫子以其仁為大學之深學而能入其深義也送迎必敬送迎賔客常能敬也上交下接若截焉是卜商之行也孔子説之以詩曰式夷式已無小人殆式用夷平也言用平則已也殆危者無以小人至於危也若商也其可謂不險矣險危也言子夏常厲以斷之近小人斯不危貴之不喜賤之不怒苟利於民矣廉於行已其事上也以佑其下言所以事上乃欲佑助其下也是澹臺㓕明之行也孔子曰獨貴獨富君子恥之夫也中之矣夫謂滅明中猶當也先成其慮及事而用之故動則不妄是言偃之行也孔子曰欲能則學欲知則問欲善則詳欲善其事當詳慎也欲給則豫事欲給而不礙則莫若於豫當是而行偃也得之矣獨居思仁公言言義其於詩也則一日三復白圭之玷玷缺也詩曰白圭之玷尚可磨也斯言之玷不可為也一日三復之慎之至也是宫縚之行也孔子信其能仁以為異士殊異之士也大戴引之曰以為異姓婚姻也以兄之女妻之者也自見孔子出入於户未嘗越履往來過之足不履影其言往來常跡故跡不履影也啓蟄不殺春分當發蟄蟲啓户咸出於此時不殺生也方長不折春夏生長養時草木不折執親之喪未嘗見齒是髙柴之行也孔子曰柴於親喪則難能也啓蟄不殺則順人道方長不折則恕仁也成湯恭而以恕是以日躋躋升也成湯行恭而能恕出見摶鳥焉四靣施綢乃去其三靣詩曰湯降不遲聖敬曰躋言湯疾行下人之道其聖敬之徳日升聞也凡此諸子賜之所親覩者也吾子有命而訊賜訊問賜也固不足以知賢文子曰吾聞之也國有道則賢人興焉中人用焉中庸之人為時用也乃百姓歸之若吾子之論既富茂矣壹諸侯之相也壹皆抑世未有明君所以不遇也子貢既與衛將軍文子言適魯見孔子曰衛將軍文子問二三子之於賜不壹而三焉賜也辭不獲命以所見者對矣未知中否請以告孔子曰言之乎子貢以其辭狀告孔子子聞而笑曰賜汝次為人矣言為知人之次子貢對曰賜也何敢知人此以賜之所覩也孔子曰然吾亦語汝耳之所未聞目之所未見者豈思之所不至智之所未及哉子貢曰賜願得聞之孔子曰不克不忌不念舊怨葢伯夷叔齊之行也思天而敬人服義而行信孝於父母恭於兄弟從善而不教道趙文子之行也其事君也不敢愛其死然亦不敢忘其身謀其身不遺其友君陳則進而用之陳謂陳列於君為君之使用也不陳則行而退葢隨武子之行也其為人之淵源也多聞而難誕誕欺内植足以沒其世國家有道其言足以治無道其黙足以生葢銅鞮伯華之行也外寛而内正自極於隱括之中隠括所以自極直已而不直人汲汲於仁以善自終葢蘧伯玉之行也孝恭慈仁允徳圖義允信也圖謀也約貨去怨夫利怨之所聚故約省其貨以逺去其怨輕財不匱葢栁下惠之行也其言曰君雖不量於其身謂不量度其臣之徳噐也臣不可以不忠於其君是故君既擇臣而任之臣亦擇君而事之有道順命君有道則順從其命無道衡命衡横也謂不受其命而隠居者也葢晏平仲之行也蹈忠而行信終日言不在尤之内尤過國無道處賤不悶悶憂貧而能樂葢老萊子之行也易行以俟天命易治居下不援其上雖在下位不攀援其上以求進其親觀於四方也不忘其親不盡其樂雖有觀四方之樂常念其親不盡其歸之以不能則學不為巳終身之憂凡憂憂所知不能則學何憂之有葢介子山之行也子貢曰敢問夫子之所知者葢盡於此而已乎孔子曰何謂其然亦略舉耳目之所及而已昔晉平公問祁奚曰羊舌大夫晉之良大夫也其行如何祁奚辭以不知公曰吾聞子少長乎其所於其所長今子掩之何也祁奚對曰其少也恭而順心有恥而不使其過宿心常有所恥惡及其有過不令更宿輒改其為大夫悉善而謙其端盡善道而謙讓是其正也其為輿尉也信而好直其功言其功直至於其為容也温良而好禮博聞而時出其志時出以其出之誨未及之是其志也公曰曩者問子子奚曰不知也祁奚曰毎位改變未知所止是以不敢得知也此又羊舌大夫之行也子貢跪曰請退而記之
