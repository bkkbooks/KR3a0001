front:
  text: 家語卷六
  hash: sha256:2934f62db115255bf556395339adbd0771db10adf4ee95f83eb3d3fb8cd1655c
body:
  text: 魏王肅注五帝第二十四季康子問於孔子曰舊聞五帝之名而不知其實請問何謂五帝孔子曰昔丘也聞諸老耼曰天有五行木火金水土分時化育以成萬物一嵗三百六十日五行各主七十二日也化生長育一嵗之功萬物莫敢不成其神謂之五帝五帝五行之神佐天生物者後世讖緯皆為之名字亦為妖怪妄言古之王者易代而改號取法五行五行更王終始相生亦象其義法五行更王終始相生始以木德王天下其次以生之行轉相承而諸説乃謂五精之帝下生王者其為蔽惑無可言者也故其為明王者而死配五行是以太皥配木炎帝配火黄帝配土少皥配金顓頊配水康子曰太皥氏其始之木何如孔子曰五行用事先起於木木東方萬物之初皆出焉是故王者則之而首以木德王天下其次則以所生之行轉相承也木生火火生土之屬康子曰吾聞勾芒為木正祝融為火正蓐收為金正𤣥冥為水正后土為土正此則五行之主而不亂稱曰帝者何也夫子曰凡五正者五行之官名五行佐成上帝而稱五帝太皥之屬配焉亦云帝従其號天至尊物不可以同其號亦兼稱上帝上得包下五行佐成天事謂之五帝以地有五行而其精神在上故亦為之上帝黄帝之屬故亦稱帝葢従天五帝之號故王者雖號稱帝而不得稱天帝而曰天子者而天子與父其尊卑相去逺矣曰天王者言乃天下之王也昔少皥氏之子有四叔曰重曰該曰修曰熙實能金木及水使重為勾芒該為蓐收修及熙為𤣥𡨕顓頊氏之子曰黎為祝融龔工氏之子曰勾龍為后土此五者各以其所能業為官職各以一行之官為職業之事生為上公死為貴神别稱五祀不得同帝五祀上公之神故不得稱帝也其序則五正不及五帝五帝不及天地而不知者以祭禮為祭地不亦失之逺矣且土與水火俱為五行是地之子也以子為母不亦顛倒失尊卑之序康子曰如此之言帝王改號於五行之德各所統則其所以相變者皆主何事怪木家而尚赤所以問也孔子曰所尚則各従其所王之德次焉木次火而木家尚赤者以木德義之著修其母兼其子夏后氏以金德王而尚黑大事斂用昏大事喪昏時亦黒也戎事乗驪黒馬也牲用𤣥殷人以水德王尚白水家尚青而尚白者避木家之尚青大事斂用日中日中白也戎事乘翰翰白色馬牲用白周人以木德王尚赤大事斂用日出日出時亦赤也戎事乗騵騵騮馬白腹牲用騂騂赤類也此三代之所以不同康子曰唐虞二帝其所尚者何色孔子曰堯以火德王色尚黄舜以土德王色尚青土家宜尚白土者四行之主王於四季五行用事先起於木色青是以木家避土土家之所尚白康子曰陶唐有虞夏后殷周獨不得配五帝意者德不及上古耶將有限乎孔子曰古之平治水土及播殖百穀者衆矣唯勾龍兼食於社兼猶配也而棄為稷神易代奉之無敢益者明不可與等故自太皥以降逮於顓頊其應五行而王數非徒五而配五帝是其德不可以多也執轡第二十五閔子騫為費宰問政於孔子子曰以德以法夫德法者御民之具猶御馬之有衘勒也君者人也吏者轡也刑者䇿也夫人君之政執其轡䇿而已子騫曰敢問古之為政孔子曰古者天子以内史為左右手内史掌王八柄及叙事之法受納以詔王聽治命孤卿大夫則䇿命以四方之事書而讀之王制禄則書之䇿賞則亦如之故王以為左右手以德法為衘勒以百官為轡以刑罰為䇿以萬民為馬故御天下數百年而不失善御馬者正銜勒齊轡䇿均馬力和馬心故口無聲而馬應轡䇿不舉而極千里善御民者壹其德法正其百官以均齊民力和安民心故令不再而民順従刑不用而天下治是以天地德之天地以為有德而兆民懷之懷歸夫天地之所德兆民之所懷其政美其民而稱之其民為衆所稱舉也今人言五帝三王者其盛無偶威察若存其盛以明察帝若存其故何也其法盛其德厚故思其德必稱其人朝夕祝之升聞於天上帝俱歆用永厥世而豐其年不能御民者棄其德法専用刑辟譬猶御馬棄其衘勒而専用箠䇿其不制也可必矣夫無衘勒而用箠䇿馬必傷車必敗無德法而用刑民必流國必亡治國而無德法則民無修民無修則迷惑失道如此上帝必以其為亂天道也苟亂天道則刑罰暴上下相諛諂諛莫知念患俱無道故也今人言惡者必比之於桀紂其故何也其法不聽其德不厚故民惡其殘虐莫不吁嗟朝夕祝之升聞於天上帝不蠲降之以禍罰災害竝生用殄厥世故曰德法者御民之本古之御天下者以六官總治焉冢宰之官以成道治官所以成道也司徒之官以成德敎官所以成徳宗伯之官以成仁禮官所以成仁司馬之官以成聖治官所以成聖聖通征伐所以通天下也司冦之官以成義刑官所以成義司空之官以成禮事官所以成禮禮非事不立也六官在手以為轡可㑹均仁以為納納驂馬轡轡繋軾前者司會掌邦之六典八法之戒以周知四方之治冢宰之副故不在其六轡而當納故位故曰御四馬者執六轡御天下者正六官是故善御馬者正身以總轡均馬力齊馬心逥旋曲折唯其所之故可以取長道可赴急疾此聖人所以御天地與人事之法則也天子以内史為左右手以六官為轡已而與三公為執六官均五敎齊五法仁義禮智信之法也故亦唯其所引無不如志以之道則國治冢宰治官以之德則國安德敎成以之仁則國和禮之用和為貴則國安以之仁則國和以之聖則國平通治逺近則國平也以之禮則國定事物以禮則國定也以之義則國義義平也刑罰當罪則國平此御政之術過失人情莫不有焉過而改之是謂不過故官屬不理分職不明法政不一百事失紀曰亂亂則飭冢宰飭謂整矗之也地而不殖財物不蕃萬民飢寒敎訓不行風俗淫僻人民流散曰危危則飭司徒父子不親長幼失序君臣上下乖離異志曰不和不和則飭宗伯賢能而失官爵功勞而失賞禄司勲之職屬大司馬士卒疾怨兵弱不用曰不平不平則飭司馬刑罰暴亂姦邪不勝曰不義不義則飭司冦度量不審舉事失理都鄙不修財物失所曰貧貧則飭司空故御者同是車馬或以取千里或不及數百里其所謂進退緩急異也夫治者同是官法或以致平或以致亂者亦其所以為進退緩急異也古者天子常以季冬考德正法以觀治亂德盛者治也德薄者亂也故天子考德則天下之治亂可坐廟堂之上而知之夫德盛則法修德不盛則飭法與政咸德而不衰治與政皆合於徳則不殺故曰王者又以孟春論吏之德及功能能德法者為有徳能行徳法者為有行能成德法者為有功能治德法者為有智故天子論吏而德法行事治而功成夫季冬正法孟春論吏治國之要子夏問於孔子曰商聞易之生人及萬物鳥獸昆蟲各有竒偶氣分不同易主天地以生萬物言受氣各有分數不齊同而凡人莫知其情唯達道德者能原其本焉天一地二人三三三如九九九八十一一主日日數十故人十月而生一主日日従一而生日者陽従竒數日數十従甲至癸也八九七十二偶以承竒竒主辰辰為月月主馬故馬十二月而生偶以承竒隂以承陽辰數十二従子至亥也七九六十三三主斗斗主狗故狗三月而生斗次日月故三主斗六九五十四四主時時主豕故豕四月而生時以次斗五九四十五五為音音主猨故猨五月而生音不過五故五為音四九三十六六為律律主鹿故鹿六月而生三九二十七七主星星主虎故虎七月而生星二十八宿為四方方有七故七主星也二九一十八八主風風為蟲故蟲八月而生風之數盡於八凡蟲為風風為主也其餘各従其類矣鳥魚生隂而屬於陽故皆卵生魚遊於水鳥遊於雲故立冬則鷰雀入海化為蛤蠶食而不飲蟬飲而不食蜉蝣不飲不食萬物之所以不同介鱗夏食而冬蟄介甲蟲也齕吞者八竅而卵生八竅鳥屬齟􅻾者九竅而胎生九竅人及獸屬四足者無羽翼戴角者無上齒無角無前齒者膏有角無齒者脂淮南取此義曰無角者膏而無前有角者脂而無後膏豕屬而脂羊屬無前後皆謂鋭小也晝生者類父夜生者似母是以至隂主牝至陽主牡敢問其然乎孔子曰然吾昔聞諸老耼亦如汝之言子夏曰商聞山書曰地東西為緯南北為經山為積德川為積刑髙者為生下者為死丘陵為牡谿谷為牝蜯蛤龜珠與日月而盛虚月盛則蜯蛤之屬滿月虧則虚也是故堅土之人剛弱土之人柔墟土之人大沙土之人細息土之人美㘪土之人醜㘪耗字也息土細緻㘪土麄疎者也食水者善遊而耐寒食土者無心而不息螾屬不氣息也食木者多力而不治血氣不治淮南子曰多力而弗戾亦不治之貌者也食草者善走而愚食桑者有緒而蛾食肉者勇毅而捍食氣者神明而壽食穀者智恵而巧不食者不死而神故曰羽蟲三百有六十而鳯為之長毛蟲三百有六十而麟為之長甲蟲三百有六十而龜為之長鱗蟲三百有六十而龍為之長倮蟲三百有六十而人為之長此乾坤之美也乾天象也殊形異類之數王者動必以道靜必順理以奉天地之性而不害其所主謂之仁聖焉子夏言終而出子貢進曰商之論也何如孔子曰汝謂何也對曰微則微矣然則非治世之待也孔子曰然各其所能孔子曰然子貢治世不待此事此事之急然亦各其所知能也本命解第二十六魯哀公問於孔子曰人之命與性何謂也孔子對曰分於道謂之命分於道謂始得為人故下句云性命之始形於一謂之性人各受隂陽以剛柔之性故曰形於一化於隂陽象形而發謂之生化窮數盡謂之死故命者性之始也死者生之終也有始則必有終矣人始生而有不具者五焉目無見不能食不能行不能言不能化及生三月而微煦煦睛轉也然後有見八月生齒然後能食三年顋合然後能言十有六而精通然後能化隂窮反陽故隂以陽變陽窮反隂故陽以隂化是以男子八月生齒八嵗而齔女子七月生齒七嵗而齔十有四而化一陽一隂竒偶相配陽數竒隂數偶然後道合化成性命之端形於此也公曰男子十六精通女子十四而化是則可以生民矣而禮男必三十而有室女必二十而有夫也豈不晚哉孔子曰夫禮言其極不是過也男子二十而冠有為人父之端女子十五許嫁有適人之道於此而往則自婚矣羣生閉藏乎隂而為化育之始隂為冬也冬藏物而為化育始故聖人因時以合偶男子窮天數也極也霜降而婦功成嫁娶者行焉季秋霜降嫁娶者始於此詩云將子無怒秋以為期也冰泮而農桑起婚禮而殺於此泮散也正月農事起蠶者援桑婚禮始殺言未止也至二月農事始起㑹男女之無夫家者奔者期盡此月故也詩云士如歸妻迨冰未泮言如欲使妻歸當及冰未泮散之盛時男子者任天道而長萬物者也知可為知不可為知可言知不可言知可行知不可行者也是故審其倫而明其别謂之知所以効匹夫之聽也聽宜為德女子者順男子之敎而長其理者也為男女長養其理分是故無專制之義而有三従之道幼従父兄既嫁従夫夫死従子言無再醮之端始嫁言醮禮無再醮之端言不改事人也敎令不出於閨門事在供酒食而已無閫外之非義也閫門限婦人以貞専無閫外之儀詩云無非無儀惟酒食是議不越境而奔喪事無擅為行無獨成叅知而後動可驗而後言晝不遊庭夜行以火所以効疋婦之德也孔子遂言曰女有五不取逆家子也亂家子也世有刑人子也世有惡疾子也喪父長子也此五者皆不取也逆家子者謂其逆德亂家子者謂其亂倫世有刑人子者謂其棄於人也有惡疾子者謂其棄於天也喪父長子者謂其無受命也婦有七出三不去七出者不順父母出無子出淫僻出嫉妒出惡疾出多口舌出竊盜出不順父母出者其逆德也無子者謂其絶世也婬僻者謂其亂族嫉妬者謂其亂家惡疾者謂其不可供粢盛多口舌者謂其離親竊盜者謂其反義三不去者謂有所取而無所歸一也與共更三年之喪二也先貧賤後富貴者三也凡此聖人所以順男女之際重婚姻之始也孔子曰禮之所以象五行也服之制有五等也其義四時也故喪禮有舉焉有恩有義有節有權所以舉象四時其恩厚者其服重故為父母斬衰三年以恩制者也門内之治恩掩義門外之治義掩恩資於事父以事君而敬同貴尊貴尊義之大也故為君亦服衰三年以義制者也三日而浴三月而沐期而練毁不滅性不以死傷生喪不過三年苴衰不補墳不修除服之日鼓素琴示民有終也凡此以節制者也資於事父以事母而愛同天無二日國無二君家無二尊以治之故父在為母齊衰朞者見無二尊也百官備百物具不言而事行者扶而起謂天子諸侯也言而後事行者杖而起卿大夫士也身自執事行者面垢而已謂庶人也此以權制者也親始死三日不怠三月不懈朞悲號三年憂哀之殺也聖人因殺以制節也論禮第二十七孔子閒居子張子貢言游侍論及於禮孔子曰居汝三人者吾語汝以禮周流無不遍也子貢越席而對曰敢問如何子曰敬而不中禮謂之野恭而不中禮謂之給勇而不中禮謂之逆子曰給奪慈仁巧言足恭捷給之人似仁非仁故曰給奪慈仁子貢曰敢問何以為中禮者子曰禮乎夫禮所以制中也子貢退言游進曰敢聞禮也領惡而全好者與領理子曰然子貢問何也子曰郊社之禮所以仁鬼神也禘甞之禮所以仁昭穆也饋奠之禮所以仁死喪也射饗之禮所以仁鄉黨也食饗之禮所以仁賔客也明乎郊社之義禘甞之禮治國其如指諸掌而已是故居家有禮故長幼辨以之閨門有禮故三族和以之朝廷有禮故官爵叙以之田獵有禮故戎事閑以之軍旅有禮故武功成是以宫室得其度鼎俎得其象物得其時樂得其節車得其軾鬼神得其享喪紀得其哀辨説得其黨黨類百官得其體政事得其施各得其所黨施行之加於身而措於前凡衆之動得其宜也言游退子張進曰敢問禮何謂也子曰禮者即事之治也君子有其事必有其治治國而無禮譬猶瞽之無相倀倀乎何所之譬終夜有求於幽室之中非燭何以見故無禮則手足無所措耳目無所加進退揖讓無所制是以其居處長幼失其别閨門三族失其和朝廷官爵失其序田獵戎事失其䇿軍旅失其勢宫室失其度鼎俎失其象物失其時樂失其節車失其軾鬼神失其饗喪紀失其哀辨説失其黨百官失其體政事失其施加於身而措於前凡動之衆失其宜如此則無以祖洽四海祖法也洽合無禮則無以為衆法無以合聚衆子曰慎聽之汝三人者吾語汝猶有九焉大饗有四焉語汝有九其四大饗所以待賔之禮其五動靜之威儀也苟知此矣雖在畎畝之中事之聖人矣在畎畝之中猶焉為聖人兩軍相見揖讓而入入門懸興興作樂一也揖讓而升堂升堂而樂闋二也下管象舞夏籥序興下管堂下吹管象武舞也夏文舞也執籥籥如笛序以更作三也陳其薦俎序其禮樂備其百官四者所以大饗有四也如此而後君子知仁焉行中規五也旋中矩六也鑾和中采齊采齊樂曲名所以為和鑾之節七也客出以雍雍樂曲名在周頌八也徹以振羽亦樂曲名九也是故君子無物而不在於禮焉入門而金作示情也金既鳴聲終始若一故以示情也升歌清廟示德也清廟所以頌文王之德也下管象舞示事也凡舞象事也古之君子不必親相與言也以禮樂相示而已夫禮者理也樂者節也無理不動無節不作不能詩於禮謬詩以言禮不能樂於禮素素質薄於德於禮虚非其人則禮不虚行子貢作而問曰然則䕫其窮與言達於樂而不達於禮也子曰古之人與上古之人也達於禮而不達於樂謂之素達於樂而不達於禮謂之偏達謂徧有所達非殊夫䕫達於樂不達於禮是以傳於此名也古之人也言達於樂多故遂傳名樂凡制度在禮文為在禮行之其在人也三子者既得聞此論於夫子也煥若發矇焉子夏侍坐於孔子曰敢問詩云愷悌君子民之父母何如斯可謂民之父母孔子曰夫民之父母必達於禮樂之源以致五至而行三無以横於天下四方有敗必先知之此之謂民之父母子夏曰敢問何謂五至孔子曰志之所至詩亦至焉詩之所至禮亦至焉禮之所至樂亦至焉樂之所至哀亦至焉詩禮相成哀樂相生是以正明目而視之不可得而見傾耳而聽之不可得而聞志氣塞于天地行之充於四海此之謂五至矣子夏曰敢問何謂三無孔子曰無聲之樂無體之禮無服之喪此之謂三無子夏曰敢問三無何詩近之孔子曰夙夜基命宥密無聲之樂也夙夜恭也基始也命信也宥寛也宻寧也言已行與民信五敎在寛民以安寜故謂之無聲之樂也威儀逮逮不可選也無體之禮也凡民有喪扶伏救之無服之喪也子夏曰言則美矣大矣言盡於此而已乎孔子曰何謂其然吾語汝其義猶有五起焉子夏曰何如孔子曰無聲之樂氣至不違無體之禮威儀遲遲無服之喪内恕孔哀無聲之樂所願必従無體之禮上下和同無服之喪施及萬邦既然而又奉之以三無私而勞天下此之謂五起子夏曰何謂三無私孔子曰天無私覆地無私載日月無私照其在詩曰帝命不違至于湯齊至湯興天心齊湯降不遲聖敬日躋不遲言疾躋升也湯疾行下人之道其聖敬之德日升聞也昭假遲遲上帝是祗湯之威徳昭明遍至化行寛舒遲遲然故上帝敬其德帝命式于九圍九圍九州也天命用于九州謂為天下王是湯之德也子夏蹶然而起負墻而立曰弟子敢不志之家語卷六欽定四庫全書家語卷七魏王肅注
