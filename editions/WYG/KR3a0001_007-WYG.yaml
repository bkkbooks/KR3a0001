front:
  text: 觀鄉射第二十八孔子觀於鄉射喟然嘆曰射之以樂也何以射何以聴循聲而發不失正鵠者其唯賢者乎正鵠所射者也若夫不肖之人則將安能以求飲詩云發彼有的以祈爾爵的實也祈求也言發中者以求飲爾爵也勝者飲不勝者祈求也求所中以辭爵飲彼則已不飲故曰以辭爵也酒者所以養老所以養病也求中以辭爵辭其養也是故士使之射而弗能則辭以病懸弧之義弧弓也男子生則懸弧於其門明必有射事也而今不能射唯疾可以為辭也於是退而與門人習射於矍相之圃葢觀者如牆堵焉試射至於司馬使子路執弓矢出列延謂射之者曰子路為司馬故射至使子路出延射奔軍之將亡國之大夫與為人後不得入人已有後而又為人後故曰與為人後也其餘皆入蓋去者半又使公罔之裘序點揚觶而語曰先行射鄉飲觶酒故二人揚幼壯孝弟耆老好禮不從流俗修身以俟死者在此位蓋去者半序點又揚觶而語曰好學不倦好禮不變耄期稱道而不亂者則在此位八十九十曰耄言雖老而不稱解道而不亂蓋僅有存焉射旣闋子路進曰由與二三子者之為司馬何如孔子曰能用命矣孔子曰吾觀於鄉而知王道之易易也主人親速賔及介而衆賔皆從之速召至於正門之外主人拜賔及介而衆賔自入貴賤之義别矣三揖至於階三讓以賔升拜至獻酬辭譲之節繁及介升則省矣至于衆賔升而受爵坐祭立飲不酢而降隆殺之義辨矣工入升歌三終主人獻賔祀曰主人獻之於義不得為賔也下句笙入三終主人又獻之是也歌鹿鳴四牡皇皇者華三篇終主人乃獻之是也笙入三終主人又獻之吹南陔白華華黍三篇終主人獻也間歌三終乃歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀也合樂三闋合笙聲同其音歌周南召南三篇也工告樂備而遂出樂正旣告備而降言遂出自此至去不復升也一人揚觶乃立司正焉賔將欲去故復使一人揚觶乃立司正主威儀請安賔也知其能和樂而不流也賔酬主人主人酬介介酬衆賔少長以齒終於沃洗者焉知其能弟長而無遺矣降脱履升座脩爵無算飲酒之節旰不廢朝暮不廢夕朝晨飲早晡罷賔出主人拜送節文終遂焉知其能安燕而不亂也貴賤旣明降殺旣辨和樂而不流弟長而無遺安燕而不亂此五者足以正身安國矣彼國安而天下安矣故曰吾觀於鄉而知王道之易易也子貢觀於蜡蜡索也歳十有二月索羣神而祀之今之臘也孔子曰賜也樂乎對曰一國之人皆若狂言醉酒也賜未知其為樂也孔子曰百日之勞一日之樂一日之澤非爾所知也古民皆勤苦稼穡有百日之勞喻久也今一日使之飲酒燕樂之是君之恩澤也張而不弛文武弗能弛而不張文武弗為一張一弛文武之道也
