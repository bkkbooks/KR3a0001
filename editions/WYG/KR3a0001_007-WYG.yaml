body:
  text: 郊問第二十九定公問於孔子曰古之帝王必郊祀其祖以配天何也孔子對曰萬物本於天人本乎祖郊之祭也大報本反始也故以配上帝天垂象聖人則之郊所以明天道也公曰寡人聞郊而莫同何也孔子曰郊之祭也迎長日之至也周人始以日至之月冬日至而日長大報天而主日配以月故周之始郊其月以日至其日用上辛至於啓蟄之月則又祈榖于上帝祈求也為農求榖於上帝月令孟春之月乃以元日祈榖於上帝兼無仲冬大郊之事至於祈農與天子同故春秋傳曰夫郊祀后稷以祈農事也是故啓蟄而郊郊而後耕也而學者不知推經禮之指歸皮膚妄説至乃顛倒神祗變易時日遷改兆位良可痛心者也此二者天子之禮也魯無冬至大郊之事降殺於天子是以不同也公曰其言郊何也孔子曰兆正於南所以就陽位也於郊故謂之郊焉兆丘於南謂之圓丘之兆於南郊也然則郊之名有三焉築為圓丘以象天自然故謂之圓丘圓丘人之所造故謂之泰壇於南郊在南說學者謂南郊與圓丘異若是則詩易尚書謂之圜丘也又不通泰壇之名或乃謂周官圓丘虛妄之言皆不通典制曰其牲器何如孔子曰上帝之牛角繭栗必在滌三月滌所以養牲處后稷之牛唯具别祀稷時牲亦芻之三月配天之時獻故唯具之也所以别事天神與人鬼也牲用騂尚赤也用犢貴誠也犢質慤貴誠之美也掃地而祭貴其質也地圜丘之地掃焉而祭貴其質也器用陶匏以象天地之性也人之作物無可稱之取天地之性以自然也萬物無可以稱之者故因其自然之體也公曰天子之郊其禮儀可得聞乎孔子對曰臣聞天子卜郊則受命於祖廟而作龜於禰宫禰宫父廟也受祭天之命於祖而作龜於父廟尊祖親考之義也卜之日王親立於澤宫以聴誓命受教諌之義也澤宫宫也誓命祭天所行威儀也王親受之故曰受教諫之義旣卜獻命庫門之内所以戒百官也將郊則供天子皮弁以聴報示民嚴上也報白也王夙興朝服以待白祭事後服袞郊之日喪者不敢哭凶服者不敢入國門汜掃清路行者畢止汜遍也清路以新土無復行之弗命而民聴敬之至也以王肅敬事天故民化之不令而行之也天子大裘以黼之被裘象天大裘為黼文也言被之大裘其有象天之文故被之道路至大壇而脱之乗素車貴其質也旂十有二旒龍章而設以日月所以法天也旣至泰壇王脱裘矣服衮以臨燔柴戴冕藻十有二旒則天數也臣聞之誦詩三百不足以一獻祭羣小祀一獻之禮不足以大饗大饗祫祭天地大饗之禮不足以大旅大旅祭五帝也大旅具矣不足以饗帝饗帝祭天是以君子無敢輕議於禮者也五刑解第三十冉有問於孔子曰古者三皇五帝不用五刑信乎孔子曰聖人之設防貴其不犯也制五刑而不用所以為至治也凡民之為姦邪竊盜靡法妄行者生於不足不足生於無度無度則小者偷惰大者侈靡各不知節是以上有制度則民知所止民知所止則不犯故雖有奸邪賊盜靡法妄行之獄而無陷刑之民不孝者生於不仁不仁者生於喪祭之禮也明喪祭之禮所以教仁愛也能致仁愛則服喪思慕祭祀不懈人子饋養之道言孝子奉祭祀不敢懈與生時饋養之道同之喪祭之禮明則民孝矣故雖有不孝之獄而無陷刑之民殺上者生於不義義所以别貴賤明尊卑也貴賤有别尊卑有序則民莫不尊上而敬長朝聘之禮者所以明義也義必明則民不犯故雖有殺上之獄而無陷民之刑鬬變者生於相陵相陵者生於長幼無序而遺敬讓遺忘鄉飲酒之禮者所以明長幼之序而崇敬讓也長幼必序民懷敬譲故雖有變鬬之獄而無陷刑之民淫亂者生於男女無别男女無别則夫婦失義婚姻聘享者所以别男女明夫婦之義也男女旣别夫婦既明故雖有婬亂之獄而無陷刑之民此五者刑罰之所從生各有源焉不豫塞其源而輒繩之以刑是謂為民設穽而陷之也刑罰之源生於嗜慾不節夫禮度者所以禦民之嗜慾而明好惡順天道禮度既陳五教畢修而民猶或未化尚必明其法典以申固之尚猶也申令固其教也其犯姦邪靡法妄行之獄者則飭制量之度有犯不孝之獄者則飭喪祭之禮有犯殺上之獄者則飭朝覲之禮有犯鬬變之獄者則飭鄉飲酒之禮有犯媱亂之獄者則飭婚聘之禮三皇五帝之所化民者如此雖有五刑之用不亦可乎孔子曰大罪有五而殺人為下逆天地者罪及五世誣文武者罪及四世逆人倫者罪及三世謀鬼神者罪及二世手殺人者罪止其身故曰大罪有五而殺人為下矣冉有問於孔子曰先王制法使刑不上於大夫禮不下於庶人然則大夫犯罪不可以加刑庶人之行事不可以治於禮乎孔子曰不然凡治君子以禮御其心所以屬之以廉恥之節也故古之大夫其有坐不廉汙穢而退放之者不謂之不廉汙穢而退放則曰簠簋不飭飭整齊也有坐媱亂男女無别者不謂之媱亂男女無别則曰帷幕不修也有坐罔上不忠者不謂之罔上不忠則曰臣節未著有坐罷軟不勝任者不謂之罷軟不勝任則曰下官不職言其下官不稱務其職不斥其身也有坐干國之紀者不謂之干國之紀則曰行事不請言不請而擅行此五者大夫旣自定有罪名矣而猶不忍斥然正以呼之也旣而為之諱所以媿恥之是故大夫之罪其在五刑之域者聞而譴發譴譴譲也發始發露則白冠釐纓盤水加劒造乎闕而自請罪君不使有司執縛牽掣而加之也其有大罪者聞命則北面再拜跪而自裁君不使人捽引而刑殺之也曰子大夫自取之耳吾遇子有禮矣以刑不上大夫而大夫亦不失其罪者教使然也凡所謂禮不下庶人者以庶人遽其事而不能充禮故不責之以備禮也冉求跪然免席曰言則美矣求未之聞退而記之刑政第三十一仲弓問於孔子曰雍聞至刑無所用政至政無所用刑至刑無所用政桀紂之世是也至政無所用刑成康之世是也信乎孔子曰聖人之治化也必刑政相恭焉太上以徳教民而以禮齊之其次以政言𨗳民以刑禁之刑不刑也化之弗變𨗳之弗從傷義以敗俗於是乎用刑矣制五刑必即天倫即就也就天倫謂合天意行刑罰則輕無赦行刑罰之官雖輕猶不得作威作福刑侀也侀成也壹成而不可更故君子盡心焉仲弓曰古之聴訟尤罰麗於事不以其心可得聞乎尤過也麗附也凡過人罰人必以事稍當而不與其心孔子曰凢聴五刑之訟必原父子之情立君臣之義以權之意論輕重之序慎測深淺之量以别之悉其聰明致其忠愛以盡之大司寇正刑明辟以察獄獄必三訊焉一曰訊羣臣二曰訊羣吏三曰訊萬民也有指無簡則不聴也簡誠也有其意無其誠者不論以為罪也附從輕赦從重附人之罪以輕為比赦人之罪以重為比疑獄則泛與衆共之疑則赦之皆以小大之比成之是故爵人必於朝與衆共之也刑人必於市與衆棄之也古者公家不畜刑人大夫弗養其士遇之塗弗與之言屏諸四方唯其所之弗及與政弗欲生之也仲弓曰聴獄獄之成成何官孔子曰成獄於吏吏以獄之成告於正吏獄官吏正獄官正正旣聴之乃告大司寇大司寇聴之乃奉於王王命三公卿士叅聴棘木之下外朝法左九棘孤卿大夫位焉右九棘公侯伯子男位焉而三槐三公位然後乃以獄之成告於王王三宥之以聴命君王尚寛宥罪雖以定猶三宥之不可得輕然後刑之者也而制刑焉所以重之也仲弓曰其禁何禁孔子曰巧言破律巧賣法令者也遁名改作變言與物名也執左道與亂政者殺左道亂也作媱聲媱逸也惑亂人之聲造異服非人所常見設奇伎奇器以蕩上心者殺怪異之伎可以眩懼人心之器蕩動行偽而堅行詐偽而守之堅也言詐而辯學非而博順非而澤順其非而滑澤以惑衆者殺假於鬼神時日卜筮以疑衆者殺此四誅者不以聴不聴棘木之下仲弓曰其禁盡於此而已孔子曰此其急者其餘禁者十有四焉命服命車不粥於市粥賣珪璋璧琮不粥於市宗廟之器不粥於市兵軍旍旗不粥於市犧牲秬鬯不粥於市戎器兵甲不粥於市用器不中度不粥於市布帛精麤不中數廣狹不中量不粥於市姦色亂正色不粥於市文錦珠玉之器雕飾靡麗不粥於市衣服飲食不粥於市賣成衣服非侈必偽故禁之禁賣熟食所以厲恥也菓食不時不粥於市五木不中伐不粥於市鳥獸魚鼈不中殺不粥於市凡執此禁以齊衆者不赦過也禮運第三十二孔子為魯司寇與於蜡旣賔事畢畢賔客之事也乃出遊於觀之上觀宫門外闕周禮所謂象魏也喟然而嘆言偃侍曰夫子何嘆也孔子曰昔大道之行此謂三皇五帝時道大行也與三代之英英秀謂禹湯文武也吾未之逮而有記焉大道之行天下為公選賢與能講信修睦講習也修行也睦親也故人不獨親其親不獨子其子所謂大道天下為公老有所終壯有所用矜寡孤疾皆有所養貨惡其棄於地不必藏於己力惡其不出於身不必為人言力惡其不出於身不以為徳恵也是以姦謀閉而弗興盜竊亂賊不作故外户而不閉謂之大同今大道旣隠天下為家各親其親各子其子貨則為己力則為人大人世及以為常城郭溝池以為固禹湯文武成王周公由此而選言用禮義為之選也未有不謹於禮禮之所興與天地並如有不由禮而在位者則以為殃言偃復問曰如此乎禮其急也孔子曰夫禮先王所以承天之道以治人之情列其鬼神達於喪祭鄉射冠㛰朝聘故聖人以禮示之則天下國家可得以禮正矣言偃曰今之在位莫知由禮何也孔子曰嗚呼哀哉我觀周道幽厲傷也幽厲二王者皆傷周道也吾捨魯何適魯有聖人之風猶勝於諸國也夫魯之郊及禘皆非禮言失於禮而亡其義周公其已衰矣子孫不能行其禮義把之郊也禹把夏後本郊鯀周公以鯀非令徳故令把郊禹宋之郊也契是天子之事守也天子以把宋二王之後周公攝政致太平而與天子同是禮也諸侯祭社稷宗廟上下皆奉其典而祝嘏莫敢易其常法是謂大嘉今使祝嘏辭説徒藏於宗祝巫史非禮也言君臣皆當知辭説之意義也是謂幽國幽敝於禮醆斝及尸君非禮也夏曰醆殷曰斝非王者之後則尸與君不得用是謂僭君僭侈之君冕弁兵革藏於私家非禮也大夫稱家冕弁大夫之服孔子曰天子諸侯大夫冕弁復歸設奠服此謂不得賜而藏之也是謂脅君迫於其君大夫具官祭器不假聲樂皆具非禮也大夫無田者不為祭器今皆不假故非禮是為亂國故仕於公曰臣仕於家曰僕三年之喪與新有㛰者朞不使也以衰裳入朝與家僕雜居齊齒非禮也是謂臣典君共國天子有田以處其子孫諸侯有國以處其子孫大夫有采以處其子孫是謂制度天子適諸侯必舍其宗廟而不以禮籍入所謂臨諸侯將舍宗廟先告其鬼神以將入止也是謂天子壞法亂紀諸侯非問疾弔喪而入諸臣之家是謂君臣為謔戲謔故夫禮者君之柄柄亦秉持所以别嫌明㣲儐鬼神考制度别仁義立政教安君臣上下也故政不正則君位危君位危則大臣倍小臣竊刑肅而俗敝則法無常法無常則禮無别禮無别則士不事民不歸是謂疵國是故夫政者君之所以藏身言所藏於身不可以假人必本之天郊以降命郊天以下教令所謂則天之明命教於社之謂效地所謂因地之利降於祖廟之謂仁義奉祖廟彌近彌親彌逺彌尊仁義之道也降於山川之謂興作下命所謂祭山川者謂其興造雲雨作生萬物也降於五祀之謂制度下命使事五祀者以其能為人事之制度此聖人所以藏身固也藏身以此則固聖人參於天地並於鬼神以治政也處其所存禮之序也翫其所樂民之治也言聖人常所存處者禮之次序常翫樂者民之治安也天生時地生財人其父生而師教之四者君以政用之所以立於無過之地時及財天地之所生而師以教之君以政用之而已故常立於無過之地君者人所則非則人者也人所養非養人者也人所事非事人者也夫君者明人則有過為君徒欲明人而已則過謬也養人則不足時君失政不能為所養事人則失位故百姓則君以自治養君以自安事君以自顯是以禮達而分定人皆愛其死而患其生人皆愛惜其死而患其生之無禮也是故用人之智去其詐用人之勇去其怒用人之仁去其貪國有患君死社稷謂之義大夫死宗廟謂之變大夫有去就之義未必常死宗廟其死宗廟者以權變為也凡聖人能以天下為一家以中國為一人非意之非以意貪之必有數之也必知其情從於其義明於其利達於其患然後能為之何謂人情喜怒哀懼愛惡欲七者弗學而能何謂人義父慈子孝兄良弟悌夫義婦聴長恵幼順君仁臣忠十者謂之人義講信修睦謂之人利爭奪相殺謂之人患聖人之所以治人七情修十義講信修睦尚辭譲去爭奪舍禮何以治之飲食男女人之大欲存焉死亡貧苦人之大惡存焉欲惡者人之大端人藏其心不可測度美惡皆在其心不見其色欲以一窮之舍禮何以哉故人者天地之徳隂陽之交鬼神之會五行之秀天秉陽垂日星地秉隂載山川播五行於四時和四氣而後月生月生而後四時行焉布五行和四時而後月生焉是以三五而盈三五而缺月隂道不常滿故十五日滿十五日缺五行之動共相竭也竭盡也水用事盡則木用事五行用事更相盡也五行四氣十二月還相為本用事者為本也五聲六律十二管還相為宫五聲者宫商角徴羽也管十二月也一月一管陽律隂吕其用事者為宫也五味六和十二食還相為質五味酸苦鹹辛甘六和者和之各有宜者春多酸秋多辛之屬是也十二食者十二月之食質本也五色六章十二衣還相為質五色者青赤白黑黃學記曰水無當於五色五色不得不章五色待水而章也故人者天地之心於天地之間如五臟之有心矣人有生最靈心五臟最聖也而五行之端端始也能用五行也食味别聲被色而生者也聖人作則作為則法必以天地為本以隂陽為端以四時為柄日星為紀月以為量鬼神以為徒五行以為質禮義以為器人情以為田四靈以為畜以天地為本故物可舉天地為本則萬物包在於其中以隂陽為端故人情可睹隂陽為情之始以四時為柄故事可勸四時各有事故事可得而勸也以日星為紀故業可别日以紀晝星以紀夜故事可得而分别也以月為量故功有藝有度量以成四時猶功業各有分理也藝猶理鬼神以為徒故事有守鬼神不相干各有守五行以為質故事可復五行終則復始故事可修復也禮義以為器故事行有考考成人情以為田故人以為奥四靈以為畜故飲食有由四靈鳥獸之長四靈為畜則飲食可用何謂四靈麟鳳龜龍謂之四靈故龍以為畜而魚鮪不諗諗潛藏也鳳以為畜而鳥不䎀麟以為畜而獸不狘䎀飛走之貌也龜以為畜而人情不失易曰定天下之吉凶成天下亹亹者莫善於蓍龜故曰人情不失也先王秉蓍龜列祭祀瘞繒宣祝嘏辭説瘞謂祭祀之瘞繒謂若増封泰山宣謂播宣揚之設制度故國有禮官有御治也事有職禮有序先王患禮之不達於下故饗帝於郊所以定天位也祀社於國所以列地利也禘祖廟所以本仁也旅山川所以儐鬼神也祭五祀所以本事也故宗祝在廟三公在朝三老在學王養三老在學王前巫而後史卜筮鼓侑皆在左右王中心無違也以守至正是以禮行於郊而百神受職禮行於社而百貨可極禮行於祖廟而慈孝服焉孝慈之道為逺近所服焉禮行於五祀而正法則焉故郊社祖廟山川五祀義之修而禮之藏言禮之寶藏夫禮必本於太一太一者元氣也分而為天地轉而為隂陽變而為四時列而為鬼神其降曰命即上所為命降於天地祖廟也其官於天也官為職分也言禮之職分皆從天下來也協於分藝藝理其居於人也曰養言禮之於人身所以養成人也所以講信修睦而固人之肌膚之會筋骸之束也所以養生送死事鬼神之大端所以達天道順人情之大竇唯聖人為知禮之不可以已也故破國喪家亡人必先去其禮禮之於人猶酒之有蘖也君子以厚小人以薄聖王修義之柄禮之序以治人情人情者聖王之田也修禮以耕之陳義以種之講學以耨之耨除穢也本仁以聚之播樂以安之故禮者義之實也協諸義而協則禮雖先王未之有可以義起焉義者藝之分仁之節藝理協諸藝講於仁得之者强失之者喪仁者義之本順之體得之者尊故治國不以禮猶無耜而耕為禮而不本於義猶耕而不種為義而不講於學猶種而不耨講之以學而不合之以仁猶耨而不穫合之以仁而不安之以樂猶穫而不食安之以樂而不達於順猶食而不肥四體旣正膚革充盈人之肥也父子篤兄弟睦夫婦和家之肥也大臣法而小臣廉官職相序君臣相正國之肥也天子以徳為車以樂為御諸侯以禮相與大夫以法相序士以信相考百姓以睦相守天下之肥也是謂大順大順者所以養生送死事鬼神之常也故事大積焉而不苑苑滯積也並行而不謬細行而不失深而通茂而不間言有理也連而不相及言有叙也動而不相害此順之至也明於順然後乃能守危高而不危以守長危夫禮之不同不豐不殺所以持情而合危也合禮安也山者不使居川渚者不使居原用水火金木飲食必時用水漁人以時入澤梁乃漑灌用火季春焚萊草孟冬以火田也用金以時采銅鐵用木斧斤以時入山林飲食各隨四時之宜冬合男女春頒爵位必當年徳皆所謂順也用民必順悦以使民故無水旱昆蟲之災民無凶飢妖孽之疾天不愛其道地不愛其寶人不愛其情是以天降甘露地出醴泉山出器車出銀瓮丹竈之器及象車也河出馬圗龍似馬負圖出鳳凰麒麟皆在近郊龜龍在宫沼其餘鳥獸及卵胎皆可俯而窺也則是無故先王能循禮以達義體信以達順此順之實也家語卷七欽定四庫全書家語卷八魏王肅注
