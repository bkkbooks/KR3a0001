body:
  text: 五儀解第七哀公問於孔子曰寡人欲論魯國之士與之為治敢問如何取之孔子對曰生今之世志古之道居今之俗服古之服舍此而為非者不亦鮮乎曰然則章甫絇履紳帶搢笏者賢人也孔子曰不必然也丘之所言非此之謂也夫端衣玄裳冕而乘軒者則志不在於食焄斬衰菅菲杖而啜粥者則志不在酒肉生今之世志古之道居今之俗服古之服謂此類也公曰善哉盡此而已乎孔子曰人有五儀有庸人有士人有君子有賢人有聖人審此五者則治道畢矣公曰敢問何如斯可謂之庸人孔子曰所謂庸人者心不存慎終之規口不吐訓格之言不擇賢以托其身不力行以自定見小暗大不知所務從物如流不知其所執此則庸人也公曰何謂士人孔子曰所謂士人者心有所定計有所守雖不能盡道術之本必有率也雖不能備百善之美必有處也是故知不務多必審其所知言不務多必審其所謂行不務多必審其所由知既知之言既道之行既由之則若性命之形骸之不可易也富貴不足以益貧賤不足以損此則士人也公曰何謂君子孔子曰所謂君子者言必忠信而心不怨仁義在身而色無伐思慮通明而辭不專篤行信道自強不息油然若將可越而終不可及者此則君子也公曰何謂賢人孔子曰所謂賢人者德不踰間行中規繩言足以法於天下而不傷於身道足以化於百姓而不傷於本富則天下無宛財施則天下不病貧此則賢者也公曰何謂聖人孔子曰所謂聖者德合於天地變通無方窮萬事之終始協庶品之自然敷其大道而遂成情性明竝日月化行若神下民不知其德覩者不識其鄰此謂聖人也公曰善哉非子之賢則寡人不得聞此言也雖然寡人生於深宮之內長於婦人之手未嘗知哀未嘗知憂未嘗知勞未嘗知懼未嘗知危恐不足以行五儀之教若何孔子對曰如君之言已知之矣則丘亦無所聞焉公曰非吾子寡人無以啓其心吾子言也孔子曰君入廟如右登自阼階仰視榱桷俯察機筵其器皆存而不覩其人君以此思哀則哀可知矣昧爽夙興正其衣冠平旦視朝慮其危難一物失理亂亡之端君以此思憂則憂可知矣日出聽政至於中冥諸侯子孫往來為賓行禮揖讓慎其威儀君以此思勞則勞亦可知矣緬然長思出於四門周章遠視覩亡國之墟必將有數焉君以此思懼則懼可知矣夫君者舟也庶人者水也水所以載舟亦所以覆舟君以此思危則危可知矣君既明此五者又少留意於五儀之事則於政治何有失矣哀公問於孔子曰請問取人之法孔子對曰事任於官無取捷捷無取鉗鉗無取啍啍捷捷貪也鉗鉗亂也啍啍誕也故弓調而後求徑焉馬服而後求良焉士必愨而後求智能者焉不愨而多能譬之豺狼不可邇哀公問於孔子曰寡人欲吾國小而能守大則攻其道如何孔子對曰使君朝廷有禮上下和親天下百姓皆君之民將誰攻之苟違此道民畔如歸皆君之讎也將與誰其守公曰善哉於是廢山澤之禁弛關市之稅以惠百姓哀公問於孔子曰吾聞君子不博有之乎孔子曰有之公曰何為對曰為其有二乘公曰有二乘則何為不博也子曰為其兼行惡道也哀公懼焉有閒復問曰若是乎君子之惡惡道至甚也孔子曰君子之惡惡道不甚則好善道亦不甚好善道不甚則百姓之親上亦不甚詩云未見君子憂心惙惙亦既見止亦既覯止我心則說詩之好善道之甚也如此公曰美哉夫君子成人之善不成人之惡微吾子言焉吾弗之聞也哀公問於孔子曰夫國家之存亡禍福信有天命非唯人也孔子對曰存亡禍福皆己而已天災地妖不能加也公曰善吾子言之豈有其事乎孔子曰昔者殷王帝辛之世有雀生大鳥於城隅焉占之曰凡以小生大則國家必王而名益昌於是帝辛介雀之德不修國政亢㬥無極朝臣莫救外寇乃至殷國以亡此即以己逆天時詭福反為禍者也又其先世殷王太戊之時道缺法圮以致妖蘖桑榖于朝七日大拱占之者曰桑榖野木而不合生於朝意者國亡乎大戊恐駭側身修行思先王之政明養民之道三年之後遠方慕義重譯至者十有六國此即以己逆天時得禍為福者故天災地妖所以警人主者也寤夢徵怪所以警人臣者也災妖不勝善政寤夢不勝善行能知此者至治之極也唯明王達此公曰寡人不鄙固此亦不得聞君子之教也哀公問於孔子曰智者壽乎仁者壽乎孔子對曰然人有三死而非其命也己自取也夫寢處不時飲食不節逸勞過度者疾共殺之居下位而上干其君嗜欲無厭而求不止者刑共殺之以少犯衆以弱侮強忿怒不類動不量力兵共殺之此三者死非命也人自取之若夫智士仁人將身有節動靜以義喜怒以時無害其性雖得壽焉不亦宜乎
