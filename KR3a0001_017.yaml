body:
  text: 哀公問政第十七哀公問政於孔子孔子對曰文武之政布在方策其人存則其政舉其人亡則其政息天道敏生人道敏政地道敏樹夫政也者猶蒲盧也待化以成故為政在於得人取人以身修道以仁仁者人也親親為大義者宜也尊賢為大親親之教尊賢之等禮所以生也禮者政之本也是以君子不可以不修身思修身不可以不事親思事親不可以不知人思知人不可以不知天天下之達道有五其所以行之者三曰君臣也父子也夫婦也昆弟也朋友也五者天下之達道智仁勇三者天下之達德也所以行之者一也或生而知之或學而知之或困而知之及其知之一也或安而行之或利而行之或勉強而行之及其成功一也公曰子之言美矣至矣寡人實固不足以成之也孔子曰好學近乎智力行近乎仁知恥近乎勇知斯三者則知所以修身知所以修身則知所以治人知所以治人則能成天下國家者矣公曰政其盡此而已乎孔子曰凡為天下國家有九經曰修身也尊賢也親親也敬大臣也體群臣也重庶民也來百工也柔遠人也懷諸侯也夫修身則道立尊賢則不惑親親則諸父兄弟不怨敬大臣則不眩體群臣則士之報禮重重庶民則百姓勸來百工則財用足柔遠人則四方歸之懷諸侯則天下畏之公曰為之奈何孔子曰齋潔盛服非禮不動所以修身也去讒遠色賤利而貴德所以尊賢也爵其能重其祿同其好惡所以篤親親也官盛任使所以敬大臣也忠信重祿所以勸士也時使薄斂所以子百姓也日省月考餼廩稱事所以來百工也送往迎來嘉善而矜不能所以綏遠人也繼絶世舉廢邦治亂持危朝聘以時厚往而薄來所以懷諸侯也治天下國家有九經其所以行之者一也凡事豫則立不豫則廢言前定則不跲事前定則不困行前定則不疾道前定則不窮在下位不獲于上民弗可得而治矣獲于上有道不信于友不獲于上矣信于友有道不順于親不信于友矣順于親有道反諸身不誠不順于親矣誠身有道不明于善不誠于身矣誠者天之道也誠之者人之道也夫誠弗勉而中不思而得從容中道聖人之所以定體也誠之者擇善而固執之者也公曰子之教寡人備矣敢問行之所始孔子曰立愛自親始教民睦也立敬自長始教民順也教之慈睦而民貴有親教以敬而民貴用命民既孝於親又順以聽命措諸天下無所不可公曰寡人既得聞此言也懼不能果行而獲罪咎宰我問於孔子曰吾聞鬼神之名而不知所謂敢問焉孔子曰人生有氣有魄氣者神之盛也衆生必死死必歸土此之謂鬼魂氣歸天此謂神合鬼與神而享之教之至也骨肉弊於下化為野土其氣揚于上此神之著也聖人因物之精制為之極明命鬼神以為民之則而猶以是為未足也故築為宮室設為宗祧春秋祭祀以別親踈教民反古復始不敢忘其所由生也衆之服自此故聽且速焉教以二端二端既立報以二禮建設朝事燔燎羶薌所以報氣也薦黍稷修肺肝加以鬱鬯所以報魄也此教民修本反始崇愛上下用情禮之至也君子反古復始不忘其所由生是以致其敬發其情竭力從事不敢不自盡也此之謂大教昔者文王之祭也事死如事生思死而不欲生忌日則必哀稱諱則如見親祀之忠也思之深如見親之所愛祭欲見親之顏色者其唯文王與詩云明發不寐有懷二人則文王之謂與祭之明日明發不寐有懷二人敬而致之又從而思之祭之日樂與哀半饗之必樂已至必哀孝子之情也文王為能得之矣
