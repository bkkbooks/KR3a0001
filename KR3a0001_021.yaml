body:
  text: 入官第二十一子張問入官於孔子孔子曰安身取譽為難子張曰為之如何孔子曰己有善勿專教不能勿怠已過勿發失言勿椅不善勿遂行事勿留君子入官自此六者則身安譽至而政從矣且夫忿數者官獄所由生也拒諫者慮之所以塞也慢易者禮之所以失也怠惰者時之所以後也奢侈者財之所以不足也專獨者事之所以不成也君子入官除此六者則身安譽至而政從矣故君子南面臨官大域之中而公治之精智而略行之合是忠信考是大倫存是美惡進是利而除是害無求其報焉而民之情可得也夫臨之無抗民之惡勝之無犯民之言量之無佼民之辭養之無擾於其時愛之無寬於刑法若此則身安譽至而民得也君子以臨官所見則邇故明不可蔽也所求於邇故不勞而得也所以治者約故不用眾而譽立凡法象在內故法不遠而源泉不竭是以天下積而本不寡短長得其量人志治而不亂政德貫乎心藏乎志刑乎色發乎聲若此而身安譽至民咸自治矣是故臨官不治則亂亂生則爭之者至爭之至又反於亂明君必寬祐以容其民慈愛優柔之而民自得矣行者政之始也說者情之導也善政行易則民不怨言調說和則民不變法在身則民象之明在己則民顯之若乃供己而不節則財利之生者微矣貪以不得則善政必簡矣苟以亂之則善言必不聽也詳以納之則規諫日至煩以不聽矣言之善者在所日聞行之善者在所能為故君上者民之儀也有司執政者民之表也邇臣便僻者群僕之倫也故儀不正則民失表不端則百姓亂邇臣便僻不正廉則群臣汙矣是以人主不可不敬乎三倫君子脩身反道察里言而服之則身安譽至終始在焉故夫女子必自擇絲麻良工必自擇完材賢君必自擇左右勞於取人佚於治事君子欲譽則必謹其左右為上者譬如緣木焉務高而畏下玆甚六馬之乖離必於四達之交衢萬民之叛道必於君上之失政上者尊嚴而危民者卑賤而神愛之則存惡之則亡長民者必明此之要故南面臨官貴而不驕富而能供有本而能圖末脩事而能建業久居而不滯情近而暢乎遠察一物而貫乎多治一物而萬物不能亂者以身本者也君子莅民不可以不知民之性而達諸民之情既知其性又習其情然後民乃從命矣故世舉則民親之政均則民無怨故君子莅民不臨以高不導以遠不責民之所不為不強民之所不能以明王之功不因其情則民嚴而不迎篤之以累年之業不因其力則民引而不從若責民所不為強民所不能則民疾疾則僻矣古者聖主冕而前旒所以蔽明也紘紞充耳所以揜聰也水至清即無魚人至察則無徒枉而直之使自得之優而柔之使自求之揆而度之使自索之民有小過必求其善以赦其過民有大罪必原其故以仁輔化如有死罪其使之生則善也是以上下親而不離道化流而不蘊故德者政之始也政不和則民不從其教矣不從教則民不習不習則不可得而使也君子欲言之見信也莫善乎先虛其內欲政之速行也莫善乎以身先之欲民之速服也莫善乎以道御之故雖服必強自非忠信則無可以取親於百姓者矣內外不相應則無可以取信於庶民者矣此治民之至道矣入官之大統矣子張既聞孔子斯言遂退而記之
