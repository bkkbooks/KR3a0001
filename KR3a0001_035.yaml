body:
  text: 辨樂解第三十五孔子學琴於師襄子襄子曰吾雖以擊磬為官然能於琴今子於琴已習可以益矣孔子曰丘未得其數也有間曰已習其數可以益矣孔子曰丘未得其志也有間曰已習其志可以益矣孔子曰丘未得其為人也有閒曰孔子有所繆然思焉有所睪然高望而遠眺曰丘逮得其為人矣黮而黑頎然長曠如望羊掩有四方非文王其孰能為此師襄子避席葉拱而對曰君子聖人也其傳曰文王操子路鼓琴孔子聞之謂冉有曰甚矣由之不才也夫先王之制音也奏中聲以為節入於南不歸於北夫南者生育之鄉北者殺伐之城故君子之音溫柔居中以養生育之氣憂愁之感不加于心暴厲之動不在于體夫然者乃所謂治安之風也小人之音則不然亢麗微末以象殺伐之氣中和之感不載於心溫和之動不存于體夫然者乃所以為亂之風昔者舜彈五絃之琴造南風之詩其詩曰南風之薰兮可以解吾民之慍兮南風之時兮可以阜吾民之財兮唯修此化故其興也勃焉德如泉流至于今王公大人述而弗忘殷紂好為北鄙之聲其廢也忽焉至于今王公大人舉以為誡夫舜起布衣積德含和而終以帝紂為天子荒淫暴亂而終以亡非各所修之致乎由今也匹夫之徒曾無意于先王之制而習亡國之聲豈能保其六七尺之體哉冉有以告子路子路懼而自悔靜思不食以至骨立夫子曰過而能改其進矣乎周賓牟賈侍坐於孔子孔子與之言及樂曰夫武之備戒之以久何也對曰病不得其衆也詠歎之淫液之何也對曰恐不逮事也發揚蹈厲之已蚤何也對曰及時事也武坐致右而軒左何也對曰非武坐也聲淫及商何也對曰非武音也孔子曰若非武音則何音也對曰有司失其傳也孔子曰唯丘聞諸萇弘亦若吾子之言是也若非有司失其傳則武王之志荒矣賓牟賈起免席而請曰夫武之備戒之以久則既聞命矣敢問遲矣而又久立於綴何也子曰居吾語爾夫樂者象成者也揔干而山立武王之事也發揚蹈厲太公之志也武亂皆坐周邵之治也且夫武始成而北出再成而滅商三成而南反四成而南國是疆五成而分陜周公左邵公右六成而復綴以崇其天子焉衆夾振之而四伐所以盛威於中國分郟而進所以事蚤濟也久立於綴所以待諸侯之至也今汝獨未聞牧野之語乎武王克殷而反商之政未及下車則封黃帝之後於葪封帝堯之後於祝封帝舜之後於陳下車又封夏后氏之後於杞投殷之後於宋封王子比干之墓釋箕子之囚使人行商容之舊以復其位庶民弛政既濟河西馬散之華山之陽而弗復乘牛散之桃林之野而弗復服車甲則釁之而藏諸府庫以示弗復用倒載干戈而包之以虎皮將率之士使為諸侯命之曰鞬橐然後天下知武王之不復用兵也散軍而修郊射左射以狸首右射以騶虞而貫革之射息也裨冕搢笏而虎賁之士脫劍也郊配后稷而民知尊父焉配明堂而民知孝焉朝覲然後諸侯知所以臣耕籍然後民知所以敬親六者天下之大教也食三老五更於太學天子袒而割牲執醬而饋執爵而酳冕而揔干所以教諸侯之弟也如此則周道四達禮樂交通夫武之遲久不亦宜乎
