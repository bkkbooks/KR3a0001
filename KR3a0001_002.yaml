body:
  text: 始誅第二孔子為魯司寇攝行相事有喜色仲由問曰由聞君子禍至不懼福至不喜今夫子得位而喜何也孔子曰然有是言也不曰樂以貴下人乎於是朝政七日而誅亂政大夫少正卯戮之於兩觀之下尸於朝三日子貢進曰夫少正卯魯之聞人也今夫子為政而始誅之或者為失乎孔子曰居吾語女以其故天下有大惡者五而竊盜不與焉一曰心逆而險二曰行辟而堅三曰言僞而辨四曰記醜而博五曰順非而澤此五者有一於人則不免君子之誅而少正卯皆兼有之其居處足以掫徒成黨其談說足以飾褒瑩衆其強禦足以返是獨立此乃人之姦雄者也不可以不除夫殷湯誅尹諧文王誅潘正周公誅管蔡太公誅華士管仲誅付乙子産誅史何凡此七子者皆異世而同誅者以七子異世而同惡故不可赦也詩云憂心悄悄慍于群小小人成群斯足憂矣孔子為魯大司寇有父子訟者夫子同狴執之三月不別其父請止夫子赦之焉季孫聞之不說曰司寇欺余曩告余曰為國家必先以孝余今戮一不孝以教民孝不亦可乎而又赦之何哉冉有以告孔子孔子喟然歎曰嗚呼上失其道而殺其下非理也不教以孝而聽其獄是殺不辜也三軍大敗不可斬也獄犴不治不可刑也何者上教之不行罪不在民故也夫慢令謹誅賊也徵斂無時㬥也不試則成虐也故無此三者然後刑可即也書云義刑義殺勿庸以即汝心惟曰未有慎事言必教而刑也既陳道德以先服之而猶不可尚賢以勸之又不可即廢之又不可而後以威憚之若是三年而百姓正矣其有邪民不從化者然後待之以刑則民咸知罪矣詩云天子是毗俾民不迷是以威厲而不試刑錯而不用今世則不然亂其教繁其刑使民迷惑而陷焉又從而制之故刑彌繁而盜不勝也夫三尺之限空車不能登者何哉峻故也百仞之山重載陟焉何哉陵遲故也今世俗之陵遲久矣雖有刑法民能勿踰乎
