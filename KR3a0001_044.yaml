body:
  text: 公西赤問第四十四公西赤問於孔子曰大夫以罪免卒其葬也如之何孔子曰大夫廢其事終身不仕死則葬之以士禮老而致事者死則從其列公儀仲子嫡子死而立其弟檀弓謂子服伯子曰何居我未之前聞也子服伯子曰仲子亦猶行古人之道也昔者文王捨伯邑考而立武王微子捨其孫腯立其弟衍子游以問諸孔子子曰否周制立孫孔子之母既喪將合葬焉曰古者不祔葬為不忍先死者之復見也詩云死則同穴自周公已來祔葬矣故衛人之祔也離之有以閒焉魯人之祔也合之美夫吾從魯遂合葬於防曰吾聞之古者墓而不墳今丘也東西南北之人也不可以弗識也吾見封之若堂者矣又見若坊者矣又見若覆夏屋者矣又見若斧形者矣吾從斧者焉於是封之崇四尺孔子先反虞門人後雨甚至墓崩修之而孔子問焉曰爾來何遲對曰防墓崩孔子不應三云孔子泫然而流涕曰吾聞之古不修墓及二十五月而祥五日而彈琴不成聲十日過禫而成笙歌孔子有母之喪既練陽虎弔焉私於孔子曰今季氏將大饗境內之士子聞諸孔子曰丘弗聞也若聞之雖在衰絰亦欲與往陽虎曰子謂不然乎季氏饗士不及子也陽虎出曾參問曰語之何謂也孔子曰己則喪服猶應其言示所以不非也顏回死魯定公弔焉使人訪於孔子孔子對曰凡在封內皆臣子也禮君弔其臣升自東階向尸而哭其恩賜之施不有笇也原思言於曾子曰夏后氏之送葬也用明器示民無知也殷人用祭器示民有知也周人兼而用之示民疑也曾子曰其不然矣夫以明器鬼器也祭器人器也古之人胡為而死其親也子游問於孔子子曰之死而致死乎不仁不可為也之死而致生乎不智不可為也凡為明器者知喪道矣備物而不可用也是故竹不成用而瓦不成膝琴瑟張而不平笙竽備而不和有鐘磬而無簨𧇽其曰明器神明之也哀哉死者而用生者之器也不殆於用殉也子游問於孔子曰葬者塗車芻靈自古有之然今人或有偶是無益於喪孔子曰為芻靈者善矣為偶者不仁不殆於用人乎顏淵之喪既祥顏路饋祥肉於孔子孔子自出而受之入彈琴以散情而後乃食之孔子嘗奉薦而進其親也愨其行也趨趨以數已祭子貢問曰夫子之言祭也濟濟漆漆焉今夫子之祭無濟濟漆漆何也孔子曰濟濟漆漆者容也遠也漆漆者以自反也容以遠若容以自反也夫何神明之及交必如此則何濟濟漆漆之有反饋樂成進則燕俎序其禮樂備其百官於是君子致其濟濟漆漆焉夫言豈一端而已哉亦各有所當子路為季氏宰季氏祭逮昏而奠終日不足繼之以燭雖有強力之容肅敬之心皆倦怠矣有司跛倚以臨事其為不敬也大矣他日祭子路與焉室事交于戶堂事當于階質明而始行事晏朝而徹孔子聞之曰以此觀之孰為由也而不知禮衛莊公之反國改舊制變宗廟易朝市高子皋問於孔子曰周禮繹祭於祊祊在廟門之西前朝而後市今衛君欲其事事一更之如之何孔子曰繹之於庫門內祊之於東市朝於西方失之矣季桓子將祭齊三日而二日鐘鼓之音不絶冉有問於孔子子曰孝子之祭也散齊七日慎思其事三日致齊而一用之猶恐其不敬也而二日伐鼓何居焉公父文伯之母季康子之從祖母康子往焉側門而與之言內皆不踰閥文伯祭其祖悼子康子與焉進俎而不受徹俎而不與燕宗老不具則不繹繹不盡飫則退孔子聞之曰男女之別禮之大經公父氏之婦動中德趣度於禮矣季康子朝服以縞曾子問於孔子曰禮乎孔子曰諸侯皮辨以告朔然後服之以視朝若此禮者也
