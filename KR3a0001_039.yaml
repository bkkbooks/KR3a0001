body:
  text: 本姓解第三十九孔子之先宋之後也微子啓帝乙之元子紂之庶兄以圻內諸侯入為王卿士微國名子爵初武王克殷封紂之子武庚於朝歌使奉湯祀武王崩而與管蔡霍三叔作難周公相成王東征之二年罪人斯得乃命微子於殷後作微子之命由之與國于宋徙殷之子孫唯微子先往仕周故封之賢其弟曰仲思名衍或名泄嗣微子後故號微仲生宋公稽胄子雖遷爵易位而班級不及其故者得以故官為稱故二微雖為宋公而猶以微之號自終至于稽乃稱公焉宋公生丁公申申公生緡公共及襄公熙熙生弗父何及厲公方祀方祀以下世為宋卿弗父何生送父周周生世子勝勝生正考甫考甫生孔父嘉五世親盡別為公族故後以孔為氏焉一曰孔父者生時所賜號也是以子孫遂以氏族孔父生子木金父金父生睪夷睪夷生防叔避華氏之禍而奔魯防叔生伯夏夏生叔梁紇曰雖有九女是無子其妾生孟皮孟皮一字伯尼有足病於是乃求婚於顏氏顏氏有三女其小曰徵在顏父問三女曰陬大夫雖父祖為士然其先聖王之裔今其人身長十尺武力絶倫吾甚貪之雖年大性嚴不足為疑三子孰能為之妻二女莫對徵在進曰從父所制將何問焉父曰即爾能矣遂以妻之徵在既往廟見以夫之年大懼不時有男而私禱尼丘山以祈焉生孔子故名丘字仲尼孔子三歲而叔梁紇卒葬於防至十九娶于宋之上官氏生伯魚魚之生也魯昭公以鯉魚賜孔子榮君之貺故因以名鯉而字伯魚魚年五十先孔子卒齊太史子與適魯見孔子孔子與之言道子與悅曰吾鄙人也聞子之名不覩子之形久矣而未知寶貴也乃今而後知泰山之為高淵海為大惜乎夫子之不逢明王道德不加于民而將垂寶以貽後世遂退而謂南宮敬叔曰今孔子先聖之嗣自弗父何以來世有德讓天所祚也成湯以武德王天下其配在文殷宗已下未始有也孔子生於衰周先王典籍錯亂無紀而乃論百家之遺記考正其義祖述堯舜憲章文武刪詩述書定禮理樂制作春秋讚明易道垂訓後嗣以為法式其文德著矣然凡所教誨束修已上三千餘人或者天將欲與素王之乎夫何其盛也敬叔曰殆如吾子之言夫物莫能兩大吾聞聖人之後而非繼世之統其必有興者焉今孔子之道至矣乃將施乎無窮雖欲辭天之祚故未得耳子貢聞之以二子告孔子子曰豈若是哉亂而治之滯而起之自吾志天何與焉
