body:
  text: 顏回第十八魯定公問於顏回曰子亦聞東野畢之善御乎對曰善則善矣雖然其馬將必佚定公色不悅謂左右曰君子固有誣人也顏回退後三日牧來訴之曰東野畢之馬佚兩驂曳兩服入于廄公聞之越席而起促駕召顏回回至公曰前日寡人問吾子以東野畢之御而子曰善則善矣其馬將佚不識吾子奚以知之顏回對曰以政知之昔者帝舜巧於使民造父巧於使馬舜不窮其民力造父不窮其馬力是以舜無佚民造父無佚馬今東野畢之御也升馬執轡銜體正矣步驟馳騁朝禮畢矣歷險致遠馬力盡矣然而猶乃求馬不已臣以此知之公曰善誠若吾子之言也吾子之言其義大矣願少進乎顏回對曰臣聞之鳥窮則啄獸窮則玃人窮則詐馬窮則佚自古及今未有窮其下而能無危者也公悅遂以告孔子孔子對曰夫其所以為顏回者此之類也豈足多哉孔子在衛昧旦晨興顏回侍側聞哭者之聲甚哀子曰回汝知此何所哭乎對曰回以此哭聲非但為死者而已又有生離別者也子曰何以知之對曰回聞桓山之鳥生四子焉羽翼既成將分于四海其母悲鳴而送之哀聲有似於此謂其往而不返也回竊以音類知之孔子使人問哭者果曰父死家貧賣子以葬與之長決子曰回也善於識音矣顏回問於孔子曰成人之行若何子曰達于情性之理通於物類之變知幽明之故覩游氣之原若此可謂成人矣既能成人而又加之以仁義禮樂成人之行也若乃窮神知禮德之盛也顏回問於孔子曰臧文仲武仲孰賢孔子曰武仲賢哉顏回曰武仲世稱聖人而身不免於罪是智不足稱也好言兵討而挫鋭於邾是智不足名也夫文仲其身雖歿而言不朽惡有未賢孔子曰身歿言立所以為文仲也然猶有不仁者三不智者三是則不及武仲也回曰可得聞乎孔子曰下展禽置六關妾織蒲三不仁設虛器縱逆祀祠海鳥三不智武仲在齊齊將有禍不受其田以避其難是智之難也夫臧武仲之智而不容於魯抑有由焉作而不順施而不恕也夫夏書曰念茲在茲順事恕施顏回問君子孔子曰愛近仁度近智為己不重為人不輕君子也夫回曰敢問其次子曰弗學而行弗思而得小子勉之仲孫何忌問於顏回曰仁者一言而必有益於仁智可得聞乎回曰一言而有益於智莫如預一言而有益於仁莫如恕夫知其所不可由斯知所由矣顏回問小人孔子曰毀人之善以為辨狡訐懷詐以為智幸人之有過恥學而羞不能小人也顏回問子路曰力猛於德而得其死者鮮矣盍慎諸焉孔子謂顏回曰人莫不知此道之美而莫之御也莫之為也何居為聞者盍曰思也夫顏回問於孔子曰小人之言有同乎君子者不可不察也孔子曰君子以行言小人以舌言故君子於為義之上相疾也退而相愛小人於為亂之上相愛也退而相惡顏回問朋友之際如何孔子曰君子之於朋友也心必有非焉而弗能謂吾不知其仁人也不忘久德不思久怨仁矣夫叔孫武叔見未仕於顏回回曰賓之武叔多稱人之過而己評論之顏回曰固子之來辱也宜有得於回焉吾聞諸孔子曰言人之惡非所以美己言人之枉非所以正己故君子攻其惡無攻人之惡顏回謂子貢曰吾聞諸夫子身不用禮而望禮於人身不用德而望德於人亂也夫子之言不可不思也
