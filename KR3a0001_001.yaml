body:
  text: 相魯第一孔子初仕為中都宰制為養生送死之節長幼異食強弱異任男女別塗路無拾遺器不雕偽為四寸之棺五寸之槨因丘陵為墳不封不樹行之一年而西方之諸侯則焉定公謂孔子曰學子此法魯國何如孔子對曰雖天下可乎何但魯國而已哉於是二年定公以為司空乃別五土之性而物各得其所生之宜咸得厥所先時季氏葬昭公于墓道之南孔子溝而合諸墓焉謂季桓子曰貶君以彰己罪非禮也今合之所以掩夫子之不臣由司空為魯大司寇設法而不用無姦民定公與齊侯會于夾谷孔子攝相事曰臣聞有文事者必有武備有武事者必有文備古者諸侯並出疆必具官以從請具左右司馬定公從之至會所為壇土階三等以遇禮相見揖讓而登獻酢既畢齊使萊人以兵鼓謲劫定公孔子歷階而進以公退曰士以兵之吾兩君為好裔夷之俘敢以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不逼好於神為不祥於德為愆義於人為失禮君必不然齊侯心怍麾而避之有頃齊奏宮中之樂俳優侏儒戲於前孔子趨進歷階而上不盡一等曰匹夫熒侮諸侯者罪應誅請右司馬速加刑焉於是斬侏儒手足異處齊侯懼有慚色將盟齊人加載書曰齊師出境而不以兵車三百乘從我者有如此盟孔子使茲無還對曰而不返我汶陽之田吾以共命者亦如之齊侯將設享禮孔子謂梁丘據曰齊魯之故吾子何不聞焉事既成矣而又享之是勤執事且犧象不出門嘉樂不野合享而既具是棄禮也若其不具是用粃稗也用粃稗辱君棄禮名惡子盍圖之夫享所以昭德也不昭不如其已乃不果享齊侯歸責其群臣曰魯以君子道輔其君而子獨以夷翟道教寡人使得罪於是乃歸所侵魯之四邑及汶陽之田孔子言於定公曰家不臧甲邑無百雉之城古之制也今三家過制請皆損之乃使季氏宰仲由隳三都叔孫不得意於季氏因費宰公山弗擾率費人以襲魯孔子以公與季孫仲孫叔孫入於費氏之宮登武子之臺費人攻之及臺側孔子命申句須樂頎勒士衆下伐之費人北遂隳三都之城強公室弱私家尊君卑臣政化大行初魯之販羊有沈猶氏者常朝飲其羊以詐市人有公慎氏者妻淫不制有慎潰氏者奢侈踰法魯之鬻六畜者飾之以儲價及孔子之為政也則沈猶氏不敢朝飲其羊公慎氏出其妻慎潰氏越境而徙三月則鬻牛馬者不儲價賣羔豚者不加飾男女行者別其塗道不拾遺男尚忠信女尚貞順四方客至於邑者不求有司皆如歸焉
