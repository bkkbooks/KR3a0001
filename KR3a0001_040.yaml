body:
  text: 終記解第四十孔子蚤晨作負手曳杖逍遙於門而歌曰泰山其頽乎梁木其壞乎哲人其萎乎既歌而入當戶而坐子貢聞之曰泰山其頽則吾將安仰梁木其壞則吾將安杖哲人其萎吾將安放夫子殆將病也遂趨而入夫子歎而言曰賜汝來何遲豫疇昔夢坐奠於兩楹之間夏后氏殯於東階之上則猶在阼也殷人殯於兩楹之間則與賓主夾之也周人殯於西階之上則猶賓之也而丘也即殷人夫明王不興則天下其孰能宗余余殆將死遂寢病七日而終時年七十二矣哀公誄曰昊天不弔不整遺一老俾屏余一人以在位煢煢余在疚於乎哀哉尼父無自律子貢曰公其不沒於魯乎夫子有言曰禮失則昏名失則愆失志為昏失所為愆生不能用死而誄之非禮也稱一人非名君兩失之也既卒門人疑所以服夫子者子貢曰昔夫子喪顏回也若喪其子而無服喪子路亦然今請喪夫子若喪父而無服於是弟子皆弔服而加麻出有所之則由絰子夏曰入宜絰可也出則不絰子遊曰吾聞諸夫子喪朋友居則絰出則否喪所尊雖絰而出可也孔子之喪公西赤掌殯葬焉唅以踈米三具襲衣十有一稱加朝服一冠章甫之冠珮象環徑五寸而綨組綬桐棺四寸柏棺五寸飭棺牆置翣設披周也設崇殷也綢練設旐夏也兼用三王禮所以尊師且備古也葬於魯城北泗水上藏入地不及泉而封為偃斧之形高四尺樹松柏為志焉弟子皆家于墓行心喪之禮既葬有自燕來觀者舍於子夏氏子貢謂之曰吾亦人之葬聖人非聖人之葬人子奚觀焉昔夫子言曰吾見封若夏屋者見若斧矣從若斧者也馬鬣封之謂也今徒一日三斬板而以封尚行夫子之志而已何觀乎哉二三子三年喪畢或留或去惟子貢廬於墓六年自後群弟子及魯人處墓如家者百有餘家因名其居曰孔里焉
