body:
  text: 曲禮子貢問第四十二子貢問於孔子曰晉文公實召天子而使諸侯朝焉夫子作春秋云天王狩于河陽何也孔子曰以臣召君不可以訓亦書其率諸侯事天子而已孔子在宋見桓魋自為石槨三年而不成工匠皆病夫子愀然曰若是其靡也死不如速朽之愈也冉子僕曰禮凶事不豫此何謂也乎夫子曰既死而議諡諡定而卜葬既葬而立廟皆臣子之事非所豫屬也況自為之哉南宮敬叔以富得罪於定公奔衛衛侯請復之載其寶以朝夫子聞之曰若是其貨也喪不若速貧之愈也子遊侍曰敢問何謂如此孔子曰富而不好禮殃也敬叔以富喪矣而又弗改吾懼其將有後患也敬叔聞之驟如孔氏而後循禮施散焉孔子在齊齊大旱春飢景公問於孔子曰如之何孔子曰凶年則乘駑馬力役不興馳道不修祈以幣玉祭事不懸祀以下牲此則賢君自貶以救民之禮也孔子適季氏康子晝居內寢孔子問其所疾康子出見之言終孔子退子貢問曰季孫不疾而問諸疾禮與孔子曰夫禮君子不有大故則不宿於外非致齊也非疾也則不晝處於內是故夜居於外雖弔之可也晝居於內雖問其疾可也孔子為大司寇國廄焚子退朝而之火所鄉人有自為火來者則拜之士一大夫再子貢曰敢問何也孔子曰其來者亦相弔之道也吾為有司故拜之子貢問曰管仲失於奢晏子失於儉與其俱失也二者孰賢孔子曰管仲鏤簋而朱紘旅樹而反坫山節藻梲賢大夫也而難為上晏平仲祀其先祖而豚肩不掩豆一狐裘三十年賢大夫也而難為下君子上不僭下下不逼上冉求曰臧文仲知魯國之政立言垂法于今不可亡可謂知禮者矣孔子曰昔臧文仲安知禮夏父弗忌逆祀而不止也燔柴於竈以祀焉夫竈者老婦之所祭也盛於甕尊於瓶非所祭也故曰禮也者猶體也體不備謂之不成人設之不當猶不備也子路問於孔子曰臧武仲率師與邾人戰于狐鮐遇敗焉師人多喪而無罰古之道然與孔子曰凡謀人之軍師敗則死之謀人之國邑危則亡之古之道也其君在焉者有詔則無討晉將伐宋使人覘之宋陽門之介夫死司城子罕哭之哀覘者反言於晉侯曰陽門之介夫死而子罕哭之哀民咸悅宋殆未可伐也孔子聞之曰善哉覘國乎詩云凡民有喪匍匐救之子罕有焉雖非晉國天下其孰能當之是以周任有言曰民悅其愛者弗可敵也楚伐吳工尹商陽與陳棄疾追吳師及之棄疾曰王事也子手弓而可商陽手弓棄疾曰子射諸射之斃一人韔其弓又及棄疾謂之又斃二人每斃一人輒掩其目止其御曰吾朝不坐燕不與殺三人亦足以反命矣孔子聞之曰殺人之中又有禮焉子路怫然進曰人臣之節當君大事唯力所及死而後已夫子何善此子曰然如汝言也吾取其有不忍殺人之心而已孔子在衛司徒敬之卒夫子弔焉主人不哀夫子哭不盡聲而退蘧伯玉請曰衛鄙俗不習喪禮煩吾子辱相焉孔子許之掘中霤而浴毀竈而綴足襲於床及葬毀宗而躐行出于大門及墓男子西面婦人東面既封而歸殷道也孔子行之子遊問曰君子行禮不求變俗夫子變之矣孔子曰非此之謂也喪事則從其質而矣宣公八年六月辛巳有事于太廟而東門襄仲卒壬午猶繹子由見其故以問孔子曰禮與孔子曰非禮也卿卒不繹季桓子喪康子練而無衰子遊問於孔子曰既服練服可以除衰乎孔子曰無衰衣者不以見賓何以除焉邾人以同母異父之昆弟死將為之服因顏克而問禮於孔子子曰繼父同居者則異父昆弟從為之服不同居繼父且猶不服況其子乎齊師侵魯公叔務人遇人入保負杖而息務人泣曰使之雖病任之雖重君子弗能謀士弗能死不可也我則既言之矣敢不勉乎與其鄰嬖童汪錡乘往奔敵死焉皆殯魯人欲勿殤童汪錡問於孔子子曰能執干戈以衛社稷可無殤乎魯昭公夫人吳孟子卒不赴於諸侯孔子既致仕而往弔焉適于季氏季氏不絰孔子投絰而不拜子遊問曰禮與孔子曰主人未成服則弔者不絰焉禮也公父穆伯之喪敬薑晝哭文伯之喪晝夜哭孔子曰季氏之婦可謂知禮矣愛而無私上下有章南宮縚之妻孔子之兄女喪其姑夫子誨之髽曰爾毋從從爾毋扈扈爾蓋榛以為笄長尺而總八寸子張有父之喪公明儀相焉問啓顙於孔子孔子曰拜而後啓顙頽乎其順也啓顙而後拜頎乎其至也三年之喪吾從其至者孔子在衛衛之人有送葬者而夫子觀之曰善哉為喪乎足以為法也小子識之子貢問曰夫子何善爾也曰其往也如慕其返也如疑子貢曰豈若速返而虞哉子曰此情之至者也小子識之我未之能也卞人有母死而孺子之泣者孔子曰哀則哀矣而難繼也夫禮為可傳也為可繼也故哭踊有節而變除有期孟獻子禫懸而不樂可御而不處內子遊問於孔子曰若是則過禮也孔子曰獻子可謂加於人一等矣魯人有朝祥而暮歌者子路笑之孔子曰由爾責於人終無已夫三年之喪亦已久矣夫子路出孔子曰又多乎哉踰月則其善也子路問於孔子曰傷哉貧也生而無以供養死則無以為禮也孔子曰啜菽飲水盡其歡心斯謂之孝斂手足形旋葬而無椁稱其財斯謂之禮貧何傷乎吳延陵季子聘于上國適齊於其返也其長子死於嬴博之間孔子聞之曰延陵季子吳之習於禮者也往而觀其葬焉其斂以時服而已其壙掩坎深不至於泉其葬無明器之贈既葬其封廣輪掩坎其高可肘隱也既封則季子左袒右還其封且號者三曰骨肉歸于土命也若魂氣則無所不之無所不之而遂行孔子曰延陵季子之於禮其合矣子遊問喪之具孔子曰稱家之有亡焉子遊曰有亡惡乎齊孔子曰有也則無過禮苟亡矣則斂手足形還葬懸棺而封人豈有非之者哉故夫喪亡與其哀不足而禮有餘也不若禮不足而哀有餘也祭禮與其敬不足而禮有餘也不若禮不足而敬有餘也伯高死於衛赴於孔子子曰吾惡乎哭諸兄弟吾哭諸廟父之友吾哭諸廟門之外師吾哭諸寢朋友吾哭諸寢門之外所知吾哭諸野今於野則已踈於寢則已重夫由賜也而見我吾哭於賜氏遂命子貢為之主曰為爾哭也來者汝拜之知伯高而來者汝勿拜既哭使子張往弔焉未至冉求在衛攝束帛乘馬而以將之孔子聞之曰異哉徒使我不成禮於伯高者是冉求也子路有姊之喪可以除之矣而弗除孔子曰何不除也子路曰吾寡兄弟而弗忍也孔子曰行道之人皆弗忍先王制禮過之者俯而就之不至者企而望之子路聞之遂除之伯魚之喪母也期而猶哭夫子聞之曰誰也門人曰鯉也孔子曰嘻其甚也非禮也伯魚聞之遂除之衛公使其大夫求婚於季氏桓子問禮於孔子子曰同姓為宗有合族之義故繫之以姓而弗別啜之以食而弗殊雖百世婚姻不得通周道然也桓子曰魯衛之先雖寡兄弟今已絶遠矣可乎孔子曰固非禮也夫上祖禰以尊尊之下治子孫以親親之旁治昆弟所以敦睦也此先王不易之教也有若問於孔子曰國君之於同姓如之何孔子曰皆有宗道焉故雖國君之尊猶百世不廢其親所以崇愛也雖於族人之親而不敢戚君所以謙也
