body:
  text: 觀思第八孔子北遊於農山子路子貢顏淵侍側孔子四望喟然而歎曰於思致斯無所不至矣二三子各言爾志吾將擇焉子路進曰由願得白羽若月赤羽若日鐘鼓之音上震於天旍旗繽紛下蟠於地由當一隊而敵之必也攘地千里搴旗執馘唯由能之使二子者從我焉夫子曰勇哉子貢復進曰賜願使齊楚合戰於漭漾之野兩壘相望塵埃相接挺刃交兵賜著縞衣白冠陳説其間推論利害釋國之患唯賜能之使二子者從我焉夫子曰辨哉顏回退而不對孔子曰回來汝奚獨無願乎顏回對曰文武之事則二子者既言之矣回何云焉孔子曰雖然各言爾志也小子言之對曰回聞薰蕕不同器而藏堯桀不共國而治以其類異也回願明王聖主輔相之敷其五教導之以禮樂使民城郭不修溝池不越鑄劍戟以為農器放牛馬於原藪室家無離曠之思千歲無戰鬭之患則由無所施其勇而賜無所用其辨矣夫子凜然而對曰美哉德也子路抗手而問曰夫子何選焉孔子曰不傷財不害民不繁詞則顏氏之子有矣魯有儉嗇者瓦鬲煮食食之自謂其美盛之土型之器以進孔子孔子受之歡然而説如受大牢之饋子路曰瓦甂陋器也煮食薄膳也夫子何喜之如此乎夫子曰夫好諫者思其君食美者思其親吾非以饌具之為厚以其食厚而我思焉孔子之楚而有漁者獻魚焉孔子不受漁者曰天暑市遠無所鬻也思慮棄之糞壤不如獻之君子故敢以進焉於是夫子再拜受之使弟子掃地將以享祭門人曰彼將棄之而夫子以祭之何也孔子曰吾聞之惜其腐䭃而欲以務施者仁人之偶也惡有仁人之饋而無祭者乎季羔為衛之士師刖人之足俄而衛有蒯聵之亂季羔逃之走郭門刖者守門焉謂季羔曰彼有缺季羔曰君子不踰又曰彼有竇季羔曰君子不隧又曰於此有室季羔乃入焉既而追者罷季羔將去謂刖者曰吾不能虧主之法而親刖子之足今吾在難此正子之報怨之時也而逃我者三何故哉刖者曰斷足固我之罪也無可奈何曩者君之治臣也以法令先後臣欲臣之免也臣知之獄決罪定臨當論刑君愀然不樂見於顏色臣又知之君豈私臣哉天生君子其道固然此臣之所以説君也孔子聞之曰善哉為吏其用法一也思仁恕則樹德加嚴暴則樹怨公以行之其子羔乎孔子曰季孫之賜我粟千鍾也而交益親自南宮敬叔之乘我車也而道加行故道雖貴必有時而後重有勢而後行微夫二子之貺財則丘之道殆將廢矣孔子曰王者有似乎春秋文王以王季為父以太任為母以太姒為妃以武王周公為子以太顛閎夭為臣其本美矣武王正其身以正其國正其國以正天下伐無道刑有罪一動而天下正其事成矣春秋致其時而萬物皆及生王者致其道而萬民皆及治周公載己行化而天下順之其誠至矣曾子曰入其國也言信於群臣而留可也行忠於卿大夫則仕可也澤施於百姓則富可也孔子曰參之言此可謂善安身矣子路為蒲宰為水備與民修溝洫以民之勞煩苦也人與之一簞食一壺漿孔子聞之使子貢止之子路忿然不説往見孔子曰由也以暴雨將至恐有水災故與民修溝洫以備之而民多匱餓者是以簞食壺漿而與之夫子使賜止之是夫子止由之行仁也夫子以仁教而禁其行仁也由不受也孔子曰汝以民為餓也何不白於君發倉廩以賑之而私以爾食饋之是汝明君之無惠而見己之德美汝速已則可不則汝之見罪必矣子路問於孔子曰管仲之為人如何子曰仁也子路曰昔管仲説襄公公不受是不辨也欲立公子糾而不能是不智也家殘於齊而無憂色是不慈也桎梏而居檻車無慚心是無醜也事所射之君是不貞也召忽死之管仲不死是不忠也仁人之道固若是乎孔子曰管仲説襄公襄公不受公之暗也欲立子糾而不能不遇時也家殘於齊而無憂色是知權命也桎梏居檻車而無慚心自裁審也事所射之君通於變也不死子糾量輕重也夫子糾未成君而管仲未成臣管仲才度義管仲不死束縛而立功名未可非也召忽雖死過於取仁未足多也孔子適齊中路聞哭者之聲其音甚哀孔子謂其僕曰此哭哀則哀矣然非喪者之哀也驅而前少進見有異人焉擁鐮帶索哭音不哀孔子下車追而問曰子何人也對曰吾丘吾子也曰子今非喪之所奚哭之悲也丘吾子曰吾有三失晚而自覺悔之何及曰三失可得聞乎願子告吾無隱也丘吾子曰吾少時好學周遍天下後還喪吾親是一失也長事齊君君驕奢失士臣節不遂是二失也吾平生厚交而今皆離絶是三失也夫樹欲靜而風不停子欲養而親不待往而不來者年也不可再見者親也請從此辭遂投水而死孔子曰小子識之斯足為戒矣自是弟子辭歸養親者十有三人孔子謂伯魚曰鯉乎吾聞可以與人終日不倦者其惟學焉其容體不足觀也其勇力不足憚也其先祖不足稱也其族姓不足道也終而有大名以顯聞四方流聲後裔者豈非學者之效也故君子不可以不學其容不可以不飭不飭無類無類失親失親不忠不忠失禮失禮不立夫遠而有光者飭也近而愈明者學也譬之污池水潦注焉萑葦生焉雖或以觀之孰知其源乎子路見於孔子曰負重涉遠不擇地而休家貧親老不擇祿而仕昔者由也事二親之時常食藜藿之實為親負米百里之外親歿之後南遊於楚從車百乘積粟萬鍾纍茵而坐列鼎而食願欲食藜藿為親負米不可復德也枯魚銜索幾何不蠹二親之壽忽若過隙孔子曰由也事親可謂生事盡力死事盡思者也孔子之郯遭程子於塗傾蓋而語終日甚相親顧謂子路曰取束帛以贈先生子路屑然對曰由聞之士不中間見女嫁無媒君子不以交禮也有間又顧謂子路子路又對如初孔子曰由詩不云乎有美一人清揚宛兮邂逅相遇適我願兮今程子天下賢士也於斯不贈則終身弗能見也小子行之孔子自衛反魯息駕於河梁而觀焉有懸水三十仞圜流九十里魚鱉不能道黿鼉不能居有一丈夫方將厲之孔子使人並涯止之曰此懸水三十仞圜流九十里魚鱉黿鼉不能居也意者難可濟也丈夫不以措意遂度而出孔子問之曰子巧乎有道術乎所以能入而出者何也丈夫對曰始吾之入也先以忠信及吾之出也又從以忠信措吾軀於波流而吾不敢以用私所以能入而復出也孔子謂弟子曰二三子識之水且猶可以忠信成身親之而況於人乎孔子將行雨而無蓋門人曰商也有之孔子曰商之為人也甚吝於財吾聞與人交推其長者違其短者故能久也楚王渡江江中有物大如斗圓而赤直觸王舟舟人取之王大怪之遍問群臣莫之能識王使使聘于魯問於孔子子曰此所謂萍實者也可剖而食之吉祥也唯霸者為能獲焉使者反王遂食之大美久之使來以告魯大夫大夫因子遊問曰夫子何以知其然乎曰吾昔之鄭過乎陳之野聞童謠曰楚王渡江得萍實大如斗赤如日剖而食之甜如蜜此是楚王之應也吾是以知之子貢問於孔子曰死者有知乎將無知乎子曰吾欲言死之有知將恐孝子順孫妨生以送死吾欲言死之無知將恐不孝之子棄其親而不葬賜欲知死者有知與無知非今之急後自知之子貢問治民於孔子子曰懍懍焉若持腐索之扞馬子貢曰何其畏也孔子曰夫通達之御皆人也以道導之則吾畜也不以道導之則吾讎也如之何其無畏也魯國之法魯人有贖臣妾於諸侯者皆取金於府子貢贖人於諸侯而還其金孔子聞之曰賜失之矣夫聖人之舉事也可以移風易俗而教導可以施於百姓非獨適身之行也今魯國富者寡而貧者衆贖人受金則為不廉不受金則何以相贖乎自今以後魯人不復贖人於諸侯矣子路治蒲請見於孔子曰由願受教於夫子子曰蒲其何如對曰邑多壯士又難治也子曰然吾語爾恭而敬可以攝勇寬而正可以懷強愛而恕可以容困溫而斷可以抑姦如此而正不難矣
