body:
  text: 賢君第十三哀公問於孔子曰當今之君孰為最賢孔子對曰丘未之見也抑有衛靈公乎公曰吾聞其閨門之內無別而子次之賢何也孔子對曰臣語其朝廷行事不論其私家之際也公曰其事何如孔子對曰靈公之弟曰公子渠牟其智足以治千乘之國其信足以守之靈公愛而任之又有士曰林國者見賢必進之而退與分其祿是以靈公無遊放之士靈公賢而尊之又有士曰慶足者衛國有大事則必起而治之國無事則退而容賢靈公悅而敬之又有大夫史鰌以道去衛而靈公郊舍三日琴瑟不御必待史鰌之入而後敢入臣以此取之雖次之賢不亦可乎子貢問於孔子曰今之人臣孰為賢子曰吾未識也往者齊有鮑叔鄭有子皮則賢者也子貢曰齊無管仲鄭無子產子曰賜汝徒知其一未知其二也汝聞用力為賢乎進賢為賢乎子貢曰進賢賢哉子曰然吾聞鮑叔達管仲子皮達子產未聞二子之達賢己之才者也哀公問於孔子曰寡人聞忘之甚者徙而忘其妻有諸孔子對曰此猶未甚者也甚者乃忘其身公曰可得而聞乎孔子對曰昔者夏桀貴為天子富有四海忘其聖祖之道壞其典法廢其世祀荒于淫樂耽湎于酒佞臣諂諛窺導其心忠士折口逃罪不言天下誅桀而有其國此謂忘其身之甚矣顏淵將西遊於宋問於孔子曰何以為身子曰恭敬忠信而已矣恭則遠於患敬則人愛之忠則和於眾信則人任之勤斯四者可以政國豈特一身者哉故夫不比於數而比於踈不亦遠乎不修其中而脩外者不亦反乎慮不先定臨事而謀不亦晚乎孔子讀詩于正月六章惕然如懼曰彼不達之君子豈不殆哉從上依世則道廢違上離俗則身危時不興善己獨由之則曰非妖即妄也故賢也既不遇天恐不終其命焉桀殺龍逄紂殺比干皆是類也詩曰謂天蓋高不敢不局謂地蓋厚不敢不蹐此言上下畏罪無所自容也子路問於孔子曰賢君治國所先者何孔子曰在於尊賢而賤不肖子路曰由聞晉中行氏尊賢而賤不肖矣其亡何也孔子曰中行氏尊賢而不能用賤不肖而不能去賢者知其不用而怨之不肖者知其必己賤而讎之怨讎竝存於國鄰敵搆兵於郊中行氏雖欲無亡豈可得乎孔子閑處喟然而歎曰嚮使銅鞮伯華無死則天下其有定矣子路曰由願聞其人也子曰其幼也敏而好學其壯也有勇而不屈其老也有道能下人有此三者以定天下也何難乎哉子路曰幼而好學壯而有勇則可也若夫有道下人又誰下哉子曰由不知吾聞以眾攻寡無不剋也以貴下賤無不得也昔者周公居冢宰之尊制天下之政而猶下白屋之士日見百七十人斯豈以無道也欲得士之用也惡有有道而無下天下君子哉齊景公來適魯舍于公館使晏嬰迎孔子孔子至景公問政焉孔子荅曰政在節財公悅又問曰秦穆公國小處僻而霸何也孔子對曰其國雖小而其志大處雖僻而其政中其舉也果其謀也和法無私而令不愉首拔五羖爵之大夫與語三日而授之以政此取之雖王可也其霸少矣景公曰善哉哀公問政於孔子孔子對曰政之急者莫大乎使民富且壽也公曰為之奈何孔子曰省力役薄賦歛則民富矣敦禮教遠罪疾則民壽矣公曰寡人欲行夫子之言恐吾國貧矣孔子曰詩云愷悌君子民之父母未有子富而父母貧者也衛靈公問於孔子曰有語寡人曰有國家者計之於廟堂之上則政治矣何如孔子曰其可也愛人者則人愛之惡人者則人惡之知得之己者則知得之人所謂不出環堵之室而知天下者知反己之謂也孔子見宋君君問孔子曰吾欲使長有國而列都得之吾欲使民無惑吾欲使士竭力吾欲使日月當時吾欲使聖人自來吾欲使官府治理為之奈何孔子對曰千乘之君問丘者多矣而未有若主君之問問之悉也然主君所欲者盡可得也丘聞之鄰國相親則長有國君惠臣忠則列都得之不殺無辜無釋罪人則民不惑士益之祿則皆竭力尊天敬鬼則日月當時崇道貴德則聖人自來任能黜否則官府治理宋君曰善哉豈不然乎寡人不佞不足以致之也孔子曰此事非難唯欲行之云耳
