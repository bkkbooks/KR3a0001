body:
  text: 子路初見第十九子路見孔子子曰汝何好樂對曰好長劍孔子曰吾非此之問也徒謂以子之所能而加之以學問豈可及乎子路曰學豈益也哉孔子曰夫人君而無諫臣則失正士而無教友則失聽御狂馬不釋策操弓不反檠木受繩則直人受諫則聖受學重問孰不順哉毀仁惡士必近於刑君子不可不學子路曰南山有竹不揉自直斬而用之達于犀革以此言之何學之有孔子曰括而羽之鏃而礪之其入之不亦深乎子路再拜曰敬而受教子路將行辭於孔子子曰贈汝以車乎贈汝以言乎子路曰請以言孔子曰不強不達不勞無功不忠無親不信無復不恭失禮慎此五者而已子路曰由請終身奉之敢問親交取親若何言寡可行若何長為善士而無犯若何孔子曰汝所問苞在五者中矣親交取親其忠也言寡可行其信乎長為善士而無犯於禮也孔子為魯司寇見季康子康子不悅孔子又見之宰豫進曰昔豫也常聞諸夫子曰王公不我聘則弗動今夫子之於司寇也日少而屈節數矣不可以已乎孔子曰然魯國以衆相陵以兵相暴之日久矣而有司不治則將亂也其聘我者孰大於是哉魯人聞之曰聖人將治何不先自遠刑罰自此之後國無爭者孔子謂宰豫曰違山十里蟪蛄之聲猶在於耳故政事莫如應之孔子兄子有孔蔑者與宓子賤皆仕孔子往過孔蔑而問之曰自汝之仕何得何亡對曰未有所得而所亡者三王事若龍學焉得習是學不得明也俸祿少饘粥不及親戚是骨肉益踈也公事多急不得弔死問疾是朋友之道闕也其所亡者三即謂此也孔子不悅往過子賤問如孔蔑對曰自來仕者無所亡其有所得者三始誦之今得而行之是學益明也俸祿所供被及親戚是骨肉益親也雖有公事而兼以弔死問疾是朋友益篤也孔子喟然謂子賤曰君子哉若人魯無君子者則子賤焉取此孔子侍坐於哀公賜之桃與黍焉哀公曰請孔子先食黍而後食桃左右皆掩口而笑公曰黍者所以雪桃非為食之也孔子對曰丘知之矣然夫黍者五穀之長也郊禮宗廟以為上盛果屬有六而桃為下祭祀不用不登郊廟丘聞之君子以賤雪貴不聞以貴雪賤今以五穀之長雪果之下者是從上雪下臣以為妨於教害於義故不敢公曰善哉子貢曰陳靈公宣淫於朝泄冶正諫而殺之是與比干諫而死同可謂仁乎子曰比干於紂親則諸父官則少師忠報之心在於宗廟而已固必以死爭之冀身死之後紂將悔寤其本志情在於仁者也泄冶之於靈公位在大夫無骨肉之親懷寵不去仕於亂朝以區區之一身欲正一國之淫昏死而無益可謂狷矣詩曰民之多僻無自立辟其泄冶之謂乎孔子相魯齊人患其將霸欲敗其政乃選好女子八十人衣以文飾而舞容璣及文馬四十駟以遺魯君陳女樂列文馬于魯城南高門外季桓子微服往觀之再三將受焉告魯君為周道遊觀觀之終日怠於政事子路言於孔子曰夫子可以行矣孔子曰魯今且郊若致膰於大夫則是未廢其常吾猶可以止也桓子既受女樂君臣淫荒三日不聽國政郊又不致膰俎孔子遂行宿於郭屯師已送曰夫子非罪也孔子曰吾歌可乎歌曰彼婦人之口可以出走彼婦人之謁可以死敗優哉遊哉聊以卒歲淡臺子羽有君子之容而行不勝其貌宰我有文雅之辭而智不充其辨孔子曰里語云相馬以輿相士以居弗可廢矣以容取人乎則失之子羽以辭取人乎則失之宰豫孔子曰君子以其所不能畏人小人以其所不能不信人故君子長人之才小人抑人而取勝焉孔蔑問行己之道子曰知而弗為莫如勿知親而弗信莫如勿親樂之方至樂而勿驕患之將至思而勿憂孔蔑曰行己乎子曰攻其所不能補其所不備毋以其所不能疑人毋以其所能驕人終日言無遺己憂終日行不遺己患唯智者有之
