body:
  text: 問禮第六哀公問於孔子曰大禮何如子之言禮何其尊也孔子對曰丘也鄙人不足以知大禮公曰吾子言焉孔子曰丘聞之民之所以生者禮為大非禮則無以節事天地之神焉非禮則無以辨君臣上下長幼之位焉非禮則無以別男女父子兄弟婚姻親族疏數之交焉是故君子以此為之尊敬然後以其所能教順百姓不廢其會節既有成事然後治其雕鏤文章黼黻以別尊卑上下之等其順之也而後言其喪祭之紀宗廟之序品其犧牲設其豕臘修其歲時以敬祭祀別其親疏序其昭穆而後宗族會宴即安其居以綴恩義卑其宮室節其服御車不雕璣器不雕鏤食不二味心不淫志以與萬民同利古之明王行禮也如此公曰今之君子胡莫之行也孔子對曰今之君子好利無厭淫行不倦荒怠慢遊固民是盡以遂其心以怨其政以忤其衆以伐有道求得當欲不以其所虐殺刑誅不以其治夫昔之用民者由前今之用民者由後是即今之君子莫能為禮也言偃問曰夫子之極言禮也可得而聞乎孔子言我欲觀夏道是故之杞而不足徵也吾得夏時焉我欲觀殷道是故之宋而不足徵也吾得乾坤焉乾坤之義夏時之等吾以此觀之夫禮之初也始於飲食太古之時燔黍擘豚汙樽而抔飲蕢桴而土鼓猶可以致敬於鬼神及其死也升屋而號曰高某復然後飲腥苴熟形體則降魂氣則上是為天望而地藏也故生者南嚮死者北首皆從其初也昔之王者未有宮室冬則居營窟夏則居橧巢未有火化食草木之實鳥獸之肉飲其血茹其毛未有絲麻衣其羽皮後聖有作然後修火之利範金合土以為臺榭宮室戶牖以炮以燔以烹以炙以為醴酪治其絲麻以為布帛以養生送死以事鬼神故玄酒在室醴盞在戶粢醍在堂澄酒在下陳其犧牲備其鼎俎列其琴瑟管磬鐘鼓以其祝嘏以降其上神與其先祖以正君臣以篤父子以睦兄弟以齊上下夫婦有所是謂承天之祜作其祝號玄酒以祭薦其血毛腥其俎熟其殽趏席以坐疏布以罩衣其浣帛醴盞以獻薦其燔炙君與夫人交獻以嘉魂魄是謂合莫然後退而合烹體其犬豕牛羊實其簠簋籩豆鉶羹祝以孝告嘏以慈告是為大祥此禮之大成也
