body:
  text: 正論解第四十一孔子在齊齊侯出田招虞人以弓不進公使執之對曰昔先君之田也旃以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍之孔子聞之曰善哉守道不如守官君子韙之齊國書伐魯季康子使冉求率左師禦之樊遲為右非不能也不信乎請三刻而踰之如之衆從之師入齊軍齊軍遁冉有用戈故能入焉孔子聞之曰義也既戰季孫謂冉有曰子之於戰學之乎性達之乎對曰學之季孫曰從事孔子惡乎學冉有曰即學之孔子也夫孔子者大聖無不該文武並用兼通求也適聞其戰法猶未之詳也季孫悅樊遲以告孔子孔子曰季孫於是乎可謂悅人之有能矣南容説仲孫何忌既除喪而昭公在外未之命也定公即位乃命之辭曰先臣有遺命焉曰夫禮人之幹也非禮則無以立囑家老使命二臣必事孔子而學禮以定其位公許之二子學於孔子孔子曰能補過者君子也詩云君子是則是效孟僖子可則效矣懲己所病以誨其嗣大雅所謂詒厥孫謀以燕翼子是類也夫衛孫文子得罪於獻公居戚公卒未葬文子擊鐘焉延陵季子適晉過戚聞之曰異哉夫子之在此也猶燕子巢于幕也懼猶未也又何樂焉君又在殯可乎文子於是終身不聽琴瑟孔子聞之曰季子能以義正人文子能克己服義可謂善改矣孔子覽晉志晉趙穿殺靈公趙盾亡未及山而還史書趙盾弒君盾曰不然史曰子為正卿亡不出境返不討賊非子而誰盾曰嗚呼我之懷矣自詒伊戚其我之謂乎孔子歎曰董狐古之良史也書法不隱趙宣子古之良大夫也為法受惡受惡惜也越境乃免鄭伐陳入之使子産獻捷于晉晉人問陳之罪焉子産對曰陳亡周之大德豕恃楚衆馮陵弊邑是以有往年之告未獲命則又有東門之役當陳隧者井堙木刊敝邑大懼天誘其衷啓敝邑心知其罪授首于我用敢獻功晉人曰何故侵小對曰先王之命惟罪所在各致其辟且昔天子一圻列國一同自是以衰周之制也今大國多數圻矣若無侵小何以至焉晉人曰其辭順孔子聞之謂子貢曰志有之言以足志文以足言不言誰知其志言之無文行之不遠晉為伯鄭入陳非文辭不為功慎辭哉楚靈王汰侈右尹子革侍坐左史倚相趨而過王曰是良史也子善視之是能讀三墳五典八索九丘對曰夫良史者記君之過揚君之善而此子以潤辭為官不可為良史臣又嘗問焉昔周穆王欲肆其心將過行天下使皆有車轍馬迹焉祭公謀父作祈昭以止王心王是以獲歿於文宮臣聞其詩焉而弗知若問遠焉其焉能知王曰子能乎對曰能其詩曰祈昭之愔愔乎式昭德音思我王度式如玉式如金刑民之力而無有醉飽之心靈王揖而入饋不食寢不寐數日則固不能勝其情以及其難孔子讀其志曰剋己復禮為仁信善哉楚靈王若能如是豈其辱於乾溪子革之非左史所以風也稱詩以諫順哉叔孫穆子避難奔齊宿於庚宗之邑庚宗寡婦通焉而生牛穆子反魯以牛為內豎相家牛讒叔孫二人殺之叔孫有病牛不通其饋不食而死牛遂輔叔孫庶子昭而立之昭子既立朝其家衆曰豎牛禍叔孫氏使亂大從殺適立庶又披其邑以求舍罪罪莫大焉必速殺之遂殺豎牛孔子曰叔孫昭子之不勞不可能也周任有言曰為政者不賞私勞不罰私怨詩云有覺德行四國順之昭子有焉晉邢侯與雍子爭田叔魚攝理罪在雍子雍子納其女於叔魚叔魚弊其邢獄邢侯怒殺叔魚與雍子於朝韓宣子問罪於叔向叔向曰三姦同罪施生戮死可也雍子自知其罪而賂以置直鮒也鬻獄邢侯專殺其罪一也已惡而掠美為昏貪以敗官為默殺人不忌為賊夏書曰昏默賊殺咎陶之刑也請從之乃施邢侯而尸雍子叔魚於市孔子曰叔向古之遺直也治國制刑不隱於親三數叔魚之罪不為末減曰義可謂直矣平丘之會數其賄也以寬衛國晉不為暴歸魯季孫稱其詐也以寬魯國晉不為虐邢侯之獄言其貪也以正刑書晉不為頗三言而除三惡加三利殺親益榮由義也夫鄭有鄉校鄉校之士非論執政鬷明欲毀鄉校子産曰何以毀為夫人朝夕退而遊焉以議執政之善否其所善者吾則行之其所否者吾則改之若之何其毀也我聞忠善以損怨不聞立威以防怨防怨猶防水也大決所犯傷人必多吾弗克救也不如小決使導之不如吾所聞而藥之孔子聞是言也曰吾以是觀之人謂子産不仁吾不信也晉平公會諸侯于平丘齊侯及盟鄭子産爭貢賦之所承曰昔日天子班貢輕重以列列尊卑而貢周之制也卑而貢重者甸服鄭伯南也而使從公侯之貢懼弗給也敢以為請自日中諍之以至于昏晉人許之孔子曰子産於是行也是以為國也詩云樂只君子邦家之基子産君子之於樂者且曰合諸侯而藝貢事禮也鄭子産有疾謂子太叔曰我死子必為政唯有德者能以寬服民其次莫如猛夫火烈民望而畏之故鮮死焉水濡弱民狎而玩之則多死焉故寬難子産卒子太叔為政不忍猛而寬鄭國多掠盜太叔悔之曰吾早從夫子必不及此孔子聞之曰善哉政寬則民慢慢則糾於猛猛則民殘民殘則施之以寬寬以濟猛猛以濟寬寬猛相濟政是以和詩云民亦勞止汔可小康惠此中國以綏四方施之以寬也毋縱詭隨以謹無良式遏寇虐慘不畏明糾之以猛也柔遠能邇以定我王平之以和也又曰不競不絿不剛不柔布政優優百祿是遒和之至也子産之卒也孔子聞之出涕曰古之遺愛也孔子適齊過泰山之側有婦人哭於野者而哀夫子式而聽之曰此哀一似重有憂者使子貢往問之而曰舅死於虎吾夫又死焉今吾子又死焉子貢曰何不去乎婦人曰無苛政子貢以告孔子子曰小子識之苛政猛於暴虎也晉魏獻子為政分祁氏及羊舌氏之田以賞諸大夫及其子成皆以賢舉也又謂賈辛曰今汝有力於王室吾是以舉汝行乎敬之哉毋墮乃力孔子聞之曰魏子之舉也近不失親遠不失舉可謂美矣又聞其命賈辛也以為忠詩云永言配命自求多福忠也魏子之舉也義其命也忠其長有後於晉國乎趙簡子賦晉國一鼓鐘以鑄刑鼎著范宣子所為刑書焉孔子曰晉其亡乎失其度矣夫晉國將守唐叔之所受法度以經緯其民者也卿大夫以序守之民是以能遵其道而守其業貴賤不愆謂度也文公是以作執秩之官為被廬之法以為盟主今棄此度也而為刑鼎民在鼎矣何以尊貴何業之守也貴賤無序何以為國且夫宣子之刑夷之搜也晉國亂制若之何其為法乎楚昭王有疾卜曰河為祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望江漢沮漳楚之望也禍福之至不是過乎不穀雖不德河非所獲罪也遂不祭孔子曰楚昭王知大道矣其不失國也宜哉夏書曰維彼陶唐率彼天常在此冀方今失其行亂其紀綱乃滅而亡又曰允出茲在茲由己率常可矣衛孔文子使太叔疾出其妻而以其女妻之疾誘其初妻之娣為之立宮與文子女如二妻之禮文子怒將攻之孔子舍璩伯玉之家文子就而訪焉孔子曰簠簋之事則嘗聞學之矣兵甲之事未之聞也退而命駕而行曰鳥則擇木木豈能擇鳥乎文子遽自止之曰圉也豈敢度其私哉亦訪衛國之難也將止會季康子問冉求之戰冉求既對之又曰夫子播之百姓質諸鬼神而無憾用之則有名康子言於哀公以幣迎孔子曰人之於冉求信之矣將大用之齊陳恆弒其君簡公孔子聞之三日沐浴而適朝告於哀公曰陳恆弒其君請伐之公弗許三請公曰魯為齊弱久矣子之伐也將若之何對曰陳恆弒其君民之不與者半以魯之衆加齊之半可剋也公曰子告季氏孔子辭退而告人曰以吾從大夫之後不敢不告也子張問曰書云高宗三年不言言乃雍有諸孔子曰胡為其不然也古者天子崩則世子委政於冢宰三年成湯既歿太甲聽於伊尹武王既喪成王聽於周公其義一也衛孫桓子侵齊遇敗焉齊人乘之新築大夫仲叔于奚以其衆救桓子桓子乃免衛人以邑賞仲叔于奚于奚辭請曲懸之樂繁纓以朝許之書在三官子路仕衛見其政以訪孔子孔子曰惜也不如多與之邑唯器與名不可以假人君之所司也名以出信信以守器器以藏禮禮以行義義以生利利以平民政之大節也若以假人與人政也政亡則國家從不可止已公父文伯之母紡績不解文伯諫焉其母曰古者王后親織玄紞公侯之夫人加之紘綖卿之內子為大帶命婦成祭服列士之妻加之以朝服自庶士已下各衣其夫秋而戎事蒸而獻功男女紡績愆則有辟聖王之制也今我寡也爾又在位朝夕恪勤猶恐亡先人之業況有怠惰其何以避辟孔子聞之曰弟子志之季氏之婦可謂不過矣樊遲問於孔子曰鮑牽事齊君執政不撓可謂忠矣而君刖之其為至暗乎孔子曰古之士者國有道則盡忠以輔之無道則退身以避之今鮑莊子食於淫亂之朝不量主之明暗以受大刑是智之不如葵葵猶能衛其足季康子欲以一井田出法賦焉使訪孔子子曰丘弗識也冉有三發卒曰子為國老待子而行若之何子之不言也孔子不對而私於冉有曰求汝來汝弗聞乎先王制土籍田以力而底其遠近賦里以入而量其有無任力以夫而議其老幼於是鰥寡孤疾老者有軍旅之出則徵之無則已其歲收田一井出獲秉缶米芻稿不是過先王以為之足君子之行必度於禮施取其厚事舉其中斂從其薄若是其已丘亦足矣若不度於禮而貪冒無厭則雖賦田將有不足且子孫若以行之而取法則有周公之典在若欲犯法則苟行之又何訪焉子遊問於孔子曰夫子之極言子産之惠也可得聞乎孔子曰謂在愛民而已矣子遊曰愛民謂之德教何翅施惠哉孔子曰夫子産者猶衆人之母也能食之而不能教也子遊曰其事可言乎孔子曰子産以所乘之車濟冬涉是愛而無教也定公問於孔子曰二三大夫皆勸寡人使隆敬於高年何也孔子對曰君之及此言也將天下實賴之豈唯魯哉公曰何也其義可得聞乎孔子曰昔者有虞氏貴德而尚齒夏后氏貴爵而尚齒殷人貴富而尚齒周人貴親而尚齒虞夏殷周天下之上王也未有遺年者焉年者貴於天下久矣次于事親是故朝廷同爵而尚齒七十杖於朝君問則席八十則不仕朝君問則就之而悌達乎朝廷矣其行也肩而不並不錯則隨班白之老不以其任於路而悌達乎道路矣居鄉以齒而老窮不匱強不犯弱衆不暴寡而悌達乎州巷矣古之道五十不為甸役頒禽隆之長者而悌達乎搜狩矣軍旅五什同齒則尚齒而悌達乎軍旅矣夫聖人之教孝悌發諸朝廷行於道路至于州巷放於搜狩循于軍旅則衆感以義死之而弗敢犯公曰善哉寡人雖聞之弗能成哀公問於孔子曰寡人聞東益不祥信有之乎孔子曰不祥有五而東益不與焉夫損人而自益身之不祥也棄老而取幼家之不祥也釋賢而任不肖國之不祥也老者不教幼者不學俗之不祥也聖人伏匿愚者擅權天下之不祥也不祥有五東益不與焉孔子適季孫季孫之宰謁曰君使求假於田將與之乎季孫未言孔子曰吾聞之君取於臣謂之取與於臣謂之賜臣取於君謂之假與於君謂之獻季孫色然悟曰吾誠未達此義遂命其宰曰自今已往君有取一切不得復言假也
