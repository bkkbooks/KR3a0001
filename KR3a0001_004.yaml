body:
  text: 大昏解第四孔子侍坐於哀公公曰敢問人道孰為大孔子愀然作色而對曰君之及此言也百姓之惠也固臣敢無辭而對人道政為大夫政者正也君為正則百姓從而正矣君之所為百姓之所從君不為正百姓何所從乎公曰敢問為政如之何孔子對曰夫婦別男女親君臣信三者正則庶物從之公曰寡人雖無能也願如所以行三者之道可得聞乎孔子對曰古之為政愛人為大所以治愛人禮為大所以治禮敬為大敬之至矣大昏為大大昏至矣大昏既至冕而親迎親迎者敬之也是故君子興敬為親捨敬則是遺親也弗親弗敬弗尊也愛與敬其政之本與公曰寡人願有言然冕而親迎不已重乎孔子愀然作色而對曰合二姓之好以繼先聖之後以為天下宗廟社稷之主君何謂已重乎公曰寡人實固不固安得聞此言乎寡人欲問不能為辭請少進孔子曰天地不合萬物不生大昏萬世之嗣也君何謂已重焉孔子遂言曰內以治宗廟之禮足以配天地之神出以治直言之禮足以立上下之敬物恥則足以振之國恥則足以興之故為政先乎禮禮其政之本與孔子遂言曰昔三代明王必敬妻子也蓋有道焉妻也者親之主也子也者親之後也敢不敬與是故君子無不敬敬也者敬身為大身也者親之支也敢不敬與不敬其身是傷其親傷其親是傷其本也傷其本則支從之而亡三者百姓之象也身以及身子以及子妃以及妃君能修此三者則大化愾乎天下矣昔者大王之道也如此國家順矣公曰敢問何謂敬身孔子對曰君子過言則民作辭過行則民作則言不過辭動不過則百姓恭敬以從命若是則可謂能敬其身能敬其身則能成其親矣公曰何謂成其親孔子對曰君子者人之成名也百姓與名謂之君子則是成其親為君而為其子也孔子遂言曰為政而不能愛人則不能成其身不能成其身則不能安其土不能安其土則不能樂天不能樂天則不成其身公曰敢問何謂能成身孔子對曰夫其行己不過乎物謂之成身不過乎物合天道也公曰君子何貴乎天道也孔子曰貴其不已也如日月東西相從而不已也是天道也不閉而能久是天道也無為而物成是天道也已成而明之是天道也公曰寡人且愚冥幸煩子志之心也孔子蹴然避席而對曰仁人不過乎物孝子不過乎親是故仁人之事親也如事天事天如事親此謂孝子成身公曰寡人既聞如此言也無如後罪何孔子對曰君之及此言是臣之福也
