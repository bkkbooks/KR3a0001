body:
  text: 觀周第十一孔子謂南宮敬叔曰吾聞老聃博古知今通禮樂之原明道德之歸則吾師也今將往矣對曰謹受命遂言於魯君曰臣受先臣之命云孔子聖人之後也滅於宋其祖弗父何始有國而受厲公及正考父佐戴武宣三命茲益恭故其鼎銘曰一命而僂再命而傴三命而俯循牆而走亦莫余敢侮饘於是粥於是以糊其口其恭儉也若此臧孫紇有言聖人之後若不當世則必有明德而達者焉孔子少而好禮其將在矣屬臣汝必師之今孔子將適周觀先王之遺制考禮樂之所極斯大業也君盍以乘資之臣請與往公曰諾與孔子車一乘馬二匹豎子侍御敬叔與俱至周問禮於老聃訪樂於萇弘歷郊社之所考明堂之則察廟朝之度於是喟然曰吾乃今知周公之聖與周之所以王也及去周老子送之曰吾聞富貴者送人以財仁者送人以言吾雖不能富貴而竊仁者之號請送子以言乎凡當今之士聰明深察而近於死者好譏議人者也博辨閎達而危其身好發人之惡者也無以有己為人子者無以惡己為人臣者孔子曰敬奉教自周反魯道彌尊矣遠方弟子之進蓋三千焉孔子觀乎明堂覩四門墉有堯舜與桀紂之象而各有善惡之狀興廢之誡焉又有周公相成王抱之負斧扆南面以朝諸侯之圖焉孔子俳佪而望之謂從者曰此周公所以盛也夫明鏡者所以察形往古者所以知今人主不務襲迹於其所以安存而急急所以危亡是猶未有以異於卻走而欲求及前人也豈不惑哉孔子觀周遂入太祖后稷之廟廟堂右階之前有金人焉參緘其口而銘其背曰古之慎言人也戒之哉無多言多言多敗無多事多事多患安樂必戒無所行悔勿謂何傷其禍將長勿謂何害其禍將大勿謂不聞神將伺人焰焰不滅炎炎若何涓涓不壅終為江河綿綿不絶或成網羅毫末不札將尋斧柯誠能慎之福之根也口是何傷禍之門也強梁者不得其死好勝者必遇其敵盜憎主人民怨其上君子知天下之不可上也故下之知衆人之不可先也故後之溫恭慎德使人慕之執雌持下人莫踰之人皆趨彼我獨守此人皆或之我獨不徙內藏我智不示人技我雖尊高人弗我害誰能於此江海雖左長於百川以其卑也天道無親而能下人戒之哉孔子既讀斯文也顧謂弟子曰小人識之此言實而中情而信詩云戰戰兢兢如臨深淵如履薄冰行身如此豈以口過患哉孔子見老聃而問焉曰甚矣道之於今難行也吾比執道而今委質以求當世之君而弗受也道之於今難行也老子曰夫説者流於辨聽者亂於辭知此二者則道不可以忘也
