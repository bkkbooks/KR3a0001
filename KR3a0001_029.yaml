body:
  text: 郊問第二十九定公問於孔子曰古之帝王必郊祀其祖以配天何也孔子對曰萬物本於天人本乎祖郊之祭也大報本反始也故以配上帝天垂象聖人則之郊所以明天道也公曰寡人聞郊而莫同何也孔子曰郊之祭也迎長日之至也大報天而主日配以月故周之始郊其月以日至其日用上辛至於啓蟄之月則又祈穀于上帝此二者天子之禮也魯無冬至大郊之事降殺於天子是以不同也公曰其言郊何也孔子曰兆丘於南所以就陽位也於郊故謂之郊焉曰其牲器何如孔子曰上帝之牛角繭栗必在滌三月后稷之牛唯具所以別事天神與人鬼也牲用騂尚赤也用犢貴誠也掃地而祭貴其質也器用陶匏以象天地性也萬物無可以稱之者故因其自然之體也公曰天子之郊其禮儀可得聞乎孔子對曰臣聞天子卜郊則受命于祖廟而作龜于禰宮尊祖親考之義也卜之日王親立于澤宮以聽誓命受教諫之義也既卜獻命庫門之內所以戒百官也將郊則供天子皮辨以聽報示民嚴上也郊之日喪者不敢哭凶服者不敢入國門泛掃清路行者畢止弗命而民聽敬之至也天子大裘以黼之被裘象天乘素車貴其質也旗十有二旒龍章而設日月所以法天也既至泰壇王脫裘矣服袞以臨燔柴戴冕藻十有二旒則天數也臣聞之誦詩三百不足以一獻一獻之禮不足以大饗大饗之禮不足以大旅大旅具矣不足以饗帝是以君子無敢輕議於禮者也
